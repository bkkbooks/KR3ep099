body:
  text: 第十二卷時行痘疫病案疫痘順證案嚴繼春住紹興安昌病者朱天彪之郎年九歲住朱家權病名疫痘順證原因素稟氣虛血熱曾種牛痘一次又發水痘一度三月抄天氣暴熱天花盛行遂感染而發痘第二日即邀豫診證候初發身熱狀類傷寒雖覆單被喜露頭面嘔吐足冷耳後隱現紅絲診斷脈來浮數舌紅而潤豫斷之曰此時行疫痘也其父曰不然昔五歲時已出過痘其跡尚在豫審視之曰水痘瘢非正痘瘢也其父又堅執為夾食傷寒豫辨之曰痘證發熱卻與傷寒夾食相似但傷寒發熱則形寒面紅手足微溫傷食發熱則面黃白手足壯熱痘瘡發熱男多面黃耳涼女多面赤腮燥其足俱冷令郎身熱面黃耳後已現紅絲乃痘證非夾食傷寒也其父又曰嘗聞痘乃胎毒兒科書曰其發也五臟各具見證如發熱呵缺心也項急頓悶肝也吐瀉昏睡脾也咳嗽噴嚏肺也耳涼骩涼足冷腎也今只嘔吐足冷恐非痘之確徵豫曰令郎脾胃素弱痘瘡乘虛故發在脾此痘科書所謂脾經之痘也療法熱方二日姑以疏表藥消息之與蔥豉湯加味處方鮮蔥白四枚淡香豉三錢生薑皮八皮廣皮八分次診第三日視之皮下隱隱紅點而面上唇邊已報痘矣顆粒分明部位正當色紅而活頂平似陷身不過熱肢亦不冷脈舌如前其父只有一子深以為憂豫慰之曰疫痘固多險證但亦有辨凡出痘者以氣血和平為主尖圓堅實者氣也紅活明潤者血也紅活而平陷者血至而氣不足也圓實而色白者氣至而血不足也平塌灰白者氣血俱不足也焮腫紅綻者氣血俱有餘也令郎痘色紅活而平頂陷者血足而氣不足故耳但能漸次起發尚屬順痘且與參蘇三豆飲加減益其氣以透托之佐以解毒稀痘次方潞黨參一錢紫蘇嫩枝一錢荊芥穗一錢梗桔八分大黑豆二錢杜赤小豆錢半防風一錢生甘草三分先用緑豆芽一兩青箬尖三錢煎湯代水三診第四日證無進退照前方加炒牛蒡錢半又服一劑第五日往診痘已漸次出齊亦漸起脹痘頂已起痘腳紅活頂漸放白肥潤圓滿熱退喜食二便如常脈數退而舌紅潤勢將灌漿痘毒正化法當益氣和營使易貫膿三方潞黨參錢半當歸一錢酒炒白芍錢半小津棗三枚生綿耆錢半川芎六分生炙甘草各二分生糯米五十粒四診病家見勢頗順前方連服三劑漿足收靨先如黃蠟後如栗殼狀似螺形不疾不徐循次結痂痂潤身和不料兒要蜜棗過藥疊嚼六枚一句鍾後忽然便泄兩次陡發暈厥肢冷目閉急足邀診一家痛哭手忙腳亂豫診畢戒之曰切勿擾亂待其自蘇若見暈厥便將抱動呼喚號哭神氣一散由厥而脫其不救者多矣時有世弟傅醫在側謂起病日適犯太歲天符故靨後尚有急變豫日運氣之論岐黃祕旨乃但論其理非謂起病日也況主客之氣勝復之變一歲之中難以預料豈可以是料吉凶耶信如老世弟言太乙天符日起病者多凶然則太乙大符年有病者皆不可治也傅又曰然則尚有餘毒焉豫笑曰錢氏幼科真決云痘後餘毒有四一者疥二者癰三者目赤四者牙疳亦未嘗言有暈厥也蓋痘瘡或出不盡發不透靨不齊或空殼無水或清水非膿此則有餘毒也今此痘起發胖壯膿水飽滿靨結將脫之際而有此急變者蜜棗滑腸連瀉後大氣下陷勢將驟脫之險候也故脈亦沉微似伏急與保元湯合理中湯扶元固脫尚可挽回其父從旁嘆曰甚矣飲食之不可不慎也衛生常識之不可不明也撫膺而慟者久之四方別直參二錢炒於朮二錢炒川薑一錢升麻五分清炙耆二錢清炙草五分煨肉果一錢南棗二枚炒香五診瀉住肢溫神蘇能言六脈已起奕奕有神豫笑慰之曰伍子胥已出昭關矣拜謝大地可也此後務宜調其飲食適其寒溫其父微哂曰敢不唯命是從方用十全大補湯加減五方老東參錢半炒於朮錢半白歸身一錢酒炒熟地炭二錢清炙耆錢半雲茯苓錢半炒白芍錢半淮山藥三錢生打霞天曲錢半清炙草七分小津棗三枚效果連服八劑幸收全功廉按疫痘順證世俗每稱為狀元痘可不服藥惟吳氏鞠通謂三四日間亦須用辛涼解毒藥一帖毋庸多服七八日間亦宜用甘溫托漿藥一帖多不過二帖務令漿行滿足以免後患豫謂痘疫病也當以藥調惟藥之不當反不如勿藥耳所云三四日七八日者當參之形色不可執一此案診斷中討論病理確有見地方皆切中病情惟當結痂之期多食蜜棗忽生變證者正諺所云病從口入也陳氏痘疹方論謂痘根五臟六腑穢液之毒皮膜筋肉穢液之毒氣血骨髓穢液之毒三毒既出發為痘證子母俱忌食蔥韭薤蒜酒醬雞羊魚腥等物世俗未曉將為舉發往往不顧其後誤傷者多矣云云奈世人不察一遇小兒痘瘡見點時即用雞羊魚腥麻菰糯粥種種舉發謂之提漿不知時行天痘與所種之痘大有區別鼻孔種痘欲其液毒引之使出不得不於種後假食品以為引發之路若天痘則五臟之熱毒本感六淫而舉發安可再用發食以助其為虐耶甲寅乙卯之間吾紹痘證盛行每見小兒患痘者十斃七八大半皆受食品舉發之害深願世之有子女患痘疫者慎勿用食品舉發而貽後悔也疫痘逆證案嚴繼春住紹興安昌病者沈山谷君之令郎年一周零十個月住園裡沈病名疫痘逆證原因素因缺乳體虛肌色白嫩適冬令大花盛行陡發逆痘第二日即延豫診證候發熱二日面赤腮燥口角兩旁已見紅點狀如蚊跡不成顆粒昏睡乾嘔驚啼腹痛診斷指紋淡紫舌嫩紅苔淡白豫斷之曰此中氣素虛不能驅毒外出乃險中逆痘最防內陷致變病家問曰何謂逆痘豫曰痘點隱約細如蚊跡一逆也昏睡二逆也乾嘔三逆也腹痛驚啼四逆也其母遂痛哭不止豫謂面色明潤指紋淡紫痘點初見於口角大劑補托尚可轉逆為順再三慰之而出療法用大劑保無湯提補中氣為君歸芎芍活血透絡為臣佐神黃痘以托痘起脹使以生甘燈心解毒清神處方潞黨參一錢生黃耆一錢酒炒赤芍七分神黃痘一對當歸八分川芎五分生甘草二分燈心一分煎成乳兒只服一酒鍾余歸乳母服完次診每日一劑連服三日忽然發戰目閉口噤神色俱變急來邀診診畢即告曰此欲發戰汗之候汗出痘亦隨出萬氏痘疹心法所謂冒痘也約午後三鍾視之果得大汗而痘盡出遂神清而啼止睡臥寧靜嘔除嗜乳改用錢氏異功散加黃耆燕根白芍助痘成漿次方潞黨參錢半生於術八分暹燕根一錢炒廣皮三分生黃耆錢半雲茯苓一錢清炙草三分東白芍一錢效果連進四劑漿足結痂而愈廉按治痘之法形色為本證狀為標若形逆如干枯陷伏空癟癢塌之類色逆如氣色昏黯皮肉黧黑之類證逆如煩躁悶亂腹脹足冷之類兒大者又當診脈脈逆如躁疾鼓搏者陽盛陰虛也沉微儒弱者陰盛陽虛也四逆俱全標本同病氣血陰陽皆傷必死不治如但形逆證逆而脈有神氣色尚明潤者此標病本不病也急治其標以救其本猶可轉逆為順使之出險關而走坦途此業兒科者之責任也若一見險象誤認為逆畏而卻走未免太無膽識矣此案雖斷為逆而尚青負責可見膽本於識識本於學法用大劑提補兩方即奏全功非學驗兼優者不辦疫痘逆證案程文松住南京上新螺螄橋大街病者吳君之子年十四歲蒙童住上河南街病名疫痘逆證原因早經種過牛痘現由時氣傳染而發證候發熱三日吐黃稠痰滿見天花花頂色黑診斷脈來洪大而數痘頂色黑其熱毒深匿血分可知須知天花與種花不同種花者不發不出天花者自然之花自開自落況此痘系疫毒蘊釀而成今年天花流行十不救一二若照正痘例治斷難幸全勿謂言之不預也療法用解毒和中涼血透營王孟英加味三豆飲減輕痘毒為君臣以犀角地黃涼血清營佐以甘桔開上使以千金葦莖湯清化韌痰處方赤小豆三錢銀花二錢黑犀角二分磨汁生甘草五分枳殼一錢黑豆皮三錢青連翹三錢鮮生地二錢桔梗八分丹皮錢半生黃豆二錢生苡仁三錢冬瓜子三錢當歸一錢赤芍錢半白殭蠶二錢淨蟬蛻八分葦莖一錢燈心一尺效果三日漿足十二日結痂痊愈康按疫痘紅紫干滯黑陷焦枯者皆表熱而實大便祕結小便赤澀身熱鼻乾唇燥口氣熱神煩大渴者皆裡熱而實見點之初頂若火刺紅而乾枯紫而昏黯夾斑帶疹白而枯澀黑若塵鋪者皆為毒滯色重此案痘頑色黑顯然血熱毒遏若黑如烏羽而有沙眼模過轉色其血猶活者可救若黑如煤炭摸過不轉色其血已死者不治案中未及敘明未免掛漏惟方用涼血解毒宣氣透營為主尚能奏效者則其頂色黑尚為毒滯之黑非血瘀而死之黑也明矣噫險矣哉亦幸矣哉春溫疫痘案何拯華紹興同善局病者朱三寶之子年七歲住朱家病名春溫疫痘原因素稟肌色蒼而多火曾種牛痘兩次適暮春天氣暴熱天花盛行感春溫時氣而發痘第三日始就豫診證候壯熱自汗面紅頰赤目中淚出噴嚏咳嗽痘已見點中夾紅疹胸悶氣粗神煩不寧診斷脈右浮洪搏數左弦滑數舌尖邊紅苔滑微黃此疫痘為春溫引發而出前哲錢仲陽所謂痘夾疹者半輕半重也療法凡痘在七日以前多由外感用事必先審其所感何邪在何病所而清解之為七日以後上漿之地仿吳氏辛涼解肌芳香透絡使痘化多為少清絡而易出起脹銀翹散加減處方淨銀花二錢淨蟬衣七分冬桑葉二錢苦桔梗一錢青連翹三錢牛蒡子錢半粉丹皮錢半生甘草五分鮮蘆根五錢青箬尖二錢次診連服兩劑痘疹井發色皆焰紅頭面獨多餘部尚少唇赤舌紅脈仍搏數此毒參陽位最怕上衝神經陡發痙厥急與涼血敗毒以預防之五花三豆飲加羚角次方滁菊花二錢夏枯花錢半扁豆花草朵杜赤小豆二錢紫葳花二錢藏紅花五分大黑豆三錢生粉甘草四分先用鮮茅根一兩去皮碎羚角八分煎湯代水三診連進兩劑頭面陸續灌漿胸腹亦多起脹勢將灌膿惟腰背不足手足尚空皮膚捫之雖熱而不過灼既不發厥又無痙狀舌仍鮮紅脈尚洪數有力此血分尚有蘊熱也議於涼血解毒之中參以清滋氣液助痘灌漿蓋多得一分漿少得一分後患鞠通明訓諒不我欺三方鮮生地五錢紫地丁三錢銀花二錢珠兒參一錢粉丹皮二錢青連翹二錢元參二錢暹燕根一錢先用鮮茅根一兩緑豆芽八錢冬米一錢煎湯代水四診連投兩劑腰背手足漿亦滿足惟餘毒尚重舌紅脈數不必用溫補亦不可寒瀉猶宜用辛涼甘潤以為結癡之地仿吳氏法銀翹散去荷蒡荊豉加生地大青元參丹皮湯四方淨銀花錢半白桔梗八分細生地三錢鮮大青三錢青連翹錢半生西草一錢元參二錢粉丹皮錢半先用鮮茅根一兩甘蔗梢五錢煎湯代水五診痂雖漸結回漿甚緩上則微咳下則便微溏舌轉淡紅脈右浮數沉濡左小數此肺有餘熱而脾氣漸虛也議清肺稍兼實脾錢氏瀉白散合吳氏四苓湯加減五方生桑皮錢半炙生甘草各二分淮山藥二錢生打生苡仁三錢地骨皮錢半生於術五分雲茯苓錢半新會白五分天津紅兩枚金橘脯一枚效果疊進五劑沖咳已止二便亦調漿盡回胃氣旺盡收全功囑其調飲食適寒溫不必服藥自能恢復原狀廉按吳氏鞠通謂風木司天之年又當風木司令之候內合相火每逢春溫時有痘疹無論但受風溫身熱而不發痘或因風溫而競多發痘或發斑疹皆忌辛溫表藥但與辛涼解肌透絡最穩此兒科時醫所不知蓋風淫所勝治以辛涼佐以苦甘內經之正法也銀翹散加減治痘初起最能化多為少涼絡而易出見點亦服此惟勢將上漿則宜易方此案方法多從吳氏脫化競收全功可見鞠通於痘疹學素有研究惜其於解兒難引而不發語焉而不詳耳夏熱天痘案汪竹安住紹興斷河頭病者謝姓男嬰六個月住紹城大云橋病名夏熱大痘原因現當痘疫盛行之際感染時氣而即發天痘證候身熱煩啼氣急咳嗽心悸口乾耳涼肢冷診斷舌紫苔赤指紋浮露此錢仲陽所謂天行之病也療法先開腠理以透發之處方荊芥穗五分浙苓皮錢半光杏仁錢半前胡一錢陳皮五分生枳殼一錢蘇薄荷一錢防風六分桔梗六分蟬衣一錢次診身熱面腫目封痰滯便下苔紋兼赤此疫毒尚郁將發未發之候治以升提內托次方升麻三分炒牛蒡錢半生甘草三分浙茯苓錢半桔梗五分文元參八分生黃耆六分瓜蔞皮錢半陳皮五分三診壯熱神煩質小火重腠密難透故痘尚未見點紋舌同前治以扶中托毒活血養營冀其痘出而起脹三方文元參一錢清炙甘草三分酒炒當歸錢半陳皮五分生炙綿耆各六分蒲公英錢半根生地三錢蟬衣一錢四診痘一出而灌漿皮尚的而便泄苔微指紋漸淡治以補托為結痂善後之地四方料豆衣錢半別直參五分炙生綿耆各六分浙茯苓錢半陳皮五分清炙甘三分焦冬朮錢半炒枳殼八分絲通草一錢五診多吮母乳地閣面頰告回日見好象惟鼻塞痰多大便如沫若皮面又起炎性運水蒸痂固有之病勿揣可也巨與清宣肺氣以化結痰兼實大便五方東白薇錢半淨楂肉二錢生於術錢半通草一錢淡子芩六分浙茯苓錢半生枳殼一錢大腹皮錢半杭菊錢半淡竹茹錢半六診痰滯不出肺失健旋深慮停漿化燥治仍清金化痰解除痘毒六方淡子芩八分銀花二錢炒楂肉二錢瓜蔞皮錢半生甘草三分京川貝一錢連翹錢半大腹皮二錢炒枳殼八分鮮竹茹二錢七診天痘日見消回惟鼻塞目封胃肝火上冒吮乳痰多舌苔潤如不多吮母乳勿受外感可保無慮七方淡子芩八分炙百部錢半光杏仁二錢杭菊二錢生甘三分金銀花二錢夏枯草錢半炒楂肉二錢黃草石斛錢半效果連進三劑諸證痊愈廉按痘為先天欲火之遺毒蘊藏於骨髓深處至熱毒流行之歲則因而外發夏令正歲火流行之際痘易升發初方解肌開膳先清外感以發痘毒二三兩方升提內托活血養營助其起脹而灌漿厥後輕清宣化以解痘後餘毒為輕性疫痘之正治法冬溫疫痘案汪竹安住紹興斷河頭病者徐姓男嬰年三歲住本城駙馬樓病名冬溫疫痘原因從冬溫時氣傳染而發證候身發壯熱天痘微現氣急作嘔大便溏泄診斷舌苔糜白關紋淡紫此內經所謂溫癘大行適感其氣而發疫痘也療法輕清透發使痘毒隨感邪而出處方淨蟬衣八分炒牛蒡一錢生枳殼八分苦桔梗五分絲通草六分仙露夏一錢淡竹茹一錢廣陳皮六分生甘草三分次診頭面漸見腫赤稍兼清漿痘泡氣急已減身熱未除指紋舌苔同前此因兒小元弱不能托痘外達也最防漿未滿而驟變內陷姑以保元湯加味扶元透毒助痘成漿次方文元參一錢淨蟬衣一錢炒枳殼一錢浙茯苓一錢升麻二分生炙綿耆各六分陳皮六分絲通草八分炙甘草三分三診身熱咬牙口燥神煩大便泄瀉舌色紫絳審此現象恐化驚痘先以輕透健運使痘毒清化變症自除三方升麻三分生葛根七分淨蟬衣五分天花粉錢半西紫草三分水蘆筍三錢鮮竹葉十片廣木香磨汁沖一小匙四診目鼻俱封咽阻多痰咬牙肢瘛頭面腫口燥便溏尿赤澀舌肉有痘苔白燥形色合參熱盛風動正由險轉逆之危候仿前明李重興先生金鏡玉函例清化涼解四方羚角片五分先煎滁菊花一錢前胡八分天花粉一錢桔梗五分水蘆根錢五豬尾血十滴梅冰一釐研勻同沖白頸蚯蚓三小支洗去泥五診目開鼻通咬牙止痰亦少頭面腫退口燥大減二便尚赤舌轉紅潤痘形平扁病已轉機出險就順仍仿金鏡玉函中清養法調理以善後五方鮮生地三錢鮮石斛錢半北沙參錢半原麥冬一錢鮮茅根草支去衣嫩桑芽一枝廣陳皮三分效果連服三劑諸證悉瘥痘亦結痂胃健善食而愈說明此為天花痘之險證出險就順由險轉逆吉凶在二三日間全在醫家心靈眼快病家看護周到始能轉危為安豫於十五日四診之際頗為躊躇悟到李重興先生金鏡玉函中載有羚角二妙湯一方為治險痘歷試輒驗之良方酌而用之果有特效快何如之益信前哲專科之善本不可不精究於平時也廉按小兒血氣來充臟腑嬌嫩痘瘡不能起發良由元虛不能足漿漿不足則毒不泄若再以毒攻毒不但毒不肯出而正氣更受其害未有正虛而毒能化者也然亦有因熱極而槳不起者以正氣為壯火所食也宜瀉火忌補托至痘後生毒多由妄投毒藥誤用溫補所致此案初用輕清透發為治痘開先之正法次用保元補托反變咬牙熱瀉口燥神煩等症者顯因壯火食氣也又次輕透健運反變咬牙肢瘛熱盛風動之危候諒因升葛升陽反助壯火以生風逮改用李重興先生法大劑清化涼解以瀉痘毒之火而病始轉機出險就順終用清養調理而競收全功此吳鞠通所謂始終實熱者則始終用錢之涼解蓋痘本有毒可解但須解之於七日之前有毒鬱而不放肥不上槳者烏得不解毒哉旨哉言乎風溫疫痘案徐伯川住紹興倉橋街病者連長汪夢飛君令郎年三歲住本城車水坊病名風溫疫痘原因三月間傳染天花外因風溫而引發見點始延診治證候痘點隱隱大小不勻頭身壯熱心神煩躁咳嗽痰多大便祕溺短數診斷指紋青紫浮露舌鮮紅無苔此痘瘡已發未透之候病勢可順可逆務宜慎風寒節飲食為要療法輕清開達銀翹透毒湯主之處方銀花錢半淨蟬蛻五分光杏仁錢半桔梗八分生甘草二分青連翹錢半炒牛蒡錢半蘇薄荷五分廣橘紅五分燈心草支次診痘已透明神靜安寐惟身仍熱咳痰尚多大便仍祕舌與指紋同前治仿前法原方去薄荷牛蒡加升麻五分制佳蠶錢半三診痘已發齊顆粒鮮明己見水漿嗽減痰活神安喜寐小便漸利舌轉紅淡指紋亦隱治以解毒托漿為君宣氣消痰佐之三方青連翹錢半甜桔梗錢半生甘草三分制殭蠶錢半光杏仁錢半廣橘紅四分暹燕根一錢皂角刺三分四診痘粒圓綻貫膿充滿如黃褐色痰少胃動溺利神安大便紅黑舌與指紋同前治以雙補氣血略佐清化四方潞黨參錢半暹燕根一錢銀花三分制殭蠶五分生黃耆錢半當歸身錢半丹皮五分生甘草三分五診膿已貫足痘將回而結痂胃氣已健二便如常不過略有餘熱而已前方去佳蠶銀花加細生地三錢生白芍錢半紫草五分夏枯花八分效果調補四劑而痊廉按此為輕性疫痘之療法方皆輕穩層次亦清然此持治順境之常痘耳蓋常者可必而變者不可必當細觀痘之形色部位及病兒氣分之虛實血液之通滯隨機策應斟酌用藥安可執藥以應無窮之變哉總之變通之妙要在隨時制宜也風熱疫痘案嚴繼春住紹興安昌病者王三義郎年三歲住四康病名風熱疫痘原因仲春發東南風天氣暴熱痘疫盛行適感風熱而引發證候初起狀似傷寒頭疼身痛乍寒乍熱噴嚏呵缺面赤唇紅咳嗽痰涎耳後己現紅絲惟耳骩中指俱冷診斷脈浮數指紋青紫而浮此疫痘已發未發之候療法托裡解表使其易出松肌透毒湯加減處方荊芥穗三分淨蟬衣三分前胡一錢桔梗四分嫩桑芽一錢滁菊花八分生葛根五分生甘草二分次診連進兩劑痘發不起形色紫陷煩渴壯熱咽喉腫痛咳痰氣喘啼聲不清腹灼便閉指紋青紫且滯此熱盛毒重上壅於肺之險象也急急清涼解毒使痘易出而透齊清金攻毒飲加減處方牛蒡子一錢生枳殼七分前胡一錢蟬退五分桔梗二分元參一錢淨楂肉八分粉重樓一錢殭蠶八分生甘草二分生錦紋五分用銀花露浸出黃汁分沖三診前方以清涼解毒為主連服兩劑幸而大便微下咽喉痛除咳喘煩熱均已輕減聲音清亮痘點出齊指紋青紫色淡議於清滋氣液之中仍兼解毒使易於貫膿且兔癰毒泡瘡之後患參燕三豆飲主之處方北沙參錢半金銀花一錢生緑豆錢半杜赤小豆一錢毛暹燕五分包煎青連翹一錢小黑豆錢半生西甘草二分四診連進兩劑膿漿貫足根窠充滿紅而且潤胃氣大動知飢喜食便通溺利法當調補氣血資養脾胃以善後保嬰百補湯主之處方潞黨參錢半浙茯苓一錢白歸身八分細生地一錢小津棗兩枚生於術八分清炙草三分炒生白芍各五分淮山藥一錢生打效果連服四劑而痊廉按痘疫雖以原蟲為原因而其發原動之誘因翁仲醇曰或因傷風熱而得或時氣傳染而得或內傷飲食嘔吐而得或跌撲驚恐蓄血而得葉天士云痘疫為六氣鬱遏者從時氣治為內傷停滯者從里證治亦有表裡兩解治亦有下奪者但下法寒涼之中必須活血理氣防其凝澀冰伏此案初方輕清疏達次方穩健著力皆屬對症發藥妙在第三方清滋氣液助痘成槳與魏氏用保元湯溫補法催漿者相對待劉丙生曰痘科托漿之法前賢多用保元湯等參耆溫補之法其於金水二臟陰虛津液不足帶火干收之證則闕如也如今年甲寅歲氣由去冬先天時而至相火司天引動胎毒天痘大行且多兼溫疫之痘雖成人尚不免重出況嬰兒乎種牛痘而未泄盡胎毒者皆不免焉此多由陰精之氣不足以抵拒先天相火之毒故毒氣留連天津液蒸為膿漿每有九日外意外之變知其虛而補助之泥用古方溫補必無生理因思得一法專為培補先天金水二臟之氣創為滋補陰氣一法以補前人之闕屢用有效能轉危為安凡金水不足者富者用濂珠貧者用毛燕赤貧者用木耳皆能培補金水二臟之淡氣以排泄毒氣於體外木耳淡氣最富凡脈極數者用之有效單腎氣不足者用豬腰子湯此治腎經逆痘有殊功此外如增液湯三才湯生脈散等皆可採用因本年泥用古方溫補多有遺憾特提出滋補一法令溫補滋補對樹旗鼓欲為痘科者當辨其陰陽虛實審慎擇用方不誤事其方意與劉說更相符合若第四方雙補氣血調養脾胃亦屬翁氏善後之良方足見學有淵源非率爾處方者可比風寒疫痘案嚴繼春住紹興安昌病者黃麓隱君之令郎年八歲住白馬山病名風寒疫痘原因素體肌肉粗厚二歲時曾種牛痘一次去年冬傳染痘疫適感風寒而外發見點後始延余診證候頭疼身熱惡寒無汗痘點隱約心神煩躁睡臥不寧氣粗胸悶毛鑑面浮咳嗽白痰診斷脈左浮緊右浮沉滯舌邊尖紅苔白滑此痘毒內發風寒外束郁遏而不得達表所以痘出不快也療法發表為先非升葛不能直達非麻桂不能橫行二麻散郁湯主之使皮腠疏通痘出自快處方升麻五分生葛根八分生赤芍錢半炙甘草四分麻黃五分桂枝尖四分光杏仁二錢廣皮紅八分次診一劑即惡寒除周身汗出痘亦隨透色紅帶紫間有痘母形大色黃雜於常痘之內神煩少寐渴喜熱飲咳嗽痰多眼漲若怒便閉溺赤脈轉洪數舌紅苔黃此熱毒壅遏之險候急急泄熱解毒內外分消使毒化痘齊為要仿費建中先生法次方紫草錢半青連翹三錢生石膏六錢杵光桃仁九粒蜜炙川甲一錢丹皮錢半生赤芍錢半生錦紋三錢酒洗藏紅花七分白頸蚯蚓三錢犀角粉三分藥湯調下燈心二分銀花露一斤代水煎藥三診一劑大便微下痘已催足色紫轉紅痘母先見清漿頂滿而圓痘盤圈紅緊附是為毒化前哲葉天士所謂體強質實者多火以清涼解毒之劑則火解漿成其言洵不欺我也脈數漸緩舌紅漸淡仍當涼血解毒仿前法減其制三方鮮生地五錢藏紅花五分銀花錢半青連翹三錢炒牛蒡錢半制殭蠶錢半廣鬱金二錢杵紫草錢半苦桔梗一錢生西草三分四診疊進兩劑痘已催齊火色漸退惟漿未全透或有半漿頂若笠形不克充灌病勢尚在險途幸而痰嗽已除胃動神靜大便色紅溺赤而利脈轉軟數舌轉淡紅此由火毒下泄而血液已虧當清滋氣液為君佐以清化餘毒參燕三鮮湯加味四方真西參一錢鮮生地五錢原麥冬一錢活桑蟲三錢銀花三錢毛暹燕一錢鮮石斛三錢雞冠血二滴分沖鮮茅根二兩去皮切寸煎湯代水五診連服兩劑引漿飽滿痘頂亦充痘母已先乾紅結痂胃納日增二便色淡脈舌同前議於滋補之中略解餘熱麥門冬湯合歸芍異功散加減五方麥冬錢半潞黨參錢半生於術八分清炙草四分歸身錢半生白芍一錢辰茯神三錢新會皮五分鮮石斛三錢地骨皮三錢冬米五十粒青蔗漿二瓢分沖效果連服四劑諸證皆除氣血復元而愈廉按身初發熱及痘見點之際適為風寒所抑致肌腠堅閉經絡阻滯使清氣不得引毒達表循竅而出則熱毒壅遏於內往往為喘急為狂亂為驚搐為失血為脹滿為祕結者皆痘毒壅遏之證余見甚多辨證不差即直開提發散佐以解毒透表則熱不壅而痘出自易矣此案初方放膽用升葛湯合麻黃湯卻是古方之最有效力者蓋固郁之愈甚則發之愈暴方亦不得不用猛劑也第二方費氏必勝湯加減於大劑涼血攻毒之中佐以桃紅活血通絡疏暢氣機亦用得剛剛恰好第三四五等方皆穩健適當有實學且多實驗真博歷知病屢用達藥之斫輪老手也陰寒疫痘案嚴繼春住紹興安昌病者胡世義之郎年七歲住馬回橋病名陰寒疫痘原因夏令風雨大作約有旬余天氣應熱而反寒非其時而有其氣致小兒多染疫痘第三日始延豫診證候痘雖見點大小不勻四肢多見痘脹肉腫先時便眼封鼻塞身微熱而怕冷診斷脈緩而滯按之無力舌苔滑白帶灰此陰寒疫痘也最防不長不快痘毒內陷而生變療法此時若專用發散以逐毒非惟毒不可逐且使氣衰弱而不能拒守乎中若但用輕清以解毒非惟毒不可解且使毒水伏而不能驅出於外惟有用藍真人流氣飲加減辛甘芳透使陰毒外散正氣內守庶痘易於起脹而灌漿處方當歸三錢酒洗川芎錢半白芷一錢獨活五分川桂枝八分防風一錢廣皮紅五分甘草節三分次診第四日復診痘不起脹肉多浮腫懶言嗜臥手足厥冷遍身紫暗狀如蚊跡面色青白便溏溺利脈舌如前此痘出於脾之險證也幸而無口臭腹疼青癍如靛等逆證否則二三日即凶變矣且與藍真人生生飲以急救之次方別直參錢半生綿耆錢半川芎五分煨肉果五分廣木香五分當歸一錢酒洗鹿角尖一錢青化桂三分廣皮四分炒炙甘草四分三診第五日復診痘已漸次起脹先起脹者亦漸灌漿肢溫瀉止遍身紅活紫暗已除脈漸流利舌灰亦退惟上漿而瘡口不斂兩腰痠痛此由昨日重用參耆保元以起脹歸芎鹿角以催漿肉桂補命陽香橘暢脾氣肉果阻其下陷之路炙草調其諸藥之性則氣焉有不上騰而生者乎氣生而痘焉有不起脹者乎且氣能生血血盈而痘焉有不灌漿者乎僥幸而領出險關且與藍真人補脾湯溫補氣血以貫脈三方別直參一錢炒於朮二錢當歸一錢廣皮五分雲茯苓五分川芎五分炙綿耆錢半紫猺桂二分炙草三分胡桃肉拌炒補骨脂一錢四診第六日復診凡漿足而貫膿膿潰而瘡口不斂者肌肉不長也肌肉不長者脾胃氣血虛寒也故囑疊服補脾湯者甘溫香燥以大補脾胃之氣血也脾得所補則肌肉自生而瘡口漸次收斂腰脊痠痛亦除者峻補氣血之功用也惟脈尚軟弱後來貫漿者猶有毒潰而膿清尚屬氣血不足深恐結痂維艱議用藍真人十全湯大補氣血以為結痂之地步四方別直參一錢生炒於朮各五分當歸一錢紫猺桂二分川芎五分炙綿耆錢半炙西草五分直熟地二錢炒廣木香五分廣皮五分五診第十日復診漿稠而靨漸次結痂胃納日增脈圓舌潤用藍真人十味百和湯加減調補氣血津液以善後五方潞黨參一錢清炙耆錢半生地二錢東白芍一錢浙茯苓一錢北沙參一錢提麥冬一錢熟地二錢當歸錢半清炙草五分效果連服六劑而痊廉按黃帝逸典曰痘之生死繫於漿之有無漿之有無繫於脹之起伏脹之起伏繫於身之氣血身之氣血繫於中之水火水乃後天之形氣火乃先天之元氣苟能從此穎悟則由玄而入於妙矣藍采和真人云豫得道後欲立功人寰計莫若醫遍檢方書率多浮議後得黃帝逸典於御藏中再四展讀與吾家玄門宗旨相合且其中語多引而不發以俟能者之從故豫詳盡說明然有論天方烏能濟衆豫又著藥性藥方二論以傳於世此案初中末五方皆遵藍真人方藥脫化故能方方取效轉險為順碻收成績後賢如陳文仲十一味木香散十二味異功散魏桂岩保元湯聶久吾參歸鹿茸湯皆藍本於此此從醫者所以貴博覽而約取也溫毒疫痘案嚴繼春住紹興安昌病者郁文卿郎年五歲住遺風鬱家病名溫毒疫痘原因素稟陽旺血熱適冬令痘疫盛行傳染而發已服過兩劑升麻葛根湯合麻杏甘膏湯不效而病勢反劇延余往診證候痘瘡已發未發發則紫豔深紅或有黑陷或有紫硬或有歪斜或如麻芥實而不松點而不活壯熱大渴心胸煩悶揭衣棄被揚手躑足神識昏狂便閉溺赤診斷脈洪數實舌色紫赤起刺如楊梅此由梟毒衝突氣血不能駕馭一任疫毒之縱橫所以頑而不松伏而不透乃病勢最險之危候也療法此毒不除諸痘皆陷治不以攻治之何益急仿翁嘉德先生法大劑散結攻毒飲挽救之處方蘇薄荷一錢荊芥穗一錢生枳殼一錢生錦紋三錢赤芍二錢牛蒡子二錢生西草四分桔梗六分小川連一錢絳通一錢鮮生地五錢生石膏八錢鮮大青四錢豬尾膏一瓢分沖燈心一分紫花地丁三錢鮮淡竹葉三十片次診疊進兩劑頭煎身仍壯熱腮紅臉赤毛焦皮燥面浮目突多哭善怒氣粗喘滿腹脹煩躁狂言亂語睡臥不寧大便仍祕溺尚赤澀惟痘點較前起發形色外黑裡赤間有外白里黑脈舌如前總屬血熱毒壅病勢仍凶急進涼血攻毒飲力圖挽救於萬一處方犀角尖五分磨汁沖粉丹皮二錢小川連二錢光桃仁二錢牛旁子三錢鮮生地一兩生錦紋六錢生石膏一兩杵藏紅花一錢紫地丁三錢陳金汁二兩沖燈心一分痘疫奪命丹兩顆先用藥湯調下附方飛辰砂一錢西牛黃七分雄精三分梅冰三分蟾酥一釐用淨豬尾血搗丸如火麻仁大三診一劑後二便暢利諸證轉輕前方去生軍奪命丹減輕用量又進一劑從此痘色黑者變紫紫者變紅外白里黑者亦轉淡紅見點活動高松而圓根窠收緊潤澤有光險證已平勢將行漿急以灌膿為主助痘成膿從益元透肌散加減處方潞黨參三錢炙生甘草各三分紫草一錢川芎五分蟬退三分炒牛蒡一錢淨楂肉一錢新會皮五分桔梗四分絳通八分生糯米五十粒燈心十四支小津棗二枚四診疊進保和元氣活血解毒助痘成漿使其易痂等法果然漿足別無他證惟氣血兩虧脈來虛弱法當調補氣血滋養脾胃以復其元保元合保嬰百補湯主之處方潞黨參二錢生於術錢半清炙西草五分白歸身錢半清炙耆錢半雲茯苓錢半生淮山藥二錢打細生地二錢生白芍一錢小津棗三枚效果連服八劑結痂褪淨而痊廉按溫毒疫痘最多險證如根竄順而部位險部位順而日期險日期順而多寡險多寡順而顏色險顏色順而飲食險飲食順而雜證險雜徵順而治療險治療順而觸穢險而猶有最險者則在元氣與邪氣耳若邪氣雖強元氣亦強者無害若元氣一餒邪氣雖微者亦危設或犯之而不速治則順者逆而吉者凶矣此案尤為險中之急初方用散結攻毒飲五歲小兒敢用生錦紋三錢小川連一錢生石膏八錢豬尾膏一瓢以急攻溫毒處方不可為不峻疊進兩劑頭煎而病勢依然可見梟毒之頑強抵抗驟難制伏必用大劑涼血攻毒飲減加出入疊進兩劑始得僥幸出險妙在於涼瀉之中仍佐桃紅等活血疏暢不致凝滯氣血幸而此兒元氣尚強能勝任大劑峻攻否則由險轉逆壽可立傾厥後三四兩方助痘咸漿催漿結痂步驟井然轉機極速非於痘科學素有研究臨證富有經驗者曷克擔此重任似此佳案卓卓可傳瘟毒疫痘案周禹錫住成都病者胡姓兒年四歲住城外鄉間病名瘟毒疫痘原因素未種過牛痘適冬令疫病盛行遂染天花五日後病勢甚險始延余診證候周身攢簇大小不勻幾無空隙煩熱嘔逆診斷脈浮洪數實舌紅帶紫此血瘀毒盛之險候也療法除瘟毒為首要用王氏通經逐瘀湯加黃耆知母處方光桃仁二錢片紅花一錢生赤芍八分青連翹一錢川柴胡五分皂莢刺六分生黃耆八分肥知母一錢蜜炙川甲八分白頸蚯蚓三錢當門子三釐絹包次診疊進活血宣竅益氣解毒兩劑而痘即起漿先清漿其次白漿又次混漿又次黃膿脈轉虛弱改用足衛和榮湯以善後次方潞黨參一錢清炙耆錢半生於術一錢清炙草五分當歸一錢東白芍錢半炒棗仁五分光桃仁五分藏紅花三分效果兩劑結痂又兩劑胃健體強而愈廉按王清任曰痘非胎毒乃胞胎內血中之濁氣也兒在母腹始固一點真精凝結成胎以後生長臟腑肢體全賴母血而成胞胎內血中濁氣降生後仍藏榮血之中遇天行觸濁氣之瘟疫由口鼻而入氣管由氣管達於血管將血中濁氣逐之自皮膚而出色紅似花故名天花形圓如豆故名曰痘總之受瘟疫輕瘟毒隨花而出出花必順受瘟疫重瘟毒在內逗留不能隨花而出出花必險受瘟疫至重瘟疫在內燒煉其血血受燒煉其血必凝血凝色必紫血死色必黑痘之紫黑是其證也死血阻塞道路瘟疫之毒外不得由皮膚而出必內攻臟腑臟腑受毒火煎熬隨變生各臟逆證正對痘科書中所言某經逆痘不知非某經逆痘也乃某經所受之瘟毒也痘之順逆在受瘟疫之輕重治痘之緊要全在除瘟毒之方法瘟毒不除花雖少而必死瘟毒若除花雖多不致傷生痘科書中但論治胎毒而不知治瘟毒縱知治瘟毒而不知痘毒巢穴在血若辨明瘟毒輕重血之通滯氣之虛實可立救逆痘於反掌之間即痘漿亦不是血化痘出時是紅色五六天後忽變清漿次變白漿次變混漿次變黃膿終而結痂此由痘本血管內血中濁氣遇天行濁氣之瘟疫自口鼻而入於氣管達於血管將血管中濁氣與血並氣管中津液逐之自毛孔而出所以形圓色紅五六天後痘中之血仍退還血管痘內止存濁氣津液津液清名曰清槳清漿為瘟毒燒煉稠而色白故名白漿白漿再煉更稠而混故名混漿混漿再煉稠如瘡膿故名黃膿將黃膿煉乾而結痂痘不行漿皆因血不退還血管血不退還血管皆因血管內有瘟毒燒煉血凝阻塞血之道路若通血管之瘀滯何患痘漿之不行其言如此已扼痘疫病源之概要矣惟近據弗垤氏派伊弗爾氏乖爾氏等言本病原為一種之原蟲名企篤利苦的斯懷利阿列由於直達接觸空氣介立人體及物體而傳染罹本病一次即得免疫性後天再罹本病者其流行有一定期限以二年乃至四年現出為常例考原蟲即微生蟲吾國通稱小蟲桃仁善殺小蟲載在神農本經談其濂撰鼠疫一書推桃仁為殺小蟲之特效藥清任通經逐瘀湯以桃仁為君藥愜合痘疫之原因療法故其方善用者多收成效此案前後二方悉遵清任治則以收功可見王氏當時必是親治其證屢驗之方所以方中自注云此方無論痘形攢簇矇頭覆釜周身細碎成片或夾疹夾癍浮衣水泡其色或紫或暗或黑其證或乾嘔煩躁晝夜不眠逆形逆證皆是瘀血凝滯於血管並宜用此方治之其方中藥性不大寒大熱不大攻大下真良方也五六日後見清漿白漿將麝香去之加黃耆五錢將山甲皂刺減半至七八日後桃仁紅花亦減半黃耆可用八錢若溫毒極重者余每遵丹溪翁法與犀角地黃湯合用一則清透血毒一則善殺原蟲以犀角桃仁為君藥雙方兼顧改定方名曰十二味犀角桃仁湯較之王氏本方尤為穩健而周到凡治瘟毒痘疫屢奏殊功故表出之以貢獻於專門痘證科者氣虛疫痘案賈清琳住泰安東海子街病者劉步堂泰邑清文庠住城東小觀莊其第三子年一周半患痘病名氣虛疫痘原因素稟胎怯證候身熱肢冷神昏不乳時常寒戰痘已見點五日遍身灰白摸不礙手診斷虎口絡脈紅線已由風關通氣關以證合參此氣血虛寒之候故痘色灰白療法方用參耆朮益氣補托為君臣以歸芎活其血木香陳皮調其中佐以升柴引氣透表邊桂補火暖血使以甘草協和諸藥而已處方高麗參錢半生箭耆錢半生於術錢半歸身錢半川芎六分陳皮五分安邊桂二分川柴胡三分升麻三分青木香三分清炙草六分水煎日夜連服二劑第七日加炒山甲八分清雞湯煎服一劑漿足轉紅二劑乳食大進又方潞黨參二錢白歸身錢半酒炒生地錢半丹皮一錢炒銀花一錢山萸肉一錢清炙甘草七分效果服四劑至十五日始落痂月半平復廉按凡嬰孩體虛染痘首必辨其表裡若痘灰白不紅綻初起發出不快昏暗陷頂皆表寒而虛若二便清利身熱不揚手足口氣俱冷不渴少食唇白涕清飲食不化皆裡寒而虛次必辨其氣血若痘色淡白頂不堅實不硬指不起脹者皆為氣虛若根窠不紅或紅而散亂手摸過即轉白痘上如寒毛豎起枯澀不活者皆為血虛此皆診斷虛痘之看法也至若治法痘必以發透為吉其起發必賴氣血滋培方能自內達外齊苗灌漿結癡無非氣血為之主此時一忌清熱敗毒二忌克伐氣血三忌雜藥亂投四忌吞服醫家小丸此案的系虛痘方用保元合補中益氣加川芎木香面面顧到深合魏莊二家心傳可謂扼虛痘之主要矣疫痘黑陷案嚴繼春住紹興安昌病者朱曉翁公子年八歲住本鎮病名疫痘黑陷原因素稟肌蒼多火適逢冬令溫燥天花盛行遂傳染而發病證候痘已起發間有變黑陷而不起余尚紅活形多肥澤身尚壯熱神煩少寐便溏溺利診斷脈左搏數右浮洪重按則軟舌紅苔薄滑豫斷之曰痘瘡紅活之中間有黑陷不起較一身盡成黑痘者尚為逆中之順然亦險矣慎毋因循恐漸變加多不可救藥矣曉翁問曰曾聞痘瘡變黑歸腎者不治豫曰凡痘黑陷約有二證一則乾枯變黑者此名倒陷乃疫火大熾真水已涸故曰歸腎者不治一則痘色變黑未至於塌此疫毒爍血血色被灼而熏黯者也令郎之痘與第二證相類況黑陷者尚鮮茲蒙堅信不疑急急挽救猶可為也療法用犀角尖鮮生地當歸頭酒紅花清透營熱活血提頂為君銀翹升蒡甘中黃等解毒舉陷從里達表為臣然痘色之黑者雖由毒火熏黯而痘頂之陷者多由元氣衰弱故佐參耆以提補元氣重用茅根為使者取其生髮最速從下透上從營達衛走心肺而清導血分較蘆筍之純走氣分為尤良也處方犀角尖八分磨汁沖鮮生地六錢酒洗當歸頭錢半藏紅花七分灑炒銀花二錢青連翹三錢炒牛蒡二錢升麻五分甘中黃一錢包煎潞黨參錢半生黃耆錢半先用鮮茅根二兩去衣煎湯代水次診痘黑轉紅頂陷起發漸次上漿勢將貫膿壯熱神煩已減脈數漸緩舌紅漸淡病勢幸有轉機仿芎歸保元湯為主治參以宣氣活絡不必敗毒清血致令便溏內陷次方川芎五分酒洗歸身須各一錢酒洗太子參一錢生綿耆錢半生炙粉甘草各三分廣木香四分廣皮五分藏紅花七分廣橘絡七分酒洗麻菰四分三診連進三劑先貫膿者多結痂已結痂者漸收靨胃健喜食氣足神完與保元異功合法以善後而收功三方潞黨參二錢清炙耆二錢生於術錢半清炙草四分浙茯苓二錢炒廣皮五分淮山藥三錢生打小津棗三枚效果連服六劑而痊廉按凡痘自內不出謂之伏自外復入謂之陷痘瘡黑陷當分四證以明辨之一則外感風寒肌腠閉塞血凝不行必身痛肢厥痘點不長或變黑色或變青紫者此為倒伏也治宜辛溫解肌以透發之二則痘毒太盛內外蒸爍毒氣上衝必心煩狂躁氣喘妄言如見鬼神大小便閉腹脹足冷者此為倒陷也勢輕者宜利小便以解毒重者宜表裡雙解以攻毒三則陽氣內虛而不能運行營衛出而覆沒痘變黑色或白色證多不能飲食二便自利或嘔或厥此元氣虛而黑陷者謂之陷伏也治宜保元溫托為君間有因誤下之後毒氣入里而黑陷者則宜溫托而透發之四則被房室等雜穢惡氣感觸而黑陷者則宜芳香以熏解之此案但屬黑陷之險證尚非逆證惡候用藥的對猶可由險轉順案中發明病理確切病情頭頭是道故能方方見效善診斷者善治病吾於此證而益信疫痘夾瘄案嚴繼春住紹興安昌病者俞丹霞君之令郎年四歲住陶里村病名疫痘夾瘄原因暮春痘疫盛行適感風溫而痘瘄併發證候身熱二日痘已見形隱伏不透中夾細粒狀似麻疹如雲密布痰嗽氣粗煩躁不寧診斷脈浮滑數右甚於左舌紅苔罩白滑此因染疫痘時恰遇風溫時氣感受其氣一時而痘瘄併發也療法當先輕清透瘄瘄透而痘亦隨出河間桔梗湯加減處方蘇薄荷七分淨蟬衣七隻栝蔞皮一錢苦桔梗四分青箬葉二錢青連翹錢半炒牛蒡錢半廣皮紅五分生西草三分嫩桑芽一枚次診宿已發透但有點粒一無片片大顆如痘略有根盤頭面多見胸背尚鮮頭身仍熱咳嗽痰多氣粗神煩脈舌同前當以托痘為要活血疏肌以透發之次方紫草八分藏紅花四分光杏仁錢半淨蟬衣七隻青連翹錢半丹皮一錢生赤芍一錢廣皮紅六分生葛根七分淡筍尖兩枚三診時瘄已回痘亦催齊點至足心色多紫赤溺赤便閉身雖仍熱神已安靜痰嗽輕減脈尚搏數苔退舌紅此血分尚有蘊毒也治以涼血解毒使血熱痘疹內外分消翁氏十神解毒湯加減三方鮮生地三錢紫草錢半蜜銀花錢半瓜蔞皮二錢藏紅花五分丹皮錢半青連翹二錢漢木通八分先用生緑豆二兩煎取青汁去渣代水煎藥四診痘頂屬氣根盤屬血血充則圈紅緊附氣盛則頂滿滾圓皆由氣領血載痘瘡得煅煉化漿便通溺利身涼脈靜是為毒化之佳徵易痂易落可預料焉用三合湯加減滋養脾胃免生痘後虛證四方潞黨參錢半生於術六分浙茯苓一錢生甘草三分小津棗三顆白歸身一錢生白芍錢半細生地二錢新會皮五分金橘脯一枚效果連服五劑痂落胃健而愈廉按瘄為寧紹麻疹之俗稱痘有夾麻疹者有夾丹疹者麻疹多屬於肺故咳而始出起而成粒勻淨而小頭面愈多者為佳治以透疹為先疹散而痘瘡自發矣丹疹多屬於脾隱在肌腠之間發則多癢而麻木者兼濕痰也色紅塊赤如雲頭而突者兼火化也多發於手足身背之上治以托痘為主痘出而丹疹自淡矣此案痘瘄併發先透瘄而後托痘者蓋因瘄屬肺胃易於透發痘由腎至肝至心脾及肺自里至外從深及淺全藉身中氣血領載充長以化毒為漿必待膿厚蒼老而始結痂毒乃外泄元氣內返始無變證此亦一定之步驟也初中末四方皆輕清靈穩深得葉氏薪傳疫痘夾驚案嚴繼春住紹興安昌病者胡世寶之郎年約周歲住馬回橋病名疫痘夾驚原因兒肌蒼黑素稟多火三月間痘疹盛行外感風溫陡發驚痘證候發熱一日痘未見點即現驚竄甚則手足瘛瘲神識昏迷頭部獨灼兩太陽及耳前筋皆跳動震手耳後已起紅絲呵缺噴嚏腮紅臉赤睡臥不寧診斷指紋青紫浮露舌紅而苔白滑此翁氏所謂頭身灼熱不時發驚搐者痘自心經而出也其痘瘡發熱之際正心火妄動之時切忌舉動匆莽猝作巨聲及其痘發灌膿元氣升浮營血消耗尤宜靜攝否則神不守舍血不循經輕則停漿重則頻頻驚厥最多悶痘此皆看護要言切宜慎重勿執痘前驚者多吉率爾大意焉療法平肝息風透熱發痘痘出則驚搐自止錢氏消毒飲加味處方羚角片五分先煎荊芥穗七分炒牛蒡錢半生甘草二分嫩桑芽一枚淡筍尖一枚次診嬰兒火體胎毒必盛故痘未出之先熱蘊於內內風為外風引動即作驚搐幸而痘出驚止見點徐徐而出既出即長熱緩嗜乳神氣較靜指紋舌質漸淡此為順痘之佳兆但乳孩身小元弱全藉助身中元氣領載充長以化毒為漿魏氏保元湯為君略佐三豆飲以解毒次方黨參尖五分生耆尖五分生西草二分杜赤豆五粒小黑豆五粒生緑豆十粒三診連進兩劑漿貫膿厚蒼老其痘早見者首先結痂毒已外泄元氣內返謹慎護持可無變證惟痂後血液必虛當以甘潤增液資養胃氣為要三方暹燕根四分煎成去渣乘熱沖蔗漿二小匙以代糖效果連服四日諸痘痂靨乾結肌肉完固而痊廉按痘瘡夾驚搐或因風熱所激而發或因心經蘊熱而發其間先發驚而後發痘者此熱在痘而不在心為順先發痘而後發驚者此熱在心而不在痘為逆其大端也就余所驗痘瘡將出驚搐一二次即止者可許為順若驚搐十數次而報點少其痘必密報痘一二日而驚搐不止者其痘多重或短氣如喘或嘔或瀉者最多悶痘未可概以為順此案見點徐徐痘出驚止既出即長長即灌漿一路順風斯無變證案中諄囑病家言言切要方皆輕清靈穩真兒科之三折膿者也疫痘夾疔案嚴繼春住紹興安昌病者徐紹剛君之孫年七歲住本鎮病名疫痘夾疔原因素稟體壯多火適初冬痘疫盛行遂傳染而痘疔併發第二日即延余診證候身發壯熱面赤唇紅兩顴鼻準皆有黑點心神煩躁大叫疼痛手足麻木爪甲色紫痘已見點色多紫赤診斷脈弦緊搏數舌紅且紫間有黑刺此葉氏所謂痘苗已長晝夜煩躁不止者最防隱處發疔也況兩顴有黑點兩腋必有疔準頭有黑點四肢必有疔余已歷驗不爽一經現出則痘毒不能宣發痘瘡不能成漿最為痘證之險候勿謂言之不預焉療法先除疔毒為首要急用銀針刺破四圍以泄毒血後用四聖膏貼患處內服清毒活血湯加減處方紫草錢半生赤芍錢半皂角刺五分銀花二錢炒牛蒡二錢丹皮錢半藏紅花七分蒲公英三錢青連翹三錢白頸蚯蚓三錢先用紫花地丁八錢鮮菊葉梗根一兩燈心三分煎湯代水四聖膏真緑豆粉五分珍珠粉一分羅漢豆四十粒火煅存性血餘炭一分以上四味共研細末以蔥頭和白蜜搗勻成膏塗之再用桑皮紙蓋之次診前於兩腋及兩手臂間見有痘疔各一用挑痘疔法逐一挑破頭面胸前兩手痘已起發惟兩腿之疔各一前雖刺破仍然硬脹手捻有核則疔已成根故其證仍壯熱心尚煩躁大渴唇焦便閉溺澀脘腹腿足痘點隱約舌生芒刺脈弦洪數病勢尚在險途急急內外並治希望由險轉順外用拔疔根法內服歸宗湯加減次方生錦紋三錢鮮生地六錢藏紅花八分紫草錢半小川連七分生石膏八錢研細蜜炙川甲一錢皂角刺七分炒牛蒡二錢乾地龍三錢先用紫花地丁一兩鮮茅根一兩去皮節燈心三分煎湯代水臨服調下犀角粉五分拔疔根法用銀刀從痘疔四邊剖開以小鉗鉗出其形如釘有半寸許長拔去其疔外用山慈菰蜣螂肉各一錢搗爛塗之三診服藥一劑及疔根拔出後痘疔四旁皆起紅色細瘡毒已外泄脘腹兩腿痘已催齊起脹大便紫黑溺赤而利痛止神安舌紅潤紫色退脈雖搏數洪弦已減當以涼血解毒助痘灌漿為正治三方生玳瑁一錢藏紅花五分西紫草一錢銀花錢半活桑蟲三錢鮮生地五錢粉丹皮錢半生赤芍錢半連翹二錢青蔗漿兩瓢分沖四診疊進兩劑先起脹者痘先灌漿漸漸肥滿色多光澤然間有漿行收早或痘根紫豔或痘皮軟薄或血泡夾雜於痘中脘腹尚灼口乾不渴舌色鮮紅脈尚搏數此餘熱尚在血分毒未化盡也議仍仿前法涼血清毒飲加減四方鮮生地四錢蜜銀花錢半真絳通一錢毛西參一錢生白赤芍各錢半青連翹二錢丹皮一錢暹燕根一錢先用鮮茅根一兩去皮生藕肉一兩去皮節兩味煎湯代水五診漿已貫足勢將結痂惟瘢痕乾燥根色紅豔或渴欲飲冷或夜寐不安脈舌如前此尚有餘毒伏熱鬱結於血分也議導赤兼清滋法五方鮮生地六錢漢木通八分濮竹葉錢半銀花露一兩分沖鮮石斛三錢生甘細梢八分燈心三小帚地骨皮露一兩分沖先用鮮茅根二兩去衣甘蔗梢一兩兩味煎湯代水六診疊進三劑瘢轉潤滿色亦紅活痘痂已次序而脫雖腿腳之痂遲落下焦之陰尚未充足然不足慮所幸胃口大開可以育陰潛陽法以滋填之六方大生地四錢山萸肉一錢生龜甲心四錢打生白芍錢半元參三錢淮山藥三錢生打生真珠母四錢打原麥冬一錢先用熟地露八兩地骨皮露八兩代水煎藥效果連服八劑血氣調和陰陽既濟而痊廉按疫痘夾疔通稱痘疔由瘟毒入血血熱毒盛氣血腐壞而成也就余所驗狀有數種有初出紅點漸變黑色其硬如石者此肌肉已敗氣血中虛不能載毒而出反致陷伏也有肌肉微腫狀如堆粟不分顆粒者此氣滯血凝毒氣鬱結也有中心黑陷四畔突起戴漿者此血隨毒走氣不為用也有中心戴漿四畔干陷焦黑者此氣附毒出血不為使也有頭戴白漿自破潰爛者此氣血不充皮膚敗壞也有變為水泡溶易破者此濕火併行氣血不能斂束也有變為血泡色紫易破者此血熱妄行不能自附於氣也有瘡頭針孔漿水自出者此衛氣已敗其液外脫也似此數證於五六日之間但見一證多不可治惟痘疔生髮之初終部位亦要辨明大抵痘初出者痘疔多發於頭面中候出者痘疔多發於胸背勢皆最急末候痘疔多生於手足骨節間者其勢稍緩一疔之外別生小瘡者名曰應候四圍赤腫而不散漫者名曰護場四旁多生小瘡者名曰滿天星有此者緩無此者急疫痘初起或發寒熱或發麻木或嘔吐或煩躁或頭暈眼花或舌硬口乾或手足青黑或心腹脹悶或精神沉困或言語顛倒宜即於偏體尋認凡須發眼耳口鼻肩下兩腋手足甲縫糞門陰戶等處先要留心細看若不早除勢必轉險為逆此案痘疔併發幸生於兩腋四肢尚屬旁枝非頭面胸背要害處可比開拔痘疔後四旁續出紅色細瘡瘟毒半從外泄半從內蘊故初中末三候尚多險象此證正在可順可逆之際非大劑清毒活血涼血攻毒多方急救決難轉險為順似此方方對證精心結撰真治痘疔之佳案也疫痘夾癍案嚴繼春住紹興安昌病者漏嘯貌之郎年七歲住遺風病名疫痘夾癍原因素稟體強質實去年冬痘疫盛行適感冬溫而暴發至第二日始延余診證候痘瘡見點出而不透壯熱煩躁晝夜不止口渴引飲目睛呆瞪眼白紅絲五心如烙痘癍間雜便閉溺赤診斷脈右洪盛搏數左徑數而駛舌紫赤有朱點此心經血熱挾胃經梟毒暴發於肌表所慮者紫癍漸起痘反隱伏已現悶陷之逆候幸而天稟茁實竭力挽救或可轉危為安療法大劑清營托痘透毒提癍使血分轉出氣分痘能發透癍亦自化犀角大青合麻杏甘膏湯加味處方犀角尖五分磨汁鮮大青五錢焦山梔三錢淡香豉二錢生甘草四分生石膏八錢杵光杏仁錢半淨麻黃四分陳金汁二兩鮮地龍汁兩瓢同沖先用鮮茅根二兩鮮青箬五錢冬筍尖五個切碎三味煎湯代水次診前於大劑涼血透毒之中反佐以一味麻黃直達橫開互相救濟疊進兩劑頭煎果能痘癍齊發形圓而綻色亦鮮紅間有紫陷痘毒尚有蘊伏便仍閉溺仍赤澀幸而脈雖搏數駛象已無舌雖紫赤朱點已隱病勢漸有轉機議以涼血解毒使痘易長而貫漿次方鮮生地五錢藏紅花八分紫草二錢銀花錢半桔梗一錢生西草四分青連翹三錢制殭蠶錢半活桑蟲三錢陳金汁二兩沖緑豆清煎藥三診前用伍氏涼血解毒湯加金汁善泄血中濁氣桑蟲最能清血催漿連服兩劑根盤即化一線圈紅緊附頂滿滾圓紫陷已起清漿亦見便通溺利神靜喜寐脈圓舌紅漸淡此為血毒已化之佳兆當轉機清滋氣液使血活灌膿而成漿自易也參燕異功煎加減三方真西參一錢光暹燕八分細生地三錢藏紅花三分紫草八分川芎五分生西草三分炙甘草三分生糯米五十粒乾荷葉包煎四診連服兩劑漿已貫足脈靜神安胃動喜食二便均調雖有虛熱但宜扶正正足則虛熱自平八珍湯加減以善後四方潞黨參錢半光暹燕一錢浙茯苓錢半炙西草五分白歸身錢半細生地三錢生白芍錢半淮山藥三錢小津棗三枚金橘脯一枚切片五診膿窠已結胃氣亦健別無他證略有餘熱脈軟微數舌淡少津但宜調養脾胃以復元金匱麥門冬湯加減五方鮮石斛二錢北沙參三錢提麥冬錢半炙西草四分生於術八分生白芍錢半蘋果片三錢甜石榴四十粒效果疊進四劑而痊廉按痘點初出皮肉紅腫片片如錦紋者此痘內夾癍也皆由瘟毒入血血熱毒盛乘其痘毒之熱而發為癍紅癍易退紫癍稍難藍癍黑癍則不治就余所驗服藥後其癍漸退痘粒堅實者吉否則皮膚癍爛痘易瘙癢皮嫩易破者凶如紫癍成塊其肉浮腫結硬者又名瘤其血瘀實其毒最酷痘未發齊而癍先爛者證多不治此案初方於大劑涼血透毒之中反佐以一味麻黃橫開腠理迅達皮膚使瘟毒從表排泄則痘易於起齊而癍亦隨之退化最為對證發藥之妙法第二方涼血解毒亦不可緩一俟癍退血附毒化痘齊則血中之氣液必虧即轉機而清滋氣液助痘咸漿托漿貫膿亦屬適當之方法處方用藥井井有條似此驗案洵堪為後學師範痘夾癍疹案嚴繼春住紹興安昌病者沈仁齊先生郎年二歲尚吃乳住本鎮沈家病名痘夾癍疹原因素稟火體適深秋天氣溫燥天花盛行遂傳染而痘夾癍疹併發第二日即延豫診證候壯熱多啼煩躁不寧面赤目紅咋唇弄舌痘雖發現一片紅點癍疹錯雜殊難分辨形同攢簇又類堆聚診斷指紋青紫浮露舌紅苔白兼有朱點豫斷之曰此夾疹挾癍險中逆痘由乳孩身小元弱表氣虛而時毒重一齊奔潰而出最怕不能上漿急則驟變癢塌緩則成為潰爛勿謂言之不預焉療法涼血消毒透解癍疹為首要使疹透癍化則痘可陸續發出千金犀角地黃湯加減處方黑犀角三分先煎鮮生地三錢銀花一錢淨蟬衣七隻皂角針五分羚角片五分先煎粉丹皮八分連翹錢半牛蒡子錢半白頸蚯蚓三錢先用鮮茅根五錢紫花地丁四錢青箬尖三錢煎湯代水臨服調服三酥餅一分次診一劑後症狀脈舌如前病勢既不進行亦不退化皆由梟毒把持亢陽太盛可知便已三日不通溺短赤澀由熱熬乾血液後恐不能上漿深為可慮翁氏曰堆聚攢簇者必用攻姑遵其法以消息之次方前方去鮮地丹皮加光桃仁五粒酒洗生錦紋錢半三診連進兩劑頭煎大便紫赤帶黑疹透癍化攢簇盡散痘已陸續起發或裡外肥紅或外黑裡赤甚或外白里黑形色不一證尚弄口咂唇唇舌色絳指紋仍紫而滯心火太重猶是血熱毒盛之險候病勢方張切宜慎重且與大劑涼血敗毒毒化則痘易長而灌漿三方犀角尖五分磨沖鮮生地三錢銀花錢半鮮大青三錢桔梗八分羚角片八分先煎老紫草一錢連翹錢半白頸蚯蚓三錢甘草三分生用豬尾膏一小匙藥湯調下四診一劑後大便又下初則紫黑繼如紅漿咂唇弄舌已除神寧喜寐較昨日雖有起色然痘色紫紅而滯根松殼薄面赤唇紅指紋鮮紅而紫此血分尚有蘊毒姑用前法參以活血提頂四方前方去犀羚豬尾膏加生玳瑁錢半紫花地丁二錢三妙血雞冠血三滴豬尾血一小匙活地龍汁一小瓢梅冰一釐和勻同沖一服五診進一劑後險中逆痘頭面起發而色鮮周身色淡險而逆者漸轉順境現有行漿之勢乘此氣血用事之機會一以保和元氣助疫貫漿為主活血解毒佐之五方潞黨參一錢炙生甘草各三分藏紅花四分桔梗七分麻菰三分生綿耆一錢細生地二錢暹燕根一錢生糯米五十粒鮮茅根三錢六診痘雖貫漿漿行薄弱腰下多未結痂便溏溺利面唇色淡指紋已隱此皆兒小元弱之確徵議用回漿飲加減助其收結六方老東參一錢清炙耆一錢炒於朮一錢浙茯苓一錢嫩閩姜四分淮山藥二錢生打南芡實二錢炒白芍一錢清炙草四分小津棗三枚七診連進三劑漿足色蒼形勢圓綻四肢陸續貫漿皮膚捫之平和不冷亦不過熱大勢已有成功之象但大便略滯口舌略干吮乳不休此係元氣雖復津液尚虧當用氣液雙補參燕冰糖飲以善後七方潞黨參一錢光暹燕一錢奎冰糖一錢效果連服八日結痂落靨喜笑活潑而痊廉按凡看痘證專科皆謂先疏後密者輕而多順先密後疏者重而多逆然亦有辨如輕性痘證作三四次出大小不一等先似疏而後漸密此順證也結果多吉若初出時只見面上胸前有三五處顆粒模糊根腳腫硬待至起發則一齊湧出故先疏而後尤密此逆證也結果多凶至若先密後疏形同攢簇者就豫所驗夾癍夾疹者多其初出也看之一片紅點癍疹相雜臨證時頗難診斷至起發時癍疹盡散惟痘獨在故先似密而後實疏不比真正堆聚攢簇之怪痘如遊蠶燕窩雁行鼠跡蟹爪鳥跡蛇皮蟢窩螺疔珠殼疊錢紫背履底環珠覆釜兩截矇頭托腮鎖口鎖唇鎖項鎖喉抱鬢披肩攢背蒙骫咽關攢胸囊腹纏腰抱膝鱗生囊球等為數大惡證治之無益徒招怨尤此案初診即斷其為夾疹挾癍首用透解癍疹固已扼其首要以後多方救濟或涼血攻毒或活血提頂或涼血解毒皆治血熱疫痘初中期間之必要自中以後至末期始轉機而用補法亦屬一定之步驟痘夾喉痧案嚴繼春住紹興安昌病者陸世貴君之女年九歲住山頭村病名痘夾喉痧原因去冬瘟毒盛行或發疫痘或發疫瘄或發喉痧此女素稟火體一染疫而痘夾喉痧併發第二日即延豫及傳醫會診證候身發壯熱二日見點痘形不大頂圓而平狀類水痘根反甚紅不止一線中夾細小如粟瑣碎如沙喉痛紅腫湯水難咽氣粗而逆診斷脈浮洪滑數兩寸獨大舌尖邊紅苔黃而糙豫斷之曰此痘夾喉痧之險證醫宗金鑑所謂痧亦熱毒所發往往夾痘而出也幸而尚未夾否則喉爛而腐矣惟傳醫謂痘毒攻喉心胃熱盛上衝於肺喉屬肺系之口故首當其衝世翁無所可否一無主張療法豫謂痘初起時即見痧者莫妙於先用透托既可托痘又兼透痧痧透而痘能起脹且使疫毒外達而喉痛自輕世弟傳醫亦贊成之獨方藥則意見各殊傳則主甘桔湯加射干牛蒡銀花連翹三豆飲代水煎藥豫開麻杏甘膏湯加翹蒡蟬退重樓為主世翁謂明日再當奉請而別處方帶節麻黃四分光杏仁錢半青連翹錢半炒牛蒡錢半生石膏八錢研細生西草三分粉重樓錢半淨蟬衣十隻水楊柳葉錢半外用冰硼散吹喉傳方生甘草三分苦桔梗八分射干八分炒牛蒡錢半金銀花錢半青連翹錢半三豆飲一兩代水煎藥次診第三日復診知病者先服傳劑繼服豫方痧雖滿布痘未出齊咽喉尚痛咳痰氣急聲音不清壯熱煩渴胸悶便閉脈舌如前此痧雖外達而痘毒上壅於肺也病勢正在險途議以翁氏清金攻毒飲加減次方生石膏八錢研細炒牛蒡錢半前胡錢半淨蟬衣十隻生錦紋錢半切絲用薄荷湯浸取黃汁沖生枳殼一錢制殭蠶半錢粉重樓二錢先用鮮茅根二兩去衣青箬尖五錢燈心一分煎湯代水三診第四日會診知病家除去生軍自以陳金汁二兩代之服一劑而痰喘如前便亦不通咽喉干痛黏涎滿口水穀不入呼吸困難勢將潰爛豫曰勢急矣議先用外治法俟痰涎瘀濁掃除乃可進藥稍一遲誤大事去矣方以急攻瘟毒為主順氣開痰藥佐之藍真人六一換花煎加減三方犀角尖五分另煎沖紫草錢半栝蔞仁五錢杵紫菀二錢羚角片一錢另煎沖丹皮一錢牛蒡子二錢杵前胡二錢生桑皮三錢生甘節一錢青連翹三錢川貝母錢半去心先用生蘿蔔汁兩茶鍾淨白蜜一調羹開水沖兩湯碗代水煎藥附外治法首用開水一湯碗生桐油半瓢先以筷掉撥繼用鵝毛一根蘸浮面桐油探喉以攪去痰涎終則蘸鮮杜牛膝汁掃喉以除去瘀濁俟痰涎瘀濁掃除後再用瓜霜紫雪化水以漱喉乃可進藥四診第五日會診痰涎已除喉痛輕減大便亦通氣急亦平痘漸起脹惟白似水痘此因痧出太多耗去血液使然議以助血灌漿為君兼理肺氣肺氣一清則瘟毒自徹於上矣四方毛西參一錢鮮生地五錢拌搗淡香豉一錢炒牛蒡錢半桔梗八分暹燕根一錢全當歸一錢藏紅花四分淨蟬衣七隻制殭蠶錢半先用鮮茅根二兩去衣青箬尖五錢煎湯代水五診第六日復診膿貫而平薄氣不充也點紅而不澤血毒不清也此尚屬氣虛毒盛之候幸而胃動喜食神氣清寧議用藍真人驅熱回生散使氣不燥而血以清則痘先起脹者先灌漿自頭面以及周身庶幾至八九日漿老則蒼色如黃蠟而顯結痂之形矣五方潞黨參一錢鮮生地四錢元參一錢青子芩五分酒炒白桔梗七分生綿耆一錢當歸錢半丹皮七分小川連五分酒炒生甘草四分六診第八日復診前方連服兩劑漿雖灌足而色有蒼有不蒼痘漸結痂而靨或脫或不脫是為收靨之險證幸而飲食強健二便調和自能化險為順不必過慮也議用參耆回漿飲助其收靨以善後六方潞黨參錢半生於術一錢制首烏二錢生白芍一錢炒白芍一錢清炙耆錢半清炙草五分浙茯苓錢半廣皮五分效果連服四劑靨已收結漸次脫落而痊廉按黃帝逸典曰痘有別物乎氣血中六淫之毒也治痘有別法乎消解六淫之毒保全其氣血也藍采和真人云凡除六淫之疫毒必先審其一歲中暴戾之氣始則潰其大勢繼則散其應援終則盡其餘黨除疫痘之法盡矣故痘於將出未出之際與以六一換花煎隨六淫之毒而出入加減則毒勢散而不見若過時餘毒復作再以六一換花煎加減服之又過時恐毒不盡更服之服至三次則毒無不盡毒既盡則痘有不順者乎此案轉險為順全賴六一換花煎加減蓋痘疫之為病多由火而發六氣之中暑燥火居其三風濕居其二寒居其一故治疫痘者多以此等方藥取效者良有以也雖然痘雖火毒居多而虛實異稟則攻補異宜又多兼雜感亦不可偏拘清涼之一說也疫痘夾疳案嚴繼春住紹興安昌病者王玉安先生孫女年七歲住本鎮三板橋病名疫痘夾疳原因素患疳積適染時疫而發痘其父亦業兒科曾進升麻葛根湯加蟬蠶蒡翹兩劑因病勢頗險第三日邀豫會診時正二月中旬也證候蒸熱煩渴面黃頰赤肢細腹大口生疳蝕痘雖齊發而多不起脹且多血泡間有水泡心神躁擾晝夜不安診斷脈浮洪搏數舌純紅無苔此血熱毒盛銷爍氣液況患疳者氣液素虧既不起脹焉能灌漿乃險中之逆證惟且敬謝不敏而已其父謂痘科書中雲素有疳而患痘者痘多無恙蓋胎毒從久病而化肌腠由疳熱而鬆且兒既黃瘦必骨徑筋強腎元多實他疾雖多而於痘瘡則恆多無苦也豫曰此但就濕熱蟲積肥熱疳之有餘者而言若脾胃氣液兩虧之虛疳又當別論其父乃滿面憂容謂同業三分親務托盡心力而挽救之豫一再躊躇曰證雖犯逆幸而胃健善食破格出奇以制勝或有挽回之希望療法起脹之由必氣先至而血乃行火上蒸而水乃騰藍真人曰血少益氣血乾滋氣故以吉林參潞黨參為君又曰血熱清氣血滯通氣故以真西參蘇丹參為臣然必佐以雞冠血之溫蒸提頂豬尾血蚯蚓血之活血透毒庶痘可起脹而灌漿使以提清雞湯者大滋氣液以托漿也處方吉林參一錢真西參錢半雞冠血十滴蚯蚓血一瓢潞黨參錢半蘇丹參錢半豬尾血一瓢用棉紙濾清和梅冰少許三妙血和勻同沖先用提清雞湯兩碗代水煎藥次診一劑後痘已漸次起脹清漿如露二劑後漸次灌漿漿如蠟色或如茶色濃厚豫曰奇哉何藥之神應如斯耶其父喜形於色謂方奇特奏效當然奇特豫曰效不更方囑仍服原方去雞冠血豬尾血加生耆尖錢半暹燕窩二錢再進一劑消息其有否變端三診痘將結痂忽起口臭齦腫牙隨齒疼神煩啼哭口渴引飲大便閉溺如米泔此痘後牙疳也乃素有疳積之餘毒上攻牙齒而然豫已早料及此故前方去溫蒸血氣之雞冠血幸未色黑腐爛諒不致牙齒脫落穿腮破頰蝕唇透鼻然必急急救療以免轉險為逆內服清毒涼血飲以瀉火而攻毒外敷人中白散以消疳而保齒三方尿浸石膏四錢知母三錢鮮生地五錢生赤芍錢半胡連四分酒洗生川軍錢半連翹二錢粉丹皮錢半人中白三分生甘草四分外治方人中白二錢煅制硼砂一錢上青黛一錢兒茶一錢腰黃八分頭梅冰四分共為細末搽敷患處四診大便兩次色紅帶黑牙宣齒痛煩熱等證已除胃健喜食舌潤淡紅脈轉虛數法當補氣生津養胃陰而解餘毒四方北沙參三錢生玉竹錢半蜜銀花錢半生西草四分原麥冬錢半甘蔗漿一大瓢分沖五診今已回漿十分全功惟痂癢便溏脈虛不數法當補氣以實脾仿錢氏參苓白朮散加減以善其後五方米炒黨參錢半浙茯苓三錢廣木香四分五穀蟲三錢生炒於朮各一錢清炙草五分生苡仁三錢炒廣皮五分效果連服四劑諸證皆愈後用飲食調補恢復原狀說明此病告痊其父虛心請益豫謂醫貴實學尤貴實驗自問數十年來於疫痘甘苦備嘗姑以一得之見為吾兄略言其要一首辨疫痘形色痘瘡吉凶全在形色始出之形尖圓堅厚起壯之形發榮滋長成漿之形飽滿充足收靨之形斂束完固與水珠光澤者皆為正形或平或陷形之變也若初出之時隱如蚊蚤之跡空若蠶種之脫薄如麩片密似針頭如熱之痱如寒之粟者必不能起發而死黏聚模糊肌肉虛浮溶軟嫩薄皮膚潰爛者必不能收靨而死痘之色喜鮮明而惡昏暗喜潤澤而惡乾枯喜蒼蠟而惡嬌嫩紅不欲豔豔則易破白不欲灰灰則難靨由紅而白白而黃黃而黑者此始終次第漸變之正色若出形而帶紫起發而灰白色之變也至於根欲其活窠欲其起腳欲其固地欲其寬四者俱順痘雖重而無慮四者俱逆痘雖輕而必險然形色為氣血之標氣血乃形色之本氣盛則痘窠圓滿而周淨氣虛則頂陷氣散則窠塌亦有氣虛極而不塌陷者乃火載之故外狀雖見圓滿實空殼如水泡血盛則痘窠光明而紅活血虛則暈淡血憊則暈結亦有血虛極而外面猶紅者乃火浮之故外狀雖見圓暈實枯槁而不潤澤至於形色相較寧可形平塌而色紅活不可形光圓而色晦滯寧可有色無形不可有形無色蓋形屬乎氣氣可旺於斯須色屬乎血補血難圓速效也二辨疫痘部位痘瘡為陽毒諸陽皆聚於面吉凶善惡但以面之部位占之即可概其餘額屬心火如印堂以上髮際以下橫兩日月角位先見點先作漿先結靨者為惡候蓋心為君主毒發於心故先見其位君危則十二官皆危故凶左臉屬肝木右臉屬肺金如兩臉先見紅點磊落者吉如相聚作塊其肉腫硬者死蓋肝藏魄肺藏魄生意既絶魂魄將離故不治頦屬腎水承漿橫抵兩頤先見紅點先發先靨者吉此位雖屬腎然三陰三陽之脈皆聚於此陰陽和故可治鼻屬脾土若準頭先出先靨者凶蓋四臟稟命於脾土敗則四臟相隨而敗必綿延日久而死腎之竅在耳又心開竅於耳心腎皆少陰君火又少陽相火之脈行耳之前後凡在耳輪先見紅點者凶蓋君相二火用事則燔灼之勢難以撲滅惟口唇四圍先出先起先靨者吉因陽明之脈挾口環唇胃與大腸主之無物不受故也一說前法亦時有不應大抵從正額間及兩顴先見者多順人中口鼻先見者多險或口唇目胞預為浮腫者此脾胃受毒尤險太陽頤頰腮耳先見者多逆其不能先見於上而反見於下部者此元氣不振起漿收靨亦同凡初見點於正面吉部相去一二寸一顆尖細淡淡桃紅色者其痘必稀而輕若初見於正面凶部二三相併五六成叢或赤或白頂平而少神者其痘必密而重三辨痘疫傳變日期痘非有外氣來召則不出所召或非其類亦不出出而不能逐去其毒人即不生欲逐其毒悉由氣血固托元陽蒸化氣血不能出自一經心以供血初傳在心肝以納之血足實綻二傳在肝肺以供氣氣到泛白三傳在肺腎以納之腎伏真火上蒸於脾四傳在腎脾得真火生氣化血各經之東道主人故五傳到脾而功成循環無端缺一不可傳經訣自見點時算起歷一周有半是也見點一日半共十八時心經主事第二日下半日與三日十八時肝經主事起脹一日半共十八時肺經主事第二日下半日與第三日十八時腎經主事貫膿一日半共十八時脾經主事初傳一遍矣其貫膿第二日下半日與三日十八時心經主事回靨一日半共十八時肝經主事第二日下半日與第三日十八時肺經主事結痂一日半共十八時腎經主事第二日下半日與第三日十八時脾經主事凡傳兩遍方畢惟各經之用有時有日何經先到何經後接相連不絶危而後安離而復合若或離絶橋斷船敗陷溺可必所以輕重不均吉凶不一此傳經之言要妙微密時者十八時也日者一周半也先後者氣血之程途也到與接者經之傳也不絶者各經用命也危而後安者氣血之應也離而復合者毒之化也心到而肝不應則不高聳肝到而肺不應則不橫鋪肺到而腎不應則乾枯或抬空亮腎到而脾不應則氣血無來路而諸證蜂起矣各經互用變化相連毒無所容必至消化七日有零而復一經有疵氣血至此而敗絶毒至此而得反攻不亡何待能明乎此思過半矣此就急性疫痘而言若慢性疫痘發熱三日而後見標出齊三日而後起脹蒸長三日而後貫膿漿滿三日而後收靨發熱之初耳尻中指俱冷耳後起紅絲呵缺噴嚏眼目困倦兩顴之間有花紋見者預知其為痘也四辨疫痘用藥宜忌活血宜紫草紅花惟見點紅甚或便滑者忌山楂散血消積胃虛不能食則忌甘草解毒和中中滿則忌陳皮健脾行氣自汗則忌大腹皮利水治脹發散則忌牛蒡子疏風潤色滑竅通肌泄瀉則忌木通疏利膀胱溺多則忌訶子烏梅止瀉渴斂汗便實則忌人參白朮扶元益胃血燥毒盛則忌升麻葛根升發開提痘密汗多毒盛裡實則忌羌活白芷敗毒追膿氣虛則忌當歸川芎活血補血血熱痘爛則忌芍藥地黃涼血助陰血寒不發則忌辰砂定神除熱卻煩灰白不發則忌糯米暖胃實脾氣滯則忌防風散風解熱氣喘則忌木香調氣散寒止腹痛瀉青斑黑燥渴則忌厚朴溫胃寬脹煩渴則忌細辛發散上行通肺燥熱則忌柴胡發表透熱氣升則忌前胡除痰治嗽便泄則忌半夏消痰止嗽燥渴則忌麻黃紫蘇散表逐寒表虛則忌生薑肉桂助胃溫中血熱妄行乾紅焦紫則忌附子回陽補元治虛寒厥冷煩亂則忌大黃蕩滌實熱胃虛食少則忌人牙起發腎邪陷伏血熱毒陷則忌山梔降火下行氣虛便溏則忌犀角涼血止衄時值行漿則忌牡丹皮行血歸經痘前多汗則忌肉豆蔻健脾止瀉便實則忌桔梗開鬱發導瀉下則忌蟬蛻驅風散毒表虛汗脫則忌枳殼寬胸下氣氣虛下陷則忌胡荽乳香焚之開竅血熱毒盛煩渴衄汗則忌黃耆能密腠痘未出齊則忌五辨疫痘看護宜忌痘瘡自初出至收靨時臟腑俱虛外邪易觸飲食易傷凡起居飲食服藥皆宜注意一嚴冬多設炭火盛暑多置冰水務使室中寒暖和勻臥處最要無風又要通明忌暗常令親人看守夜中燈火莫離若遇烈風迅雷暴雨之變更當謹慎幃幕潔被服除穢氣忌見僧道師巫孝服孕婦生人六畜掃地梳頭等事忌觸油漆氣燒頭髮氣吹滅燈燭氣熏抹瘡藥氣硫磺腦麝諸香氣韭蒜糞穢諸濁氣魚腥煎炒諸油氣房中淫液氣婦人月經氣狐臭氣諸瘡腥臭氣死人尸厭氣忌聞哭泣詈罵呼怒歌樂及鑼鈸金器之聲忌洗面恐生水入瘡而釀他證生水入目而成眼患眼鼻部之痘痂不可動恐有眼吊鼻齆之患愈後行坐勿太早恐成腰痠腳痛之痼疾二痘初起時宜食筍尖雞腦雞冠飯內煮肉酒釀桑蟲能食者與鯽魚白鯗之類脾胃弱者筍尖鮮魚皆不宜食至釀膿時宜食鵝尾肉雄雞頭煮爛蓮肉棗子年深醃肉圓眼肉白黏米粥嫩羊汁頂大桑蟲及收靨時惟宜清淡忌食毒物始終忌食蔥蒜韭薤茄子栗子螃蟹鮮魚蜜浸椒辣時果圓蛤雞鵝雞子糕粽醋醬酒糟鮮豬肉及豬之心腎血髓肝腸等物小米麥面火酒瓜柿梨杏櫻桃荸薺荔枝橘子之類犯之則有伏匿焦紫喘脹聲瘖之患誤食糖霜則多發疳蝕六辨疫痘應用書籍學說惟黃帝逸典最為高古唐藍采和真人注自序謂立功人寰莫如醫藥乃注此書而附撰藥性藥方於後藥性兼及構造之原理藥方兼及配合之方法可為治痘之綱要看法惟翁仲仁痘疹金鏡録最為精確其書總括痘疹之病源治法及處方頗為簡明且無偏於寒熱攻補之弊吳鞠通贊為痘科寶筏其妙處全在於看認證確實治之自效初學必須先熟讀其書而後歷求諸家方不誤事故今之研究痘疹者多以此為入門之書而俞茂鯤撰痘科金鏡賦集解取翁仲仁賦十一篇加以注釋亦不可不參看也又次葉天士幼科痘疹要略其看法有補翁仲仁不及之條治法則參考諸家廣收衆法集前哲之長而融化之徐靈胎贊為不僅名家可稱大家良有以也陸履安謂葉氏治痘夙稱神奇觀其案中寒熱攻補不膠於一見如毒火深伏氣血壅遏者藉芳香以搜逐用紫雪丹氣滯血凝毒重火伏者以酒大黃石膏青皮桃仁荊芥犀角豬尾血之類主治肝肺毒火不宣氣血有焦燔之勢者用犀角羚羊紫草丹皮石膏鮮生地之類元氣不支陽虛內陷而見灰白濕爛泄瀉嘔惡等證者用辛香溫煦如陳文仲之法為要氣血極虛而漿清塌癢全無實證相兼者當峻補氣血用參歸鹿茸湯及坎氣湯之類氣虛莫外乎保元及四君子血虛不離於四物及補血湯又於氣虛血熱者補氣之中兼涼血血虛氣滯者補血之中佐辛香用攻法須分部位經絡用補法當辨寒熱燥濕過清則有冰伏之慮偏熱則有液涸之虞此皆先生採擇先賢之法因人見證而施治可謂善法古者矣近世小兒痘疹多挾熱疫時氣而發故費建中救偏瑣言法多中肯必勝湯一方金鑑痘疹心法要訣每採用之以救非常之怪痘厥功偉矣葉氏痘疹要略云近世布痘每盛發於君相風木燥金司令蓋非火不發也火鬱發之升陽散火是已但前證若裡熱甚重煎灼脂液苟非苦寒下奪佐以升表不能用也費建中方頗為中的妙在寒涼清火解毒必佐活血疏暢預防其凝滯氣血也乃後人不察訾其偏任寒涼蓋未知痘疫之同於熱疫也審其為熱疫必宗其法又可曾亦論及近惟王清任知之即麻疹亦多因熱疫之氣而發故治法亦與溫疫相埒習幼科者於溫熱暑疫諸證因不可不細心研究也總之書不在多在乎精苟能於此四種明辨篤行融會貫通則於痘疫已得其要矣今承下問容敢實告願與吾兄一商榷之廉按疫痘夾疳較尋常痘疫為難治以其實中夾虛虛中夾實也況痘已發齊多不起脹正聶久吾所謂出齊後當起脹而不起脹則漿不行而五陷之症作矣所謂五陷者如痘稠密暈紅紫而頂陷下紫陷也甚則暈腳乾枯中有黑臍而成黑陷此毒熱熾盛蔽其氣凝其血而陷也若痘出稠密色淡白根無紅暈而頑陷者白陷也甚則遲一二日轉為灰陷此血氣虛寒不能運化毒氣以成漿故陷也又有一種痘顆粒通紅成血泡而不成漿此氣虛不能統血而血反上居氣位也血泡失治則氣愈虛而為血陷此案實為血陷之證初方出奇制勝妙在三血合用雞冠居至高之分取其陽氣充足痘頂不起者須此透發但系盛陽之品故加豕蚓等血為佐豕陰畜尾又居至陰凡血皆熱惟此清涼尾善動故尤活血地龍善竄活血通經能引諸藥直破惡毒所聚之處且雞冠提漿升表治上豬尾性動入里治下二者更有上下表里兼顧之妙服後速奏特效洵非虛誇逮至漿足結痂忽發牙疳雖屬應有之變證而內服外敷二方尤為中的案後說明足見學有心得證多經驗非老成練達者不能道至若應用書籍如上述四種外又有祝氏痘科良方簡當切用後之學者不可不瀏覽也天痘夾癰案陳務齊住梧州四方井街病者陳火土年四歲住廣西容縣病名天痘夾癰原因素因胎毒未清食乳不潔乳母常抱腫黃之疾濕濁遺傳常發疥瘡誘因天花痘流行斃者甚衆空氣不潔口鼻吸受直接傳染證候全體發熱二三日發現痘粒遍體再二三日則現結板凹陷形似蜂窩黑暗干殼數日無運水漿全體大熱煩躁渴飲氣粗喘逆人事昏迷譫語手左右曲池足膝左右及胸背起癰十餘枚大如桃子黑暗堅硬診斷左右脈浮數無力脈證合參定為錫版蜂窩痘兼痘癰證也由痘疫微菌飛揚口鼻吸受直接傳染直中血分與胎毒連合急走皮膚發泄泡粒時中氣虛弱不能運漿灌膿而毒內陷蘊聚經絡流於骨節之間發而成癰前醫以托裡透膿不獨不效反至燥渴神昏譫語而痘轉黑黯骨節起癰勢成危急不治之證病家懇求甚切不得已勉為設法療法湯劑用敗毒飲子加減取生地紅花赤芍涼血生新為君黃連犀角羚角蓮心清心肝火為臣銀花牛蒡連翹敗毒去瘀為佐升麻粉葛木通升發疏通為使接連二服並用錫器煎水洗後譫語己除人事已醒體熱已退渴飲已止痘新不黑起而不陷診脈左右緩弱又用保元湯加減取其補氣升提活血生新運脾和胃托裡運漿連三服後痘已運漿起頂由首至足逐漸成熟又用胃脾湯加減取其益脾和胃安心寧神活血補氣一連數服逐漸結痂惟左右手曲池並膝背胸之癰未散又用八珍湯加減取其托裡透膿活血補氣連十餘服後而癰己潰破流膿水腥臭異常又用外洗茶甘敗毒湯則膿水己淨惟癰潰深七八分難已結痂又用十全大補湯取其大補氣血生長肌肉然後月餘始得肌肉結合數月方能步履如常處方敗毒飲子加減方生地黃三錢西紅花錢半赤芍錢半川黃連錢半連翹二錢羚羊角一錢蓮子心三錢銀花二錢牛蒡子三錢升麻五分犀角尖七分磨粉葛根一錢木通七分煎服又方保元湯加減方東洋參三錢貢白木二錢當歸身三錢生黃耆三錢生甘錢半紫草茸錢半金山蝦五錢大黃豆六錢雲茯苓二錢紅花七分又方胃脾湯方貢白朮錢半遠志肉錢半酸棗仁一錢破麥冬二錢五味子錢半白歸身錢半東洋參二錢北沙參錢半辰茯神三錢粉甘草一錢廣陳皮七分又方八珍湯加減方當歸身二錢生白芍二錢生地黃四錢川芎藭一錢大防黨四錢貢白朮二錢雲茯苓三錢粉甘草一錢川貝母二錢酸棗仁一錢煎服後去川貝棗仁加黃耆肉桂即十全大補湯又方外洗茶甘敗毒湯當歸身三錢銀花蕊四錢陳茶葉三錢粉甘草四錢紫草茸三錢五倍子三錢片紅花二錢煎湯洗效果五日全體痘新不黑起頂不陷十日結痂三十日痘癰膿水已淨四十日結痂食量已進三月步履如常元氣復舊廉按痘髮夾疹者毒輕夾斑者毒重夾疔癰者毒尤重此案痘瘡併發氣血交蒸方用敗毒飲子清營活血宣氣透肌解毒五者兼用使熱毒得伸越而達表則內外有所分消不致蹈陷痘悶痘之險然猶恐四歲孩兒氣血不足升散太過或成表虛清涼太峻或成冰硬故接方即改用保元湯加減助氣和血以痘之始終全憑氣血為之主也其餘兩方亦皆穩切非於痘科多所實驗者不辦痘毒攻心案車伯鴻住汕頭仁安里病者溫和德年歲半暹羅圖書印務公司溫士貞之子住行街德鄰里病名痘毒攻心原因孩體壯盛感染痘疫前醫溫補太過致痘瘡黑陷毒氣攻心證候痘頂黑陷額上痘爛失音不乳咳喘腹瀉咬牙寒戰已危在旦夕診斷額為心陽痘毒攻心故額上痘瘡爛失音不乳因痘毒停蓄肺間炎火衝上閉塞咽喉不能納乳甚至失音肺氣不能下達胃中又有瘡腐爛故便下黑豆汁本屬不治之證病家再三哀求因血心想救治法療法患者危在萬分若用煎劑緩不濟急且散又不能下因想得一法急用熊膽濃液以解心毒而止便瀉繼則以透解血毒清肺化痰之品處方真金絲熊膽二分汽水小半杯以清潔指頭乳融為液初方黑犀角三分桔梗三分生甘草一錢葶藶子錢半杏仁一錢連心麥冬一錢射干錢半牛蒡錢半當歸尾六分童便一鍾沖蓮子心念支次方羚羊角三分瓜蔞皮錢半麥冬一錢花粉錢半桔梗五分生甘草一錢牛蒡子錢半歸尾六分赤芍七分三方北沙參三錢阿膠珠八分雲茯苓錢半川貝母一錢陳皮五分甜桔梗五分炙甘草五分效果熊膽汁入即吐熱痰半碗聲出再灌二次思乳瀉止服後列數方各二帖而愈迄今該兒健壯痘痕亦少無麻子相其父在暹感余勞由暹寄回兒科聖手匾贈余廉按痘毒攻心十難救一今現此案血熱太盛上蒸心肺故用苦寒咸降清營解毒而幸全非真痘毒直攻心藏也然歲半嬰兒得此危證不救者多勿謂此法定能獲效焉時疫水痘案何拯華住紹興同善局病者蔣四九年二十一歲業商住本城南街病名時疫水痘原因初夏濕熱當令水痘盛行感染風熱而發證候初起見點狀如真痘相似尖圓而大內含清水身熱二三日而出面赤唇紅眼光如水噴嚏咳嗽涕唾稠黏診斷脈右軟滯左浮弦數舌尖邊紅苔膩微黃此時行水痘也發於脾肺二經由濕熱醞釀而成感風逗引而外發也療法先與疏風化濕以透發之荊防敗毒散加減處方荊芥錢半川芎五分羌活七分浙苓皮錢半桔梗八分防風一錢枳殼一錢白芷八分新會皮八分生甘草四分次診一劑即遍身起脹但不灌漿亦不作膿身熱已輕面唇淡紅惟咳嗽痰多口膩胃鈍四肢倦怠脈右仍滯舌紅苔黃膩此風邪去而濕熱尚盛也治以辛淡芳透吳氏四苓湯加味次方赤苓三錢澤瀉錢半光杏仁三錢竹瀝半夏三錢前胡錢半豬苓二錢廣皮錢半生苡仁四錢絲通草一錢桔梗八分三診二劑後身熱已除痰嗽亦減胃動思食大便通暢惟心煩少寐溺短赤澀舌紅苔薄脈轉沉數左尺尤甚此痰濕輕而伏熱獨重也治以清心利溺導赤散加減三方鮮生地四錢漢木通一錢赤苓三錢淡竹葉錢半小青皮六分小川連六分生甘草細梢七分滑石四錢包煎焦山梔二錢燈心二分效果連服二劑神安溺利後以飲食調養而痊廉按時行水痘西醫謂之假痘與真痘似同實異往往但為水疱而不成膿疱其熱度於痘發之時即降為常溫不再升騰痘疱亦早就干固不復有瘢痕之遺留痘瘡之中凡屬假痘其預後必良若已種牛痘者縱罹本證亦惟發假痘最多發真痘甚少故痘疫之預防法以種牛痘為必要此案敘證清切治法恰當方亦輕穩妊痘案孫少培住南京倉巷病者前清候補道陳公子聲之次媳年十七歲住南京湘軍公所病名妊婦痘原因新婚後月事愆期未至忽發熱腰腹痛前醫以停經兼感冒治乃病未輕減而痘點萌芽證候灼熱氣喘譫語煩渴坐臥不寧腰腹疼痛不已妊娠三月忽然漏下見痘稠密如魚子色紫黯弗榮診斷脈右滑數搏指左甚弦數舌紅兼紫苔黃膩憑脈參證此血熱毒壅之險候也凡痘欲萌芽固多發熱今發熱而腰腹疼痛又非尋常之痘證發熱可比更兼三月妊娠倏然漏下若僅以尋常治痘之法治之猶南轅而北轍也審視周身痘點密布如痱如色似胭脂熱如火烙此毒火之現於外者至譫語發狂大渴大飲乾嘔便祕此毒火之壅於內者渾身痛楚腰如被杖此毒火之留於筋骨間者古人所謂毒攻百竅是也當以主治方法相告陳公作色而言曰聶久吾云疹要清涼痘要溫且孕婦出痘安胎為主乃詳告以內經論婦人重身有大積大聚其可犯也及有故無殞亦無殞也之義況費建中論治痘有云輕者不治自愈緩者從容可圖重若忽而必敗急若懈而何追又云痘證惡極劑雖至重毒其受之毒解而胎自安矣斯證因毒壅於胃則嘔惡不眠毒銅於脾則便祕腹痛若泥於孕婦百病首安胎一語任毒火蔓延而不治未有不傷及胎元者也陳公聞是語首肯者再爰用費氏必勝湯加減為法療法首當清解血毒故以生軍為君以生地紫草桃紅歸芍為臣取其有涼血生血活血破血之功佐以紫花地丁人中黃牛蒡子透毒敗毒使以荊芥木通疏散血中伏火導熱下行蟬衣楂肉松肌透達再加無地不透之地龍為引處方細生地四錢紫草二錢赤芍錢半紫花地丁三錢牛蒡子二錢蟬衣一錢二分生山楂肉三錢當歸三錢紅花八分桃仁泥二錢木通一錢二分人中黃一錢二分荊芥穗錢半錦紋大黃四錢後下白頸地龍即蚯蚓七條效果服一劑午後復診腹中轆轆有聲欲作大解而未能劇解爰用珠黃散四分荸薺湯和服有頃即得大解甚暢繼下溏解及水糞三四次壯熱即退安睡數小時始醒復診陳公喜形於色曰我家新婦有命矣服君之方不獨百病消除胎亦見安視之果然以後悉用涼血化毒之劑居然依期脹灌至成痂落靨均安然無恙次年生一男廉按娠婦出痘平順輕鬆者以安胎為主兼治其痘是百病以末治之之謂也安法不外乎保脾養血寬氣道清子宮等項然放標時則以寬氣為重而帶升發氣鬆則痘亦易透升發亦無礙於胎為兩全無害之道起齊候則以清子宮為重而帶涼解清則與痘適宜涼解與痘適合有並行不悖之妙行漿時則以保脾為重而帶排膿痘之成膿本於血血之根本出於脾保脾為催漿之基礎回漿時則以養血為重而帶斂陰胎之所養全賴乎血血之所有皆耗於漿補血自得陰收之義然此蓋語其常非所以論其變也藉令痘犯裊毒烈火血受其殃者如紫豔礬紅等色失血內瘀等證氣受其虐者如貫珠攢聚等形躁亂燔熱等證勢必制其亢攻其毒令氣血歸於和暢乃得化而成膿若泥於百病且安胎惟知胎以血養血以脾統而不治其毒必得胎前之毒不治而自解則可否則任其燔灼聽其內攻可有身外之胎乎如痘證本輕妄投重劑胎必受之胎損則母亦隨之矣若痘證惡極劑雖極重則毒受之毒解而胎自安矣此案治裊毒烈火之疫痘放膽用費氏必勝湯去蘆根葛根青皮加人中黃一味非膽識兼全者不敢用此猛劑且方中大黃桃紅通芍病家皆知為墮胎之藥往往易滋口實然病當吃緊關頭不急急於對病發藥則母命必不可保遑論胎元豈有母先亡而胎元可保之理如陽明熱實則膏黃必不可缺容有大府通調而胎不礙者即使墮胎亦是兩害取輕當為達人所共許惟俗子不知此中緩急則必明告之而聽其從違而已若不明言於先而欲權術以冀得一當則必有竊議於其後者且亦有胎先墮而母命隨之者更必授讒慝者以口矣此守經行權各有其分尤行道者之所必不可忽者也産後痘證案孫少培住南京倉巷病者鄧某氏年三十三歲造幣廠工人鄧桂生之妻住南京施家巷病名産後痘證原因新産後眠食如常逾半月忽然發熱自以為感冒用薑蔥湯取汁繼見痘發頗重照治痘方法治之無效證候見痘十日例屆回期乃痘不起發更不食不眠喉息見痰聲四肢動則發戰惡露極多色極淡語言微細已有脫象診斷脈浮大按之豁然舌質淡紅胖嫩此陰血大虧陽氣外脫之危候也凡痘證至十朝已屆成熟之期既未見漿且未大壯費建中雲順證常不及期逆證常過期徐靈胎氏以為痘至八九旬日以外無漿則里毒不化必至嗆啞瘙癢痰湧不食眼開審察斯證逆象固見雖語言低微尚未至音啞悶亂且大解亦未見泄翁仲仁有塌陷咬牙便實聲清猶可治之論可徵焉前醫齘齘以起發托漿為急固未可厚非然産後氣血兩虛氣虛焉能製毒外化血虛焉能載毒成漿此一定之理也乃連日所服藥餌非行氣即化血實犯內經虛虛之戒以致惡露日多而色愈淡不食不眠四肢動則發戰是虛象畢露矣即論産後普通治法惡露少者固當行血惡露多而色淡者則當從補張石頑謂産後半月十日之間適遇出痘者此氣血新虛必以大補氣血為主旨哉斯言古人又有胃得補則納脾得補則行之說若拘拘於痘證非漿無以化毒要知補正即所以勝邪不能通權達變又何藉乎醫哉況翁氏原有大虛少毒之說足為後世法療法湯液療法用參耆補氣歸地補血為君鹿角膠補陽阿膠補陰為臣茯神安神冬朮補中甘草健脾胃為佐杜仲續斷入肝腎為産後要藥用以為使再加桂元肉甘溫補血為引處方潞黨參五錢清炙耆三錢當歸三錢大熟地三錢鹿角膠三錢陳阿膠三錢二膠用甜酒燉化和服焦冬朮三錢朱茯神三錢川杜仲三錢續斷三錢桂圓肉一錢為引效果上藥濃煎去滓溫服一劑次日即安睡思食又二劑惡露見少頭面見漿四肢痘亦壯起復診去鹿角膠加柏子仁二錢遠志二錢又二劑食飲較旺繞唇成痂正身亦略含漿汁惡露已淨即於原方加金銀花三錢浸至痂落收功康按産後出痘多屬虛證前哲每用保元合四物湯加減此案處方大旨相同妙在鹿驢兩膠陰陽並補較之專補氣血者奏效尤捷其診斷亦頗有發明足見研究功深産後疫痘案汪竹安住紹興斷河頭病者鮑鄉谷君令媳年二十歲住本城前觀巷病名産後疫痘原因妊娠挾感化痘熱迫即産證候身熱口燥囈語兼悸頭腹俱痛惡露淋瀝診斷脈數舌苔滿布白膩病勢方張最防瘀熱上衝療法先開肌腠分消瘀滯為首要處方升麻四分生甘三分炒牛蒡二錢光桃仁三錢桔梗一錢陳皮六分防風八分枳殼錢半炙竹瀝半夏錢半佛手片八分服兩頭煎次診産後患痘咽門梗滯咳嗽更甚面頰微腫苔白脈數惡露囈語悸動較少治以達表托裡次方西紫草四分大腹皮三錢酒炒當歸錢半杜紅花三分防風八分光杏仁三錢佛手花四分白黏米四十九粒桔梗八分三診已起淡黃薄漿昨有紫痘夾雜今已退去胃亦思納咽門尚屬紅腫大便未下數脈較減舌苔兩邊微帶紅潤惟白膩未祛治以升透痘毒扶助氣血為先三方米炒文元參錢半清炙甘四分炒枳殼錢半陳皮六分生炙綿耆各八分蒲公英二錢廣鬱金二錢生打象貝三錢佛手花五分生藕肉一兩桔梗八分通草錢半四診咽門紅腫稍退齶上舌肉連帶有痘痘漿尚屬黃薄因新産血虛且惡露未完氣血較耗脈數大減舌苔紅白相兼治以調和氣血充灌痘漿四方細生地炭三錢清炙甘三分浙茯苓三錢生炙綿耆各六分酒炒當歸二錢文元參錢半陳皮六分炒枳殼錢半紫花地丁二錢大腹皮三錢絲通草一錢五診黃漿尚未充灌神門倉庫不闔肌肉焮赤血熱極重悉因産後去血過多以致行漿滯鈍咳痰微黃夾血惟胃較健脈象舌苔如昨治以滋營養陽五方別直參一錢雲茯苓四錢撫芎五分杜紅花五分陳皮六分炙綿耆錢半清炙草四分炒枳殼錢半酒炒當歸二錢絳通八分六診昨進滋營養陽方法面腫漸退痘漿全軀充灌回期一至微發蒸熱即能結痂消回矣惟氣津血液較虧大便雖下不暢脈象微數舌苔潤治以養陰潤肺六方東白薇錢半京川貝一錢去心忍冬藤三錢生甘梢三分炙橘紅五分赤芍錢半絳通八分炒丹皮錢半瓜蔞皮二錢細生炭地三錢七診上部漸漸消回四肢以及中下痘皮已現皺紋大便溏暢胃氣日健脈象尚數舌質亦潤白膩苔紋全退病已漸趨順境大勢無妨治以清營分化餘毒善其後七方根生地三錢炒楂肉三錢赤苓三錢炙百部錢半大腹皮三錢赤芍錢半鹽水炒知母二錢新會皮六分新絳錢半全當歸二錢酒炒炒銀花三錢效果連服三劑而痊廉按産後疫痘始發欲其透繼則欲漿滿挾瘀者兼活血無瘀者須養血此案先後七方大旨如斯方皆穩健適當
