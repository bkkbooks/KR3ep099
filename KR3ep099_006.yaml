body:
  text: 第六卷火淫病案溫病案內科袁桂生住鎮江京口病者史漢泉年約三十餘歲住本鎮病名溫病原因庚戌四月吸受溫熱病己多日病家出前醫之方示豫蓋皆不出銀翹散三仁湯增液湯之範圍病勢日漸增劇證候昏沉不語面垢目赤鼻孔如煙煤壯熱爍手汗濈濈然手臂搐搦溲赤診斷兩手脈數疾舌苔黑燥問不能言幾日矣曰昨猶譫語今始不能言然大聲喚之猶瞪目視人問近日大便通否曰始病曾泄瀉今不大便已三日矣豫謂此熱病未用清藥陽明熱極胃家實之病也非下不可療法與調胃承氣湯合三黃石膏湯加味處方生錦紋三錢元明粉三錢炙甘草八分栝蔞仁四錢焦山梔三錢黑犀角一錢淡黃芩二錢小川連一錢生川柏一錢生石膏一兩次診接服兩劑竟未得下惟矢氣極臭溲色若血神識較清而身熱舌黑如故次方栝蔞仁六錢杵焦山梔三錢淡黃芩二錢小川連一錢生川柏一錢黑犀角一錢生石膏一兩研細炙甘草八分鮮生地一兩雅梨汁一兩萊蔔汁五錢同沖三診熱減神清黑苔漸退脈息亦較平時吐黏痰目睛轉黃遂改用小陷胸湯加蘆根菖蒲等芳香清冽之品以分消膈中痰熱三方栝蔞仁四錢小川連六分仙露夏二錢淡竹茹二錢冬瓜仁四錢全青蒿錢半川貝母二錢去心石菖蒲錢半漢木通一錢鮮茅根一兩去衣活水蘆根二兩以上二味煎湯代水四診接服四劑胸部頸項間遍出白㾦如水晶珠腹部腿畔亦發白㾦於是身熱全清知飢進粥但精神疲弱耳四方西洋參錢半原麥冬二錢鮮石斛三錢生苡仁三錢川貝母錢半去心淡竹茹二錢鮮枇杷葉三片去毛抽筋效果調養數日始解黑燥屎數次當時兩進大黃而不下者蓋其戚友中有知醫者潛將大黃減去一錢每劑只用二錢故但有解毒之功而無攻下之力而奏效亦較緩也然究勝於粗工之濫用硝黃而僨事者矣廉按此為溫病實證治法初用寒瀉繼用清潤終用清養選藥處方層次一絲不亂藥皆極有力量似此佳案堪為後學之師範溫病案內科袁桂生住鎮江京口病者袁堯寬忘其年住本鎮病名溫病原因庚戌四月患溫病初由章緩卿君診治服藥數劑病未大減嗣章君往江北放賑轉薦豫治證候壯熱譫語見人則笑口渴溲赤體胖多濕每日只能進薄粥湯少許診斷脈息滑數右部尤甚舌苔黃薄而乾燥無津蓋溫病也熱邪蘊伏日久蓄之久而發之暴故病情危重若是療法當以解熱為主而佐以豁痰潤燥方用三黃石膏湯合小陷胸湯加減處方青子芩二錢小川連一錢生川柏一錢生石膏一兩研細焦梔子三錢栝蔞仁四錢杵細芽茶一撮川貝母三錢青連翹三錢全青蒿二錢梨頭汁一兩沖次診接服二日熱未大退至第三劑後乃作戰汗而解但餘熱未清復以前方去石膏芩連栝蔞等品次方焦梔子三錢青連翹三錢全青蒿二錢川貝母三錢細芽茶一撮生川柏一錢生苡仁三錢天花粉三錢北沙參三錢飛滑石六錢包煎活水蘆根二兩雅梨汁一兩沖效果連服數劑清化餘邪熱清胃健而瘥說明凡溫病之解多從戰汗劉河間吳又可發之於前葉天士王九峰暢之於後證以豫所經歷洵精確不易之學說也蓋前人於此皆從經驗中得來惟必俟服藥多劑始能奏功而作汗之時必先戰栗其狀可駭醫家當此何可無定識定力耶廉按伏氣溫病其邪始終在氣分流連者多從戰汗而解若在血分盤踞者或從疹斑而解或從瘡瘍而解惟將欲戰汗之時其人或四肢厥冷或爪甲青紫脈象忽然雙伏或單伏此時非但病家倣徨即醫家每為病所欺無所措手矣且汗解之後胃氣空虛當膚冷一晝夜待氣還自溫暖如常矣蓋戰汗而解邪退正虛陽從汗泄故膚漸冷未必即咸脫證此時宜令病者安舒靜臥以養陽氣來復旁人切勿驚惶頻頻呼喚擾其元神使其煩躁但診其脈若虛軟和緩雖倦臥不語汗出膚冷卻非脫症若脈急疾躁擾不臥膚冷汗出便為氣脫之證矣故醫必從幾經閲歷乃有定見於平時始有定識於俄頃此案大劑清解競得熱達腠開邪從戰汗而解尚屬溫病之實證若病久胃虛不能送邪外達必須補托而伏邪始從戰汗而出者亦不可不知昔王九峰治一人年及中衰體素羸弱始得病不惡寒惟發熱而渴溲赤不寐發表消導汗不出熱不退延至四十餘日形容枯削肢體振掉苔色灰黑前後大解共三十次醬黑色逐次漸淡至於黃溲亦渾黃不赤晝夜進數十粒薄粥四五次夜來倏寐倏醒力不能轉側言不足以聽脈微數按之不鼓用扶陰斂氣輔正驅邪法以生地人參麥冬五味當歸茯神棗仁遠志蘆很為劑服後競得戰汗寒戰逾時厥回身熱汗出如浴從朝至暮寢汗不收鼻息幾無真元幾脫王仍以前方連進二服汗收症退調理而安溫病案內科周小農住無錫病者陳席珍年六十餘住無錫病名溫病原因素體液虧無苔花甲之年倒帳折閲鬱氣不舒肝失調暢為內因丙午夏病溫為外因證候身熱自汗渴不惡寒神煩惡熱時時懊憹診斷脈左小數右洪搏數舌紅而絳遂斷為溫邪鬱火交蒸最防熱盛動風驟變痙厥療法用梔翹蘆竹知茹郁桔急疏清解為君兼顧胃津花粉石斛以佐之處方黑山梔三錢青連翹三錢廣鬱金三錢生打桔梗一錢淡竹茹三錢天花粉三錢肥知母四錢鮮石斛三錢先用活水蘆根二兩鮮淡竹葉四錢煎湯代水復診病勢不衰陳素信亂方云年周花甲元陽大虧若再投涼劑必致生機驟絶亂示附子理中湯高麗參炮薑附子均重用陳不敢服至三候遍發黑紫斑大顯溫熱明證熱戀陰傷舌至絳紫而干始同意復診因議大劑化斑雙清氣營復方生石膏一兩研細肥知母五錢生甘草八分生粳米三錢荷葉包元參五錢犀角粉一錢藥湯調下效果繼以甘涼頻投如吳氏五汁飲之類至四候熱退淨而愈然亦險矣噫治病最虞有人中傷若假神妄評更為陰刻也廉按此治伏氣溫病之正法凡溫病有汗者清熱兼保胃津當然之理然猶病勢不衰必須大劑化斑清營頻投甘涼生津至四候熱退而愈可見伏氣溫病與新感風溫其病勢之輕重治法之難易迥不相同但用銀翹桑菊兩方者焉能濟事勢必耽誤而貽人夭殃也噫溫病案內科張錫純住鹽山西門內病者王義源之女年十四五住鹽山城東牛留里病名溫病原因仲春中旬感受春溫醫者診治失宜遷延十餘日病益增劇醫者諉為不治證候心下脹滿甚劇喘不能臥自言心中幹甚似難支持其舌苔白而微黃小便赤少大便從前滑瀉此時雖不滑瀉仍每日下行診斷脈博一呼吸五至左脈似弦而有力右脈似大而有力然皆不堪重按知其溫病之熱本不甚劇因病久真陰虧損致小便不利所飲之水停於腸胃則脹滿迫於心下則作喘其心中幹甚亦真陰虧損之徵也療法當滋其真陰利其小便陰足則心不覺干便利則脹消而喘亦可定至於一些溫病之餘熱亦不治自愈也處方鮮白茅根去淨皮與節間細根銼碎六兩用水三大碗煎一沸俟半句鍾視其茅根若不沉水底再煎一沸至茅根皆沉水底其湯即成去渣當茶數次溫飲之效果飲茅根湯兩日其病霍然痊愈蓋白茅根涼潤滋陰又善治腎陰有熱小便不利且具有發表之性能透溫病之熱外出一藥而三善備故單用之而能立建奇功也然必剖取鮮者用之且復如此煎法過煎則性變方能有效康按發明茅根功用較徐洄溪尤為詳明方雖簡單藥用周到可謂溫病善後之一種簡效法惟症既喘不得臥擬仿外臺法再加鮮枇杷葉二兩輕降肺氣何如溫病晚發案內科過允文住宜興徐舍病者潘伯石令郎年十四歲住宜興南大街病名溫病晚發原因素質陰虧冬傷於寒潛伏至春未發夏初乃發證候壯熱無汗神昏譫語便泄溺赤舌乾懊憹診斷脈浮數沉滑沉滑為伏溫將發浮數乃邪已外潰惟時已初交夏令故斷為伏溫晚發療法生津托邪使邪透汗出為首要處方黑膏一兩前胡二錢連翹三錢天冬三錢薄荷錢半後入知母三錢玄參五錢赤芍一錢銀花五錢白茅根四兩去心煎湯代水東垣涼膈散三錢開水先下服三劑接服後方二方淡豆豉拌搗鮮生地二兩知母三錢前胡二錢生石膏一兩研細玄參五錢鮮竹葉三十片薄荷頭二錢與石膏同打天冬五錢銀花五錢鮮茅根四兩去心煎湯代水五劑便泄止而汗不出接服後方三方冬桑葉二錢川貝母三錢川石斛三錢前胡二錢鮮枇杷葉五片刷淨北沙參三錢蘇薄荷錢半蔻仁五分同打後入豆豉五錢旋覆花錢半包煎白茅根四兩去心煎湯代水效果服三劑得戰汗而解廉按前後三方均屬生津托邪法於伏氣溫病大致亦合擬去涼膈散再加活水蘆筍之清透則見效當更速矣溫病發斑案內科袁桂生住鎮江京口病者潘君年約三十歲住本鎮病名溫病發斑原因暮春伏氣內發新涼外束然當時尚未現有熱證證候發熱惡寒頭疼身痛胸悶不思飲食握其手臂其熱爍手診斷脈右浮滑左弦緊舌邊尖紅苔薄白滑知其病重非尋常之感冒也療法姑以蔥豉湯合二陳湯加蒡翹枳桔等先行疏解新邪處方鮮蔥白三枚淡香豉三錢仙半夏錢半廣橘紅一錢生枳殼錢半苦桔梗一錢青連翹三錢炒牛蒡二錢次診服後惡寒退而心煩不得寐胸悶作惡脈滑舌燥數日不大便躊躇久之乃毅然以大柴胡湯重用大黃急下之次方川柴胡一錢淡黃芩錢半仙半夏二錢小枳實二錢生錦紋三錢生白芍二錢鮮生薑二片大紅棗二枚三診服後下稀糞水五六次前症盡退但不思食而已越兩日復發熱譫語煩躁不寧舌苔黃脈滑唇紅口內破裂大便溏復以小陷胸湯加大黃下之三方栝蔞仁四錢杵小川連六分仙半夏二錢生錦紋三錢四診翌日復診則胸部脊背手臂等處均發現斑疹其色紅赤煩躁定神識清咳嗽多痰舌苔黃燥大便溏瀉脈不數遂改用小陷胸湯去半夏加貝母等平劑以治之四方栝蔞仁四錢杵小川連六分川貝母二錢去心白知母三錢五診接服兩日赤斑發現愈多手足胸背均滿布而脊背中尤為稠密其色紅赤鮮明言語時清時亂目赤唇紅兼有厄逆仍以原方接服一劑以覘進退六診詎次日復診則神昏不能識人譫語厄逆舌苔黑燥脈息滑數頭汗出時或手動唇動蓋伏熱尚重病勢正在凶猛之時仍當清涼攻下雙方並進庶足以殺其凶猛之勢幸病家堅信不疑得以放手用藥乃以白虎小承氣小陷胸三方合用去厚朴加梨汁以清降之六方生石膏一兩研細肥知母四錢生粳米一撮生甘草五分生錦紋三錢小枳實二錢栝蔞仁四錢杵仙半夏二錢小川連六分雅梨汁一兩分沖效果此藥服後神氣轉清厄逆譫語亦漸定遂以前方去大黃石膏接服三劑病大退乃以清涼和平之方調理半月而瘳說明大凡溫病之重者多從斑解而尤必借大黃之力蓋腑氣通則伏邪始能外發也廉按伏溫之邪由春夏溫熱之氣蒸動而出此其常也亦有當春夏之間感冒風寒邪郁營衛而為寒熱因寒熱而引動伏氣初起一二日第見新感之象意其一汗即解乃得汗後表證略減而裡熱轉甚昧者眩其病狀幾若無可把握不知此新邪引動伏邪之證隨時皆有治之者須審其伏邢與新感孰輕孰重若新感重者先撒新邪兼顧伏邪伏邪重者則專治伏邪而新感自解若中焦挾有形食積濁痰則邪熱蒸蘊每每乘機入胃熱結於中而為可攻之症蓋胃為五臟六腑之海位居中焦最善容納邪熱入胃則不復他傳故溫熱病熱結胃腑得攻下而解者十居六七陸九芝謂溫病熱自內燔其最重者只有陽明經腑兩證經證用白虎湯腑證用承氣湯有此兩法無不可治之溫病矣其意專重陽明若溫病決不涉及別經者其言亦未免太偏總之溫病邪熱蒸郁入於陽明者居多熱在於經猶屬無形之熱其證煩渴多汗狂譫脈洪此白虎證也若熱結於腑則齒垢唇焦晡熱舌苔焦黃神昏譫語脈沉實此承氣證也只要認證清楚確係熱在於胃則白虎承氣依法投之可以取效反掌切勿因疑生怯反致因循貽誤也即溫病發斑之際用清營透絡解毒化斑而斑仍不透往往用攻下逐毒腑氣一通而斑始大透伏邪從斑而解者亦常見之此案初用時後蔥豉湯加味辛散發表使新感先從外解繼即審定溫病實證疊用寒瀉直攻胃結逐次發斑而伏邪始得肅清所用藥品皆用漢方以奏效學古有獲確是佳案溫病發斑案婦科嚴紹岐住紹興昌安門外官塘橋病者王氏婦年三十餘住昌安門外病名溫病發斑原因素因血虛肝旺適五月間病溫五日後始延豫診證候面紅熱盛神昏煩躁口雖干不喜飲間有厄逆診斷脈沉小數舌鮮紅無苔豫斷為邪在血分將發斑也療法以犀羚生地大青清營透斑為君桑丹蘆竹杷葉宣絡達邪為臣佐二蒂以止厄也處方犀角片五分先煎鮮生地八錢冬桑葉二錢鮮竹茹三錢羚角片一錢先煎鮮大青五錢丹皮錢半真柿蒂三十個先用鮮水蘆根一兩青箬蒂十個鮮枇杷葉一兩去毛抽筋鮮竹葉心四錢四味煎湯代水效果兩劑斑出神清厄除身涼繼以鮮石斛三錢鮮生地五錢甜梨肉一兩青甘蔗一兩佛手片一錢金橘餔兩枚養胃陰而醒胃氣三服即胃動而痊廉按血分病溫斑來出而神昏厄逆病勢已危犀羚五鮮湯加味雖屬正治然近今犀羚價昂貧者不易購服可用生玳瑁三錢草犀三錢以代犀角羖羊角一錢俗稱黑羚羊以代羚角功用亦大致相同請醫者一試便知當信迂叟之言非妄談以欺同道也腎虛溫病案內科張錫純住鹽山西門內病者高姓年二十五六歲業農住鹽山城東北張馬村病名腎虛溫病原因仲夏初旬麥秋將至遠出辦事又欲急回收麥長途趨行烈日之中辛苦殊甚因得溫病其叔高魯軒及其表叔毛仙閣皆醫士又皆善治溫病二人共治旬日無效蓋園其勞力過甚體虛不能託病外出也證候愚診視時其兩目清白竟無所見兩手循衣摸床亂動不休讝語無倫分毫不省人事其大便從前滑瀉此時雖不滑瀉每日仍溏便一兩次診斷脈象浮而無力右寸之浮尤甚兩尺按之即無一分鐘數至一百二十至舌苔薄黃中心干而微黑細思此證其兩目清白無見者腎陰將竭也其兩手亂動不休者肝風已動也病勢至此危險已至極點幸喜脈浮為病還太陽右寸浮尤甚有將汗之勢其所以將汗而不汗者人身之有汗如天地之有雨天地陰陽和而後雨人身亦陰陽和而後汗此症尺脈甚弱陽升而陰不應是以不能作汗也療法此證若欲其出汗不可分毫用發汗之藥當用大潤之品峻補其真陰濟陰以應其陽必能自汗汗解則病愈矣處方大懷熟地二兩生懷山藥三錢玄參一兩甘枸杞一兩真阿膠四錢煬沖甘草三錢煎湯一大碗徐徐分數次溫飲下效果上方如法煎服一日連進二劑汗出統體而愈廉按內經謂溫病虛甚死此證誠虛極矣方用大劑滋補一日兩劑通體汗出而愈幸哉亦奇哉若驟疑其僞張君為信用卓著之名醫著有衷中參西録三集行世非閉門造車出門合轍者比若競信其真則陰竭動風往往一厥即脫迫不及救即使因病致虛虛屬驟變藥雖對症恐無如此速愈之理惟方藥極有力量爰為選録以待後來之實驗産後溫病案婦科嚴紹岐住紹興昌安門外官塘橋病者張氏婦年三十二歲住鮑瀆病名産後溫病原因時交暮春産後三日自服生化湯腹痛除而惡露行伏溫遂乘機外潰證候一起即身灼熱汗自出不惡寒反惡熱咳嗽氣逆渴喜涼飲診斷脈右浮滑左小數舌紅苔黃薄膩據證參脈此産後伏溫從血分轉出氣分也前哲石頑老人雖云凡遇胎前産後所患不拘何病總以胎産為本以病為標若産後當理血分然亦當隨機應變余遂斷之曰此伏熱證雖在産後亦當輕清透達為首要療法以桑杏甘桔輕宣其肺為君茅根青箬清透其伏熱為臣生地白薇涼其血為佐赤芍丹參通其血為使遵內經急則治標之法處方冬桑葉二錢白桔梗一錢光杏仁三錢青箬葉三錢切寸赤芍錢半根生地四錢生炙甘草各三分東白薇三錢蘇丹參三錢鮮茅根五錢去皮效果兩劑即灼熱咳逆大減原方去桑桔加鮮斛歸身養胃和營再進三劑諸疴盡卻胃能納穀而痊廉按胎前宜涼産後宜溫雖皆熟在人口然亦一偏之見總要查悉原因辨明證候為第一前哲徐洄溪曰近人有胎前宜涼之說頗為近理至於産後則陰血盡脫孤陽獨立臟腑如焚經脈如沸故仲景專以養血消瘀為主而石膏竹茹亦不禁用余每遵之無不立效乃近人造為産後宜溫之邪說以薑桂為主藥夫果陰陽俱脫脈遲畏寒血水淋漓面青舌白薑桂亦有用時乃血乾火燥純現熱證亦用熱藥則經枯脈絶頃刻而斃我見以百計更有惡露未淨身熱氣塞煩躁不寐心煩腹痛皆由敗血為患亦用薑桂助其火而堅其瘀重則即死輕則變成蓐勞造為此等邪說者九死不足以蔽其辜由此類推凡胎前伏溫産後陡發對症用藥雖犀角石膏亦不必忌何況其次如此案之輕清透達乎但方雖清穩尚屬伏溫輕證之療法與張氏壽甫之滋陰清胃湯元參兩半當歸三錢生白芍四錢生甘草錢半鮮茅根二錢異曲同工溫病鼻衄案內科王經邦住天台柵門樓病者李忠榮年三十餘歲業商住寧海東路李家莊病名溫病鼻衄原因由於陽明鬱熱迫血妄行而上衝於腦腦通於鼻故衄證候獨熱無寒面赤沸紅衄如湧泉診斷溫證如遇脈象洪大浮芤必發鼻衄先用解肌清熱可無後患若用辛溫燥濕等物立時衄血欲止其血當用此方為妥雖有餘邪不致貽害切不可用參耆地芍等補氣斂血滋陰之藥其衄血雖止恐餘邪未清至後變端百出親睹數人致成不治皆因餘邪未清之故療法青蒿竹葉連翹清其表熱黃連黃芩丹皮山梔清其裡熱荷葉涼血而消瘀木通茅根驅邪而達下處方青蒿腦二錢淡竹葉錢半青連翹錢半小川連七分黃芩一錢粉丹皮二錢焦山梔二錢鮮荷葉一錢漢木通一錢茅根四十支效果一服衄即止不勞他藥而痊康按溫熱逆升清竅而衄其衄後熱勢必衰故用清泄之法亦與前證不同是方加鮮生地五錢搗生錦紋五分效更捷溫病咯血案內科何紹彭住永修正街病者塗祖照年二十餘歲耕種為業住廖坊區病名溫病咯血原因溫邪劫傷肺絡咯血已經半月後因初夏勞力病乃愈甚證候不時咯血甚則嘔血身熱脘痞診斷舌邊尖紅苔薄白脈浮數微弦此由邪傷肺絡肺氣失於清肅致陽絡傷血從上溢也勞力病甚者有所用力則氣血之行疾而上湧愈甚也及失血過多則虛而生熱是以又有身熱脘痞之症也療法以桑葉白茅花苡仁暢肺分之氣百草霜黑薑紫苑理肺分之血皆有寧絡之功生地芝麻西參阿膠補絡損以平虛熱處方白茅花錢半冬桑葉錢半生苡仁三錢百草霜一錢黑炮姜二分鮮生地三錢黑芝麻錢半毛西參一錢二分陳阿膠一錢二分紫菀錢半效果四劑熱退血少於前方去炮薑桑葉加生白芍又六劑而血止仍於方內去白茅花百草霜加霍斛杞子各一錢調理而痊康按咯血較吐血為難治方用清肺寧絡參以濡血亦屬尋常療法妙在白茅花百草霜二味氣清質輕善止肺血炮姜亦反佐得力使諸藥無陰凝之流弊也溫病咯血案內科何紹彭住永修正街病者塗祖照年二十餘歲耕種為業住廖坊區病名溫病咯血原因溫邪劫傷肺絡咯血已經半月後因初夏勞力病乃愈甚證候不時咯血甚則嘔血身熱脘痞診斷舌邊尖紅苔薄白脈浮數微弦此由邪傷肺絡肺氣失於清肅致陽絡傷血從上溢也勞力病甚者有所用力則氣血之行疾而上湧愈甚也及失血過多則虛而生熱是以又有身熱脘痞之症也療法以桑葉白茅花苡仁暢肺分之氣百草霜黑薑紫苑理肺分之血皆有寧絡之功生地芝麻西參阿膠補絡損以平虛熱處方白茅花錢半冬桑葉錢半生苡仁三錢百草霜一錢黑炮姜二分鮮生地三錢黑芝麻錢半毛西參一錢二分陳阿膠一錢二分紫菀錢半效果四劑熱退血少於前方去炮薑桑葉加生白芍又六劑而血止仍於方內去白茅花百草霜加霍斛杞子各一錢調理而痊康按咯血較吐血為難治方用清肺寧絡參以濡血亦屬尋常療法妙在白茅花百草霜二味氣清質輕善止肺血炮姜亦反佐得力使諸藥無陰凝之流弊也溫病兼沖氣上衝案內科張錫純住天津病者鄭伯恕年五十二歲奉天裕盛銘印書局經理病名溫病兼沖氣上衝原因其人素有痰飲偶有拂意之事肝火內動其沖氣即挾痰飲上湧連連嘔吐痰水季春之時因受感冒成溫病溫熱內傳觸動沖氣又復上沖證候表裡壯熱渴嗜飲水痰水上泛屢屢咳吐厄逆噦氣連連不除兩脅作脹大便三日未行診斷脈象左部弦長右部洪滑而長重按皆甚實舌苔白厚中心微黃此溫病之熱已入陽明之腑又兼肝火挾沖氣上衝也療法當重用白虎湯以清陽明之熱而以降沖兼鎮肝之品輔之處方生石膏三兩研細生赭石一兩研細生龍骨八錢生牡蠣八錢白知母八錢生杭芍六錢清半夏三錢厚朴錢半甘草二錢煎湯三茶鍾分三次溫飲下效果將藥三次服完後熱退氣平脈亦較前和平其大便仍未通下遂將石膏龍骨牡蠣各減半再煎服一劑大便通下痊愈說明醫家用石膏未有與赭石並用者即愚生平用石膏亦未嘗與赭石並用恐其寒涼之性直侵下焦也然遇有當用之病而用之則病當之非人當之如此證不重用石膏則陽明之大熱不除不重用赭石則上逆之沖氣莫制此所以井用之而無妨礙也康按沖屬於胃又隸於肝凡有痰飲者每兼肝鬱肝火內動挾沖氣上衝勢必連嘔痰水甚則厄逆噫氣若感溫病其勢更甚此案方用清降潛鎮確是對症發藥案後說明理亦充足春溫案內科嚴執中住泰興東門外殷家莊病者張東樓之妹年十九歲往常州陳巷病名春溫原因去歲暮略受寒邪寒鬱化熱至今春復新感風寒而發前醫令服解表藥數帖汗出而熱不退證候初病頭疼身痛胸悶食少口渴引飲晚間熱重時或呢喃一星期後經行忽停因而少腹㽲痛連夜讝語咳嗽黏痰用力而不得出齒焦舌刺索茶而不多飲屈指已草七日診斷六脈弦數尺部細候則促症屬春溫而邪入陰分蓄血胞宮也明矣幸喜二九之年真陰尚未消爍如急救得法猶可轉危為安療法治病必求於本故重用黑原參原麥冬鮮生地肥知母粉丹皮滋陰清熱為主川貝母牛蒡子廣陳皮理氣豁痰為輔又思蓄血下焦大便燥結揚湯止沸莫若釜底抽薪因用桃仁泥廣箱黃前後通行合治而丹皮佐桃仁甘草佐大黃意在一則防緩一則恐急余若蘆根茅根銀翹與川貝牛蒡等不過邪由外入者仍使之由外而出所以吳鞠通葉天土陳平伯王孟英諸先生謂為溫邪發表之要藥也處方肥知母三錢川貝母三錢桃仁泥三錢生甘草五分淨連翹三錢黑元參五錢粉丹皮三錢廣箱黃三錢金銀花三錢廣陳皮一錢鮮生地五錢原麥冬三錢牛蒡子二錢鮮蘆根三錢鮮茅根一兩去衣二味先煎代水效果豫方一出當時諸醫議論紛紛謂死期將臨尚用大黃三錢慫恿病家莫服豫見膠柱派反對乃大聲曰倘病者服余方而死余願出大銀百元為之棺槨喪葬於是病家使病者連服兩煎果月信復來腥臭難聞夜不讝語日不糊塗身熱亦退頗思飲食延余復診苔膩黃已化脈弦數已緩惟咳嗽稠痰比前尤多豫乃於前方去大黃桃仁加杏仁泥全瓜蔞連服四劑而愈廉按病屬衝任伏熱桃仁承氣加減正合病機然非素有膽識者不敢擔任春溫案內科楊燧熙住鎮江西城內病者陳濟川年五十五鎮江商人住鎮江西門城外病名春溫原因幼年完婚太早後傷酒色而患淋濁服止澀藥過早毒逼於內致腿縫生魚口之症數月顯系內因陰虛外因溫邪而發證候頭痛惡寒發熱渾身骨疼大便數日不行小溲赤口不渴腹部拒按唇齒乾燥咳嗽不爽脘悶不舒診斷脈浮滑數兩關較大舌苔淡黃朱點甚多脈證合參斷為溫病此內經所謂冬不藏精春必病溫也療法先進桑菊飲加減以清熱繼投調胃承氣湯加味以下積處方霜桑葉三錢苦桔梗二錢淨連翹二錢炒黃芩錢半杭白菊三錢薄荷葉八分瓜蔞皮三錢京赤芍錢半光杏仁二錢生甘草五分大貝母三錢枇杷葉二錢去毛筋淨接方金銀花三錢瓜蔞皮三錢生甘草一錢淨連翹三錢生箱黃二錢黑山梔三錢川石斛三錢元明粉錢半沖服毛知母錢半荸薺三枚效果初劑熱解二劑便行三劑即能起立可吃稀糜飲少許後以滋養法調理二三劑而康健康按初用辛涼輕劑以宣上繼用苦寒重劑以攻裡此注重肺胃之治法是得力於溫病條辨者春溫案內科陳作仁住南昌中大街四川會館病者陳其義三十六歲南昌人住城內病名春溫原因失偶續絃時當客冬房事過勞真陰虧損又兼冬令嚴寒經云冬傷於寒春必病溫又云冬不藏精春必病溫其斯之謂歟證候初起證似傷寒惟熱多寒少常有汗出汗後面熱不稍減且口渴引飲此與傷寒病狀大不相同診斷兩寸脈浮大而數右寸脈尤洪脈證合參斷為春溫乃熱邪傷陰之候也療法但春溫證而惡寒微兼表證不能驟用純陰之劑宜仿仲景麻杏甘石湯主之但麻黃春夏宜慎用茲以薄荷代麻黃為君杏仁宣表為臣石膏質重瀉火氣輕解肌為佐甘草和中為使但溫必有毒有濁氣加銀翹芳香化濁泄熱解毒以助石膏之清解處方蘇薄荷一錢二分叭嗒杏仁三錢去皮尖生石膏八錢杵生甘草一錢淨銀花三錢青連翹三錢效果此方連進二劑各證均減過半惟咳嗽熱渴尚未痊愈易以桑菊飲加減續進冬桑葉三錢白菊花二錢苦杏仁二錢去皮尖桔梗錢半貝母錢半鮮蘆根三錢淡竹葉錢半蘇薄荷四分生甘草一錢此方又接進三劑未七日而各證逐漸就痊矣廉按辨證清切選藥愜當妙在初起即用荷杏石甘加銀翹而為辛涼之重劑較吳氏銀翹散力量尤大真得葉氏薪傳也春溫發斑案內科葉鑑清住上海病者楊左年三十餘寧波人病名春溫發斑原因邪陷入胃化火劫律致熱蒸發斑證候溫邪已逾一候身不惡寒蒸蒸發熱斑如錦紋頭面胸背四肢均有色尚紅活大渴飲冷頭額汗多煩躁氣悶甚則神昏讝語溺赤如血便閉三日舌乾絳根苔黑唇焦前板齒燥診斷脈來右洪數左弦數脈證合參顯是陽明熱盛之候上蒸包絡則時有讝語熏蒸肌表則灼熱發斑邪勢方張津液已傷誠恐驟變痙厥勿謂言之不豫也療法陽明經腑氣血皆熱故用膏知地斛雙清氣血生津救液為君大青葉生草化斑解毒為臣竹葉清泄膈上之熱茅根清宣血分之熱元參專瀉浮游之火味鹹色黑且能養陰以清心腎之熱合銀翹清解為佐使服一劑處方生石膏二兩鮮生地二兩生甘草一錢大青葉三錢大竹葉三錢連翹四錢肥知母四錢鮮石斛八錢潤元參四錢金銀花四錢茅根肉五扎去心衣二診熱灼較和赤斑更多昨夜讝語較少寐亦稍安醒後煩悶渴飲尚甚舌根黑苔已化干絳元津唇焦便閉溺赤莖痛種種火盛劫津之象未見少減病已九日右脈洪數左脈弦數仍防昏痙變端再以大劑生津清熱法治二方生石膏二兩鮮生地二兩生甘草一錢大青葉三錢淨連翹四錢肥知母三錢鮮石斛三錢肥玄參四錢天花粉四錢金銀花四錢茅根肉五扎去心衣鮮竹葉三錢黑犀角四分磨沖另用鮮石斛三錢燉湯代茶三診熱勢漸減赤斑漸淡有汗津津讝語已止舌絳有液脈來洪數稍靜煩悶渴飲尚甚大便未行小溲赤痛邪戀陽明慎防昏痙變端守原法治三方生石膏一兩五錢鮮石斛八錢京元參四錢淨連翹四錢焦山梔三錢鮮生地一兩五錢生草梢一錢天花粉四錢金銀花四錢竹葉心三錢茅根肉五扎去心燈心三扎犀角三分磨沖另燉鮮石斛代茶四診斑漸回熱較退煩躁氣悶渴飲等亦有減無增夜寐較安讝語不作脈右尚形浮數左弦數便暢不痛色深黃舌苔紅潤胃納漸展病情已有轉機治再生津清化然必須加意謹慎勿變為上四方生石膏一兩鮮石斛五錢京元參三錢淨連翹三錢大竹葉三錢鮮生地一兩天花粉四錢焦山梔三錢金銀花三錢嫩蘆根一兩去節燈心三扎鮮石斛湯代茶五診身熱解而不徹諸恙悉退三部脈象數而不大舌胎紅潤微有薄苔煩悶已平渴飲漸和赤斑循序而回小溲黃邪勢已退六七不生他變可保無虞五方鮮石斛四錢淨連翹三錢緑豆皮四錢鮮竹葉三錢甘蔗皮五錢塘西産冬桑葉錢半金銀花三錢嫩蘆根一兩去節生竹茹錢半燈心三扎六診斑雖回淨肌熱猶未解清易汗口乾舌紅潤根生薄苔脈象弦數右甚於左今日頻轉矢氣大便欲解而未行大邪雖退餘燼尚存治再清胃養津參以潤腸六方西洋參一錢生扁豆衣錢半火麻仁四錢研大竹葉三錢緑豆衣四錢鮮金斛四錢淨連翹三錢瓜蔞仁四錢研嫩蘆根八錢去節甘蔗皮五錢塘西七診交兩候熱退身涼脈來靜軟大便亦行乾燥異常溫病後津虛腸燥往往如此七方西洋參一錢生扁豆衣錢半淨連翹三錢火麻仁四錢研生穀芽三錢鮮金斛三錢穭豆衣三錢嫩蘆根八錢去節松子仁三錢研淡竹葉錢半八診胃納頗旺脈來濡而有神溺長色淡皆邪去正復之佳象也前方既合毋庸更章八方西洋參一錢南沙參三錢穭豆衣三錢橘白一錢淡竹葉錢半川石斛三錢扁豆衣錢半生穀芽三錢生竹茹錢半燈心三扎九診大病之後全恃胃氣健旺今寢食均安大便又行不時津液來復即脾家運化之力亦健所以神采頗好脈象有神治再和養惟怡情靜攝調勻飲食較服藥尤為緊要九方米炒洋參錢半川石斛三錢生穀芽三錢水炒竹茹錢半燈心三扎南沙參錢半穭豆衣三錢橘白一錢抱木茯神三錢紅棗三枚效果服四劑痊愈廉按肝膽為發溫之源陽明為成溫之藪誠以肝主回血血中含有炭素每從火化故厥陰經最多伏火每挾春溫時氣而暴發其發也陽明首當其衝故身灼熱而發斑與新感風溫病勢輕重懸殊此案辨證有識處方有膽非學驗兼優確有把握者不辦惟方中再加羚角為尤妙春溫誤治案內科陳作仁住南昌中大街四川會館病者楊春芳年四十八歲南昌人住廣潤門外病名春溫誤治原因房事過勞時屆春令無以應生髮之氣致發春溫重症誤服辛溫發表等劑病日加重延誤旬日證候壯熱不退汗多口渴大便旬余不通舌苔黑生芒刺病勢危險已極診斷脈左右俱洪數鼓指合參病勢現象察其前服各方知系春溫誤藥所致證已至此非大劑滋陰兼滌腸不及挽救療法議以增液承氣法重用元參生地麥冬為君以滋水養陰合大承氣湯以急下存津此亦破釜沉舟之意也處方潤元參六錢鮮生地六錢杭麥冬五錢去心生川軍三錢川厚朴二錢炒枳實二錢元明粉二錢沖次診一劑大便即通熱渴俱減險象已除遂改以復脈湯去薑桂續進細生地六錢杭麥冬五錢杭白芍三錢阿膠珠三錢生甘草二錢火麻仁三錢去殼搗效果服二劑熱渴均愈惟胃陰不足正氣尚虧又進益胃湯加減以為善後調理北沙參四錢潤玉竹三錢細生地四錢杭麥冬三錢抱木茯神三錢粉甘草二錢鮮橄欖四枚剖破若無橄欖時不用亦可煎成後去渣加上冰糖五錢煬化頻頻服之服四劑而痊愈廉按春溫誤治至舌黑而生芒刺症勢已險方用增液承氣法救誤確有巨功惟續進減味復脈湯稍嫌太驟當先進益胃湯為合法俟胃陰復而胃氣健然後用復脈法滋填收功較為適當春溫夾食案內科錢存濟住廣德城內病者張修臣子年十二歲住廣德北鄉病名春溫夾食原因初因傷風發熱頭痛自汗不寒而渴余投以麻杏甘石湯加薄荷銀花一劑即愈後因誤食鯽魚半碗其症復作他醫進以辛燥病轉劇證候目腫如桃頭痛如劈煩躁譫語大渴引飲潮熱自汗小便短數大便不通胃脹拒按診斷脈象滑實舌絳苔燥合病因脈證參之此胃實證也夫外邪初解胃氣必虛正宜清淡滋養以生津液乃不戒於口恣食葷腥停滯於胃復進辛燥助陽耗液食積得陽明燥化致胃經所統屬之地皆結實不通故目腫頭痛者陽明燥火上衝也煩躁譫語者胃熱上蒸神經也大渴引飲者胃津竭而求救於水也潮熱者陽明旺於申酉實則得旺而劇也自汗者津液外泄也小便短數者津液下逼也大便不通者腸有燥屎也病既內外皆實自宜急下以瀉悍熱之氣而救將絶之陰也療法以大承氣湯原方先煎枳朴繼納大黃次入芒硝蓋取生者氣鋭而先行熟者氣鈍而和緩之義欲使芒硝先化燥屎大黃繼通地道而枳朴除其積滯皆所以通泄大腸而逐熱也處方厚朴五錢枳實四錢大黃四錢芒硝三錢以水三碗先煮枳朴取二碗去滓納大黃煮取一碗去滓納芒硝熔化頓服效果服一劑下燥屎數十枚諸恙霍然即占勿藥令以米飲調之一周而愈廉按案語多所發明選方極為確切非精研傷寒論膽識兼全者不辦春溫夾痰案內科葉鑑清住上海病者席錫蕃先生令侄潤身兄年草餘歲洞庭山人病名春溫夾痰原因新感風溫素蘊痰熱證候但熱不寒有汗不解咳嗽氣逆痰厚若膠咯吐維艱病已逾候表分之風邪雖從汗達里分之痰熱正在熏蒸蒸於胃則脘悶渴飲發熱不已熏於肺則咳嗽痰厚氣急不平便閉溺赤煩躁少寐診斷脈來右寸關浮滑數左弦數舌尖邊紅根中黃苔津液已經受傷最恐上痹肺氣為痰厥內陷包絡為神迷不可不預防也療法初方用鮮斛清胃生津蘇葶桑皮白前瀉肺開降為君蘆根苡仁冬瓜子即千金葦莖湯去桃仁清肅肺胃為臣余如杏仁利肺蔞貝化痰連翹清熱枇杷葉順氣用為佐使各盡其清肅上中兩焦之功能也處方鮮石斛四錢炙蘇子三錢象貝錢半連翹四錢生苡仁四錢水炙桑皮四錢甜葶藶一錢瓜蔞仁五錢杏仁三錢冬瓜子四錢白前錢半枇杷葉三片去毛嫩蘆根二兩煎湯代水服一劑次診大便先清後溏痰濁下達氣急較平熏灼勢緩身熱稍和惟咳嗽尚甚稠痰咳吐尚艱煩悶渴飲飲又不多小溲短赤赤而且渾脈右數大於左舌紅苔黃膩種種胃熱上蒸肺不清肅痰與熱熏灼津與液受傷熱無形也痰有質也宜清無形之熱化有質之痰清理肺胃順氣生津病已經旬慎防昏喘變端次方霍石斛三錢另煎炙蘇子錢半象貝錢半杏仁二錢去尖廣鬱金錢半生打生桑皮四錢甜葶藶一錢瓜蔞皮四錢連翹四錢枇杷葉三片去毛嫩蘆根一兩去節生苡仁四錢冬瓜子四錢一劑三診昨夜寐頗安氣分逐漸平降惟咳嗽依然咳痰尚利身熱較輕煩悶亦減大便又行微帶溏薄病勢日見退機全賴痰從上出熱從下達今日診脈右部浮大雖平滑數尚甚左尚弦數舌苔化薄當再清化肺胃痰熱三方水炙桑皮三錢杏仁二錢去尖象貝一錢冬瓜子四錢赤苓四錢蘆根一兩去節白前錢半連翹四錢瓜蔞皮三錢生苡仁四錢通草一錢枇杷葉三片去毛一劑四診身熱乍盛乍衰咳嗽或平或作所幸咳痰頗爽氣逆已和肺氣不至有升無降痰熱亦不至有入無出舌質既淡苔亦化薄小溲較長色尚深黃脘悶口渴均減右脈仍形滑數再擬清胃肅降順氣化痰不加昏喘變端可保無虞四方嫩蘆根一兩去節生苡仁四錢杏仁二錢去尖川象貝各一錢生竹茹錢半冬爪子四錢桑葉皮各錢半連翹三錢瓜蔞皮三錢廣鬱金錢半生打枇杷葉三片去毛通草一錢鮮地栗三枚一劑五診身熱大減大便又行脘悶氣逆等次第就輕咳嗽亦不若前日之劇作咳痰較薄肺氣漸得清降痰熱日見退化溺色仍黃脈來右部滑數左尚和平舌苔薄黃病勢已松再以清化五方嫩蘆根一兩去節生苡仁三錢川象貝各錢半鮮竹茹三錢赤苓四錢冬瓜子四錢青連翹三錢全瓜蔞四錢生蛤殼四錢打通草一錢淡竹葉三錢枇杷葉三片去毛一劑六診身熱交兩候退淨諸恙均平胃納亦展惟咳嗽未已咳痰厚薄不一餘熱挾痰尚戀肺胃清肅下降不能如常脈來數象已和右濡滑左小弦舌淡紅根苔薄黃火邪已退仍從肺胃治之六方嫩蘆根六錢去節生苡仁三錢川貝二錢橘白一錢生竹茹錢半冬瓜子四錢川石斛三錢蔞皮三錢生扁豆衣錢半淡竹葉錢半二劑七診昨食粥稍多脘中微悶時欲作暖大病小愈胃虛消化力薄所以每每能食運遲咳嗽有痰肺邪亦未清肅舌根薄黃溺色漸淡大便三日未行脈右濡細帶滑治再清化務宜調勻飲食安養怡情當此九仞幸加意留神為上七方宋公夏錢半廣鬱金錢半橘皮一錢炒扁豆衣錢半冬瓜子三錢川貝母錢半炒蔞皮三錢炒竹茹錢半旋覆花錢半包煎通草一錢枇杷葉三片去毛玫瑰花五分後下二劑八診和胃清肺順氣化痰乃病後清理之法八方川石斛三錢宋公夏錢半橘白一錢茯苓三錢冬瓜子三錢甜杏仁三錢川貝母錢半炒竹茹錢半炒蔞皮三錢枇杷葉三片燈心三扎三劑九診便通溺長胃納亦展惟稍有咳嗽晨起尚有稠痰脈濡有神胃府濕熱已化肺家痰邪未清九方甜杏仁三錢宋公夏錢半川石斛三錢橘白一錢冬瓜子三錢茯苓三錢川貝錢半蔞皮三錢炒竹茹錢半枇杷葉三片去毛四劑十診諸恙均平咳嗽已和舌苔亦化脈來柔軟邪雖去正未復治再清養十方西洋參一錢宋公夏錢半甜杏仁三錢橘白一錢茯苓三錢川石斛三錢川貝母錢半冬瓜子三錢炒竹茹錢半穭豆衣三錢紅棗三枚四劑十一診胃熱已清肺痰亦化平素食後時欲作噯胃氣不和所致脈來較振治再清養飲食尤宜謹慎十一方西洋參一錢川貝錢半杏仁二錢去尖旋覆花錢半包煎炒竹茹錢半原金斛三錢另煎瓜蔞皮三錢炒橘白一錢緑萼梅一錢枇杷葉三片去毛效果服六劑痊愈廉按新感風溫素蘊痰熱為春季最多之候敘證詳明處方輕穩先清化後清養治則井然似此佳案堪為後學法程春溫夾痰喘案兒科葉鑑清住上海病者陳女孩年二歲蘇州人病名春溫夾痰喘俗名肺風痰喘實則肺閉原因痰熱內蘊又感風溫證候壯熱有汗神識昏蒙微咳喘急喉有痰聲漉漉便溏溺少診斷紋淡紫舌苔厚白脈來細數已服過麻杏甘膏湯無效風痰熱交結上焦肺氣將閉襁褓肺弱防湧塞驟變勉擬輕清開泄以盡醫力療法肺位最高而司呼吸喉為肺之外候射干牛蒡甘桔利肺開喉為君蘇葶萊蔔子豁痰宣降為臣更以杏仁枳殼前胡鬱金寬胸宣郁為佐使也病在上焦藥用輕清仿徐之才輕可去實之義處方炒牛蒡三錢生甘草四分廣鬱金錢半萊蔔子三錢甜葶藶一錢前胡錢半泡射干八分苦桔梗五分白杏仁二錢炙蘇子錢半生枳殼錢半次診喘勢較平小溲稍長熱灼之勢亦緩咳嗽痰多便溏甚黏痰邪已由肺入胃腸而下行脈細較揚右部濡滑數關紋隱而不顯痰熱尚充斥肺胃質小病重防喘塞驟變治再清宣次方炒牛蒡三錢生甘草四分廣鬱金錢半炙蘇子錢半泡射干八分苦桔梗五分白杏仁二錢勿研甜葶藶一錢生枳殼一錢嫩前胡錢半白通草一錢廣橘白一錢三診喘平咳聲亦鬆肺氣已得宣利熱退身涼微微自汗大便溏薄溺多而黃舌苔膩薄脈象濡滑數病情已入坦途治再清肺順氣化痰三方熟牛蒡二錢象貝三錢炙蘇子錢半冬瓜子四錢囫圇杏仁二錢去皮尖炒蔞皮三錢連翹殼三錢通草一錢生枳殼一錢前胡錢半萊蔔子三錢效果服二劑後諸恙均和惟尚咳嗽有痰仍宜清肺化痰又服二劑痊愈廉按邪閉在肺勢極危險而對症發藥不旬日已痊者因小兒臟腑嫩薄易入亦易出所以效力種速也春溫夾痰熱案內科魏樹森住興化后街病者高爾昌年四十餘業商住泰縣病名春溫夾痰熱原因素因嗜食厚味內積痰熱又外感時邪而起證候頭痛身熱胸脘痞悶煩躁不安舌苔黃且渴已延一候診斷診脈浮滑且數浮脈主表滑脈主痰數脈主熱以脈合證此春溫夾痰熱病也方書論溫病有伏氣外感之分此證因素嗜厚味痰熱內蘊又值時令溫暖腠理開泄外感時邪肺先受病故見頭痛身熱胸脘痞悶煩躁不安等症前醫進辛涼解表之劑如荊芥豆豉薄荷牛蒡銀翹甘桔等味服後胸煩如故而表熱亦未盡解考臨證指南溫熱門結論云此病夾有痰熱者用溫膽湯蓋夾有痰熱之人痰熱熏蒸於外亦足以致身熱而有餘必須清其痰熱則身熱胸煩始解其理甚明療法用蔞貝溫膽湯加味以清其痰熱兼宣通氣分則諸病自除處方瓜蔞霜錢半瓜蔞皮三錢法半夏錢半粉丹皮錢半小枳實錢半川通草一錢川貝母三錢茯神三錢茯苓三錢焦山梔三錢淡竹茹錢半六一散四錢廣橘紅一錢冬桑葉三錢廣鬱金錢半射干錢半效果服兩帖身熱胸煩盡解更用清養胃陰之藥調理數日而瘥廉按辨證既明方亦清穩是得力於葉法者春溫晚發誤治壞證案內科李竹溪住蕪湖米市街病者張維翰年三十七歲浙江人蕪湖常關吏病名春溫晚發誤治壞證原因冬傷於寒潛伏營分偶觸新感而發據述初起寒熱無汗頭痛醫以麻黃杏仁等暨開泄之品服後逾時即汗頭暈舌於服梨一枚稍定更醫桂枝溫膽諸湯毫無效果證候汗不能收熱不肯退起坐憎寒臥又汗泄神疲氣索顴赤懶言舌乾絳苔薄焦齒板目合寐則囈語鄭聲循衣摸床略觸即醒醒後仍能了了咳嗽痰紅日傾三盞左脅疼痛一派陰液就亡正氣將殘之象診斷左脈細數右細滑無力查問此病之初正當穀雨乃少陰君火司令陽氣大升之時雖當時有寒熱無汗頭痛之新邪法宜清解微透其汗為先前醫麻黃分量尚輕而開泄之品過多脫營之體力不能勝以致變證蜂起壞象叢生及扶起坐憎寒臥又汗泄亦當仿白芍甘草湯法更醫又誤以桂枝溫膽等湯肌不解而痰反多且營絡更沸痰紅脅痛頻增脈證如斯危機顯露請先留命慢言治病療法先賢有云存得一分陰退得一分熱此時門戶洞開籓籬盡撤首當育陰救本仿集靈膏法作滋苗灌根之策本方加入二至斡旋陰陽牡蠣存陰止汗阿膠補坎填離鮮石斛得水石之精清滋胃腎而益脾陰梨汁蔗漿純含天然真液生津降火功冠草木人乳汁血液所成借充營絡而有殊功日夜頻進勿輟處方別直參一錢生熟地各四錢天冬連心一錢麥冬三錢女貞子二錢旱蓮草三錢鮮石斛三錢左牡蠣四錢東阿膠三錢河水煎甘蔗漿一杯雪梨汁一杯鮮人乳一杯三味另沖二診夜分稍靜囈語鄭聲均減而汗仍未收津仍未復苔黑略退舌絳依然紅痰減半脅痛猶存是方不為無效不過救陰較補陽本難水到渠成穩持勿變仍於原方之中參加生鱉甲三錢生龜板三錢五味子五分以靈介潛滋肝腎較草木事半而功倍更借五味之力滋肝腎而斂肺止汗又精不足者補之以味此品獨有之矣三診力挽頽波諸恙均減險象悉平諒無枝節橫生之患惟是質虛驟難復元餘燼仍嫌未熄乃於原方去二至鱉甲專以養正滌邪漸次轉危為安效果三候熱已退淨汗亦全收而精神委頓起坐殊難動則心懸欲脫則參加至三錢牡蠣龜板用至一兩幸能飲食囑早晚以冰糖燉熟藕熟梨作點心食之匝月始離床褥詎料久臥之人足力頓減立則需人囑以靠椅鋪褥坐之以足踐地如移步狀依法行之日漸有力而復原狀矣康按伏氣春溫偶感新寒而晚發折衷張長沙傷寒論者每以麻杏甘膏湯為正治藥然就余實驗苟非其時非其經非其人之質足以當之鮮不為害未可拘執古方而輕試也歷見溫熱病誤服麻黃或汗出不止而死或咯血不止而死或目赤唇焦裸體不顧而死或兩頤暴腫潰爛而死驟變壞證不治者多多矣此案用集靈膏加味解救幸而得生然亦僥幸成功不可盡信其一概得效也春溫兼寒案內科袁桂生住鎮江京口病者姚某子年十五歲學生住本鎮病名春溫兼寒原因三月間由學校歸家自覺外寒夾內熱而發證候惡寒欲睡旋即發熱頭痛身痛譫語不能識人口渴溲赤診斷脈滑數苔白膩此內熱為外寒所束也療法辛涼輕透以銀翹散合梔豉湯加減處方金銀花三錢青連翹三錢焦山梔三錢淡豆豉三錢蘇薄荷錢半蘇葉梗錢半牛蒡子錢半苦桔梗一錢生甘草五分先用活水蘆根一兩煎湯代水次診下午四時復診神昏譫語如故身熱自汗濈濈然不止面赤口渴欲飲水脈息滑而不數舌苔薄膩不黃不燥因思傷寒論云陽明病發熱汗多者急下之而面赤神昏又皆當下之症遂改用小承氣湯加味次方生錦紋三錢川厚朴五分生枳殼二錢淡黃芩二錢青連翹二錢白知母二錢三診服後解大便兩次神清安睡汗止熱解自能起坐知飢欲食其家以為病愈不復延診越三日復發熱有汗口渴脈滑數與白虎合小陷胸湯三方生石膏三錢研細白知母三錢生粳米三錢生甘草五分栝蔞仁四錢杵小川連四分仙露夏二錢效果服後熱退神清惟咳嗽痰中帶血而已復與瀉白散加黃芩知母茅根等二劑痊愈廉按冬時伏氣隨春令溫熱之氣而發但所發之因不同有感非時暴寒而發者有飢飽勞役而發者有房室不慎而發者此案春溫兼寒俗名冷溫或稱客寒包火張路玉謂怫鬱之熱乘春溫之氣而發雖有非時暴寒止宜辛平之劑發散初方用銀翹散合梔豉湯加減微發以解其新邪逮新邪解後而伏邪外達見有下症放膽用小承氣加味非熟讀傷寒論者不辦第三方白虎合小陷胸湯亦有力量惟咳痰帶血肺經尚有伏熱故用二皮芩知以清肺經之伏火佐以茅根涼血寧絡甘草粳米調養胃氣剛剛恰好秋溫夾濕案內科過允文住宜興徐舍病者蔣一清之子年三十二歲住蛟爪墟病名秋溫夾濕原因素有痰濕又感秋涼鬱伏化熱證候發熱譫語胸痞便清苔厚黃膩渴不多飲診斷脈不宣揚乃濕遏熱鬱之候本當辛開苦泄奈一誤於香燥再誤於涼遏香燥則熱熾涼遏則樞窒故熱綿三月囈語神昏其膠固不解之情皆藥誤有以致之也療法辛以宣之芳以開之苦以泄之處方石菖蒲一錢前胡二錢蘇薄荷錢半後入陳膽星錢半廣鬱金錢半象貝母三錢玉樞丹五分研沖枳殼一錢鮮枇杷葉五片刷淨白蔻仁五分後入瓜蔞皮二錢效果二劑濕開熱透神清讝除繼用輕清淡滲法收功廉按濕遏熱鬱自以苦辛開泄為首要方中既有玉樞丹特長於芳透則蔻仁可以去之冬溫戰汗案內科張際春住泰興北城外病者徐天華年二十六歲業榪住泰興燕頭病名冬溫戰汗原因冬旱氣溫勞苦受之即發證候兩候身熱不解頭眩夜煩便實溺黃咳嗽少痰大汗淋漓形色若有脫象診斷早診苔黃中絳脈象滑數系冬溫自口鼻入肺不得外解則裡急而順傳於胃也肺為嬌臟胃為陽土宜清宜降誰知藥服便行忽然發戰大汗如雨似有急不可緩之險象病家疑余誤汗致脫即邀復診其脈似和右部不靜此邪久羈氣分得清解之力大便之後邪與正爭以作戰汗非陰陽離決之脫汗一戰不清恐至再戰今正氣未至大虛邪氣未得清楚吳氏鞠通所謂但當聽其自然勿事騷擾可耳療法方取桑葉杏仁連翹梔皮薄荷以清肺枳殼瓜蔞皮以降胃貝母茯苓薏苡甘草以清肺胃熱化之痰又加枇杷葉清降之品為佐使次日又診汗後熱不清咳有黏痰即以參葉養陰為主茯苓甘草薏苡以和胃氣貝母瓜蔞皮以去未清之痰少佐連翹梔皮丹皮荷葉絡以清氣分之餘熱仍守先賢戰汗後身復溫亦不可驟用補藥恐餘邪未淨復熾之訓處方冬桑葉一錢青連翹二錢光杏仁二錢山梔皮錢半生枳殼錢半蘇薄荷一錢象貝母三錢栝蔞皮三錢雲茯苓三錢薏苡仁三錢生甘草八分枇杷葉二張去毛又方參葉二錢雲茯苓三錢粉甘草五分生薏苡三錢栝蔞皮錢半川貝母一錢連翹一錢山梔皮一錢粉丹皮一錢荷葉絡二錢效果翌日汗止熱減咳緩食粥碗許復一二診熱淨咳己而痊康按邪與正爭戰而汗出病必解戰而不汗病即加其常也今因便後而發戰大汗乃內熱外潰之佳兆既非脫汗自不宜補故仍用清肅餘邪為治方皆清穩溫瘧案內科王經邦住天台柵門樓病者陳逢年年五十歲商人住天台城內東門病名溫瘧原因前醫誤作濕溫症治證候日晡潮熱無汗渴喜冷飲飲食不進身尚惡風診斷脈象弦數此因風發之伏氣溫瘧也療法宜柴葛以解表熱知芩以退裡熱半夏以和陰陽參甘以扶元氣加蔥白竹葉引裡熱以達表仿柴葛解肌湯之意處方川柴胡一錢生葛根一錢肥知母三錢淡黃芩錢半生甘草八分法半夏二錢海南參二錢鮮竹葉三十片鮮蔥白三個效果服一劑驟然戰栗遍體大汗不省人事病家驚惶余曰此伏邪外達之象也俗稱發濺正虛邪勝不能相敵之故即時神清能言原方去柴葛蔥白加生石膏水蘆根專清伏熱連服二劑而痊廉按陶氏柴葛解肌湯加減雖為伏溫化瘧之初方然必固風發者始堪暫用以發表其柴胡一味必須川産乃有輕清疏達之妙用否則易青蒿腦可也溫瘧案內科吳宗熙住汕頭永平馬路病者陳御花年五十歲業農住澄海蛇浦鄉病名溫瘧原因內有伏暑外感秋涼兩邪相搏遂變痎瘧證候初感秋涼發熱惡寒數日後忽變痎瘧先熱後寒熱多寒少逐日增劇已延月餘入夜即發譫語心神煩躁口渴引飲小便短少診斷脈左右手寸關兩部俱弦數尺部反浮大重按而虛舌絳津於此久瘧傷陰之症也素問瘧論篇曰夏傷於暑秋必痎瘧又曰先熱後寒名為溫瘧蓋由涼風外襲鬱火內發表裡交爭故往來寒熱纏綿日久正氣已虛其邪已由少陽延及厥陰矣熱迫心包故譫語煩躁熱劫真陰則舌絳津干此時非大救津液安能遏其燎原乎療法喻嘉言曰治溫瘧當知壯水以救陰恐十數發而陰精盡盡則真火自焚而死此論甚中𦽏要宜宗其意以治之故用生地元參麥冬為君以壯水救陰地骨知母蓮子心為臣以退少陰之熱羚角鱉甲為佐以泄厥陰之熱銀胡青蒿為使以解少陽之標處方生地黃四錢元參三錢原麥冬四錢地骨皮四錢知母三錢生鱉甲三錢羚角一錢先煎銀胡八分蓮子心一錢青蒿八分上藥煎湯早晚各服一劑效果服藥二日而譫語平三日而寒熱止始終以此方加減再服三劑而愈矣計共服藥八劑調治一星期而平復廉按溫瘧有二一得之冬中於風寒氣藏於骨髓之中至春則陽氣大發邪氣不能自出因遇大暑腦髓爍肌肉消腠理發泄或有所用力邪氣與汗皆出此病藏於腎其氣先從內出之於外也如是者陰虛而陽盛陽盛則熱矣衰則氣復反入入則陽虛陽虛則寒矣故先熱而後寒名曰溫瘧二其脈如平身無寒但熱骨節煩疼時嘔白虎加桂枝湯主之此案即內經所論之溫瘧方從孟英醫案中脫化而來確係實驗療法非向壁虛造者比溫瘧兼痰厥案內科過允文住宜興徐舍病者吳氏婦年二十八歲住屺亭橋病名溫瘧兼痰厥原因肺素有熱先傷於寒後傷於風證候先微寒後大熱寒時則厥神昏肢冰半時許吐痰數口則厥回而熱大渴大汗氣促便赤診斷金匱論溫瘧與內經互異然陰氣傷為疸瘧肺有熱為溫瘧乃是定論不必拘於微寒與不寒也此證先微寒後大熱脈右洪苔白薄者溫瘧也然來時則厥吐痰則醒明有宿痰內蘊乘瘧竊發互相為患故斷為溫瘧兼痰厥療法桂枝白虎湯加減以膏知蘆根清透伏熱為君花粉石菖蒲玉樞丹豁痰開竅為臣佐桂枝以辛散外寒使甘草以調和諸藥也處方川桂枝四分天花粉三錢鮮石菖一錢剪碎生沖活水蘆根一兩去節生石膏五錢研細肥知母三錢玉樞丹二鍾磨汁研沖生粉甘草五分效果一劑知二劑已惟痰未盡除用外臺竹瀝飲加減淡竹瀝兩瓢生薑汁二三滴梨汁兩瓢加水略滾溫服調理以善後服三劑痰除胃動而愈廉按溫瘧兼痰厥在老年往往一厥不醒內閉外脫而斃此案幸在壯年猶可辛寒泄熱豁痰開竅而蘇然亦險矣藥從漢方加減切合病情故能效如桴鼓可見古方學派不可不悉心研究也熱病案內科陽貫之住華陽縣南打金街病者張心源年二十四歲古董鋪住會府東街病名熱病原因夏月病熱醫者不知辛涼解肌之法妄用表散使伏火上逼鼻血長流不止復用犀角羚羊黃連等藥以清熱將陽邪引入少陰心經變證尤惡舉家忙亂又更醫投承氣湯亦不效證候舌生芒刺譫語不休發熱燥渴白晝稍輕晚間加劇服承氣湯數劑大便亦不通遷延十餘日僅存一息於床褥矣診斷察其脈兩寸俱無兩關之脈時而緊疾時而遲細有不可捉摸之狀此熱邪陷入三陰者也當善下之庶可轉危為安療法病家曰芒硝大黃已食之多矣余曰陽邪傳入陽分則芒硝大黃可以破其堅壘陽邪陷入陰分則芒硝不能為力蓋芒硝鹹寒凝血反使陰經之瘀熱不能轉出陽分而下泄也法當佐熱藥下之凡病在陽分以寒藥下之在陰分以熱藥下之借陽藥為導引直入陰分非用陽藥以去病也通利之後急與養陰退陽扶脾助胃不惟熱藥不可用即稍帶辛燥之藥亦不可用也處方生大黃五錢小枳實三錢鮮生地六錢生甘草八分黑附片五分同煎極熟效果一劑而即通利隨用人參白虎湯出入加減即能起床逮舌苔退盡始改用清補之藥四劑獲愈廉按熱結陽明用石膏大黃以清降之熱陷少陰用犀角羚地以清透之此熱病分經用藥之大要也若大黃與附子並用仲景方亦曾載之不讀古醫書者茫然耳驟見之反詆為方藥雜揉甚矣此事之難知也此案頗有發明學者宜注意之熱病兼寒案內科張錫純住天津病者於君年四十餘住邑北境於常莊病名熱病兼寒原因伏熱初起為風寒所束不得汗醫者治以蘇子降氣湯兼散風清火之品數劑病益進改延豫診證候壯熱無汗胸中煩熱又兼喘促口渴喜飲頭猶覺疼周身猶有拘束之意診斷脈洪滑而浮舌苔白滑微黃此外寒束內熱也療法投以拙擬寒解湯處方畢或問此湯為發表之劑而重用石膏知母微用連翹蟬退何以能得汗答曰用此方者特恐其診脈不真審證不確耳果能真確則服之覆杯可汗勿庸慮此方之不效也處方生石膏一兩搗細肥知母八錢青連翹錢半蟬退錢半去足土效果連服兩劑後須臾上半身即出汗又須臾覺藥力下行其下焦及腿亦皆出汗其病若失廉按伏氣熱病為時邪引動而發者當看其兼挾之邪輕重如何輕者可以兼治重者即當在初起時著意先撤新邪俟新邪既解再治伏邪方不礙手此須權其輕重緩急以定其治法不可豫設成見也此案熱病兼寒方中重用石膏知母以清胃府之熱而復少用連翹蟬退之善達表者引胃中化而欲散之熱仍還太陽作汗而解斯乃調劑陰陽聽其自汗非強發其汗也雖非強發其汗而覆杯之頃須臾汗出而愈審是則寒解湯不但宜於熱病即春溫現此脈證者投之亦必效也疸熱兼寒案內科鄭惠中住杭縣定南鄉病者何鄭氏年三十二歲住杭縣定南鄉何家埠病名疸熱兼寒原因由伏熱內發新涼外搏所致證候頭痛背寒身熱無汗口渴神煩脘腹尤灼便閉溺赤兩足獨冷診斷脈右洪數左浮弦舌赤苔白兼黃此外寒束內熱熱由伏氣即靈樞所謂冬傷於寒春生疸熱是也療法仿葉氏辛涼重劑故用荷杏石甘發表解熱為君佐以梔豉蒡翹之輕宣蘆筍燈心之涼透處方薄荷葉一錢生石膏六錢研細焦山梔三錢炒牛蒡錢半光杏仁三錢生甘草六分淡香豉三錢青連翹四錢先用活水蘆筍一兩燈心五分煎湯代水次診一劑而微微似汗再劑而壯熱大渴大汗淋漓神煩譫語兩足轉溫頻轉矢氣脈右洪大搏數左轉數實舌苔黃糙此熱結胃腸之實火證也實則瀉之與白虎承氣湯急下存津次方生石膏一兩杵生川軍三錢小枳實錢半肥知母四錢元明粉二錢分沖生甘草七分三診一劑而腹中努脹欲便不便二劑而大便通暢熱渴頓除譫止神靜惟小溲赤熱澀痛黃苔退而舌乾於不喜飲脈轉小數按之無力此伏熱去而津液已虧也議保津以清餘熱三方鮮生地五錢天花粉二錢濟銀花錢半鮮茅根一兩去皮鮮石斛四錢毛西參一錢青連翹二錢鮮荷梗一尺切寸效果連服三劑溺利熱淨胃納稀粥後用白茅根一兩鮮石斛三錢煎湯代茶調理旬日而瘳廉按疸熱多發於暮春正立夏陽氣升發之時伏氣自內而出發於陽明者多膏知放膽可用若挾新寒搏束亦當兼發其表表邪先解然後辨其為燥熱則用膏知為實熱則用硝黃一意肅清伏熱其病自愈只要認證清楚確係熱在於胃則白虎承氣依法投之可以取效反掌切勿固疑生怯反致因循貽誤也無如不明醫理者見方中有大黃一味即謂之承氣即謂之攻積因而疑忌多端當用不用坐此貽誤者多矣熱病化燥案內科毛鳳岡住常州病者王珊卿年三十二歲住漕橋病名熱病化燥原因立夏後多食米糕食積化火觸動伏熱而暴發前醫用消導藥二劑病勢反劇證候身灼熱汗自出不惡寒反惡熱口渴引飲譫語發狂便閉溺澀苔厚焦黑診斷脈洪數實而有力脈證合參此伏熱化燥傷寒論所謂陽明之為病胃家實表裡皆熱熱結在裡是也療法仿喻西昌硝黃甘膏湯急下存陰例以救濟之處方元明粉三錢後沖生川軍四錢生石膏一兩研細生甘草五分次診一劑而略便燥矢狂熱漸減再劑而燥便甚多熱退不渴神疲嗜臥醒後神識轉清舌紅微干脈虛數改用吳氏五汁飲養胃陰以善後次方甘蔗汁雅梨汁鮮蘆根汁各兩大瓢生荸薺汁生藕汁各一大瓢重湯燉溫服效果連服三日諸證皆平而瘥廉按熱病者純熱無寒之伏氣也發於春者為疸熱發於夏者為熱病熱化火火就燥理當急下存陰方用喻氏硝黃甘膏藥雖四味瀉火清燥面面圓到一擊而中此素有定見於中乃不為臨岐所炫伏熱咳血案內科陳作仁住南昌大街四川會館病者陳仁獲年五十五歲河南人寓南昌城內病名伏熱咳血原因冬令嚴寒晨起院中散步寒氣外迫伏熱內郁爍肺咳嗽延綿旬余愈咳愈甚一日吸捲烟偶嗆入肺咳嗽尤甚以致血隨痰湧證候咳嗽日久肺已受傷又兼伏火內擾逼血妄行不得歸經一日嗆咳太甚血隨肺氣上湧大吐傾盆殊屬危險診斷左右六脈弦數鼓指此人雖年逾五旬而身體康強察其致病原因參合證象脈候雖視之危險尚不難於療救也療法非重劑滋水養肝以平伏火不可於是重用鮮生地白芍以涼血清火為君以麥冬梔子海石清金降痰為臣以川貝母化痰解鬱為佐以茅根藕節消瘀止血為使處方鮮生地一兩杭白芍五錢杭麥冬五錢黑山梔三錢海浮石三錢川貝母三錢打碎白茅根一兩去衣藕節一兩效果此方連進二劑大吐遂止惟咳痰尚帶血絲仍照原方加栝蔞仁三錢杵訶子肉三錢煨接服三劑至六日後不但吐血痊愈而咳嗽亦因之俱愈矣廉按此治熱傷肺絡之清降方法頗有力量惟偶吸捲烟嗆喉以致咳嘔狂血可為喜吸紙烟者炯戒熱沖頭腦案內科張錫純住天津病者尉之鳳年二十餘住安東病名熱沖頭腦原因時覺有熱起自下焦上衝腦部證候頭巔有似腫脹時作眩暈心中亦時發熱大便乾燥小便黃澀飲食照常身體亦不軟弱診斷脈象洪實其腦部為熱沖激伏有外感熱邪下陷於奇經衝脈中其熱不從外發隨奇經之衝脈由胃而上升巔頂也療法因其身體不弱俾日用生石膏細末四兩煮水當茶飲之若覺涼時即停服次診據述服石膏六七斤上衝之熱見輕而大便微溏因停藥不服診其脈仍然有力問其心中仍然發熱大便自停藥後即不溏矣為開白虎加人參湯方中生石膏重用三兩以生淮山藥代粳米處方生石膏三兩搗細肥知母一兩野臺參六錢生山藥六錢生打粉甘草三錢效果連服六七劑上衝之熱大減因出院還家囑其至家按原方服五六劑病當除根矣廉按內經謂胃為十二經之海其清氣上注於目其悍氣上衝於頭循咽喉上走空竅循眼系入絡腦此案熱沖腦部由胃挾衝脈伏熱上走空竅使然初方重用石膏清胃熱以鎮沖氣接方人參白虎湯加減既降實火又清虛熱功用較一味石膏尤為周到病當除根信非虛語凡能用仲景方法者無不皆然所惜者病家不明醫理往往以對症之經方疑而生畏不敢信用因循貽誤雖有良醫亦莫如之何也矣熱伏膈膜案內科張錫純住天津病者趙君年四十許住奉大小南關病名熱伏膈膜原因伏氣為病不從外潰轉從上蒸證候始則發熱懶食繼則咳嗽吐痰腥臭大便數日一行診斷脈象滑實右脈尤甚舌有黃苔此由伏氣伏於膈膜之下逼近胃口久而化熱不外發為熱病轉上透膈膜熏蒸肺臟致成肺病者也療法投以大劑白虎湯以生山藥代粳米又加利痰解毒之品處方生石膏三兩搗細肥知母一兩生山藥六錢杵粉甘草三錢法半夏六錢栝蔞仁八錢杵青竹茹四錢青連翹三錢效果三劑後病愈強半又即其方加減服至十餘劑痊愈說明石膏之質中含硫養是以涼而能散有透表解肌之力外感有實熱者放膽用之直勝金丹其性一善清頭面之熱二善清咽喉之熱三善清瘟疹之熱四善清痰喘之熱神農本經謂其微寒則性非大寒可知且謂其宜於産乳其性尤純良可知故用生石膏以退外感之實熱誠為有一無二之良藥其用量石膏之質甚重七八錢不過一大撮耳以微寒之藥欲用一大撮撲滅寒溫燎原之熱又何能有大效是以愚用生石膏以治外感實熱輕症亦必至兩許若實熱熾盛又恆重用至四五兩或七八兩或單用或與他藥同用必煎湯三四茶杯分四五次徐徐溫飲下熱退不必盡劑如此多煎徐服者欲以免病家之疑懼且欲其藥力常在上焦中焦而寒涼不至下侵致滑瀉也特是藥房軋細之石膏多系煅者即方中明開生石膏亦恆以煅者充之因煅者為其所素備且又自覺慎重也故凡用生石膏者宜買其整塊明亮者自監視軋細凡石質之藥不軋細則煎不透方的若購自藥肆中難辨其煅與不煅逮將藥煎成石膏凝結藥壺之底傾之不出者必系煅石膏其藥湯即斷不可服廉按伏邪化熱火必剋金則肺臟本為邪熱所當犯之地其或熱壅於胃上熏於膈則熱邪由胃而炎及於肺更為病勢所應有近時烟草盛行肺中津液熏灼成痰阻窒肺隧平日每多痰咳更值伏熱上蒸痰得熱而痰更膠黏熱附痰而熱愈留戀其為咳為喘意中事也肺絡不通則胸脅刺痛熱鬱日甚則痰穢如膿甚或咳紅帶血無非熱灼肺傷所致此時苟伏邪已一律外透則治之者只須清泄肺胃夫病在肺而何以治者必兼及胃蓋肺中之熱悉由胃府上熏清肺而不先清胃則熱之來路不清非釜底抽薪之道也此案熱伏膈膜方用白虎湯加減重用生石膏誠見及於此耳案後發明生石膏之性質功用閲歷精深的是名論孕婦熱竄隧絡案婦科嚴繼春住紹興安昌瑞安橋病者徐氏婦年三十一歲住本鎮徐家摟病名熱竄隧絡原因孕已五月時值夏令手足初覺麻木繼則劇痛專科恐其胎隕用四物湯加減以安胎四劑不應來延豫診證候腹熱口乾四肢串痛不可屈伸小溲短數診斷脈兩尺弦滑右關洪數舌紅苔黃豫斷之曰此伏熱橫竄隧絡也療法清宣絡熱以除痛痛止則胎自安處方鮮竹茹三錢焦山梔三錢白知母三錢大豆卷三錢冬桑葉二錢青子芩錢半東白薇錢半鮮荷梗五寸先用絲瓜絡一兩嫩桑枝一兩煎湯代水效果連服二劑痛止胎安不勞他藥而痊廉按伏熱橫竄隧絡病從旁枝而出乘其勢而宣通之通則不痛兩劑而痊信然胃腸實熱案內科鄭叔漁莊虞卿住麗水第十一中學病者劉式聰乃室年逾四稔體強住西鄉石牛病名胃腸實熱原因初患溫熱又復生産邪熱乘虛而陷入陽明遂成實熱之症證候單熱不寒舌黑口渴兩耳無聞腹痛胸滿大便旬余不解診斷脈左手沉數右手沉實脈證合參此手足陽明實熱證也口渴舌黑邪火內焚者火極似水也大便閉耳無聞者熱蒸清竅也夫胃氣以下行為順今為邪熱蘊結失其下行之效用遂致腹痛胸滿病已結熱在裡非下奪決無生理勿守丹溪産後以大補氣血為主之誡宜遵景嶽産後有火不得不清有內傷停滯不得不開通之訓俟下後病退再服調補之劑療法急則治標仿仲景治産後實熱例用大承氣湯以奪其邪下後即用歸芍地以養其血元麥生草以滋其液治分標本先後庶無實實虛虛之弊處方生錦紋三錢芒硝錢半川朴一錢枳實一錢水六杯先煮枳朴後納硝黃煮取三杯分二次服一劑知即勿服又方當歸身三錢大生地四錢生白芍三錢元參錢半破麥冬三錢生甘草八分效果一日大便利耳能聞舌黑退胸腹舒改服次方旬余就痊廉按辨證處方殊有卓識非精研金匱婦人方者不敢用熱鬱腹痛證案內科陳務齊住梧州四方井街病者封其光年三十餘歲廣西容縣住梧州市軍政界病名熱鬱腹痛證原因勞心過度思慮抑鬱誘因飲食不節過飽過醉食積停滯消化不良素因腸胃積鬱腹中膨脹濕蓄氣聚證候胸腹脹滿隱隱疼痛食則嘔吐繼則腹中絞痛大小便不通輾轉反側眠睡不能坐立更甚歷旬余之久晝夜痛劇欲死肢表厥冷絶粒不食肌肉消瘦面唇指甲青白精神已失奄奄一息診斷診左右六脈沉伏驗診體溫升騰聽診中左呈高音兼帶水泡音以脈參證定為熱鬱腹痛證由食積停滯中氣不暢脾不運則胃逆尤復過飽過醉傷及脾胃助濕生熱且煩勞抑鬱肝木不能下行疏泄木橫助火連合君火升提爍肺刑金金不生水水乾木鬱脾土益受其克消運之官能盡失清陽不能上升濁氣糟粕不能降泄以致二便不通氣聚熱生濕鬱火動肝氣一陷痛遂立發前醫謂濕寒之症用附桂理中湯治之致熱伏心肝血熱凝瘀則肝氣更郁而痛更劇再以溫中治之則外象愈寒脈愈沉細再以溫中理氣治之而熱愈深則脈伏肢厥至成危而欲絶療法急救湯劑用大承氣湯加減方取生軍芒硝桃仁推蕩大腸去宿清熱為君白芍黃芩紅花平肝瀉火去舊生新為臣厚朴枳實鬱金寬中下氣而開鬱結為佐竹瀝水絲瓜絡通關化痰疏通經絡為使一服後痛則略減惟大便仍不通用手術洗滌大腸始得立下燥糞數次而痛立除肢表不厥面唇已新能眠能睡食量略思診脈左右弦數又用清熱逐濕化氣湯取厚朴扁豆蒼朮川連茯苓延胡鬱金木通生軍白芍青皮土薏理氣開鬱運脾土濕清熱降火通經利水三服後大小便如常腹中舒暢食量已進診脈已緩惟元氣已弱又用補氣運脾逐濕湯取其補氣生津健脾和胃利水滲濕活絡寧神處方大承氣湯加減方生軍四錢厚朴三錢芒硝四錢桃仁三錢白芍三錢黃芩四錢紅花二錢鬱金三錢枳實三錢絲瓜絡五錢煎後加竹瀝水一鍾和服又方清熱逐濕化氣湯方厚朴二錢扁豆四錢炒蒼朮一錢黃連二錢茯苓五錢延胡二錢鬱金三錢木通錢半生軍三錢白芍三錢青皮二錢土薏六錢炒煎服三方補氣運脾逐濕湯方防黨五錢五味錢半黃耆二錢白朮錢半淮山藥五錢茯苓五錢麥冬三錢土薏五錢炒棗仁二錢桑寄生三錢煎服效果五日腹痛已除肢表不厥十日食量已迸二十日元氣已復廉按辨證既明處方亦有條理熱伏肝沖案婦科何拯華紹興同善局病者許壽山君夫人年三十四歲住南池病名熱伏肝沖原因內因肝鬱絡瘀外因立夏後天氣暴熱伏熱自內而發證候一起即壯熱自汗渴不惡寒兩脅串疼少腹尤灼氣上衝心心中痛熱飢不欲食食即嘔酸診斷脈左弦澀右弦數舌紫黯此熱伏於衝脈血室之中而瘀留於肝膜孫絡之間也療法通絡化瘀理沖泄熱仿曹仁伯清宣瘀熱湯加減處方真新絳二錢廣鬱金三錢原支磨汁分沖冬桑葉二錢鹽水炒丹皮錢半旋覆花二錢拌左金丸一錢包煎先用活水蘆筍一兩鮮茅根二兩鮮蔥須二分三味煎湯代水次診兩劑後氣衝脅疼自汗嘔酸漸止而外涼內熱少腹尤熾神呆少語或妄見如狂脈仍如前舌轉紫干此由伏熱與瘀互結血得熱而愈形膠固熱附血而愈覺纏綿輾轉籌思惟有仿喻西昌進退法迸則前方加光桃仁二錢醋炒生川軍錢半退則前方加白薇三錢歸鬚一錢姑服各一劑以消息之三診先服進法一劑即行大便一次其色或黃或黑或溏或結神識轉清狂妄即止次日續服退法一劑神識漸昏間發狂妄臍旁衝脈按之動躍而堅脈舌尚無更變再將進法原方加酒炒生川軍錢半鮮生地汁二大瓢分沖四診一劑後腹中大痛宿瘀暢行其色紫黑如醬大便後自汗肢冷暈厥一次脈轉沉弦而軟舌轉淡紫而潤腹灼漸輕衝動亦底姑仿三甲復脈意潛陽育陰之中加人參以扶正氣珠粉以鎮心神四方生鱉甲四錢打左牡蠣四錢生打細生地三錢太子參一錢秋石水炒生龜甲四錢打陳阿膠一錢煬沖生白芍四錢原麥冬二錢辰砂染清炙草八分茄楠香二分沖清童便二瓢沖珍珠粉二分藥湯調服五診連投三劑暈厥即止沖亦不動惟少腹灼熱減而不淨兩脅似脹非脹兩腰似痠非痠胃能漸進米湯脈轉弦軟微數舌色漸轉嫩紅此血液雖已大虧而衝脈尚有餘熱未清也治以育陰養血為君略佐活絡清沖以調理之五方陳阿膠錢半煬沖白歸身一錢東白薇三錢真新絳一錢細生地四錢生白芍四錢紫葳花二錢生橘絡七分先用鮮藕肉四兩小京棗四枚煎湯代水六診四劑忽然宿瘀暢行二三次少腹兩旁發現紫黑細疹然後積瘀伏熱始得一律肅清胃已日進稀粥神氣漸振脈來虛小舌亦紅活當於養陰之中兼扶正氣以善後六方大生地三錢生白芍三錢潞黨參二錢米炒霍石斛一錢白毛先煎白歸身錢半陳阿膠錢半煬沖北沙參三錢廣橘白絡各五分生藕肉四兩青皮甘蔗四節切碎效果連服八劑胃健消穀精神復原而愈廉按瘀熱留於肝沖血絡之中則孫絡蠶叢在細微曲折之處藥力不易於疏通而又不宜於猛劑攻消只有通絡化瘀理沖泄熱之法緩緩圖功如曹仁伯清宣瘀熱湯例雖為中𦽏然必仿喻氏進退法相機而進漸次遞加而瘀熱始能暢解益見肝絡奇經之證最為淹纏治法雖合難奏速效第四五六三方亦皆穩健適度熱結膀胱案內科蕭琢如住湘鄉水口山礦局病者李君年二十餘歲住湘鄉病名熱結膀胱原因先患外感熱病諸醫雜治症屢變醫者卻走其父不遠數十里踵門求診證候面色微黃少腹滿脹身無寒熱坐片刻即怒目注人手拳緊握伸張如欲擊人狀有頃即止嗣復如初診斷脈沉澀舌苔黃暗底面露鮮紅色診畢主人促疏方並詢病因答白病已人血分前醫但知用氣分藥宜其不效內經云血在上善忘血在下如狂此證即傷寒論熱結膀胱其人如狂也療法當用桃仁承氣湯速通其瘀處方光桃仁三錢生錦紋三錢酒洗元明粉二錢分沖紫猺桂五分清炙草七分效果一劑知二劑已嗣以逍遙散加丹梔生地調理而安說明傷寒論云太陽病不解熱結膀胱其人如狂血自下下者愈按熱結膀胱即熱入血室之變文以血室與膀胱相連也其曰其人如狂者即包括小柴胡證譫語妄見在內又曰外解已但少腹急結者桃仁承氣湯主之所謂急結即兼有抵當湯證之硬滿在內病變不一古文簡略讀者當扼定病源即其常以通其變斷不可死於句下所謂知其要者一言而終不知其要流散無窮也廉按膀胱在小腹之間近血海之所膀胱有津液而無血而與胞中之血海相連熱干之陰不勝陽則動胞中之血血結為死魄魄亂其魂是以如狂也此案方用桃仁承氣湯桃得陽春之生氣其仁微苦而湧泄為行血之緩藥得大黃以推陳致新得芒硝以清熱消瘀得甘草以主持於中俾諸藥遂其左宜右有之勢佐以肉桂者辛能行氣氣行而血乃行也惟舒馳遠謂膀胱蓄血與大腸蓄血有別血蓄膀胱者少腹硬滿小便自利大腸蓄血者屎雖鞕而大便反易其色必黑桃仁承氣為大腸蓄血者宜之若太陽蓄血乃為熱結膀胱其去路自應趨前陰而出當用紅花小薊生地歸尾萬年霜之類加入五苓散中從小便以逐其邪庶幾有當其言亦頗有理後之遇此症者對症酌用可也熱入血室案婦科蕭琢如住湘鄉水口山礦局病者黃氏婦年三十餘歲住湘鄉病名熱入血室原因適月事來因感寒中斷舁數十里至余館求診證候往來寒熱少腹及脅下疼痛如被杖手不可近診斷脈弦數舌苔白而暗即傷寒論熱入血室其血必結故使如瘧狀也療法與小柴胡加歸芍桃仁紅花荊芥炭活血通瘀處方川柴胡錢半青子芩一錢酒炒姜半夏錢半清炙草六分當歸鬚二錢赤芍一錢光桃仁三錢片紅花一錢荊芥炭一錢鮮生薑一錢大紅棗兩枚效果連服兩劑大便下黑糞而瘥廉按葉氏謂熱邪陷入血室與血相結必少腹滿癰身體亦重身之側旁氣痹及胸背皆拘束不遂輕者刺期門重者小柴胡湯去甘藥加延胡歸尾桃仁挾寒加肉桂心氣滯者加香附陳皮枳殼等去邪通絡正合其病此案對症處方雖從經方加減而卻與葉法大旨相同熱入血室案婦科蕭琢如住湘鄉水口山礦局病者鄧君之妻年二十四歲住湘鄉病名熱入血室原因小産後患伏熱雜治不痊檢閲前方皆與證反勢已瀕危其夫倉皇乞診證候身大熱多汗少腹硬痛痛處手不可近溲便皆不通利診斷脈弦數舌色紅而苔白此瘀血停蓄為患也療法本宜桃仁承氣湯以病久人困慮其難於勝受乃變通用四物湯去地黃加桃仁紅花肉桂醋炒大黃以緩通之處方歸尾錢半赤芍三錢川芎一錢光桃仁二錢片紅花一錢紫猺桂五分醋炒生川軍錢半效果一劑下黑糞甚多痛減七八再劑而愈廉按王孟英謂熱入血室有三證如經水適來因熱邪陷入而搏結不行者此宜破其血結若經水適斷而邪乘血舍之空虛以襲之者宜養營以清熱其邪熱傳營逼血妄行致經未當期而至者宜清熱以安營此案熱入血室由瘀熱互結不行自應活血通絡以破其結方用四物湯加減較之桃仁承氣雖為和緩而桃紅桂軍等四味通瘀亦頗著力宜其投之輒效也熱入血室變子宮炎案婦科張錫純住天津病者張溫卿之夫人年三十餘住南皮病名熱入血室變子宮炎原因據述前因恆覺少腹切疼英醫謂系子宮炎症用藥數次無效繼乃謂此病如欲除根須用手術剖割將生炎之處其腐爛者去淨然後敷藥能愈病人懼而辭之後至奉又延日醫治療用坐藥兼內服藥稍愈至壬戌夏令病浸增劇時時疼痛問下膿血至癸亥正初延愚診治證候疼處覺熱以涼手尉之稍愈上焦亦時覺煩躁診斷脈弦而有力尺脈尤甚此係曾受外感熱入血室醫者不知治以小柴胡湯加石膏外感雖解而血室之熱未清下陷子宮阻塞氣化以致子宮生炎浸至潰爛膿血下注療法用金銀花乳香沒藥甘草以解其毒天花粉知母玄參以清其熱復本小柴胡湯方義少加柴胡提其下陷之熱上出諸藥煎湯送服三七細末二錢以化腐生新處方銀花三錢乳香一錢天花粉三錢玄參六錢甘草錢半沒藥一錢肥知母四錢川柴胡一錢參三七二錢研細藥湯送服次診疼似稍輕其熱仍不少退因思此症原系外感稽留之熱非石膏不能解也遂於原方中加生石膏一兩後漸加至二兩效果連服三劑熱退強半疼亦大減遂去石膏服數劑漸將涼藥減少復少加健胃之品共服藥三十劑痊愈廉按子宮生炎患處必紅腫熱病延久則潰爛亦必兼下膿血現今專科多從淫毒證治外用洗法內用龍膽瀉肝湯重加土茯苓為主此案悟到熱入血室血聚成炎熏灼既久浸至潰爛流膿方用解毒清熱化腐生新痛雖稍減而外感稽留之熱仍不稍退必加生石膏一二兩伏熱大退而痛亦大減益見熱入血室之原因確有特徵熱病發狂案婦科嚴繼春住紹興安昌瑞安橋病者沈氏婦年二十一歲住蓬山病名熱病發狂原因素因肝鬱多痰現因今年夏令伏熱內發猝驚發狂證候初起壯熱心跳頭暈目眩繼即狂證陡發或笑或罵不避親疏甚則毀器登高診斷脈弦滑而數舌紅苔白此丹溪所謂熱生痰痰生風風陽內鼓激動心神而為陽狂也療法清伏熱以安神息風陽以滌痰處方生石膏一兩杵先煎白知母三錢陳膽星一錢老竹黃二錢辰砂一錢拌碧玉散三錢包煎川楝子三錢淡竹瀝兩瓢沖先用生鐵落一兩滾痰丸四錢包煎煎湯代水次診一劑而脈之弦滑略減苔色轉黃而狂莫可制二劑而腹痛大便色如紅醬兼有白色膠痰而狂勢頓平惟氣上衝心心築築然動肢冷自汗眩暈欲厥此痰熱下泄而風陽未平前則入陽則狂今則入陰欲厥也治以潛鎮清熄平定風陽次方左牡蠣四錢生打青龍齒三錢生打桑麻丸四錢拌磁殊丸六錢包煎真珠母八錢生打生鱉甲四錢打小川連六分鹽水炒川楝子錢半宣木瓜錢半淡竹茹三錢先用鮮茅根童桑枝各一兩燈心五分三味煎湯代水三診厥雖止而脘中疼肢微溫而汗仍出口苦便澀小溲短黃脈弦兼數舌苔黃薄此雖熱微厥亦微而肝陽上犯胃脘也當以柔肝和胃治其本澗腸利溺治其標三方左牡蠣四錢生打生白芍三錢蜜炙延胡錢半冬桑葉二錢烏賊骨三錢清炙草五分川楝子錢半淡竹茹三錢先用漂淡陳海蜇四兩大地粟四個煎湯代水效果連進三劑便潤溺利諸證皆平後用黃草石斛三錢淮小麥三錢生藕肉四兩大紅棗四枚煎湯代茶調養旬余而瘳廉按發狂雖有陰陽虛實經絡臟腑新久之異要皆必經心肝兩臟而發以心藏神主知識肝藏魂主行為未有神魂清醒而昏狂迷妄至於此極者也此案胃熱蒸心陽盛發狂其主因也而肝鬱挾痰其素因也猝然受驚其誘因也初方用加減鐵落飲瀉肝火以滌膠痰接方用潛鎮清熄以定風陽三方柔肝和胃潤腸利溺標本兼顧法皆中的宜其所投輒效諸證悉平熱病子癇案婦科嚴繼春住紹興安昌瑞安橋病者胡陳氏年三十四歲住馬回橋病名熱病癇厥原因孕已七月腹中早有伏熱時時心煩不為之醫治適因與夫反目號哭半日怒火上衝陡發癇厥證候初則讝語不已兩手發痙目竄上視不省人事約半時許口吐涎沫神識即醒繼則手足瘛瘲神昏發厥問之不語診斷脈六部弦洪有力舌紅帶紫此陳良甫所謂子癇由心肝熱盛鼓風氣升痰升刺激腦筋頓失知覺運動之常所以癇而且厥也似此脈證胎防抽壞姑以急救母命為首要療法急急大瀉心肝之火故以連芩芍膽為君然火假風威風助火勢故以羚麻桑菊為臣使火息風平則腦筋自安腦筋安而癇厥自止佐以馬寶西黃異類靈動之品以開痰清神使以竹茹清肝絡以舒筋也處方小川連一錢生白芍五錢明天麻錢半白池菊二錢青子芩三錢龍膽草一錢鹽水炒冬桑葉二錢淡竹茹三錢先用羚角片八分真馬寶一分西牛黃一分煎湯調下次診據述先進羚角煎調馬寶散二服昏厥已醒癇愈其半繼服湯藥兩煎猶覺胎熱上衝時欲眩暈診脈寸大於關關大於尺均兼弦數此肝風尚未盡息挾痰火與胎熱同逆而上即産科書所謂子懸證也議以潛鎮清熄使肝陽潛而風息風息則火降痰平痰平則諸證悉除矣次方石決明八錢生打冬桑葉三錢明天麻錢半鹽水炒川連七分青龍齒三錢打白池菊二錢辰茯神四錢陳木瓜一錢先用金銀戒指各一枚燈心三小帚煎湯代水三診眩暈大減胎上衝心亦輕惟腹中自覺內熱胎動不安便祕溺澀幸而脈弦轉柔數象漸緩舌紅潤略現薄苔此心肝火平而伏熱未清也議清伏熱以安胎三方青子芩錢半東白薇三錢冬桑葉二錢絲瓜絡三錢帶子生白芍三錢生甘草五分淡竹茹三錢肥知母三錢先用淡海蜇四兩大地栗四個煎湯代水四診一劑而胎動漸安二劑而大便已通色如紅醬溺雖利而尚熱脈兩尺滑博此胎未抽壞可知議養胃陰為君兼清餘熱四方鮮石斛三錢原麥冬錢半冬桑葉二錢青皮甘蔗四節切碎北沙參三錢生白芍三錢淡竹茹二錢雅梨肉一兩一片效果連服四劑胃納日增精神漸復而瘥廉按妊婦熱病癇厥較但病風痙者尤重方用龍膽瀉肝合黃連瀉心加味前哲陸肖愚曾用此法而效妙在先用羚角湯送服馬寶西黃較之陸氏方法更為著力惟就余所驗馬寶雖為子癇之特效藥服後往往癇厥即除隔二三日或四五日胎亦隨落此案幸而保全殆由孕婦素稟尚強胎元亦足之故歟伏熱痙厥案內科周小農住無錫病者殷壽根妻年近而立住上俞巷病名伏熱痙厥原因先因其夫足蹩情志抑鬱繼因感受首夏天時暴熱引動伏邪挾素有之肝鬱一起即痙且厥至明日鄉愚以為鬼所祟先延巫禳繼請余診證候先發大寒復厚被二副熱不外揚而從內竄兩手痙動呻吟煩躁大叫呼熱隨即口噤昏厥不省已一日夜矣診斷據初病時脈躁疾異常茲則肢痙強直脈右數左伏口噤以竹箸抉齒視苔白知其氣閉邪陷厥陰也療法初以臥龍丹吹鼻不嚏繼以逼迫瓶射薄荷精並以大指掐右手背威靈穴目睜得嚏七八次頓覺汗出遍體蘇來連聲難過口渴呼飲再診左脈已起藥擬清熱解鬱化痰息風處方泡射干一錢廣鬱金三錢生打淡豆豉三錢黑山梔三錢丹皮三錢雙鉤藤五錢珍珠母一兩生打石決明八錢生打淡竹茹二錢竺黃錢半青連翹三錢濟銀花三錢滁菊花三錢九節石菖蒲七分先用茅根一兩薄荷一錢化服至寶丹一丸後服湯藥效果服藥後神清痙定惟胸脘窒悶續與清熱調氣即愈康按伏熱而兼挾外感者則以新邪引動伏氣為病若伏熱而兼內傷者則因內傷而留滯伏熱不得爽達治之不得其法每有因此淹纏致成壞證者即如平時有氣鬱之病則肝氣不暢絡氣鬱滯熱邪竄入肝絡即有胸板脅刺咳逆等證邪郁不達久而化火即蒙冒厥陰而有昏痙之變此案伏熱痙厥即邪竄厥陰之明證蓋足厥陰肝脈上達巔頂巔頂即神經中樞伏熱挾肝火刺激神經故一起即痙且厥法用逼迫瓶射薄荷精大指掐右手背威靈穴卻為開閉醒厥之要訣方用清熱解鬱化疾熄風固屬正治妙在至寶丹用異類靈動之品直清神經故服後神清痙定速奏膚功此等內外並治後學當注意之熱病殞胎案婦科嚴繼春住紹興安昌瑞安橋病者範蔚卿之侄媳陳氏年三十餘住范家埭病名熱病殞胎原因仲夏熱自內發身不甚熱晉城就産科錢某診視用四物湯去芎加子芩白朮蘇梗砂殼阿膠杜仲川斷等出入為方專以補血安胎旬日勢已垂危不克坐船改延豫診證候面紅齒燥斜目弄舌神識昏厥日穢噴人手足瘛瘲腹熱如烙舌伸出口約有半寸便祕溺無診斷脈兩寸關洪數兩尺如無舌青紫而燥邊尖鮮紅如殊豫斷之曰此伏熱盤踞腹中內蒸殞胎胎已早腐欲保胎而胎反不保者由不知清透伏熱徒以滋補助其熱熱遏久灼則胎自腐也療法宜急下之或可冀幸若猶欲保胎非但胎不可保即孕婦生命亦可立傾其家力懇墮胎方遂以調胃承氣合犀角地黃湯加味處方生川軍四錢元明粉三錢後入生赤芍三錢毛西參三錢黑犀角五分磨沖鮮生地八錢粉丹皮三錢生甘草一錢先用生淮牛膝一兩益母草一兩燈心五分煎湯代水次診連服兩煎胎落果已臭爛形色青紫而神氣即清諸症大減腹熱亦輕舌紅而青亦退尺脈已起余亦小數當通絡瘀以清餘熱次方益母草五錢蘇丹參三錢丹皮三錢鮮生地三錢童便一杯沖真西珀八分拌研飛滑石四錢包煎淨楂肉三錢鮮茅根八錢去皮效果三劑後瘀行胃動粥食日加後以生藕肉四兩紅棗四枚煎湯代茶調理旬余而疹廉按咎氏産寶謂面赤舌青則其子必死面青舌赤則其母必亡若面舌俱見青色口角兩邊流涎沫者則子母二命俱不能保也就余所驗亦不盡然此案熱病系實邪誤補則助熱殞胎必然之勢所云急下或可冀幸語亦園活往往所見胎下之後母命隨之而殞者亦甚多必腐胎下後熱退神清別無變症方可許入坦途雖然凡一應殤胎子死腹中者須當急下勿使上奔心胸然必驗其舌青面赤肚腹脹大腹冷如冰口中有穢氣出者方可議下然猶必審其人之虛實寒熱或宜寒下或宜溫下或宜峻下或宜輕下隨其宜而施之方免貽誤上熱下寒案內科蕭琢如住湘鄉水口山礦局病者寧鄉王生年近二十肄業中學病名上熱下寒原因得外感數月屢變不愈取視前所服方皆時俗清利搔不著癢之品證候胸滿上身熱而汗出腰以下惡風時夏曆六月以被圍繞診斷脈弦舌苔淡黃此上熱下寒證時醫不能知之余遵張仲景古方治之不必疑阻保無他虞療法與附子瀉心湯清上溫下處方黑附塊一錢煮取汁生川軍一錢小川連六分片黃芩六分上三黃以麻沸湯漬之須臾絞去滓納附子汁分溫再服效果閲二日復診云藥完二劑疾如失矣為疏善後方而歸廉按傷寒倫太陽篇下心下痞而復惡寒汗出者附子瀉心湯主之此案證雖與傷寒論所載同中有異而其為上熱下寒則一也故借用附子瀉心湯正合妙在附子專煮扶陽暖下欲其熟而性重三黃湯漬開痞清上欲其生而性輕也真熱假寒案內科陳務齊住梧州四方井街病者何仲西年三十歲廣東番禹縣住廣西梧州商業體壯病名真熱假寒原因不究衛生過飽過醉復食生果以致消化不良物質停留腸胃蓄濕鬱而生熱又因冷水洗浴寒邪外束火熱內郁正氣不暢血凝不運證候惡寒戰栗四肢厥冷腹中脹滿大便不行繼則人事不省面青唇白目直口開脈厥氣微全體俱厥指甲青白舌白微澀診斷診既無脈四肢厥直體亦凍冷胸間微暖氣息似絶以手按口鼻亦無氣息動靜以鵝絨按鼻門始見微動斷是假死以手探其舌微澀定是真熱假寒之證諒因醉飽太過正氣不運消化不良脾胃鬱結二便不通蘊聚上逼入心適遇冷水洗浴外寒一束血氣頓停不運則昏懵無知前醫謂中寒之症以重劑附桂理中湯治之過為燥逼熱邪攻心關竅閉塞而心之英靈盡喪故為昏倒肢體俱厥氣脈俱絶外面所現寒凝內則實熱之證當急急救治緩則無效矣療法湯劑用羚犀蓮珀湯取羚犀蓮心竹瀝清心攻熱通竅化痰為君生軍木通元明粉推蕩大腸而通小水為臣白芍黃芩叉斛瀉火平肝潤胃生津為佐茯神琥珀鎮心寧神而挽英靈為使急煎頻頻灌下待數時藥盡後四肢漸軟竟刻而脈始隱隱微微再將方連二服頻灌次日則脈起而弦數面唇紅潤目已轉睛肢體不厥小便已得點滴略能言語又用大承氣湯加犀角蓮心竹瀝茯神取其清心寧神通關化痰推蕩腸胃泄其鬱熱服後則精神略好惟燥渴連連診脈仍數又用平胃潤燥湯取其生津清熱降火利水處方羚犀蓮珀湯方羚羊角錢半磨犀尖三錢蓮子心一錢生大黃四錢淮木通二錢元明粉四錢生白芍二錢黃芩肉三錢叉石斛三錢云茯神四錢血琥珀二錢末沖煎後加竹瀝一大碗沖和服次方大承氣湯加犀蓮竹瀝茯神方生大黃五錢川厚朴二錢川枳實三錢元明粉四錢磨犀尖三錢蓮心八錢云茯神五錢煎後加竹瀝一小碗沖和服三方平胃潤燥湯叉石斛三錢肥知母三錢生石膏五錢淡竹葉錢半天花粉三錢破麥冬四錢生地黃三錢生白芍二錢川厚朴二錢雲茯苓四錢煎服效果三日人事已醒肢體厥除脈復能言五日大小便如常食量略進十日元氣己復廉按此案之真熱實因前醫用附桂理中所釀而致故以犀羚蓮珀投之遂能見效後二方亦用之得法熱瀉案內科張堯詢住新化南門外病者歐陽晏氏年逾五旬住新化縣城向化街病名熱瀉原因體素虛寒喜服溫補緣去秋朝香南嶽途中炎熱日飲冷水解渴及歸遂得瀉病迄今秋歷歲有餘矣證候每夜二鼓腹痛即瀉瀉後痛止三四五鼓每鼓輒痛每痛輒瀉痛不喜按每夜五六次日三四次口苦渴咳多痰小便短臥不安氣息欲絶診斷脈細滑而數按之鼓指以脈參證為熱瀉也經曰時感於寒則受病微則為咳甚者為瀉為痛形寒飲冷則傷肺夫飲冷即內傷寒傷肺病微為咳傷脾病甚為瀉為痛以肺主咳嗽脾主飧泄也此指初受寒即病瀉痛者其為寒瀉寒痛可知逮寒積久化為熱濕脾惡濕傳入大腸即瀉當臍而痛其為熱瀉熱痛亦可知乃醫因年老體素虛寒輒用溫補理雖近似殊不知愈補愈瀉愈溫愈熱為大謬也若再誤治則陰將亡而命立傾矣療法養陰止瀉因用白芍甘草為君救陰緩中而除痛用阿膠川貝栝蔞為臣養血潤燥而豁痰用茯神苡米芡實為佐去濕利水而補脾用伏龍肝燈草為使澀腸和胃而清水道然不補氣無以生津用洋參以長精神而輔正氣並用氣血沖和之人乳沖服之處方東白芍五錢甘草二錢真阿膠二錢煬沖川貝母三錢栝蔞根三錢南芡實三錢薏苡三錢辰茯神三錢西洋參五分伏龍肝一撮燈草一握人乳二小瓢沖服效果二劑瀉痛減三劑心神安咳痰亦少調養半月病遂如失廉按熱瀉兼痛乃肝陽乘脾之候方用芍草為君遵內經酸泄甘緩之法余藥亦面面顧到看似平常實則頗費心機積熱化瀉案兒科吳宗熙住汕頭永平馬路病者鄭友嘉年十二歲住汕頭病名積熱化瀉原因初因傷暑發熱腹痛水瀉服濟衆水而瀉止熱與痛更甚繼服香薷飲病益增劇改服白虎湯等藥亦不覺其效病延七八大證候午後熱甚夜分譫語舌苔黃厚焦燥口渴引飲臍腹絞痛診斷脈沉滑數右手重按實而有力此陽明實證化為痛瀉也傷寒論曰陽明病譫語有潮熱反不能食者腸中有燥屎五六枚也蓋胃有支絡上通於心故熱盛蒸心則為譫語燥屎在大腸則腹痛夜分潮熱者陽明旺於申西之時也初因傷暑自瀉邪有去路乃其吉兆反遽止之留於腸胃劫爍津液苟非急下救陰則燎原之勢安能遏乎療法仿三一承氣湯加減經云熱淫於內治以鹹寒火淫於內治以苦寒故君大黃之苦寒以瀉熱臣芒硝之鹹寒以軟堅更佐甘草之和以緩硝黃直下之性俾腸胃積熱皆得從容下行復使以枳實行氣寬中直達幽門俾積熱速從大腸排泄也處方生大黃三錢粉甘草錢半芒硝四錢枳實一錢上藥三味先煎去滓再納芒硝更上火微煎令沸分二次溫服次診服後三小時大便下堅糞數枚再服余藥少頃穢粕雜下腹痛頓止是夜譫語不作餘熱未淨改用甘寒退熱法復方生石膏三錢白知母二錢半甘草五分粳米一百粒淡竹葉二錢生蘆根三錢原麥冬三錢煎湯日服一劑效果三日而痊稀粥淡養數天平復如常廉按積熱化瀉夏令最多必先通因通用此為自然療法若反其道而行之變症百出病勢之常也此案辨證處方頗有膽識學者深可為則伏熱痢案內科張錫純住天津病者王劍秋年四十陸軍團長住奉天鐵嶺病名伏熱痢原因已未春遠戍鄭州北人居南夏日不堪褥暑至盂秋病痢還奉先入日人所設南滿醫院醫治旬日無效遂來院求為診治證候其病先泄瀉旬日繼變痢疾赤白稠黏腹疼重墜一日夜十五六次且自覺腹涼恆用熱水囊尉之診斷脈弦有力左部尤甚知其下久陰虛肝膽猶蘊有實熱也療法因曉之曰此證原無寒不必尉以熱水囊投以滋陰清肝之品病當立愈處方懷山藥一兩生白頭翁四錢生白芍四錢北秦皮三錢生地榆三錢生甘草二錢旱三七三錢細末鴉膽子六十粒去皮揀成實者藥共八味先用白糖水送服三七鴉膽子此藥須囫圇吞不可嚼破各一半即將餘六味煎湯服當日煎渣再服亦先服所餘之三七及鴉膽子此方載拙著衷中參西録名通變白頭翁方後論所以通變經方之義甚詳宜參觀效果如法服藥一劑其痢即愈又變為瀉日四五次自言腹中涼甚尉以熱水囊則稍愈急欲服溫補之藥然其脈仍無寒象乃為其再三懇求心稍遊移少為開溫補之品服後仍變為痢下墜腹疼如故至斯病者亦自知決非寒涼遂又急服第一方一劑痢又愈繼用調補脾胃兼消食利水之品數劑其瀉亦愈康按厥陰熱痢丹溪謂之肝痢此案用白頭翁湯加減清解熱毒兼滋陰血確為穩健有效之良方與金匱治産後下痢虛極用白頭翁加甘草阿膠湯理法相同熱痢傷陰案婦科何拯華紹興同善局病者施天寶之妻年三十五歲住測水牌病名熱痢傷陰原因素因血虛肝旺秋患熱痢多日所服皆枳朴楂曲木香檳榔蔞仁導滯丸等一派消導攻痢等藥病遂傷及肝腎而大變證候五色雜下瀕頻虛坐厄逆不食腹中空痛診斷脈兩尺獨大餘弦小數舌起雪花脈症合參此久痢傷及肝腎張仲景所謂五液注下臍中築痛命將難全也療法當用熟地歸芍阿膠補其肝腎為君牡蠣龜甲降其沖逆為臣佐以旋覆刀豆除其厄使以鮮斛炙草調其胃以胃為腎之關仿張會卿胃關煎之意力圖挽救於什一處方春砂仁三分拌搗大熟地五錢白歸身錢半生白芍三錢陳阿膠錢半煬沖生打左牡蠣四錢龜甲心四錢生打旋覆花錢半絹包煎刀豆子四錢鹽水煅鮮石斛四錢清炙粉甘草八分效果連服四劑厄逆止雪花苔退惟下痢虛坐不減原方加鮮稻穗炒香鮮荷葉赤石脂禹餘糧去旋覆刀豆再迸四劑虛痢已止原方再加米炒潞黨參錢半小京棗四枚疊進四劑胃動復元而愈廉按熱痢傷陰直至厄逆不食舌苔雪花病勢危險已達極點方用大劑育陰潛陽鎮納肝沖雖屬對症發藥然病勢至此不效者多此婦幸獲痊愈已僥幸萬分矣惟為醫者心存濟世志在救人雖遇百唯一活之證亦當作萬有一生之想豈可見危而不受命哉如果知難即退在醫者自為計則得矣其如病人之生命何伏熱五色痢案內科陳憩南住潮安全山腳病者林兆臣年三十六歲麵粉商揭陽人住汕頭病名伏熱五色痢原因七月中旬偕友登山涉水滿攜香蕉龍眼藉以充飢歸途遇雨入夜即發熱惡寒天明病痢輾轉誤治致動五臟鬱火證候四肢厥冷身熱腹痛右臍旁跳動一分鐘約行二三次青白黃紅臭穢令人欲嘔合目譫語奄奄一息診斷六脈細數帶弦沉分有神余謂病家曰冤哉此證也書曰大實有羸狀其是之謂乎核原證內傷生冷外感風寒當時若照夾食傷寒例治之愈矣乃細閲前醫諸方類皆實實妄企邀功今畏虛虛爭先卸手查近世治痢專書列入死症者五條一曰發熱不休亡陰也二曰飲食不入邪傷胃也三曰發嘔毒上攻也四曰狀如豚肝大小腸爛也五曰下血如屋漏脾氣敗也今發熱雖不休而有時畏冷飲食雖不入然啖生梨尚能知味至於嘔則無之糞雜五色原非豚肝更衣縱頻豈曰屋漏倘能施醫緩之妙術猶可延晉景以嘗新療法主熱淫於內治以鹹寒之旨先用犀角一錢生磨開水沖次用鮮金銀花帶葉一撮荸薺十四粒生蘿蔔一兩青皮梨留皮去心一個搗取汁令少沸溫服繼用湯藥專以清宣五臟鬱火清熱宣郁湯主之處方清熱宣郁湯自制驗方羚角片錢半先煎蘇麥冬二錢生石膏四錢研細元明粉錢半沖鉤藤鉤錢半淡竹葉錢半牡丹皮錢半地骨皮四錢白頭翁三錢金銀花三錢肥知母三錢杭白芍三錢效果一劑積穢盡下神識稍清再一劑諸恙大減三劑能食嗣養陰和胃病遂霍然廉按五色痢者即青黃赤白黑雜下也青者膽汁黃者糞赤者血白者膿黑者宿垢最重難治症雖有實有虛畢竟虛多而實少實證屬毒火虛證屬陰虧此案本屬伏火與積熱互結不解由前醫誤治以致毒火下逼而痢咸五色故純用清透潤降而痊究較陰虧證為易治
