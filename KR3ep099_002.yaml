body:
  text: 第二卷寒淫病案傷寒案內科陳作仁住南昌中大街四川會館病者周保善四十一歲江西新建人往南昌城內病名傷寒原因初春積雪未消晨起窗外閒步偶感風寒即傷太陽經證候發熱頭痛遍體痠疼項強惡寒蒙被數層戰慄無汗病勢甚暴診斷左寸脈浮緊而數右關尺兩脈亦緊數脈證合參知系風寒兩傷太陽之經證也療法仿仲景麻桂各半湯主之蓋初傷風寒法宜發表故以麻黃為君杏仁為臣桂枝解肌為佐甘草薑棗和胃為使又恐麻黃過猛傷陰故加白芍以斂陰處方淨麻黃八分先煎去沫桂枝尖一錢光杏仁二錢去皮尖杭白芍二錢生甘草一錢鮮生薑三片大紅棗四枚效果服此藥時令食熱稀粥一碗以助藥力始進一劑得汗熱減各症均已小愈惟口乾思飲大便不通寒已化熱改以仲景人參白虎湯加味以逐餘邪原方加白芍陳皮薄荷者亦取行氣和血兼涼散之意又方潞黨參三錢生石膏五錢研細肥知母二錢生甘草錢半白粳米一兩夏布包外加杭白芍二錢廣陳皮一錢蘇薄荷六分此方又接進二劑七日內各症痊愈廉按風寒兩傷太陽用麻桂各半湯泄衛和營固屬長沙正法即寒已化熱口乾思飲且大便秘邪熱已傳陽明之候白虎湯法亦屬仲聖薪傳惟案中未曾敘明氣虛潞黨參一味未免用得太驟陽虛傷寒案內科袁桂生住鎮江京口病者駱達三年約四十餘歲住本鎮病名陽虛傷寒原因素稟陽虛新感外寒而發證候頭痛惡寒飲食無味診斷脈息小滑舌苔滑白病勢方張慎防變重療法姑用蔥豉二陳湯加荊芥紫蘇疏散風寒以表達之處方鮮蔥白四枚淡豆豉三錢荊芥穗錢半紫蘇葉錢半姜半夏三錢廣橘皮一錢次診此藥服後忽喘息不能臥頭腦中覺熱氣上升小腹左偏作痛嘔吐痰水畏寒手指厥冷脈息沉弱蓋陽虛受寒之病得發散而陽氣益虛也其頭腦中覺熱氣上升者腦力素衰寒氣逼龍雷之火上越也其喘息不能臥者肺腎兩虛不能納氣也其腹痛嘔吐痰水者寒氣內擾氣血不能通調也其畏寒手指作冷者虛寒病之本相也乃與理中湯合六君子湯加味次方別直參一錢炒白朮二錢黑炮姜一錢炙甘草八分雲茯苓三錢姜半夏二錢廣橘皮一錢上猺桂八分東白芍三錢五味子六分三診服後喘吐俱平腹痛亦止能進稀粥半碗但仍覺畏寒手冷益信為陽虛矣三方別直參一錢炒白朮二錢黑炮姜一錢炙甘草八分姜半夏二錢四診午後復診則汗止安睡手足俱轉溫矣仍以前方又進一劑效果自是遂能進粥遂以六君子湯資生丸等藥調養半月而痊廉按傷寒當行發表者必察其人本氣陰陽無虧方可徑用若真陽素虧平日惡寒喜熱慣服辛溫大便溏滑者此為陰臟宜加附子炮薑黃耆白朮於發表藥中助陽御表庶兔虛陽外越之弊此案汗劑雖輕幾致虛陽上越變症蜂起幸而改用溫補得力在理中湯一方能用仲景之方以鏟病根獲效所以神速雖小有風波而終歸平靜夏月傷寒案內科周小農住無錫病者王子珊年三十餘住滬南病名夏月傷寒原因丙午夏抄感冒新涼就他醫服梔豉香薷滑蘇等劑纖毫無汗而形寒可披絨衫證候熱不甚口亦不渴凜寒無汗診斷脈濡苔白此傷寒非傷暑也療法但用外治處方用浮萍薄荷蒼朮蘇葉蔥姜各五錢大劑使其避風煎沸浴之復薄裳而臥效果遍身汗出凜寒遂解廉按此為體實者而設若虛者熏足復衣亦可取汗傷寒失表案內科陳作仁住南昌中大街四川會館病者趙仰亭四十二歲江西南昌人住進賢門外病名傷寒失表原因真傷寒證遷延日久寒化為熱津液受傷證候頭痛項強大熱無汗口渴引飲小便短赤大便旬日不通異常煩躁診斷兩關脈洪數鼓指舌苔邊白中黃似此表證未除里證又急即仲景用大青龍湯之候也療法仿長沙聖法兩解之用麻黃髮表為君杏仁助麻黃為臣以桂枝甘草薑棗解肌為佐以石膏質重泄熱氣腥達表為使又恐麻黃過猛傷陰故加白芍以斂陰津處方淨麻黃八分先煎去沫光杏仁三錢去皮尖桂枝尖一錢生石膏一兩研細生甘草錢半杭白芍二錢鮮生薑三小片大紅棗五枚次診連進二劑得汗熱減病勢已有轉機惟口渴煩躁未除又仿仲景竹葉石膏湯加減續迸原方減去半夏者為不嘔也加白芍陳皮者以行氣活血較原方稍靈活也次方淡竹葉三錢生石膏六錢研細潞黨參三錢杭寸冬三錢生甘草錢半白粳米一兩以夏布包同煎杭白芍二錢廣陳皮八分鮮生薑三片效果又疊進三劑各證逐漸就痊廉按傷寒失表自以達表為首要今仿大青龍法輕用麻桂重用石膏發表清裡雙方並進始能發辛涼解熱之汗服後得汗熱減病有轉機固已惟熱傷津液繼用竹葉石膏湯法清熱生津頗為愜當可謂深得仲景薪傳矣陰證傷寒案內科王經邦住天台柵門樓病者劉銘彝年二十八歲天台縣知縣病名陰證傷寒原因臘月廿八日去西鄉白坭坦壓回即傷陰寒證候惡寒甚劇戰慄動搖烘以烈火頃刻不離舌苔邊自中黑而滑診斷脈沉而緊沉緊為寒傷於裡傷寒論所謂無熱惡寒者發於陰也療法初服麻黃湯不應繼用附子理中湯加味溫下理中以祛寒處方高麗參一錢炒居術二錢淡附片錢半炒川薑一錢炙甘草一錢蔥白九枚生薑二錢效果服一劑即遍身大汗寒邪悉退而愈廉按陰證傷寒多由於病者元陽素弱不勝陰寒之侵逼一傷寒即直入陰經因其身不發熱故俗稱陰證傷寒其實是陰經傷寒也麻黃湯專治寒傷陽經宜其不效幸而轉機尚捷改用附子理中加味扶陽理中辛溫逐寒一劑即汗出寒退否則恐吐利厥逆驟變虛脫之危候矣傷寒陰結案內科劉榮年住歷城東流水病者劉景熹年三十餘織布廠經理住省城病名傷寒陰結原因冬月傷寒誤服寒瀉藥而成證侯身體惡寒腹脹滿痛不大便者二日診斷脈浮大而緩顯系傷風寒中證醫家不察誤為陽明府證誤用大黃芒硝等藥下之殊不知有一分惡寒即表證未罷雖兼有里證亦當先治其表仲景之遺法具在今因誤用寒瀉藥以致寒氣凝結上下不通故不能大便腹脹大而痛更甚也幸尚在中年體質強健尚為易治療法用桂枝湯去芍藥加附子以溫行之則所服硝黃得陽藥運行而反為我用也處方桂枝尖一錢黑附子一錢炙甘草五分生薑一錢大棗二個去核效果服藥後未及十分鐘即大瀉兩次惡寒腹脹痛均除而痊康按桂枚附子湯本治風濕相搏之寒證今藉以治誤用寒瀉之陰結雖為救藥誤而設然投之輒效足見仲景經方之妙用無窮也傷寒誤遏案內科李伯鴻住汕頭仁安里病者俞金寶年三十餘政界住汕頭病名傷寒誤遏原因旅行遇雨感冒發熱中醫誤用白虎湯以致表邪內陷寒熱如瘧西醫誤以金雞納霜止瘧而病遂劇證侯嗇嗇惡寒淅淅惡風翕翕發熱鼻乾口渴頭痛骨節痛咳喘煩躁小便熱赤診斷左寸浮緊右尺洪實脈證合參乃太陽兩傷風寒邪從熱化內犯肺經也療法張氏沖和湯加減以羌活治太陽肢節痛為主副以防風驅風寒蒼朮去風濕芷芎除頭痛片芩清肺熱木通赤苓導赤利水甘草緩急解表後則治肺熱而咳當止矣處方羌活二錢防風錢半蒼朮一錢黃芩錢半白芷錢半川芎一錢木通錢半赤苓六錢又方葶藶三錢牽牛二錢桑白皮四錢地骨皮四錢桔梗一錢紫菀三錢蘇子錢半宋公夏二錢赤苓六錢天津紅四枚效果翌日汗出痛止咳仍未除服後治肺方三劑而愈廉按潔古九味羌活湯本治風寒濕鬱而化熱之正方今因表邪正盛反被涼遏誤截致邪內陷而化熱酌選此方加減用得愜當後方用錢氏葶藶丸瀉白散法加味亦有力量非疲藥塞責者可比傷寒熱厥案內科鄭震竺住汕頭和安街病者陳永吉年十八住汕頭病名傷寒熱厥原因初夏勤勞過度伏熱體痠勉從苦力運動意欲因出汗而免藥至晚遂發頭痛醫用石膏生地麥冬之類越三日而病劇證候手足厥冷不省人事耳若無聞頭不著枕面色及唇皆白惟指甲紅活診斷脈左右俱伏切診已無可考寒熱從何分別況證屬危急熱藥非可輕試即囑其兄取冷水一大杯扶之令飲一服而盡遂知其口渴伏熱熱深厥深誤服陰凝之品遏熱之所致也療法達郁通陽泄熱宣痞方用柴胡疏其木鬱芍藥通其陰結甘草和其中氣枳實泄其痞塞加木通宣其伏熱紅花行血脈之瘀黃芩清三焦之火內解外達血脈暢行陽氣舒暢而熱厥自愈矣處方川柴胡錢半杭白芍四錢粉甘草八分炒枳實二錢漢木通錢半蘇黃芩二錢藏紅花七分效果一劑知二劑已靜養三日而能如常作事矣廉按寒厥用四逆湯熱厥用四逆散研究傷寒論者皆知之所難者辨證耳一經藥誤壽可立傾前哲成無己喻嘉言陸定圃輩多所發明爰為節述其說成氏曰凡厥若始得之手足便厥而不溫者是陰經受邪陽氣不足可用四逆湯若手足自熱而至溫從四逆而至厥者傳經之邪也四逆散主之喻氏曰凡傷寒病初得發熱煎熬津液鼻乾口渴便秘漸至發厥者不問而知為熱也若陽證忽變陰厥者萬中無一從古至今無一也蓋陰厥得之陰證一起便直中真陰經唇青面白遍體冷汗便利不渴身倦多睡醒則人事了了與傷寒傳經之熱邪轉入轉深人事昏惑者萬萬不同也陸氏曰厥有陰陽二證李士村謂陰厥脈沉弱指甲青而冷陽厥脈沉滑指甲紅而溫余謂陰證似陽來可以脈沉弱指甲青冷為憑凡證見煩躁欲裸形或欲坐臥泥水中舌苔淡黃口燥齒浮面赤如微酣或兩顴淺紅遊移不定言語無力納少胸悶渴欲飲水或咽喉痛而索水至前復不能飲肌表雖大熱而重按則不熱或反覺冷或身熱反欲得衣且兩足必冷小便清白下利清穀脈沉細或浮數按之欲散亦有浮大滿指而按之則必無力是宜溫熱之劑藥須涼服從其類以求之也似此辨別至為精審學者宜細觀之傷寒戴陽證案內科莊虞卿住麗水第十一中學病者戴劉氏年逾五捻形肥住西園廟衖病名傷寒戴陽原因平時氣逆痰多近日復感暴寒證候初起發熱惡寒舌苔黑潤口雖渴而飲水不多越三日氣急痰鳴頭面嫩紅神昏不語手足厥冷大汗淋漓診斷脈兩寸浮滑而細兩尺豁大而空脈證合參此傷寒戴陽證也寒邪激動水飲以致水飲氾濫故痰聲漉漉陰霾四布真陽飛越故面赤汗流手足如冰舌黑口渴者乃真陽式微如釜底無薪津液不能升騰之象病勢至此一發千鉤急救之法其惟挽正回陽乎療法先用黑錫丹以鎮其上脫之陽復用參附耆朮炙草以固其表裡之衰更加法夏茯苓生牡蠣化痰收澀以為佐俟其汗止陽回手足溫和再加龜板鱉甲生芍熟地之類以潛之蓋陽氣以潛藏為貴潛則弗亢潛則可久易道也處方黑錫丹五錢燉服五錢即止次方西潞黨三錢附片二錢炙黃耆三錢生白朮二錢法夏二錢清炙草一錢茯苓三錢生牡蠣五錢每日二劑三方前方加龜板八錢炙鱉甲五錢生白芍二錢熟地四錢效果黑錫丹服下立刻痰平氣順一日汗止能言手足溫和惟神識未清自言自笑遍身瘙癢此心陽尚未復元之象即於前方加炒棗仁二錢紅棗五枚越三日諸證悉退月餘康健如常矣廉按傷寒戴陽傷寒論所謂少陰病手足厥逆其人面色赤是也惟戴陽之面赤嫩紅帶白與面色緣緣正赤者不同為最危急之虛脫證先重用黑錫丹以鎮上越之虛陽固屬急救之良法繼用參附耆附朮附三方合二陳去廣皮加牡蠣挽正回陽蠲痰固脫法亦細密周到妙在終加龜鱉芍地棗仁紅棗潛鎮攝納深得陰平陽秘精神乃治之經旨真精心結撰之佳案吾無間然矣傷寒戴陽證案內科張錫純住鹽山西門內病者王瑞亭年四十餘京都貢士住前門外西珠市口病名傷寒戴陽原因仲冬之時感受風寒兩三日間煩躁無汗原是大青龍湯證醫者誤投以桂枝湯煩躁益甚證候表裡俱覺發熱頭微覺疼舌苔白而微黃診斷脈象洪滑兩尺似不任重按此乃傷寒成溫熱入陽明之府而猶微兼表證也療法宜以大劑涼潤之品清其府中之熱而少加表散之藥輔之處方生石膏三兩搗細惟不可煅用煅則傷人玄參一兩青連翹三錢粳米五錢煎至米熟取湯兩茶杯為其兩尺脈象不實囑其分多次徐徐溫飲下不欲其寒涼下侵或致滑瀉也效果孰意病家忽愚所囑竟將其藥頓飲之藥力直趨下焦上焦之燥熱未除下焦之泄瀉轉增半日之間連瀉數次多帶冷沫面色紅似火炙鼻孔黑似煙燻關前脈大於從前一倍數至七至其精神騷擾不安知其已成戴陽險證急用野臺參一兩煎湯沖童便須四歲以上童子半茶鍾置藥碗涼水盆中候極冷頓飲下又急用玄參生地知母各一兩煎湯一大碗備用自服參後屢診其脈過半點鐘脈象漸漸收斂至數似又加數遂急將備用之藥熬極熱徐徐飲下一次止飲一口閱兩點鐘將藥服盡周身微汗而愈廉按傷寒戴陽其人面赤煩躁氣息甚粗脈象雖大按之無力又多寸盛尺虛乃下焦虛寒孤陽上越之危候傷寒論少陰篇用通脈四逆湯加減收拾陽氣歸於下元而加蔥白透表以散外邪如法用之每多速愈今固大青龍證誤投桂枝雖同一煩躁而面不姣紅尚屬類似戴陽方用仙露湯救誤而多轉折者張氏原著謂因病家不聽所囑致服藥有如此之失幸而又愈然亦險矣審是則凡藥宜作數次服者慎勿頓服也蓋愚自臨證以來無論內傷外感凡遇險證皆煎一大劑分多次服下此以小心行其放膽乃萬全之策非孤注一擲也其言甚是真寒假熱證案內科陳務齋住梧州四方井街病者陳黎氏年三十餘歲廣西容縣住鄉體弱業農病名真寒假熱原因飲食不節過食生冷消化不良腸胃蓄濕凝寒積冷正氣衰弱誘因夏月天氣不和水濕太盛感受風寒皮膚鬱閉而病叢生證候肢體困倦食量日減體中惡寒發熱頭目暈痛口渴咽乾清涎湧逆繼則食量全缺肢體困極軟而無力口更大渴清涎更湧常見體中潮熱頭目更痛不能起立胸膈滿脹腰痛腹痛心神煩躁小便微黃唇焦而燥舌苔膠黃絕食一月危在旦夕診斷脈左右浮數無力以脈證合參真寒假熱證也此證因過食生冷瓜果消化不良停留腸胃蓄濕積寒阻遏正氣不暢脾土不運不能布津散精以致氣血兩虧臟腑皆弱腠理不實皮膚疏泄適夏月乍寒乍熱暴風暴雨氣候不佳感受風寒皮膚閉塞衛氣不能外達風動木搖水寒土濕濕氣漸長陽氣漸消腎水愈寒肝木愈郁抑遏清陽遂致上焦熱燥濁陰不降中下凝寒至清涎泛溢陰凝於內陽越於外則脈現浮數體熱唇焦舌黃煩躁渴飲表面雖熱裡實中寒前醫以風熱證治之則更現燥渴又以陰虛治之更見脹悶反助其凝寒傷其正氣則孤陰不生獨陽不長中土已敗絕粒月餘而證勢危急萬分今所幸者脈未散亂諒能救治療法湯劑用理中湯壯陽降逆取熟附肉桂法夏暖腎壯陽升清降濁為君乾薑白朮理中扶土溫脾燥濕為臣防黨五味白芍歸身活血養肝助氣生津為佐砂仁陳皮茯苓利水化氣和胃醒脾為使一服後燥渴減清涎略少五服後燥渴已除咽喉不燥清涎更少體中略和惟口中味淡以肉桂湯作常茶飲之但百物不思惟欲食白古月每日需兩許食之桂古月與藥湯知甜不知辛辣內寒已極診脈沉遲每味加倍再連五服後略思飲食即食白粥一小碗立時胸中脹滿證復如前診脈浮數又將方每味加倍再連五服後病脈皆退如前又思飲食用乾薑煎湯入炒焦白米煎粥食之方能消化又將方中附薑術每味倍至四兩再連五服後食量已進略能步履誤食李子數枚即時胸膈脹滿而病復如前又不思食又將方中薑附術每味倍至八兩再連十餘服後始知辛辣病症已退食進氣強處方壯陽降逆理中湯方肉桂一錢熟附五錢乾薑五錢白朮六錢炒半夏三錢陳皮錢半茯苓四錢白芍三錢炒歸身二錢防黨四錢炒五味二錢砂仁二錢煎服後連日將各味倍重薑附術每味倍至八兩一服效果二十日清升濁降渴止體和三十日食量略進元氣略復四十日食量大進元氣復舊說明起則燥渴脈證皆熱服清涼而病更甚燥渴不止溫中壯陽服之竟不燥渴且薑附桂古月之性辛辣其食不知辣而知甜可洞見臟腑之真寒而薑附桂每味服去十餘斤始知辛辣然後病除藥止愈後十餘年竟無一疾發生常年健壯可謂奇難之證矣自古至今真寒假熱真熱假寒二證不知誤死者凡幾余診治二十餘年已遇此二證數十人皆奄奄一息余定以真寒或真熱對證施方皆能痊愈特錄真寒假熱真熱假寒二證各一以便研究廉按前醫認為風熱陰虛必用辛涼滋潤之劑致使寒凝濕聚病自增重方用附桂乾薑以祛寒苓朮半夏以燥濕所以見效然非確有膽識者不敢用此重量太陰傷寒案內科高玉麟住黑龍江南門內病者楊子榮年逾四十黑龍江人住省城病名太陰傷寒原因赴城外戚家助忙事繁食少中虛受寒證侯脘腹大痛吐水不止四肢厥逆舌苔邊白中灰滑診斷脈左手弦大右關弦遲脈證合參斷為太陰傷寒傷寒論云太陰之為病腹滿而吐食不下自利益甚時腹自痛適合楊君之病狀矣療法用附子理中湯加味以附薑桂椒吳萸溫寒降逆人參甘草補中益氣白朮雲苓去濕燥土庶冰熔土燠中宮自無疼痛之虞矣處方黑附塊一兩炒乾姜六錢紫猺桂三錢炒川椒三錢吳茱萸四錢吉林參三錢炙甘草五錢雲茯苓六錢炒白朮五錢水煎服效果服藥二劑厥疾頓瘳廉按寒傷太陰必其人脾陽素弱故邪即直入陰經對證處方附子理中加味固屬正治妙在薑桂椒萸善止寒吐冷癰故能二劑而收功太陰傷寒案內科陳作仁住南昌中大街四川會館病者朱陳氏年四十六歲祖籍安徽生長南昌省城病名太陰傷寒原因時當夏令異常炎熱貪涼飲冷感受陰寒證候上吐下瀉腹痛異常面青唇白四肢逆冷舌苔灰滑診斷六脈沉遲似伏脈證合參顯系陰經傷寒但懷孕六月得此陰寒危證殊難措手療法此證非大劑附子理中不及挽救稍事遲延恐誤大事豈能因六月之娠而見危不救哉茲特言明在先急救其母為首要遂重用黑附片高麗參以升陽復脈為君焦白朮補土為臣黑炮姜溫中為佐炙甘草和中為使外加茯苓利水以分陰陽木香白芍行氣和血以助藥力處方黑附片四錢高麗參三錢焦白朮三錢黑炮姜三錢炙甘草錢半雲茯苓四錢杭白芍五錢廣木香八分效果此方連進二劑吐瀉腹痛均已輕減脈象亦起病勢幸有轉機原方將附片炮姜均減半加縮砂仁一錢續進二劑各證就痊廉按此誠孕婦之急症非重劑理中復有何藥可以救急惟附子為墮胎百藥冠現今藥肆所備只有漂淡附片其中有效成分有名無實不如易以吳茱萸善能止吐除癰且於胎前藥忌歌亦無切禁之條較附子為穩健少陰傷寒案內科王經邦住天台柵門樓病者蔣尚賓妻年六十二歲住寧海東路蔣家病名少陰傷寒原因嚴冬之時腎陽衰弱不能禦寒致寒深入骨髓證候頭痛腰疼身發熱惡寒甚劇雖厚衣重被其寒不減舌苔黑潤診斷六脈沉細而緊此古人名腎傷寒傷寒論所謂熱在皮膚寒在骨髓也療法宜麻黃附子細辛湯以溫下散寒處方生麻黃一錢淡附片一錢北細辛七分效果一劑汗出至足諸證即愈昔醫聖仲景作此方以治少陰病始得之反發熱脈沉者予屢治如前之脈證非用此方不能瘳故贅述之廉按少陰傷寒始得病即脈沉發熱略一磋跎勢必至吐利厥逆故乘其外有發熱一用麻黃治其外一用附子治其內然必佐細辛從陰精中提出寒邪使寒在骨髓者直從外解有是病競用是藥非精研傷寒論者不辦少陰傷寒案內科曾月根住五華周潭病者曾麗常年三十四歲兵營軍需長住廣東五華文興藪病名少陰傷寒原因辛苦異常日夜勞瘁一經感寒邪傳少陰即從火化證候一身手足壯熱不能語言舌黑且燥診斷脈微細而數論中微細為少陰病之提綱數者熱也凡操勞者病入少陰從熱化者多從寒化者少今一身手足壯熱所謂火旺生風風淫末疾也少陰腎脈夾喉嚨縈於舌底其火一升故舌強不能言舌黑者現出火極似水之色也療法黃連阿膠湯主之方用黃連黃芩之大苦大寒以折之白芍之苦平以降之又取雞子黃定離中之氣阿膠填坎中之精俾氣血有情之物交媾其水火則壯熱退而能言熱退而舌不黑矣處方黃連四錢阿膠三錢黃芩一錢白芍二錢雞子黃二枚上四味先煮三味去滓內阿膠烊化盡後內雞子黃溫服效果初服二劑病勢漸平再服一劑諸症皆退惟兩腳拘攣後服白芍五錢甘草三錢二劑而瘥以芍藥甘草含有人參氣味血得補則筋有所養筋舒則拘攣自除廉按少陰傷寒有傳經直中之分直中者多從水化淺則麻附細辛湯證深則四逆湯證傳經者多從火化今因津枯熱熾舌黑燥而不得語急急以黃連阿膠湯瀉南補北確是對證處方終用芍藥甘草苦甘化陰養血舒筋亦屬長沙正法傷寒夾濕案內科丁佑之住南通東門病者方協恭年五十三歲皖人住南通病名傷寒夾濕原因先伏濕邪復傷於寒證候惡寒發熱遍身疼痛腰肢不舉不能轉動診斷脈象左浮右緩浮乃傷寒之徵緩即蘊濕之候脈證合參此傷寒夾濕證也療法治宜寒濕兼顧寒陰互病閉塞不宣勢將凝冱非辛溫大劑不能勝任擬麻黃湯加味處方陳麻黃五分川桂枝三錢光杏仁三錢宣木瓜二錢薏苡仁三錢絲瓜絡三錢福澤瀉二錢生甘草五錢生薑二片效果初服微效再服大效三服痊愈廉按傷寒夾濕一證江浙兩省為最繁通用五苓散加羌防為對證處方之常法令用麻黃湯加味辛散淡滲方雖異而法則同妙在桂枝與木瓜辛酸並用善能舒筋止痛三服痊愈信然惟薏苡仁一味尚宜重用傷寒夾痰案內科張錫純住鹽山西門內病者毛姓年三十餘藥肆經理住鹽山城東北張馬村病名傷寒夾痰原因其人素有痰飲曾患痰證甚劇愚為治愈隔數月又得傷寒證經他醫治愈兩次皆因飲食過度反復醫者再投以藥不效迎愚診視證候臥床眩暈不起頭微覺疼面有火色而畏食涼物食梨一口即覺涼甚食石榴子一粒心亦覺涼視其舌苔淡而潤不覺燥渴診斷脈洪長有力右部尤甚問其大便數日未行知其陽明府熱已實也療法愚舍證從脈欲投以大劑白虎湯前醫者在座疑而問曰此證心中不渴不熱且舌苔白潤畏食寒涼無實火可知以余視之雖清解藥亦不宜用果何所據而用大劑白虎湯乎答曰其脈洪長有力原系陽明實熱之確徵投以白虎湯洵為對症的方其不覺渴與熱且舌苔淡白而潤者以其素有痰飲濕勝故也其畏食寒涼者因胃中痰飲與外感之熱互相膠漆致胃府轉從其化與涼為敵也病者之父素曉醫理遂篤信愚言促為疏方處方生石膏細末四兩知母一兩清半夏甘草各三錢粳米四錢俾煎湯一大碗分三次溫飲下此方加半夏於白虎湯中者因其素有痰飲也效果兩日夜間上方略有加減共服藥四大劑計用生石膏斤許霍然痊愈愚亦旋里隔兩日倉猝復來迎愚言病人陡然反復形狀異常有危在頃刻之虞因思此症治愈甚的何遽如此反復及至見其痰涎壅盛連連咳吐不竭精神恍惚言語錯亂身體顫動診其脈象平和微嫌胃氣不甚暢舒愚恍然會悟因謂其家人曰前者兩次因飲食過度而病復今則又因戒飲食過度而復也其家人果謂有鑑前失每日所與飲食甚少愚曰此次勿須用藥飽食即可愈矣時已屆晚八點鐘至明飲食三次每次仍撙節與之病若失廉按此證初起用越婢加半夏湯為對證處方之常法今側重脈象放膽重用膏知舍證從脈別具卓識非學驗兼優者不辦傷寒夾陰案內科燕慶祥住永修官塘區病者姜孔進年近四旬住江西永修北鄉官塘區病名傷寒夾陰原因其人冒寒邪微熱未除入房耗精更使寒邪乘虛直入前陰證候大寒不止少腹極疼腰痛而墮睪丸縮小冷汗遍身膝脛拘急診斷兩手尺脈非常沉細按至骨乃有一毛之延惟寸關稍和以脈合證此少陰傷寒兼夾陰也傷寒論淺注云奇經衝任督三脈皆行少腹之前前陰受傷故少腹痛陰中拘攣熱上衝胸膝脛拘急蓋由傷寒微熱未除男女交媾邪從前陰而入也是既感寒邪又復耗精宜其腰痛冷汗陰莖拘急也固屬危證然求醫尚早脈未盡絕猶可於危中而得生全之路療法用黑附黑姜為君回陽益火以祛寒用婦人裩襠燒灰為臣取其能引邪仍由原路而去肉桂為佐俾虛火仍歸原位使以艾葉甘草引寒邪達外也處方黑附錢半黑姜一錢肉桂八分艾葉八分甘草六分以婦人裩襠燒灰共水煎服效果服一劑陰莖頭上微腫病即減半連服二劑病痊愈後更用附桂地黃湯加敗龜板服四劑月餘復舊矣廉樓此證似陰陽易而實非非女勞復而卻是今用四逆湯合裩襠散加味方較程鍾齡用人參三白湯馬良伯用五苓散合豭鼠矢湯尤為周到所引陳修園說發明病理語亦精鑿真苦心孤詣之佳案也夾陰傷寒案內科韓梅村住泰安鄉滿莊病者徐王氏年四十早寡寄住泰安城裡病名夾陰傷寒原因房勞後即食西瓜又以馬齒莧為餅食畢又飲冷茶至十點即病證候初發腹微痛後遂疼不可支其男摩之揣之行至廣腸而痛益亟且拒按診斷診時已夜一點病者若瘋狀身體不顧遍地亂滾見余至以首叩地有聲執其手按脈遲數無定或三至一止或五至七八至一止皆弦勁有力遂斷為實寒之證非峻攻溫下不能急救療法一說攻下不惟病者投機即其男亦首肯者再曰非大黃二兩不可余曰嘻此等寒結有復寒下之理乎即熱下而病在廣腸輕則不及病重用之上中焦無病之處其能堪此乎又診其疼處確在少腹之右端狀如西瓜之半堅如石乃喻之曰勿急余即返為治方藥保爾無險處方以巴豆霜二分麝香一分雄黃一錢五分廣鬱金二錢共搗為泥入蜂蠟錢許化合為丸外又以廣蠟三錢許包其外取其不致驟化及達病所而猛藥始發庶專於病處有益效果囑分兩次服之每次如綠豆大者十五粒病者求急效一次而盡三十粒紅糖姜水送下連飲數次雞鳴時已下三次如牛糞而疼止中氣驟虛即以十全大補湯峻補之三劑而病遂失廉按病因夾陰寒傷表已為難治寒傷里更屬難療今初用峻攻繼用大補非經驗宏富膽識兼全者不辦妙在用和劑解毒雄黃丸加麝香外用蠟匱既能逐寒止痛又不傷胃直達病所急而不烈攻不嫌峻為善用猛藥之良法較千金備急丸尤巧然亦險矣此案足為房勞後不忌生冷者當頭棒喝風寒夾痰飲案內科袁桂生住鎮江京口病者季姓婦年約三旬住本鎮病名風寒夾痰飲原因乙巳二月外感風寒內蓄痰飲摶結於中不得下降致成斯疾證候咳喘倚息不得臥惡寒發熱頭疼身痛胸悶不舒心痛徹背診斷脈沉而滑舌苔白膩此風寒痰飲內外摶結肺氣不得下降而成肺脹也療法用小青龍湯以驅風寒合栝蔞薤白湯以蠲痰飲處方麻黃四分桂枝四分淡乾薑五分北細辛四分生白芍錢半五味子五分甘草五分栝蔞仁三錢杵干薤白三錢白酒洗搗姜半夏三錢次診服後得汗而寒熱喘息俱平惟身痛咳嗽未己易方以桂枝湯和營衛加乾薑五味子各五分細辛三分以治咳效果一劑效二劑更瘥因貧不復延診遂漸愈廉按小青龍湯為治風寒外搏痰飲內動之主方臨證善為加減莫不隨手而愈況合栝蔞薤白辛滑滌痰當然奏效更速接方桂枝湯加味修園治身癰咳嗽凡夾痰飲者輒用五味薑辛推為神應之妙法故仲景傷象論金匱要略兩書不可不悉心研究也傷寒變痹案內科曾月根住五華周潭病者張幼文年三十二歲任縣長住廣東五華城北門外病名傷寒變痹原因貴胄之子素因多濕偶感風寒證候發熱惡寒一身手足盡痛不能自轉側診斷脈浮大而緊風為陽邪故脈浮大主病進緊主寒凝脈證合參風寒濕三氣合而成痹療法桂枝附子湯主之方中桂附辛熱散寒草棗奠安中土生薑利諸氣宣通十二經絡使風寒濕著於肌表而作痛者一併廓清矣處方桂枝四錢附子錢半甘草二錢大棗六枚生薑三錢效果一日二服三日舉動如常繼服平調之劑痊愈廉按傷寒變痹必挾風濕長沙傷寒論曰傷寒八九日風濕相搏身體疼煩不能自轉側不嘔不渴脈虛浮而澀者桂枝附子湯主之今有是證則用是藥確得仲景之心法傷寒兼伏熱案內科張錫純住鹽山西門內病者馬樸臣年過五旬業商住奉天大西邊門內病名傷寒兼伏熱原因家本小康因買賣外國銀幣票賠錢數萬元家計頓窘懊悔不已致生內熱仲冬因受風咳嗽聲啞有痰微喘小便不利周身漫腫愚用越婢加半夏湯再加涼潤利水之藥而愈旬日之外又重受外感證候表裡大熱煩躁不安腦中脹疼大便間日一行似乾燥舌苔白厚中心微黃診斷脈極洪實左右皆然此乃陽明府實之證凡陽明府實之脈多偏見於右手此脈左右皆洪實者因其時常懊悔心肝積有內熱也其腦中脹疼者因心與肝膽之熱挾陽明之熱上攻也療法當用大劑寒潤微帶表散清其陽明胃府之熱兼以清其心肝之熱處方生石膏四兩不可煅用煅則傷人知母一兩甘草四錢粳米五錢青連翹三錢煎至米熟取清湯三茶鍾分三次溫飲下病愈後停服說明此方即白虎湯加連翹也白虎湯為傷寒病陽明府熱之正藥加連翹者取其色青入肝氣輕入心又能引白虎之力達於心肝以清熱也效果一劑服完其熱稍退翌日病復還原連服五劑生石膏加至八兩病仍如故大便亦不滑瀉至第六劑生石膏仍用八兩將湯藥服後又用生石膏細末二兩俾蘸梨片嚼服之服至兩半其熱全消病遂愈廉按和田東郭云石膏非大劑則無效故白虎湯竹葉石膏湯其他石膏諸方其量過於平劑世醫不知此意為小劑用之譬如一杯水救一車薪火宜乎無效也吾國善用石膏者除長沙漢方外明有繆氏仲淳清有顧氏松園余氏師愚王氏孟英皆以善治溫熱名凡治陽明實熱之證無不重用石膏以奏功令用石膏由四兩加至八兩看似駭然然連服五六劑熱仍如故大便亦不滑瀉迨外加石膏細末用梨片蘸服又至兩半熱始金消而病愈可見石膏為涼藥中純良之品世之畏石膏如虎者可以放膽而不必懷疑矣傷寒挾伏熱案內科黃仲權住宿遷東門口病者劉氏婦年三十歲夫業機房住本街病名傷寒挾伏熱原因房後大意衣被單薄遂傷寒如冷瘀雖請數人針之皆未見效證侯腹痛踡臥畏寒戰慄乾嘔不止無熱不渴面青唇縮手足厥冷過膝診斷脈息三至按之無力而時止遂斷為房後傷寒決非急痧切勿再針療法隨立回陽急救湯加減初服傾吐無餘又加薑汁沖服處方西黨參三錢土炒白朮三錢雲茯苓三錢炙甘草一錢法半夏三錢老廣皮二錢淡乾薑錢半五味子八分上肉桂二錢熟附片錢半淡吳萸六分生薑汁二匙分沖次診服後腹痛雖止而發熱大作脈息六至口苦而渴熱象全現謂此非熱藥過劑實因病者先蓄內熱尚未發作今寒從熱化脈數口渴只得見症治症轉方用苦辛開透法淡枯芩二錢黑山梔三錢粉丹皮二錢天花粉二錢大連翹三錢姜炒川連一錢牛蒡子錢半蘇荷尖一錢效果服後異常舒泰依方加減再二帖即收全功廉按寒挾伏熱江浙兩省為最多此因房勞之後三分外感七分內傷不得不急進溫補回陽固脫迨陽回而伏熱大作幸而轉機敏捷速為清透再二劑即收全功幸哉否則皆詆熱藥太過貽人以口舌矣傷寒兼瀉案內科燕慶祥住永修官塘區病者帥安民年近二十江西星子縣人病名傷寒兼瀉原因感冒寒邪發為傷寒時當七月前醫妄認傷寒為傷暑誤投以三物湯加黃連石膏大黃一劑即大泄不止證候始焉四肢厥冷腰疼少腹痛繼則連連大泄遍身盡冷呼吸幾似絕然診斷兩手脈寸關全無惟尺脈按至骨尚有一毛之延據其父母及妻所述從前之病情與服涼藥後之態度以脈合參蓋少陰傷寒也傷寒論曰少陰從水化而為寒該醫生反視為熱證投以涼瀉之品是既寒又益其寒猶人已落井而再投以石也反致遍身厥冷而大瀉脈幾欲絕者不亦宜乎今幸尺脈未絕猶木之尚有本也然亦危而險矣療法茯苓白朮為君補土製水以建中黑附黑姜為臣回陽益火以逐寒芍藥為佐斂陽和營以止腹痛吳茱萸為使以止下利處方黑附四錢黑姜一錢因本系寒證又服涼藥恐辛熱之品太輕無濟茯苓錢半焦白朮錢半白芍八分吳茱萸一錢效果前方煎服一劑人即蘇而遍身俱熱脈亦稍見又減卻薑附一半再服病愈後服附桂地黃湯四劑月餘復原廉按寒傷少陰當以麻附細辛湯為正治乃前醫誤認為傷暑妄投涼瀉以致下利肢厥方用真武湯加味以救藥誤雖屬愜當然焦白朮尚嫌用量太輕吳茱萸亦當易以灶心黃土庶能收補土製水之巨功寒痹案內科楊華亭住煙臺老電報街靖安公司病者謝誠一年三十八歲山東福山縣人住獅子匡經商芝罘病名寒痹原因筋肉肥大全身富脂肪身重一百六十餘磅略為運動則呼吸困難商戰過勞少年房事過度精神窘迫談話之間即睡去證候於甲子年五月十二夜間因熱去衣赤身乘涼於天井內瞬息睡去少時被友喚醒至第二日晨起時稍覺項強第三日項強之症見重右臂微痛至理髮處用按摩法稍微見輕於十六日晨七時突患右肩背及手臂盡痛呻吟之聲不絕痛汗如珠右半身起臥不得自由診斷脈兩手寸關浮而洪大惟右則重按而滑左則沉取而澀兩尺微弦脈證合參此為寒痹靈樞邪客篇所謂脈大以澀者為痛痹素問痹論寒氣勝者為痛痹也其脈浮者屬風滑者屬痰洪大者屬火澀者屬血瘀外寒搏內熱經絡凝滯以致肩背手部疼痛惟痛有定處不似歷節之走注流痛而腫亦非半枯之無痛因客邪由外入者必入經絡之內經絡所藏者無非氣血氣血若被外寒所激則腦氣筋被氣血所壓何處被壓必有疼痛之症此人肥胖太甚陽虛則不能外固忽被風寒乘虛而入經云邪入於陰則痹也夫血既以邪入而血痹於外陽亦以血痹而閉於中此仲師以針為治痹之先著而揭諸章之首以示後世之人也乃近世針灸失傳俱以用藥療之須知此病當疼苦萬狀之時非藥所能即止其疼苦惟針則能手到疼止也療法針藥並用先用刺法以止其疼後服藥以和之刺手太陽經曲垣穴針入五分秉風穴針入五分天宗穴針入五分臑俞穴針入八分手太陰經尺澤穴針入三分此穴速出針微血出手陽明經合谷穴針入三分少時睡去因用當歸川芎桃仁紅花為君以和血中之凝滯經云治風先治血血行風自滅用秦艽羌活為臣以去經絡之風用半夏雲苓為佐以去痰用制香附地龍為使以通之予臨行雲此寒痹之症非一二次所能治愈初用針可止二三少時之疼二次能止五六少時至三四次可望痊愈下午一時召予治之問其肩背之痛已退起臥自由惟臂與手部其疼如前再刺手少陽經天井穴針入五分支溝穴針透間使穴陽池穴針入二分中清穴針入二分復又睡去第二日晨七時召予問其臑臂之疼退盡惟五指痛而且脹即刺手陽明經陽谿穴針入二分手少陽經中渚穴針入二分液門穴針入二分大指少商穴食指商陽穴中指中衝穴無名指關衝穴小指少衝穴各用細三稜針刺之微血出將前方內加薏苡仁防己以利濕處方全當歸四錢川芎一錢桃仁三錢半紅花二錢左秦艽二錢川羌活一錢半夏三錢雲苓三錢香附三錢乾地龍一錢第二日方內加薏苡仁六錢漢防己二錢效果第三日肩背手臂之疼痊愈在家調養三日仍回芝罘廉按此乃治痹證之佳案也寒痹案內科陽貫之住成都打金街病者鄧少儀妻年三十六歲住石馬巷街病名寒痹原因初感寒濕歷治不愈而成痹證候肩臂腰腿周身皆痛日重一日已經兩月診斷脈左浮緊右濡滯浮為風緊為寒濡為濕明明三氣合而成痹何前服三氣對症之藥皆不效則仲景下瘀之法可以類推勳臣痹證有瘀之說於斯益信少儀以病久人弱難堪峻劑為辭乃為詳辨其義血譬如水也水經風寒而凝結成冰此時欲使冰之凝結者覆成為水之活潑治風寒乎治冰乎知必治冰而後可故服表藥似對症而不及病所徒虛其表故不應接服養血滋陰藥固是婦科妙品而血為陰凝愈滋愈瘀故病加重今以逐瘀為治即治冰之意幸勿囿於俗見以悔將來療法用王氏身痛逐瘀湯囑服三劑次日復診昨日之藥已服一劑反心煩甚此因血瘀既久驟用通逐以藥不無攻抉之勢故煩若安然罔覺是藥不中病接服毋間可也若疑中病為犯逆養癰成患恐難措手於將來也於是信心不疑連服三帖諸症悉退處方全當歸三錢細生地三錢光桃仁四錢杜紅花二錢生枳殼二錢赤芍二錢川柴胡一錢生甘草一錢苦桔梗錢半川芎錢半杜牛膝三錢為引效果凡九日診三次略為加減服藥皆應諸證悉退行動如常廉按寒則凝血濕則滯血血之脈絡窒塞乃成癰痹病勢之常王氏身病逐瘀湯確係經驗之方惟柴胡不如易桂枝辛甘發散以通經絡同牛膝尤有直達肩臂腰腿之長則取效當更速矣寒瘧案內科王經邦住天台柵門摟病者奚小除年二十歲業商住天台東鄉靈溪莊痛名寒瘧原因秋間先便溏後發寒熱前醫誤作實熱妄用五瀉心湯數劑頓致邪閉不出證候目閉不語狀若屍厥四肢發冷約有四日診斷脈緩大舌苔灰白此內真寒而外假熱其先大便溏泄者內有寒也繼即往來寒熱者表未解也療法非溫中散寒不可宜再造散減芍藥處方西黨參一錢生黃耆一錢老川芎錢半北細辛七分青防風錢半川羌活錢半嫩桂枝一錢淡附子二錢炮乾薑三錢炙甘草八分效果先服炮姜三錢頭額微汗次用前方一劑服後三時大汗能言再服一劑分出瘧疾而愈廉按瘧因於風寒者多初起無汗當用發散如羌蘇防葛之類若在深秋初冬寒重無汗口不渴脈弦緩者當用桂麻各半湯此案因寒涼誤遏頓變陰厥故用陶氏再造散溫中散寒回陽醒厥是為救誤之重劑非寒瘧之正治法也寒瘧發厥案內科過允文住宜興徐舍病者路觀瀾君令媛年十八歲住宜興東廟巷病名寒瘧發厥原因干犯大寒伏藏厥少之經證候先寒後熱寒時氣從少腹上攻則厥面青肢冰目上挺約一時半厥回而熱多吐稀涎微汗乃退診斷脈搏細弦不為指撓苔白舌淡此係厥少二經伏寒竊發病勢方張不可藐視療法寒者熱之桂附之屬逆者平之赭復之品以之為君更佐薑萸以祛陳寒枳樸以疏氣機處方代赭石一兩生打熟附片五分乾薑五分肉桂五分淡吳萸五分旋覆花三錢包煎川厚朴錢半枳實二錢製半夏錢半接方當歸一錢炒白芍錢半北細辛五分鮮生薑一錢桂枝一錢清炙草五分漢木通八分大紅棗四枚效果一劑病減再劑厥止繼用當歸四逆湯加減瘧除胃動而痊廉按凡瘧發厥者多由內伏寒飲蘇後多吐稀涎其明證也此為高年所最忌此案幸在青年尚能鎮逆溫化而痊兩方皆有力量非平時研究漢方素有心得者不辦寒結腹痛證案內科陳務齋住梧州四方井街病者謝可廷年二十餘歲廣東順德縣人住廣西梧州市商業體壯病名寒結腹痛證原因患瘧疾愈後氣血衰弱屢屢不能復元誘因過食生冷果實停留不化腸胃蓄濕濕鬱氣滯肝氣抑遏證候四肢困倦食量減少腹中痞滿腸鳴疼痛時痛時止咽乾口渴繼則腹中絞痛歷月余之久晝夜而痛不止食量全缺口更燥渴肌肉消瘦腹中膨脹氣逆喘急唇赤而焦舌乾而澀全體大熱大便燥結旬日不行診斷診左右六脈浮大而數按則無力驗診體溫不足聽診呈低音兼水泡音以脈證合參定為寒結腹痛之證也此由病後元氣衰弱過食生冷停留腸胃蓄濕積寒土濕水寒濕氣愈長陽氣愈衰腎水凝寒肝木抑鬱肺金乾燥大腸津竭不行浮火升提前醫用清熱理氣去濕之方數十服則痛甚燥甚又一醫謂表裡俱實用防風通聖散治之仍痛仍燥而體熱增加大便更不行至陰凝於內陽越於外成為危急外象大熱內實凝寒幸脈尚未散亂諒能救治療法湯劑用附子理中湯加吳萸木香白芍川椒取薑附吳萸川椒溫中達下為君白朮甘草運脾和胃為臣白芍木香理氣平肝為佐人參生津助氣為使一服後腹痛已減體熱略退燥渴亦減診脈略緩又照方加半倍連二服後大便瀉下稀量之水兼有糞粒形同羊屎腹滿已消痛渴皆除唇白舌白診脈沉遲再將此方加三倍薑附數服則食進病除處方附子理中湯加減方熟附子五錢貢白朮五錢乾薑四錢炙甘草二錢蘇麗參四錢廣木香錢半吳茱萸二錢川椒錢半炒白芍三錢煎服效果五日腹痛已除脹痛亦消燥渴已除二十日食量已進元氣亦復廉按寒濕傷脾腎陽將竭用附子理中自是正法寒痢案內科高糺云住贛州生佛壇前病者鄧文輝年六十六歲商界江西病名寒痢原因年將古稀每到夏秋素嗜生冷瓜果漸致陰寒凝血而便赤痢證候下痢雖赤而色反瘀晦稀淡腹痛即墜墜即欲便診斷左脈細澀右緩而遲舌淡紅潤苔白薄此由脾胃虛寒氣虛不能攝血血為寒凝浸入大腸故下赤痢內經所謂腎脈小搏沉為腸澼下血是也療法周慎齋先生曰凡血色紫黯當作冷痢治今仿其法用附子理中湯為君使脾陽健而能統血則血痢自止臣以升麻黃耆升其陽以益氣俾其清氣得升則痛墜可除佐以木香陳皮之辛香調氣散結使以當歸之辛甘調血和營遵古人血脫益氣氣為血帥之法處方附片一錢炮姜八分西黨參一錢炒於朮二錢陳皮一錢木香一錢升麻三分生黃耆一錢酒炒當歸錢半炙黑甘草一錢效果每日服一劑三劑赤痢減少六劑各症皆痊廉按張路玉曰前哲論痢並以白沫隸之虛寒膿血隸之溫熱河間丹溪從而和之後世咸以為痢皆屬熱即東垣之長於內傷脾胃者亦認定膿血為熱豈知血色鮮紫濃厚者信乎屬熱若瘀晦稀淡成為瑪瑙色者為陽虛不能制陰而下非溫理其氣則血不清理氣如爐冶分金最為捷法凡遇瘀晦清血諸痢每用甘草乾薑專理脾胃肉桂茯苓專伐腎邪效如桴鼓周慎齋曰下痢血色如豬肝如紫草如莧菜汁者非炮姜不治理中湯去參加肉桂木香肉果烏梅其效最速云云此案用附子理中湯加味殆得周張二家之薪傳歟傷寒夾痢案內科程文松住南京上新螺螄橋大街病者魏光祖年逾四十三湖南木商住二道橋病名傷寒夾痢原因內受濕熱積滯外感風寒而發證候惡寒發熱下痢腹痛診斷脈左右皆弦大舌苔黃白相兼夫弦則為風大則病進脈證合參此即俗稱傷寒帶痢疾也由外來寒邪入於足太陽膀胱而傳足少陽膽引動胃腸濕熱由足太陰脾而傷足厥陰肝以致寒熱之中發生下痢腹痛內經以痢屬肝熱痛亦主肝是厥陰與太少二陽之邪合而為病況貴體生長湖南湘楚之間其稟質非江蘇吳地可比醫者未溯病家之稟質地土有吳楚之分仍一味用葉天士輕清之法不敢用柴胡所以未能應驗也療法仿張長沙達表和里之法用柴胡葛根桂枝達表為君臣以黃芩黃連當歸白芍川芎達里和營佐以枳桔開肺使以羌獨搜肝乃喻嘉言逆流挽舟之法合仲景葛根黃芩黃連之意處方川柴胡一錢生白芍四錢羌活五分黃芩八分獨活五分生葛根一錢川芎八分枳殼一錢黃連四分茯苓錢半川桂枝一錢油當歸錢半桔梗八分甘草四分效果兩劑熱退痢止諸病如失廉按痢疾見頭痛怕冷身熱無汗者均屬有表當從汗解如口舌不燥渴胸腹不悶痛舌或無苔或淡白且滑直活人敗毒散每服五錢日夜連進三五服水煎熱服取汗汗透而痢便減若見燥渴唇舌紅赤舌上黃燥或滑面色膩滯心煩小便熱赤者為濕溫暑濕之邪宜胃苓湯去桂加香薷薄荷連翹滑石淡豆豉六神麯等連進三五服得汗透而痢亦自止此表分陰陽之兩大法也此而一誤為嘔為呃不寐不食神昏耳聾而危矣此案傷寒夾痢方用活人敗毒散加減合仲景葛根芩連湯仍不外喻氏倉廩湯之例從逆流挽舟之法足見學有根抵處方合度虛寒痢案內科楊德馨住黑龍江育和堂藥號病者高泰年五十餘歲山東蓬萊縣人病名虛寒痢原因先由寒鬱食積化瀉繼則由瀉轉痢前醫或用藿香正氣散加減或用行氣兼苦寒藥皆無效而病勢轉劇證候胸滿腹痛飲食不欲咽目雖赤唇雖焦而面色青白晝夜下痢四十餘次神識昏沉默默不語病延二十餘天勢已垂危診斷兩寸關脈大而無力兩尺沉細脈證合參熱在上寒在下乃陰盛逼陽陽不潛藏真陽失守之危候皆因屢投寒涼散劑過傷脾腎所致也療法又可有四損不可正治之法勉用白通湯加薤白引火歸原為君佐人尿豬膽汁清上焦之浮熱力圖救濟以盡人事處方乾薑三錢黑附塊二錢炙甘草一錢薤白二錢人尿半茶鍾豬膽汁兩滴同沖水煎涼服次診一劑服後一夜只瀉五六次仍照原方服一劑一日夜瀉四五次又服一劑而瀉止飲食能迸脈搏沉緩無力是氣血兼虛之象也與人參健脾湯加減以雙補之次方別直參三錢生於術三錢浙茯苓三錢陳皮二錢車前三錢大熟地二錢蓮肉三錢神麯三錢焦楂三錢甘草一錢效果服人參健脾湯八劑調養半月而痊廉按凡病皆有寒熱虛實首要辨明隨證治之不獨痢證為然也如痢屬於氣血兩虛者多起於胃腸運化不足非起於腸內聚積病毒者宜乎虛冷者溫化之虛熱者清潤之以調和胃腸氣液為正當之治法若仍執濕熱積滯之例妄謂不掃除腹內之病毒則病根不盡宜投盪滌藥以廓清之則其病益急莫知所止每死於肉脫厥冷困憊之下此即由誤治致急證者也此時之急證與虛證相一致今觀此案非明證之彰彰者乎方用白通加味乃回陽固脫之法龍牡石脂禹糧等品亦可酌加人參健脾氣血雙補善其後以調養而已虛寒久痢案內科丁與人住泰興舊武營西病者傅和卿之子年三齡住泰興南門外東城腳病名虛寒久痢原因骨小肉脆多食則脹生質不足為素因內傷生冷食滯為原因證候下痢紅白延二十餘日面色㿠白熱鬱腹脹四肢不溫大孔不合痢下無度診斷查問經過情形中醫清熱運化既不得其竅要元氣已受蹂躪西醫灌腸攻下胃氣又被戕賊西法中藥咸以痢無止法目為成例病狀愈治愈重中氣日虛一日是以脈沉微欲絕舌薄無華乃脾腎大虛之候深恐虛風一動脫竭堪虞療法勉用參附湯甘溫大補元氣力圖挽救處方別直參二錢先煎炮附片錢半水一大碗煎至對摺分四服日夜各二次次診進參附湯身熱悉退大孔亦合痢下有節陽氣有鼓舞之意無如舌色邊尖紅燥口渴思飲飲水不多非特陽氣被傷陰分亦且受損但補其陽有孤陽獨發之慮擬以陰藥配之次方別直參錢半炮附片五分生白芍二錢水炙甘草八分炒銀花三錢烏梅肉一錢三診連進兩劑納穀較多痢下夾有薄糞大腸得陽氣以通胃陽賴陰氣以守第腹痛未除腸鳴漉漉竊思水本無聲風蕩則鳴大腸為手陽明胃為足陽明均屬中土厥陰為風木之臟木乾土氣腸胃水濕蕩之有聲加以白珠青色木賊顯然擬以痛瀉要方扶土瀉木加鮮荷蒂以升清氣清升濁降此經旨之微妙也三方鵝頸天生術二錢炒白芍二錢防風一錢新會皮錢半銀花炭三錢鮮荷蒂兩個酒盅口大效果連服二劑諸病悉退穀食又增繼以調養脾胃數劑後喜跳動精神比前尤足廉按太陰主裡濕土用事其臟性多陰少陽過食生冷傷脾陽而不能消積積而不化此寒痢之所由起也醫者不辨其致病之原因而仍執清熱攻蕩之套方再四投之勢必變症蜂起嘗見屢服黃連虛陽逼外而反發虛熱虛斑者亦有虛寒內擾忽發除中反驟能食而即斃者有頻用大黃開腸洞泄甚至大孔如洞或發呃吐蛔者亦有大黃丸吞下反脹閉不通陰氣上逆而變中滿臌脹水腫者凡此之類未遑枚舉此案病逾兩旬手足不溫大孔不合下利無度中氣下陷窮必及腎勢所必然挽救之法參附固所正用此時關閘盡開赤石脂禹餘糧亦可加入次方增芍甘銀梅作甲己化土酸甘斂陰之法配合適度妙在終用劉草窗法以收全功隨機應變可謂活潑潑地矣寒濕陰黃案內科陳作仁住南昌中大街四川會館病者盧子敬年四十八歲湖北人寓南昌城內病名寒濕陰黃原因時值暑熱喜飲冷水又常於陰涼處當風而臥以致濕邪不得由汗而出困於脾家蓄蘊日久致成斯疾證候面目遍體黯黃如嫩綠小便清白大便溏瀉不熱不渴倦臥無神常若離魂者診斷左右六脈沉遲而緩來去無神察其平素所好參合脈證知系寒濕陰黃證也療法治宜溫通議以茵陳蒿加附子乾薑湯主之仍以茵陳蒿利濕為君以附子乾薑回陽溫中為臣以薏苡仁扶土化濕為佐以雲茯苓利水除邪為使處方茵陳蒿八錢黑附片三錢川乾薑二錢炒薏苡仁四錢雲茯苓四錢效果此方連進二劑溏瀉漸止黃亦稍退各證均有轉機仍照原方加焦乾術三錢杭白芍二錢廣陳皮錢半六一散四錢包煎又接進三劑六日後各證痊愈廉按陰黃以茵陳四逆為主方今去甘草而加苓苡亦獨具匠心
