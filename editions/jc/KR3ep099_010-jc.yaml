body:
  text: 第十卷時疫霍亂病案時疫霍亂案張錫純住天津病者寇媼年過六旬住奉天小南關病名時疫霍亂原因孟秋下旬偶染霍亂經醫數人調治兩日病勢垂危醫者辭不治其子寇汝仁來院懇往為診治證候前本吐瀉交作至此吐瀉已止奄奄一息昏昏似睡肢體甚涼六脈全無詢之猶略能言語惟覺心中發熱難受診斷此證雖身涼脈閉而心中自覺發熱仍當以熱論其所以身涼脈閉者因霍亂之毒菌竄入心臟致心臟行血之機關將停血脈不達於周身所以內雖蘊熱而仍身涼脈閉也療法當用藥消其菌毒清其內熱並以助心房之跳動症雖危險仍可挽回處方鏡面硃砂錢半粉甘草細末一錢冰片三分薄荷冰二分共研細分作三次服病急者四十分鐘服一次病緩者一點鐘服一次開水送下效果將末藥服二次心熱與難受皆愈強半而脈猶不出身仍發涼知其年過花甲吐瀉多次未進飲食其氣血衰憊己極所以不能鼓脈外出以溫暖於周身也遂又為疏方用野臺參一兩以回陽生懷山藥一兩以滋陰淨萸肉八錢以斂肝氣之脫此證吐瀉之始肝木助邪侮土至吐瀉之極而肝氣轉先脫炙甘草三錢以和中氣之漓因其心猶發熱又加玄參四錢以涼潤之煎湯一大鐘分兩次溫服下脈出周身亦熱惟自覺心中餘火未清知其陰分猶虧而不能潛陽也又用玄參沙參生山藥各六錢俾煎湯服下病遂痊愈說明此證初服之藥末載在拙著衷中參西錄名急救回生丹因己未孟秋霍亂盛行時愚在奉天擬得此方登報廣告凡用此方者皆愈友人袁林普為故城縣尹用此方施藥二百六十劑即全活二百六十人次年南半又有霍亂證復為寄去衛生防疫寶丹方此方亦與前方同時擬者方用粉甘草細末十兩細辛細末兩半白芷細末一兩冰片細末二錢薄荷冰細末三錢鏡面硃砂三兩將前五味共和泛水為丸桐子大陰乾透用硃砂為衣勿令餘剩每服百丸病重者可服一百三四十丸袁君按方施藥六大料自救愈千人大抵前方治霍亂陽證最宜後方則無論陰證陽證用之皆效三三醫書第八種時行伏陰芻言載此二方井能治愈伏陰若干證謂霍亂為至險之證而千古治霍亂無必效之方幸拙擬二方用之皆效云廉按張氏壽甫曰霍亂之證或因飲食過量或因寒涼傷其脾胃將有吐瀉之勢疫毒即乘虛內襲遂揮霍燎亂而吐瀉交作矣吐瀉不已其毒可由腸胃而入心胃大絡虛里小腸乳糜管皆與心相通其症間有自心胞直傳心者多不及治更由心而上竄於腦心有四支血脈管通腦致腦髓神經與心俱病左心房輸血之力與右心房收血之力為之頓減是以周身血脈漸停而通體皆涼也故治此證者當以解毒之藥為主以助心活血之藥為佐以調陰陽奠中土之藥為使爰擬急救回生丹一方若霍亂吐瀉已極精神昏昏氣息奄奄虛極將脫危在目前病勢至此其從前之因涼因熱皆不暇深究惟急宜重用急救回陽湯固其陰陽之將離是此湯雖為回陽之劑實則交心腎和陰陽之劑也服此湯後若身溫脈出覺發熱有煩躁之意者直急滋其陰分若玄參生芍藥之類加甘草以和之煎一大劑分數次溫飲下其言如此發明霍亂之病理及其處方可謂獨出心裁別開生面者矣似此佳案的是傳作宜其衷中參西錄山西醫學校定為教授學生之講本也時疫霍亂案李竹溪住蕪湖米市街病者吳二年逾三十撥船頭住河南三街病名時疫霍亂原因濕熱遏郁兼貪涼飲冷而發證候中秋後三日夜半突來吐瀉及至天明已瀉數十次矣身雖冷反煩渴喜飲涼水得水旋嘔溲閉面赤目合汗泄診斷脈伏苔白脈證合參此濕熱亂於腸胃也其來也暴其勢亦危際此水逆溲閉脈伏心煩渴飲汗泄雖瀉已多邪猶未化縱神疲目合有主挽正回陽者予力違其議曰此病此時尚慮其陽未通邪未化如心煩溲閉渴飲等證可溫補乎獨主通陽化氣以免實實之咎療法太陽不開陽明不合故三焦氣化不宣仲聖古法可師五苓加黃連以堅腸處方大面桂心三分生蒼朮錢半米泔泡製雲苓三錢豬苓二錢建澤瀉二錢小川連五分開水為引陰陽水煎服服後飲暖水一杯次診一劑吐止瀉減而心仍煩口仍渴溲行不爽苔色轉黃體仍未溫是陰可堅而陽猶未布氣不化液也五苓加三石法以清陽明伏熱次方前方五苓加生石膏四錢研細滑石三錢包煎寒水石三錢甘瀾水煎服三診煩渴已蠲足先回溫瀉止呃來苔轉黃滑是中宮濕熱無力輸送而蒸痰反致胃氣上逆治以竹茹橘皮湯合丁香柿蒂加蠶沙導濁三方薑汁炒竹茹二錢橘皮錢半潞黨參錢半法半夏錢半水炙枇杷葉五錢麥冬錢半米炒炙甘草五分晚蠶沙三錢包煎公丁香一分柿蒂三十枚河水煎服效果終以調和脾胃祛痰滌熱而愈廉按濕熱夾瓜果生冷寒熱相搏陡然亂於腸胃成為霍亂吐瀉方用五苓散加黃連苦辛通降芳淡滲利瀉雖減而煩渴如前繼用桂苓甘露飲法煩渴除而轉呃終用竹茹橘皮湯加減而收全功藥隨病變醫不執方具見一片靈機活潑潑地時疫霍亂案李伯鴻住汕頭仁安里病者李明德年五十二歲工廠伙伕住汕頭病名時疫霍亂吐而不瀉大寒似熱證原因以貧不能購溫補食物且年老所啖皆殘羹冷飯濕寒積而不化欲吐則胃力不足不能吐出食物欲瀉則肺胃力不能下達大腸故只吐痰水而無物證候大汗如洗全身冰冷吐止痰水藥入即吐病日余而大劇診斷夜深懇余往診到時病者遺囑後事已奄奄一息不能言矣兩手脈微欲絕以聽脈筒聽其心臟尚活而舌有苔垢此凝寒似熱索閱日中所服方果誤為胃熱一派涼瀉品藥入雖未幾吐出然胃氣更因此大傷肺之喘促愈甚所以大劇此凝寒霍亂治之須慎也療法熱水溫罨運用人工呼吸二法額鼻喉耳旁腹均抹以香竄行氣藥油約十分鐘汗止息續能言語以濃薑汁和熊膽液灌之少瘥繼以理中湯加減治之處方生於術三錢黨參六錢乾薑五錢炙甘草二錢姜半夏二錢貢川樸二錢雄豬膽汁童便各半拌藥炒乾用水碗半煎至半碗溫服效果凝寒以膽便同氣相投理中開化其閉結故藥入不拒二日即霍然愈幹事如常廉按案中所敘欲吐則胃力不足不能吐出食物欲瀉則肺胃力不能下達大腸故只吐痰水而無物現此則乾霍亂之屬寒濕一種方用理中加豬膽汁童便炒透逆治之中參以從治法從通脈四逆加人溺豬膽汁湯脫化而來研究古醫學術者夫人而知之妙在先用人工呼吸法喚醒神氣故能速效處當今中西學術競爭之時代為中醫者勤求古訓博採眾方而外不可不進取新醫學術也時疫霍亂案燕慶祥住永修官塘區病者吳相水年三十餘歲江西永修人病名時疫霍亂原因其人素系中寒春傷於風兼感山嵐瘴氣故至六月熱盛之時發為嘔泄霍亂大論曰歲土不及民病飧泄證侯身熱微寒渴不喜飲少腹微疼嘔泄並行手足拘攣診斷六脈沉伏脈證合參是土鬱發為霍亂也愚謂此等證候須以風木為本以陰寒為標以少陽之火熱為中見而其所以然者三陰至太陰為陰之己極故不從本而從中見治者能平其木以扶中土未有不驗者且手足所以拘攣是即轉筋之名然非木之剋土而何蓋手足乃脾胃所司土受木克何怪乎手足拘攣若兼制其肝木則病雖危亦可挽回療法用藿香正氣散加減方以藿香為君白朮為臣加吳茱萸以除陰寒而降肝逆木瓜扶脾伐肝以舒筋處方藿香錢半焦野術一錢三分廣皮八分桔梗八分大腹皮一錢紫蘇八分川樸八分香白芷一錢仙半夏八分茯苓三錢吳茱萸一錢木瓜錢半次診服兩劑嘔瀉痊愈熱亦退手足亦不拘牽處善後方而歸效果囑其禁米七日用香砂六君子湯二劑即復原矣廉按藿香正氣散治風寒外感食滯內停或兼濕邪或吸瘴氣或傷生冷或不服水土等證的是良方若治霍亂轉筋亦惟濕蘊於中寒襲其外者方可酌用此案加吳萸木瓜辛酸合用疏肝氣以舒筋尚屬穩健若溫暑伏熱發為霍亂轉筋者在所切禁時疫霍亂案李伯鴻住汕頭仁安里病者花月娥年十八歲詞女住汕頭病名時疫霍亂腹痛瀉而不吐大熱似寒證原因平日嗜食油炸膾每日必啖數枚以致伏火內發陡變霍亂證候腹痛暴瀉精神錯亂面白目昏瀉時有聲四肢筋抽痠痛視物不見診斷兩手脈沉伏而微惟久之則有一躍彈指按脈微乃腹痛所致瀉時肛門有聲響試以手按其腹病者覺痛脈微中有一躍彈指而面白目昏雖似虛寒經云大熱似寒其為火鬱無疑前醫施以附桂理中所以不能治標也然此伏火霍亂未易辨矣療法內經云火鬱則發之遵是義先施以加味火鬱湯後以加減竹葉石膏湯加減平胃湯處方柴胡二錢防風二錢葛根三錢升麻七分羌活二錢白芍四錢炙草二錢生甘草二錢蔥白四株蒼朮三錢次方竹葉三錢生石膏四錢研細六一散二錢包煎薄荷二錢生白芍三錢花粉三錢赤茯苓一兩原麥冬二錢三方蒼朮二錢陳皮錢半貢樸二錢甘草一錢木瓜二錢烏梅二枚山楂二錢麥芽二錢效果翌日火發口渴痛減面紅唇焦服竹葉石膏後渴瀉均止惟胃未開不思食最後服加味平胃湯食進而病痊廉按此即西醫所謂急性腸炎症也似霍亂而實非霍亂治法先發後清秩序井然非得力於東垣仲景者不辦時疫霍亂案李伯鴻住汕頭仁安里病者李秉乾年五十餘歲住汕頭病名時疫霍亂原因病者體碩大雄偉生平無病行年五十餘只在滬一病連此二次而已惟素具怪脈遭病必重在滬為其摯友治愈此次在酒樓赴宴回忽患霍亂囑家人急請伯鴻余到診時病者已失知覺證候吐瀉腹痛抽筋大汗淋漓面黃土色失知覺不能言語診斷病者素具怪脈一至即止代復如散沙無病時亦如此脈已難據體溫又因霍亂而難探只按其外候斷為霍亂而已療法下以熱水溫罨上以還魂水醒腦約十分鐘面色紅活手足能動略知人事即以止痛藥止其痛病者安臥睡去隨以後方服之遂霍然愈處方廣鬱金錢半生打杜藿香三錢製蒼朮二錢羌活二錢木瓜三錢六神麯三錢臺烏藥二錢生白芍三錢貢樸二錢益元散三錢包煎效果翌日痊愈康按案云奇證方卻尋常而能競奏捷效者全在的對固症而已霍亂轉筋案王經邦住天台柵門樓病者蒼石匠年四十餘歲住溫嶺縣病名霍亂轉筋原因六月間由於先食酒肉後食瓜果後半夜袒臥猝中陰寒而發證候大瀉大吐兩膝拘攣汗出如注手足冰冷精神困倦言蹇語低診斷脈象沉細無神由前醫誤用藿香正氣散以治內傷霍亂吐止而渴生致證愈劇將成陰陽兩脫療法急用生脈散以復脈附子理中湯以回陽枸杞以救陰木瓜以舒筋處方海南參三錢破麥冬三錢五味子一錢炮薑炭二錢宣木瓜二錢淡附片一錢焦冬朮二錢枸杞子二錢炙甘草八分效果一劑脈腹瀉止汗斂筋舒繼用清養善後而愈廉按汗多雖曰亡陽未必不亡其陰下多雖曰亡陰未必不亡其陽此案急救陰陽以固其脫方用生脈散合附子理中湯加杞子木瓜較之孫真人用附子理中湯加麥冬茯苓尤為周到霍亂轉筋案錢蘇齋住蘇州謝衙前病者金寶三室年五十歲住蘇城古市巷病名霍亂轉筋原因既傷暑熱又食瓜果夜臥當風遂成寒熱暑濕風火錯亂之症證候形寒嘔吐暴瀉洞泄神昏壯熱目眶陷腡癟肉脫口渴兩足筋隆起如繩轉動牽掣腷膊有聲腹痛有汗四肢厥冷子病午劇危象畢露診斷脈搏弦細憑脈斷證此由瓜果生冷露臥當風遏其內伏之暑熱暑火入肝激動厥陰風木沖激陽明使人身胃中之津液肝藏之血液頃刻劫奪無餘吐瀉口渴汗流壯熱胃津已亡也眶陷腡癟肉脫血液已劫也而腹痛轉筋脈弦肢振者表裡寒熱錯雜之邪未去風火內旋尚鬱而未伸蓄而未泄也宜先用從治法急去其邪俾屈者伸而蓄者泄然後再圖其已亡之津液療法先用辣蓼草生薑燒酒煎湯置盆中使病人兩足浸入再用粗麻繩蘸湯使有力者將繩在轉筋上牽搓之左右上下不稍停息再用內服湯劑以取速效處方姜炒川連七分蘇梗二錢晚蠶沙三錢陳皮一錢烏藥錢半吳茱萸四分石菖蒲三錢生苡仁三錢廣鬱金二錢大腹絨錢半杜藿香三錢宣木瓜錢半小枳實錢半佩蘭葉三錢飛龍奪命丹二分溫開水先下效果用繩擦二小時轉筋漸定服湯藥腹痛安身熱緩吐瀉止改用芳香清暑藥大勢俱定乃加石斛扁豆等養液五日而起廉按六氣之邪燥氣發霍亂少風邪發霍亂輕若暑火挾濕邪為熱霍亂寒挾濕邪為寒霍亂霍亂多兼飲食過飽乃發亦有觸穢惡發者此案暑濕伏於內風寒中於外又夾瓜果食滯長夏初秋霍亂轉筋最多之原因不外如此方用藿香左金湯加減尚屬穩當妙在先服飛龍奪命丹芳香闢穢化毒祛邪宣氣通營全體大用真有斬關奪隘之功而具起死回生之力也霍亂轉筋案楊德馨住黑龍江育和堂病者李煥亭年四十餘歲保定人病名霍亂轉筋原因由暑濕挾穢擾亂腸胃所致證候上吐下瀉腹痛轉筋目陷肢厥口渴溺無音嘶汗多煩躁不寧診斷六脈皆伏脈證合參乃時行霍亂之急病也療法初仿王夢隱蠶矢湯加減清暑利濕以和其中服一劑瀉止汗止音清脈息已起惟溺閉呢逆照原方去米仁豆卷條芩加石菖蒲川樸蘆根滑石小便利口渴止飲食進惟脈微數胸悶發呃此是胃氣不和餘熱未清耳後服駕輕湯三劑痊愈處方晚蠶沙五錢包煎生苡仁八錢大豆卷三錢陳木瓜三錢條芩一錢鮮竹茹三錢法半夏二錢絲通草錢半紅靈丹一分沖左金丸錢半拌滑石六錢包煎陰陽水煎稍涼塗服效果連服駕輕湯兩劑而痊生扁豆四錢淡香豉四錢鮮石斛三錢鮮枇杷葉五錢去毛抽筋廣橘紅一錢焦山梔一錢陳木瓜一錢鮮竹葉四錢廉按王孟英曰丁酉八九月間杭州盛行霍亂轉筋之證有沈氏婦者夜深患此繼即音啞厥逆比曉診脈弦細以澀兩尺如無口極渴而沾飲即吐不已足腓堅硬如石轉時痛楚欲絕乃暑濕內伏阻塞氣機宣降無權亂而上逆也為仿金匱雞矢白散例而處蠶矢湯一方令以陰陽水煎成候涼徐服此藥入口競不吐外以燒酒令人用力摩擦其轉戾堅硬之處擦及時許鬱熱散而筋結始軟再以鹽滷浸之遂不轉戾吐瀉漸止晡時復與前藥半劑夜得安寐次日但覺困極耳與致和湯數服而痊後治相類者多人悉以是法出入獲效此案純系夢隱方法略為加減競奏全功益見王氏蠶矢湯之確有成效也霍亂轉筋案莊虞卿住麗水第十一中學病者余南年逾三稔師範學校學生住校病名霍亂轉筋原因天氣炎熱因熱貪涼飲冷過度脾受濕侵證候吐瀉轉筋苔黃口渴手足厥冷小便微黃診斷兩手無脈此係陰陽逆亂清濁混淆氣機鬱塞脈息因之潛伏非氣血散上神脫脈絕也靈樞經脈篇云足太陰厥氣上逆則霍亂足太陰脾土臟也其應在濕其性喜燥鎮中樞而主升清降濁之司飲冷過多濕盛於中升降之機為之阻滯則濁反厥逆於上清反抑陷於下而為霍亂轉筋者風木之變也濕土為風木所克濕熱爍於筋則為轉筋苔黃口渴小便黃者為濕鬱化熱之象張路玉云霍亂有一毫口渴即是伏熱種種燥熱之藥誤服即死按張君此言獨具隻眼堪為治霍亂之金針療法用茯苓澤瀉豬苓廣皮為君以祛其濕焦梔香豉為臣以解其鬱熱佐苡仁木瓜木香以舒筋而調氣使以扁豆花消其暑每日服三劑外以好燒酒辣寥令人用力摩擦其轉筋之處處方茯苓四錢澤瀉三錢豬苓二錢廣皮二錢焦梔二錢半香豉三錢苡仁五錢木瓜一錢木香八分扁豆花三十朵外治燒酒六兩辣蓼一把效果擦將一時許筋乃不轉一日吐瀉止三日諸恙退繼用調理康健如常廉按診斷頗有發明處方亦尚穩健此為濕熱霍亂之正治法霍亂轉筋案錢存濟住廣德城內病者蘇春霆年近六旬身體強健早年就館現解職賦閒住廣德城內病名霍亂轉筋原因素性嗜酒每飲必醉茲因酒後食瓜納涼露宿醒則腹痛下利既而嘔吐證候身熱煩渴欲臥冰中氣粗滿悶厥逆躁擾兩腳搐筋腹痛下利小便不通嘔吐清水有如菜汁酸苦異常診斷六脈沉伏微有弦意舌亦無苔合症參之乃霍亂轉筋也六元正紀大論云太陰所至為中滿霍亂吐下又云土鬱發之為嘔吐霍亂又云不遠熱則熱至熱至則身熱吐下霍亂經脈篇云足太陰厥氣上逆則霍亂此證由濕熱內蘊飲冷停食猝傷暑邪致升降機窒清濁相干亂於腸胃而陡然霍亂轉筋正與內經之旨符合蓋吐利者濕土之變也轉筋者風木之變也濕土為風木所克則為霍亂轉筋證從熱化病甚沉重所幸眼眶未陷津未告竭尚屬可治療法用藿薷透表解穢芩連清熱敗毒芩朮滑澤利濕宣郁雪水車前解煩清暑厚朴推滯木瓜舒筋黨參扶氣甘草和中俾表邪透而暑邪清郁土宣而中機建肝平筋舒濕利滯行而吐利自止矣處方西香薷三錢廣藿香三錢川雅連三錢條黃芩二錢澤瀉二錢生於術三錢雲茯苓六錢西滑石八錢包煎卷川樸二錢潞黨參錢半宣木瓜四錢炙甘草一錢鮮車前三株以臘雪水煎服效果進一劑身得微汗熱減煩平脈起復診去香薷藿香加花粉白芍各三錢以生津液再診病愈大半原方分兩減輕又進一劑乃痊遂止藥以糜粥調之未及一周即如常人矣廉按霍亂寒熱相搏者多雖知其為寒為熱亦須反佐以治方中芩連滑石為君佐以藿樸香薷蓋即此理惟吐瀉多中氣必傷故參以四君子湯培其中氣法從黃連瀉心湯脫化而出霍亂轉筋案梁右齋住玉山湖塘沿病者劉腮狗仔年四十六歲住橫路巷裁縫店病名霍亂轉筋原因熱中厥陰證候昨日夜半忽然消渴大渴大飲之謂大吐大瀉足內股大筋揪痛不堪不能轉側足指揪強玉莖揪縮茶水入口即時自覺就走大便出神識尚清至晨全身大肉盡削瘦如雞骨診斷脈浮弦數舌苔白膩兩邊黃燥脈證合參系因熱勢過度氣機旋捷故食不待化而即出內經曰肝主疏泄肝經厥陰氣化風木熱中其經木挾熱以侮土則嘔吐作而不能制水生津化血生肌故大肉削矣風挾熱以劫水則腎水亦暴虧矣水虧則木失養故筋轉之症作矣經又曰腎為胃關腎虛則無能司關故飲食入即直出玉莖亦因而致縮也其症有可救的把握惟神清脈浮傷寒書曰厥陰病脈浮欲愈療法仿孟英法治注重瀉熱平肝舒筋處方生苡仁三錢晚蠶沙三錢包煎赤芍二錢條芩錢半鮮竹茹三錢滑石粉錢半包煎生甘草一錢連翹錢半木瓜八分康熙青錢四枚復診前症悉除脈細氣餒以前方去滑石連翹加生地汁一瓢北沙參三錢生杭芍三錢柏子仁二錢四劑病者曰是病幸得先生上午即來若延至下午恐命不保述其揪痛不堪的情況自覺即時就要脫氣服藥一劑筋揪定二劑吐瀉止昨日三劑遂起床感謝不己說明此證即世俗所稱吊腳痧朝發夕死之證也據西醫解剖試驗則系細菌按吾方內並無殺菌的藥而見效又有如是之迅速其理安在或此藥能助人身之白細胞撲滅細菌也抑或解其熱而細菌自斃也效果以前方去連翹滑石加柏子仁二錢生地汁一瓢沖蘇沙參三錢杭白芍三錢四劑痊愈廉按熱中厥陰由暑熱直中厥陰陡然亂於腸胃而為霍亂轉筋者正內經所謂諸轉反戾水液渾濁諸嘔吐酸暴注下迫皆屬於熱也方用黃芩湯合天水散清肝消暑以堅腸為君參以蠶沙木瓜竹茹苡仁等皆為熱霍亂轉筋之要藥妙在康熙青錢善制肝橫以舒筋法從聖濟總錄脫胎而來非偏用新藥以欺人也抽筋霍亂案陳務齋住梧州四方井街病者潘盧氏年三十八歲廣西容縣住縣底墟體壯病名抽筋霍亂西醫謂虎列拉傳染病原因素因不究衛生過食生冷物質適夏月天氣乍熱畏熱貪涼感受風邪不覺遂至口渴過飲湯茶消化不良傷脾蓄濕誘因產後血虛凝瘀新陳不能代謝月事不調房勞縱欲思慮抑鬱肝腎虧損證候驟然四肢麻木體中戰慄腹痛胸滿上吐下瀉由辰至午足筋攣縮聲音嘶啞汗出如珠目直口開氣促診斷左右手脈沉微似絕脈證合參此虛脫之抽筋霍亂證也其吐者胃氣上逆其瀉者脾氣下陷其吐瀉抽筋自汗如漿者陽越於外陰盛於內也中氣將脫危在頃刻療法附桂理中湯加麝香砂仁法夏取熟附肉桂壯腎暖水能收散失之陽為君乾薑白朮扶土理中溫脾暖胃為臣人參甘草補氣生津培元救脫為佐法夏降逆止吐砂仁麝香興奮神經為使急煎頻灌於口甚難嚥下約數時服盡後氣復微微又將前方再服次日脈復能言診脈微弱繼用十全大補湯取其補氣壯陽活血養陰溫脾和胃化氣生津處方附桂理中湯加減方黑附塊三錢原乾薑三錢高麗參四錢法半夏二錢揀砂仁錢半正肉桂五分貢白朮六錢炙甘草二錢煎成臨服沖麝香五釐徐徐冷服又方十全大補湯方高麗參四錢貢白朮五錢雲茯苓三錢歸身四錢熟地黃三錢北黃耆四錢炙甘草錢半熟附子三錢川芎一錢炒白芍二錢效果二日氣復脈復十日精神已健元氣復舊廉按此治陰寒霍亂元氣將脫之急救正法妙在用麝香興奮神經使參朮附桂發力愈速奏功愈峻方從陶氏回陽急救湯脫化而來陰寒霍亂案陳在山住遼陽咸春堂病者陳永芳年二十五歲住奉天牛莊城病名陰寒霍亂原因秉氣虛弱身體羸瘦曾患嘔血愈而未痊外受寒溫之邪所襲證候初黨中滿小腹微痛夜間吐瀉暴作口燥不思飲四肢厥逆身寒冷汗唇青面白診斷脈來沉遲欲絕純陰之脈也按本歲己酉陽明燥金司大正在七月中氣是四氣司令主客寒濕天運為太陽寒水地運為太陰濕土更夾伏暑餘邪相延不盡人在氣交之中感受蒸淫之氣為病輕則時邪重則霍亂六無正紀大論曰陽明之政多陽少陰是指司天之常非指運氣之變今者寒水加臨濕土之上乃運氣之變也知常知變醫道近焉此證脈象病形皆屬純陰王孟英曰霍亂之屬寒者地氣之逆也逆則為陰急用回陽助氣之劑以救之庶可回春於再造療法用大劑附子理中湯方以人參助氣培元為君白朮健脾燥濕為臣甘草和中補土為佐黑姜辛溫散寒為使加附子扶陽破陰以奏速功處方潞黨參一兩炙甘草五錢白朮二錢土炒乾薑五錢炒黑淡附片五錢又方潞黨參五錢蒼朮四錢炒陳皮三錢生甘草三錢川樸三錢大紅棗七枚效果服前方一劑吐瀉頓止手足漸溫面色微和接服後方白朮易蒼朮減附子黑姜加陳皮厚朴和胃二劑而痊廉按陰寒霍亂即西醫所謂真性霍亂也當然回陽急救強心機以補元氣為止治法方用大劑附子理中與西醫用強心針鹽水注射異曲同工幸而嘔血舊恙來發否則一波遂平一波又起尋繹其方乾薑炒黑附子用淡亦曾顧慮及此大膽之中仍寓小心也陰寒霍亂案顧振呼住南匯做雪村病者蔡阿新年近三旬業農浦東籍病名陰寒霍亂原因夏日酒醉後狂飲冷水繼啖西瓜露宿一夜晨即霍亂大作證候腹痛水瀉色如米漿嘔吐清水飲即吐出呃逆連聲四肢厥逆手指白胖汗泄淋漓旋即眶陷肌削氣急失音咽痛口渴面赤戴陽煩躁暴至有欲坐臥泥水之態診斷六脈沉微似伏舌苔灰白滑黏此陰寒霍亂危證也陰盛於下格陽於上上熱假下寒真中陽困頓轉旋無權陰陽否格暴脫在邇療法內外井治速令醋打生附子四枚塗兩足心湧泉穴以引其上越之陽研化龍骨生牡蝸粉各二兩遍撲周身以固其外散之陽隨迸白通加人尿豬膽汁法參人麝香肉桂丁香柿蒂諸品徐徐冷服防其拒納以俟動靜處方生附子三錢炒黨參三錢肉桂一錢丁香一錢淡乾薑三錢淡吳萸錢半麝香五釐柿蒂二十四枚草果錢半蔥白三莖清童便一杯豬膽汁一匙同沖效果服藥後煩躁漸靜四肢轉暖汗呃止咽痛緩面赤亦退余候依然惟脈象初則續續漸出未及半時倏又雙伏煩躁復作此陰寒過厲氣竭陽微遽難旋轉回陽也今將原方加別直參三錢速煎冷灌臍貼回陽膏一張回陽膏用當門子五釐母丁香桂心生附子各一分硫磺三分五釐研細置膏貼臍治陰寒霍亂溫通脾腎有特效藥肆中多不備急難湊手殊為憾事醫者宜修合儲瓶以備急需庶免臨渴鑿井之苦以溫運脾腎招納浮陽後脈漸續出但虛細耳諸恙均除乃以前方去蔥白膽汁童便當門子柿蒂加戈製半夏一錢赤苓三錢減參薑桂附之制予二劑而愈康按陰寒霍亂即西醫所謂真性霍亂也其症最怕汗多瀉多汗多則亡陽瀉多則亡陰轉瞬陰陽離決精神乃絕雖用白通加人尿豬膽汁法往往不及救治者因購藥費時煎藥費時故耳此案加入桂麝奮興神經強心機以回陽較漢方奏功尤速附以各種外治以助湯方之不逮其最易建功者臍貼回陽膏一張立消陰寒以通陽若再加姜復艾灸較但用貼法尤勝寒濕霍亂案李竹溪住蕪湖米市街病者張有才年四十餘歲煤炭船主病名寒濕霍亂原因病由船居無定且喜露臥多嗜瓜汁故濕從寒化陡發霍亂證候一起即腹痛泄瀉繼則嘔吐清水三五次後己覺汗泄肢冷冷過肘膝眶陷形脫螺癟音啞腿足轉筋神揚氣促躁擾不寧其溲清冷診斷苔白脈大按之脈細欲脫此寒濕傷中陽氣欲亡之霍亂也霍亂入手先分寒熱勘此脈症不獨病屬寒濕且已中樞無權有波撼岳陽土奔岸敗之勢岌岌殆哉際此千鈞一髮未可因循姑擬一法先服局方來復丹三錢繼以水藥至成敗利鈍未敢逆料也療法急當挽正回陽以參附為君薑桂為臣佐以術草守中茯苓淡滲吳萸逐其中下陰寒使以木瓜舒筋蠶沙導濁處方別直參三錢黑附塊錢半乾薑錢半猺桂心六分宣木瓜錢半焦白朮三錢炙甘草八分雲苓四錢吳茱萸七分晚蠶沙五錢包煎陰陽水煎船居救急可以甘瀾水代之先煎參附二十餘沸次下諸藥接方西潞參三錢米炒生蒼朮錢半炙甘草五分老生薑五分熟附子四分小雅連五分姜炒甘瀾水煎如前法次診昨以加味理中嘔雖平瀉未止而神倦苔仍淡白口微干溲稍黃是中陽未振脾胃未和之咎主以異功加穀芽和曲建立中州以佐升降次方西潞參三錢米炒焦白朮錢半雲茯苓三錢炙甘草六分炒廣皮錢半炒穀芽三錢六和曲三錢炒河水煎服策應用滴醋三斤置床前燒鐵器俟紅淬之使病人鼻納醋氣可免陽越手足曲池委中勞宮諸穴多以薑汁摩擦則可回溫再以吳萸木瓜各二兩煎水熏腿另以火酒擦之以筋不轉而止三診狂瀾力挽險象已平手足溫筋不轉惟瀉減而未除脈象按之仍細仿孫真人千金方法改用附子理中加茯苓麥冬效果兩服前方知飢納穀而瀉止矣囑以甘淡調理而愈廉按病責認證藥難浪投若非真寒此等方法慎勿輕用一經誤用轉見渾身青紫而斃矣即不見青紫往往眼白皆紅腹灼心煩甚則神識昏蒙或發呃逆而亡予見甚多故臨證時必要審慎周詳也風火霍亂案李竹溪住蕪湖米市街病者姊氏汪年三十四歲住後家巷病名風火霍亂俗稱癟螺痧古名化銅疫原因今年相火司天風木在泉又兼素稟肝強天人相感疫氣乘之遂發霍亂證候晨起頭暈脘𩞄午飯後脘𩞄尤甚自嚼青銅錢百餘枚飛函召予至則見其心煩口渴嘔吐酸苦迫瀉溲熱螺癟眶陷氣竭音嘶診斷脈沉弦數似伏而尚未全伏此肝木挾風火披猖之象金受火熾則音嘶氣竭土被木削則螺癟眶陷所幸肢未全冷脈未全伏其勢雖危可毋深慮療法議左金降火以泄肝陽合溫膽開痞以止嘔吐加黃芩去三焦鬱熱而止瀉滑石利水以分清濁獨取連梗荷葉一味取汁為全方之主持荷葉其色青其象震其氣芳香其味苦平受雨露輕清之氣故功能清暑解疫連梗取汁又得通氣下降而逐穢也處方吳茱萸四分鹽水泡小川連六分薑汁炒姜炒竹茹二錢雲茯苓三錢醋製半夏二錢生甘草六分廣橘皮一錢枳殼炭一錢淡黃芩一錢西滑石三錢包煎連梗荷葉汁一匙沖陰陽水煎十餘沸溫服沖荷葉汁二診一服嘔平溲長瀉止惟神倦多汗口渴脘悶胃猶覺𩞄改以清火益氣法君竹葉石膏以清陽明臣西瓜翠衣鮮石斛西洋參生草清養胃氣而緩肝橫佐法夏以通陰陽使川通草以泄餘邪二方淡竹葉一錢生石膏四錢研細西瓜翠衣三錢鮮石斛三錢西洋參一錢生甘草六分仙半夏錢半川通片一錢甘瀾水煎滾加入西瓜翠數沸飲之效果兩劑諸恙均減神略健仍欠納以前方加入荷花露一兩穀芽露一兩而興廉按風自火生火隨風轉乘入陽明則嘔賤及太陰則瀉是名霍亂竄入筋中則攣急是名霍亂轉筋總由濕熱與風淆亂清濁升降失常之故此案即屬此證方用藿香左金湯加減妙在用鮮荷葉汁一味清芬闢疫疏泄火風案中發明功用確有理由巧思正不可及接方用竹葉石膏湯加減亦屬對症良方中熱霍亂案劉倫正住泰安顏張鎮病者劉興順山東泰安縣人城東西埠前莊病名中熱霍亂原因自幼業農生活辛苦猝然中暑夾食陡發霍亂證候手足冰冷吐瀉轉筋大渴喜飲腹不疼痛目反白眼下瀉臭穢診斷兩手無脈舌苔垢膩邊白中黃此中熱霍亂也口大渴不止瀉有臭味熱無疑也若是寒證胳臂裡面外面俱冷渴不欲飲目眶塌陷無反白眼之象有抽筋無轉筋之理腹必大疼雖寒熱均能使腹疼痛然熱痛時疼時止寒痛大疼不止又熱證手足冷爪甲紅色寒證手足俱冷爪甲不紅重則青黑色難治此證寒有熱皆在夏令必要辨證的確始可對證發藥也療法用六合湯加桃紅銀花方以銀花扁豆解暑毒藿香清夏赤苓消暑氣為君杏仁川樸下氣寬胸為臣佐以桃仁紅花活血通絡木瓜舒筋平肝使以甘草調和諸藥西參略扶正氣處方杜藿香二錢卷川樸二錢光杏仁三錢清半夏三錢陳木瓜二錢西洋參一錢生扁豆三錢光桃仁錢半紅花錢半赤苓三錢濟銀花五錢甘草一錢荷花露一兩沖效果初服一劑藥不納病者閤家恐慌預備後事余曰再煎服第二劑可保有效遂連服兩劑六脈皆現後用清理而愈廉按中暑夾食陡發霍亂轉筋者為熱霍亂方用六合湯加桃紅銀花消暑化食活血舒筋大旨不差惟轉筋多因肝橫乘脾其肝火必內熾當佐左金丸既能泄肝以止轉筋又能上止吐而下止瀉加此則更周備矣伏暑霍亂案袁桂生住鎮江京口病者程姓年約二十餘歲住蘇州閶門外營盤場病名伏暑霍亂原因素性畏熱最喜飲冷適天氣酷熱因事外出途中吸受暑氣致暑熱內伏不得外達遂釀變霍亂證候吐瀉不已煩躁畏熱身無寸縷而猶畏熱異常欲臥冷地四肢悉冷胸腹部亦均不熱口渴欲食西瓜小便短赤頭項微汗腳腓痙攣診斷脈息寸關俱數舌苔黃燥無津此暑熱內伏熱深厥深內真熱而外假寒之病也療法以白虎湯合黃連香薷飲加減處方生石膏一兩研細白知母四錢生甘草五分原麥冬二錢小川連一錢西香薷一錢生扁豆三錢生苡仁三錢鮮石斛三錢陰陽水煎效果一服吐止再劑利亦止而煩渴亦大定矣惟肢體尚冷囑以稀粥與飲安睡一夜體溫遂復常度於是但以飲食調養不勞他藥而瘳廉按伏暑霍亂世俗稱為熱霍亂夏秋之交為最多孟英治法每用竹葉石膏湯地漿水煎反佐薑汁細辛以治熱深厥深之證輒多奏效此案大旨相同而以香薷為反佐則同中略異耳乾霍亂案劉榮年住濟南東流水病者王清臣年五十餘歲住省城病名乾霍亂俗名為絞腸痧原因猝受時行痧穢而發證候欲吐不得吐欲瀉不得瀉腹中絞痛異常手足厥逆診斷兩手脈皆沉伏脈證合參此乾霍亂也因大地不正之氣中人臟腑上下不通故吐瀉不得腹中絞痛榮衛不行故脈閉而伏手足厥逆非芳香宣竅之品何以驅穢惡之氣那療法湯丸並進方用藿香快氣和中開胃止嘔為霍亂聖藥故用以為君香附通行十二經絡故用以為臣佐以檀香沉香木香宣通利氣之藥再加陳皮枳實川樸以為使又恐穢惡之氣盤踞中宮不易掃除再用蘇合香丸諸香竄之藥直達病所而驅疫氣處方廣藿香五錢制香附三錢白檀香二錢上沉香錢半廣木香錢半廣陳皮二錢生枳實錢半上根樸錢半藥煎好後去渣研入蘇合香丸二粒溫服效果服藥一句鍾後即能安睡醒後諸病皆去手足溫暖脈象照常而愈廉按暑穢之毒擾亂腸胃而病乾霍亂故仿景岳十香丸法闢穢通竅以奏功乾霍亂案莊虞卿住麗水第十一中學病者馬金玩乃室年逾三稔體強住回回堂後病名乾霍亂原因痰食停滯胸悶不食復受暑穢倏忽病作證候心腹絞痛欲吐不吐欲瀉不瀉面青舌強足膝拘攣診斷左手脈澀右關滑實脈證合參此於霍亂證也既因停積而壅塞腑氣復受穢濁而阻逆經氣則中州擾亂胃脘氣逆此腹痛而不吐瀉等證所由作也面青舌強者是邪已入營營血凝而不流之象驟發之病勿慮其虛非內外急救鮮克有濟周時內飲食米湯切勿下咽免致脹逆莫救療法內外兼治以磁鋒刺委中穴深青色之筋出血以泄其毒復用鹽湯探吐以宣其滯得吐後再以梔子豉湯加香附益母草川樸菖陽法夏茯苓生草調氣行血解毒安中以善其後日服二劑處方磁鋒極尖銳者二枚鹽一撮放刀上用火炙透用陰陽水和服以鵝羽探吐又方梔炭一錢五分香豉三錢制香附二錢川樸一錢菖蒲八分法夏一錢茯苓三錢益母草二錢生草五分效果磁鋒砭後手足遂舒用鹽湯探吐當吐黃碧色之痰涎碗許腹痛遂愈三日胃能納食五日康健如常矣廉按乾霍亂病因不一驟傷飲食者宜探吐宿食為患者宜消導氣鬱感邪者宜宣豁暑火直侵者宜清解前哲張三錫郭右陶早有發明張氏曰乾霍亂俗名絞腸痧急宜探吐得吐則生不吐則死吐後方可理氣和中隨症調治郭氏曰心胸脹悶腹中㽲痛或如板硬或如繩縛或如筋吊或如錐刺刀刲雖痛極而不吐瀉者名乾霍亂乃邪已入營宜以針刺出血則毒有所泄然後再審其因而藥之此案內外急救深得兩家之心傳宜其應手奏功也霍亂後轉變熱病案葉鑑清住上海病者何芳浩年約二十海昌人寓大馬路病名霍亂後轉變熱病原因飲食不潔吸受穢邪病起驟然證候三日前霍亂吐瀉無度腹痛轉筋今諸恙均平而四肢厥冷冷過脛臂日夜煩躁不寐環唇焦燥渴思生冷便閉溺少形色渾赤診斷六脈全伏此霍亂變症一團邪火結實陽明前醫主用附桂回陽不知溺赤便閉唇焦煩躁乃腸胃之真熱脈伏肢冷是邪滯壅遏氣血不通之假冷傷寒論云熱深厥亦深即此病也且舌苔干糙中裂邊尖絳根垢厚邪實腸胃尤為顯著病勢已險若陷入包絡燃及厥陰即刻昏痙變端就難援救療法急以清泄潤導峻通大便用涼膈散原方處方生大黃四錢焦山梔四錢淡黃芩二錢薄荷葉八分白蜜兩匙衝入元明粉三錢淨連翹四錢生甘草八分鮮竹葉四錢次診進涼膈散後大便連通兩次初燥屎繼稍軟色均黑稍能交睫煩躁渴飲尚盛四肢轉溫脈道亦通往來細數不揚溺更渾赤腸胃之郁邪猶夥宿垢亦未清澈面紅目赤舌苔干糙根厚尖邊絛病勢未出險途防變昏痙治再清導佐以生津次方生大黃三錢鮮石斛五錢天花粉四錢淨連翹四錢元明粉二錢肥知母二錢黑山梔三錢金銀花四錢生甘草八分大竹葉三錢鮮茅根一兩去心衣並節三診大便又行三次前兩次猶是黑鞕第三次始帶溏漿醬色奇臭今日診脈脈數而揚舌苔較化質亦稍潤煩躁渴飲目赤一派火象均見退舍稍飲稀粥湯夜寐尚安適火邪初退津液灼傷殊甚慎防昏痙滋變三方鮮石斛五錢鮮生地五錢淨連翹四錢大竹葉三錢生甘草八分天花粉四錢焦山梔三錢金銀花四錢蓮子心八分茅根去衣心蘆根去節各一兩四診夜寐較安胃納較展四肢溫熱頭面有汗今晨咳出厚痰頗多無形之熱釀蒸有形之痰煩躁渴飲目赤等又見輕減溺尚深黃脈數右部較甚舌苔黃尖邊仍絳大病小愈最易生變治再生津清化小心飲食靜養勿躁亦為病中要事四方鮮石斛四錢瓜蔞仁四錢淨連翹四錢生竹茹二錢生竹心卅根冬瓜子四錢黑山梔三錢川貝母三錢去心金銀花四錢嫩蘆根一兩去節蓮子心七分沖鮮荷梗尺許去刺五診胃納日展大便又行頗爽溺色淡渴飲和夜寐亦安右脈尚形滑數治再和胃生津清化餘邪五方南沙參三錢川貝母二錢去心連翹三錢嫩蘆根八錢去節淡竹葉錢半原金斛三錢冬瓜子三錢綠豆衣四錢生竹茹錢半鮮稻葉十片六診徹夜安寐食欲亦佳脈來右部已靜濡滑有神邪熱已化津液漸復再以清養善其後六方西洋參一錢淨連翹三錢生竹茹錢半淡竹葉錢半鮮荷梗一尺去刺南沙參三錢扁豆衣錢半生嫩蘆根八錢去節橘白一錢鮮稻葉十片效果服三劑痊愈康按霍亂吐瀉有陽性陰性之分且有虛脫實閉之別臨症時診斷不精輒致誤治至若霍亂後轉熱證陽性霍亂固多從火化即陰性霍亂服熱藥後一經肢溫脈出亦從火化者多中醫所謂重陰必陽物極必反者即西醫所謂反動力反應性也前哲陳修園輩謂霍亂服通脈四逆湯後由陰轉陽可用竹葉石膏湯急救津液以清伏熱為霍亂善後之要圖此案暑穢夾食當然都從火化而轉為陽明之實證初用涼膈散清瀉積熱尚非孟浪之峻劑第二方猶用清導此非確有卓識者不辦以後四方由清化而轉清養層次井然的是所輪老手霍亂暴脫案張錫純住鹽山西門內病者劉氏婦年近四旬住鹽山城北故縣病名霍亂暴脫原因受孕五六月時屆孟秋偶染霍亂吐瀉約一日夜霍亂稍愈而胎忽滑下神氣頓散心搖搖似不能支持時愚在其鄰村訓蒙遂急延為診治證候迨愚至欲為診視則病勢大革殮服已備著於身將舁諸床病家辭以不必診視愚曰此係暴脫之證一息尚存即可挽回入視之氣息若有若無大聲呼之亦不知應診斷脈象模糊如水上浮麻此證若系陳病斷無可救之理惟因霍亂吐瀉已極又複流產則證系暴脫仍可用藥挽救療法暴脫之證其所脫者元氣也然元氣之脫必由肝上升所以人之將脫者肝風先動當用酸斂之藥直趨肝臟以收斂之即所以堵塞元氣上脫之路再用補助氣分之藥輔之勢雖垂危亦可挽救處方淨萸肉二兩野臺參八錢生懷山藥一兩方雖開就而藥肆相隔數里取藥迫不及待幸其比鄰劉玉珍有愚所開藥方取藥二劑未服中有萸肉共六錢遂急取來暴火煎湯灌之效果藥下須臾氣息稍大呼之能應遂又按方取藥煎湯兩茶杯此時已能自服藥遂作三次溫服下精神頓復繼用生懷山藥細末煮作茶湯連服數日以善其後蓋萸肉治脫之力實勝於人參若單用人參治脫恆有氣高不返之弊說見喻嘉言若單用萸肉治脫轉能立見功效惟重用萸肉輔以人參尤為穩善廉按辨證立論多閱歷之言謂萸肉固脫勝於人參亦卻有至理
