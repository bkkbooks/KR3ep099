body:
  text: 第十四卷時行鼠疫病案肺鼠疫案張錫純住鹽山西門內病者施蘭孫年三十餘浙江人奉天中國銀行經理病名肺鼠疫原因庚申冬令黑龍江哈爾濱一帶鼠疫流行奉天防範甚嚴疫毒之傳染未嘗入境惟中國銀行與江省銀行互有交通鼠疫之毒菌因之有所傳染而發生鼠疫證候神識時明時憤恆作讝語四肢逆冷心中發熱思食涼物小便短赤大便數日未行診斷脈沉細左右皆然且遲甚一分鐘五十八至舌上無苔干亮如鏡此證雖有外感傳染實乃因寒生燥香港之地有時鼠疫流行又是因熱生燥因燥生熱腎氣不能上達陰陽不相接續故證象脈象如此其為鼠疫無疑也此證若燥熱至於極點肺葉腐爛咳吐血水則不能治矣幸猶未至其候急用藥調治尚可挽回療法治此證當以潤燥清熱為主又必須濟其腎氣使之上達與上焦陽分互相接續則脈變洪大始為吉兆處方生石膏三兩研細知母八錢元參八錢生懷山藥六錢野臺參五錢甘草三錢此方即拙著衷中參西錄白虎加人參以山藥代粳米湯又加玄參也本方後所載治愈寒溫病脈虛熱實之證甚夥可參觀煎湯三茶鍾分三次溫飲下效果將藥服盡一劑身熱脈起舌上微潤精神亦明瞭又按原方再服一劑大便亦通下病從此遂愈廉按鼠疫為八大傳染病之一西醫名黑死病又名配斯篤有肺配斯篤腺配斯篤等之別吾國鼠疫彙編鼠疫集成專發明此病而設大旨以清解血毒為君此案療法潤燥清熱從人參白虎湯加減乃治肺配斯篤清燥救肺之方法為治鼠疫者別豎一幟雖然鼠疫之毒由鼻入肺則為肺鼠疫其證比腺鼠疫重而且速甚者有一二日即死湖北冉雪峰君曰丁已戊午冬春之交歸綏鼠疫蔓延浸浸南下而晉而魯而寧武漢亦有此項疫證發現除糧道街黃姓少東後長街夏姓內眷誤藥在前肺部潰爛已吐膿血不救外其餘候補街宋姓府後街朱姓百壽巷袁姓等多人均以一二劑起之經此番實驗似有把握夫肺鼠疫為陰燥陰燥體陰用陽純是一派熱象即兼外感不可用辛溫發表且熱雖甚亦不可用苦寒盪滌蓋肺位最高燥先傷肺肺主氣當治氣分倘邪來入營開手即用連翹紅花丹皮桃仁之類是鑿空血管引賊入室必也清芳潤透不溫不烈不苦不燥不黏不滯其庶幾乎爰制二方於後為世之治肺鼠疫者進一解一太素清燥救肺湯冬桑葉三錢杭菊花二錢薄荷葉一錢栝蔞皮三錢甜杏仁三錢鮮石斛三錢鮮蘆根六錢生甘草一錢真柿霜三錢津梨汁二茶匙沖以上十味除柿霜梨汁以水三杯微煮以香出為度去滓入柿霜梨汁溫服身熱或入暮發熱本方薄荷再加一錢或加麻絨六分至八分取微似汗得汗去麻絨此方治燥氣怫鬱之在氣分者桑葉菊花薄荷芳香輕透清肺熱解肺郁利肺竅俾燥邪外泄皮毛蔞皮杏仁利膈導滯內氣得通則外氣易化石斛蘆根涼而不滯清而能透柿霜梨汁柔潤而不滋膩甘草補土生金和諸藥解百毒合之為清涼透表柔潤養液絕不犯上論各弊有熱加薄荷麻絨者肺合皮毛開之以殺其勢勿俾久遏而令肺臟發炎也二急救通竅活血湯川升麻錢半青蒿葉三錢藏紅花二錢淨桃仁三錢犀角尖一錢生鱉甲三錢真麝香五釐絹包鮮石斛三錢鮮蘆根六錢以上丸味以水五杯先煮升麻等七味令汁出再入蘆根石斛微煮五六十沸去滓溫服外竅閉加麻絨一錢五分如內竅未閉去麝香勢緩亦去麝香得微似汗微吐者愈急刺足委中穴以助藥力此方治燥邪怫鬱直襲血分氣血交阻面目青身痛如被杖肢厥體厥脈厥或身現青紫色倘僅氣分鬱閉未可誤用界限務宜分明青蒿升麻透達氣分之邪紅花桃仁透達血分之邪犀角鱉甲直入血分而攻之石斛蘆根轉從氣分而泄之而又加麝香以利關節以期立速透達合之為由陰出陽通竅活血而仍不落黏滯犯以上各弊不用柔潤者急不暇擇以疏通氣血為要務也外竅閉加麻絨亦閉者開之之意也內竅未閉及勢緩去麝香恐耗真氣也急刺足委中穴恐藥力緩不濟急刺之以助其疏利也或問石斛蘆根後煮取其輕透氣分固已升麻青蒿亦氣分藥何以不後煮曰石斛蘆根原取清輕過煮則腐濁失其功用若升麻青蒿混合久煮取其深入血分透出氣分若亦後煮則兩兩判然安能由陰出陽乎噫微矣肺鼠疫案吳興南住遼陽城南戴二屯病者巴宏鈞年二十一歲奉天省遼陽縣人住巴家崗子病名肺鼠疫原因苦寒勞力居室不潔每多鼠患適哈埠長春盛行鼠疫時屆深冬嚴寒微覺背寒而發於民國二年臘月二十日夜間病作證候四肢逆冷胸部反溫心神恍惚遽不知人面現灰暗目不能視診斷左右三部脈均散亂乍大乍小若有若無滿舌濁垢若白若黃若灰若黑黏滑殆遍呼問久之微言咽痛心煩次即昏去遂斷為肺鼠疫證其先有杏花村蘇某新從長春歸遽患類此延余診治謂為鼠疫均非笑之未曾用藥下午即死今巴宏鈞系屬至戚年邁孀母僅此孤兒死即絕嗣矣余壯膽診斷問得痛在咽喉必有疙瘩此鼠疫之一自言心煩為邪壅心房此鼠疫之二面現灰白目不能視又鼠疫之三審斷已諦余曉之曰勢迫難緩正在生死關頭矣療法先以手法按摩其四肢使氣血微活即以銀針臥刺百會直刺神庭土星印堂左右太陽等穴再放兩尺澤之血與十宣勞宮雖取紅汗惟所出之血均黑紫毒重刺畢患者知人矣遂用加減二花解毒湯金銀花性善解毒人所共知且功專入肺肺屬嬌臟最易感邪用至二兩使肺金清肅咽痛疫邪開矣性涼下降與地丁合用下降之力愈速使邪不少留得大力子苦桔梗順胸中之氣解咽喉之危其疙瘩立化紅花少則養血多則破血正藉其破血大力使心房之紫血回管之黑血排泄以清新血復原神明出矣人之左右心房一司出一司入排泄跳動瞬息不止紅花重用五錢猶恐其力薄佐以生桃仁三錢尤能破瘀生新直入心經使邪無遺留少入麝香善行善竄周身之經絡不為毒壅四肢返溫暹邏角直透心臟性最解毒為治疫毒內陷之特效藥處方金銀花二兩南紅花五錢生甘草三錢生桃仁三錢搗苦桔梗三錢青連翹三錢野菊花三錢大力子三錢紫花地丁五錢加入暹邏角一錢磨汁麝香三釐入藥內沖服效果服此一帖病去大半次服各減其半繼用太乙紫金錠二錢作四次服幸慶更生後於新正節近治此證十有餘人無不奏效噫世事變遷災殃亦異遭斯證而死者形體黑紫謂為黑死證但指其形色而言實則皆由血毒必先放血泄毒藥則活血逐毒庶幾白血輪不致為毒菌吞滅其人方免立斃矣廉按鼠疫既染危險萬狀大要分肺鼠疫肺百斯篤腺鼠疫腺百斯篤兩種其為證也先犯心臟使心力衰弱凡脈搏如絲即為疫毒由鼻入肺侵犯心臟惟一之確據其次體溫速升頭痛眩暈或作嘔吐漸漸神識檬朧陷於昏睡譫語狀態癡呆步行蹣跚眼白純紅舌苔白色如石灰撒上或汙紫如熟李頭腺液窩大腿上近陰處起腫脹疼痛劇烈者一二日即死其神氣清核每作癰亦遷延數日而死初起以宣透穢毒為第一妙法閩省梁君達樵云病者發熱頭痛四肢倦怠骨節禁銅或起紅點或發丹疹或嘔或瀉舌乾喉痛間有猝然神昏痰湧竅閉者此係穢毒內閉毒氣攻心宜用芳香闢穢解毒護心闢穢驅毒飲主之西牛黃八分研沖人中黃三錢九節葛蒲三分靛青葉一錢五分銀花五錢鮮者蒸露亦可野鬱金一錢水煎成取出調牛黃服如見核子或發斑或生疔加藏紅花八分單桃仁三錢熊膽四分大渴引飲汗多加犀角金汁神昏譫語宜用至寶丹或安宮牛黃丸開水和服先開內竅按此方乃透穢之良劑疫核雖重病初起不可即下審其口燥神昏熱熾有下證者先闢穢解毒然後議下每每獲效下法用大黃三錢泡紫雪丹五分最良案系肺鼠疫其毒菌從口鼻傳染首先犯肺逆傳心臟之危篤急症識病既明方亦頗有大力惟麝香不如用太乙紫金丹即吾浙胡慶餘堂闢瘟丹皆有遂穢殺菌之作用吾友離塵山人在奉天時曾親見其效如神肺鼠疫案劉蔚楚住上海邢家橋路祥餘里病者族叔蔭庭之母年近古稀住什湖鄉病名肺鼠疫原因素有哮喘證因媳婦患鼠疫病不免勞苦遂感染而哮喘復作證候初起但熱不寒神昏嗜臥目不欲開口不思食而又無核診斷脈不浮不沉中按洪長滑數右手反盛於左手舌邊尖紅苔黃而滑此疫邪引動宿病其神昏嗜臥者痰迷清竅也熱雖盛而無核者疫毒首先犯肺也病在高年最防惡注而驟變疫厥療法解毒活血為君參以順氣開痰鼠疫經驗力加減處方光桃仁二錢全當歸一錢青連翹三錢鮮竹茹三錢藏紅花一錢真川樸一錢生赤芍二錢小枳實錢半栝蔞仁四錢杵川貝母四錢去心擘效果一劑而平次日復發連服二劑而愈廉按此案感疫無核顯系肺鼠疫之明徵惟老年氣衰質弱雖同一患疫而用藥輕重各殊就使認證已確峻猛之藥只可用至四分之一和平之藥亦不得過十成之五吾願醫之志在安老者幸毋忽諸案中斷證處方雖不越王氏活血解毒之範圍而善為加減酌斟用量即能三劑奏功宜乎粵醫公推為鼠疫之經驗方也同社友余伯陶君謂江南嶺表兩地地形之卑濕雖同而地氣之寒溫迥別是以人之體質亦隨地而異即藥之分量亦固人而殊羅氏所定之加減活血解毒湯即吳又可所謂急症急攻法也施之於壯體重病誰曰不宜第強弱有相懸陰陽有偏勝或老或幼或其人本有夙疾或病後元氣未復是在用藥者神而明之變而通之也爰是權其輕重之宜增補加減冶法數條如肝陽素盛者去柴胡葛根加桑葉菊花肺陰素虛者去柴胡葛根厚朴加桑葉貝母知母腎陰素虛者減去柴葛加知母穭豆氣分素虛者去柴胡微加防風血分素虛者去柴胡葛根加桑葉丹皮幼稚純陽者同胃熱素重者生地乾者易鮮痰濕素重者住以平胃二陳大病之後去柴胡葛根加丹參蘇梗老年氣衰者同亡血之後去柴胡葛根桃仁紅花加丹參桑葉側柏白薇產後血去過多者去桃仁紅花柴胡葛根加荊芥穗蘇丹參產後血枯生風者去柴胡葛根桃仁紅花加蘇丹參荊芥穗天麻穭豆腺鼠疫案陳務齋住梧州四方井街病者梁建廷年五十歲廣東南海縣住廣西容縣友記店商界病名腺鼠疫又名核疫證西名百斯篤證又名黑死證傳染病原因素因不究衛生飲食不節過食辛辣酸鹹腸胃蓄濕生熱誘因鼠疫流行城市疫斃甚眾菌毒飛揚由口鼻吸受直接傳染而發證候驟然頭痛惡寒發熱頸股腋下發結核十餘枚灼熱疼痛全體大熱晝夜不休面色紫黑目赤血絲敷蓋唇色瘀黑焦腫氣逆粗喘呃逆頻頻神識昏迷皮膚髮赤灼熱如焚診斷左右六脈洪大弦數一吸已動七至體溫升騰達一百零六度脈證合參斷為腺鼠疫證其菌毒侵逼諸腺故頸股腋下結核腫實堅如鐵石灼熱疼痛勢甚凶猛危在旦夕是日延醫十餘會診無一立方本在不治之證今承病家懇求甚切不得不力圖援救也療法內外並治先用竹茹刀柿湯以止呃平喘取竹茹柿蒂刀豆降逆下氣開胸快膈為君膽草白芍降肝膽之沖逆為臣釵斛知母生地平胃逆涼陰血為佐花粉杏仁潤肺降逆生津化痰為使服後呃逆已除氣平不喘又用除疫羚犀敗毒湯取羚羊犀角川連膽草黃芩瀉心肝伏火而清三焦生地紅花涼血去瘀石膏知母平胃清熱大青地丁中白銀花真珠敗毒滅菌蘆筍茅根透解毒熱連進五服並外敷清熱敗毒之藥常熱常換疼痛已除人事漸醒體熱略退始能瞬息惟皮膚多現結核大者如指小者如豆全體布滿形似熟荔枝狀診脈洪大已減只現弦數又用羚犀桃花敗毒湯取清熱降火涼血解毒去瘀生新連進五服後則結核俱消體熱己除能起立略進食惟睡眠不寧咽乾口燥頭部微暈體中內熱診脈仍數又用犀角地黃湯合人參白虎湯加杭菊花取其清熱涼血潤燥生津解表和里也處方竹茹刀柿湯柿蒂三錢馬刀豆仁二十枚燒存性鮮竹茹五錢龍膽草三錢生白芍三錢知母四錢鮮生地六錢鮮釵斛三錢天花粉四錢苦杏仁四錢去皮次方除疫羚犀敗毒湯羚羊角二錢犀角尖三錢磨沖鮮生地六錢鮮大青四錢紫地丁三錢人中白一錢生石膏一兩研細肥知母五錢金銀花三錢西紅花三錢川黃連三錢龍膽草三錢淡黃芩四錢真珍珠五分研末沖服先用活水蘆根三兩去節鮮茅根二兩去皮煎湯代水三方羚犀桃花敗毒湯羚羊角二錢犀角尖三錢光桃仁五錢金銀花三錢西紅花二錢生石膏一兩研細粉葛根五錢生赤芍三錢鮮生地五錢鮮大青四錢牛蒡子四錢杵人中白三錢淮木通二錢蓮子心五錢煎服四方犀角地黃湯合人參白虎湯加杭菊花犀角尖二錢磨沖鮮生地五錢生白芍三錢牡丹皮二錢生甘草一錢生石膏五錢研細西洋參三錢杭菊花二錢肥知母四錢生粳米五錢五方外敷拔毒消核膏方生錦紋一兩鮮生地一兩五錢赤芍一兩鮮桃葉四兩生芭蕉根八兩生蒲公英二兩生蒲水蓮二兩鮮地丁一兩人中白一兩生苧麻根兩半生狼毒根二兩生白頸蚯蚓二兩山慈姑六錢西紅花四錢木鱉仁一兩去殼共捶勻如膏入大梅片三錢麝香一錢復捶和分三十貼敷各核隨熱隨換至不熱痛止消盡為度效果十日核消熱退人事已醒二十日燥平渴止食量已進三十日食量進至如常元氣回覆而痊說明是年丙辰夏末秋初容縣城區鼠疫流行幾至無人來市所起症狀個個如是驟然起核疼痛後則惡寒發熱煩躁譫語或先惡寒發熱然後起核疼痛者有之倘醫藥罔效而證變壞全體起黑粒黑泡或現一二者毒盛正敗而血先死即不救之證是役斃者數百人余所醫治數十依上列方法內服外敷後多起紅粒毒散正復而血復活幸而一一痊愈廉按腺鼠疫初起用王孟英治結核方合神犀丹多服累效銀花二兩皂角刺錢半蒲公英二兩粉甘草一錢嘔者去甘草加鮮刮竹茹一兩便秘熱重者加生錦紋三錢水煎和神犀丹服如嘔仍不止用真熊膽二分藏紅花二錢水煎服即止此方用蒲公英金銀花角刺合神犀丹不但解毒兼解血熱以蒲公英為瘡毒發汗良劑神犀丹為解血毒之聖藥也若白泡疔本方去角刺加白菊花一兩有效兼黑痘用神犀丹紫金錠間服均效神犀丹見溫熱此案確係腺鼠疫方從王勳臣解毒活血湯脫化而來然較王氏原方力量尤強病重藥重病峻藥峻本不必拘守成方也其餘兩方隨證加減大旨相同至若外治一方解毒消核涼血瀉火亦極有效力案後閱歷之談殊堪深信腺鼠疫案陳務齋住梧州四方井街病者陳瑞彬年二十九歲廣西容縣人住鄉病名腺鼠疫又名核疫西名百斯篤又名黑死證原因遠行勞苦過度血氣乍傷適鄉村鼠疫流行桿菌傳播由口鼻吸受直接傳染證候驟然股陰腺起核三枚脛腺起核二枚灼熱極疼惡寒發熱頭目均痛肢麻腰疼煩躁口渴繼則全體大熱目赤深紅朦黯不見譫語狂躁乍醒乍昏面唇紫黑氣逆喘急肌肉脫落形枯黑瘦危在旦夕診斷脈左沉伏右浮洪數用溫度針檢驗熱度升騰達一百零七度脈證合參鼠疫危證也總由菌毒直入血分血傷絡郁凝瘀不運故左脈伏神識昏亂異常證本不治但一息尚存豈能坐視不得不立方援救療法湯劑並外敷法用除疫羚犀桃花湯加北柴胡絲瓜絡取羚犀蓮心赤芍生地桃仁紅花清心平肝涼血逐瘀為君生石膏粉葛柴胡平胃清熱疏表解肌為臣銀花大青人中白牛蒡敗毒滅菌為佐木通絲瓜絡利水通竅為使處方羚羊角二錢磨犀尖三錢光桃仁四錢西紅花二錢川柴胡二錢銀花三錢蓮子心五錢生石膏一兩粉葛根二錢赤芍藥三錢絲瓜絡三錢鮮生地八錢大青葉五錢人中白三錢淮木通二錢牛蒡子四錢次診連進二服並外敷後熱退體和人事已醒核亦略消惟燥渴仍前脈左起而弦數右亦洪數舌苔枯黑用涼膈散加犀角石膏葛根桃仁取其推蕩大腸清熱生律平肝潤胃開胸利膈次方犀角片四錢生山梔四錢生錦紋四錢薄荷葉錢半黃芩三錢粉葛根一錢生石膏六錢光桃仁三錢淡竹葉錢半粉甘草一錢連翹三錢芒硝三錢三診連服五劑後大便下黑燥糞兼下瘀血燥渴已減目赤黑苔已退結核亦消惟不能安眠診脈數而微弦用犀角地黃湯加柴芩取其清熱降火涼血潤燥兼和表裡三方犀角片三錢鮮生地五錢生白芍三錢粉丹皮二錢北柴胡二錢黃芩三錢四診連進五服後燥渴已除食進眠安惟肢體麻倦步履困難診脈滑數舌苔膠黃用榮筋活絡湯寬其筋絡四方川木瓜三錢桑寄生五錢威靈仙二錢歸鬚錢半生薏苡六錢雲茯苓四錢漢防己三錢川黃柏二錢絲瓜絡四錢生淮牛膝二錢楊柳枝四錢外治方外敷拔毒消核膏生錦紋一兩生地兩半赤芍一兩西紅花四錢生桃木葉四兩芭蕉根八兩生蒲公英二兩生蒲水蓮二兩生生狼毒根二兩生地丁一兩苧麻根兩半生人中白一兩木鱉仁一兩山慈姑一兩白頭蚯蚓二兩共捶勻加入大梅片錢半麝香一錢真珠粉錢半復捶和分四十貼敷核處隨熱隨換至熱退痛止消盡為度效果五日人事已醒熱退體和覈減痛止十五日躁平渴止結核俱消食量略進一月食量大進元氣已復蒙贈橫額鼠疫良醫四字廉按鼠疫見症不一輕重懸殊江浙兩省殊鮮見聞故鼠疫素乏專書惟廣東羅氏芝園經驗宏富細心揣摹剖察病情如老吏斷獄羅列治法如名將談兵以活血去瘀之方劃清鼠疫主治界限允推卓識爰為節述其因證方藥俾後學有所取法一探原因城市汙穢必多鬱而成珍其毒先見鄉村汙穢較少鬱而成沴其毒次及故熱毒熏蒸鼠先受之人隨感之由毛孔氣管入達於血管所以血壅不行也血已不行漸紅漸腫微痛微熱結核如瘰癧多見於頸脅醃膀大腿間亦見於手足頭面腹背爾時體雖不安猶可支持病尚淺也由淺而深愈腫愈大邪氣與正氣相搏而熱作矣熱作而見為頭痛身痹熱甚而見為大汗作渴則病已重矣二辨證候鼠疫初起有先惡寒者有不惡寒者既熱之後即不惡寒有先核而後熱者有先熱而後核者有熱核同見者有見核不見熱者有見熱不見核者有汗有不汗者有渴有不渴者皆無不頭痛身癰四肢痠痹其兼見者疔瘡斑疹衄嗽咯吐甚則煩躁懊憹昏譫癲狂痞滿腹痛便結旁流舌焦起刺鼻黑如煤目瞑耳聾骨痿足腫舌裂唇裂脈厥體厥種種惡證幾難悉數無非熱毒迫血成瘀所致然其間亦有輕重核小色白不發熱為輕證核小而紅頭微痛身微熱體微痠痹為稍重證單核紅腫大熱大渴頭痛身痛四肢痠痹為重證或陡見熱渴癰痹四證或初惡寒旋見四證未見結核及舌黑起刺循衣摸床手足擺舞脈厥體厥與疫證盛時忽手足抽搐不省人事面身紅赤不見結核感毒最盛壞人至速皆至危證三論治法方藥古方如普濟消毒飲銀翹敗毒散近方如銀翹散代賑普濟散等雖皆能清熱解毒而無活血去瘀之藥用之多下效惟王清任活血解毒湯桃仁八錢去皮尖打紅花五錢當歸錢半川樸一錢柴胡一錢連翹三錢赤芍三錢生地五錢葛根一錢生甘草一錢方以桃仁為君而輔以歸去瘀而通壅翹芍為臣而兼以地清熱而解毒樸甘為佐使疏氣而和藥氣行則血通柴葛以解肌退熱而拒邪邪除則病愈惟其對證用藥故能投無不效蓋此證熱毒本也瘀血標也而標實與本同重故標本來甚者原方可愈標本已甚者傳表宜加白虎傳裡宜加承氣毒甚宜加羚犀如連追後汗出熱清可減除柴葛毒下瘀少可減輕桃紅其他當隨證加減輕證照原方一服稍重證日夜二服加銀花竹葉各二錢如口渴微汗加石膏五錢知母三錢重證危證至危證初起惡寒照原方服柴胡葛根各加一錢若見大熱初加銀花竹葉各三錢西藏紅花一錢危證錢半或加紫草三錢蘇木三錢疔瘡加紫花地丁三錢洋菊葉汁一杯沖小便不利加車前草三錢痰多加川貝母三錢生萊菔汁兩瓢沖若痰壅神昏又非前藥可治當加鮮石菖蒲汁一瓢沖鮮竹瀝兩瓢沖或礞石滾痰丸三錢包煎若見癲狂雙劑合服加重白虎並竹葉心羚角犀角西藏紅花各三錢血從上逆見衄咯等證加犀角丹皮各三錢鮮茅根鮮蘆根各四兩見癍加石膏一兩知母五錢元參三錢犀角二錢見疹加銀花牛蒡子各三錢竹葉大青葉丹皮各二錢老弱幼小急追只用單劑日夜惟二服加石膏大黃減半所加各藥小兒皆宜減半五六歲一劑同煎分二次服重危之證一劑作一服幼小不能服藥用針刺結核三四刺以如意油調經驗塗核散山慈姑三錢真青黛一錢生黃柏錢半浙貝錢半赤小豆二錢共研細末日夜頻塗十餘次可愈婦女同治惟孕婦加黃芩桑寄生各三錢以安胎初起即宜急服熱甚尤宜急追熱火胎必墜若疑桃仁紅花墮胎可改用紫草紫背天葵各三錢惟宜下者除朴硝以上諸法俱從屢次試驗得來證以強壯者為多故於人屬強壯毒盛熱旺家資有餘者每於重危之證必加羚角犀角西藏紅花取其見效較捷耳無如人情多儉富者聞而退縮貧者更可知矣茲為推廣分別熱盛毒盛兩途隨症加藥亦足以治病如初起系熱盛之證加石膏知母淡付葉或螺靨菜或名雷公根龍膽草白茅根之類便可以清熱如兼有毒盛之證加金銀花牛蒡子人中黃之類便可以解毒若熱毒入心包羚角犀角藏紅花雖屬緊要然加生竹葉心生燈心黃芩梔子麥冬心蓮子心元參心之類便可除心包之熱毒若熱毒入里加大黃朴硝枳殼以瀉之便可去腸胃之熱毒如此則貧者亦所費無幾矣此案辨證處方與羅氏療法大同小異所用藥品尤為清純無疵足徵學驗兼優鼠疫血瘀結核案劉蔚楚住上海邢家橋路祥餘里病者陳君花埭之妻黃氏年二十餘住福建泛船浦病名鼠疫血瘀結核原因餘年三十外到閩省親時鼠疫大作死人如麻有不結核者結則多在腋下髀鼠疫同而治法仍不盡同黃氏病發於春日下午證候微熱頭痛肢痠焦渴夜即兩腋結核壯熱屍厥唇面色紫其狀如死猶微有息陳諸正寢診斷次晨邀余往診脈沉大舌尖黑而滑余曰此疫毒血瘀也由鼠先受毒傳染於人是毒由地氣矣毒氣遊溢於空氣之間則地氣而及於天氣矣氣由口鼻傳入則毒中於人矣今核結兩腋屬肺經部位然核結於頸項別處較少結於腋下髀厭者較多意腋厭皆大枝血管所經旋曲易於阻梗既現狀純是血瘀似不必拘定腋下屬手太陰肺髀厭屬足少陽膽也療法總以通其血瘀為主要內治加王清任血府逐瘀湯加減外治用山慈姑紅芽大戟末各五錢蘆薈末一兩冰片五分雄黃八分搗神仙掌蔥汁開塗另生蛤膜開腹小雄雞連毛開背俱入研冰片二分再貼之處方川柴胡三錢原桃仁三錢生赤芍二錢生甘草一錢大黃二錢紫花地丁三錢紫背天葵三錢小薊三錢王不留行三錢另先煎蟬退二兩殭蠶一兩皂角刺一兩去渣熬藥又取廣東萬年青根汁一杯沖疊次往診灌藥不外前方加減診治六日所有紫雪紫金錠牛黃至寶飛龍奪命諸丹凡可以助其穿通經絡者皆用而效力猶甚微焉余思鼠疫最重者猝然倒斃及一起但見微燒頭暈神志昏昏不數時亦斃其次結核多死於三四日病發稍輕者能延過一來復便可希望生全此病重甚然姑用麝香六分分十餘次用前方藥水調灌大穿經絡作背城借一之謀幸夜半核消能轉側能顧視若注意其左足也者陳君檢視則左足心起一血泡如小蓮子奔告余曰血毒下行現於湧泉穴未始非吉兆銀針挑破擠去惡血為宜第七日診人大醒能坐言述其昨夜左足心作痛矣小水通無大便左腹脹與調胃承氣湯大黃四錢芒硝三錢甘草八分加皂莢仁三錢服後得下第八日診脈轉長大多汗惡熱引飲與白虎湯生石膏二兩知母一兩舊稻穀五錢甘草六分加鮮竹茹四錢第九日診渴不少止舌乾紅遂加至每劑生石膏一斤余知母四兩鮮竹茹八兩全麥冬四錢舊稻穀一兩熬水長日與之半月後渴始漸止以後多用鮮竹茹五錢茅根蘆根各一兩青天葵錢半板藍根小薊知母稻穀各四錢效果共逾月餘熱乃清而病愈甚矣毒火之可畏也說明西人發明鼠疫原因由微生蟲其形如杆發於鼠死蝨飛吸入傳染又發明鼠疫起於鼠族本體之桿菌吸入人之黏膜器口鼻生殖器及淋巴腺發為急性熱疫之傳染病考驗極真防護法亦最密然我國每年一埠中如初現於某處者轉移於別處則前處消滅歷歷不爽誰畫其界線耶或地力亦有轉運耶抑鼠族亦有遷移耶以此疑點屢由譯者請教外國大醫其說明尚少的解廉按天津張壽甫君曰孫真人千金方謂惡核病者肉中忽有核累大如梅李核小如豆粒皮肉疹痛壯熱索惡寒是也與諸瘡根瘰癧結筋相似其瘡根瘰癧因瘡而生似緩無毒惡核病猝然而起有毒若不治入腹煩悶殺人皆由冬受溫風至春夏有暴寒相搏氣結成此毒也觀此論所謂惡核似即系鼠疫之惡核觀其所謂冬受溫風至春夏又感寒而發又似愚所謂伏氣化熱下陷少陰由寒溫而變為鼠疫也蓋伏氣化熱之後恆有因薄受外感而激發者由斯知鼠疫之證自唐時已有特無鼠疫之名耳然鼠疫之名非起自西人也德州李保初藥言隨筆曰滇黔兩粵向有時疫癢子證患之者十中難愈二三甚至舉家傳染俗名耗子病以其鼠先感受如見有斃鼠人觸其臭氣則病室中或不見鼠時證必流行所感病象無論男女壯弱一經發熱即生癢子或在腋下或現兩胯兩腮或痛而不見其形遲則三五日速則一晝夜即斃辛丑夏邑適有患此證者診之其脈輕則細數重則伏澀遂悟時證之由其所以鼠先感受者非有奇異之毒實感天地之氣偏耳以鼠穴居之性晝伏夜動藉地氣以生存如地氣不達陰氣失職鼠失其養即不能居是以他徙不徙則斃人居陰陽氣交之中必二氣均調臟腑始順適無病設或二氣有偏其偏之極更至於孤獨人處其間即大為所累是以天地之氣通則為泰塞則為否泰則萬物生否則萬物枯此自然之理也今即物性以證人病則知二氣何者偏勝補偏救弊必能奏效觀藥言隨筆之所云云知滇黔兩粵早有鼠疫之病亦早知其病起點於鼠而有鼠疫之名也民國十二年春哈爾濱防疫官趙含章君報告原文斯年鼠疫之病狀染後三日至七日為潛伏期先有頭癰眩暈食慾不振倦怠嘔吐等前驅證或有不發前驅證者繼則惡寒戰慄忽發大熱達三十九至四十度以上或稽留或漸次降下淋巴管發生腫脹在發熱前或發熱後之一二日內概發腫塊一個有時一側同發兩個如左股腺與左腋窩腺而併發是也該腫塊或化膿或消散殊不一定大部沉嗜眠睡此即少陰證之但欲寐也夜間每發譫語初期多泄瀉二三次尿含蛋白此傷少陰之徵病後一二日肝脾常見肥大輕證三四日體溫下降可愈重證二日至八日多心臟麻痹難愈心臟麻痹其脈象細微同於少陰病脈可知此證可分腺腫性敗血性肺百斯篤西人名鼠疫為百斯篤三種腺腫百斯篤最佔多數一處或各處之淋巴管並其周圍組織俱發炎證其鼠蹊腺及大腿上三角部之淋巴腺尤易罹之腋窩腺及頭部腺次之又間侵後頭腺肘前後腺耳前後腺膝膕腺等其敗血性百斯篤發大如小豆之斑疼痛頗甚且即變為膿疱或更進而變壞疽性潰瘍又有誘起淋巴腺炎者肺百斯篤之證劇烈殊甚一如加答兒性肺炎或格魯布性肺炎咳出之痰中含有百斯篤菌乃最猛惡者按上段述鼠疫之情狀可為詳悉盡致而竟未言及治法想西醫對於此證無確切之治法也且其謂輕證三四日體溫下降可愈至其重證體溫不下降豈不可用藥使之下降至言重證垂危恆至心臟麻痹其脈因心臟麻痹必沉細欲無可知推其麻痹之由即愚所謂腎氣不上達於心其陰陽之氣不相接續心臟遂跳動無力致脈象沉遲細弱也此證若當其大熱之初急投以拙擬坎離互根湯生石膏三兩軋細元參八錢知母八錢野臺參五錢生懷山藥五錢甘草三錢生雞子黃三枚將前六味煎湯三茶杯分三次溫服下每服一次調入生雞子黃一枚上方乃取傷寒論少陰篇黃連阿膠湯與太陽篇白虎加人參湯之義而合為一方也黃連阿膠湯原黃連阿膠雞子黃並用為此時無真阿膠故以元參代之為方中有石膏知母可以省去黃連西人謂雞子黃中含有副腎髓質之分泌素故能大滋腎中真陰實為黃連阿膠湯中主藥而不以名湯者以其宜生調入而不可煎湯也既能退熱又能升達腎氣其心臟得腎氣之助不至麻痹即不難轉危為安也又其謂大部沉嗜眠睡與愚所經歷者之狀似昏睡皆有少陰病但欲寐之現象亦足徵愚謂此證系伏氣化熱入腎變成者原非無稽之談也王西人之說則謂肺百斯篤由鼻腔肺胃腸中而吸收其毒於血中其症狀因種類而殊多有陡然惡寒繼以發熱一二日間或頭疼或有劇烈之腦證發狂而死者有狀似昏睡而起嘔吐腹痛雷嗚或大便泄瀉或便秘或便血者腺百斯篤病毒首侵股腺鼠蹊腺而發腫癰或先犯腋下腺而後及他其他該腫腺鄰近之皮膚潮紅灼熱終則呈敗血症狀而死無論何地苟發生此種病當盡力防其傳染觀此論言肺鼠疫毒侵臟腑由口鼻傳入而腺鼠疫止言其毒侵人身之腺而未言其侵入之路以愚斷之亦由口鼻隨呼吸之氣傳入蓋人身之腺為衛氣通行之路衛氣固與肺氣相貫通者也其人若先有伏氣之邪在內則同氣相招疫毒即深入臟腑其人若無伏氣之邪疫毒由口鼻入即隨衛氣流轉侵入腺中發生毒核其果發生毒核也固宜用吳君錫璜所言消核逐穢解毒諸方其非結核而內陷也如西人所謂狀似昏睡及趙君所謂心臟麻痹吳君所謂熱甚口渴無津者皆與愚所論少陰證變鼠疫之狀況相似又當參用拙擬之方若其人腺鼠疫肺鼠疫並見者則愚與吳錫璜君之方又當並用或相其所緩急而或先或後接續用之亦可也惟時賢劉蔚楚君治鼠疫結核之劇者曾重用麝香六分作十餘次用解毒活血之藥煎湯連連送下而愈至冉君治鼠疫方中亦有用藥湯送服麝香以通絡透毒者又可補吳君方中所未備也鼠疫結核案鄭肖岩住福州病者錢業王君年三十餘住後洋里牛肉衖內病名鼠疫結核原因四月間得核疫證因誤藥而重於昏亂中忽呼家人曰速延中州鄭先生來治因昔年其母病重系予救治得愈渠偶憶及其戚即來請診諱言發核證候大熱神昏癍核並見煩躁譫語不省人事口渴喉燥便秘溺赤診斷脈沉數舌紫赤苔焦厚此千金所謂惡核現今所謂核疫也非大劑涼血逐毒不能急救而家又清貧無力服犀角更形棘手療法急疏涼膈散加元參牛蒡紫草紫地丁沖金汁水並佐葉天士神犀丹囑其連服二劑處方蘇薄荷錢半青連翹四錢元參三錢牛蒡子三錢生軍四錢焦山梔三錢青子芩三錢紫草三錢紫地丁四錢芒硝三錢沖鮮竹葉三錢淨白蜜一兩沖葉氏神犀丹一粒研細藥湯調下次診是晚服一劑證不減翌晨始再服一劑又服神犀丹一粒午後下醬糞數次神識清爽肌熱悉退脈數大減舌苔亦淨繼以前方去硝黃加鮮生地五錢銀花三錢效果病雖愈尚有八核腫甚大腿後腫如黃瓜色帶紫按之甚軟囑其速針潰去膿水兩大碗胯縫之核漸消後以涼解收功說明其時未得鼠疫彙編然葉氏神犀丹中有犀角生地元參銀翹紫草糞清等味皆活血行瘀解毒清熱之品與是書活血解毒之意若合符節同時鹽倉前又用此法復救兩人附識於此足見下焦發核邪結厥陰血絡非活血行瘀透邪解毒萬難大奏奇功廉按鼠疫之毒盤踞血分為巢穴傳染甚易轉變甚速初見證勢尚輕繼則忽變為重症每致猝不及救閩粵諸名醫每用王氏活血解毒湯加減毒重勢猛者加犀羚金汁大渴煩躁者加石膏知母腹脹便秘者加硝黃枳實其勢稍輕者用王氏原方單劑急服勢甚猛烈者用原方雙劑急追據廣東石城羅芝園氏報告統計見效之處石城以陀村石嶺一方為最城內安鋪及各鄉次之化州以新安一方為最州城及各鄉次之廉府以城廂內外為最山口北海及各鄉次之瓊府以海口為最海田及府城次之雷府以平石為最城月及各鄉又次之救人不知凡幾矣廈門梁君達樵亦以此法治之愈者不下十萬人實為中醫治疫之成績足勝西醫也此案雖不用王氏成方而清熱攻毒涼血行瘀等法恰合清任原方故能競奏全功由此類推輕則驅瘟化核湯西牛黃人中黃金銀花大青葉蒲公英紫地丁鮮菊葉鮮石菖蒲根鮮竹茹象貝制殭蠶赤芍皂角刺重則清瘟攻毒飲犀角羚羊角川黃連黃芩連翹牛蒡紫草紫花地丁紫背天葵桃仁紅花枳實厚朴大黃芒硝澤瀉車前隨病者強弱輕重為加減亦皆治腺鼠疫之良方鼠疫結核案陳務齋住梧州四方井街病者黃樹文年三十九歲廣西容縣住鄉病名鼠疫結核西名腺百斯篤又名黑死病原因素因飲食不節過食辛辣酸鹹及生冷物質消化不良誘因各鄉鼠疫流行桿菌傳播由口鼻吸受而傳染證候驟然惡寒發熱頭目骨節皆疼四肢麻木繼則全體大熱狂躁譫語目白深紅血絲敷蓋膝黯不見面唇緊黑耳聾聲嘎燥渴異常小便赤澀神識昏迷氣逆喘急後現脛腺起核三枚赤腫堅實疼痛灼熱診斷左右六脈皆浮大數大則滿指數則九至按之則散檢驗體溫升騰達一百零七度脈證合參鼠疫之結核症也由微菌熱毒直中血分則血瘀不行阻遏神氣其瘀血熱毒勢將攻心病已危而不治惟一息尚存不得不議方救治療法湯劑用除疫羚犀敗毒湯取羚犀芩連膽草瀉心肝伏火清透毒疫為君生地紅花石膏知母涼血去瘀平胃清熱為臣大青地丁人中白銀花真珠敗毒滅菌鎮心安魂為佐紫葛解表透毒生津潤燥為使處方羚羊角二錢磨犀尖三錢鮮生地六錢紫地丁三錢葛根二錢鮮大青四錢人中白四錢生石膏一兩杵肥知母五錢金銀花三錢西紅花二錢真珠粉五分沖川黃連三錢龍膽草三錢川柴胡二錢黃芩二錢次診連三服後人事始醒體熱略減惟脛腺起核灼熱疼痛燥渴仍前診脈浮大已除現轉洪數用羚犀桃花敗毒湯取其去瘀涼血清熱平心肝生津平胃敗毒滅菌次方羚羊角二錢原桃仁五錢金銀花三錢鮮生地五錢生石膏一兩犀角尖三錢磨西紅花二錢牛蒡子四錢赤芍藥三錢人中白三錢大青葉四錢粉葛根二錢淮木通二錢蓮子心五錢三診連五服並外敷拔毒膏後痛止核消燥渴亦減惟不能安眠診脈弦數用犀角地黃湯合白虎湯取其清泄心肝涼血潤燥平胃生津三方犀角尖二錢生白芍三錢生石膏五錢粳米五錢荷葉包川柴胡二錢鮮生地五錢牡丹皮二錢肥知母四錢甘草一錢青子芩三錢四診連五服後燥平渴止能眠食量略進惟咳嗽頻頻聲破而嘎診脈弦澀用百合固金湯加黃柏杏仁桑白皮取其潤肺降逆清熱瀉火生津化痰四方野百合三錢生地五錢歸身錢半元參四錢苦桔梗三錢原麥冬三錢熟地三錢白芍三錢川貝二錢生甘草一錢川黃柏三錢光杏仁五錢桑白皮四錢外治方外敷拔毒消核膏生大黃一兩赤芍藥一兩生地丁一兩生蒲公英二兩生地黃兩半西紅花四兩木鱉仁一兩去殼生蒲水連二兩山慈姑六錢桃木葉四兩芭蕉根八兩生用生狼毒根二兩生苧麻根兩半生白頸蚯蚓二兩上藥共捶勻入大梅片三錢麝香一錢珍珠粉錢半復捶和勻分三十貼敷各核隨熱隨換至不熱痛止消盡為度效果五日人事己醒體熱略退十日核消痛止二十日燥平渴止食量已進一月咳止體健元氣已復而痊說明是年庚申市鎮鄉村鼠疫盛行傳染甚眾醫藥不效者死亡數百人所起症狀大略相同或先起核疼痛後則全體大熱譫語昏迷或先全體大熱後則起核疼痛倘醫治不及或醫藥不效而證變壞全體起黑粒黑泡或現二三而血已死不治之症頃刻而亡余是役醫治百餘人依案內方劑內服外敷證量大小藥分輕重倘證之標本不同用藥須加詳察胎前產後尤當酌量加減施治幸而一一痊愈特錄數案以便研究康按鼠疫結核其熱毒由血分直竄肝絡肝為全體一大腺故凡肝絡所到之處輒多發見結核結核即西醫所為腺故通稱為腺鼠疫治必以活血解毒清熱透絡為主初起若體強證重非如此案初二三三方重劑急服萬難挽回迨由血分轉出氣分證見咳嗽頻頻聲破而嘎外象雖白於疫毒竄肺而內因實由於痰火此時尚宜肅肺解毒如天竺黃川貝廣鬱金牛蒡桑葉連翹銀花山慈姑竹瀝萊菔汁金汁枇杷露等品為清源潔流之計第四方百合固金湯加減中有麥冬熟地未免滋膩留邪恐遺後患鼠疫結核案鄭肖岩住福州病者京茶莊司賬方姓年三十餘住塔亭觀音佛衕病名鼠疫結核原因今夏六月初晨起頭痛發熱口渴胸悶即來請診午後赴視其東人云昨夕飲酒啖荔今早始病證候大熱神昏人已身僵不能轉側左胯邊核大如李診斷脈右洪大有力舌苔黃濁此核疫證也病重勢猛非病家信任一手醫治萬難挽回療法急當內外並治內服活血解毒湯因無惡寒去柴胡加竹葉銀花外治用經驗塗核散處方光桃仁五錢藏紅花三錢當歸錢半赤芍三錢生葛根一錢真川樸一錢鮮生地五錢金銀花五錢青連翹三錢鮮竹葉三錢生甘草一錢外治方經驗塗核散飛辰砂五錢木鱉仁八錢雄黃五錢生川軍五錢上冰片二錢真蟾酥二錢紫地丁五錢山慈姑八錢上藥共研細末用小磁瓶分貯數十罐瓊州鮑遊府用此散調如意油頻塗甚效須先四面輕針結核後塗藥凡小兒不能服藥用此法塗甚妙次診翌日復診渠能起坐自述病情視其手有斑點令脫衣細驗上半身皆有紅斑再以前方加犀角錢半牛蒡子三錢元參五錢陳金汁三兩分沖三診第三日赴診斑透身涼脈轉緩再以前法去柴葛加減與之並佐葉氏神犀丹數粒代茶病去有八四診因渠不喜服藥停三天後再赴診左喉邊結腫甚大幸喉里不痛予改用普濟消毒飲去升柴加浙貝牡蠣元參銀花天葵之屬外塗手定化核散四方青連翹一兩蘇薄荷三錢馬勃四錢殭蠶五錢苦桔梗一兩牛蒡子六錢荊芥穗三錢黃芩一兩黃連一兩生甘草五錢板藍根五錢元參一兩金銀花一兩浙貝五錢生牡蠣一兩打紫背天葵一兩上藥共為粗末每服六錢重者八錢鮮蘆根湯煎去渣服約二時一服重者一時許一服外治方手定經驗化核散山慈姑三錢真青黛一錢生黃柏錢半浙貝錢半赤小豆二錢共研細末調麻油塗日塗三四次以消為度甚效效果服完結核腫消過半胯邊核破出黃水甚多孰料腋下又發一核幸不甚痛足見停藥誤事致餘毒走竄再以解毒活血湯去柴葛桃仁用五錢西藏紅花用三錢加紫花地丁五錢車前草一兩浙貝三錢渠連服六劑諸核均消即能溺管司賬料理生意廉按鼠疫由於死鼠腐爛之毒氣釀成鼠疫惡菌有腺鼠疫肺鼠疫之分腺鼠疫由鼠蚤傳染肺鼠疫由空氣傳染此案前後皆用活血解毒湯加減足見此方為治腺鼠疫之神劑第四方普濟消毒飲加減亦用得恰當鼠疫吐血案高玉麟住黑龍江南門退思堂病者朱星五年四十八歲直隸臨榆人前黑龍江大賚廳右堂病時住省城直隸會館病名鼠疫吐血原因運蹇抑鬱素有內傷前清宣統二年正月間江省鼠疫流行星五固契友李云亭染疫而亡未獲面訣哀痛過甚肝火妄動復感疫氣而不支證候頭痛如破吐血盈盆身熱如焚神昏不語診斷脈左手弦數而大右手洪數而滑脈證合參斷為鼠疫熱毒由胃沖腦故頭痛如破胃血管開裂故吐血甚多舌根為腎所司腎藏智瘟毒竄腎故神昏而舌不能言毒菌滿布血管如火燎原不可響爾故身熱如火據當時皆稱患鼠疫頭痛見血即斃者其證大率類此茲更吐血過多神昏不語誠險急之危候也療法仿金匱瀉心湯治吐血法用黃連瀉犯心之邪熱為君黃芩瀉肺之邪熱為臣大黃之通而不守使其血不停瘀又加羚羊角去惡血為佐殭蠶蟬蛻銀花連翹梔子赤芍石膏解瘟毒以清邪熱為使日二服處方小川連四錢黃芩五錢大黃六錢羚羊角二錢殭蠶三錢蟬蛻二錢生石膏五錢研細銀花五錢連翹四錢焦梔子三錢赤芍五錢接方白殭蠶三錢蟬蛻二錢全當歸三錢鮮生地四錢木通三錢金銀花三錢川連二錢焦梔子三錢淡黃芩二錢澤蘭二錢肥知母三錢丹皮三錢原麥冬三錢車前子三錢水煎入蜂蜜元酒各一匙溫服效果服一劑約三小時大瀉三次頭痛若失吐血減半二劑服後血即不吐嗣用大清涼散二劑而愈廉按斷證發明甚確處方斟酌亦精洵治鼠疫血溢之佳案也
