body:
  text: 第四卷濕淫病案冒濕案內科毛鳳岡住常州病者毛子培年三十一歲住漕橋病名冒濕原因初夏淫雨纏綿晴後濕氣上蒸晨起冒霧而行遂感其氣而發病證候頭重如裹身熱無汗遍體不舒四肢倦懈診斷脈右浮緩而軟左微弦而滯舌苔薄白而滑此濕氣蒙於皮毛而未傳經入里汪訒庵所謂輕則為冒也療法宣疏表濕為首要故以蘇藿苓皮為君辛散芳淡以取微汗蘭竹青箬為臣清芬淡泄以化濕佐以桂枝木微辛而淡達其肢體使以蔻殼助茯苓以皮達皮也處方紫蘇葉一錢佩蘭葉錢半淡竹葉錢半青箬葉錢半白蔻殼八分藿香葉錢半先用浙苓皮八錢桂枝術八分煎湯代水次診一劑而微微汗出頭重肢懈均除二劑而身熱退遍體舒惟胸中略痞口淡胃鈍兼吐稀痰溺亦短少脈左弦象雖退右尚緩滯舌苔白轉微黃治以辛通淡滲二陳合四苓湯加減次方姜半夏錢半浙茯苓四錢豬苓錢半杜藿梗二錢新會皮錢半生苡仁四錢澤瀉錢半炒穀芽二錢效果連服三劑胸寬胃健小便暢利而痊廉按前哲倪松亭曰治濕之道非一當細察表裡上下為用藥之準的如濕氣在於皮膚者宜用麻桂二術以表其汗譬如陰晦非雨不晴也亦有用羌防白芷等風藥以勝濕者譬如清風薦爽濕氣自消也水濕積於胃腸肚腹腫脹者宜用遂戴蕪醜之屬以攻其下譬如水滿溝渠非導之不去也寒濕在於肌肉筋骨之間拘孿作癰或麻木不仁者宜用薑附丁桂之屬以溫其經譬如太陽中天則濕自干也濕氣在於臟腑之內肌腠之外微而不甚者宜用朮蒼樸夏之屬以健脾燥濕譬如微濕以灰摻之則濕自燥也濕熱在於小腸膀胱或腫或渴或溺閉不通者宜用二苓車瀉之屬以滲利之譬如水溢溝澮非疏通其竇不達也學者能於斯理玩熟則治濕之法必中鵠矣此案治冒濕輕症毋須麻羌重劑初方五葉桂苓清穩新穎接方二陳四苓剛剛恰好傷濕兼寒案內科蕭琢如住湘鄉水口山礦局病者黃君年三十餘住本鄉病名傷濕兼寒原因素因體肥多濕現因受寒而發醫藥雜投無效改延予診證候手足遲重遍身痠痛口中淡不欲食懶言語終日危坐診斷脈右緩左緊舌苔白膩此金匱所謂濕家身煩疼可與麻黃加朮湯也療法遵經方以表達之使寒濕悉從微汗而解處方帶節麻黃八分川桂枝七分光杏仁錢半炙甘草五分杜蒼朮一錢效果連投二劑諸證悉平而愈廉按此為濕之屬表無汗者而設蓋麻黃得術雖發汗而不為多汗術得麻黃行里濕而並可行表濕止此一味加入所謂方外之神方法中之良法也宜其一方即愈中濕夾痰案內科何拯華紹興同善局病者施德培年廿六歲業商住昌安門外病名中濕夾痰原因素有痰飲適逢首夏乍晴乍雨晴則炎蒸雨則沉悶適感其氣而猝中證候初起頭眩神倦繼即忽然昏倒神識模糊不省人事痰響喉間狀類中風診斷脈右沉小而滑左沉細澀舌苔滑白此即類中門中之濕中也由濕濁與痰飲相搏上蒙清竅頓致痰潮壅塞雖云濕中實則痰中氣返則生不返則危矣療法宣竅開痰為首要故以蘇合香丸遠志菖蒲為君開其竅以解語杏仁栝蔞為臣下其氣以降痰佐以戈半夏消痰中之飲使以皂角通上下之竅也處方遠志肉錢半去心鮮石菖蒲一錢搓爛沖戈半夏一錢光杏仁三錢皂角五分拌炒栝蔞仁四錢蘇合香丸一顆研細藥湯調眼次診一劑而咯痰出聲二劑而神醒能語惟神倦嗜臥頭目眩暈脈右沉緩兼滑左微弦此濕困脾陽而痰作眩暈也治以豁痰定暈仿東垣半夏天麻白朮湯加減次方竹瀝半夏四錢明天麻錢半枳殼一錢拌炒生於術錢半抱木茯神三錢廣皮紅一錢遠志一錢生薏苡仁四錢白芥子五分拌搗栝蔞仁四錢三診連投兩劑眩暈雖止而氣弱神疲肢懈無力咳痰不爽脈右浮滑沉弱舌苔仍白而滑治以益氣化痰用六君子湯加竹瀝薑汁三方老東參一錢浙茯苓三錢姜半夏三錢炒廣皮一錢生於術錢半清炙草五分淡竹瀝兩瓢生薑汁半小匙和勻同沖效果連服四劑諸證皆平精神振作而瘥廉按濕為陰邪病發徐而不急今忽狀如中風者由濕阻肺氣氣鬱則逆挾素有之痰飲堵塞其出入之清竅故昏厥而不省人事方用宣竅開痰當然中肯妙在蘇合香丸之辛香開達宣氣通竅故能奏速功接方仿東垣法三方用和劑局方亦皆適當伏濕發㾦案內科沈奉江住無錫病者王君年十八歲住錫山東大街病名伏濕發㾦原因其母寡孀只此一子病寒熱起伏已歷三候病勢轉劇特來延診證候熱久不解骨瘦支離心胸煩悶遍體不舒診斷脈細數苔薄膩此伏濕未清防有白㾦鬱於衛分也療法當輕宣氣分之濕使氣暢濕開邪達衛分而解處方薄荷葉八分淨蟬衣八分牛蒡子錢半佩蘭葉二錢廣鬱金二錢生打杜藿梗二錢飛滑石三錢包煎豬苓一錢佛手柑八分鮮荷葉一錢次診連投兩劑始透白㾦細粒密布色如枯骨前哲謂氣液已竭余以為久病初透而未足也再宗前法加鮮茅根水蘆根各二兩煎湯代水效果一劑而遍體透足粒粒晶珠二劑而熱勢大退二三日能食稀粥調養旬日而痊廉按白㾦小粒如水晶色者氣液未竭也其證多吉若㾦發枯白如骨者氣液已竭也其症多凶此案舌苔薄膩尚屬濕鬱衛分汗出不徹使然其㾦初出雖如枯骨繼加茅蘆二根升津增液續發粒粒晶珠故能競奏全功伏濕腹痛案內科陳憩南住潮安金山腳病者張俊卿中學生年二十一歲澄海人住汕頭病名伏濕腹痛原因地近淫窪暮春濕漲婚後精氣空虛遂襲人而不覺證候每日亭午即臍中切痛抵晚漸劇氣急上逆能坐不能臥必嘔吐至鹹味出乃止自春徂秋百醫莫效困甚診斷脈兩寸如平右關緩細尺弱左關亦緩尺澀詳察脈證的系濕氣傷腎伏處於精室之中所謂伏濕腹痛也按腎之部位在脊骨十四椎左右各一枚其功用能將周身流入之血吸收其敗濁之質向膀胱而排泄今為濕氣所傷則瑪氏囊失職致敗濁之質仍向周身流去是以面目黧黑也精室處膀胱之後直腸之前與腎貫通是以痛在臍中也衝脈寄居其間濕伏於此則沖亦病書曰衝脈為病逆氣裡急所以氣急上逆能坐不能臥也病必午發者因衝脈附麗於陽明午為陽明氣旺之時欲藉此以攻除其所伏故激動之而發也吐出鹹味乃止者以咸為腎之本味吐出則伏邪亦泄邪泄則衰故痛止也前醫不知其有伏邪徒取調氣止痛消導去積之套方因循坐誤致令元氣日虧精血日耗兩尺脈之見弱且澀也所幸病前半日猶能食飲胃氣尚存庶幾易治療法邪伏既久邪正混為一家助正化邪乃合理法主用四物湯補血活血為君枸杞北耆杜仲巴戟生精益氣為臣茯神萆薢琥珀菖蒲分清導竅為佐紫河車鹿茸走精室壯腎陽為使三劑逐日水煎午前服處方大當歸二錢甘杞子二錢正琥珀一錢研沖川杜仲三錢酒川芎錢半生黃耆三錢川菖蒲一錢二分巴戟天二錢老熟地三錢川茯神三錢川萆薢錢半鹽水制杭酒芍二錢紫河車四錢北鹿茸三錢酒製效果二劑後通腹皆痛三劑忽大痛不可忍旋瀉下黑如墨者數次翌日清晨復大瀉一次病竟如失後不再發廉按辯證詳明論理透徹參以新學更為精鑿病原分析極清用藥亦切實周到濕流關節案內科蕭琢如住湘鄉水口山礦局病者徐君年四十餘業商住四川病名濕流關節原因端節前來鎮收賬冒雨而行鞋襪皆濕濕從下受而發雜治不愈已十日矣證候兩腳骨節疼痛晝夜叫號跬步不能移惟飲食大小便如常診斷脈右沉緩左沉細澀舌苔淡白此即金匱所謂太陽病關節疼痛而煩脈沉而細者此名中濕是也療法通則不痛以疏通關節為君與自制七節湯加減處方生黃耆二錢半全當歸三錢生白芍三錢川芎三錢桂枝節三錢甘草節一錢桑枝節如指大三個杉枝節三個松枝節三個蘇杆節三個竹枝節三個生淮牛膝二錢效果一劑知連服十劑平復如初廉按濕者六淫之一也亦如中風傷寒自太陽始但風寒之太陽病病在肌表濕之太陽病病在關節關者機關之室真氣之所過也節者骨節之交神氣之所遊行出入者也令病濕則神真之氣為濕邪所傷故關節疼痛而煩濕為陰邪故脈沉而細濕不在外而在下下流兩腳關節皆筋脈交紐之處肝主筋而藏血血被濕阻阻遏氣道逼壓神經故爾劇癰與濕腳氣似同而實異與歷節風似異而實同方用自制七節湯以黃耆當歸白芍川芎為君輔以桑枝杉枝松枝桂枝紫蘇竹枝皆用節即甘草亦用節取其以節入節且黃耆當歸桂枝白芍川芎甘草具黃耆五物當歸四逆兩方之功用紫蘇節則尤能行氣中血滯輔以桑杉松各枝節能使關節中停蓄之風濕一掃而空至竹枝節氣味甘寒恐有拒而不納以之為反佐故於上證功效頗巨本方去牛膝治兩手關節疼痛猛不可當亦多奏效真獨出心裁之良方也濕痹案內科黃袞甫住金山呂巷鎮病者黃松林年三十八歲業農住泖灣村病名濕痹原因初傷濕繼受寒寒濕相搏遂致麻痹證候左足脛疼痛伸屈不利步履維艱診斷脈左沉遲右稍弦證脈合參斷為著痹內經論痹症每與中風相合然風則陽受之而痹則陰受之痹者閉而不通之謂也今寒濕客於下下焦屬陰以陰遇陰濕性膩寒性遲濕遇寒而凝結愈力寒遇濕而壅閉不宣不通則痛通則不痛療法方用麻黃附子為君黃耆白朮白芍為臣秦艽伸筋草等為佐使祛寒化濕之品與通經活絡互參處方帶節麻黃三分西耆皮錢半左秦艽錢半絲瓜絡三錢伸筋草三錢淡附子六分焦白芍錢半炙甘草四分生白朮錢半千年健錢半效果服藥四劑痛勢愈半後西耆白芍加倍再四劑而病愈廉按案語精湛處方穩健於痹證確有心得非博歷知病屢用達藥者不辦濕痹腫喘案內科周小農住無錫病者史姓忘其年名住滬南病名濕痹腫喘原因先由濕鬱化腫繼則由腫轉咳喘屢治不應改延予診證候面浮足腫腹滿有形更加喘咳痰多診斷脈濡帶澀苔白據脈症是濕痹不宣其所以痹而不宣者由於氣窒絡瘀也療法仿前哲五子五皮飲加減參以通絡宣氣處方萊菔子三錢蘇子二錢葶藶子錢半瓦楞子六錢煅研新絳二錢旋覆花二錢大腹皮三錢橘皮絡各一錢連皮苓四錢竹瀝半夏三錢代赭石四錢打先用冬瓜皮子各一兩蔥須一錢煎湯代水效果疊進兩劑陡吐狂血如紫黑塊甚多喘先定繼診通絡宣痹絳復湯合吳氏宣痹湯新絳二錢旋覆花二錢拌滑石四錢包煎光杏仁竹瀝半夏焦山梔連翹赤小豆皮各三錢生苡仁晚蠶沙各四錢漢防已錢半蔥須八分服二三劑後腫亦退腹寬面浮亦平腫滿因血阻窒有如此故治腫滿病不但宜理氣也如此重症驟愈於數日之內即病者亦意所不料廉按此腫而且滿滿而轉喘之實證治法方用順氣開痰通絡宣痹面面顧到煞費經營其病之去路全在陡吐狂血如紫黑塊甚多學者宜注意之濕夾溢飲案內科何拯華紹興同善局病者王嘉謀年三十八歲業商住偁浦村病名濕夾溢飲原因素患溢飲時逢首夏黴濕盛行頓致新舊夾發證候四肢倦懈肌肉煩疼脊背似脹肘膝痰痛惡寒無汗小便短少診斷脈右浮滑沉滯左弦小澀舌苔白滑此時令之黴濕襲於皮腠之中內伏之溢飲流行於經絡之間也療法濕與飲互結於皮腠經絡其表濕固當微汗而溢飲亦宜發汗用麻黃湯合二術二陳湯加減處方淨麻黃八分光杏仁三錢姜半夏三錢浙茯苓四錢威靈仙二錢川桂枝一錢杜蒼朮一錢炒廣皮錢半生苡仁四錢獨活一錢次診連投二劑遍身汗出津津肢體舒暢惡寒已除肌肉煩疼亦減惟肘膝關節尚覺痠痛溺仍短少脈右漸轉流利左尚弦澀苔白微黃此表濕雖解而溢飲尚盤踞於四肢筋節之間也當以蕭氏七節湯加減疏通關節外治用洗澡法以蠲溢飲次方歸鬚錢半川芎一錢桂枝節一錢甘草節五分桑枝節五個杉枝節三個松枝節三個桃枝節三個真絳通一錢路路通七個洗方紫蘇葉五錢防風五錢樟樹葉五錢酒炒桑枝一兩煎湯一大盆乘熱洗浴效果內服湯方兩劑隔日洗澡一次五日後關節痛除溺亦暢利而瘳廉按陰濕傷表每多挾風金匱云法當汗出而解但微微似欲汗出者風濕俱去也又云飲水流行歸於四肢當汗出而不汗出身體重痛謂之溢飲病溢飲者當發其汗大青龍湯主之小青龍湯亦主之然則濕夾溢飲皆當汗解也明矣此案妙處全在外浴熱湯內服發汗煎藥蓋病從此入者仍欲其從此出治法從金匱脫化而來濕瘧案婦科劉榮年住濟南東流水病者趙媼年五十餘歲住省城病名濕瘧原因夏日恣飲冰水秋間偶感風寒致成瘧疾證候先寒後熱寒多熱少寒則戰慄不已熱則渴不喜飲心中鬱悶嘔吐清水不止診斷脈象沉細舌苔白膩脈證合參此太陰濕瘧也醫家不察其源再三用小柴胡湯治之徒傷胃氣故愈吐愈渴愈飲愈吐而瘧疾轉劇療法脾喜燥而惡濕治宜理脾為主脾健則瘧疾自愈故用茯苓薏米健脾為君佐以澤瀉利濕桂枝芍藥以調理寒熱藿梗陳皮以芳香利氣半夏貝母同用止嘔並以治瘧再加枳殼以解鬱悶又恐久嘔不能納藥乃用儲石重鎮之藥生薑辛散之品以為嚮導令其於瘧前服藥每服少許頃刻再服恐急服將藥吐出處方連皮茯苓三錢生薏米二錢生澤瀉二錢桂枝尖一錢生杭白芍二錢杜藿梗二錢廣陳皮錢半清半夏三錢川貝母三錢去心對擘生枳殼錢半煅赭石錢半研細生薑一錢效果服藥後嘔吐即止寒熱亦輕次日原方去赭石連服三劑瘧遂漸愈廉按濕瘧之為病當辨濕重於熱者藿香正氣散加減熱重於濕者蒼朮白虎湯加減其大要也此案用藿樸二陳湯參桂苓法加減亦屬濕重熱輕之正法惟案中斥前醫屢用小柴胡湯病反轉劇此由不辨因證濫用成方之流弊徐洄溪尚犯此遑論其他試援莫枚士說以證明之莫曰葉案治瘧不用柴胡徐評非之解之者曰治傷寒少陽正瘧用柴胡治秋間寒熱類瘧不用柴胡泉應之曰否不然素瘧論以夏傷於暑為端而余瘧附焉是秋間寒熱之為正瘧經有明文病源千金皆本經說外臺既列病源之論而所集方不下千首鮮用柴胡者可見謂秋間之寒熱不用柴胡則是而指為類則非仲景於少陽篇明言往來寒熱形如瘧狀如瘧二字正類瘧之謂少陽證之為類瘧出於仲景親口今反指為正瘧何耶但諸醫猶止誤於論症徐氏則並論治亦誤何以言之傷寒邪從表入其里無根以柴胡提之則出夏秋之病新涼在外而蘊暑在中其里有根若以柴胡提之則外邪雖解而內熱即升橫流沖決不可複製往往有耳聾目赤讝語神昏汗漏體枯延成不治者不得不以徐說為淫辭之助也三陰濕瘧案內科洪巨卿住上海虹口病者沈全林年廿七歲南翔人業賣花居滬上病名三陰濕瘧原因夏月常浸在水中嗜臥於樹下飲食生冷不節後患瘧於暮秋至次年孟春未止中西瘧藥遍嘗無效證候瘧發薄暮時四日必發兩次熱微寒多肢冷腹滿脘悶嘔惡面色萎黃肌肉瘦削診斷脈左弦緩近遲右弦短舌苔白膩帶微淡黃脈證參之此為牝瘧昔賢雖有邪伏心藏腎藏之說今見症屬於脾脾主四肢故手足不溫脾胃傷生冷留而不去故為脹滿嘔逆是三陰中之濕瘧無疑由於濕食互阻中焦脾絡邪舍三陰不能幹衛氣並出病深者故發作亦遲當用東坡薑茶飲加味主之療法用甜茶以助陰乾薑以助陽寒熱並調為君常山逐老痰積飲檳榔下食積痰結升降陰陽為臣丁香乾薑宣壅助陽烏梅斂陰為佐紅棗入營燈心入衛為使雄雞毛直達皮毛為引水酒各半煎未發前三時服之忌食鮮魚發物處方炒常山三錢檳榔三錢甜茶三錢淡乾薑三錢烏梅七個公丁香七粒紅棗七個燈心七根雄雞毛七根效果一服嘔脹平瘧亦減二服肢溫三服痊瘳廉按三陰濕瘧山鄉間務衣之輩患此最多向傳單方丸藥均系半貝為君佐以砒硫紅棗肉為丸如梧桐子大每服一粒多則二粒用薑茶各二錢泡湯送下服之雖極神應然究屬極毒之品未免冒險不如此案方藥較為穩健無弊奏功亦速但不可用於三陰虛瘧耳濕瀉案內科葉鑑清住上海病者戴某年約三旬湖州人住南區漁陽里病名濕瀉即濡瀉原因因受潮濕脾胃兩傷所致證候泄瀉經年腹中微痛或競不痛胸痞胃困有時泛惡小溲赤短神倦不振診斷脈來右部濡小左尚和平舌膩口淡此濕勝脾胃病名濡泄此即難經所云濕多成五泄者是也療法際茲黴令濕熱用事當從胃苓湯法治方中茅朮厚朴芳香燥濕為君麥芽米仁健脾佐運半夏陳皮和胃寬胸為臣腹皮佩蘭泄濕宣通為佐余均淡滲利溲為使昔賢云利小便即是實大便也服兩劑當大效處方甜茅朮一錢米泔水浸陳皮錢半豬苓三錢焦苡仁四錢大腹皮三錢茯苓四錢制川樸八分姜半夏錢半焦麥芽四錢通草一錢炒澤瀉錢半次診泄瀉雖止大便尚形厚溏脘悶泛惡較和溺淡而長胃納亦展此濕邪退舍中陽漸振之佳兆也口微作渴舌膩化邊尖紅良由操勞過度心營素虧剛燥不宜過劑右脈較起法再和中化濕次方法半夏錢半陳皮錢半焦麥芽四錢焦苡仁四錢浙茯苓三錢通草一錢大腹皮三錢扁豆衣錢半炒佩蘭葉錢半炒澤瀉錢半大紅棗三枚炒三診服三劑胃納已展大便得實舌苔化尖亦淡惟食後運化猶遲時作噯氣胃主納食脾主運化脈來濡軟有神治再益氣調中三方生於術錢半炒淮山藥二錢炒雲茯苓三錢焦穀芽四錢大腹皮三錢小枳實一錢炒法半夏錢半陳皮錢半扁豆衣錢半炒佛手片一錢紅棗三枚效果此方服五帖痊愈廉按案亦人所能為而層次井然有條不紊亦是可取濕溫案內科葉鑑清住上海病者唐左年廿四歲蘇州人住新北門虹橋病名濕溫原因內蘊濕滯新感時令之溫氣而發證候始而形寒近則無寒但熱熱勢早晨較淡下午暮分則甚甚則神昏讝語胸痞嘔惡渴不喜飲味甜胃困頻咳稠痰耳襲自汗溺赤便溏晶㾦稠布色尚潤澤濕溫釀蒸腸胃已逾兩候既未化火亦未劫津診斷舌邊尖淡紅根苔黃厚脈右濡滑數左弦數體溫一百零兩度半邪勢正在奮興且黏膩不易速化故表有㾦汗之宣達里有溲便之排泄表裡宣通何以寒熱胸痞讝語並不見退因濕熱為黏膩之邪其來也漸其去也遲再挾痰邪交相釀蒸舌苔黃厚可見腸胃伏邪之盛淹纏時日在所不免但求不至昏陷幸甚療法既不能表又不能下惟有宣泄清化故用豆卷黃芩清宣濕熱為君二陳去甘草之甜膩加貝母取意半貝合竹茹枳殼即溫膽湯以枳實易枳殼取其寬胸利氣為臣余如鬱金通草佩蘭米仁無非通氣滲濕利小便為佐使也處方大豆卷三錢法半夏錢半新會皮一錢生竹茹錢半生苡仁三錢淡黃芩錢半赤茯苓四錢廣鬱金錢半生打生枳殼錢半佩蘭葉錢半象貝母四錢方通草一錢次診下午熱甚狀若陰虛濕溫之的症也熱邪熏灼故口渴濕邪黏膩故不喜多飲濕閉清陽則胸痞熱邪阻胃則泛嘔浮溢於表蒸熱㾦汗擾及包絡神昏讝語上蔽清竅耳聾頭重下注二便溺赤便溏無形濕熱夾有形痰邪交相蘊蒸更難分化脈右部濡滑左弦數體溫一百零兩度半舌苔黃膩根厚胃困口甜病情淹纏前案早已齒及所慮者內傳生變不得不豫為防護治再宣暢氣機清化濕熱痰邪次方清水豆卷三錢法半夏錢半赤茯苓四錢生竹茹二錢淨連翹三錢淡黃芩錢半象貝母四錢廣陳皮錢半生枳殼錢半梗通草一錢建蘭葉四片洗三診熱勢較輕大便溏溲熱赤泛嘔口甜較和脘宇稍寬神識亦清脈來數象較靜右濡細左弦細是日體溫一百零一度半舌淡黃根膩腸胃之濕熱尚盛恐鬱蒸之寒熱正方興未文治再燥濕清熱雙管齊下或可不致昏陷宗吳氏三仁湯加減法三方白杏仁三錢勿研生熟苡仁各三錢法半夏錢半淡竹葉錢半通草一錢白蔻仁五分略打後下制川樸八分象貝母四錢陳皮錢半建蘭葉四片四診舌苔較化體溫一百零一度三分便溏已止熱勢入暮較甚晶㾦隨汗出沒熱甚時仍胸膈煩悶略有讝語頭重耳聾咳痰漾漾欲泛口味轉淡渴不喜飲濕溫已十八日矇蔽清竅流連腸胃無速愈之法用藥偏燥恐化火傷津偏清又恐助濕遏邪治再清化病勢不進就是退機四方制川樸八分法半夏錢半陳皮錢半冬桑葉錢半生苡仁四錢淡黃芩錢半赤茯苓四錢象貝四錢生竹茹葉各錢半生枳殼錢半五診濕為黏膩之邪熱乃無形之氣熱為濕遏濕被熱蒸鬱伏腸胃釀成濕溫其為病也必淹纏不休今熱勢較淡諸恙亦有減無增惟胃困口淡渴飲而不多舌苔黃膩中根又布灰滑蘊伏之邪層出不盡脈數而不揚體溫一百零一度三候之期就在明日恐熱勢未必能和解也守原意出入之五方制川樸八分法半夏錢半陳皮錢半枳殼錢半梗通草一錢淡黃芩錢半象貝母四錢生竹茹葉各錢半生熟苡仁各三錢澤瀉錢半六診今晨熱勢已退至午後又凜寒發熱熱勢頗壯舌苔灰轉深黃口淡渴喜熱飲溲熱色赤煩悶嘔吐亦甚所幸讝語不作脈右滑數左弦數體溫一百零三度濕熱深重腸胃接近膜原得能轉瘧則松六方淡黃芩錢半酒炒法半夏錢半赤苓四錢生竹茹葉各錢半焦山梔二錢清水豆卷三錢象貝母四錢陳皮錢半炒枳實錢半通草一錢七診昨夜得暢汗熱勢解淨旋即安寐今晨大便頗爽胃納亦展惟午後寒熱又來煩悶嘔吐渴飲等隨寒熱接踵而至脈來數象右部較甚體溫一百零三度舌苔深黃濕從熱化轉瘧之象已著前賢王孟英先生論黃連溫膽湯治濕熱瘧疾最宜今謹遵之七方上川連七分酒炒赤苓四錢生竹茹葉各二錢生甘草四分生苡仁四錢製半夏錢半陳皮一錢生枳實錢半象貝母四錢通草一錢陰陽水煎藥服一劑八診寒熱如瘧熱重於寒舌苔較化耳聾漸亮口淡干膩晶㾦尚隨汗外布濕熱黏膩所以淹纏脈來濡數體溫一百零二治再和解八方香青蒿錢半製半夏錢半青陳皮各一錢生枳實錢半肥知母錢半川黃連七分酒炒赤苓四錢生竹茹二錢象貝四錢草果仁八分同炒陰陽水煎藥服二劑九診瘧勢已輕大便通暢胃納亦展濕熱逐漸退化舌苔尚黃脈來濡數體溫一百零三度治再用清宣泄九方香青蒿一錢法半夏錢半陳皮一錢草果仁七分生竹茹二錢淡黃芩錢半柔白薇一錢赤苓四錢肥知母錢半同炒象貝四錢陰陽水煎藥服二劑十診昨午後微有寒熱經一時余即汗解口淡舌根薄黃邪勢日退正傷未復脈數已和來往濡軟無力穀食增旺大便亦暢治再和胃以化餘邪十方川石斛三錢赤苓四錢陳皮一錢水炒竹茹錢半通草一錢法半夏錢半川貝母二錢去心生穀芽四錢飯湯炒苡仁四錢燈心三紮十一診寒熱己止諸恙均安惟神倦肢怠脈來濡弱邪雖退正未復性既畏藥不妨暫停謹慎起居飲食壯年不難復元治再和養十一方原金斛三錢宋半夏錢半炒川貝二錢水炒竹茹錢半冬瓜子三錢生穀芽四錢白茯苓三錢陳皮一錢通草一錢紅棗三枚效果服三劑痊愈廉按東南地氣卑濕天時溫暖真傷寒證極少除風溫證外最多濕溫之證此案濕滯熱鬱久蘊釀痰痰濕熱阻滯三焦治以開上疏中導下分消法為正治方亦宗此立法看似常用藥品卻非老手不辦濕溫案內科王子達住成都上北打金街病者陳華章年二十二歲人長而瘦住省內西順城街病名濕溫原因素喜飲酒去冬新婚入春無雨燥甚二月底偶感咳嗽頭暈口乾而不思飲食耳鳴無精神初延劉子初診治謂為風溫主以銀翹散全方加藁本白芷一劑未效證候前證悉在而加身重午後即熱天明微汗則退熱時口渴心煩噯氣合目則譫語數句下利不爽小便短赤嘿嘿不語舌苔灰白而膩耳已聾診斷左手浮滑而大重按則微右寸獨洪關尺模糊不清脈證井參此溫證夾濕已人陽明陽明為成溫之藪信然療法速清陽明之熱透其伏火消其頑痰淡滲其濕期其外達慮其內陷少遲則津液再傷釀成昏不識人種種危險更難言矣處方蒼朮白虎湯加減生石膏五錢研細蒼朮一錢粉葛根錢半炒知母三錢苦杏仁二錢牛蒡子三錢枯芩二錢浙貝二錢廣皮二錢茯苓三錢酒黃連七分粉草三分一劑次診昨夜稍安靜得汗熱已少減惟譫語不休醒則明白自言頭痛暈重心慌口膩脈左寸微洪與右寸相稱余滑澀兼見模糊未退舌心微黑邊滑面垢苔黑赤氣粗若喘清涕甚多伊母忽言曰血也非涕多而黑快拿涼水止之予在旁急阻曰此退病之嘉兆豈可止乎彼時頭汗亦多伊岳私謂予曰非變證乎何汗血並來予笑曰汗與血一耳何怪乎數分鐘後血少而病人睡去予曰不可高聲呼叫聽其睡覺且請教曰昨日弟列舉各家先生皆未許可此病非溫病乎先生所主之蒼朮白虎湯甚為佩服然鄙人不能無疑耳予曰我何敢非古人而自作聰明令坦去歲過酒不過蘊有濕熱耳內經言冬不藏精春必病溫其精字指人身津液而言並非指男女媾精之精字而言又內經汗者精氣也出汗亦是出精耳比如花天酒地之區冬藏精者幾人則春來人人溫個個病矣因此誤解張石頑之少陰夾陰論葉氏之溫邪上受首先犯肺逆傳心包引入陰證吳氏更引太陽病發熱而渴不惡寒者為溫病首列桂枝湯治溫尤為大誤三診病人言曰刻睡去夢四面火燒房子將我圍住無路可逃身燒熱難受大呼救命而醒此時周身是汗周身甚癢頭能抬而不暈矣診脈兩寸已平而緩模糊已退滑脈尚有予命舉火照其前後心見面部皆現紅點細如針沙周身皆滿惟下臀甚少予曉之曰病之危險已過恐內伏未淨耳臀上如有則無慮矣外風要忌急用椿樹皮蔥須煎湯熏洗下部多洗為要過三日無礙矣姑以牛蒡子湯消息之處方牛蒡子錢半牡丹皮錢半地骨皮三錢薑黃片一錢浙貝一錢廣橘絡八分冬瓜仁三錢大豆卷三錢炒建曲三錢廣角參一錢鮮生地八兩取汁沖服四診昨夜吐膠痰甚多而臭已服藥一劑已姑仿千金法照原方加葦莖蘆竹根各五錢梔子枯芩各三錢效果至第五日則病人起坐矣自言下部昨前疹子甚多奇癢更甚一身脫皮臀上如小錢大之痂還未脫盡惟大解有四日亦無苦飲食每餐稀粥兩碗時刻覺餓聞肉食甚香微行動即氣短心空余亦無甚病苦診得六脈四至而緩兩尺尚欠和平主以養陰潤燥善其後處方西洋參七分杭白芍三錢秦當歸二錢鮮石斛四錢角參二錢薏苡仁二錢建蓮二錢柏子仁三錢不去油粉草五分葦莖三錢為引切戒醇酒厚味二三劑後即以飲食調養而健說明伊岳丈曹子芹邑文生喜讀醫書而未問世者在彼主醫謂予曰小婿之病非冬傷於精而病溫即石頑所謂夾陰病乎蓋小婿去冬始完婚耳向來稟賦本弱又喜飲酒此時之病形譫語神昏全是陰虛右寸獨大非溫邪上受首先犯肺逆傳心包似否宗葉氏喻氏吳鞠通之法可乎予因笑而謂曰足下欲病愈乎亦照各家之醫書刻劍乎曹知失言改容請予救命予又曰足下疑弟用白虎之石膏聊舉以證之千金溫風之證脈陰陽俱緊汗出體重其息必喘其形狀不仁嘿嘿但欲寐一段千金謂為溫風非仲聖之謂風溫乎千金石膏用三兩又千金所載腑臟溫病共有六方皆用石膏雖腎臟有溫亦以石膏為治萎蕤湯之石膏亦治冬溫人患不識病證不察病機故少見多怪耳可憐可嘆廉按溫為伏氣濕從酒來許學士蒼朮白虎湯加減正合病機其餘方亦清穩案後說明歷徵石膏為清溫要藥足見平時研究濕溫案內科過允文住宜興徐舍市病者徐燕儀夫人年三十七歲住宜興洑溪村病名濕溫原因濕濁內蘊又感溫邪前醫誤認為孕疊投滋膩邪濕膠固迄今五月不解證候寒熱似瘧腹脹經停胸痞泛惡渴不多飲便溏溲赤診斷苔白膩脈弦滯乃濕鬱熱遏之候療法以蔞皮紫菀開太陰之氣六一通草通州都之官覆花半枳宣上疏中腹皮二苓化氣滲濕炒蒺藜左秦艽通絡利樞處方豬茯苓各三錢大腹皮錢半白蒺藜三錢炒去刺瓜蔞皮二錢旋覆花錢半包煎白通草一錢炙紫菀錢半江枳殼錢半製半夏錢半左秦艽錢半六一散三錢荷葉包三劑次方前方去腹皮枳殼六一散加桂枝五分枇杷葉五大片刷去毛赤芍錢半三方前方去桂枝通草赤芍加象貝三錢淡竹茹錢半蔻仁五分後入效果前後共服十劑寒熱止諸證退惟經尚未行與調經理氣藥三劑經行病愈廉按此治濕重熱輕苦辛開泄之方惟病既誤投滋膩僅用腹皮枳殼利氣導滯究嫌力薄可再加川樸山楂則效用較速矣濕溫兼寒案內科何拯華紹興同善局病者徐福生年三十四歲業商住謝墅病名濕溫兼寒原因夏末秋初濕溫盛行適感風寒而觸發證候初起惡寒無汗頭痛身重肢體煩疼胸膈痞滿渴不欲飲午後寒熱狀若陰虛便溏不爽溺短而黃診斷脈右沉細而緩左弦緊舌苔白膩而厚兼帶灰滑此由陰濕傷表盤踞氣分醞釀成溫適為風寒搏束伏邪欲達而不能遽達也療法藿香正氣散加減疏中解表為君先使風寒從皮腠而排泄芳淡滲利為佐續使濕邪從內腎膀胱而排泄汗利兼行自然濕開熱透表裡雙解矣處方紫蘇葉錢半杜蒼朮一錢白芷錢半廣皮二錢羌活一錢藿香葉錢半卷川樸錢半防風錢半浙苓皮四錢通草錢半切絲次診一劑而汗出津津頭身痛減惡寒亦除二劑而濕開熱透咳痰不爽脈轉滑搏神識模糊狀若昏蒙此由濕熱鬱蒸過極挾痰而上蒙清竅俗稱濕蒙是也急急導濕泄熱豁痰開蒙為要辛蘆白通湯主之次方光杏仁三錢竹瀝半夏三錢白芥子七分杜藿梗二錢生苡仁三錢鮮石菖蒲一錢剪碎沖廣皮紅一錢帶皮苓三錢先用水蘆筍一兩北細辛五分燈心五分煎湯代水三診一劑而咳吐稠痰數口濕蒙即開神識清醒大便轉閉溺亦黃熱腹中脹滿口淡微苦舌苔轉黃脈右滑數此濕阻氣滯夾有痰食錯雜其間也治以味辛質滑流行氣機氣機一開則大便自解溺亦暢利而濕熱積滯均從二便排泄矣三方白蔻仁三分拌搗括蔞仁五錢炒蔞皮三錢干薤白錢半白酒洗搗春砂仁三分拌搗郁李淨仁三錢小枳實錢半扣青皮三顆磨汁沖四診連服兩劑大便陸續而通先則黃白相兼繼則色如紅醬終則老黃臭穢異常腹脹頓除小便漸利惟口淡胃鈍精神疲倦脈搏滑數轉軟舌黃亦退治以調中健胃振其精神以善後四方赤苓二錢豬苓錢半澤瀉錢半廣皮錢半生苡仁四錢黃草斛二錢鮮荷葉一錢拌炒生穀芽三錢效果二三劑後胃氣漸開能飲稀粥精神亦振多言不倦後用黃草川斛三錢金橘餔兩枚煎湯代茶調理及旬而愈廉按濕兼寒熱二者而咸或偏寒或偏熱不得以陰邪二字括之觀天地之濕發於夏月是火蒸水而濕乃發故濕之中人有濕挾寒之證有濕挾熱之證有寒閉於外熱鬱於內之證此案濕溫兼寒寒中有濕濕中有熱較之上列三證尤為糾纏難愈案中前後四方雖不出苦辛淡法而佐溫佐涼恰如其分可為此證之適當療法濕溫夾痰案內科周小農住無錫病者陳永芳之室忘其年住虹口病名濕溫夾痰原因首夏身熱有汗口渴喜飲前醫泥其渴飲以為熱病用鮮石斛六錢石膏鮮地等稱是服之噁心吐出轉延余診證候身熱面油胸悶異常渴喜冷物溲紅而短診斷脈糊細按則數舌苔掯膩色白予決濕重於溫中有痰濁停阻也療法吳氏三仁湯加減以杏仁蔻仁半夏苡仁滑石通草等苦辛開痰芳淡化濕為君蘆根知母輕清泄熱透其伏溫為臣佐以玉樞辛香疏氣寬胸泄濁使以竹茹清潤通絡滑以去痰也處方光杏仁三錢姜半夏三錢蔻仁六分拌研滑石六錢包煎生苡仁四錢川通草錢半知母三錢玉樞丹五粒藥湯調下先用活水蘆筍一兩鮮刮淡竹茹三錢煎湯代水次診連服兩劑胸悶頓減熱勢起伏有時厥冷臥向陰僻口說妄言脈舌如前仍用苦辛淡法以疏達之次方光杏仁三錢蘇葉嫩枝一錢焦山梔三錢廣鬱金三錢生打卷川樸一錢竹瀝半夏三錢淡香豉三錢青連翹三錢飛滑石四錢包煎川通草錢半野薔薇花一錢鮮石菖蒲一錢剪碎沖生苡仁四錢淡竹茹三錢三診肢末轉暖胸前遍發疹㾦胸悶大退向之渴喜冷飲者轉喜熱飲稍溫即拒且湧吐冷涎喜臥向日暖處移榻時坐起即厥目定口噤四肢轉冷診時齒震言蹇不清種種變症總屬痰濕重使然防變痰迷濕蒙急進大劑滌痰參以化濕三方姜半夏三錢白殭蠶二錢茯神三錢淡姜渣八分廣橘紅一錢廣鬱金三錢生打遠志一錢制膽星一錢生苡仁四錢赤苓四錢鮮石菖蒲一錢剪碎沖白蔻末五分沖四診一劑即痙定冷涎略少腹悶連得矢氣原方加礞石滾痰丸三錢包煎效果服後得便病減大半續與化痰理濕熱退而安廉按濕溫之為病有濕遏熱伏者有濕重熱輕者有濕輕熱重者有濕熱並重者有濕熱俱輕者且有挾痰挾水挾食挾氣挾瘀者臨證之時首要辨明濕與溫之孰輕孰重有無兼挾然後對證發藥隨機策應庶可用藥當而確收成效焉此案濕重熱輕挾有痰濁濕為黏膩有形之邢痰為有形之物病勢故多轉變選藥處方亦不得不隨證治之原因療法轉而為對證療法也濕溫轉虛案內科袁桂生住鎮江京口病者周君年約四十歲住本鎮病名濕溫轉虛原因初患濕溫病由其戚某君用三仁枳桔及小陷胸加薤白等方服十餘劑又以瀉葉下之神氣遂大疲憊證侯心悸不寐面色黯淡手指蠕動兩足軟弱診斷右脈小弱左脈虛數舌燥無津乃克削過甚津液元氣俱傷之候也療法急用增液湯加味生津氣以養元神處方細生地一兩元參八錢原麥冬六錢左牡蠣四錢西洋參錢半鮮石斛三錢柏子仁錢半辰茯神四錢次診翌日復診汗出不止舌燥而現黑色略有薄苔口乾病人自謂頭重異常蓋元氣大虛前藥嫌輕也乃於前方加減再進一劑次方細生地一兩元參八錢原麥冬六錢柏子仁錢半辰茯神四錢西洋參錢半潞黨參三錢炙黃耆三錢五味子五分東白芍三錢三診次日天甫明叩門延診則汗出愈多寐則汗出益甚手冷神氣疲憊兩脈虛細心腎脈尤不足勢將欲脫矣急急扶元斂汗以固暴脫外用止汗藥粉撲其周身三方別直參三錢炙綿耆五錢生白朮四錢酸棗仁五錢炙甘草一錢浮小麥五錢大紅棗五枚上猺桂八分大熟地四錢東白芍三錢五味子六分四診服後諸證悉退病家自以為病愈遂不服藥越數日復惡寒頭痛手冷時或手足發熱精神疲倦不思飲食舌苔少而色白小便黃脈仍沉小乃以理中湯合小建中湯加減四方別直參一錢炒白朮二錢淡乾薑一錢炙甘草八分鮮生薑三片川桂枝八分炒白芍三錢姜半夏三錢大紅棗四枚五診服後諸證少退但時覺虛火上升則頭痛大作手足亦覺發熱而其身則殊不熱遂師李東垣法五方潞黨參二錢炒白朮二錢紫猺桂五分升麻一錢川柴胡一錢川芎一錢炙甘草八分茯苓三錢姜半夏錢半鮮生薑三片大紅棗四枚效果覆杯而頭痛止手足亦不發熱接服一劑而安說明凡老年之病屬虛者多非偏於陽虛即偏於陰虛而亦有陰陽兩虛者醫家於此尤宜加意焉廉按莫枚士云濕溫有兩不可合一難經濕溫言脈不言證脈經濕溫言證不言脈何也蓋在難經者既屬傷寒則必有頭癰發熱等症又以其脈陽濡弱也推得先受溫而尺熱口渴在其中陰小急也推得後受濕而身疼拘急在其中不言證而證可知已其與脈經所言先受濕後受熱者迥別後受濕者其濕浮於表與寒同法而減等小急者緊之減象也許叔微蒼朮白虎湯蒼朮散濕白虎治溫最合緣此濕溫重在溫也先受濕者其濕沉於裡與凡濕病同法故脛冷胸腹滿其脈當沉可以白虎概治之乎頭目痛妄言是濕甚於里將與後受之熱合化故禁汗之虛表以甚里蒼朮其可用乎緣此濕溫雖屬中暍重在濕也觀其所重兩者懸殊此案開泄下奪感證皆平正亦大傷故病變甚屬虛象理合雙補氣液兼顧陰陽前後五方補法漸次加重幸而虛能受補故得挽回於末路此種末期療法不可以初病濕溫例視也濕溫壞證案內科孫少培住南京倉巷病者蘇子昂年三十歲開設茶莊住南京南門大街病名濕溫壞證原因素有茶癖面白體瘦早起咳痰極多長夏之月患濕溫既已誤表化燥又因涼膈散誤下轉為氣虛濕甚證候午後發熱惡寒頭痛汗多藥入即吐索水不欲飲飲亦不多舌苔粗厚胸悶發躁徹夜不眠十餘日不大便診斷脈濡小而滑斷為濕重熱輕氣虛多痰證見惡寒即經所謂陽虛生外寒也口乾舌燥者乃陰不升陽不降也療法用桂枝辛溫通陽厚朴散滿平胃為君更用燥濕健脾之蒼朮降逆化痰之半夏為臣生薑散寒止嘔甘草調中和藥為佐陳皮利氣行痰茯苓淡滲化濕為使處方川桂枝錢半川厚朴錢半泔炙蒼朮二錢姜半夏二錢鮮生薑一錢炙甘草四分廣陳皮二錢雲茯苓三錢效果服藥後胸中豁然通暢汗出達於四末夜半後外熱亦退咳痰極多自雞鳴安睡至日始醒復診改用六君子湯加佩蘭服之大解亦通依法調理漸次就愈廉按濕溫一證首當辨其濕勝熱勝濕勝於熱者藿樸胃苓湯加減熱勝於濕者蒼朮白虎湯增損其大要也此案雖誤治壞證然亦濕勝痰多方用薑桂平陳湯燥濕化痰極有力量接方用六君子湯加味益氣除痰亦合病情濕熱頭痛案內科王經邦住天台柵門樓病者陳訓臣年六十餘歲前清庫生住天台城內病名濕熱頭痛原因由於濕熱上盛暴風襲腦證候頭重壓下如山痛不可忍診斷脈浮緊數浮緊雖屬冷風而數為濕熱上蒸之候療法發汗透邪用清空膏合川芎茶調散意處方北柴胡一錢淡枯芩一錢小川連七分川羌活二錢北防風一錢小川芎二錢生甘草七分雨前茶葉二錢效果煎服一劑頭痛如失如脫重帽康按證屬外風與濕熱相合故方用清散從表裡兩解之法濕熱痢案內科葉鑑清住上海病者鮑棠伯先生年五十餘浙江人寓慶祥里病名濕熱痢原因腸胃郁濕蘊熱又感寒積食致病證候形寒熱甚神志不清脘悶面紅口乾上為嘔吐下為泄瀉診斷脈來弦數而促舌苔滿布垢厚體溫一百零四度半此伏熱鬱濕互阻腸胃近因表感新涼內夾食滯觸發伏邪來勢險重防其昏閉變端療法表裡俱病腸胃邪滯充滿方中用薄荷藿香發散表邪檳榔枳實萊菔子神麯消導里滯為君半夏陳皮和胃楂炭消積為臣鬱金通草宣泄佩蘭化濁為佐使服一劑有效處方廣藿香二錢花檳榔錢半萊菔子三錢焦楂炭三錢廣鬱金錢半生打薄荷葉一錢後下生枳實錢半焦建曲三錢佩蘭葉錢半川通草一錢製半夏二錢陳皮錢半次診寒熱得汗稍減便泄轉為下痢紅白均有腹痛後重澼澼不爽口渴煩躁頭脹脘悶泛惡頻作胃納杳思伏邪食滯交阻腸胃表裡同病舌苔黃白垢厚脈促雖和弦數尚甚體溫一百零三度邪勢奮張殊難即解神識雖清還防昏陷及噤口變端治再分化次方廣藿梗錢半花檳榔錢半青陳皮各一錢焦麥芽四錢制川樸一錢生枳實錢半赤苓四錢焦楂炭三錢煨木香八分廣鬱金錢半生打製半夏錢半萊菔子三錢三診熱勢大減痢下紅白轉甚腹痛澼澼不爽泛惡口苦渴不多飲舌苔垢厚汗多頭面表邪較化里邪正盛脈來弦數體溫一百零一度三痢疾古稱滯下即濕熱食滯滯著腸胃氣道因之不通不通則痛治宜宣通佐以潤滑三方全當歸五錢萊菔子五錢枳殼二錢車前子四錢青皮錢半西赤芍三錢花檳榔三錢生甘草一錢藿梗錢半楂炭三錢四診痢下較爽糞積雜有腹痛寒熱稍和泛惡亦減略飲漿粥口乾苦不喜多飲脈數雖靜兩關弦勁舌苔黃厚新受之表邪食滯漸有化機蘊積之伏濕鬱熱尚留腸胃黏膩之邪一時不易肅清治再疏化四方全當歸五錢枳殼錢半車前子四錢藿梗錢半焦楂炭三錢花檳榔二錢萊菔子四錢青皮錢半生甘草八分扁豆花一錢馬齒莧三錢五診表熱已解下痢腹痛均減積少糞多日夜尚有十餘次小溲較利泛惡已平皆邪退氣通之佳兆也脈來左弦數右濡細數舌苔較化再以清化腸胃濕熱宣通氣機治之五方藿梗錢半焦麥芽四錢萊菔子三錢赤苓四錢通草一錢大腹皮三錢楂炭三錢青陳皮各一錢佩蘭錢半生熟苡仁各三錢扁豆花七錢馬齒莧三錢六診下痢日夜七八次積少糞多腹痛大減腸腑膩邪漸化邪化氣自流通胃納日展脈來左弦較和尚當清化六方大腹絨三錢扁豆衣錢半炒焦麥芽四錢赤苓四錢陳皮錢半佩蘭錢半銀花炭二錢楂炭三錢通草一錢炒竹茹錢半飯蒸荷葉一角七診下痢尚有四五次臨便腹微痛積少糞多脘宇已寬渴喜熱飲知味能食運化猶遲脈來柔軟濕熱漸化氣機不健治再和中以徹餘邪七方川石斛三錢大腹絨三錢焦穀芽四錢陳皮一錢炒紅棗三枚扁豆衣錢半炒飯蒸木香五分炒夏曲錢半通草一錢飯蒸荷葉一角八診痢已止便厚溏腹不痛日行二三次小溲清長知味能食運化尚遲脈來柔軟再以健脾和胃八方淮山藥錢半焙焦穀芽四錢大腹皮二錢炒竹茹錢半炒紅棗三枚扁豆衣錢半炒飯蒸木香五分炒夏曲錢半陳皮一錢飯蒸荷葉一角九診大便兩日未行諸恙均和胃納已展脈來柔軟飲食宜調勻靜養勿勞神是病後調理無上妙法九方焙山藥二錢焦穀芽四錢茯神三錢陳皮一錢大紅棗三枚扁豆衣錢半炒飯蒸木香五分糯稻根鬚三錢炒竹茹錢半炒夏曲錢半十診大便乾燥向來腸液不充近因痢後津傷氣弱宜健脾和胃中參以潤腸十方吉林須五分另煎沖焦穀芽四錢穭豆衣三錢炒竹茹三錢茯神三錢淮山藥三錢生打火麻仁三錢炒糯稻根鬚三錢橘白一錢紅棗三枚效果六劑痊愈廉按濕熱積滯釀成秋痢為最多夏令亦間有之此案處方用藥雖屬尋常然皆和平切病之品其宗旨先立於無過後求有功江浙之間其道盛行者大都如斯濕熱痢案內科李竹溪住蕪湖米市街病者崔汝槐年四十二歲廣東人蕪湖某店水客病名濕熱痢內經名為腸澼後賢又名滯下原因體質氣虛入夏多食瓜果濕久化熱正不運邪蘊結腸胃證候痢下兩旬始則紅白稠黏繼而轉為黃積腹痛下墜飲食欠納形色索然委頓殊甚問有幾時曾服藥否答已兩旬出方一帙簡閱一過純趨溫補一派收效如何答云紅白已減黃積復來腹痛尤甚且食減人疲診斷勘脈細滑按之有力脈證合參氣質雖憊脈未動搖仍主通之勿以久痢之言所惑況通之一字原非專指攻下而言際此黃積滯下腹痛尤甚仍系濕熱醞釀於中中氣不足調劑無方雖有補劑其於痰何上焦痰既不行下脘熱亦不泄邪反逗留正愈不立當先剿而後撫毋投鼠以忌器療法通則不痛因君乾薑川連一開一降臣以茯苓半夏化濕祛痰佐以甘草扁豆衣穀芽六曲調和脾胃導濁升清使以滑石通利水道俾三焦之濕熱鹹得長驅而直決也處方泡淡乾薑五分小雅連五分吳萸水炒雲茯苓三錢法半夏二錢水炙黑草五分白扁豆衣三錢生生穀芽三錢六和曲三錢西滑石三錢包煎河水煎服兩劑次診前方兩服黃積減半苔轉淡黃且薄腹痛亦微小溲赤而且痛是邪已化而下尋出路之徵奈中氣式微邪難速走改以連理湯加味培中泄邪次方西潞參二錢米炒生於術一錢乾薑四分水炙草四分小川連五分鹽炒雲茯苓三錢醋夏二錢方通草一錢河水煎仍投兩劑三診勘得黃積已止左少腹仍形痛脹溲短苔化是濕流就下熱蓄膀胱氣機未化改開太陽三方瑤桂心四分雲茯苓四錢豬苓二錢生茅朮一錢建澤瀉二錢小川連五分吳萸炒開水一杯為引河水煎滾再下桂心十餘沸服四診少腹痛蠲溲長苔淨惟余薄白膈上欠舒自覺停痰得谷噯氣乃邪退而中樞升降仍未調也改以治中兼輸升降四方西潞參三錢米炒焦白朮一錢雲茯苓三錢水炙草五分廣橘皮錢半佩蘭葉一錢春砂仁四分炒薏仁三錢老生薑四分河水一大盞煎服效果四服納穀漸強胸次豁然矣廉按濕熱咸痢前哲謂傷氣分則為白痢又稱脾痢傷血分則為赤痢又稱肝痢用藥之法白耐剛而赤耐柔此案紅白痢後轉黃積凡濕熱痢如此者多方則用剛遠柔以其多傷氣分故末診用錢氏異功散加味純屬扶中健脾矣濕熱痢轉休息案內科嚴紹岐住紹興昌安門外官塘橋病者錢紹榮年三十七歲住恂興病名濕熱痢轉休息原因仲秋伏暑化痢屢易多醫雖皆不敢用大黃盪滌腸胃然俱以枳樸蔞仁麻仁等通套藥治痢痢雖減而濕熱未清遽用生地霍斜滋養胃陰從此時發時止或止或發遂釀變休息痢延余診時正次年春分前一日證候下痢日四五行或六七度解出甚艱必多轉矢氣積隨能出色如稠痰休時糞如筆管溺如米泔胃雖能食自覺無味診斷脈弦滯且大舌前半無苔後根苔色灰膩予斷為濕熱未淨傷及脾臟中氣中氣傷則脾不能為胃行其津液津液鬱滯則不能下潤於大腸所以痢則解出甚艱休時糞如筆管也然與液枯腸燥者不同療法當用黨參升麻為君提補其中氣以宣暢大腸五苓去桂加川連為臣祛其濕熱香砂陳皮為佐疏利其氣使以綿茵陳通其濕熱久郁之陳積也處方升麻五分拌炒潞黨參五錢川連七分拌炒泅安蒼朮八分赤苓四錢豬苓二錢澤瀉二錢青木香八分帶殼春砂八分陳廣皮錢半綿茵陳三錢效果連服三劑下痢遂暢大便色轉老黃原方加鮮荷葉一錢拌炒長鬚生穀芽一兩煎湯代水又進三劑痢止胃健嗣以東垣調中益氣湯加減調理四劑而痊廉按凡痢成休息者半由病人貪食油膩半由醫者早投滋陰以致濕熱留連滯而下去其中又有在脾在肝之區別如其下痢多白則濕熱在脾下痢多赤則濕熱在肝蓋白痢雖屬大腸而內關脾臟赤痢雖屬小腸而內關肝臟故用藥白耐剛而赤耐柔也酒濕休息痢案內科孫少培住南京倉巷病者王得勝年三十二歲士兵住南京紅花地病名酒濕休息痢原因平素嗜酒勞力後感冒秋邪不慎口腹久不大解服西藥蓖麻油得解表熱雖退大解日數十行久之腹痛轉痢時作時止證候痢下腹固痛不痢亦痛甚畏寒口渴心悸欲嘔目窠下微腫糾纏三載不愈診斷審察證象此為休息痢惟病延三載脾氣未有不虛虛則不能制水目窠下微腫內經謂水已成矣腹痛者脾病也內經謂脾喜溫而惡寒又謂寒則血凝泣又謂寒氣客於腸胃厥逆上出故痛而嘔也巢氏病源言休息痢者胃脘有停飲也本年五六月間霪雨陰寒逾月不止人病泄利者居多推原其故即內經所謂濕多成五泄是也大泄之後津液隨之下行故渴渴則飲水多水停心下故悸診脈兩關沉滑兩尺寸俱不應指舌苔灰黑而厚斷為中焦食積痰飲所致法當下去腸胃宿垢惟病久中氣已虛攻下則正氣愈虛恐有顧此失彼之虞因思古人有補下治下制以急之訓急則氣味厚故用大劑以盪滌之療法湯丸並用以溫脾湯為法潞黨參性溫補氣當歸性溫補血用以為君乾薑除胃冷逐寒邪黑附子補元陽散寒濕用以為臣甘草和諸藥健脾胃用以為佐芒硝開積聚化停痰大黃走而不守用以為使處方潞黨參五錢當歸三錢熟附片三錢乾薑一錢炙甘草一錢以上五味先用長流水濃煎兩小時後再加入芒硝二錢錦紋大黃三錢微煎見滾即行離火溫服一劑效果服藥後約一小時即覺腹中雷鳴大瀉如傾盆少頃又瀉至五六次勢漸緩復診用理中湯為治服三劑晝不瀉而夜間仍瀉五六次復以理中湯臨臥時送服四神丸五錢至十日而愈廉按休息痢多因兜澀太早積熱來盡加以調攝失宜不能節食戒欲所以時止時作為之醫者但須審其病之新久虛實或氣分受傷或氣血並傷參酌而治對症發藥可也此案胃腸中氣受傷陳積留而不去故用許學士溫脾湯例通補兼施迨陳積已淨然後用理中合四神丸純乎溫補攝納以奏全功濕熱痢兼痿案內科陳憩南住潮安金山腳病者蔡達仁之第三子年十五歲住潮安城外病名濕熱痢兼痿原因初夏偶感濕熱作紅白痢因醫治錯誤纏綿不愈至仲冬兩足瘻廢而成痿證候形銷骨立肚腹堅膨其熱如烙舌絳紅滿口臭氣令人難聞所下腐穢極黏日數十行腹痛甚粒飲不入臥床叫苦診斷六脈皆沉細而數時有弦象濕熱傷陰肝膽氣鬱據證參脈初系濕熱伏於大小腸而病痢久之逆傳於肺耗液損津脾胃受困而病痿此濕熱痢兼痿也然病何至斯極想因謬作虛寒而服參耆桂附之屬以致五臟六腑受其燥烈之氣而營分尤甚焉所幸童體無虧下泉之水足供挹注不然早已焦頭爛額矣安得一線之生存乎其父曰唯唯但不識還可治否余曰治則可治恐畏吾藥之寒涼而不敢服耳其父曰先生果有確見雖砒信勿辭也遂許之療法連日與調胃承氣湯合白頭翁湯二劑後劑加郁李淨仁以下肝膽之氣水煎午前十時服處方淨朴硝二錢酒大黃二錢川黃連錢半生黃柏錢半白頭翁二錢北秦皮錢半粉甘草一錢次診連服三劑陸續下去垢汙甚多腹膨即消熱亦大減兩寸稍浮弦象去六部仍細數改用專清營分之熱最合通絡清營湯三劑逐日水煎午前十時服處方通絡清營湯自制驗方金銀花二錢淡竹葉錢半大元參二錢地骨皮二錢鉤藤鉤錢半杭白芍二錢川鬱金錢半肥知母二錢羚角片錢半先煎蘇麥冬三錢牡丹皮錢半白茅根三錢去皮三診內熱全解便行僅三次帶黏黃糞腹痛除脈轉浮急兩關俱弦此濕熱外走觸動肝陽也其父乍喜乍驚曰數月之痢先生以數劑藥痊之何其神也但小兒起立不能恐仍成廢人耳余曰無憂也經曰肺熱葉焦發為痿躄又曰陽明主潤宗筋束骨而利機關故治痿獨取陽明也夫濕熱之人脾先受之書曰飲食入胃輸於脾脾氣散精上歸於肺今脾為濕熱所困不克輸精於肺所以肺熱葉焦而清肅之令不下行也且太陰與陽明原屬表裡太陰受禍陽明乏資故無以束骨而利機關宗筋因之縱弛而不任地也由經言思之令郎之病得無是乎子既知治痢已獲效余自信治痿必有功法當清熱利濕抑木和中甘露飲加減主之二劑日各一服處方甘露飲加減生熟地各三錢金欽斛三錢廣青皮一錢宣木瓜一錢天麥冬各三錢薏苡仁三錢金銀花二錢綿茵陳錢半杭白芍三錢尖檳榔錢半粉甘草八分生枇杷肉錢半四診便行仍三次純黑色者濕熱化也兩足往來走痛者血氣初通藥力到也脈來和緩重按稍空此由血氣久虧端資調養理宜湯丸並進方易奏功擬用當歸補血湯合生脈散加枸杞茯神早九時水煎服午後三時用玉竹五錢煎湯送下虎潛丸六錢久服處方當歸補血湯合生脈散加枸杞茯神全當歸三錢蘇麥冬三錢五味子十四粒北黃耆六錢高麗參三錢川茯神三錢枸杞子三錢效果飲食日增肌肉漸充三星期大便即如常月餘能步履矣廉按痿躄一證原因有六一氣虛痿二血虛痿三陰虛痿四血瘀痿五濕痰痿六食積痿設不細審致痿之因未有不僨事者矣此案因痢後成痿宗內經治痿獨取陽明者以濕熱傷及牌胃脾不輸精於肺肺熱葉焦而成痿乃陰氣兩虧之痿症也一二兩方專除痢以治標三方側重治痿通補兼施惟第四方湯丸並進純用氣血雙補強壯筋骨以收全功層次井然非精研內傷雜症者不辦濕熱陽黃證案內科陳作仁住南昌中大街四川會館病者萬方鼎年六十四歲安徽人就幕南昌病名濕熱陽黃原因此人好飲酒數斤不醉適至六月濕暑當令又飲酒過量致有黃疸重證證候壯熱不退面目遍身色如老橘口渴思飲大小便秘日漸沉重臥床不起診斷六脈沉實而數舌苔黃燥察其致病之由參以脈證知系濕熱陽黃重症也療法陽黃證宜清解因仿仲景茵陳蒿加大黃梔子湯主之以茵陳蒿利濕清熱為君以大黃厚朴通大便為臣以梔子清心腎之熱為佐加木通利水道使邪由前陰分走不至停滯為使處方茵陳蒿一兩生錦紋三錢真川樸錢半炒黑山梔三錢漢木通錢半效果此方連進二劑二便均通黃亦稍退脈象亦較前柔和仍照原方減去木通加雲茯苓三錢六一散四錢包煎續進二劑至四日黃證已退過半但年高氣弱不宜過於攻伐因照原方減去大黃加薏苡仁四錢又接服四劑未十日而黃證逐漸痊愈矣康按法遵漢方加味用藥頗見斟酌濕腳氣案內科葉鑑清住上海病者汪姓年二十餘歲徽州人住新馬路當業病名濕腳氣原因受寒濕致病證候兩足浮腫麻木痠脹舉步不便大便溏溲短赤腹滿脘痞色㿠唇淡味淡胃困診斷脈沉細澀舌苔白膩由寒濕滯著下焦氣血不得宣通致成腳氣病勢險惡防驟然上衝變端療法治宜溫通雞鳴散加牛膝車前通草者由寒濕之氣著於下焦而不去故用生薑吳萸以驅寒橘紅檳榔以除濕然驅寒除濕之藥頗多而數品皆以氣勝加以紫蘇為血中之氣藥辛香撲鼻更助其氣氣盛則行速取著者行之之義也又佐以木瓜之酸桔梗之苦經云酸苦湧泄為陰俾寒濕之氣得大氣之藥從微汗而解之解之而不能盡者更從大便以泄之戰則必勝之意也其服於雞鳴時奈何一取其腹空則藥力專行一取其陽盛則陽藥得氣也其必冷服奈何以濕為陰邪冷汁亦為陰屬以陰從陰混為一家先誘之而後攻之也再加牛膝車前通草取其下行通溲溲多濕自化也二劑赤豆湯代茶處方花檳榔錢半紫蘇葉一錢酒炒木瓜錢半生薑錢半酒炒淮膝三錢淡吳萸一錢橘紅錢半苦桔梗七分梗通草一錢車前草四錢雞鳴時微溫服次診小溲較暢大便亦通濕邪既得下達諸恙似見退舍惟足腫入暮較甚色㿠無華舌苔白膩口淡不渴舉步維艱麻木痠軟有時氣逆微咳有時胸脘滿悶脈來細澀胃納不香南方地卑土濕又值黴令助虐若能回府調理取效必捷治再溫通慎防上衝變端次方川桂枝一錢淡吳萸一錢紫蘇葉一錢酒炒木瓜錢半酒炒淮膝三錢木防己四錢花檳榔錢半廣橘紅錢半鮮生薑四錢車前草四錢梗通草一錢通天草三錢效果此方服一帖後即回徽州十月上旬始至申來寓就診開一調理方據云到徽病己愈大半即將前方服八劑腫勢全退胃納如常惟兩足稍覺軟弱中秋後痊愈可知此病與水土大有關係也附錄病後調理方案脈來右濡左弦重按兩尺尚有神舌薄白小溲微黃大便通胃納健腳氣病後先以和中化濕續商補益法半夏錢半橘皮絡各一錢炒山藥二錢炒竹茹錢半絲瓜絡錢半雲茯苓三錢扁豆衣錢半炒焦穀芽四錢炒澤瀉錢半紅棗三個此方服三劑後接服調理長方潞黨參三錢淮山藥三錢炒炙虎脛八分淮牛膝三錢鹽炒茯苓三錢野於朮錢半飯蒸制女貞三錢酒炒木瓜錢半橘皮絡各一錢萆薢三錢菟絲子三錢炒厚杜仲三錢酒炒炒夏曲錢半大紅棗五個此方可服一二十劑廉按腳氣有因於寒濕者有因於濕熱者足脛腫而色黃白者為寒濕足脛痛而色紫者為濕熱此案系寒濕腳氣雞鳴散確係特效良方然此症患在上海者往往能令人死若紅腫如雲根自足起上升入心則嘔血而死若額目與腎皆黑則沖胸喘急而死古人通稱為腳氣攻心案中一再聲明曰慎防上衝變端誠閱歷之言也濕腳氣案內科魏長焱住興化狀元坊巷病者張得勝年三十餘歲兵士病名濕腳氣原因因駐防住所地卑濕重致感受濕邪成病昔東垣謂腳氣一病北方多感寒濕南方多傷濕熱千金方又謂為風毒所中繇坐立濕地風濕襲入經絡皮肉遂成腳氣吾興邑四面環水水濕素重病者又久居濕地故風寒濕三氣得以乘機內襲致患濕腳氣病者多證候初起兩足軟弱步履不便足脛浮腫怯冷頗甚兩腿麻痹上至少腹已延月餘診斷脈浮濡而遲浮主於風濡主於濕遲主於寒為風寒濕三氣合病而成腳氣之的象實與水土有關此今日西醫所以有易地療養之說也療法外臺所立治腳氣諸方多從風寒濕三氣合治最為精詳周到今宗其法為治用雞鳴散加蒼朮苓瀉以疏壅利濕羌防薑附以祛風散寒一舉而數害皆備則其病未有不除者矣處方蘇葉二錢木瓜二錢建瀉錢半附子錢半吳萸一錢橘皮錢半蒼朮錢半羌活錢半檳榔二錢赤苓三錢防風錢半乾薑一錢效果服二帖足脛腫漸消麻痹亦減步履有力更服三帖而瘳廉按濕為腳氣主因或挾風寒或挾暑濕隨時令而各有所因醫必按其各因之主要點對症發藥效如桴鼓此案雖屬濕腳氣而陰寒甚重故於雞鳴散中加入姜附為治此症之的對良方案中發明原因脈理亦有見地腳氣上衝案內科高糺云住贛州生佛壇前病者陳乃猷年三十八歲鄉農江西人病名腳氣上衝原因平素嗜浴水坐濕地而漸成此病證候足脛痠痛麻痹不仁行步艱難四肢皆冷忽然心胸悶亂不識人事而昏厥診斷脈兩寸雖浮而兩尺沉微欲絕此腳氣衝胸之危候氣返則生不返則由厥而脫矣療法急用朮附湯加黑錫丹牛膝加皮檳榔等溫鎮沖納為君佐沉香茴香平其沖逆使麻痹得通厥逆得平始為化凶轉吉處方泗安蒼朮錢半黑附塊一錢生淮牛膝三錢五加皮三錢海南檳榔三錢小茴香一錢上沉香八分黑錫丹一錢包煎效果一劑即神蘇而厥止去黑錫丹再進三劑手足轉溫精神清爽終用六斤丸木瓜牛膝天麻杞子淡蓯蓉鹿角膠各一斤蜜丸每服二錢調理旬余除根廉按此治陽為陰逼腳氣陰厥之捷效方法若畏其藥猛而不敢服轉瞬由厥轉脫不及挽救矣凡病家遇此種劇烈危症全在主方有人也腳氣衝心案內科李伯鴻住汕頭仁安里病者何評云年五十八歲住汕大德里街病名腳氣衝心原因花酒恣飲年老血氣衰弱不勝其濕毒發而為腳氣衝心證候呼吸似無心跳尚微覺心下痰氣高聳昏厥不語診斷棺衾置前預備入殮兒媳環哭延余診本以冀萬一按診已無只有打聽二診打其胸腹脹實有雜音聽其心久而有一跳手足未盡冷且其病先由腳痛起胸有痰積此症俗名百子痰打書名腳氣衝心前醫誤腳氣為流火敷以藥所以痰氣攻心而作假死形也療法先止其兒媳哭以免喧擾用二人扶起病者運用人工呼吸法以蒜艾炙其下患部以野葛膏摩擦其上患部俟痰氣散心臟能活動呼吸能接續急煎樸香檳湯灌之下用腳踏丸以發其汗繼續服後方愈後令服四斤丸以斷其再發處方野葛三兩蛇含草三兩防風三兩草烏頭二兩桔梗二兩茵芋葉二兩川椒一兩乾薑二兩巴姜二兩升麻二兩細辛二兩雄黃二兩犀角二錢鱉甲一兩共為粗末酒四斤浸四日以豬脂五斤熬藥須慢火頻攪勿令焦黑俟滴水成珠以絹濾去渣滓入樟腦二兩冰片二錢麝香四分磁瓶封固待用名野葛膏以摩患部為治腳氣要術次方腳踏丸方生草烏三兩樟腦二兩醋糊為丸如彈丸大每置一丸於爐中病者足踏之衣被蓋覆身上以汗出如涎為效三方樸香檳湯方貢厚朴一兩廣木香一兩花檳榔一兩四方廣木香二錢花檳榔三錢防己二錢郁李仁三錢桑白皮二錢赤茯苓六錢大腹皮二錢紫蘇二錢廣陳皮二錢秦艽三錢五方祠半夏二錢桑白皮二錢檳榔二錢旋覆花二錢草烏二錢射干二錢赤茯苓四錢黑牽牛六錢前胡二錢漢木通二錢秦艽三錢六方黑牽牛四錢花檳榔二錢瓜蔞仁二錢豨薟草三錢春根藤三錢石龍芮二錢祠半夏二錢赤茯苓四錢乾地龍二錢葶藶三錢七方四斤丸方川牛膝一斤宣木瓜一斤肉蓯蓉一斤明天麻一斤酒四斤浸一日曬乾為末用浸過藥之酒熬膏為丸如桐子大每服三十丸效果三星期愈服四斤丸二服迄今六十餘體健異常廉按學識嶄新處方奇特堪為腳氣衝心症別開生面獨樹一幟
