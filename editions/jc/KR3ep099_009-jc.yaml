body:
  text: 第九卷時疫白喉病案燥疫白喉案丁甘仁住上海病者葉女年十餘歲住上海病名燥疫白喉原因素因陰虛肝熱現因染燥疫時氣與內蘊伏熱相應為患病己四天證候喉旁左右兩關腐爛蒂丁亦去其半身熱不壯四日粒米不進診斷脈象濡數舌質淡紅中後薄黃余曰此疫癘之邪熏蒸肺胃而心肝之火內熾也療法鄭梅澗重樓玉鑰續集云白喉遇燥氣流行而發用藥以養陰清肺為主今仿其法而加減之處方鮮生地六錢京元參三錢冬桑葉三十張金銀花三錢漢木通八分鮮石斛四錢甘中黃八分川貝母三錢去心青連翹三錢薄荷葉八分川雅連五分鮮竹葉三十片活水蘆根一兩去節效果一劑即咽喉腐爛漸脫反覺掀痛此由腐爛雖去新肉未生故掀痛仍用原方加花粉三錢因未大便加生川軍三錢開水泡絞汁沖服得大便甚暢胃熱下行白喉隨愈肺與大腸相表裡腑熱下達肺火亦從下降病遂就痊廉按鄭氏養陰清肺湯專為燥疫白喉而設雖屬正治然就余所驗江浙患真白喉證少染爛喉痧者多若不明辨而誤用每致貽人夭札吾友杜君同甲所以著白喉抉微駁議叮嚀以警告病家也燥疫白喉案袁桂生住鎮江京口病者家嫂年四十歲住京口病名燥疫白喉原因今年九月間疫喉盛行感染而陡患喉證證候初起時僅咽喉兩旁紅腫繼起白點發熱惡寒頭疼診斷脈滑舌苔淡黃而膩此燥挾濕熱痰滯醞釀為患療法辛涼甘潤以泄熱解毒豁痰清喉外治吹蓬萊雪處方蘇薄荷四分冬桑葉一錢青連翹四錢栝蔞皮三錢金銀花三錢川貝母三錢去心鮮生地六錢金果欖二錢杵次診次日寒熱退而咽喉兩旁則破爛湯水難下舌苔淡黃厚膩右脈滑數乃痰伏上焦也仍以前方加減再進一劑次方金銀花三錢青連翹四錢川貝母三錢去心金果欖二錢杵鮮生地六錢淡黃芩二錢光杏仁三錢冬瓜仁四錢石菖蒲四分絲瓜絡四錢漢木通一錢雅梨汁一酒鍾和服三診第三日復診喉部潰爛未至蔓延咽內常覺痰阻舌苔黃膩痰濁甚重輕劑不能治也三方旋覆花二錢包煎川貝母四錢去心海浮石三錢栝蔞仁三錢半夏曲三錢原麥冬三錢鮮生地三錢小川連五分廣橘皮錢半雅梨汁一酒鍾萊菔汁一酒鍾和服並另用梨汁萊菔汁與飲四診痰漸活動能稍稍咳出矣然舌苔則滿布黏膩口黏而干大便數日未通右脈滑數乃以原方去海浮石加滾痰丸三錢同煎蓋欲通其大便使痰濁下降也五診此藥服後夜間能睡一二時知飢欲食而病勢遂大退矣然並未大便惟吐痰則甚多舌苔尚膩仍以前方去滾痰丸服後諸恙俱退家嫂以藥太苦遂不服藥效果但以薄粥調養越日大便始通而起居如常矣廉按過玉書曰白色喉蛾白色喉痹白色喉風白色虛喉白色喉癰癆證白喉以及喉疳之白腐喉痧之白點皆南方常有之症均非北方之時疫白喉也此案雖系燥疫白喉然挾濕熱痰滯故初用辛涼甘潤解毒豁痰繼因痰濁甚重注重開痰為君佐以清潤終加滾痰丸消降痰火尤為著力故服後諸恙悉退而痊惟生地麥冬陰凝滯氣究與痰濁不相宜當易竹瀝金汁為妥燥疫白喉案陳務齋住梧州四方井街病者梁德榮年三十歲體壯商業住廣西梧州病名燥疫白喉原因素因過食酸滯嗜酒無量誘因秋天炎燥是年白喉盛行毒菌飛揚由口鼻吸受直接傳染證候惡寒發熱頭目眩痛背脹腰刺全體骨節疼痛咽喉乾涸微現硬痛繼則體中大熱咽喉疼痛勢不可忍喉頭起白點白塊微爛外面微腫口乾而渴頭部更痛聲破不能言目赤唇焦氣逆喘急氣熱而臭頑痰上湧鼻流鮮血神志煩悶睡寤恍惚神識昏迷面色微黑診斷脈左洪弦右浮數體溫一百零五度此燥疫白喉證也查閱前醫方藥純為表散治風之方反使其毒分竄經絡火勢愈猛血湧於鼻痰阻關竅頓致心神昏聵危在頃刻今所幸者左脈尚存根氣或可救治療法先用仙方活命湯加減取犀角蓮心膽草山梔清君相之火為君石膏知母黃柏平陽明燥熱為臣生地中白銀花白芍甘草涼血養陰和中敗毒為佐元參兜鈴藍根瓜蔞下氣化痰潤肺降逆為使連進三服鼻血止人事醒體熱亦退面唇略潤繼用養陰清肺湯加減連進五服白喉已退咽潤津復略能言語稍進薄粥惟腹中滿脹大便不行診脈左則緩靜有關尺數有力用白虎承氣湯加減推蕩瘀熱二服後瀉下黑燥糞數次眠安食進診脈已緩終用生脈散合白虎湯助氣生津清胃潤燥處方仙方活命湯加減方龍膽草三錢馬兜鈴三錢栝蔞仁五錢元參三錢川黃柏二錢鮮生地八錢板藍根二錢生石膏八錢犀角尖二錢磨沖白芍三錢生甘草一錢焦山梔三錢蓮子心三錢人中白三錢白知母四錢濟銀花三錢煎服次方養陰清肺湯加減方鮮生地六錢麥冬四錢白芍三錢薄荷六分元參三錢丹皮二錢川貝二錢生甘草錢半膽草三錢生石膏五錢研細犀角三錢煎服三方白虎承氣湯加減方芒硝三錢生大黃四錢生石膏四錢研細瓜蔞仁三錢知母四錢鮮生地五錢黑元參四錢煎服四方生脈散合白虎湯方生石膏四錢研細麥冬三錢五味一錢知母四錢西洋參三錢粳米五錢甘草錢半效果五日人事已醒熱退體和白喉已減鼻血亦止十日喉證已除略能言語食量略進二十日病除食進元氣已復廉按此仿張善吾鄭梅澗輩治燥疫白喉之法耐修子白喉抉微一書皆用此等方藥全在臨證者辨明真燥白喉始可仿用否則貽誤反多學者宜注意之燥疫白喉案莊虞卿住麗水第十一中學病者項云禪令郎年五歲體弱住吉祥巷病名燥疫白喉原因素體陰虛肝熱內盛至深秋復感溫燥而發喉證證候初起惡寒發熱滿喉皆粉白音啞鼻塞面青神倦大便溏瀉診斷脈浮無力左關弦數舌紅苔粉白指紋青紫脈症合參此真白喉證也療法治之之法惟有以厚重之藥鎮其上層如巨磚蓋鼎使焰不上騰復以清涼之藥潤其次層如以濕棉御炮使火不內射既鎮且潤火毒自駿馴而下行惟大便泄瀉太甚又宜兼顧脾氣庶無滑脫之虞方用生地玄參丹皮炒芍以清其血分之熱川貝麥冬生草石膏以清其氣分之火加薄荷銀花連翹以消其腫而解其毒粳米以補其脾而挽其瀉白喉兼瀉白喉議原有加藿香砂仁之訓但香砂辛溫利於瀉不利於喉茲易以粳米較用香砂似覺平穩蓋粳米甘涼清熱補脾兩擅其長故也外以瓜霜散加牛黃頻吹以清毒而消腫處方細生地五錢原麥冬三錢炒白芍二錢生粳米一合蘇薄荷一錢烏元參四錢湖丹皮二錢生石膏三錢研細川貝母二錢生甘草一錢每日服兩劑又方西瓜霜一錢飛硃砂三分梅花片一分人中白二分煅西牛黃二分雄黃精三分研細末頻吹喉內白點上效果二日神色明亮白塊束小五日泄瀉亦減七日白點退淨飲食如常十日聲音稍亮再以竹葉石膏北沙參破麥冬生苡仁生甘草川貝母治之兩旬諸恙悉退矣廉按此法治真白喉證感邪已輕內熱尚重者用之惟五歲小孩日服兩劑分量尚嫌太重故善用者斟酌之燥疫白喉案尹小閏住諸城病者李式平忘其年住本鄉病名燥疫白喉原因素稟陰虛染時行燥疫而發患此十餘日自知不起流涕求救證候喉燥純白咳吐黏涎鼻塞頷腫口乾便秘診斷脈緩滑而大舌苔白厚帶灰而糙此伏火內盛燥毒外引釀成時疫白喉也療法用調胃承氣湯以盪滌腸胃宿垢實熱合養陰清肺湯以潤燥活痰佐以郁李淨仁破大腸氣滯使以枳殼直達幽門處方生川軍錢半酒洗元明粉二錢後人生甘草一錢北沙參四錢原麥冬三錢鮮生地五錢粉丹皮三錢京川貝三錢去心蘇薄荷一錢生白芍二錢郁李淨仁二錢生枳殼一錢效果疊進兩劑頭煎便下如膿自覺喉間黏涎劃然而下所患若失而舌苔猶現灰色再進一劑而退繼用前方去硝黃枳殼郁李仁薄荷等五味加元參四錢養陰清肺壯水制火而痊說明此證始於天行盛於傳染凡人鼻氣通天口氣通地溫燥吸入蘊結上中二焦阻其脾胃升降之機濕熱鬱蒸津液不得四布脘悶生涎上蒸華蓋外則頷頤結腫宛如時毒內則盤踞咽喉蒸成濁痰邪無出路愈結愈堅而死亡隨之矣治當以邪從口鼻入者仍驅之從濁竅出其間有表證者乃里氣之滯也邪留於胃裡氣滯表氣因之不通如目痛眉稜骨痛目眶痛鼻於不眠膝眼正面痛此皆邪溢陽明之表所謂里中之表也如腹痛脹悶四肢厥逆或者溏糞下利如爛柿如敗醬如倭瓜藕泥膠滯稠黏至死不結此則里中之裡法宜速用調胃承氣以元明粉易朴硝為之君以酒軍為臣以甘草枳實為佐使急通其里里愈而表自愈至於脈緩滑而大者有之緩洪沉緩抵骨者亦復不少氣道不利故也若必俟洪數勁指十不獲一十餘年來已驗之人歷歷不爽如病人畏忌大黃可用元明粉拌搗瓜蔞每奏奇功初下每如常糞再下則變紅中雜黏液膠滯後復得黃糞為邪盡若紅黑色為未愈仍宜守方下之不變黃不止既變黃又不可不速止此為秘訣廉按時疫白喉之病原在菌而所以失其抵抗病菌之能力致令此菌集結於肺部喉關阻礙人之呼吸生機者皆由肺胃之津液因熏灼而化生黏涎稠痰之過也就余所驗挾外感之風燥者其勢重無外感之風燥者其勢輕此案見其痰涎膠滯上中二焦肺氣因之失降故用大黃元明粉遵內經上病取下之旨因勢利導一鼓廓清使毒有出路仍參以養陰清肺者蓋為素稟陰虛挾有燥熱者而設處方剛中寓柔非確有膽識者不辦案後說明亦有見地溝閱歷有得之言也燥疫白喉案何拯華紹興同善局病者周增福年三十八歲業商住乾溪病名燥疫白喉原因深秋吸受燥氣內伏肺絡而不發至初冬新感暴冷與所伏之燥火互相沖激猝乘喉間清竅而發證候身痛發熱惡寒無汗喉間初發白點繼發白塊咽燥無痰咳則胸痛診斷脈左浮緊右浮數按之反澀舌邊尖紅苔罩白滑此肺經伏燥內發太陽新寒外束也療法吳氏鞠通曰燥氣為病輕則為燥重則為寒化氣為濕復氣為火故先用麻杏為君宣肺氣以達皮毛迅散其外束之新寒臣以甘石石膏為治燥火主藥其氣腥能達表其性涼能清裡凡喉間一見白點白塊此味急不容緩配以炙草之甘緩一以監製麻黃一以濡潤喉關切不可誤於耐修子忌表二字使外寒與內燥互相牽引也佐以生萊菔汁使以鮮枇杷葉者借其辛潤止咳輕清肅肺耳處方麻黃五分光杏仁三錢生萊菔汁兩瓢後煎生石膏五錢研細清炙草五分鮮枇杷葉三大片去毛筋效果連服兩劑頭煎津津微汗而身痛惡寒除惟熱勢大盛喉間發白未退遂去麻黃倍石膏加西洋參二錢元參四錢沖鮮銀花露陳金汁各二兩又用活水蘆筍鮮白茅根各二兩先煎代水連迸三劑白去八九喉中但覺燥痛又加鮮生地汁雅梨汁淡竹瀝各兩大瓢疊服兩劑病遂痊愈廉按凡時疫白喉起於秋冬之間遇有新寒外束者放膽用麻杏甘石湯頗有捷效奈近時病家畏麻黃石膏如虎以致醫不敢用坐失病機良堪太息今援吾友惲鐵樵君以證明之其言曰小女毛頭才六歲呼喉痛視之一邊有白腐如花生仁大其症狀發熱惡寒無汗余於評白喉忌表時即認定此種症狀等於傷寒太陽病惟此病傳變始終不離咽喉且舌絳口渴是溫熱症狀其脈類洪數大都無汗於初起時得汗則喉痛立減此表閉陽郁之證也今不問其喉爛與否僅解其表而清其熱在法當瘥其時已夜三鍾不及買藥姑俟明日乃晨六鍾視之喉間白腐兩邊均有其面積較三鍾前增加一倍病毒進行之迅速良為可驚即以麻杏石甘湯予服而內子見報端廣告有某藥房保喉藥片急足往購每半鍾含藥一片向午汗出傍晚熱退喉間白腐面積縮小作黃色微帶綠其不腐處則作殷紅色痛則大瘥是夜得安寐翌晨霍然余深信麻杏石甘湯之中肯而內子頌保喉藥片之功德不置詎女兒才瘥十二歲之兒子復病病狀盡同余已有把握不復驚惶然頗欲知保喉藥片與麻杏石甘功效孰勝因勿予藥專服保喉藥片越三鍾視之白腐仍增大惟不如不服藥片者之速痛亦不甚劇而壯熱無汗則略不瘥減更進保喉藥片胸悶泛惡不能受矣內子惶急促余予藥余曰君謂藥片佳故余欲一觀其成績也內子怒余以目謂此何等事乃作隔岸觀火態度余乃令屏保喉片弗服更兩鍾喉痛覺增劇乃予麻杏石甘湯喉遂不痛越宿霍然愈矣嗣是每值此證予麻杏石甘無不效者燥疫白喉案何拯單紹興同善局病者趙運發年卅二歲供職他省住紹興昌安門外富陵村病名燥疫白喉原因秋冬之交久晴無雨燥氣流行從口鼻吸入潛伏化火適感風而暴發證候初起頭痛惡風身熱微寒咽乾無痰喉間介介如梗發白如粉皮樣或乾咳或不咳或咽痛或不痛診斷脈右寸浮數按之微澀舌苔薄白而糙此肺病燥火本證也其他肺熱喉病少發白而此獨發白者以實扶的里菌盤踞喉頭乃生假膜其色呆白刮之亦甚堅韌也療法先囑其用白喉血清注射內服喻氏清燥救肺湯加減以色白微苦性清質輕之西洋參色白氣腥味淡性寒之生石膏為君者此二味為清肺經燥火之特效藥臣以桑葉薄荷苦杏甘草取其辛涼而合苦甘也悉遵燥淫於內治以辛涼佐以苦甘之經旨然疫必有菌菌必有毒故佐以金汁銀花露之甘鹹解毒而使以白蛇退者以蛇性喜清潔一染穢氣細菌即褪殼而換新皮取其善退喉間之假膜也處方真西參二錢蘇薄荷錢半光杏仁三錢生甘草八分白蛇退三寸生石膏八錢研細霜桑葉二錢銀花露二兩陳金汁一兩二味同沖效果注射後喉間假膜漸化色轉淡黃繼服湯藥一日二劑諸證輕減三日喉間白腐退淨色轉嫩紅微咳黏痰原方去石膏薄荷杏仁蛇退金汁五味加栝蔞仁四錢京川貝鮮石斛各三錢雅梨汁枇杷葉露各兩瓢連服四劑咳止胃動而痊廉按白喉之證甚多其固不一必喉間發白生假膜成片者乃為真時疫白喉也互相傳染大人易治小兒難療者以小兒在四五歲內咽喉服藥處處不能如法故治之較難也此案探源辨證按經處方從喻氏救肺湯加減不拘於養陰清肺而應效反速者注重於燥火二字耳方中發明蛇退之生理作用及醫治效用語雖新穎卻有理由燥證紅喉轉白案蕭琢如住湘鄉水口山礦局病者李楚枬女年方十歲住湘鄉病名燥證紅喉轉白原因前醫從風毒喉痧治服發散藥米飲不入口已數日矣證候身大熱無汗口渴心煩夜不安枕滿喉發白診斷脈浮大而芤舌無苔鮮紅多刺幸有浮液不甚乾燥余曰此乃燥證誤表挽回甚難療法為疏養陰清肺湯取其潤燥清喉消痰制腐之作用大劑頻服或可挽回處方鮮生地一兩元參八錢原麥冬六錢丹皮四錢生白芍四錢川貝母四錢蘇薄荷二錢半生甘草二錢銀花三錢連翹三錢效果連服三劑次日遍身露紅斑幾無完膚余曰內邪外出此生機也仍守原方大劑加味每日夜盡三劑三日而平復續以養陰方善後聞愈後半月髮膚爪甲盡脫燥證誤表之為害有如此者廉按此血毒喉痧而轉白爛者前醫見其紅喉身大熱無汗用發散透痧藥亦不得競謂其誤表改服大劑養陰清肺湯後次日即遍身露紅斑幾無完膚顯系爛喉丹痧之症狀惟口渴心煩夜不安枕此屬胃熱蒸心由氣分而轉入營分此案養陰清肺湯中薄荷丹皮銀花連翹諸藥辛涼宣通與大隊增液川貝甘芍等一派涼潤之藥並用既能散邪尤能清熱所以服之輒覺捷效也風毒白喉案李倫青住衡陽病者沈筱嵐忘其年住善化病名風毒白喉原因初由大舌邊起白泡數顆醫用元麥赤芍竹葉之類連進三劑一宵忽痰涎上湧精神疲倦惡寒發熱胸結飲食不能下咽延余往治證候喉內白塊已滿色如霜雪痰涎稠黏不斷胸膈痞滿診斷脈兩寸浮弦右關沉緊舌苔白滑此風毒挾寒在表未經宣發誤以寒涼迭進變成壞證也療法用荊防敗毒散以驅表邪吹坎宮回生丹以祛疫毒處方荊芥錢半傷風錢半羌活一錢獨活一錢制殭蠶二錢柴胡一錢前胡錢半枳殼一錢桔梗一錢法半夏二錢銀花錢半粉甘草一錢鮮生薑三片坎宮回生丹已見周案次診次日白塊退淨而胸膈為風痰阻隔食入少頃即吐不能直達中下二焦症類關格其家懼甚復巫醫雜投百計罔效余細察脈證猶屬風痰之毒阻隔與喉無干遂以拔毒及引龍歸海之法始兩耳頸項稍發紅疹再用艾葉皂角白酒炒熱布包熨之隨熨隨發遍體紅疹無間其家以為變證懼之尤甚余曰此佳兆也必欲提毒表出始能開其阻隔次日果胸膈豁然飲食即進隨以人參敗毒散再提表以托毒次方西洋參二錢防風二錢去蘆白芷二錢浙貝二錢去心桔梗三錢銀花三錢白殭蠶三錢薑汁炒鼠黏三錢荊芥一錢人中黃一錢蟬退七隻皂角刺三針平險如意散治一切白喉內外俱腫急症赤小豆四錢大黃四錢芙蓉葉四錢文蛤三錢四季蔥三根鼠黏三錢燕子窩泥五錢共研細末將四季蔥杵汁以陳茶水白酒各半共調和炒微熱敷頸項拔毒外出消腫止痛引龍歸海散治寒證白喉急證本制附片四錢吳茱萸三錢共研細末白酒調作二餅貼兩足心湧泉穴若天氣寒用火微烘庶無根之火浮越於上得此引之而自降亦以類相來之法也效果以人參君主之藥保元鼠黏殭蠶利咽法夏陳皮以消痰飲銀花蟬退以清餘毒連進三劑諸證悉除後用六君八寶以收全功廉按此由喉痧誤用涼遏而喉轉白爛故用內外兼治多方透表以排毒外出可見凡治白爛喉以查析原因辨明證候為首要爰將陸氏辨證法節錄其要以告當世之研究喉疫者陸培初云比年來白爛喉盛行死亡相繼此非不治之症皆由醫家未能辨別病源誤藥所致證分三種一為外感實證表受風溫病在肺病狀惡寒發熱白腐僅在外面浮面多系白點不至成塊舌質赤舌苔薄潤身上或有疹或無疹治宜辛涼解表用前蒡翹貝勃蟬之屬外治用薄荷真青黛硼砂馬牙硝等研末吹之一為內傷虛證陰虧燥熱病亦在肺病狀無寒熱白腐在裡如粉如石灰發呆白色初起成點成塊一二日即黏連成片滿布喉間舌質紅舌苔或白或微黃或無而必燥澀毫無滑膩黏涎治宜涼潤清降用養陰清肺湯之屬外治用金銀花生甘草象牙屑濂珠粉指甲燈心灰等研末吹之一為內傷實證濕熱熏蒸病在胃而襲於肺病狀無寒熱間亦有寒熱者必在午後而熱不揚寒不甚白腐處帶黃明色必黏沫滿喉舌質紅舌苔厚膩黃滑重者口噴穢氣治宜化濕清熱如三仁湯之屬或滑石通草子芩茯苓苡仁金果欖山豆根等外治亦用金果欖山豆根加滑石人中白等研末吹之其辨別全在舌苔之為燥為潤為膩以及平素體質大小二便詳察之三證互誤均能殺人風毒白喉案李倫青住衡陽病者陳漢仙忘其年住長沙病名風毒白喉原因患爛白喉痛數日醫用清潤解毒諸劑而病愈劇已二日余矣其家視變證蜂起倉皇懼甚延余往治證候發熱惡寒痰涎上湧聲如鋸湯水不能下咽視喉內淡紅微腫內關白點已陷小便不通診斷兩手脈弦而緊舌胎白滑此誤以清涼凝閉風寒阻滯經絡使病毒不得外泄遂化生痰涎上湧咽喉恐驟變喉閉急症療法即用坎宮回生丹合開關立效散連吹二三次立刻上下交通飲食即進隨以柴胡飲提已陷之邪二劑諸證悉除後以加減六君子湯調理處方坎宮回生丹已載周案開關立效散治一切白喉牙關緊閉湯水難入等證真雄精一錢北細辛一分真牛黃一錢生牙皂二分真麝香四分蘇薄荷六分去梗大梅片五分除片麝牛黃外共研極細末過絹篩合片麝牛黃再研極細磁瓶收貯蠟封固瓶口勿使泄氣臨時以三四釐吹兩腮內或以少許吹鼻孔立刻開竅柴胡飲川柴胡二錢羌活二錢法半夏二錢制殭蠶二錢桔梗錢半濟銀花錢半淨蟬衣七隻川厚朴五分陳皮一錢粉甘草一錢鮮生薑三片水煎服加減六君子湯西潞黨五錢生白朮三錢東白芍三錢云茯神三錢法半夏二錢白歸身錢半制殭蠶錢半陳皮一錢濟銀花一錢清炙草一錢煨姜三片水煎服效果連服十劑而痊廉按風毒白喉有挾寒挾熱之分挾寒者初起頭癰惡寒身疼發熱滿喉淡紅微腫略癰白腐多見於關外或見於關內形色多明潤而平尚能飲食二便通利脈多浮細而緊舌苔多白滑此風邪尚在表之候也治宜荊防敗毒散加減驅風解毒開痰發表使疫毒從汗排泄則喉病自愈喉如腐爛輕則用玉鑰匙品白金丸頻吹重則用坎宮回生丹即使汗已出透但有一毫惡寒胸悶或身尚作熱苦寒藥仍不得夾雜惟有輕清泄熱以盡餘邪而已必俟皮脫膚涼胸悶全消鼻見清涕而或有裡熱來清及陰虛津虧者方可酌進甘寒之品庶幾無害此案為風毒挾寒之白喉救誤而設尚非初起之正治法若挾熱者更非其治惟用坎宮回生丹合開關立效散連吹喉間卻屬外治急救之要法然就余所見白喉險證壞證牙關緊閉痰涎上湧有不能服藥亦無可吹藥者法宜先開關以掃其痰涎甚則針刺各穴以出惡血通經活絡使立時清醒再行吹藥服藥庶有挽回之希望雖然白喉無論寒熱證如汗出似油者不治失音動痰氣喘者不治目光直視者不治用針無血者不治吹藥無涎者不治吹藥即刻痛止白落過日復患者不治滿喉皆白刮之紫腫帶黑者不治醫者如遇此等證候切勿輕與用藥縱人盡天回其能僥倖於萬一者亦未可知但總不如先事告明之為愈也風火白喉案李倫青住衡陽病者長沙李蘭生夫人忘其年病名風火白喉原因素固血虛肝旺現因風熱傳染而發證候初患喉痛發熱惡寒頭疼心煩口渴便澀鼻出血絲繼見內關白塊兩條腫痛異常湯水難嚥診斷脈左關浮數右寸獨大舌苔邊白中黃此足厥陰風火上衝手太陰而成也療法初用銀翹敗毒散吹離官回生丹以除腫痛次用八物甘桔湯以退白爛終用六味地黃湯加瓜蔞皮鮮茅根育陰柔肝以善後處方銀花三錢荊芥一錢蟬蛻八分牛蒡子二錢西洋參一錢連翹三錢薄荷一錢殭蠶錢半甘中黃一錢川貝母二錢離宮回生丹治熱證白喉及乳蛾喉風等證極效熊膽二錢西洋參二錢硼砂二錢人中黃一錢上青黛五分黃連六分山慈姑一錢兒茶五分真麝香三分蘇薄荷七分大梅冰一錢真牛黃一錢除熊膽牛黃片麝外共研極細末過絹篩合牛黃片麝熊膽如濕潤放銀窩子內微火焙乾再乳精細磁瓶收貯蠟封固瓶口勿使泄氣臨時計每次以三釐用噴藥器吹入白處含噙片時使毒氣隨風涎吐出便立刻回生八物甘桔湯生花草二錢銀花錢半制殭蠶一錢霜桑葉三錢苦桔梗一錢麥冬錢半牛蒡子一錢陳金汁二兩分沖六味地黃湯大熟地四錢淮山藥三錢粉丹皮錢半瓜蔞皮錢半山萸肉錢半雲茯苓二錢福澤瀉一錢鮮茅根一兩效果初用敗毒散及吹喉藥腫痛俱減次用八物甘桔湯白塊退淨諸證悉除終用六味地黃湯加味調養而痊康按時疫白喉雖以白喉桿菌為原因而其發病之誘因或因燥熱或因風火或因虛熱或因陰寒醫者臨證之時必先其所因伏其所主而用藥始能奏效此案系風火白喉所用初中末三方雖亦尋常然足以破白喉忌表之偏見故凡治時疫白喉風寒外束則宜表郁燥化火則宜清風火交扇標本兩急則宜表清雙解且有全系寒鬱則宜用溫劑無非憑證用藥凡與證不對者均所宜忌何獨忌表乎熟玩之自悟其謬伏熱白喉案丁佑之住南通東門病者郭吉人年三十八歲揚州人病名伏熱白喉原因熱邪內蘊上蒸喉白證候寒熱喉痛已有白腐口渴神煩診斷脈象右寸浮數苔黃由熱邪內伏肺經所致療法清熱解毒生津保肺肺經一清喉部自愈再吹錫類散處方黑犀角三分先煎生石膏五錢研細鮮生地四錢天花粉二錢原麥冬二錢京川貝錢半去心淡子芩錢半小川連五分元參心三錢苦桔梗五分生甘草五分效果三劑伏熱肅清喉腐退淨後用清養法調理而痊廉按喉為肺氣管之口肺有伏熱日漸熏灼喉炎起腐病勢進行之常方用涼血解毒清氣化痰以治喉腐之本外吹錫類散以治喉腐之標三劑熱清腐退可為伏熱白喉之適當療法陰寒白喉案蕭瑞器住湘鄉病者周某忘其年住邵陽病名陰寒白喉原因素稟陽虛傳染陰毒而發證候喉間初現白點繼則白塊滿喉飯粒可迸惟飲水及咽津則痛甚身微熱四肢厥逆診斷脈沉緩無神舌苔灰白而滑如結痂狀此即金匱陰毒之為病咽喉痛五日可治七日不可治也療法非助陽不足以破陰故用附姜之辛熱為君佐以炙甘草者甘平以解毒使以童便速驅喉毒從下而泄也處方蜜炙黑附塊三錢川乾薑二錢蜜炙炙甘草一錢童便二大瓢沖效果一劑知二劑已說明家嚴瑞器公自弱冠厭棄科舉究心醫學於傷寒金匱二書確有心得里咸稱頌之前清光緒癸未甲申間吾鄉數十百里內多患陰寒白喉他醫率用表散或清滋十不一治家嚴獨得其秘每用通脈四逆湯奏效甚者方中用生烏附八錢至一兩連服五六劑七八劑而愈同道中莫不駭為奇異一遇上證咸遜謝推薦計當時經手治愈者不下數十百人伯章自行醫以來經驗他種白喉極多獨於以上陰寒劇證未曾一見不審當日何以若此之多而家嚴獨能於仲景傷寒方中探驪得珠宜為同輩所歎服也男伯章敬志廉按陰寒白喉患之者多屬陽虛雖少所見然亦來嘗無其證前清歸安名醫包岩曰白喉混稱也其中有陰虛有陽虛陽虛白喉並不痛癢並不寒熱飲食偶或不利望之不紅不腫證屬陽衰火息非附桂不能療是也但就余在光緒十一年間所見其證有表裡輕重之別一為輕證初起白見於關內或關外色必明潤而平滿喉淡紅微腫略痛頭痛惡寒發熱飲食如常二便和脈多沉緊而弦舌苔白此陰寒尚在表之候也治宜荊防敗毒散加減一為重證一起白見於關內成點成塊或滿喉俱白色如凝膏喉內淡紅微腫時病時止頭項強痛身重惡寒發熱咳嗽結胸聲低痰壅不思飲食目眩倦臥手足逆冷腹痛欲吐脈多沉微欲絕或沉緩無神舌苔白滑而厚此陰寒直入里之候也治宜椒附白通湯加減王氏桂薑湯亦可酌用紫猺桂黑炮薑炙甘草各五分共歸碗內取滾水衝入仍將碗燉於滾水掉藥含口慢慢嚥下頗效若證在疑似之間先用生川附切片塗白蜜火炙透黑取如細粞一粒口含咽津如咽喉癰減輕然後再用湯藥較為穩健此案初起即用通脈四逆湯非辨證精確膽識兼全者不辦陰寒白喉案李倫青住衡陽病者周定安夫人忘其年往常寧病名陰寒白喉原因病已數日雜證多端尚不知為白喉因不甚痛故也一日偶言喉痛始延余往治證候頭痛項強身重惡寒咳嗽痰壅肢冷腹痛視內關白塊兩條色如凝膏診斷脈沉細弦緊舌苔白厚而滑余曰此陰寒白喉也幸而未服涼劑猶可以治療法先用薑桂二陳湯以破陰通陽順氣開痰繼以壯陽溫胃湯散其寒凝去其陰毒外治吹坎宮回生丹處方生薑汁十滴沖姜半夏三錢浙茯苓六錢制殭蠶二錢青化桂五分炒廣皮錢半粉甘草一錢春砂仁一錢接方姜半夏三錢制附片三錢麗參條五錢制殭蠶三錢炒廣皮一錢黑炮姜一錢粉甘草一錢炒銀花錢半坎宮回生丹治寒疫白喉及乳蛾喉風等證真血竭一錢大梅片四分生附片一錢炙焦制牙皂二分鬱金一錢真雄精二錢真麝香六分北細辛一分飛月石一錢上藥除片麝外共研極細末過絹篩合片麝再乳精細磁瓶收貯蠟封固瓶口勿使泄氣臨時計每次以三釐對摻艮宮除害丹一釐用銅風鼓吹入白處含噙片時使毒氣隨風涎吐出便立刻回生艮宮除害丹專治一切白喉證真珍珠三錢放水豆腐上蒸三尺香久地蝨婆放銀窩內微火焙焦二釐真琥珀三錢真瑪瑙三錢入沙壇內火煅七尺香久手指甲瓦焙焦五分真麝香五分真珊瑚三錢人沙壇內火煅七尺香久蚯蚓瓦焙枯六分大梅片六分真辰砂三錢水飛蠶繭七隻燒灰存性蘇馬勃三釐共研極細末過絹篩再精細磁瓶收貯蠟封固瓶口勿使泄氣辨寒熱證臨時對用效果服初方二劑白塊減半惟痰嗽肢冷不減腹仍冷痛繼服接方三劑諸證皆痊廉按時疫白喉雖屬燥熱證多陰寒證少其間寒熱二證判若冰炭臨證時若不詳審殺人易如反掌且每見白喉之死死於熱證者少死於寒證者多大抵人知有熱證而不知有寒證皆誤於疫之一字也即以疫論豈皆染熱疫獨不染寒疫乎況其病多見於黃河以北諸省之天氣寒冷地方發生於冬令之時為多茲特約選蕭李二家驗案二則以破世俗之迷信白喉挾微一書者虛火白喉案張錫純住天津病者孫傳九年二十歲貴州人高等師範學生病名虛火白喉原因得白喉症屢經醫治不外忌表抉微諸方加減病日增重醫者諉謂不治始延愚為診視證候喉關純白黏涎甚多須臾滿口即得吐出診斷脈細弱而數舌胖嫩淡紅知系脾腎兩虛腎虛氣化不攝則陰火上逆痰水上泛而脾土虛損又不能制之故其咽喉腫疼黏涎若是之多也療法投以六味地黃湯滋補脾腎以清虛火又加於術少加蘇子制痰水上泛處方大熟地六錢淮山藥四錢生打山萸肉二錢雲茯苓三錢粉丹皮錢半福澤瀉錢半生於術錢半蘇子八分效果連服十劑而痊廉按此為牌腎雙補之和劑妙在加蘇子一味不但能治痰水上泛且能降陰火上逆十劑而痊信然張君平時最喜用熟地嘗用六味地黃丸作湯加川芎知母以治如破之頭疼加膽草青黛以治非常之眩暈加五味枸杞柏子仁以斂散大之瞳子且信其煎汁數碗浩蕩飲之之說用熟地四兩茯苓一兩以止下焦不固之滑瀉用熟地四兩白芍一兩以通陰虛不利之小便又嘗於一日之中用熟地斤許治外感大病之後忽然喘逆脈散亂欲脫之險證且不獨治內傷也又嘗用熟地阿膠大滋真陰之類治溫病脈陽浮而陰不應不能作汗一日連服兩劑濟陰以應其陽使之自汗可謂深悉熟地之醫治作用矣虛火白喉案袁桂生住鎮江京口病者劉子衡令堂年六十三歲住本鎮病名虛火白喉原因今年夏間因孫兒病逝悲哭太過遂患喉症延予治之予視其發白如霜證候咽喉兩旁滿布白腐以毛筆蘸水拭之則依然鮮紅之好肉並不潰爛煩躁不寧徹夜不寐診斷脈息虛軟舌紅如朱中間略有薄苔蓋勞神太過虛火上升心腎不能相交水火不能既濟之病也而況守節四十年持齋二十載其精血之衰腦力之耗為何如耶療法與增液湯加味乾地黃五錢原麥冬三錢元參三錢朱拌茯神三錢西洋參二錢鮮石斛三錢棗仁三錢蘇百合三錢效果一服煩躁定能安睡接服四劑痊愈廉按白喉普通病名也悲哭太過激動虛火病固也方用增液湯加味滋陰清火看似對症療法實則為原因療法之一種深得先其所因伏其所主之經旨白喉並病案何拯華紹興同善局病者張明仙年念六歲業商住水溝營病名白喉並病原因白喉雖由肺經伏燥今則挾君相火而發證候初起頭痛身熱口乾咽燥喉旁發白中間紅腫而痛甚則腮頸亦腫咳逆痰多胸悶心煩不寐昏譫診斷脈右滑數左關浮弦搏數舌根微硬中紫尖絳此燥熱合君相火併發乃肺心膽三經並病遂明告之曰其來勢之猛烈壽可立傾勿謂言之不預也療法外內並治先於喉間紅腫處用喉刀刺出惡血以殺其勢繼則三經藥並用故以葉氏犀角地黃湯加桑丹為君瀉心膽以清營白虎湯去草米加蔞貝為臣滌熱痰以清氣佐以大青地丁金汁涼解血毒使以萊菔青果既清燥火之閉郁亦開痰涎之停留也處方磨犀粉錢半藥湯調下鮮生地一兩銀花三錢青連翹四錢鮮桑芽五錢粉丹皮二錢生石膏一兩研細肥知母四錢栝蔞仁五錢杵京川貝四錢去心鮮大青五錢紫花地丁四錢陳金汁二兩分沖先用生萊菔四兩切片鮮青果兩枚切去頭尾劈煎湯代水效果一日連進兩劑一劑而諸證略減再劑而痰火漸清原方略減用量去犀角青果加生玳瑁四錢淡海蜇四兩同生萊菔先煎代水又進兩劑便暢熱退神清譫除改用吳氏五汁飲加減鮮生地汁甜梨汁生藕汁解暈草根汁青蔗漿調理以善其後廉按凡燥疫白喉其發白或點或片或塊色如雞脂或發熱後數日始見或一起即白喉滿布其來勢雖各有輕重而其為肺經燥毒則一其間如有紅腫者或紫而癰甚者挾有心經君火膽經相火相助為虐也若火毒盛極喉間紫脹甚則兩頤項背俱腫者乃三經並病危在頃刻之喉痹急症也往往朝發夕死夕發朝死急急刺出惡血以泄其氣用杜牛膝汁漱喉以湧吐其痰然後用重劑急灌庶可轉危為安此案確係燥火白喉之三經並病治雖急救得法藥亦大劑頻服然就余所見間亦有不效者白喉壞證案何拯華紹興同善局病者駱開明年念五歲住駱家葑病名白喉壞證原因病本燥疫白喉前醫誤認為風毒喉痧用荊防葛根湯大劑透發而劇變證候初起身熱自汗咽燥無痰喉間發白塊七八日後忽白塊自落音啞氣喘痰聲漉漉勢如潮湧診斷脈右浮大滑搏左反細數舌絳且干此由燥火過盛肺液將涸反用大劑辛燥升散遂致激動肝風沖氣挾龍雷之火隨腎水而上逆壅聚於喉嚨之間悉化為痰余遂曉之曰病不可為無藥可救奈病家再四哀求不得不於百無一活之中籌萬有一生之策療法潛鎮攝納為首要先用羚角西參淡秋石煎湯調下真猴棗以消息之幸而藥能下咽痰氣稍平於是重用龜板牡蠣珍珠母玳瑁等得至靜之精介以潛陽為君冬地西參專保肺液膠芍玄參兼導龍雷為臣佐以金汁水清咽潤喉載引諸藥以下行使以熟地露滋腎救肺增陰液而不滯仍用猴棗鎮納沖氣以墜上壅之熱痰也處方羚角片一錢先煎西洋參一錢淡秋石五分真猴棗三分藥湯調下接方珍珠母一兩生打左牡蠣八錢生打提麥冬四錢玄參八錢生白芍六錢龜甲心六錢生打生玳瑁四錢剪細大生地一兩西洋參三錢真陳阿膠二錢烊沖陳金汁二兩沖猴棗三分藥湯化下熟地露二十兩代水煎藥效果日服接方兩劑一劑而喘促稍安再劑而痰聲如失原方酌減用量去金汁猴棗加鮮石斛四錢甘蔗漿甜梨汁各兩瓢同沖連服四劑聲音清亮胃納稀飯競僥倖而得奏全功廉按此為白喉極重之危候妙在首先用具有靈性善能熄風之羚角而猴棗墜痰尤為神應其色青黑與肝腎二臟相合故能攝納龍雷之火故閉證之痰熱上塞得之足以泄降即脫證之虛痰上壅亦可惜以攝納並不慮其鎮墜之猛故一服後即痰氣稍平接方用大劑潛鎮攝納又是必不可緩之要藥以平其逆湧之勢鎮其龍雷之動一日疊進兩劑亦屬急證急治之方策似此危證幸奏全功堪為遇此疑難大證者別開益智之粽新增續命之湯也白喉兼瀉案蕭琢如住湘鄉水口山礦局病者舍弟蕭璋如住湘鄉病名白喉兼瀉原因秋抄感溫燥而發證候身無寒熱口不渴滿喉發白又兼泄瀉小便時清時濁診斷脈浮澀滿指舌苔淡白而薄底面微露鮮紅色審由燥氣所發因兼泄瀉始尚猶豫繼乃恍然大悟曰此肺移熱於大腸病邪自尋去路也療法即疏喻氏清燥救肺湯取其寒以制熱潤而滋燥為深秋燥熱傷肺之主方處方霜桑葉三錢北沙參三錢原麥冬錢半生石膏二錢生甘草七分陳阿膠八分烊沖黑芝麻一錢炒甜杏仁一錢枇杷葉露一兩沖效果一劑知再劑已廉按喻氏宗繆仲醇甘涼滋潤之法制出此方名曰清燥實以滋水即易所謂潤萬物者莫潤乎水是也名曰救肺實以補胃以胃液為肺津之母也此案借治白喉兼瀉雖不脫養陰清肺之法而其妙在煅石膏一味石膏經煅味淡微咸西醫推為鹽類利尿藥尿利則腸中水分從小便排泄不止瀉而其瀉自止況煅過石質堅凝又有堅腸之作用蕭君可謂善用鹹方矣瀉轉白喉案蕭琢如住湘鄉水口山礦局病者工人王某年近三十住湘鄉病名瀉轉白喉原因初患秋燥泄瀉日數十行醫以表散溫燥藥進瀉略減而咽喉痛雜見白點證候身大熱汗出遍體紅斑咳痰中帶鮮血口乾不甚喜飲小溲短赤而數診斷年未三十兩人掖而求診脈浮數而促舌鮮紅多刺苔微黃余曰此乃秋燥證泄瀉者肺熱移於大腸臟邪傳腑自尋出路正是佳兆乃反其道以行之幸泄未全止治節之權尚存一線而喉關見白而痛咳嗽帶血則肺金受傷已非淺鮮及今圖治或可挽救療法與大劑養陰清肺湯加石膏知母清胃燥以救肺保肺液以制腐處方鮮生地一兩烏元參八錢原麥冬六錢生白芍四錢丹皮四錢川貝母四錢蘇薄荷錢半生甘草二錢生石膏六錢知母四錢效果連進三帖症減大半嗣就原方加減又十餘帖始獲痊愈康按此因秋燥傷肺肺移熱於大腸故作瀉若仿喻西昌秋燥泄瀉例治二三劑即可奏功前醫不知燥氣病理率用表散溫燥勢必升騰燥熱則火焰愈熾傷津劫血以致喉痛白爛咳痰帶血幸而不激動肝風發為痙厥又未至音啞氣喘肺炎葉腐猶可用大劑養陰清肺湯加膏知以救藥誤否則殆矣就余所見此係伏暑內發秋燥外搏因誤藥而轉變白喉非真時行之義膜白喉也
