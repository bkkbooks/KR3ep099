body:
  text: 第七卷時行溫疫病案溫毒發斑案曾月根住五華周潭病者張少卿年二十二歲法政學生住廣東五華大田病名溫毒發斑原因感染溫毒時行而發證候面赤唇紅一身手足壯熱血毒外漬神煩而躁發出紅斑診斷六脈洪大右甚於左舌鮮紅陽明血熱無疑血為陰氣為陽陽盛則爍血血熱則發斑矣療法涼血解毒以泄絡熱故以生地犀角之大寒為君以清君火佐以芍藥丹皮之微寒以平相火火熄則斑黃陽毒皆淨盡矣處方鮮生地一兩犀角尖二錢赤芍藥六錢丹皮二錢五分效果一服熱清斑透繼用清養法調理而痊廉按溫毒發斑犀角地黃湯卻是正治故千金古方平時不可不研究也溫疫發斑案胡劍華住景德鎮畢家同病者孫雲山年三十一歲醬園匱員住景德鎮病名溫疫發斑原因夏曆八月斑症流行平素嗜酒起居不慎故易於傳染證候面部浮腫四肢酥麻惡寒發熱脊強無汗口渴嗜茶腹內不安薦骨痛甚斑發隱隱診斷舌根淡黃少津脈浮而數浮為外越之象數主高熱之徵脈證合參斷為陽明熱鬱發斑之候療法斑宜外達必汗先泄而斑隨之出故用麻杏甘石湯鼓其外出仍慮力薄復加防風獨活助其發汗排泄之力也處方淨麻黃八分防風一錢生甘草六分生石膏八錢獨活八分苦杏仁二錢效果服一劑汗出而寒熱退二劑身癢斑出三劑薦骨痛止四劑痊愈康按麻杏甘石湯開表清裡卻為透發斑疹之良劑惟時當夏月麻黃宜易香薷李氏時珍所謂夏月之用香薷猶冬月之用麻黃也仿其法勿執其藥是亦化而裁之之妙用歟溫疫內陷證案陳務齋住梧州四方井街病者陳梁氏年二十五歲廣西容縣住鄉體壯農業病名溫疫內陷原因素因食物不節消化不良宿滯化熱誘因溫疫流行傳染菌毒而發又因藥誤而內陷證候初起惡寒發熱頭痛項強腰脊疼脹肢倦口渴由午至酉起立即僕不省人事牙關緊閉肢冷至肘脘腹灼熱氣粗喘急唇縮而焦齒黑而干目赤面青經晝夜不醒診斷左右脈伏舌紫而苔罩白膩體溫達一百零四度此吳又可所謂體厥脈厥也由疫毒將發新涼外束伏邪欲達而不能遽達遂致脈伏不見熱極而厥厥深熱亦深故前醫疊用辛散通關方法竟一晝夜不放病勢甚凶危在頃刻惟脈伏多系實症雖見昏厥開達得法或可挽救於什一療法初用竹瀝合童便重加紫雪一錢頻頻灌下以豁痰宣竅清熱降火服後神識略醒再用劉氏雙解散去防朮芎歸芍等加紅花中白牙皂磨犀取荊薄麻黃速解肌表以辛散外寒犀角翹梔速透上焦以清宣裡熱硝黃芩膏蕩滌腸胃以涼瀉伏火然病至內陷昏厥必有有形之痰火瘀熱蒙閉心與腦神氣出入之清竅故用牙皂桔梗以開痰紅花中白以滌瘀君臣佐既經配合而使以益元散者解熱毒以調和諸藥也一服後則肢表厥減面唇略潤診脈略見沉弦數再二服後人事略醒牙關緩軟四肢厥除惟手足麻攣口甚燥渴體中發熱心常驚悸起臥無常診脈起而洪弦數又用犀羚鉤藤湯加人中白取其直清心肝瀉火熄風泄熱通絡化痰利水一服後熱退體和肢表麻攣已除惟咽乾口渴煩躁不眠診脈弦數略減又用人參白虎合犀角地黃湯雙清氣血兩燔潤津燥以救陰液處方防風通聖散加減方荊芥穗一錢蘇薄荷一錢帶節麻黃三分生大黃四錢生山梔三錢犀角尖二錢磨沖淨朴硝三錢沖益元散三錢包煎西紅花二錢人中白二錢生石膏六錢研細青連翹四錢青子芩三錢小牙皂一錢津桔梗一錢次方犀羚鉤藤湯加人中白方犀角尖一錢磨沖羚羊角二錢先煎鉤藤鉤五錢人中白三錢牙皂角一錢生石膏六錢知母三錢蓮子心四錢川木瓜三錢龍膽草二錢淮木通二錢三方人參白虎合犀角地黃湯西洋參三錢生石膏三錢肥知母四錢粉甘草一錢陳粳米六錢黑犀角三錢鮮生地四錢生赤芍三錢牡丹皮錢半煎服效果五日牙關不閉四肢厥除人事已醒十日熱退體和食量略進二十日煩躁已除食量大進元氣回覆而痊廉按凡疫病目赤面青昏厥如尸四肢逆冷六脈沉伏者此為悶疫悶疫者疫毒深伏於內而不能發越於外也漸伏漸深入臟而死不俟終日也至於急救之法先刺少商中衝曲池委中等穴以宣泄其血毒再灌以紫雪合玉樞丹清透伏邪使其外達或可挽回此案方法大旨近是惟少一刺法則未免缺點矣溫疫閉證案丁佑之住南通東門病者趙大興年四十二歲商界住縣城病名溫疫閉證原因疫毒內伏血分證候面色清淡四肢逆冷嘔瀉兼作昏聵如迷診斷六脈細數沉伏舌色紫赤良由熱伏於內而不發露於外漸伏漸深入臟即死不俟終日此溫疫之最烈者療法宜內外兼治先刺曲池委中以泄營分之毒再以紫雪清透伏邪使其外越處方紫雪丹五分新汲水調下效果一劑知二劑效如斯大症不十日而痊後治多人均應手而愈雖不敢誇驗案然亦不敢自祕廉按仿孟英治悶疫例卻是救急之捷法妙在先用刺法放血使疫毒從血分排泄然後用紫雪使穿經入臟之疫毒從內達外而消解故其效如神溫疫昏厥案薑德清住平度北七里河病者官忠學年五十歲住平度城北花園病名溫疫昏厥原因辛酉年八月染疫前醫疊次攻下面無效證候初起惡寒頭痛四肢痠疼疊經誤治遂致舌脹滿口不能言語昏不識人呼之不應小便自遺便閉旬余大小腹脹按之板硬診斷六脈洪大齒垢紫如干漆脈證合參此極重之溫疫昏厥也醫者不明病源發表數次大耗其液溫補藥多更助其火火熾液傷上蒸心腦下爍胃腸病之所以釀成壞象也療法湯丸並進因重用生石膏直清陽明使其敷布十二經退其淫熱為君犀角川連黃芩連翹泄心肺之火為臣元參生地知母抑陽扶陰泄其亢甚之火而救欲絶之水為佐丹皮赤芍梔子泄肝經之火為使令其先用利便糖衣丸五粒接服萆麻油一兩服後約一時許大便自下大小腹俱軟速迸湯藥兩劑頭煎調服安宮牛黃丸兩顆處方生石膏八兩研細真犀角四錢小川連四錢黃芩四錢青連翹三錢元參一兩鮮生地一兩知母八錢丹皮三錢赤芍三錢焦梔子三錢生緑豆二兩鮮竹葉五錢煎湯代水安宮牛黃丸方犀角末一兩小川連一兩黃芩一兩焦梔子一兩廣鬱金一兩生打明雄黃一兩飛辰砂一兩珍珠五錢臺麝香二錢半真冰片二錢半共為細末煉蜜為丸赤金為衣每丸重三分金銀花薄荷煎水送次診六脈和而略大齒垢淨盡舌尚干能言語惟昏譫未淨除是餘熱未清原方減其用量再進兩服間用安宮牛黃丸一顆藥湯調服次方生石膏四兩研細真犀角二錢小川連二錢黃芩二錢青連翹三錢元參六錢鮮生地八錢知母六錢粉丹皮三錢赤芍二錢焦吐梔三錢生緑豆一兩鮮竹葉三錢安宮牛黃丸一顆研細藥湯調服三診六脈和平舌苔退而微干時有錯語仿增液湯意令其連進兩劑間用萬氏牛黃丸一顆藥湯調下三方仿增液湯意生石膏二兩研細細生地八錢知母六錢連心麥冬四錢萬氏牛黃丸一顆研細藥湯調下萬氏牛黃丸方西牛黃五分小川連一兩黃芩二錢廣鬱金四錢生山梔六錢飛辰砂三錢共為細末神麯糊丸效果八日即能起坐旬余胃健而愈廉按病則溫疫昏厥藥則中西並進方則從余氏師愚吳氏鞠通兩家擇用清矯雄健卓爾不群真膽識兼全之驗案也時疫溫毒案鍾翊乾住瑞安鮑田病者戴女年十五歲住清泰鄉病名時疫溫毒原因冬寒潛伏膜原至首夏外感時毒而發證候身熱口渴兩足痠痛不能起立神昏譫語面青晦濁診斷脈沉細似伏由病機遏不能達故陽症而見陰脈劉河間所謂蓄熱內甚脈道不利反致沉細欲絶也療法泄熱解毒以兩石芩連山梔為君銀花連翹為臣但清涼無滌穢之功故佐以玉樞丹芳香闢穢陳金汁以濁泄濁使以茹絡冬藤疏通脈絡處方生石膏五錢研細飛滑石四錢包煎焦山梔二錢銀花三錢連翹三錢淡黃芩錢半酒炒小川連四分酒炒淡竹茹三錢絲瓜絡三錢金汁一兩沖鮮忍冬藤四錢王樞丹五粒研細藥湯調下效果初方連服二劑足痛瘥譫語減於原方減石膏金汁加番瀉葉錢半人中黃二錢板藍根二錢服後便溏色黑如醬頭面反腫口不能開咽微痛又將番瀉葉加足三錢鮮大青葉五錢鮮生地六錢金果欖二錢服後再解黑溏糞頗多夾有燥矢病遂愈廉按斷語引證確鑿處方清芬靈通妙在玉樞丹善解溫毒惟人中黃一味不如仍用金汁為是時疫溫毒案陳在山住遼陽咸春堂病者郭麟閣之子年二十三歲住奉大牛莊城病名時疫溫毒原因素多嗜欲體瘦陰虛外感時毒而發病證候咽喉驟然腫痛氣喘聲啞舌黃口渴皮膚熱頭項痛心煩譫語小水黃澀大便燥結診斷脈沉細數證與脈不相符者由素嗜煙色之人津虧血燥龍雷之火動於內溫熱之邪襲於外內外交迫表裡不通故脈現似陰非陰理應舍脈從證不必為脈理所泥也療法重用鮮生地救陰涼血為君花粉石膏生津止渴為臣犀角薄荷雙花解毒退熱為佐枳殼蔞仁通暢氣分為使加山豆根牛蒡子清咽利膈解毒散熱滑石竹葉滲利水道引熱下行處方鮮生地八錢生石膏一兩天花粉四錢二寶花三錢牛蒡子三錢枳殼二錢山豆根二錢薄荷葉一錢黑犀角一錢栝蔞仁四錢淡竹葉錢半又方鮮生地五錢生石膏六錢天花粉二錢二寶花二錢生枳殼一錢廣犀角八分滑石粉三錢包煎淡竹葉錢半陳金汁二兩沖效果服前方一帖表熱解而咽喉清稍進飲食惟內熱未退又服後方兩帖大便一次熱退身涼終以養陰健胃法而愈廉按溫毒較溫病尤重自以清解血毒宣暢氣機為第一要義方亦宗此立法當然有效診斷時合脈從證確有見地蓋溫毒溫熱不比內傷雜症往往脈難全恃必須詳審舌苔按其胸腹詰其二便匯而參之庶可得其真諦也溫毒發頤案嚴紹岐住紹興昌安門外官塘橋病者張三義年二十五歲住塘灣病名溫毒發頤原因暮春病溫憾染時毒病經五日由於失下證候耳下兩頤腫硬且痛連面皆腫喉赤腫疼壯熱口渴便閉四日診斷脈數且大按之浮沉俱盛舌苔黃厚脈證合參此由溫熱時毒挾少陽相火陽明燥火勢如燎原而上攻劉松峰説疫所謂疙瘩瘟也療法內外並治外敷三黃二香合水仙膏內服普濟消毒飲加減使在上焦之溫毒疏而逐之在中焦之溫毒攻而逐之皆速為消解之意恐緩則成膿而為害處方蘇薄荷錢半牛蒡子二錢杵濟銀花三錢青連翹三錢鮮大青五錢粉重樓二錢元參三錢白芷一錢生川軍三錢酒洗陳金汁二兩分沖漏蘆錢半鮮荷錢一枚外治方三黃二香散川黃連一兩川黃柏一兩生大黃一兩明乳香五錢淨沒藥五錢上為極細末初用細茶汁調敷干則易之繼則用香油調敷水仙膏方水仙花根不拘多少剝去老赤皮與根鬚入石臼搗如膏敷腫處中留一孔出熱氣干則易之以肌膚上生黍米大小黃瘡為度效果連服兩頭煎不應原方生川軍改為五錢又加元明精三錢瀉血兩次諸症大減惟口渴引飲小便不通改用白虎湯生石膏八錢知母四錢生甘細梢八分去粳米加瓜蔞皮五錢鮮車前草二兩鮮茅根二兩鮮荸薺草一兩小溲如注而諸症遂解廉按吾國所謂溫毒發頤即西醫所謂耳下腺炎也東垣普濟消毒飲加減確是對之良方直至三頭煎始大瀉血而毒解可見消解時毒總以速清血毒為首要西醫疊次注射清血針良有以也溫毒喉癰案袁桂生住鎮江京口病者張文卿夫人年三十歲住本鎮病名溫毒喉癰原因吸受溫毒因循失治或誤治而致劇於五月初十日始來求診證候咽喉兩旁腫塞湯水不能下咽雖口津亦不能咽脹塞非常口有穢氣兩旁既腫塞而其下復潰爛身熱口渴診斷脈息滑數有力舌苔白膩蓋溫毒痰熱蓄積上焦汙血壅阻而成喉癰治不得法致腫勢日盛將成喉閉而死矣療法救急之法當先放血以開其閉否則牙關拘急口不能張呼吸閉塞神丹莫救矣乃以刀刺喉內腫處出紫黑血塊甚多蓋皆毒血也隨之蓬萊雪吹之處方金銀花三錢紫花地丁三錢淡黃芩三錢川貝母三錢栝蔞皮三錢金果欖三錢鮮生地八錢乾生地四錢小川連八分廣橘皮一錢另加雅梨汁一酒鍾和服次診下午復診喉內見黏有稠膿乃以毛筆蘸水洗滌洗出稠膿甚多喉腫覺鬆復於兩臂曲池穴針刺出血以分毒血上行之勢仍以原方再進一劑明日大雨傾盆未及來診三診第三日來復診則熱全退喉腫大消能進薄粥兩碗舌苔亦退又得大便脈息亦轉軟滑矣三方金銀花三錢川貝母三錢天花粉三錢生苡仁三錢浙茯苓三錢佩蘭葉一錢乾生地三錢元參二錢原麥冬二錢效果接服二劑痊愈説明凡喉癰腫勢過甚者皆由汙血為患急宜刀刺放血萬萬不可姑息也康按喉風不吐痰喉癰不放血皆非其治也然其間有必須刺者有不必刺者沙耀宗經驗方治云咽喉痛腫者紫豔未潰或已潰而未深而項外漫腫堅硬痰氣壅閉湯水難容者急用喉針在喉之兩旁高腫處刺入分許二三下咯去紫黑毒血隨時吹藥大致大潰或用衣針刺兩手大指內側爪甲根分許即少商穴也刺入分許擠盡紫血泄肺經熱毒然喉爛可進湯水或色淡不豔潰爛過深者皆不必刺脈細神昏毒已內陷者亦不必刺此案內外兼治競收全功者由開刀放血之效力也故專門喉科者必先熟悉外治諸法試為節述其要一要備撑嘴鉗凡牙關緊閉之時若用金鐵之器硬撬其口必傷其齒用烏梅冰片搽擦之法若又不開則必用撑嘴鉗緩緩撑開其口牙環寬而齒不受傷最為靈妙二要備壓舌片凡看喉之際將舌壓住則喉關內容之形色一目瞭然三要備杏仁核彎刀凡杏仁核腫大勢必漲塞喉關藥食難下必用彎刀於杏仁核上放出膿血則喉關寬而藥食可下且無誤傷蒂丁之弊較喉槍喉刀尤為便利四要備照喉鏡察看喉關之內容能隱微畢顯以補助目力所不及五要備皮膚針以便射入血清急解喉痧之毒微生物奏功最捷此名血清療法凡治喉痧初起歷試輒驗六要提疱以泄毒用異功散斑蝥四錢去翅足糯米炒黃去米不用血竭沒藥乳香全蠍玄參各六分麝香冰片各三分共研細末如蠶豆大放膏藥上貼患處喉處兩旁一周時起疱夏日貼二三時即能起疱不必久貼起疱後速即挑破擠出黃水倘紫色或深黃色宜用藥貼於疱之左右仍照前挑看以出淡黃水為度再用大蒜頭搗爛如蠶豆大敷經渠穴在大指下手腕處寸口動脈陷中男左女右用規殼蓋上扎住數時起疱挑破揩乾以去毒氣七要漱喉以去毒涎取鮮土牛膝根葉搗汁一碗重湯燉溫不時漱喉漱畢即低頭流去毒涎再漱再流須耐心流十餘次毒涎方淨此品為治喉聖藥善能消腫散血止癰化痰無論何種喉證用之皆效以其能去風痰毒涎也凡喉證以去風痰毒涎為第一要義倘紅腫白腐用紫金錠三錢熱水沖化俟冷含漱患處吐出再含再漱此法不獨能去喉腐且能導吐風痰八要吹鼻以通氣吐痰凡喉痧肺氣無不窒塞首用吹鼻一字散豬牙皂七錢雄黃二錢生硯藜蘆各一錢蠍尾七枚共為細末吹少許入鼻孔即噴嚏出而吐毒痰若鼻塞喉閉必用喉閉塞鼻棗蟾酥七分細辛四分辰砂三分麝香二分五釐冰片二分五釐豬牙皂四分半夏三分辛夷四分巴豆四分去油牛黃二分雄黃四分研極細末用紅棗切破一頭去核將藥少許納入棗內用線扎封棗口左癰塞右鼻右痛塞左鼻若小孩鼻小棗不能塞或用棉花包藥扎塞亦可但不能令藥靠肉以免腫疱之患若喉閉勢重者用兩棗將兩鼻齊塞治喉痧喉閉氣息不通命在垂危者有起死回生之功較之用臥龍丹紫金丹開關各法不能得嚏百無一生者不若此棗一塞痰氣漸鬆人事轉醒洵多神效也九要吹喉以解毒去腐退炎止癰首用爛喉去腐藥用杜牛膝根葉汁之曬乾淨末一兩蘇薄荷末五分浣花青黛五分梅花冰片三分共研勻磁瓶密藏不可泄氣受潮如潮但可曬乾再研不可火烘以流去毒涎接吹錫類散象牙屑焙珍珠粉各三分飛青黛六分梅花冰片三釐壁蟢窠二十枚牆上者挂西牛黃人指甲焙各五釐將各焙黃之藥置地上出火氣研極細粉密裝於磁瓶內勿使泄氣專治爛喉時症及乳蛾牙疳口舌腐爛凡屬外淫為患諸藥不效者吹入患處瀕死可活以去腐止爛末用珠黃散珍珠粉六分西牛黃三分京川貝煅龍骨各四分煅青果核三枚共研細末磁瓶密藏以清餘毒而生肌十要刮後頸以散毒於頸窩處搽真薄荷油少許用錢一文如刮痧樣往下順刮須千餘刮顯出塊點用磁片鋒刺破即以蜞口吮出惡血無蜞時則用小吸氣筒以吸出之散毒最為神效此治喉痧喉痹喉癰喉蛾及各種風火喉證之第一妙法也溫毒牙疳案楊孕靈住泰縣病者朱姓年約二旬業商住泰縣婁莊病名溫毒牙疳原因溫病月餘熱毒未淨雜進食物厚味挾熱毒熏蒸脾胃而成證候牙齦腫痛潰爛流血色黑味臭齒搖身熱診斷脈兩手浮數寸關尤甚舌苔厚膩而灰此溫毒病變之走馬牙疳證也牙疳而名之走馬言患之迅速也療法內服外搽漱口之藥並用內服則用石膏知母石斛山梔清熱為君然不滋陰無以清熱又用地黃元參白芍人中白為臣少加銀胡桔梗升麻引經為佐用鮮蘆芽竹葉為使外搽之藥乃以赤砒大棗人中白冰片又漱口之方用白芷細辛烏附尖蒲黃者取其引熱邪外達也每日煎藥兩劑日夜搽藥八九次漱口均在搽藥之前施之處方生石膏八錢研細鮮石斛三錢知母四錢生山梔三錢人中白錢半銀胡二錢生杭芍三錢苦桔梗六分升麻五分鮮蘆芽八寸鮮淡竹葉二十片漱口方香白芷一錢北細辛一錢烏附尖一錢生蒲黃二錢外搽方赤砒霜一兩人中白二兩真冰冰片一錢大黑棗五十枚黑棗五十枚去核將赤砒一兩勻為五十份安放於棗內以線扎之置炭火上煅煉俟出盡白煙成炭形為度取起為末後入漂煅之人中白真冰片共研為極細末磁瓶收貯以備外搽搽時用毛筆蘸藥輕輕拍在患處效果一二日腐脫臭少三四日肉紅熱清旬日則齒固肉生矣廉按溫毒牙疳雖挾積熱而變然亦急症治稍因循則齒牙盡落外治砒棗散確係對症驗方內服大劑清胃消疳方亦切病可加胡連貫衆則殺蟲蝕之力量更足矣秋瘟痙厥案薑德清住平度北七里河病者張成文年六十歲住公沙屯病名秋瘟痙厥原因癸亥年八月抄天時火熱秋瘟盛行初染不以為病後至九月中旬而發病證候初起惡寒頭痛周身拘攣項脊俱強陡變痙厥牙關緊閉診斷六脈沉細而數舌紫赤脈證合參此秋瘟痙厥症也乘入陽明之絡則口緊走人太陽之經則拘攣外竄筋脈則成痙上蒸心包則為厥內經所謂血之與氣並走於上則為大厥也療法先用手術以燈照前後心兩脅及大小腹有小紅點隱隱用毫針挑七八個噤開能言再挑七八個周身活動知痛大叫拒挑繼即神迷復厥遂用湯丸井進安宮牛黃丸通心包以清神清瘟敗毒飲加減透伏火以逐疫毒處方黑犀角三錢小川連四錢青子芩三錢青連翹三錢元參三錢生石膏一兩研細鮮生地一兩粉丹皮二錢焦梔子三錢赤芍二錢鮮大青五錢肥知母四錢鮮竹葉四十片鮮石菖蒲一錢剪碎搓熟生沖安宮牛黃丸兩顆分兩次藥湯調下效果一劑病輕第二日又診脈洪大自言覺一氣塊流走不定走脅脅痛走腰腰痛走至足指痛不敢屈伸走至腎囊疼不可忍余曉之曰由當時挑的太少致經絡之熱毒流注走痛原方加石膏一倍生川柏錢半絲瓜絡一枚先煎代水第三日抽惕若驚筋屬肝由熱毒流於肝經不能外潰而出筋絡受其沖激故發瘛瘲狀如驚癇又加石膏一兩龍膽草錢半雙鉤藤六錢日服二劑諸症輕減痙厥亦止終用竹葉石膏湯去人參半夏加西洋參鮮石斛梨汁等肅清餘熱以養胃陰連進四劑胃動而愈廉按斷證悉宗經旨處方極合病機是得力於余師愚疫症一得者惟用毫針挑其痧點卻是放血泄毒之外治良法病至痙厥疫毒已直竄腦與脊髓刺激其神經而發吳鞠通安宮牛黃丸不如用紫雪合厥證返魂丹清鎮泄化平其神經以定痙厥其效果尤為神速時行冬瘟案吳興南住遼陽城內戴二屯病者劉姓女年二十歲遼陽縣人住玉嘉溝病名時行冬瘟原因公元一九一七年八月望後至二十三等日天氣似煙非煙似霧非霧昏迷嵐瘴日為之赤晝為之瞑別有一種氣氛是女為人拾棉早出暮歸感染斯疫伏至冬初病作證候四肢痠軟頭目昏眩目眥如血胸滿氣喘神昏譫語甚則抽搐兩目大吊牙關緊閉診斷脈來洪大有力人迎氣口尤盛呼吸之間脈約八至滿舌濁苔直斷為時行冬瘟不可誤認作傷寒療法先用雙甲重按其少商兩穴抽搐頓止以通關散通其肺竅少時得嚏次用芒針量病人中指中節橫紋為度刺其左右兩鼻孔令血盈盂又刺頰車曲池瀉合谷病者能言矣次瀉廉泉玉英手之三里並中衝勞宮心包絡經得開刺左期門瀉肝經邪熱刺右章門劫肺竅溫毒又次用刮法順刮其兩脅與兩尺澤如刮痧狀均令黑紫兩腿猶言緊急又取承山魚腹委中等穴刺之病覺稍安此急則治標之法用藥以解毒活血新加羚羊角湯方用羚羊角為君性善解毒直清肺肝安神定魄鎮風定抽雙花重用解毒紅花桃仁專行破血菊花為清潔之品得秋肅之氣花開於頂其香清馨不雜濁味能清頭風人共知之能闢瘟毒人鮮知焉重用三錢以清溫解毒根朴榔片枳殼吳又可達原飲曾用之其檳榔一名劫瘴丹生於熱帶煙嵐之地治瘟疫生用大得效力土瓜根即天花粉能蕩平胸中實熱性擅解毒尤專止渴處方羚羊角二錢磨服金銀花五錢南紅花三錢甘菊花三錢土瓜根三錢生桃仁二錢去皮鉤藤鉤三錢堅榔片三錢川根朴二錢炒枳殼二錢生甘草一錢淨連翹二錢效果服二帖諸證大減惟尚有譫語又與自配牛黃安宮丸二丸服之神清嗣用清養法調理月餘而痊然已發落甲脫自己嘗言重生也廉按證既明辨法宗清任況解毒活血湯本治熱疫乏良方能對證而加減善用之自然應手奏功大頭瘟案葉馨庭住黟縣南屏病者葉紹芹年十二歲住安徽黟縣小學肄業病名大頭瘟原因冬令感寒伏而不發至春三月地氣上升復感時行溫毒上攻頭部而始發發即病勢劇烈證候咳嗽氣喘口渴舌燥壯熱便結神識昏述頭痛難舉紅腫一周若戴箍焉箍之內外紅腫成塊遊走不定紅塊之上細泡無數診斷脈象浮數風溫熱毒顯然今頭痛難舉紅腫一周風熱上迫也紅腫成塊遊走不定風之善行數變也壯熱不退神識昏迷風火內擾也火乘所勝以侮所不勝而肺金受爍故咳嗽氣喘口渴舌燥由是而來療法因用羚角鉤藤以熄風銀花甘草以解毒連翹貝母清心肺菊花白芷散頭面人中黃黑山梔酒炒生軍以瀉火蘆根石斛以清胃每日煎藥兩次處方羚羊角五分銼末燉沖鮮蘆根三錢金銀花四錢連翹心三錢雙鉤藤五錢鮮石斛三錢生甘草節一錢川貝母二錢去心黑山梔二錢人中黃三錢香白芷一錢酒炒生軍一錢甘菊錢半效果上方服三劑風熱漸解頭腫見消減去羚角鉤藤生軍三味加冬桑葉三錢紫馬勃一錢包元參心二錢五分再服四劑而痊廉按大頭瘟證當以東垣普濟消毒飲為止治今仿其法而略為加減宜乎應手奏功若病勢尤重者砭法外治亦當相助以術速效疙瘩瘟案沈奉江住無錫病者拙荊張氏年五十餘住本宅病名疙瘩瘟原因素稟陰虛每交冬令喜用腳爐春時易生溫病一日陡發疫證困苦莫可言狀另延他醫驚而卻走證候遍體奇癢漸發無數之塊大者如盤小者如碗不等腫而微紅攻於頭面則目紅攻於胸肺則氣逆神識模糊瘙癢不止幾欲挖去其肉日夜不寐呼號三日診斷脈洪弦搏數舌紫赤脈證合參此疙瘩瘟也由熱毒蘊於營分外發肌膚防其毒陷心包則大險重矣療法急急清營解毒以透發之處方黑犀角一錢鮮大青五錢鮮生地一兩蜜銀花三錢青連翹三錢黑山梔三錢粉丹皮二錢炒牛蒡二錢人中黃錢半先用生緑豆二兩鮮茅根二兩煎取清湯代水煎藥效果連服三四劑而塊漸小漸減癢亦漸止調理六七劑而愈廉按疙瘩瘟者遍身紅腫發塊如瘤者是也證由血毒外潰故連投清血解毒而痊無他巧妙軟腳瘟案嚴紹岐住紹興昌安門外官塘橋病者薛三二年三十五歲住松林病名軟腳瘟原因素患濕熱腳氣時愈時發今春染時行溫邪而發證候一起即兩腳大痛不能起立立即足軟欲僕身發壯熱診斷脈兩關尺弦數左甚於右舌紫赤脈證合參此松峰説疫所謂軟腳瘟也總由腎水先虧不能養肝肝經血分之濕熱下注兩足余遂斷之曰此為險證今因素患腳氣病在壯年猶可挽回療法以芩芍川楝直清肝熱為君二妙化濕滋水以治腳軟為臣佐以延胡小茴淡竹根清通其絡以止痛使以碧玉散導其濕熱從小便而泄也處方青子芩二錢生赤芍五錢川楝子三錢酒炒延胡錢半二妙丸錢半拌碧玉散三錢包煎炒小茴香五分淡竹根三錢效果兩劑足痛輕減原方加炒香桑枝二兩青松針一兩煎湯代水再進兩劑足痛既除溫邪亦漸瘥嗣以竹根桑枝松針絲瓜絡煎湯代茶調理四日而痊廉按喻氏嘉言謂軟腳瘟者便清泄白足重難移者是也劉氏松峰説疫謂病因濕瘟宜蒼朮白虎湯此案病名同而因症不同斷非直鈔蒼朮白虎湯可愈辨證從腎水先虧不能養肝肝經血分濕熱下注兩足而斷頗有見地故另選對症之藥以奏功可見醫者臨證必以探源審症為首要傷風時疫證案陳務齋住梧州四方井街病者陳典常年二十九歲廣西容縣住鄉體壯業農病名傷風時疫證原因素因過食生冷果實以致脾難運化蓄濕生熱誘因風疫流行菌毒由口鼻吸入直接傳染證候初起惡寒發熱頭目俱痛腰脊硬疼四肢痛倦咳嗽氣喘咽乾口燥痰涎膠黏咳則困難間或咯血繼則全體大熱晝夜大體煩躁已極痰涎上壅咳更困難聲破而嘎不能語言神識乍醒乍昏面色緊黑目白現赤血絲唇赤黑腫便結數日不行溺短赤澀診斷左寸關尺沉伏右寸浮大而促關尺洪滑數有力體溫達一百零六度舌卷苔黑燥深紅起刺脈證合參此傷風時疫之危症也由天時不正夏應熱而反涼秋應涼而反熱實非其時而有其氣癘疫為殃長幼如是互相傳染是年仲夏雨水太盛濕氣最旺仲秋麗日太炎燥氣最猛疫氣一觸即如爆發檢閲前醫諸方皆用風藥耗津助火症殊危險幸右關尺尚存不散或可救治療法先用羚犀杏石解毒湯取杏仁石膏知母桑皮花粉叉斛竹瀝潤肺降逆化痰生津為君羚角磨犀清心平肝涼透伏火為臣中白銀花紅花涼血敗毒去瘀生新為佐蘆筍茅根清宣透解為使連進三服體熱略退形容略潤日則醒而不昏夜仍譫語昏迷診脈數而有力繼用大承氣湯加黃柏桃仁紅花生地石膏蓮心花粉麥冬等取其蕩滌胃腸清其燥以救津再進三服始下燥糞數次人事已醒晝夜不昏譫語已除津液己復舌苔黑退轉為粗澀惟咳嗽聲破尚不能除脈數無力又用百合固金湯加石膏知母叉斛洋參取其潤肺生津活血助氣清肺平胃滋陰降火連進二十餘服咳嗽已減聲清不破略能進食診脈微見燥澀用補肺阿膠湯加生脈散取其潤燥生津助氣活血補肺化痰滋降虛火處方羚犀杏石解毒湯羚羊角三錢先煎犀角尖二錢磨沖北杏仁五錢生石膏二兩研細肥知母六錢鮮鋇斛四錢金銀花四錢生桑皮五錢人中白四錢天花粉五錢西紅花二錢先用活水蘆筍四兩鮮茅根三兩煎湯代水煎成加竹瀝一杯沖服次方大承氣湯加減方生大黃五錢小枳實四錢生石膏一兩研細川黃柏五錢芒硝三錢天花粉六錢西紅花二錢蓮子心四錢原桃仁三錢煎服三方百合固金湯加減方野百合二錢大玄參五錢川貝母三錢去心大生地四錢津桔梗一錢破麥冬三錢生白芍四錢生石膏四錢研細肥知母三錢粉甘草一錢西洋參錢半鮮叉斛三錢白歸身錢半熟地露十兩枇杷露六兩二味代水煎藥四方補肺阿膠湯加生脈散貢阿膠三錢煬沖馬兜鈴錢半炒牛蒡錢半北杏仁四錢粉甘草一錢東西洋參各錢半破麥冬三錢北五味三分陳糯米三錢煎服效果五日熱退體和譫語已除人事亦醒直至三十日咳嗽始減聲清不破食量略進四十日咳嗽全除食量大進元氣恢復而痊説明是年戊午秋末冬初氣候溫燥鄉村市鎮時疫大為流行各家長幼互相傳染者十之八九幾至路無行人醫藥不效死亡甚衆慘不可忍余是役診治數千人其症大略相同藥方俱照案內按症之輕重用藥之加減倘年老及幼孩或標本不同用量須加詳察胎前産後尤當酌量調治經余手者十愈七八特録數證就正有道廉按疫必有毒毒必有菌菌毒吸自口鼻由氣管達於血管將血氣凝結壅塞津門即淋巴腺總彙管之口津郁為痰阻滯氣機故見種種肺病內陷心包以致心筋質炎故見種種神經病此案初方使疫毒由血分轉出氣分妙在犀羚合西藏紅花透解血毒行散血瘀膏知桑皮合蘆茅二根清宣氣熱使其速轉出氣分而解第二方使疫毒瘀積由胃腸排泄而出三方四方辛涼合甘寒法清滋互用為風燥熱疫善後之正法非素有經驗能負重任者不辦妊娠兼風燥時疫證案陳務齋住梧州四方井街病者陳韋年二十二歲廣西容縣住鄉學界體瘦弱病名妊娠兼風燥時疫證原因素因受孕後氣血不充神煩少睡誘因秋後風燥時疫流行菌毒飛揚由口鼻吸受直接傳染證候初起頭痛目眩惡寒發熱咳嗽痰黏肢倦神煩口渴胃鈍繼則氣喘聲嘎咳痰甚艱咳則咯咯有聲胸膈脹滿食則嘔難下咽肌肉脫落形體枯瘦不能起立起則昏僕神識乍醒乍昏譫言妄語唇縮齒枯咽乾口燥診斷六脈弦數微浮數則七至有奇舌苔枯黑而澀邊尖深赤起刺脈證合參此妊娠兼風燥時疫症也余曉之曰病勢危險極矣輾轉思維只有竭力以救母不能兼顧其胎兒若猶欲保胎恐母命一亡而胎兒之命亦隨之俱亡請君擇於斯二者病家遂謂照此病勢當然急救母命為首要請竭力設法放膽用藥可也豫對之曰脈雖浮數已極幸未散亂或能挽救以圖僥幸療法先用涼膈散合犀角地黃湯去丹皮加花粉銀花人中白取硝黃梔芩蕩滌腸胃降火救陰為君地芍花粉涼血安胎生津潤燥為臣犀角連翹竹葉薄荷清心肝伏火涼散風燥為佐銀胡銀花人中白和解表裡散郁敗毒為使連進二服不應直至五服後始得瀉數次黑燥結糞而燥熱略平舌苔略潤譫語已除人事亦醒仍見燥渴不眠食量不思咳嗽如前又用人參白虎合百合固金湯加減取其潤肺生津平胃降逆活血安胎養陰滋水連迸十餘服則咳嗽已除聲清不嘎燥渴已止食量已迸睡眠已安身體已和舌黑苔已退轉現微白微澀惟元氣衰弱聲低氣微軟而無力診脈微弱又用四物湯合生脈散加茯神棗仁於朮山藥取其補氣生津養陰活血安胎寧神運脾健胃連進十餘服則元氣略強食量大進起居步履稍能支持惟肢體皮膚微現浮腫診脈緩滑又用四君子湯合五皮飲取其補氣運脾去濕消腫也處方涼膈散合犀角地黃湯加減方元明粉三錢分沖生大黃四錢焦山梔三錢青連翹三錢青子芩三錢薄荷葉錢半鮮竹葉二錢生白芍三錢鮮生地一兩粉甘草一錢犀角尖三錢磨沖銀柴胡二錢天花粉四錢金銀花三錢人中白錢半次方人參白虎合百合固金湯西潞黨三錢生石膏四錢研細肥知母三錢陳粳米五錢粉甘草一錢野百合二錢鮮生地四錢川貝母錢半生白芍二錢津桔梗二錢原麥冬三錢當歸身錢半大元參二錢熟地露一斤代水煎藥三方四物湯合生脈散加減方大熟地四錢生白芍二錢白歸身三錢川芎一錢西潞黨四錢五味子錢半破麥冬三錢云茯神二錢酸棗仁二錢貢於朮三錢淮山藥五錢生打又方四君子湯合五皮飲西潞黨四錢貢白朮六錢雲茯苓四錢粉甘草一錢生桑皮五錢五加皮四錢大腹皮三錢老陳皮二錢生薑皮二錢煎服效果五日人事己醒二十日咳止燥平食量已迸三十日百病俱除食量大進元氣已復後一月胎兒産下母子俱全康按風燥釀疫秋冬為甚就余所見去年深秋至冬有發白喉時疫者有發喉痧時疫者有發疫痘疫瘄者直至今春疫勢漸衰其證雖變狀萬端而原因總歸於風燥熱毒氣血兩燔醫者不究病因見喉治喉見痘治痘見瘄治瘄輒用通套成方以致枉死載途良可悲也此案注重伏火就燥氣血兩燔開首即用涼膈合犀角地黃加減表裡雙解三焦分消投劑果決自然效如桴鼓然非有學識有膽量經驗宏富者不敢負此重任妊娠燥疫證案陳務齋住梧州四方井街病者梁陳氏年二十六歲廣西容縣住鄉體壯業農病名妊娠燥疫證原因素因性躁而暴勞苦過度受娠數月適染燥熱時疫而發病證候初起頭目骨節皆疼全體大熱晝夜不休皮乾無汗咳嗽氣逆咽乾口渴聲嘎譫語狂躁神識昏迷唇焦齒黑舌黑而卷疊起芒刺不能言語甚至皮枯甲錯狀如蛇將脫殼以手擊之全體皮膚響聲咯咯診斷皮殼硬浮不能診脈只得舍脈從證查問病原斷為妊娠兼燥疫證檢閲前方尚用耗散藥以劫陰血液垂涸勢難挽救實因病家再三乞援不得不勉圖救濟之法療法先用犀角地黃湯涼血清營為君合人參白虎湯生津潤燥為臣子芩蓮心銀花涼血安胎清熱解毒為佐使以竹瀝清肺燥以活絡痰也連進二服後始能其聲噫噫舌苔略潤再進三服能言能咳聲尚未清舌始能伸黑苔已退五服後人事已醒言語亦清思食薄粥六七日間全體皮殼脫落大者尺許一片小者數寸形如蛇退毫毛盡脫全體煥然一新粉白微紅然後始能切脈診左右細數而澀咳嗽痰膠咽乾口燥睡眠不安次用人參白虎湯加歸地芍薇元參柏子仁以滋陰寧神涼血養胎清熱降火生津潤燥十餘服後精神略好食漸迸咳嗽已除咽喉不幹睡眠已安惟元氣未復肌肉未長診脈微弱終用參耆歸術湯以補氣生津養血安胎補脾健胃降火寧神以善後處方犀角地黃湯合人參白虎湯加減方黑犀角二錢磨汁鮮生地一兩青連翹四錢生白芍四錢生甘草一錢生石膏八錢研細白知母四錢西洋參三錢青子芩三錢生粳米三錢銀花蕊三錢生蓮心三錢煎後加竹瀝一鍾和服次方人參白虎湯加味方生石膏五錢研細鮮生地六錢肥知母四錢東白薇三錢生白芍五錢烏元參四錢西洋參錢半大歸身錢半柏子仁三錢生甘草七分三方參耆朮歸湯西洋參二錢北黃耆錢半天生術錢半大歸身二錢大生地四錢生白芍三錢淮山藥五錢生打酸棗仁錢半破麥冬三錢肥知母三錢云茯神三錢川黃柏一錢效果五日能語言人事醒食量略進皮膚殼脫調養至三十日食量大進肌肉已長元氣亦復人皆稱奇謂今古罕聞之證愈後兩月分娩母子雙全廉按燥疫一證前哲吳氏鞠通雖有發明方載吳氏醫案然系寒燥陰毒今此案娠婦兼患燥熱時疫殊屬棘手重證立法注重氣血兩燔爍涸津液故用人參白虎清滋氣分之燥熱犀角地黃清解血分之燥毒雙方兼顧用得恰好洵救燥疫之良劑厥後兩方一則清滋氣液一則雙補氣血亦為善後所必需真精心結撰之佳案也
