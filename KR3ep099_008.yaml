body:
  text: 第八卷時疫喉痧病案疫喉痧案丁甘仁住上海病者顧君年十餘歲在上海南市開設水果行病名疫喉痧原因從時疫傳染而得患已七天證候寒熱無汗咽喉腫痛牙關拘緊痧麻布而隱約甚則夢語如評論讝診斷脈郁數不揚舌苔薄膩而黃余曰此疫邪失表將欲內陷之候也療法非麻黃不足以發表非石膏不足以清裡急進麻杏甘膏湯主之處方淨麻黃四分生石膏四錢研細光杏仁三錢生甘草六分效果連服兩頭煎得暢汗痧麻滿布熱解神清咽喉紅腫亦退數日而安廉按疫喉痧一證不外乎風寒溫熱瘟癘之氣而已其證初起凜凜惡寒身熱不甚並有壯熱而仍兼憎寒者斯時雖咽痛煩渴先須解毒透痧為宜即或宜兼清散總以散字為重所謂火鬱則發之也俾汗暢則邢達邪達則痧透痧透則喉爛自止此即是案用麻杏甘膏湯之原理也惟麻黃用於喉痧之理由曹氏心怡闡發最詳其喉痧正的云瘟癘之邪郁之深而發之暴不能自出於表以至上竄咽喉苟非洞開毛竅何以泄其毒而殺其勢此開手所以必用麻黃也用麻黃之法有獨用者有炙入豆豉內者吳人稱過橋麻黃凡時令嚴寒或證起數日表邪鬱極當急與解散者可獨用分量少只三分多至五分不過取其輕揚之性以達毛竅非若西北正傷寒之需重汗也或時令溫暖邪郁不甚者可炙入豆豉內用之分量亦少至三分用豆豉三四錢同水炙透去麻黃煎服倣佛仲聖麻沸湯之法然亦不可拘若時令雖暖而表邪甚急者仍當專用為捷若在暑月可用桑白皮監之或其人素有痰血或病中曾見衄血者俱宜兼用桑白皮此局方華蓋散之遺制也至於救逆諸法則有麻黃與白膏同用者如邪郁數日已從火化苔黃口渴者以麻黃豆豉鮮石斛同用舌尖微絳者尚可用有與黑膏同用者如誤治在前表邪未達痧透不暢而舌色絳赤者麻黃可與豆豉生地同用手足瘛瘲者可參用羚羊角並有與石膏同用者如發於暑月而復誤治痧火與暑邪交併熱甚生風手足瘛瘲神識瞀亂而邢仍未達舌焦黑口渴者不得已可試用之即非署月但見以上諸證者亦可參用活法在人是在臨證者審體之其言之詳明如此奈近世病家輒畏麻黃石膏而不敢服醫者迎合其意隨改用薄荷蟬衣牛蒡銀花連翹細辛蘆筍玉樞丹等或用蔥白豆豉紫背浮萍青蒿腦紫草丹皮青箬葉鮮茅根太乙紫金丹等皆輕清芳烈之品仿洄溪治溫疫之法服之雖亦能發汗透痧然總不及麻杏甘膏湯之速效曹氏心怡所謂喉痧一證歷來鮮善治者以不敢用麻黃暢發其表也丁君在滬行道數十餘年醫名甚盛乃敢用數千餘年歷劫不磨之經方可謂醫林之錚錚者矣疫喉痧案丁甘仁住上海病者周童年十四歲住中法學堂後面病名疫喉痧原因今春天時不正喉痧盛行傳染而患已八天證候痧雖布而未透足熱勢不退喉關腫腐頸項左右腫硬疼痛欲成痧毒大便泄瀉診斷脈滑數舌苔黃脈證合參風毒欲達而不能遽達已有內陷之象也療法先進葛根芩連湯加味以止便泄繼投敗毒湯去牛蒡加元參以消痧毒處方生葛根錢半淨蟬衣八分青連翹三錢蘇薄荷錢半片黃芩一錢酒汁小川連七分酒洗生甘草五分炙殭蠶二錢接方荊芥穗錢半薄荷葉一錢炙殭蠶三錢板藍根錢半青連翹三錢象貝母二錢生蒲黃三錢包煎京赤芍三錢益母草三錢元參三錢生甘草六分生石膏四錢研細效果初方一劑服後即得汗熱減泄瀉即止惟痧毒腫硬益甚喉關腫腐不脫湯飲難進繼投接方並外敷藥痧毒即消咽喉腫腐亦去數日而安廉按風毒喉痧初起即當用荊防敗毒湯加減以表散開達苦寒清滋等味一味不可兼雜使其痧從汗透病毒自然不留毒既外泄喉疫當然輕減直待痧回腫退鼻有清涕遍身作瘰蛻皮方進涼血清解之味靡不應手速效此案亦同此意稍嫌芩連苦泄用得太驟致有腫硬甚益湯飲難進之反應幸而改進敗毒猶得挽回於中道否則殆矣故曹心怡喉痧正的謂凡遇風毒喉痧先以得暢汗為第一要義旨哉言乎疫喉痧案葉鑑清住上海病者錢左年八歲蘇州人寓唐家弄病名疫喉痧原因傳染時癘致病證候喉痛紅腫有腐凜寒壯熱面赤膚紅如錦紋胸頭手肢稍見點粒雜有白色細點煩悶大渴時有讝語便閉溺赤頭面有汗陽明熱甚氣血兩燔診斷脈來洪數右部尤甚舌鮮絳苔黏濁體溫一百零四度半來勢速而且險此疫癘傳染極重之喉痧也幼稚質弱抵抗力薄防津涸陷閉驟變療法宜以大劑清解生津敗毒冀其轉機速請高明酌進為妥喉痧是疫毒最危之候余師愚有清瘟敗毒飲重用石膏直入胃經退其淫熱生地石斛保其津液為君羚羊角丹皮赤芍清泄氣血之熱參以涼肝為臣銀翹甘中黃之解毒兼元參之清喉養陰為佐葛根蟬衣茅根轉揚宣透為使也處方生石膏二兩研細鮮石斛一兩先煎牡丹皮三錢甘中黃八分淨連翹五錢鮮生地一兩羚羊片錢半先煎赤芍二錢板藍根四錢金銀花五錢粉葛根一錢潤元參四錢蟬衣一錢茅根四兩去心衣煎湯代水另用茅根蘆根煎湯代茶次診紅痧較透壯熱汗多喉腐紅痛而有稠痰渴思生冷脘悶煩躁間有讝語舌絳苔黏濁便閉溺赤如血脈數大體溫一百零四度二此時癘傳染直入陽明氣血均受燔灼病僅三日津液已經大傷症勢危險變遷極速與尋常感冒風痧不同今擬生津涼胃清解熱毒次方生石膏二兩研細鮮石斛一兩大青葉三錢甘中黃八分牡丹皮三錢鮮生地一兩元參五錢天花粉四錢川貝四錢黑山梔三錢金銀花五錢淨連翹五錢茅根肉五扎去心衣犀角四分磨沖三診紅痧稠布神識尚清仍壯熱汗多大渴大飲喉痛紅腐舌乾絳苔垢厚煩躁氣悶未見輕減大便五日未行溲赤莖痛熱甚為毒充斥陽明津液灼傷殊甚致腸腑宿垢不得下行頻轉矢氣奇臭即是明證脈來六部一律數大體溫一百零四度半病勢正在險途今日仍議清胃生津通利大便三方生石膏二兩研細鮮石斛一兩瓜蔞仁五錢生草梢七分黑山梔三錢鮮生地一兩肥元參五錢元明粉一錢與瓜蔞仁同打生大黃三錢丹皮三錢青連翹五錢金銀花五錢犀角四分磨沖四診大便兩次先燥屎後微溏解後熱勢較和煩躁氣悶渴飲亦稍緩紅痧稠密喉腐已化紅痛略減溺赤莖痛脈來數大稍靜體溫一百零三度舌乾絳津傷熱甚稚年陰分不充病雖小愈不足恃也治再清胃生津解毒四方生石膏一兩半鮮石斛八錢生草梢七分牡丹皮三錢淨連翹四錢鮮生地八錢元參四錢細木通四分焦山梔三錢金銀花四錢大竹葉三錢茅根肉五扎去心衣五診紅痧稍回蒸熱有汗喉痛較和而有稠痰夜寐稍安煩躁渴飲等亦較平溺赤莖痛脈大雖似稍斂數象尚甚舌質絳苔已化體溫一百零二度陽明邪熱有餘津液不足慎防生變治守原意五方生石膏一兩研細鮮石斛七錢天花粉四錢淨連翹四錢竹葉心三十根鮮生地八錢川貝母三錢去心元參四錢金銀花四錢燈心三扎生草梢七分塘西甘蔗皮五錢六診紅痧漸回身癢表熱較淡內熱煩悶渴飲等亦較和種種邪退之象邪既退化津液即可保全舌絳稍淡而潤喉痛已和溺赤莖痛脈來弦數體溫一百零一度半邪癘雖退蘊熱尚盛童年陰未充足須加意謹慎勿變方妥今日仍議生津清化六方生石膏七錢研細元參三錢生草梢五分淨連翹四錢竹葉心三十根鮮石斛七錢天花粉四錢緑豆衣五錢金銀花四錢燈心三扎嫩蘆根一兩去節塘西甘蔗皮五錢七診熱勢大衰紅痧循序而回諸恙悉見和平脈來右弦數左尚和平舌紅潤根薄體溫一百零一度邪勢日退津液日回胃納亦展種種逢凶轉吉化險為夷治再清養七方西洋參一錢元參三錢淨連翹三錢大竹葉三錢燈心三扎鮮石斛四錢嫩蘆根八錢去節金銀花三錢緑豆衣四錢甘蔗皮四錢塘西八診痧回熱減惟寐醒後嗌燥口乾苦須飲湯水方能言語喉痧乃疫毒之病極傷津液大便欲行而不解腸燥有留熱也脈來右尚弦數體溫一百度治守原法參以潤腸八方西洋參一錢元參三錢淨連翹三錢瓜蔞仁四錢大竹葉三錢鮮石斛四錢大麻仁四錢研金銀花三錢松子仁三錢嫩蘆根八錢去節九診大便仍欲解不行後用洋蜜錠納穀道中逾時始得下行尚暢即古人蜜煎導法最穩妥效速暮分尚形肌熱口乾津液不復餘熱未清所幸粥飲漸加夜寐頓安體溫一百度靜養調理自可復元九方西洋參一錢元參三錢淨連翹三錢緑豆衣四錢原金斛三錢東白薇錢半金銀花三錢嫩蘆根八錢去節甘蔗皮四錢塘西十診表熱已解大便又行溺黃邪熱已退津液來復脈至數象已和病後調理貴乎平淡十方西洋參一錢穭豆衣三錢緑豆衣三錢淡竹葉錢半甘蔗皮四錢原金斛三錢生穀芽三錢嫩蘆根四錢燈心三扎十一診諸恙皆和脈來和軟有神安穀甜睡再以平淡調理十一方西洋參一錢川石斛三錢穭豆衣三錢淡竹葉錢半橘白一錢南沙參三錢生穀芽三錢緑豆衣三錢燈心三扎效果服三劑痊愈康按治喉痧之法宜辛涼橫開以陳氏疫痧草喉疫淺說兩書最為善本其次余氏疫疹一得此案亦守是法首尾十一方隨機應變法穩方妥可為後人效法誠有功於世之佳案也溫疫喉痧案丁甘仁住上海病者李氏年四十餘歲南京人住上海老北門內病名溫疫喉痧原因由侍他人之喉痧遂致傳染前數醫謂此婦素體陰虧僅用薄荷元參桑丹茅蘆根等方藥平淡而不效證候發熱五六天麻痧布而不勻咽喉腫痛欲閉牙關拘緊喉中痰聲漉漉滴水難下便閉數日診斷脈郁數不揚舌不出關苔薄膩黃余斷之曰此溫疫之邪為外寒所束痰熱交阻膈中壅塞肺胃之間危在旦夕也療法急投透痧解毒湯加六神丸涼膈散竹瀝蘿蔔汁等解其表邪通其腑氣以挽救之處方荊芥穗錢半粉葛根二錢生炒牛蒡二錢嫩射干二錢前胡錢半淨蟬衣八分紫背浮萍三錢青連翹二錢淡香豉三錢白殭蠶三錢淡竹茹三錢生甘草五分桔梗一錢六神丸七粒先吞涼膈散三錢包煎淡竹瀝蘿蔔汁各一瓢沖效果一日兩劑服後得汗與便外以香菜煎水揩其肌膚以去外束之寒次日痧布喉關漸開數日而愈廉按風溫時毒釀成喉痧近今發現為最多此案療法表裡雙解合解肌透痧滌痰通腸等藥使疫毒半從汗出半從便出雙方兼顧面面周到惟方中生甘草一味涼膈散內已備可刪症既喉腫欲閉痰聲漉漉葛根太升亦可減去溫毒喉痧案丁甘仁住上海病者夏君年二十餘揚州人住上海陳大弄病名溫毒喉痧原因患時疫喉痧五天痧雖已密布獨頭面鼻部俱無俗云白鼻痧最為凶險曾經服過疏解藥數帖病勢轉重證候壯熱如焚煩躁讝語起坐狂妄如見鬼狀病家以為有祟為患咽喉內外關均已腐爛滴水難咽唇焦齒燥診斷脈實大而數舌深紅余曰此疫邪化火胃熱熏蒸心包逼亂神明非鬼祟也療法頭面鼻部痧雖不顯然非但用升葛等升散可治急投犀角地黃湯解血毒以清營白虎湯泄胃熱以生津二方為君佐以硝黃之鹹苦達下釜底抽薪處方黑犀角六分磨汁沖鮮生地一兩赤芍二錢丹皮二錢風化硝三錢分沖生石膏一兩研細白知母四錢生甘草六分生錦紋四錢效果服後過數時得大便即能安睡次日去硝黃照原方加金汁竹油珠黃散服數劑即熱退神清咽喉腐爛亦去不數日而神爽矣廉按同一喉痧有時喉痧疫喉痧之別無傳染性者為時喉痧因於風溫者最多暑風及秋燥亦間有之其症喉雖紅腫且痛而不腐爛疹雖發而不兼痞有傳染性者為疫喉痧因於風毒者多因於溫毒者亦不鮮其症喉關腐爛而不甚痛一起即痧併發則成片痧則成粒丁君自制解肌透痧湯為治風毒喉痧之正方涼營清氣湯為治溫毒喉痧之主方各有攸宜慎毋混用若不辨而誤用無不起劇烈之反應而其壽立傾臨證之時必先注意而慎重之溫毒喉痧案陳務齊住梧州四方井街病者黃云之年四十歲病名溫毒喉痧原因素因嗜酒無量並食辛熱太過以致腸胃積熱適秋感溫燥厲氣而發證候初起發熱痧並見咳嗽音啞喉頭癢痛繼則目赤面青大熱昏狂延旬日間焦躁異常更見昏迷手常撕其喉齶不能制止鮮血常流形枯體瘦唇焦面黑不能語言診斷左脈洪弦右則浮大而數舌苔黑燥邊尖深赤起刺脈證合參此喉痧危證也查閲前醫方法太遵修園禁令絶無清涼純用溫散耗津助火則毒火升炎胃腑熱燥津液將竭厲邪與氣血交混達之不得清之亦不易勢甚危急今所幸者脈尚有根未散或可救治療法先用臥龍丹睛鼻通關開竅通氣紫雪消解邪火透毒清神繼用羚羊黑膏湯加減取羚角蓮心生地元參紫草清心平肝涼血潤燥為君桑葉蒺藜麥冬貝母潤肺清熱降逆化痰為臣生軍元明粉敗毒蕩下釜底抽薪為佐淡香豉人中黃泄濁解毒為使連進二服後人事已醒手不撕喉血出已止體熱亦減診其左脈略靜右仍躁數又用桑丹瀉白散為湯加減取其潤肺降逆平胃清熱涼血養陰化痰敗毒連進十餘服後食量已迸喉中不痛惟有微咳微燥不能安眠診脈左則緩靜右關略數又用石斛元參湯加減取其潤肺降逆清熱養胃處方臥龍丹方西牛黃一分麝香肉一分梅冰片一分蟾酥一分半豬牙皂二分羊躑躅即鬧羊花三分北細辛二分燈草灰一錢金箔十張共研末飛過瓶貯用一分吹鼻用五釐沖後服紫雪八分用竹葉心五十支燈心五分煎湯調下又方羚羊黑膏湯方羚羊角二錢淡豆豉錢半鮮生地五錢冬桑葉二錢白蒺藜錢半黑元參四錢破麥冬三錢老紫草錢半蓮子心四錢杏仁三錢生大黃三錢元明粉錢半川貝母二錢人中黃錢半三方桑丹瀉白散為湯加減方冬桑葉五錢牡丹皮二錢元參四錢天花粉三錢杏仁四錢川貝母二錢桑白皮四錢地骨皮四錢甘草一錢鮮生地三錢知母三錢大黃三錢四方石斛無參湯加減方鮮石斛四錢黑無參三錢杏仁五錢栝婁仁三錢鮮生地四錢破麥冬三錢生甘草錢半煎服效果五日人事已醒喉痧亦減血止熱退十五日食量已進喉症亦除二十日食進體健元氣已復廉按此仿曹心怡喉痧正的之方法妙在先用臥龍丹開竅宣氣紫雪芳透清神惟人中黃不如用金汁泄熱逐毒較有膚功瘟毒喉痧案尹矩山住濟南西小王府病者鄭繼功年逾三旬平陰縣自治員住城北鄭家莊病名瘟毒喉痧原因本年正月下旬赴諸城路經濟南與友人盤桓多日家人專丁送信報告云闔傢俱染瘟證已殤一幼女矣聞耗變歡樂為憂傷匆匆旋歸見家人皆病非常憂悶不但殤女之悲也因之己亦感染證候初得時喉疼咽乾而嗆滿嗓色白腐爛水難下咽目赤唇焦全身現疹危險已極經醫生張某用刀割三次病勢益劇診斷六脈洪數惟尺浮大有力舌白而尖絳乾燥少津液豫向家人曰此瘟毒喉痧也乃陽明三焦鬱火熾盛上於肺臟之病其喉生腫疼者皆挾熱為之若風毒結於喉間其熱盛則腫塞不通而水漿不入俗名狼掐脖症勢險而速按世醫療此證者盡知忌發表誠恐用荊防等品因風吹火釀成燎原之勢因執定養陰清肺湯以為主方不知此證若專系燥熱在內但現白喉養陰藥猶可重用既兼痧疹必有表邪當痧疹將現未現之際經絡貴乎透泄而用地冬滋膩等品以填補之反將瘟毒遏住大非所宜當用竹葉石膏化毒湯為治療法先服紫雪丹以救急次服銀翹散以透解熱毒又次加減竹葉石膏湯而以生石膏直清胃熱為君金汁銀翹元參以解火毒為臣竹葉木通人中白等以泄小腸之積熱為佐使末用粉草引用葦根者所以和中氣而使邪熱透出肌表也處方生石膏四錢研細金銀花二錢淨連翹二錢大元參四錢淡竹葉一錢細木通一錢鮮生地五錢甘中黃錢半粉甘草八分鮮葦根二兩鮮茅根一兩去衣二味煎湯代水金汁二兩分沖又方生石膏三錢研細犀角一錢金汁二兩沖川貝母三錢去心細木通一錢竹葉一錢粳米一大撮效果調服丹散後繼服前湯藥方三劑後湯藥方三劑病遂痊愈廉按喉痧與白喉醫者輒多誤治今揭其異點於下俾學者一覽瞭然一喉痧由於風溫時毒或濕熱穢濁之毒白喉白於風燥煤毒或煎炒辛熱之毒其異點一一喉痧初起即憎寒壯熱或乍寒乍熱白喉初起即渾身發熱或身反不熱其異點二一喉痧初起即痧點隱約甚或密布肌紅且多發於邪盛火旺之時其色鮮紅而紫豔白喉初起並不發痧點即或見痧點亦多發於邪退毒輕之際其色淡紅而枯燥其異點三一喉痧初起喉紅腫黏涎繼即色現深紫或紫黑黃腐灰白不等白喉初起喉微痛或不癰有隨發而白隨現者有至二三日而白始見者有白腐假膜成片者有白點白條白塊不等者甚至有滿喉皆白者其異點四一喉痧初起皆毒盛大亢初陷則耳前後腫頰牟不開再陷則神昏譫語痙厥立至鼻扇音啞肺陰告竭而斃白喉初起即毒爍陰虛初潰則白塊自落鼻孔流血再潰則兩目直視肢厥神倦黏汗自出肺氣上脫而斃其異點五而其所殊途同軌者同為喉爛同為疫毒同為傳染同為毒盛血熱同為氣液兩傷陰津枯涸耳惟治療之法喉痧繁雜白喉簡單喉痧之繁繁在初治初治之雜雜在新邪蓋固喉痧一證雖由疫毒內伏其發也往往伏邪因新邪引動而出或因風寒或因瘟毒或因風熱風燥或因濕熱穢濁皆當查明原因對症發藥此案系瘟毒喉痧初用紫雪銀翹二方芳透解毒於前繼以竹葉石膏湯加減清涼透解為後盾處方步驟井然宜其應手奏效堪為溫毒喉痧之獨樹一幟風毒喉痧案丁甘仁住上海病者傅君年草餘歲住上海塘山路病名風毒喉痧原因傳染而得已有八天前醫之方皆是養陰清肺湯等類證候壯熱無汗微有畏寒痧麻隱約布而不顯面色紫暗咽喉腫腐滴水難咽煩躁泛惡日夜不安診斷脈郁數不揚舌苔黃膩余曰此喉痧誤認白喉也傅氏數房僅此一子老母少妻哭泣求救余對之曰症雖凶險正氣未敗尚可挽回療法隨投透痧解毒湯加枳實竹茹疏達開豁兼刺少商出血開閉泄火處方荊芥穗錢半淨蟬衣八分粉葛根二錢青連翹二錢紫背浮萍三錢炒牛蒡二錢炙殭蠶三錢淡香豉三錢嫩射干一錢輕馬勃八分包煎小枳實錢半鮮竹茹二錢生甘草五分前胡錢半效果一日夜服兩劑後即得暢汗麻痧漸布面色轉紅咽喉腫腐亦減連進數劑三四日即愈喉痧之證有汗則生驗之信然廉按治病必先其所因凡爛喉痧原因都由瘟毒吸入肺胃又遇暴寒折郁內伏腸胃膜原復觸時令之厲風而發其發也蘊蒸之毒瀰漫三焦幸而獲治則毒散而氣化不致牽連傳染不幸失治則毒聚成疫觸之即病以次遞傳甚至纍年不已如近日滬紹情形愈發愈盛迄今來之或息也陳氏所謂疫痧余氏所謂疫疹信矣其症重在痧子不重咽喉初起治法必先急與開達輕則如蟬衣牛蒡重則如麻黃蔥白之類其次驅風荊薄在所必需若已從火化者桑菊銀翹亦可參用又次開肺肺氣開則皮毛亦開自無壅滯不透之急故前桔射干亦為要藥又次解毒玉樞丹太乙紫金丹等又當兼用其他如杏仁橘紅之化痰青箬柳柳之循經速達皆為此症輔佐之良品此初起一二日之大概情形也至於二三日間外束之風寒已解內蘊之毒火方張涼瀉攻毒急急宜投如犀角鮮地川連生大黃風化硝金汁等尤為釜底抽薪之妙法腑氣通暢痧火自熄咽喉亦漸愈矣若仍執辛散開透之方則火勢愈熾腫勢方增腐亦滋蔓必至滴水下咽癰如刀割炎勢燎原殺人最暴遇有議用涼瀉者反以郁遏誹謗之此偏於發散開達之為害亦巨也總而言之要惟於先後次第之間隨機權變對症發藥斯為中其矣此案但用解肌透痧湯即愈者特其病勢之輕淺者耳春溫喉痧案袁桂生住鎮江京口病者牛筱川夫人忘其年住本鎮病名春瘟喉痧原因今年二月患喉痧症服藥不效遂邀豫診證候痧出鮮紅咽喉右邊破爛色紅而兼有白腐並不大腫顴紅唇紅身熱作惡湯水不能下咽診斷脈數舌前半紅赤無苔此陰液素虧感受溫熱為病療法先宜養陰清熱解毒外吹錫類散處方細生地三錢原麥冬三錢金銀花三錢紫花地丁三錢川貝母三錢白知母二錢生甘草五分青連翹三錢西藏橄欖三枚作煎劑次診次日上午九時復診述昨藥服後夜間能安睡兩小時熱減惡定能進茶湯仍用原方三診下午十時復診諸恙無大進退惟舌光紅無津片刻不飲茶則燥硬不柔身微熱不能寐蓋日間親戚問病者多言語勞神以陰虧之病驟然勞神則津液益虧腦力益衰而虛火亦益熾此所以舌本燥硬而光赤無津不能寐也非大劑養液安神之法斷難有濟乃以大劑增液湯為主三方乾地黃八錢原麥冬四錢元參六錢朱拌茯神四錢百合三錢鮮石斛三錢炒棗仁四錢甘草五分蓮子心四分四診第三日復診諸恙悉減喉爛亦退惟精神疲弱夜間不能多寐仍以原方減輕其劑並加茅根沙參地骨皮等藥五診接服兩劑喉爛全平身熱亦退痧亦脫皮但不思飲食舌淡無苔脈息軟小而兼有滑象蓋津液雖復胃氣尚虛乃以四君子湯加味五方潞黨參三錢生於術錢半雲茯苓三錢清炙草五分乾地黃三錢炒熟地炭四錢生穀芽二錢炒扁豆三錢湘蓮七枚效果調補旬日而痊康按喉痧有輕有重輕則溫邪僅在經絡疏而達之則痧透而喉痛即解重則疫火灼傷臟腑雖用疏達而痧出鮮紅喉爛起腐者以陰液素虧不耐疫火之熏蒸也余曾數見不鮮矣此案初方即用養陰清熱為君參以解毒繼用大劑增液安神終用益氣滋陰雙補陰氣以收全功純為陰虛者患春溫喉痧而設陳繼宣謂喉痧陰虛者灼熱無汗喉爛神昏痧紅成片舌絳且光陰液燥涸其斃甚速故其方不得不注重養陰清喉也冬溫喉痧案葉馨庭住黟縣南屏病者程崇和年逾弱冠住安徽黟縣業商病名冬溫喉痧原因腠理不密冬溫上受襲入肺胃證候咽喉上齶白點滿布有膠黏痰勢將潰爛飲食難下嘔吐口渴身熱便結肌紅髮疹診斷脈象弦數舌紅苔黃燥此冬令嚴寒寒極生熱襲入肺胃肺胃之火上衝即吐熏咽成痰阻礙咽喉故腫腐疼痛焉蓋手太陰之脈上從肺系足陽明之脈上循喉嚨故耳療法喉痧一證雖由肺胃之火上升而諸經之熱有以助之故用犀角石斛瀉心胃火牛蒡浙貝桔梗萬年青清肺利咽於上山梔元明粉推瀉於下生地丹皮川連清心肝馬勃人中黃消熱毒牛黃化熱痰每日煎藥兩次外治用冰硼散和紫雪丹頻吹喉內處方犀角尖八分銼末牛蒡子一錢苦桔梗八分焦山梔二錢鮮生地二錢鮮石斛三錢浙貝母二錢萬年青二片元明粉二錢粉丹皮一錢馬勃一錢人中黃二錢真牛黃三分末沖次方冰硼散和紫雪丹頻吹喉內效果上方服二劑喉痧見松嘔吐得止身熱已退大便亦解減去犀角牛黃丹皮元明粉等味加鮮蘆根五錢金銀花二錢甘草五分再服三劑則安然無恙矣廉按夏春農曰疫喉痧以三焦相火為發源以肺胃二經為戰場以吸受疫厲之氣為賤渠其證初起咽喉即腐或左或右或左右全腐其色或白或黃或紅或紫其痛或重或輕或不癰遍身熱如火燎皮膚紅暈如斑苔色或白或黃或灰黑或黏厚脈象或浮數或弦數或洪大或沉伏嘔吐氣喘神煩昏冒自利溲赤口乾唇紅躁亂驚惕或微惡寒面垢肢涼譫言搐搦輕者猶可救療重者多不逾三日而死何也緣手少陽三焦經與手厥陰心包絡經相為表裡三焦相火沸騰直犯心包故種糊不識人也前賢謂溫病首先犯肺逆傳心包豫謂疫喉痧三焦火炎直犯心包同一危疴奈病來倉猝成法無稽以致治者聚訟紛壇或謂先治其喉禁用寒涼或謂首重斑痧當宜升托然總難獲效不知疫癘之氣充斥三焦猝然而發咽喉一腐遍身皮膚紫赤如斑如痧並無顆粒可分世所謂爛喉痧是也考前賢以傷寒胃熱失下合君相二火尚為斑疹何況疫喉痧本是君相二火為害乎此疫喉痧之不宜升托也明矣且豫歷驗之於患疫喉痧者疫痧一回無不皮膚甲錯可見營血亢害已極每見投風藥升散過度者或幸不致斃然皮膚蒸熱逗留總不易清必須涼營清熱救陰之品日夜頻進大作湯液直待營陰來復而外熱始清是疫喉痧亦當以清透化毒涼營泄熱之法為正治不必分治喉治痧之先後也又明矣此案內外方法悉宗夏氏薪傳故能特收敏效爛喉疫痧案袁桂生住鎮江京口病者金平卿哲嗣年八歲住本鎮病名爛喉疫痧原因體質素瘦今年三月出痧痧後又生泡瘡至六月初旬又病喉痧發熱咽痛初由西醫蔣某治之用冷水浸毛巾罨頸項又用水浴法及服安知必林與鹽剝水漱喉等法均無效病勢益劇其嶽家童姓薦豫治時六月十五日也證候身熱咽喉兩旁上下皆潰爛腐穢口渴溲黃診斷脈息軟數舌紅無苔蓋陰液大虧熱邪燔灼於上焦也熱不難解惟咽喉全部腐爛而陰液虧耗斷非實證可比危險已極幸神不昏呼吸不促不煩躁尚可挽救療法內服以加味增液湯為主外以吹喉錫類散頻頻吹之先用淡鹽湯漱喉漱後吹藥金君自以體溫計置病人口中驗熱度已有一百零五度之高豫謂體溫計雖能驗熱度之高下然不能分虛實萬不可泥以論病若只准體溫計所驗之熱度以定治法則當用三黃白虎然就脈象舌色而論則不獨三黃白虎不可誤投即西藥中之退熱劑亦非所宜否則危亡立見噬臍無及矣金君韙之遂以豫方煎服焉處方鮮生地一兩原麥冬三錢元參三錢金銀花三錢肥知母一錢鮮石斛三錢天花粉二錢黃芩一錢青連翹三錢生甘草六分次診十六日復診四肢不熱身熱亦輕舌色紅豔而光毫無苔垢大便通利溲色黃濁言語多口不渴徹夜不寐喉爛如故脈息虛數原方去黃芩花粉知母鮮生地加西洋參棗仁茯神百合等品次方西洋參錢半炒棗仁三錢朱拌茯神三錢原麥冬三錢乾地黃五錢鮮石斛三錢元參三錢青連翹三錢生甘草六分金銀花三錢先用百合一枚煎湯代水煎藥三診十七日復診舌上紅色轉淡夜間能睡一二時譫語亦減咽喉上部腐爛較退惟下部及隔簾等處仍然腐爛精神疲憊脈息虛細無神是氣血大虛之候也急宜培補擬方以大補元煎合增液湯法惟吹藥仍用錫類散日吹數次三方西洋參二錢炒熟地炭四錢乾地黃四錢懷山藥三錢元參二錢鮮石斛二錢朱染茯神四錢麥門冬二錢人中黃四分四診十八日復診夜寐甚安譫語亦止稍能進粥湯喉爛減退大半脈息仍細弱無神仍用原方加味四方西洋參二錢炒熟地四錢乾地黃四錢朱茯神四錢懷山藥三錢元參二錢鮮石斛二錢原麥冬二錢人中黃四分湘蓮三錢女貞子三錢五診十九日復診喉爛全退用毛筆蘸水拭之腐物隨筆而出全部皆現好肉不比前數日之黏韌難拭矣脈息亦較有神而現滑象舌色仍淡無苔小便清能進薄粥仍用原方加減五方西洋參二錢炒熟地三錢乾地黃四錢朱茯神四錢元參二錢湘蓮三錢原麥冬二錢懷山藥三錢人中黃四分女貞子三錢扁豆三錢六診二十日復診飲食較多乃以原方減輕其劑接服兩日眠食俱安但忽又發熱或輕或重而熱之時間又不一致金君復以體溫計驗之仍在一百零五度及零三四度之間甚以為憂豫曰無恐也此氣血未能復原營衛未能調和而邪熱之內伏者仍不免有餘蘊耳且現在喉爛痊愈眠食俱安種種生機與七日以前之危險現狀相去不啻天淵乃以前方去熟地酌加青蒿佩蘭苡仁地骨皮等藥接服兩劑遍身發出白㾦如水晶如粟米而熱遂退飲食亦漸多但仍不能起床行立囑以飲食培養如雞鴨湯粥飯之類儘量食之自是遂不服藥效果越數日為其祖母診病此兒猶未能起床但飲食甚多每日夜須食六七餐至半月後始稍能行動一月後始能出臥室可以想見其病之危體之虛矣當其未能出臥室之時亦間有發熱便祕面目浮腫諸現狀皆未以藥治之此為病後應有之現象一俟氣血精神恢復原狀則自痊矣此病得瘥固由病家始終堅信旁無掣肘之人而夏君子雨贊助之力亦足多焉豫用熟地時病家不敢服慮其補也賴夏君為之解說蓋夏與金固舊交而亦精於醫者也廉按疫痧時氣吸從口鼻併入肺經氣分者則爛喉併入胄經血分者則發痧敵爛喉者色多白病在肺而屬氣發痧者色多赤病在胃而屬血其疫則一也一發於咽喉之地一達於肌表之間在肺則曰爛喉在胃則曰發痧是以名爛喉痧喉痧氣血同病內外異形其病根不外熱毒熱勝則腫毒勝則爛熱非清涼不解毒非芳香不除清涼解毒芳香逐穢治疫要領再視其氣質之虛實何如隨症而變通之此案為救誤而設純仿陰虛爛喉例治故以救陰為主略參解毒乃治爛喉疫痧之變法也爛喉痧案劉榮年住濟南東流水病者許童年十餘歲住省城病名爛喉痧原因外感風熱時毒而成證候喉中腫爛白腐頑涎甚多渾身大熱兼有疹子煩渴飲冷昏迷不識人大便閉結小溲短赤診斷脈象浮洪舌紅苔黃膩合參各證確係爛喉痧此緣外受風溫入於陽明上蒸於肺故咽喉潰爛兼有疹子正是溫熱欲出不得所致與白喉證之喉中乾燥五心煩熱者迥乎不同醫家泥於白喉忌表抉微一書以白喉法治爛喉痧專用滋陰之藥閉塞外邪使不得出故致神昏不識人夫風寒溫散風溫涼散凡是外感自無不用表散之理喉痧乃溫症最重之一端非用大劑清解何以驅此溫邪也療法內服湯藥外用吹藥葛根主身大熱煩渴用以為君佐以薄荷菊花以解其表再用石膏以清其里板藍根貝母土牛膝以清理咽喉鮮葦根以透發疹子雙花丹皮芍藥以為之使又因過服滋膩之藥再加栝蔞以治胸結又恐喉間腫甚不能下藥先用聖惠方地龍雞子白法以開喉閉外吹錫類散以治腐爛處方生葛根五錢白菊花二錢板藍根三錢土牛膝三錢金銀花二錢蘇薄荷二錢生石膏三錢搗川貝母三錢鮮葦根五錢粉丹皮二錢生白芍二錢全栝蔞三錢粉甘草一錢用水六茶碗單煮葛根成五茶碗再納諸藥煮成三碗分三次服又方聖惠方治喉閉法用鮮地龍一名蚯蚓俗名曲鱔一條研爛以雞子白即雞蛋清去黃用攪和灌入即通又方錫類散見尤在徑金匱翼王孟英溫熱經緯二書故不贅録效果服地龍後喉腫漸消飲水即不再嗆服藥後身熱漸退疹子漸消吹錫類散後白腐即隨涎而出次日即將原方減去葛根菊花薄荷共服藥三劑即行痊愈說明余憤時醫以白喉法治爛喉痧枉死者衆因將二症異點細心分辨徵之歷年經驗著有爛喉痧證治辨異一書廉按辨證明晰用藥切當惟此屬普通治法如現舌絳咽喉紅腫肌紅如錦音啞口乾灼熱神昏亦須大劑滋營增液清熱解毒之法不可執守成法為妥爛喉痧案丁甘仁住上海病者王君年二十歲本丹陽人客居滬上病名爛喉痧原因新婚之後陰液早傷適因喉疫盛行遂傳染而甚重證候痧雖布壯熱不退煩躁不寐湯飲難咽診斷延余診治病已七天切脈弦洪而數舌鮮紅起刺余曰此溫疫之邪化火入營劫津傷陰內風欲動勢將痰湧氣喘危在旦夕間矣療法急投犀角地黃湯清營解毒為君竹葉石膏湯清氣達邪為臣佐以金汁珠黃散清喉制腐使以竹瀝清潤滌痰處方磨犀粉五分赤芍二錢青竹葉三十片金銀花三錢鮮生地八錢丹皮二錢生石膏八錢研細青連翹三錢金汁二兩分沖淡竹瀝一兩分沖珠黃散珠黃琥珀各七分西黃五分西瓜霜一錢藥湯調下先用活水蘆筍二兩同生石膏煎湯代水效果疊進二劑諸症大減調理數日而痊廉按丁君案後自注云行道數十年診治爛喉痧不下萬餘人方不外汗清下三法其汗法約有四方一為解肌透痧湯荊芥穗錢半淨蟬衣八分嫩射干一錢生甘草五分粉葛根二錢炒牛蒡二錢輕馬勃八分苦桔梗一錢前胡錢半連翹殼二錢炙殭蠶三錢淡豆豉三錢鮮竹茹二錢紫背浮萍三錢如嘔惡甚舌白膩加玉樞丹四分沖服專治痧麻初起惡寒發熱咽喉腫病妨礙咽飲遍體痠病煩悶泛惡等證痧麻見咳嗽為輕無咳嗽為重二為加減麻杏甘膏湯淨麻黃四分生石膏四錢象貝母三錢鮮竹葉三十張光杏仁三錢射干八分炙殭蠶三錢白蘿蔔汁一兩生甘草六分連翹殼二錢薄荷葉一錢京元參錢半專治痧麻不透憎寒發熱咽喉腫癰或內關白腐或咳嗽氣逆之重證三為加減升麻葛根湯川升麻五分生甘草五分連翹殼二錢炙殭蠶三錢粉葛根錢半苦桔梗一錢金銀花三錢鮮荷葉一角薄荷葉八分京赤芍二錢淨蟬衣八分蘿蔔纓三錢專治痧麻雖布而頭面鼻獨無身熱泄瀉咽痛不腐之症四為敗毒湯荊芥穗錢半薄荷葉一錢連翹殼三錢生蒲黃三錢生石膏四錢炒牛蒡二錢象貝母三錢益母草三錢生甘草六分京赤芍三錢炙殭蠶三錢板藍根錢半如大便泄瀉去牛蒡石膏加葛根黃芩黃連專治痧麻未曾透足項頸結成痧毒腫硬疼痛身熱無汗之症其清法亦有四一為加減黑膏湯淡豆豉三錢薄荷葉八分連翹殼三錢炙殭蠶三錢鮮生地四錢生石膏四錢京赤芍二錢淨蟬衣八分鮮石斛四錢生甘草六分象貝母三錢浮萍草三錢鮮竹葉三十張茅蘆根各一兩專治疫邪不達消爍陰液痧麻布而不透發熱無汗咽喉腫紅焮痛白腐口渴煩躁舌紅絳起刺或舌黑糙無津之重證二為涼營清氣湯犀角尖五分磨沖鮮石斛八錢黑山梔二錢牡丹皮二錢鮮生地八錢薄荷葉八分川雅連五分京赤芍二錢京元參三錢生石膏八錢生甘草八分連翹殼三錢鮮竹葉三十張茅蘆根各一兩金汁一兩沖服如痰多加竹瀝一兩沖服珠黃散每日服二分專治痧麻雖布壯熱煩躁渴欲冷飲甚則譫語妄言咽喉腫痛腐爛脈洪數舌紅絳或黑糙無津之重症三為加減滋陰清肺湯鮮生地六錢細木通八分薄荷葉八分金銀花三錢京元參三錢川雅連五分冬桑葉三十張連翹殼三錢鮮石斛四錢甘中黃八分川貝母三錢鮮竹葉三十張活蘆根一兩去節如便閉加生川軍三錢開水泡絞汁沖服專治疫喉白喉內外腐爛身熱苔黃或舌質紅絳不可發表之症四為加減竹葉石膏湯青竹葉三十張桑葉皮各錢半金銀花三錢鮮葦莖一兩去節生石膏六錢光杏仁三錢連翹殼三錢白蘿蔔汁一兩生甘草六分象貝母三錢冬瓜子四錢專治痧麻之後有汗身熱不退口乾欲飲或咽痛蒂墜咳嗽痰多等症其下法亦有四或單用生川軍汁苦寒直瀉或並用硝黃鹹苦達下或兼用涼膈散發表攻裡肅清三焦之邪熱或重用陳金汁以濁泄濁且有防腐止爛之效能究其來歷大都從陳氏疫痧草夏氏疫喉淺說曹氏喉痧正的三書脫化而出已扼喉痧證治之大要矣喉痧兼熱入血室案丁甘仁住上海病者劉婦年二十歲住虹口靶子路病名喉痧兼熱入血室原因肝絡伏熱感染喉痧適值經行之際前醫以其壯熱神糊早投鮮生地鮮石斛蘆茅根等甘寒涼遏而病轉內陷證候初起痧麻雖布麻色紫暗發熱煩躁夢語如譫咽喉腫腐不能咽飲繼則腹中絞痛少腹結塊大便溏泄壯熱即衰痧點即隱讝語撮空牙關拘緊痰多氣粗診斷脈空數無神亦不能視其舌色余斷之曰此溫疫之邪已陷入三陰血凝毒滯殘陽欲絶無藥可救效果於是晚而歿噫前哲謂早投寒涼百無一生過用疏散尚可挽回益信然矣廉按此固伏熱內發疫毒外激遂致血熱妄行而經水適來此時救濟之法當然以疏達透毒活血通絡為首要遵內經火鬱則發之例乃反以陰凝清滋之鮮地鮮斛逼疫毒內陷三陰勢必血凝毒滯內閉外脫釀咸必死之逆候雖有盧扁亦望而卻走矣此案可為擅用鮮地鮮斛者炯戒爛喉丹毒案姜德清住平度北七里河病者喬升禮年四十餘住東北鄉喬家屯病名爛喉丹毒原因平素無病因多食炙煿辛熱致肺胃熱盛驟感風熱而病發證候身發灼熱神氣怯弱四肢沉重胸膈板悶不欲飲食胸脅大小腹內夾核如杏核大小長短不一約十數個按之不痛咽喉微爛診斷六脈沉數舌紅苔黃脈證合參此爛喉丹毒也其病之發原由於胃胃居膈下而胃之食管在膈上與喉管相近因而纍及於肺肺有毒則發痧胃有毒則發斑肺胃二經毒火熾則外露丹痧此胃毒甚故只見丹不見痧療法外敷湯丸並進令其先吞六神丸一次再用清瘟敗毒飲以生石膏為君重清胃熱犀角川連黃芩連翹元參泄心肺之火為臣丹皮赤芍梔子生地知母涼血行瘀泄肝經之火為佐殭蠶牛蒡子絲瓜絡通十二經為使外用鮮絲瓜搗敷處方牛蒡子三錢杵白殭蠶二錢絲瓜絡三錢知母六錢鮮生地八兩搗汁焦梔子三錢赤芍三錢丹皮三錢連翹三錢元參八錢黃芩三錢小川連四錢犀角一錢生石膏二兩水煎日服二次外吹錫類散效果一診稍輕二診大減三診將原方加鮮石斛鮮大青各三錢去蒡蠶芩連石膏六日痊愈廉按名雖爛喉丹毒實系核疫之一種與西醫所稱腺百斯篤相類方用余師愚清瘟敗毒飲吹錫類散內外並治卻有效力方中再加調玉樞丹芳透解毒則效當更速矣喉痧變爛喉案丁甘仁住上海病者葉婦年二十餘歲住上海澄衷學校病名喉痧變爛喉原因侍其夫喉痧而得此疾前醫恐其亦出痧麻連進辛涼透解未敢驟用滋陰清降毫無應效病反轉重證候身熱甚壯咽喉腐爛湯飲難進煩悶口渴繼則發熱更甚躁擾不安起坐如狂甚至譫語妄言咽喉間滿腐蒂丁去其大半口唇焦燥診斷脈洪數有力舌灰黃此疫毒由口鼻直入肺胃悉從火化由氣入營傷津劫液內風欲動勢將痙厥也療法急投犀角地黃湯涼營解毒為君佐竹葉石膏湯清燥救肺加減數味合而為涼營清氣之劑處方犀角尖五分磨汁沖鮮生地八錢京赤芍二錢粉丹皮二錢川連五分鮮石斛八錢京元參三錢生石膏八錢焦山梔二錢薄荷葉八分青連翹三錢生甘草八分鮮竹葉三十片陳金汁一兩沖先用鮮茅根蘆根各一兩煎湯代水每日服珠黃散二分效果一日夜連進四劑即熱退神清咽喉腐爛亦退三四日即愈似此危險重證得慶更生亦可謂幸矣可見有痧麻而喉不腐者有之喉腐而不出痧麻者亦有之廉按此因喉痧遺毒以致血毒內漬肺葉受灼而喉乃白爛涼營清氣治法適當似此佳案足為後學師範惟犀角石膏金汁等三味尚可酌加用量力圖速效否則杯水車薪藥雖對症尚恐不足以勝病雖然此際之調劑全在醫者診斷之精確用藥之膽識也
