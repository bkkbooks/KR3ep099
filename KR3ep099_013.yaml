body:
  text: 第十三卷時行瘄疫病案春溫時瘄案周小農住無錫病者榮成鰲次子年八歲住錫山病名春溫時瘄原因素因先天不足九月而產平日肝旺或目赤牙痛現因暮春瘄疫盛行傳染而得證候瘄未齊而已回熱經二旬有餘顴紅目於鼻燥口渴咳痰韌黃必須以手探取暮則氣逆不舒懊煩少寐鼻不覺暖按腹臍則甚痛溲短而赤便艱不爽耳聾有膿診斷脈數而重按無力舌絳苔有白糜此由溫邪夾痰夾積留戀熏蒸熱久傷陰痧癆堪虞療法宗吳鞠通法以兜鈴天冬焦梔丹皮杏仁貝母枇杷葉冬瓜子蘆茅根等肅肺清熱為君元參生地石斛沙參茯神生津安神為臣兼以珠粉雄精月石辰砂竹瀝梨汁蘿蔔汁等化痰潤下為佐處方馬兜鈴一錢淡天冬一錢焦山梔一錢牡丹皮一錢光甜杏仁各一錢浙川貝各一錢元參二錢細生地二錢鮮石斛錢半北沙參二錢辰茯神錢半先用鮮茅根一兩去衣活水蘆根一兩去節鮮枇杷葉一兩去毛筋淨鮮冬瓜子一兩四味煎湯代水另方濂珠粉制雄精西月石飛辰砂各一分研和用竹瀝梨汁生蘿蔔汁各一瓢重湯燉熱候溫送下次診服二劑得眠頗安大便初堅黑後溏氣逆已平痰仍韌黃鼻柱已暖竅仍干晡熱尚久則增煩懊餘熱熏蒸五液均干脈數苔糜尖紅而碎此因稚體陰氣素虧去臘少雪目赤甚久即其機倪再存陰退熱清化熱痰而止蒸糜處方鮮沙參二錢鮮石斛二錢鮮生地三錢淡天冬一錢元參三錢原麥冬一錢粉丹皮錢半冬瓜子三錢肥知母二錢花粉錢半光甜杏仁各錢半枯黃芩一錢玉泉散二錢包前先用活水蘆根鮮茅根鮮枇杷葉各一兩鮮淡竹葉三錢煎湯代水另方濂珠粉制雄精各一分川貝三分共研和仍以竹瀝梨汁萊菔汁各一瓢燉溫調服三診連服三劑舌糜漸化身熱得暢汗而解惟便復閉原方去枯芩花粉玉泉散加金沸草包煎紫菀各一錢火麻仁錢半鮮首烏錢半瓜蔞皮三錢四診進兩劑便復解熱清而苔糜淨顴紅除兩目潤鼻生涕咳大減痰亦少耳略聰膿亦止惟裡熱掌灼脈靜轉細舌紅布新苔可進養陰以善後處方川石斛二錢細生地三錢鮮首烏錢半淡大冬一錢原麥冬一錢元參錢半粉丹皮一錢蘇百合一錢天花粉一錢火麻仁錢半甜杏仁錢半冬瓜子二錢鮮枇杷葉四錢去毛筋淨效果三劑而裡熱淨胃氣醒日漸向愈而復元廉按瘡為麻疹之俗稱浙江名瘩子江蘇名疹子名雖異而治則同必先察乎四時之氣候隨其時氣之勝復酌以辛勝或辛涼及甘涼苦辛淡滲鹹寒等法對症發藥隨機應變名其病曰時瘄者以其因時制宜辨其為風溫為濕溫為暑濕為燥熱為伏邪仍以時感法清其源耳風溫時瘄案何拯華紹興同善局病者俞四姑年六歲住紹興昌安門外瓦窯頭病名風溫時瘄原因暮春暴熱肺感溫風而發證候頭痛身熱惡風自汗繼即頭面項下均見紅疹隱隱咳嗽氣逆神煩少寐診斷脈右浮滑數左浮弦舌邊尖紅苔薄白此葉天士所謂溫邪上受首先犯肺熱入孫絡而成疹也療法從上焦治以薄荷蟬衣牛蒡連翹辛涼散風為君桑葉銀花蔞皮箬葉輕清透疹為臣佐以前胡使以桔梗開降疏達以宣暢肺氣也處方蘇薄荷八分淨蟬衣七分炒牛蒡錢半青連翹錢半前胡一錢濟銀花一錢栝蔞皮一錢冬桑葉錢半青箬葉三錢桔梗六分效果二日疹雖透足而咳甚氣急口渴引飲原方去薄荷蟬衣桔梗加生石膏四錢知母二錢甜梨皮三錢枇杷葉五錢連進二劑至第五日熱退身涼氣平咳減前方再去石膏牛蒡前胡加川貝二錢鮮石斛二錢蔗漿兩瓢連服三日咳止胃動而痊廉按小兒風溫發疹四時皆有而以春冬兩季為最多其病從傳染而來吾紹謂之時瘄又稱麻疹蘇州謂之疹子又名痧子暇時遍查字典並無瘄字辭源謂痧為麻疹之俗稱余謂瘄亦麻疹之俗名名稱因地方而異方藥以因證而殊同一時瘄當按四時法治春時用春溫法夏時用暑風法秋時用秋燥法冬時用冬溫法初起用辛涼開透法液燥者佐甘寒如鮮生地鮮茅根之類挾濕者佐淡滲如生苡仁浙茯苓之類火盛者佐鹹寒如犀角羚角金汁之類至於俗傳單方如棉絲線櫻桃核銅板草紙等最為大忌奉勸病家切勿以最憐愛之嬰孩斷送生命於有百害無一利之土方也此案風溫時瘄理當用春溫法治方亦輕清靈穩從葉法脫化而出惟牛蒡子為透發瘄疹之要藥若初起作嘔者用之嘔更甚然經謂在上者因而越之風痰嘔出瘄反出透亦不必怕若怕其嘔加白蔻仁三四分即不嘔大便瀉者兒科方書皆禁用以牛蒡子多油善能作瀉也然瘄將出而作瀉者不藥可愈亦不必禁若瘄後水瀉用甘寒復以淡滲加銀花炭最妙慎勿用溫熱提補如理中湯等誤用反危往往咯血便血不可救藥矣風溫疫痧案孫少培住南京倉巷病者夏玉笙之女公子年二歲鳳陽關司事住南京土街口病名風溫疫痧即疹原因因乳食不濟飼以牛乳又酷嗜香甜之品風溫病頭面見痧服升達劑轉劇證候風溫七八日熱壯無汗晝夜煩躁飲水無度兩足逆冷腹痛脹得瀉稍松少頃又脹痧點僅見於頭面自頸以下無點氣喘鼻扇喉音乾澀血上溢細視其面部痧點乾紅焦萎有退縮之象周身全無點粒身半以上發熱身半以下冰冷腹膨氣喘目瞑眵多鼻血咯血時而索飲時而下利晝夜如是不能安枕逆象已見診斷脈細數少神審察前醫所用方劑類皆升發藥品費建中氏有云放點時而升發者理也執升發於放點時者障也蓋痧證本由熱邪遏郁所化古人謂痧本於陽而生於陰內經曰陽主天氣陰主地氣本乎天者親上本乎地者親下今痧點但擁於頭面而不見於正身是但親其上而不親其下用藥僅執一升發為不二法門是不明剝復之道也經云亢則害承乃制又曰病在上取之下證勢本屬棘手所幸兩手之脈尚不散亂而所見逆象純是藥誤尚有一線生機欲挽救此證猶逆水行舟有稍縱即逝之勢用大劑涼血清金之品以冀挽回於萬一療法湯液療法鮮生地有涼血止血之功用以為君生石膏黃芩有滌熱清金之妙均屬肺家要藥肺與大腸相表裡用以導熱下行為臣玄參清熱解毒梔子能去曲折之火用以為佐夏枯草能開火府之閉用以為使外加梨汁藕汁各一酒杯並鮮生地汁和入緩緩喂之處方鮮生地半斤榨汁和服生石膏一兩研細黃芩二錢玄參四錢黑山梔三錢夏枯草三錢梨汁藕汁各一酒杯和服效果上藥分為數次頻頻灌之服藥甘之如飴甫及半躁亂略平次晨藥已灌完便能熟睡至日中始醒知索乳視其正身痧點甚密兩足轉熱亦有點復診舉家歡慰視為奇事擬一清化之方為之調理越數日痊愈廉按葉氏謂春令發痧從風溫濕夏季從暑風或從暑濕秋令從熱爍燥氣冬月從風寒或從冬溫痧本六氣客邪風寒暑濕必從火化痧既外發世人皆云邪透孰謂出沒之際升必有降勝必有復常有痧雖外發身熱不除致咽啞齦腐喘急腹脹下痢不食煩躁昏沉竟以告斃者皆屬裡證不清致變須分三焦受邪孰多或兼別病累瘁須細體認此案風溫疫痧當以辛涼開肺為首要乃服升達劑轉劇者大抵前醫執用古方如升麻葛根湯荊防敗毒散等升散太過痧毒上衝以致喉干氣喘鼻衄咯血面部痧點乾紅焦萎變證蜂起方用大劑涼血清金力圖挽救處方固屬雄健診斷多所發明真膽識兼全之佳案也夏熱瘟疹案張錫純住天津病者友人朱貢九君之哲嗣交治年五歲住奉天北關病名夏熱瘟疹原因素有心下作疼之病於庚申立夏後因傳染而出疹貪食鮮果證候周身壯熱疹甚稠密咳嗽喘逆氣粗喉疼診斷脈甚洪數舌苔白厚舌其疹而兼瘟也療法因前一日猶覺作痛不敢投以重劑姑用辛涼輕劑以清解之處方生石膏六錢搗細元參六錢薄荷葉一錢青連翹二錢蟬蛻一錢次診晚間服藥至翌日午後視之其熱益甚喉疼氣息甚粗鼻翅扇動且自鼻中出血少許有煩躁不安之意不得已重用石膏為君仍佐以發表諸藥次方生石膏三兩搗細玄參四錢原麥冬四錢薄荷葉一錢青連翹三錢三診翌日視之則諸證皆輕減矣然餘熱猶熾其大便雖下一次仍系燥糞詢其心猶煩熱脈仍有力遂於前方涼解藥中仍用生石膏一兩效果連服兩劑壯熱始退繼用涼潤清解之劑調之痊愈說明疹證多在小兒想小兒臟腑間原有此毒又外感時令之毒氣而發一發則表裡俱熱若溫病初得之劇者其陽明經府之間皆為熱毒所瀰漫故治此證始則辛涼發表繼則清解其有實熱者皆宜用石膏至喉疼聲啞者尤為熱毒上衝石膏更宜放膽多用惟大便滑瀉者石膏知母皆不宜用可去此二藥加滑石一兩甘草三錢蓋即滑瀉亦非涼證因燥渴飲水過多脾胃不能運化故也故加滑石以利其小便甘草以和其脾胃以緩水飲下趨之勢若其滑瀉之甚者可用拙擬滋陰宣解湯滑石一兩包煎甘草三錢連翹三錢蟬退三錢去足土生杭芍四錢淮山藥六錢生打既可止瀉又可表疹外出也然此證最忌滑瀉恐其毒因滑瀉內陷即無力托毒外出矣是以愚用大劑寒涼治此等證時必分三四次徐徐溫飲下俾其藥長在上焦及行至下焦其寒涼之性已為內熱所化自無泄瀉之弊也而始終又須以表散之藥輔之若薄荷連翹蟬退殭蠶之類如清疹湯生石膏一兩搗細知母六錢羚羊角二錢金線重樓三錢切片薄荷葉二錢青連翹二錢蟬退錢半去足土殭蠶二錢鮮葦根四兩活水中者更佳先煎代水則火消毒淨疹愈之後亦斷無他患矣至若升麻羌活之藥概不敢用廉按張氏自述云此證初次授以生石膏玄參各六錢其熱不但不退而轉見增加則石膏之性原和平確非大涼可知也至其證現種種危象而放膽投以生石膏三兩又立能挽回則石膏對於有外感實熱諸證直勝金丹可知若因心下素有痛病稍涉遊移並石膏玄參亦不敢用再認定疹毒宜托之外出而多發表之品則翌日現證之危象必更加劇即後投以大劑涼藥亦不易挽回也目睹耳聞知孺子罹瘟疹之毒為俗醫藥誤者甚多故於記此案時而再四詳為申明願任救人之責者尚其深思愚言哉觀此則凡屬瘟疹皆由口鼻感染疫氣熏蒸肺胃故當以清解瘟毒為君發表透疹為輔如張氏清疹湯一方為治瘟疹之良法案後說明語多精確堪為後學師範夏熱疫點案錢赤楓住東臺青蒲莊病者沈伯陽子年未周歲住東臺羅村病名夏熱疫點俗名痧子亦名疹子又名麻子又俗名痧斑原因五月間發有疫點解托未透時靨時現前醫疊治依然如故證候遍身疫點紅而夾紫右目焮腫身熱如灼神煩喘喝乳汁不進大便秘結診斷疫點系六淫之氣混淆不分變為一種癘疫發是點者沿門傳染若役使然經云丑未之歲二之氣溫癘大行遠近咸若又云少陽司天客勝則丹疹外發又云少陰有餘病皮痹隱疹此兒疫點初見由前醫誤用燥烈溫散津被熱劫絡邪未解肺胃反受其災所以疹點紅而夾紫證變危篤此時非大隊辛涼苦甘鹹寒急清肺胃之熱斷不能化疫毒於無形起沉疴於片晌也療法立進自制瘟疫復生湯蓋疫點久延梟毒已甚故用石膏知母黃芩蘆根直入肺胃二經使其敷布於各臟各腑清其疫熱再以犀角羚羊黃連丹皮山梔清心肝之疫火蔞皮蔞根貝母竹葉竹茹清肌絡之熱元參麥冬既能清熱又有救陰單以一味人中黃解其疫毒使之從濁道而出共成解疫清熱之功彼時有議其人小藥重請減分兩愚曰杯水車薪焉能濟事遂令急煮兩頭煎陸續用茶匙灌之處方生石膏八錢黃芩錢半犀角四分磨服羚羊角四分磨服小川連五分粉丹皮三錢生山梔三錢連心麥冬三錢瓜蔞皮根各三錢元參三錢人中黃三錢川貝母三錢竹葉三十片竹茹錢半蘆根一兩同石膏煎代水效果服前方一劑便通點色轉紅目腫微消二帖神安知吮乳點漸回靨去犀角羚羊加連翹銀花各三錢接服二帖去黃連加赤芍二錢前後計進石膏八帖後以此兒祖父禁止用石膏並止服藥疫毒未清臑部發癰潰後服藥調理而愈廉按此即余師愚所謂疫疹王孟英所謂瘄疫也方亦從清瘟敗毒飲加減卻是對證友藥如病勢極重已成悶瘄者必先用紫雪辛涼芳透始能轉危為安去年冬及今年春吾紹此證盛行能用此種方藥者輒多幸全若初起誤服俗傳粗草紙櫻桃核棉紗線等單方者每不及救秋溫疫瘄案汪竹安住紹興斷河頭病者滕姓男孩年四歲住東陳鄉病名秋溫疫瘄原因時瘄失潮證候患瘄六日未噴氣急口燥唇赤聲嘶便溏尿短診斷脈數舌赤深恐內陷病變迭出療法清宣達表以透瘄處方葦莖八分安南子三枚炒車前三錢京川貝錢半去心鮮竹茹三錢瓜蔞皮二錢大力子錢半青連翹二錢蜜炙橘紅六分青箬尖三錢次診時瘄至七日尚未得噴氣急口燥兼有臭惡涕淚全無便沫尿短脈象緊盛舌肉乾赤最防咬牙痰湧等變證治以清透營熱開達肺氣犀羚白虎合二鮮加味次方活水蘆筍一兩犀角片五分羚角片八分三味先煎代水鮮生地三錢鮮石斛二錢生石膏三錢研細生甘草三分炒知母錢半大力子錢半前胡錢半紫草四分桔梗五分三診時瘄內陷氣急聲啞嘔蟲涕淚仍無神昏囈語大便較少脈仍數舌肉乾燥病勢仍凶仿前法出入以消息之三方肥蘆筍一兩銀花露半斤二味先煎代水羚角片八分鮮生地四錢鮮石斛二錢生石膏四錢研細炒知母錢半元參三錢生甘草三分西紫草五分四診氣急稍平身熱如恆涕淚仍無唇舌燥裂大便不多深恐瘄毒凝結肺胃陡變內閉外脫勉擬宣上清中導下三焦兼治四方蜜炙麻黃三分生石膏四錢研細光杏仁三錢西紫草三分生甘草三分京川貝錢半去心紫雪丹二分沖小枳實八分栝蔞仁三錢烏元參三錢鮮生地六錢銀花露半斤羚角片八分二味先煎代水五診昨藥服後身熱氣急輕減惟涕淚尚無大便未下舌肉紅白相兼脈象轉出細數病勢稍有轉機宗前法減去羚角五方蜜炙麻黃三分鮮生地六錢生石膏四錢研細光杏仁三錢栝蔞仁三錢杵鮮石斛二錢生甘草三分炙枳實錢半青連翹二錢紫雪丹一分半沖銀花露一斤代水煎藥六診氣急已退身熱亦輕涕有淚少便下較多舌苔色赤尚有瘄毒留伏再能發㾦庶無大礙治以清胃滋營解毒透伏為要六方鮮生地四錢鮮石斛二錢金汁水一兩分兩次煎沖炙枳實一錢廣鬱金二錢生打金銀花三錢焦梔子三錢淨楂肉三錢淡芩錢半七診營熱雖減肝腎起炎發生咬牙口燥欲睡不安苔潤脈數治以清肝胃救腎水七方鮮大青葉三錢鮮生地四錢鮮石斛二錢淡黃芩錢半元參三錢生白芍二錢京川貝錢半去心炒知母錢半瓜蔞皮二錢炒楂肉三錢八診依然身熱煩躁口乾咬牙脈浮數舌乾絳治以解毒清熱八方銀花二錢青連翹錢半陳皮五分竹瀝半夏錢半杭菊二錢桔梗四分大力子二錢淡芩一錢生甘草細梢三分鮮竹茹三錢九診瘄後伏熱消爍陰液口乾咬牙牙床兼糜化為瘄後疳證脈仍浮數舌仍兼絳治以清化胃肝制火壯水為要九方羚角片八分元參心三錢生白芍二錢陳山萸二分丹皮錢半北沙參二錢人中白五分杵鹽炒麥冬錢半鮮石斛錢半杭菊二錢外用珠黃散敷吹疳患處十診咬牙告退身熱亦除鼻有涕來牙肉尚兼糜腫苔肉滋潤脈象數減病無所礙看護謹慎靜以調養可也治以增進胃液清化伏熱十方鮮生地四錢鮮石斛二錢北沙參三錢生白芍錢半通草一錢金銀花三錢炒知母錢半大腹皮二錢生甘草三分效果連服四劑諸證悉除而愈廉按疫瘄變幻不亞於疫痘此案前後十方雖皆對證發藥而著力全在二三四五四方故能反掌收功病機治法賅括已盡此真扼要制勝瘄疫之綱領也冬溫麻疹案蘭豁中醫專校畢業生何益贊蔡濟川會診病者沈湘漁孫女年十三歲住蘭谿城中病名冬溫麻疹原因勤於女工往往深夜篝鐙針黹髫齡稚陰未充肺胃陽邪易動又值冬陽不藏至節將屆一陽初萌午夜圍爐以火引火遂發冬溫初起身熱無寒頭痛咽喉微痛咳嗽不揚胸膈氣懣先延某醫診視授疏風清熱降火之劑以病家告知大便三日不行徑投生大黃二錢服之泄瀉如水喉痛頓瘳而頭痛益劇身熱尤熾肺氣仍閉呼吸俱艱證候肌膚色紅麻疹稠密周身骨節痛痹不能轉側支節亦不能屈伸甚至面目亦浮手臂膚腫指掌麻木不可以握診斷脈數且大獨右寸不顯舌色尖邊皆紅中心後根黃苔頗膩此仲景所謂太陽病發熱不惡寒者為溫病成聊攝注謂發熱不惡寒為陽明者此也查閱某醫處方用牛蒡射干桑葉菊花丹皮藍根二陳等味以大便未行遽加生軍若干服後大便水泄喉痛雖除但稚齡真陰尚弱徑與直瀉陰氣先傷陽熱浮越遂令頭痛加甚體熱益高夜不成寐證情漸劇蓋病在肺胃法宜輕宣而乃重濁通府直攻其下已過病所原非正治二十六日上午乃招餘二人同往視之療法只宜開宣肺郁即能透疹解肌佐以泄熱滌痰便是疏通胸膈又不可寒涼直折反致閉遏藥貴輕清庶合分寸處方瓜蔞皮錢半白蒺藜二錢生紫菀二錢廣鬱金錢半生打浙茯苓錢半酒炒黃芩錢半浙貝母二錢苦桔梗錢半光杏仁二錢勿研焦梔子二錢廣陳皮一錢路路通二錢去刺次診廿六日午後診視是日節交冬至葭管灰飛陽氣萌動病體應之勢難退舍午後三時又偕同湘漁先生往視正在陽明旺於申酉之交體熱烙手頭痛大劇體痛且木不可屈伸肌膚不仁腕臂俱腫十指浮脹手不能握紅疹稠密面部亦浮詢得腹背皆紅疹俱滿布惟膝脛以下未遍脈數且洪弦勁搏指右手寸部亦起唇色鮮豔有若塗朱舌尖邊深絳中心後根黃濁之苔皆化幾於全舌殷紅但不燥渴引飲齒齦紅胖頰車不利舌本頑木而顴亦紅可知肺家鬱熱已漸透露於肌膚之表但咳猶未爽呼吸仍艱則肺氣猶未宣通而陽明之胃火大熾痰熱互結且令肝膽陽邪乘機恣肆升多降少互為糾纏總之冬令久晴燥火用事加以客氣司天正值陽明在泉主令尤助燥金氣火致令肺藏失其清展之權仲師麻杏甘膏成法正為是證針對良劑當援引經方參合開痰泄壅兼用喻氏專清肺火之意倚重黃芩桑皮清肅肺家燥熱弗疑支節痹著誤投風藥活絡反以助桀為虐庶幾擊其中堅首尾自能互應次方陳麻黃五分生甘草四分生石膏六錢研細光杏仁三錢天竺黃三錢陳膽星錢半枯黃芩四錢生桑白皮四錢瓜蔞皮二錢鮮葦莖五錢象貝母三錢焦梔子二錢三診二十七日上午診視表熱大減僅未全退膚腫已減疹亦漸回而足部亦已透達臂腕赤色漸化頭痛未蠲木火猶潛身痛未盡已緩十五昨宵安眠四小時大便仍溏小溲已暢均是佳境但肺家呼吸猶未安和咳嗽聲揚猶未大爽則燥金未盡清肅氣火未盡潛藏脈之弦勁已和惟滑數未靜舌之紅豔已減而滑澤無苔蓋津液受燥熱之累余焰猶慮復然大府雖通而矢氣頻轉則陽明氣結未宣腸中必有燥矢未去所謂熱結旁流確有明證仍當宣展呼吸之機兼以滌除痰濁和柔肝木之旺且以顧護胃津尤須佐之化滯以助消磨俾兩陽明府下行為順庶能氣不升騰火焰潛降諸恙漸以即安若夫脈絡未和痹著未去則止當偶涉一筆以為之使聊助點綴當能捷登泰境就我範圍三方石決明八錢生打金石斛三錢二味先煎生紫菀三錢象貝母三錢苦桔梗錢半光杏仁三錢勿研炒薤白頭二錢陳膽星錢半羌活四分獨活四分瓜蔞皮二錢陳麻黃三分生甘草三分炒神麯二錢焦楂肉二錢四診二十八日午前診視昨方一服日人夜半兩度更衣鶩溏之中夾以堅粒數塊可知宿滯未去恰符逆料今雖身熱未淨然已退十之八九咳嗽清揚頰車便利呼吸俱順滿悶胥蠲是肺金已復清宣之職痰熱俱得泄化惟胃猶未醒矢氣仍轉腹鳴漉漉則腸中余滯尚有留存且支節猶痛轉側猶未自如紅疹已化七八肌膚之浮猶存一二此為熱邪痹著絡脈未和脈雖尚數然較之昨晨已非其比內熱退舍一望可知舌紅不赤滑潤無苔亦不燥渴雖是餘熱未盡卻非寒涼所宜只須清宣絡脈以化餘邪仍應稍參導滯庶乎陳莝去而胃納來復四方左秦艽二錢羌獨活各四分全當歸錢半川斷肉二錢宣木瓜錢半威靈仙錢半生紫菀二錢象貝母二錢瓜蔞皮二錢海桐皮二錢桑寄生二錢焦六曲二錢焦楂肉二錢炒麥芽錢半五診二十九日服藥後自思粥飲身痛漸安日入時已能轉側大便又行仍有堅屎但支痛未淨尚有矢氣即以昨方去楂炭又減神麯麥芽各三之一連進一劑身熱盡退頭痛胥蠲膚腫俱消疹亦全化起坐便利肢節皆和胃納漸醒能啜稀粥但微有燥咳而不咳痰脈已靜穆舌滑無苔自云睡醒口燥思得茶飲是胃已安和惟肺家差有餘熱清養肺胃弗遽呆補善後良圖已為能事但尚需暫避肥膩礙化之物方為盡善盡美五方小生地三錢象貝母二錢生紫菀二錢生桑皮二錢北沙參二錢鮮竹茹二錢柔白前二錢雲茯苓二錢橘紅一錢生雞內金錢半炒穀芽錢半砂仁殼五分原支金釵斛三錢弗炒擘開先煎效果連服四劑諸證悉平胃健神安而愈說明此證在二十六日午後熱勢最劇身痛尤甚苟以尋常理法言之未有不大劑清熱而兼以通經活絡為要務者然須知此皆麻疹未得透泄之時所當應有之證觀其咳聲不揚呼吸短促都緣肺氣團窒皮毛衛氣亦不得宣展所以麻疹尚未外達則膚腠壅遏熱勢益熾而脈絡亦痹此肢節疼痛之真實原因如其專與清涼必使肺衛之氣重其閉塞麻疹即無透達之望病變且可翹足而待禍將立至安得有功若此時專與通絡而不知開宣肺衛則疹既不透絡脈之痹亦不能通此乃審證圖治之最宜明辨處非泛言見病治病遽可無投不利者也惟能開展肺家之閉而兼以大劑清泄陽明並清肺火斯麻疹無遏抑之虞而諸恙皆迎刃自解故第二方中竟無一味通經舒絡之藥止求腠理疏通疹得透泄亦不患其絡痛之不松最是切中肯綮所謂以無厚入有間自然遊刃有餘披卻道𦽏直至二十八日紅疹已回熱解胸舒諸重要證均已銳減而僅有肢節疼痛脈絡尚未和諧乃始投羌獨歸斷靈仙木瓜寄生等從事疏絡則賈其餘勇一舉手而奏膚功矣要知臨證時最應識得輕重緩急然後方寸中乃有主宰自不為證情所眩惑胸有成竹目無全牛看來四五方已收全功措置亦屬易易然成如容易卻艱辛恐非老斫輪手未必如是簡捷迨後同人等初三日復往視之則已步出堂前矣談笑自若而周身膚蛻有若鼓屑亦可知此病之不為輕渺矣康按張山雷君附志某醫第一方藥味輕靈尚屬妥適惟以耳為目據述一端遽投攻下病輕藥重殊非所宜猶幸病本溫邪早下不為大害然固之胸膈益悶呼吸益艱未始非表證誤下陽邪內陷變作結胸之一例雖此證如麻在乍病時已有端倪不以誤下結胸而變劇然設使其人中氣本虛則一下之後陽陷入陰麻疹不能透發害將不可勝言以此知醫家必須自有主張認定入手方法斷不可人云亦云姑與周旋以為迎合計也至二十六日上午診病時雖胸悶已甚表裡之熱皆顯未始不合麻杏甘膏之例然身熱猶未大盛唇舌之紅未至裝朱且不渴飲則石膏猶非針對麻杏亦嫌峻利不得不從事於輕靈平淡一途蓋見症治症分寸只宜如此不得以午後熱盛而歸咎於午前一方之病重藥輕訾為不負責任者也迨至午後陽明正旺之時陽熱大盛而肺氣猶閉遏不宜則除麻杏甘膏湯外必無恰對方法加以頰車之強舌本之頑非僅氣火上燔實有濁痰助虐所以竺黃膽星貝母蔞皮連鑣並進而膚表腫脹疹色鮮紅小溲不多氣粗且促是肺為熱痹最是吃緊關頭惟一物黃芩專清肺火最為嘉言氏得意之筆古人成作可法可師復佐之以桑白蘆根借作麻杏之應斯清肅之力量既專痰熱斷無不降之理而又能宣展肺氣雖是寒涼不虞遏抑方與麻疹之利於開發者絕無矛盾之弊貌視之藥量甚重頗不免膽氣粗豪蓋亦鄭重經營兒經斟酌而後出此非敢以臨床為嘗試之計也至於二十七日處方之時則證情銳減駭浪俱平僅有頭痛未除咳嗽未爽治宜潛息肝火清展肺金踵步增損原是尋常理法殊不足道惟大便通而且溏反轉矢氣是可知本有宿食積滯在中但前手不助運化遽與攻逐大府雖通陳莝不去選藥終是未允而今在既服生軍之後又不當再投泄劑重耗津液惟有楂曲緩為消磨庶乎導滯而不傷津此又隨機變化相體裁衣較量虛實之一定理法又至二十八日大便兩行燥矢自去諸恙俱減而惟有肢節之疼尚無捷效乃始專事於宣通脈絡以收全績此證始末雖病狀未至危險要之前後數方層次秩序一絲不亂故皆隨手桴應覆杯有功可謂一方有一方之應驗歷時不過五日果能以次即安竟無波折未始非審證明析知所先後之效果也其言如此可謂發明盡致矣冬溫疫痧案袁桂生住鎮江京口病者孫姓子年七歲住本鎮病名冬溫疫痧原因臘月間疫痧盛行適感冬溫而觸發證候初起發熱惡寒咳嗽體倦飲食減少尚未見有痧點診斷脈緩不數舌邊尖紅起刺苔薄白滑此冬令寒邪外束溫邪內伏之變證也療法初用蔥豉湯加味輕清疏解處方鮮蔥白三枚淡香豉錢半蘇薄荷八分桔梗八分杏仁錢半甘草四分次診服後頸項及胸背等處發現痧點猶隱約在皮膚間尚未大現於外也仍用原方再進一劑三診第三日痧大現胸背頸項手臂等處均密布而色紅豔夜間熱甚口渴遂改用桑葉金銀花等味清熱解毒活血透痧三方冬桑葉二錢金銀花二錢光杏仁二錢益母草二錢天花粉二錢川貝母錢半去心生甘草四分青連翹三錢四診第四日熱仍不退舌色紅赤起刺毫無苔垢遂易方用地骨皮生地沙參等品生津滋液清化餘熱以善後四方地骨皮三錢乾生地三錢川貝母一錢去心白茅根三錢去衣北沙參一錢原麥冬二錢鮮枇杷葉一片去毛筋淨效果一服熱退神安舌色亦淡而無刺矣接服一劑痊愈廉按痧疹初起無傳染性者謂之時痧有傳染性者謂之疫痧疫痧較時痧重而難治此案初則輕清疏解使痧毒外達繼則清熱解毒活血透痧使痧毒肅清終則生津滋液清化餘熱為此證善後之要法處方選藥初中末層次井然冬溫疫痧案葉鑑清住上海病者陳男孩年二歲蘇州人病名冬溫疫痧原因痧子內隱證候發熱一候熱壯無汗痧子隱沒痰多神蒙煩躁舌乾絳無津唇燥渴飲便閉溺少色赤診斷脈來細數無序紋色深紫直透三關襁褓質弱邪陷津液已涸勢難挽救防驟然厥閉療法溫邪痧毒深入胃腑劫津爍液故用石膏竹葉大劑清胃生地石斛生津增液為君銀翹生草清解痧毒為臣余如象貝菖蒲之開痰宣竅茅根鬱金葛根透達陷邪為佐使也處方生石膏一兩研細鮮石斛六錢連翹四錢象貝四錢生甘草五分鮮生地八錢生葛根錢半銀花四錢廣鬱金錢半鮮竹葉三錢茅根肉五紮去心鮮石菖蒲一錢病家情急藥前先服燉溫雪水一碗次診昨藥服後有汗津津熱灼之勢已淡渴飲唇燥煩躁等證亦見退舍舌仍絳尚潤澤大便色黑黏稠小溲短赤紫紋較淡脈至數而有序能寐飲乳似有轉機佳象惟質小邪盛最易傳變治再生津清泄次方生石膏八錢研細鮮石斛五錢連翹四錢廣鬱金錢半鮮生地六錢天花粉四錢銀花四錢象貝母四錢生甘草五分大竹葉三錢茅根肉五紮去心衣三診表熱已解咳嗽有痰尚渴飲口氣甚重脈來右滑數左手較和右部脈隸屬肺胃也舌紅潤紫紋僅至風關色亦較淡邪熱日退津液日回大便暢行小溲亦長治再清化肺胃痰熱佐以生津小心護持可保無虞三方鮮石斛四錢川象貝各二錢冬桑葉錢半淨連翹四錢天花粉四錢冬瓜子四錢光杏仁二錢金銀花三錢生竹茹錢半生竹心卅根茅根五紮去心衣蘆根一兩去節鮮枇杷葉三片去毛包煎四診脈來數象已和右寸關尚滑大咳嗽有痰口渴喜飲溺淡黃大便帶溏舌苔紅潤肺胃痰熱猶未清澈治再生津清化以肅餘邪四方西洋參一錢川象貝各二錢連翹殼三錢冬瓜子四錢鮮石斛三錢瓜蔞皮三錢金銀花三錢通大草三錢生竹茹錢半生竹心卅根茅根四紮去心衣蘆根一兩去節鮮枇杷葉三片去毛包煎五診諸恙皆和安眠安乳脈來軟滑不數舌苔紅潤不絳治再清養以收全功五方西洋參一錢川貝母二錢去心淨連翹三錢生竹茹錢半生竹心卅根綠豆衣四錢原金斛三錢瓜蔞皮三錢金銀花三錢嫩蘆根一兩去節燈心三紮效果服三劑痊愈愈後胃火頗旺每飲食不節即欲發熱嘔吐仍是胃病隨來寓就診服清化消導藥一二方至多三方必愈現在學校讀書頗壯健廉按痧屬陽腑經邢初起必從表治當用辛涼解肌使痧毒外透若七日外隱伏不透邪反內攻痰多氣逆煩躁神蒙此為痧閉證最危險此案初則清透繼則清化終則清養對證發藥層次井然臨危取勝殊為高手伏熱發疹案過允文住宜興徐舍病者胡仲芬令孫年五歲住宜興西察院病名伏熱發疹原因伏邪內發風熱外感證候身熱咳嗽口渴神煩便溏溲赤痧透未足熱鬱不退苔白而花舌質乾燥診斷脈數右甚於左乃伏邪與新感同發熱鬱肺絡疊用生津宣透之劑自二月迄於三月連透紅痧三次繼透白㾦色枯不潤進大劑甘寒養液猶是半枯半潤時灌頻溉疹色方能晶亮療法重用生津佐以宣透沙參石斛生地蔗汁生津為君桑葉豆豉前胡茅根宣透為臣川貝枇杷葉清金肅肺蔞皮鹽夏寬運中氣惟便溏一證既不能澀又不能補只入扁豆為和中健脾之用處方鮮生地五錢青蔗汁半鍾川貝母三錢鮮石斛三錢淡豆豉三錢北沙參三錢冬桑葉二錢青鹽夏錢半生扁豆三錢枇杷葉五片去毛栝蔞皮二錢前胡二錢先用白茅根二兩去心煎湯代水次診服二劑痧回熱退數日後驟然厥逆脈弦而滑此乃乳食不化生痰阻氣上壅肺氣使然急宜開痰降氣次方枳實鬱金花檳榔玉樞丹磨沖各五分鮮菖蒲汁五錢淡竹瀝一兩薑汁五滴沖三診煎服半劑吐出膠痰二塊厥回氣平明日又大熱口渴舌紅脈數而細治以清熱生津參以化痰三方鮮鐵斛三錢川貝三錢花粉三錢鮮生地五錢桑葉二錢老竹黃二錢銀花五錢知母三錢杜膽星錢半四診服二劑熱少平又透痧一身甚密再與生津托邪法熱退痧回後二日復厥勢較輕即與前方又吐出膠痰數口厥回而身又熱復透出痧一身而津液之桔尤甚令頻灌蔗汁數日後發出白㾦一身色枯即與大劑甘寒養液四方鐵皮斛五錢北沙參三錢栝蔞皮二錢鮮生地三錢天麥冬蓮心各三錢青蔗汁半鍾沖生甘草一錢旋覆花錢半包煎效果服三劑白㾦轉潤五劑全亮又五劑而愈有患此者他醫見其厥用羚羊角煎送牛黃丸服下未二時即死廉按痧為麻疹之俗稱杭寧紹通稱曰瘄江蘇總名曰疹此案伏熱發疹陰氣先傷較之但感風熱發疹者輕重懸殊故疊用清透甘涼證多反復次方重用開痰降氣末方大劑甘寒救液均極有力宜乎厥疾乃瘳此為痧疹之正法眼藏食積悶瘄案周小農住無錫病者錢桂桐之侄童年住壩橋病名食積悶瘄原因伏溫發瘄因食糯米麵食內鬱而不出透至九日始延余診證候身熱七日始見麻點不出表頭面極少手足冷按其腹作痛疹毒內攻全夜不寐氣喘煩躁發狂起坐揚手擲足診斷脈濡滯不起舌絳苔浮黃如糜唇紫此即麻疹闡注所謂食閉兼火閉證也療法宜治其積其火方泄痧立外透用自制陸氏潤字丸先通里積以治食閉又遵繆仲醇清透參入溫宣法以治火閉處方牛蒡子三錢杵淨蟬衣錢半青連翹三錢萊菔纓三錢蘇薄荷一錢片鬱金三錢玉泉散七錢浮萍一錢同包鮮竹葉廿片西河柳錢半水蘆筍尖五個鮮茅根二兩去心先用陸氏潤字丸一錢開水迭服外治方以西河柳櫻桃核艾葉姜煎水放盆熏足後以吳萸生礬末雞子白燒酒搗敷足底引火下趨以治足厥次診詢知潤字丸僅服十粒大便仍閉全夜不寐發狂起坐氣喘煩躁揚手擲足如前脈細如伏苔變深黃目封痧點似回此積橫於中裡氣不通痧火不從外達毒即內攻有犯心逆肺之險再用清透法以達邪通血法以消積先與潤字丸二錢督令研碎開水服畢方與開方次方牛蒡子三錢杵片鬱金三錢蟬衣一錢地骷髏五錢枯黃芩二錢薄荷葉一錢蘇丹參三錢連翹三錢生雅七分鮮竹葉三十片黑山梔二錢赤芍二錢玉泉散九錢浮萍草錢半同包木通一錢辰砂拌蘆茅根各二兩另玳瑁七分西藏紅花三分研細如霜燈心湯下代茶鮮茅根一兩鮮芫荽一錢鮮西河柳錢半水煎效果服後大便通解痧疹齊透布滿一身壞象如掃而痊說明但以大黃起瘄如方內開出無論貧富萬不肯服故必自制攜用乃方便之一術康按悶瘄由瘟毒鬱閉悶而不發其證最急但其所以悶而不發者必有所因或因寒閉或固火閉或固痰閉或因食閉治必先其所因伏其所主而閉自開開則悶瘄自透病可轉危為安此案食閉兼火閉方用湯丸並進潤字丸攻其食閉湯藥開其火閉使裡氣通表氣自疏表氣疏瘄自齊透故壞象如掃而痊麻疹痰閉案周小農住無錫病者外科鄭鶴琴之侄年甫齠齡住日暉巷病名麻疹痰閉原因孩體乳痰上壅以致麻疹不出表溫邪熏蒸咽喉腫痛證候麻疹隱而未透咳嗽氣急痰多喉關有聲咽喉紅碎診斷指紋隱隱此即張廉麻疹闡注所謂痰閉之證痧火不得外泄或延爛喉療法商用宣痹通血化痰透達法通血為孫復初麻疹要訣近賢梁達樵亦時用之處方廣鬱金三錢生打泡射干七分光杏仁三錢牛蒡子三錢杵丹參二錢鮮薄荷四錢象貝母三錢赤芍二錢元參三錢制殭蠶三錢鮮枇杷葉五片去毛鮮茅根一兩去心紫菀三錢另用西月石三分月雄精二分猴棗一分研細末茅根湯送下效果一劑而痰降氣平二劑而麻疹透足繼用清肅而瘳廉按此開痰閉以透悶瘄之一法另方月石猴棗同雄精並用豁痰解毒最為著力故能奏效如神疫痧內隱案葉鑑清住上海病者朱孩年二歲太倉人寓新閘路福康里病名疫痧內隱原因因冒風致痧子內隱證候寒熱無汗四日痧見兩日胸頸兩手雖稠而面顴額部隱約不透痧為陽邪頭面屬陽尤為要緊咳聲不揚目紅多眵脘悶氣急微喘泛嘔乳汁便溏溺少診斷紫紋已至氣關此由風邪重受痰熱交阻抑遏肺氣有痧陷昏喘之險擬以宣透必得痧達邪勢向外方有轉機療法風痧為肺病紅痧是胃病今風痧內隱當宣肺發表為首要方中荊蒡蘇薄葛根辛散透發為君天蟲蟬衣祛風泄熱為臣甘桔枳殼開肺宣喉象貝前胡解肌化痰為佐使外用香菜湯揩者亦取其辛香松肌痧易透達也處方荊芥穗一錢紫蘇葉八分炒天蟲錢半熟牛蒡三錢生甘草四分薄荷葉八分後入煨葛根一錢淨蟬衣八分象貝母三錢苦桔梗五分生枳殼一錢嫩前胡錢半外用香菜煎湯用毛巾絞乾揩面頸次診身已有汗膚腠已松面額兩顴痧子漸透色赤肢體尤稠尚脘悶煩躁啼哭淚少咳嗽有痰口乾干惡目紅多眵溺短便溏日行一二次關紋色紫此痧未透發痰熱交阻肺失清肅之令慎防昏喘變端治再宣泄次方炒牛蒡三錢炒天蟲錢半象貝三錢生甘草四分生枳殼一錢薄荷葉八分後下淨蟬衣八分光杏仁二錢苦桔梗五分嫩前胡錢半廣鬱金錢半仍用香菜煎湯乘熱揩面顴頸及兩手三診痧子齊布紅潤尖透邪勢已從汗外達佳象也咳頻聲音較揚便溏溺赤脖悶泛惡雖減尚煩躁少寐啼哭有淚紫紋色淡脈來滑數右部較甚痰熱熏蒸肺不清肅慎防傳變再以清化治之三方炒牛蒡三錢蟬衣八分光杏仁二錢勿研生甘草四分嫩前胡錢半炒天蟲錢半象貝三錢青連翹三錢生枳殼一錢茅根肉三紮去衣四診表熱已解痧子漸回交一候病勢轉松最為正當煩躁較平夜寐較安惟咳嗽尚甚痰多艱咯便溏溺暢舌尖邊紅苔膩口穢此肺邪未清胃熱亦盛脈來右部滑數當兩清之四方炒牛蒡二錢冬桑葉錢半淨連翹三錢茅根三紮蘆根八錢生竹茹錢半象貝三錢炒蔞皮三錢冬瓜子三錢嫩前胡錢半枇杷葉三片去毛五診痧子漸回諸恙均平惟咳嗽痰多脈來數象已和當再清肅肺胃五方冬桑葉錢半炒蔞皮三錢金銀花三錢生竹茹錢半茅根三紮蘆根八錢象貝四錢淨連翹三錢冬瓜子三錢嫩前胡錢半枇杷葉三片去毛六診咳嗽較減邪勢漸化脈來右滑滑屬痰邪痰與餘熱尚流連肺胃仍主清化六方象貝四錢嫩蘆根七錢去節生苡仁三錢淨連翹三錢通草一錢瓜蔞皮三錢冬瓜子三錢生蛤殼四錢打生竹茹錢半鮮地慄三枚效果服二劑咳嗽仍未平即停藥旬日後咳始痊愈廉按凡發疫痧最怕冒風內隱隱則痧毒內攻勢必痰熱交阻氣喘神迷險象蜂起此案內外並治仍使痧毒外達幸而痧子齊布紅潤尖透後用兩清肺胃轉危為安的是兒科能手瘄後受風夾食案汪竹安住紹興斷河頭病者梁姓男孩年三歲住本城觀音弄病名瘄後受風夾食原因時瘄回後不忌風寒恣食油膩而發證候咳嗽痰多咬牙弄舌診斷脈浮弦苔紋干膩最防陡變驚癇療法宣肺化痰兼消食滯處方生桑皮錢半地骨皮三錢生甘草梢四分杭菊二錢生雞金錢半打莖葦八分佛手片六分炒枳殼一錢絲通一錢嫩前胡錢半次診弄舌雖止咬牙未除咳痰漸減惟脘滿胸逆脈象仍弦膩苔未法慎防化為驚癇治以宣肺清肝佐以益腎次方羚角片五分另燉和沖杭茶菊二錢生甘草梢五分生桑皮錢半前胡錢半甘杞子四分搗生東芍錢半陳皮六分桔梗八分三診咳嗽更甚仍然咬牙惟大便已下神識較清弦脈稍退舌肉轉潤病勢略有轉機治守前法出入三方甘杞子六分搗生東芍二錢陳皮五分清炙甘草三分辰染茯神三錢白滁菊二錢北沙參二錢破麥冬二錢羚角片五分煎透分沖四診咬牙較緩神識已清咳嗽亦減惟潮熱往來舌苔微黃尚有餘邪逗留營分恐再病變治以參麥益胃參斂肝救腎法四方北沙參二錢玄參二錢原麥冬二錢清炙甘草三分生東芍錢半川石斛錢半佛手片五分陳皮六分鮮竹茹二錢細生地炭三錢五診咬牙潮熱均除咳嗽未瘳肺胃尚有積熱舌苔微黃兼膩治以清潤肺胃並疏厥陰分消余積五方北沙參二錢生玉竹一錢大腹皮三錢炒楂肉二錢清炙甘三分生東芍錢半炙橘紅六分破麥冬二錢白滁菊一錢絲通草八分效果連服三劑餘熱肅清而愈廉按萬氏密齋曰凡疹初收要避風寒勿食煎炒葷腥酸成之物宜淡滋味至一月可少與雞鴨肉食之物若食葷太早者外毒雖泄內毒復萌再出者亦有之或屢出者亦有之若誤食酸鹹則增痰咳遲延日久而難愈也若誤食煎炒則生毒熱或變餘熱冒觸風寒者或咳而加喘或生壯熱或成瘧疾變證百出難以治療矣此案病固適犯此弊故必多方救濟始奏全功凡病後調其飲食適其寒溫為善後切要之良圖時瘄夾斑案嚴繼春住紹興安昌病者婁麗生令郎年五歲住本鎮西市病名時瘄夾斑原因冬應寒而反溫瘄疫盛行有瘄痘夾發者有瘄斑併發者今感染疫氣而瘄與斑夾發證候初起憎寒壯熱噴嚏流涕腮紅眼赤咳嗽氣急繼則蒸蒸內熱現形成片並無頭粒色紅帶紫神識煩躁腹滿便閉診斷脈右洪盛而數左三部沉實舌鮮紅帶有紫光診畢先有傅醫在座謂近來出瘄夾痘者甚多先宜透發不可涼遏方用升麻葛根荊芥薄荷牛蒡蟬蛻桔梗甘草等味予謂一齊湧出粒粒可數者瘄也顆粒分明先稀後稠者痘也成片現形或稀或密或癢或麻以手撫摩平坦而無頭粒者斑也病由吸受瘟毒犯肺則發瘄入胃則發斑必然之勢也療法當以清營解毒透瘄化斑為主治病家極口贊成傅方予遂不開方面出傅氏處方升麻五分生葛根七分荊芥八分蘇薄荷六分炒牛蒡錢半淨蟬衣十隻桔梗七分生甘草三分次診據述服傅方一劑身發大熱譫語發狂揚手躑足痰聲如鋸氣尤急促不時昏暈手足厥冷脈兩寸沉伏關尺滑數舌絳且干此瘟毒胃熱上蒸於肺痰隨氣上而昏厥也病勢甚危急用犀羚白虎湯加紫雪西黃以挽救之次方犀角汁五分磨沖羚角片八分先煎生石膏八錢先煎白知母三錢生甘草四分紫雪四分西黃一分二味和勻藥湯調下三診服後厥回神清斑瘄透齊惟咳喘痰多便閉溺澀脈甚滑數按之沉實舌絳轉紅中心現黃濁苔此肺氣為痰熱所阻不能下輸大腸也仍以清熱降痰為治三方生石膏八錢先煎白知母三錢栝蔞仁四錢杵竹瀝半夏錢半濟銀花二錢青連翹三錢滾痰丸二錢拌滑石三錢包煎四診服後腹痛異常即解燥糞十餘枚繼則白痰稠積齊下諸證大減脈之滑數亦輕遂於前方去丸藥加鮮生地五錢鮮石斛三錢雅梨汁兩瓢沖五診熱勢復劇氣又喘急甚至痰壅發厥原方去二鮮又加丸藥如是者二次大便又下如膠漆者頗多脈證漸和險浪始息改用竹葉石膏湯甘涼濡潤充津液以搜餘熱五方鮮竹葉三十片毛西參一錢竹瀝半夏錢半青皮甘蔗兩節生石膏四錢先煎原麥冬一錢生甘草五分鮮白茅根六十支去衣效果連進兩劑諸證漸瘥胃能納粥後用鮮石斛三錢煎湯代茶頻飲調養旬余而痊廉按瘄因時疫而發故謂之時瘄其發雖由於瘟毒傳染多吸自口鼻鼻通於肺肺受瘟毒則發瘄口通於胃胃受瘟毒則發斑正治之法當以清營解毒透瘄化斑為主隨證佐以他藥其大要也奈病家無醫藥常識反信用治瘄套方直至變端蜂起遂敢服大劑涼解近世俗見大抵皆然幸而犀羚白虎湯加紫雪西黃挽救著力第三方白虎合小陷胸加減合滾痰丸跟踵急進始得轉危為安可見瘟毒勢重者清瘟敗毒之藥亦不得不重用也孫氏千金方曰膽欲大而心欲細斯言也不但醫家當作模範即病家亦當奉為圭臬瘄夾喉痧案嚴繼春住紹興安昌病者汪元洪之令侄年七歲住大義病名瘄夾喉痧原因去年冬瘄疫盛行輕者但發時瘄重者或夾斑或夾痘極重者夾爛喉痧今兒感染疫毒而併發證候一起即壯熱煩渴咳嗽氣喘先發瘄疹色赤如丹繼則痧密肌紅宛如錦紋咽喉腫疼神昏譫語診斷脈右洪盛滑數左沉弦小數舌赤且紫刺如楊梅此疫毒外竄血絡瘄與痧併發乃瘄疫最重極險之惡候也療法涼解血毒為首要上午先進普濟消毒飲加減以透其瘄疹下午續進清營解毒湯以化其痧處方蘇薄荷一錢炒牛蒡二錢青連翹三錢金銀花二錢西紫草二錢鮮大青五錢粉丹皮錢半元參心二錢直擘去皮先用活水蘆筍二兩鮮茅根二兩去皮煎湯代水次方鮮生地八錢拌搗淡香豉二錢金銀花二錢粉丹皮錢半連翹心一錢元參心二錢粉重樓二錢甘中黃一錢先用野菰根尖二兩紫背浮萍五錢藕池中取煎湯代水次診前方各進兩頭煎均無大效而面色青晦神昏不語惟煩躁陣作發躁時將臂亂挖若不知痛挖破處血出紫黯不流喉間紫赤間有白腐舌仍如前脈浮診混糊沉按細數左寸搏勁而躁此瘟毒鬱於營中半從外潰半攻心肺其壽可立而傾也欲圖急救必使瘟毒有外泄之機乃有挽回希望姑以紫雪芳透於前神犀丹清解於後再用大劑清營逐毒湯三方紫雪一錢葉氏神犀丹一顆均用鮮捲心竹葉三錢燈心五分鮮石菖蒲根葉錢半剪碎後煎煎取清湯調下四方犀角尖八分磨汁鮮生地四兩磨汁生川軍四錢開水浸半點鐘絞取清汁生玳瑁三錢剪碎金銀花三錢元參心三錢粉重樓三錢羚角片錢半先煎青連翹三錢帶心陳金汁二兩分沖藏紅花一錢三診陸續頻灌從上午至黃昏僅得大便溏黑者一次灌至次日清晨盡藥兩劑又得黑溏極穢臭不可聞者兩次神識時清時昏昏少清多舌上翻出浮膩黃苔喉間白腐時退時起頸肘腰腿發現紫痕硬塊大小不一脈皆浮洪搏數此血毒雖從下泄而營中之伏火尚熾也姑用伍氏清血解毒湯合絳復湯葉氏神犀丹涼透血毒宣絡清神以消息之五方鮮生地一兩粉丹皮二錢藏紅花八分青連翹三錢帶心老紫草三錢真新絳二錢旋覆花錢半包煎拌神犀丹三顆先用紫花地丁八錢銀花露一斤煎湯代水四診一日夜藥盡兩劑大便又秘小溲赤澀神識多昏少清凡上部如頸肩手臂下部如腰脊膝膕等處從前有紫痕硬塊者亦皆紅腫作膿不特咽喉潰爛並肛門亦潰爛流膿脈仍搏數按之有力血毒雖從外潰病勢總在險途急擬救陰活血敗膿逐毒背城一戰以圖幸功用仲景敗膿散合大黃牡丹湯加味六方生錦紋三錢粉丹皮二錢小枳實錢半生赤芍五錢元明粉二錢後入光桃仁錢半桔梗一錢鮮生地一兩先用冬雪水銀花露各一湯碗代水煎藥五診藥仍陸續頻灌灌至一晝夜約服四五湯碗二便始暢惟糞帶膿血雜下一節黃燥一節溏黑從此神識清醒時時叫痛咽喉肛門潰爛均減六脈搏數已轉弦軟治以養陰活血敗膿化毒與五汁飲加味外用紫金錠一錢制月石三分和以淨白蜜時時掃喉清化其毒七方鮮生地二兩開水浸搗汁雅梨汁各兩瓢甘蔗汁生藕汁各一瓢陳金汁二兩分沖先用鮮茅根二兩去皮金銀花五錢煎取清湯再燉四汁滾十餘沸沖金汁時時灌之六診連服三日咽喉及遍身潰爛處均已漸次收功便中亦無膿瘀胃納綠豆清湯舌轉嫩紅脈轉虛數此瘟毒雖皆外泄而血液已經兩虧與五鮮湯滋養以善其後八方鮮生地六錢鮮梨肉一兩鮮建蘭葉五錢鮮石斛五錢鮮茅根一兩效果連服六日胃健納穀喜笑語言如常囑其用北沙參四錢光燕條一錢奎冰糖三錢日進一劑以調補之廉按此種瘟毒瘄疫十中難救一二設病家膽小如鼷醫家遲迴審慎不敢連用峻攻大劑無論如此重篤之病不能挽救於垂危即使幸而轉機而後半如此風浪亦不敢冒險擔任則不能收全功於末路況大便一節黃燥一節溏黑此等疫證其宿垢最不易清即毒火亦不易淨往往有停一二日再行有行至五六次至十餘次者須看其病情如何以定下與否切勿震於攻下之虛聲遂謂一下不可再下因致留邢生變而釀功虧一簣之慨也此案膽識兼全非確有經驗博歷知病者斷不敢擔此重任背城借一以圖功瘄夾水痘案嚴繼春住紹興安昌瑞安橋病者徐子青之令嬡年十四歲住遺風病名瘄夾水痘原因素稟體肥多濕適逢春末夏初瘄疫盛行感染其氣先發瘄後發水痘證候身熱煩悶咳嗽鼻塞面目有水紅光喉痛氣急指尖時冷二日即現瘄點色鮮紅頭面先見顆粒分明診斷脈右浮洪搏數左弦小數舌紅苔白膩此雖時瘄之順證而濕熱內郁所防者水痘之夾發耳療法先用防風解毒湯加減發表透瘄處方防風八分炒牛蒡錢半光杏仁錢半前胡一錢生甘草三分荊芥八分青連翹錢半廣皮紅七分桔梗七分青箬尖一錢次診第三日下午赴診據述一日三潮潮則熱勢盛而煩躁逾時方退三日共作九潮瘄已透齊現已徐徐回退惟面目手足微腫小溲短熱渴不喜飲便溏不爽脈右軟滯左微弦帶數苔白微黃此瘄毒雖出而濕熱為患也姑以杏蘇五皮飲消息之次方光杏仁錢半新會皮錢半冬瓜皮三錢絲通草一錢嫩蘇梗錢半浙苓皮三錢大腹皮錢半生薑皮一錢三診連服兩劑身又發熱皮膚覺癢水痘先現於頭面漸及周身四肢小如蠶豆大如豌豆狀如水泡中多凹陷脈浮滑沉緩舌苔黃白相兼此內蘊之濕熱化為水痘而發泄也治以七葉蘆根湯透解之三方藿香葉錢半佩蘭葉錢半炒黃枇杷葉五錢去毛筋淨薄荷葉一錢青箬葉二錢淡竹葉錢半先用活水蘆筍一兩鮮荷葉一錢北細辛五分煎湯代水四診一劑而水痘色淡漿稀二劑而乾燥成為灰色勢將結痂身熱大減胃動思食便黃而溏溺亦漸利脈轉緩滑舌苔黃薄此濕熱從肌皮而出也治以調中開胃兼利余濕四方新會皮一錢浙茯苓二錢川黃草二錢生穀芽一錢炒穀芽一錢生薏苡三錢金橘脯一枚切片陳南棗一枚效果胃能納穀精神復舊而瘥廉按色淡漿稀故曰水痘多由濕熱兼風鬱於肌表而發約有黃赤二種色黃而含有氣水者曰黃痘一出如豆殼水疱東醫名含氣性水痘色赤而含有血液者曰赤痘一出有紅點水疱東醫名出血性水痘始初為透明漿液繼則變為不透明乳液狀且帶膿性皆從水疱膿疱而結痂然總不如正痘之根窠圓淨緊束也其間有夾疹而出者亦有夾正痘而出者間有夾喉痧而出者此案先出瘄後發水痘其瘄及痘皆輕者因病毒從雙方排泄故前後四方皆屬尋常藥品能奏全功疫瘄化疳案汪竹安住紹興斷河頭病者羅姓男孩年五歲住本城病名疫瘄化疳原因先患泄繼發瘄後化疳證候瘄雖消回泄瀉半月未痊目鼻赤爛作疼口噴臭惡診斷脈緊數舌苔糜白猶恐喉爛穿腮等變迭起療法瀉肝胃鬱熱以存津液處方龍膽草四分酒炒生石膏四錢研細鹽水炒知母二錢根生地三錢豬苓三錢木蝴蝶五對生白芍二錢浙茯苓四錢清炙甘草三分淡竹葉錢半次診疳爛身熱均減便泄未愈苔糜亦輕脈兼滑數尚防熱毒下移轉化便血脫肛等證治以清化胃腸並退伏熱次方酒炒川連三分炙百部一錢焦梔子三錢炒楂肉三錢漢木通一錢炒知母錢半地骨皮四錢人中白五分生桑皮錢半陳皮六分浙苓五錢三診疳爛漸瘳惟咽門糜赤聲音尚嘶脾泄久困右寸仍兼滑數苔糜未盡預後恐無良好結果擬清胃熱司化膀胱三方木蝴蝶五對炒車前三錢浙苓四錢赤芍錢半細生地四錢元參三錢尿浸石膏四錢淡竹葉甘四片淡子芩錢半福澤瀉二錢陳皮六分四診久瀉雖瘥咽門等處糜爛又起脈數苔糜瘄後最怕患疳醫頗棘手治用玉女煎加減四方生石膏四錢杵人中白五分杵金銀花三錢中生地四錢焦梔子二錢地骨皮四錢生白芍錢半鹽水炒牛膝錢半炒楂肉二錢烏元參二錢淡竹葉廿四片陳金汁二兩分沖鮮建蘭葉三錢後入效果連服三劑咽爛已愈後以燕窩柿霜等代藥調養而痊廉按瘄後化疳葉氏謂之痧疳多由里證不清濕盛熱蒸釀生細菌或化微蟲上則腐蝕七竅下則腐敗胃腸尤以眼疳生翳為難治牙疳穿腮為最急其藥如雞內金之殺蟲磨積膽草川連烏梅胡連之清肝殺蟲生地石斛元參之甘涼養胃白朮芩陳之健運脾陽金汁人中白尿浸石膏之防腐制爛皆治斯證不兆之要藥此案前後四方大半用此等藥品配合為劑故能消疳以收功惟外治法必不可少尚需平時預備以應用瘄後痢案汪竹安住紹興斷河頭病者金姓女五歲住本城咸歡河沿病名瘄後痢原因時瘄回期太早多食生冷而化痢證候口燥腹痛裡急後重大便滯下膿血稠黏診斷脈沉緊舌苔白此積滯移於大腸也療法疏中扶脾消食祛積處方浙茯苓四錢炒楂肉二錢小青皮八分焦雞金錢半豬苓二錢廣木香五分清炙甘草三分小川連三分姜炒炒芍錢半土炒於朮八分次診口燥肢冷皮灼氣急唇裂仍痢舌焦且胖此津液內耗最防木橫則驚治以清營潤燥扶土瀉木次方鮮生地三錢鮮石斛錢半木蝴蝶五對清炙甘草三分元參二錢炒知母錢半浙茯苓二錢新會白六分生東芍錢半條芩一錢三診氣急稍平涕淚已有滯下亦鬆苔轉黃潤脈尚弦澀治以清肺潤燥拯津消滯為妥三方生桑皮錢半鮮生地四錢鮮石斛二錢淡芩八分地骨皮三錢元參二錢賴氏紅六分安南子三枚丹皮錢半佛手片五分四診氣逆而喘滯下尚重口乾脈數積熱糾纏終非善果治以清宣肺胃通潤府氣四方牛蒡子一錢光杏仁三錢鮮生地三錢鮮石斛錢半栝蔞仁三錢杵炒枳殼一錢絲通草一錢元參二錢淡竹茹二錢炙橘紅六分五診氣急雖已漸瘳痢疾尚未痊愈舌苔干脈細數氣液兩虧之候且與救津液以拯胃脾兼消余積五方甜石蓮二錢杵鮮生地三錢鮮石斛錢半陳皮六分炒知母錢半萊菔纓錢半生東芍三錢毛西參八分另燉沖效果三劑後痢除胃健後以飲食調養復元康按瘄後成痢或因熱毒內陷或因熱積下移均忌升提補澀葉氏治法初則分利宣通終則甘潤增液此案大旨近是方亦清穩妊娠疫疹案羅端毅住台州病者徐姓婦年三十歲住台州病名妊娠疫疹原因妊娠六月患疫疹邀毅診視證候頭目浮腫而赤遍身疼痛胸腹鬱悶頭腦劇痛疹形略見頭面狂躁不安診斷脈數舌紅家人惶恐祈神許願毅曰神鬼之事何足信哉蓋熱毒盤踞於中則煩躁不安熱氣上蒸則頭腦劇痛疫疹欲出不能出正在戰出之候則遍身疼痛妊娠患是證者最為危險何則母病熱疫則胎亦熱胎熱則動疫火煎熬恐有墮胎之患少頃疫疹通身遍出鄰人在旁云麻疹全身既己出齊雖有煩躁亦無妨害余曰汝等不知本年患是證者皆非真正之麻疹古人所謂瘟疫流行者即此等之證候是也雖全身出齊而亦有異同之點疹形鬆浮者輕緊束者重紅活者輕紫黑者重況伊之證疹形緊束而兼紫黑形雖見於外而毒根深藏於內故胸腹鬱悶不安前人謂胃熱將爛之候指斯時也若不急治危在頃刻療法用余師愚清瘟敗毒飲加紫草茸大劑涼血以消毒處方生石膏六兩研細小生地一兩烏犀角二錢小川連四錢焦梔子四錢肥知母六錢淡黃芩三錢苦桔梗錢半赤芍三錢生甘草一錢元參心四錢青連翹四錢牡丹皮二錢紫草茸二錢鮮竹葉四十片次診服後片時即小產一女產後瘀血不行腹大如未產之狀患者似覺尚有一胎在內少頃又產一男但腹痛如前家人隨向鄰家尋覓姜來煎湯與服吾颱風俗產後必食姜炒米飯等余聞其言竭力阻止若服此等熱物人必狂躁不可療救不但目前不可服即至數日亦切勿一滴沾唇再擬一清熱去瘀之方次方全當歸三錢芎藭八分鮮生地六錢粉丹皮錢半光桃仁錢半澤蘭三錢淡黃芩錢半益母草五錢制香附二錢紫草茸一錢生赤芍二錢生甘草八分效果囑服數劑余即返舍隨後伊母家請一專科麻痘之老醫來診病家即將余之言告曰不可服姜等云云老醫曰產後無姜不能去瘀不妨服下幸病家素信鄙人且觀其證果系熱病老醫之言似欠妥當姜等未敢與飲老醫書方與服未知擬何等方服後煩躁仍用毅所擬清熱去瘀之原方服數劑而愈說明本年瘟疫流行正月起至今尚未斷絕如疫痘疫瘡疫疹疫咳等病證東南未平西北又起死於非命者不知凡幾殊深慘痛如吾黃之新橋管廓嶼岙上云墩數村為尤甚患疫痘死者十之八九疫疹死者十之三醫者作正痘麻療治用溫補頂托錯藥而死者亦十之二三惟疫咳侵於小兒村村俱有極其繁多父母不知以小人咳嗽為平常之證不服藥可愈至咳久醫不及而死者亦十之二鄙人診治見有疫氣傳染不論痘瘡麻疹之屬如遍身疼痛有汗煩躁其脈浮沉皆數則用清瘟敗毒飲加減無汗煩躁遍身疼痛胸腹脹悶脈數便結憎寒壯熱則用防風通聖散加減若輕證但寒熱咳嗽發疹用銀翹散加減或用荊芥穗防風連翹牛蒡桔梗杏仁前胡葛根甘草之屬如用加味或生地丹皮紫草或花粉銀花之類相出入治愈者約十之八九觀此醫者必須隨機達變切不可拘泥於專科之書明矣廉按台州所謂疫疹杭寧紹謂之疫瘄江蘇則稱疫痧王孟英曰麻也痧也疹也瘄也各處方言不同也其實一也其辨證首要端在形色先論疹形鬆浮灑於皮面或紅或赤或紫或黑此毒之外現者雖有惡證不足慮也若緊束有根如從皮里鑽出其色青紫宛如浮萍之背多見於胸背此胃熱將爛之徵即宜大清胃熱兼涼其血以清瘟敗毒飲加紫草紅花桃仁歸尾務使松活色淡方可挽回稍存疑慮即不能救次論疹色血之體本紅血得其暢則紅而活榮而潤敷布洋溢是疹之佳境也淡紅有關有疵色淡而潤此色之上者也若淡而不榮或嬌而豔干而滯血之最熱者深紅者較淡紅而稍重亦血熱之象涼其血即轉淡紅色豔如胭脂此血熱之極較深紅而更惡必大用涼血始轉深紅再涼其血而淡紅矣紫赤類雞冠花而更豔較豔紅而火更盛不急涼之必至變黑須服清涼敗毒飲加紫草桃仁細碎宛如粟米紅者謂之紅砂白者謂之白砂疹後多有此症乃餘毒盡透最美之境愈後蛻皮若初病未認是疫後十日半月而出者煩躁作渴大熱不退毒發於頷者死不可救至若妊娠疫證母之於胎一氣相連蓋胎賴母血以養母病熱疫毒火蘊於血中是母之血即毒血矣苟不亟清其血中之毒則胎能獨無恙乎須知胎熱則動胎涼則安母病熱疫胎自熱矣竭力清解以涼血使母病去而胎可無虞若不知此而舍病以保胎必至母子兩不保也至於產後以及病中適逢經至當以類椎若云產後經期禁用涼劑則誤人性命即在此言此皆余氏師愚實地經驗獨出心裁之名論也此案診斷頗有發明方法悉宗余氏胎雖不保而產婦生命幸賴此以保全即產後清熱去瘀亦屬適當之療法似此危證幸收全功蓋不執產後宜溫之謬說對症發藥之效能耳案後說明確有見地
