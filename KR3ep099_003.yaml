body:
  text: 第三卷暑淫病案傷暑腹痛案婦科陳憩南住潮安金山腳病者曾仰山之妻年二十六歲體素弱澄海人住汕頭病名傷暑腹痛原因時當盛暑登樓澆花至晚頭眩天明無恙越數日腹痛適月事後期醫作經治而不知其有暑邪也證候滿床亂滾時時發昏四肢發厥冷汗常流家人惶駭驚為不治診斷診得六脈細澀沉候數而鼓指有力詢家人曰畏熱乎大便祕乎小便數而無多乎其夫從旁對曰然余曰病系感暑不發伏於腸胃阻礙氣機因而作痛脈證合觀其為暑因誤補而腹痛可無疑矣其夫曰最先延吳醫診治謂系停汙服膠艾四物湯加香附不應次加紅花桃仁不應繼再加三稜莪朮又不應乃轉請秦姓老醫謂是中氣大虛肝風內動服黃耆建中湯加入平肝驅風之藥服三劑而痛轉甚遂日夜叫呼飲食俱廢發昏作厥病遂日深更醫多人毫無寸效不得已懇救於福音醫院之洋醫懷醫生萊醫生咸謂周身灰白乃系血流入腹非剖視不可舉家商酌絶對不從今先生曰傷暑藥必用涼但內子虛甚其能勝乎余曰語云急則治其標西昌喻氏曰議病勿議藥議藥必誤病誠哉其言乎且夫人惟體正虛不能托邪外出是以真面目不露率爾操觚者乃致誤耳經曰暑傷氣又曰肺主氣今肺被暑傷則氣虛氣虛不能統血流行是以脈見細澀而外形肺虛之本色周身灰白西醫所以誤謂血流入腹也如果見信剋日呈功療法主用清熱則暑邪自除通氣則腹痛可止清熱通氣湯極效午後三時水煎取服翌日再服處方清熱通氣湯羚羊角一錢先煎金銀花二錢鉤藤錢半滑石粉三錢包煎小青皮一錢全青蒿錢半陳枳殼一錢甘菊花錢半川厚朴一錢淡竹葉錢半條黃芩二錢杭白芍三錢效果一劑能眠二劑思食適月事通病良已廉按傷暑腹痛何至滿床亂滾實因諸醫不明因症漫用成方誤補致劇此案診斷時全在一番問答始得查明其原因對症發藥藥既對症自能應如桴鼓故診斷精詳為醫家第一之要務中暑案兒科粱右齋住玉山湖塘沿病者汪子仲女孫兩歲住驛門前病名中暑原因六月三十夜半發熱吐瀉四肢厥冷醫以藿香散合理中湯一劑病遂大變證候厥逆神昏面青眼竄旋轉反側手足撩亂躁不能寐啼不出音乳入即吐針不知痛乳不知食奄奄一息診斷指紋沉暗散渙舌紫苔黑此中暑誤作中寒治火風大動內陷心包張仲景所謂一逆尚引日之危候也療法宜辛涼開泄故以三黃羚角紫雪為君清熄火風鎮痙醒厥益元扁豆花為臣清絡熱以消暑佐以竹茹止吐使以米仁止瀉也處方紫雪丹二分藥湯調下羚角片四分先煎淡竹茹錢半生錦紋五分古勇三分淡條芩六分生苡仁一錢蠶沙五分拌滑石三錢扁豆花十朵次診兩劑即蘇口仍渴飲大熱泄瀉擬以瀉黃散合人參白虎湯接方蘇沙參錢半用人參恐滯故換之知母錢半生石膏二錢研細防風二分藿香四分陳皮三分甘草四分焦梔子五分效果二劑痊愈以滋養料與乳母吃借乳補助一旬復原廉按此中暑之霍亂證前醫因見其肢厥遂認為中寒霍亂誤用香燥溫補藥證相反則變證之反應勢必劇烈幸而救誤之法用古方重劑加減得慶生全幸矣險哉故病家必以擇醫為首要醫家當以識證為先務也中暑案婦科黃仲權住宿遷東門口病者吳氏婦年四十歲夫業商住宿遷洋河鎮病名中暑原因妊娠六個月平素陰虧肝陽易動中暑風后兩目忽然不見本鎮諸醫只知保胎不知治病病遂劇變證候雙目如盲寒熱胸痞繼即肝風大動手足抽搐不省人事咬牙嚼舌面赤吐血診斷脈大無倫時有促象舌青隨即警告病家曰胎已不保係為邪火灼傷只能專顧妊婦但得病勢轉機腐胎自落不足慮也療法先以毛珀四分研入六一散四錢中開水澄清調服通靈入心衝開惡血保存元神服後肝風即熄隨立標本兼顧之方以挽救之處方磨犀角三分磨羚羊五分天竺黃三錢益元散三錢包煎整寸冬三錢生杭芍三錢元武板六錢生鱉甲六錢左牡蠣六錢生打阿膠珠二錢鮮石斛四錢效果因牙關時開時閉灌藥不易只能零星時服次日復診熱退人省兩目能見諸恙大減於前方減犀羚不用加生地元參麻仁再服三帖朽胎已落産婦無苦後二日忽吐鮮血三口心中嘈辣神魂搖搖不能自主詢知因守俗例産後必服砂糖胡椒水以下惡血隨告病家時際長夏況在陰虛風動之體厥脫堪虞不俟終日改服童便去瘀生新清熱養陰隨開大定風珠與服舌上吹以錫類散接服多劑甘寒二旬乃痊廉按病固中暑諸醫不知去病以保孕反因保孕以壞胎凡專門産科不通內科感症病理者此誤比比皆然血熱動風腐毒上衝陡發子癇兩目如盲舌色轉青脈促病勢危險極矣此時急下其腐胎為第一法當用桃仁承氣去桂加羚角淮牛膝直達子宮以急攻之但用血珀合益元通竅消暑猶恐緩不濟急惟次方用大劑潛鎮清化標本兼顧雖尚有效力然必至三劑而朽胎始落僥幸成功病家亦已大受虛驚矣此案可為專科而不通內科者炯戒中暑案內科何拯華紹興同善局病者薛福生年草三歲住紹興昌安門外松林病名中暑原因夏至以後奔走於長途赤日之中前一日自覺頭目眩暈鼻孔灼熱次日即發劇烈之病狀證候身熱自汗神識昏蒙不省人事牙關微緊狀若中風但無口眼喎斜等症診斷脈弦數舌鮮紅無苔此暑熱直中腦經即日醫所謂日射病也前一日頭暈目眩即次日病發昏厥之端倪前哲謂直中心包者非療法直清腦熱為首要先以諸葛行軍散搐鼻取嚏繼以犀地紫雪為君桑丹益元引血熱下行為臣佐以銀翹清神識以通靈使以荷花露消暑氣以退熱也處方犀角尖五分磨汁沖鮮生地六錢霜桑葉二錢丹皮二錢益元散三錢鮮荷葉包刺孔濟銀花錢半青連翹三錢連心荷花露一兩分沖紫雪丹五分藥湯調下效果一劑即神清兩劑霍然廉按中暑為類中之一多由猝中炎署而得急則忽然悶倒緩則次日昏蒙乃動而得之之陽證也張潔古謂靜而得為中暑李東垣謂避暑乘涼得之者名曰中暑余直斷之曰否不然此案決定為日射之直中腦經理由較直中心包為充足夏令以戴涼帽為必要防其腦猝中耳方用犀角地黃湯加減合紫雪似此急救之古方當然一劑知二劑已中暑案婦科何拯華紹興同善局病者王姓婦年三十一歲住南門外漁家舍病名中暑原因素因血虛肝熱外因猝中暑風一起即頭獨搖故世俗稱為搖頭痧證候手足麻木甚則瘛瘲不能起立立即暈倒診斷脈弦小數舌紅兼紫脈症合參此暑風直中肝經張司農所謂暑邪入肝則麻木甚則手足瘛瘲也療法治風先治血故以鮮地歸身清營行血為君木瓜泄肝舒筋碧玉清肝消暑為臣佐以蒺藜荷梗祛風活絡使以連芽桑枝清絡熄風也處方鮮生地六錢白歸身一錢宣木瓜一錢白蒺藜二錢碧玉散三錢荷葉包刺細孔鮮荷梗七寸連芽桑枝二尺切寸效果一劑即麻木除兩劑瘛瘲亦定後以鮮蓮子湯調理三日而痊廉按暑風直中肝經者乃中肝藏之交感神經也病症與暑中頭腦筋大致相同法從張畹香前哲咸方加減卻是清肝熄風之意惟羚角清泄神經決不可少伏暑案內科葉鑑清住上海病者馬芹甫先生病名伏暑原因暑濕內伏新涼外襲伏邪乃乘機觸發證候發熱凜寒得汗不暢三日不解頭重作脹胸脘作悶口甜嘔惡渴不喜飲寐少便閉溺赤短少診斷舌苔黃膩根厚脈右濡細數而不揚左弦數此暑濕鬱伏腸胃新涼乘襲肌腠分布表裡病勢方張之候也療法表裡雙解故用豆豉蘇梗薄荷解散外邪二陳化濕和胃分治表裡為君厚朴枳實寬中達下為臣余藥均芳香宣泄化濁清暑用以為佐使也處方淡豆豉三錢帶葉蘇梗錢半制川朴一錢赤茯苓四錢梗通草一錢薄荷葉八分後入法半夏錢半生枳實錢半廣陳皮錢半佩蘭葉錢半廣鬱金錢半鮮荷梗一尺去刺次診昨夜得暢汗後形凜己和身熱不壯頻轉矢氣而不大便小溲短赤胸痞頭脹口甜干膩舌苔如昨外感之新邪雖從汗解內伏之暑濕正在鴟張兼之大便四日未行從中夾食夾滯所以舌苔根厚轉矢氣奇臭脈右數而不揚左弦數較大於右慎防傳變當以疏通腸胃下達大便為要著宗達原飲二陳湯加減治之次方大豆卷三錢炒黃芩錢半製半夏錢半陳皮錢半佩蘭葉錢半制川朴一錢生枳實錢半赤苓四錢廣鬱金錢半花檳榔錢半瓜蔞仁四錢打鮮荷梗一尺去刺三診前達膜原之結化表裡之邪大便已通溏而不爽津津有汗溲赤而短熱勢暮分較甚脘痞泛惡稍和口甜渴不喜飲舌黃根苔稍化杳不思食少寐神煩腸胃伏邪正盛垢滯雖達濕熱仍蘊蒸不化脈左大較平右部較揚數則右甚於左病情淹纏一定之理治再分化不生傳變方妥三方大豆卷三錢製半夏錢半薑竹茹錢半炒苡仁四錢淡黃芩錢半赤茯苓四錢生枳實錢半環粟子三錢建蘭葉四片制川朴一錢陳皮錢半通草一錢四診伏暑挾濕濕熱醞釀內戀腸胃外蒸肌表今新涼己從汗解宿垢已由便通何以身熱不解脘悶泛惡口甜干膩不飢少寐便溏不爽溺赤不多良由濕熱兩邪合併黏膩重濁最難分化舌苔黃膩脈來右濡數左弦數是症既不能表又不能下惟有燥濕清熱疏通腸胃靜耐勿躁方無他變四方薑川連七分赤茯苓四錢炒竹茹錢半梗通草一錢淡竹葉錢半制川朴一錢陳皮錢半炒苡仁四錢環粟子三錢建蘭葉四片法半夏錢半生枳殼錢半五診表熱較淡夜寐稍安大便溏行溺赤略長伏邪似有化機口味轉淡渴喜熱飲濕為黏膩之邪熱乃無形之氣交相熏蒸鬱伏已久無速化之法脈右濡數左弦數脘悶泛惡等亦減於昨再以清化五方薑川連七分法半夏錢半陳皮錢半生枳殼錢半通草一錢制川朴八分焦山梔錢半赤苓四錢炒苡仁四錢淡竹茹葉各錢半六診病已八日仍蒸熱不解脘字痞悶口淡干膩所幸舌苔化薄泛惡已平濕熱淹纏本意中事脈來左尚和平右濡數不飢不納胃病也溺赤便溏腸病也再從腸胃治之六方淡黃芩錢半法半夏錢半生枳殼一錢炒苡仁四錢淡竹葉錢半飛滑石四錢包煎陳皮錢半廣鬱金錢半炒竹茹錢半大腹絨三錢豬赤苓各二錢通草一錢七診熱勢下午較甚濕為陰邪旺於陰分舌苔日化大便今日未行溺赤脘滿泛惡已平口淡頭重能寐不酣能飲不多濕熱邪濁已有漸次退化之象脈來右濡數擬清熱不遏化濕不燥為治七方淡黃芩錢半豬赤苓各二錢生苡仁三錢陳皮錢半淡竹葉錢半清水豆卷三錢生枳殼一錢大腹皮三錢炒竹茹錢半茅根肉三扎去衣八診種種病機均隨熱勢為進退熱緩則諸恙悉減熱盛則頭眩神煩脘滿等亦進所喜者大使通利邪濁得以下達舌苔尚黃膩口渴不多飲脈右濡數左部亦現數象濕熱黏膩惟有逐漸清化不生他變可保無虞八方清水豆卷三錢豬赤苓各二錢生熟苡仁各三錢生竹茹葉各錢半茅根肉三扎去衣淡黃芩錢半生枳殼一錢陳皮錢半通草一錢通天草三錢九診今晨熱勢已退午後又來來勢較輕脘悶神煩頭眩等亦見平淡小溲較長夜寐較安大便厚溏渴喜熱飲皆濕化熱退之佳兆也脈右濡數舌苔化薄照此情形交兩候或可熱勢解清治再肅化九方清水豆卷三錢赤茯苓四錢炒苡仁四錢炒竹茹錢半通草一錢炒黃芩錢半廣鬱金錢半陳皮錢半淡竹葉錢半燈心三扎十診熱勢又輕於昨胃納稍展邪勢日見退機惟黏膩重濁之邪一時不易肅清口淡干膩溺色深黃舌苔亦黃脈來濡數病經十二日無非濕熱留戀腸胃二經清以化熱淡以滲濕佐以宣暢氣機治法大旨如此十方法半夏錢半陳皮錢半炒竹茹錢半澤瀉錢半通天草三錢赤茯苓四錢炒苡仁四錢淡竹葉錢半通草一錢燈心三扎十一診暮分肌熱至黎明得微汗而解夜寐尚安渴喜熱飲口味作淡舌根薄黃胃納較展舌苔淡黃脈右尚濡數邪勢日退治再清化惟腸胃之病飲食由口入胃達腸最宜謹慎十一方法半夏錢半陳皮一錢淡竹葉錢半通草一錢澤瀉錢半赤茯苓四錢生穀芽三錢炒竹茹錢半燈心三扎十二診熱勢已淨諸恙亦隨之而退夜寐頗安胃納漸展脈象右軟左弦細神倦懶言邪雖退正未復靜養調理以冀早日痊愈十二方川石斛三錢赤苓三錢炒竹茹錢半生穀芽三錢燈心三扎宋半夏錢半陳皮一錢淡竹葉錢半通草一錢鮮稻葉七片十三診大便微溏胃納大展夜寐亦酣精神較振溺色淡黃口不渴飲脈仍軟弱治再清養和胃十三方川石斛三錢白茯苓三錢穭豆衣三錢炒竹茹錢半鮮稻葉七片宋半夏錢半陳皮一錢焦穀芽三錢通草八分紅棗三枚效果此方服三劑後即停藥靜養月餘而痊廉按伏暑挾濕病勢反較伏暑化火為纏綿往往一層解後停一二日再透一層且每有後一層之邪更甚於前者豫曾數見不鮮矣此案十三診而始告痊愈可見伏邪之病勢糾葛藥雖對症斷難速效也伏暑案內科袁桂生住鎮江京口病者金峙生令堂年近五旬住本鎮病名伏暑原因夏令疊受暑氣為濕所遏伏而不發至深秋感受燥氣而發病證候發熱身痛溲熱胸悶診斷脈滑舌苔白膩此暑為濕遏蘊伏不能外達之症也療法開濕透熱以三仁湯加味處方光杏仁三錢生苡仁四錢白蔻仁六分沖全青蒿錢半青連翹三錢焦山梔三錢佩蘭葉錢半嫩桑梗兩尺切寸次診接服兩劑熱愈甚口渴心煩舌苔轉燥脈亦轉數此伏熱蘊伏甚重也治以清透伏暑為君兼顧陰液次方淡黃芩三錢栝蔞皮三錢地骨皮三錢全青蒿二錢白知母四錢鮮生地一兩青連翹三錢銀柴胡二錢漢木通一錢水蘆根一兩去節鮮茅根一兩去皮另加雅梨汁一酒鍾和服三診一劑熱少平二劑後病人忽戰栗惡寒震動床帳蓋欲作戰汗病家誤會謂藥之誤議延他醫幸其弟陶駿聲君來告速余往救豫謂此戰汗也病退之機不可妄動及豫至其家則戰栗已止身出大汗而脈靜身涼神氣亦甚安靜但覺疲倦而已隨用薄粥湯與飲以扶胃氣三方北沙參三錢原麥冬三錢蘇百合二錢生苡仁四錢鮮石斛三錢天花粉三錢雲茯苓三錢清炙草五分效果調養數日而痊廉按暑為濕遏初起邪在氣分即當分別濕多熱多濕多者治以輕開肺氣為主肺主一身之氣氣化則濕自化即有兼邪亦與之俱化濕氣瀰漫本無形質直用體輕而味辛淡者治之辛如杏仁蔻仁半夏厚朴蓉梗淡如苡仁通草茯苓豬苓澤瀉之類啓上閘開支河導濕下行以為出路濕去氣通布津於外自然汗解此案初用三仁湯加減即是開濕鬱之法逮至濕開熱透當然以泄熱為首要所難者戰汗一關耳其人正氣足則戰汗出而解不足雖作戰而邪汗不出非邪閉即氣脫矣幸而戰栗一止身出大汗而脈靜身涼可用清養胃陰法以善後伏暑案內科王經邦住天台柵門樓病者王士云妻年四十三歲住寧海東路王家病名伏暑原因暑邪內伏至九月初旬遇風而發證候獨熱無汗晝夜引飲吃茶五六壺唇焦齒稿舌苔灰燥診斷脈實大此脈證當兼解肌方可除根若有汗僅用白虎湯不可再加解肌療法白虎湯參以解肌處方生石膏八錢生知母三錢生甘草八分粉葛根一錢桔梗二錢蘇薄荷二錢淨連翹三錢淡竹葉三錢天花粉三錢蟬衣八分效果一劑得效三劑即痊廉按此清透伏熱之正法辨證確用藥當自然投之輒效伏暑案內科周小農住無錫病者陳姓忘其年住滬北珊家園病名伏暑原因當初發身熱時醫不知其暑邪內伏反謂為夾陰治不應改延豫診證候熱起面赤口渴喜冷自汗便通溺短赤澀診斷脈數苔黃脈證均屬暑熱且探足不冷詢陽未縮非夾陰也豫遂曉之曰時當秋暑正酷窗櫺密關人眠棉褥之上人多氣蒸悶甚不可耐即此厚褥肩牖已足增病無疾之人尚不可耐遑問其他即督令啓旁窗易關席其家中先入之説深以夾陰為慮豫又諄諄譬之曰內經謂治諸熱病以飲之寒水乃刺之必寒衣之居止寒處身寒而止云云飲冷等固不可拘穢熱之衣宜換悶熱之處勿宜否則必致輕者重重者危矣病家當時領會聽余言而履行之療法清透伏暑為君展其氣機為佐處方青蒿腦錢半青連翹三錢銀花錢半焦山梔三錢廣鬱金三錢生打片黃芩錢半飛滑石四錢包煎川通草一錢生苡仁三錢白花一錢先用活水蘆根二兩鮮刮淡竹茹四錢煎湯代水效果二劑起伏漸輕三劑即安廉按此伏暑輕證之療法妙在開通病家督令啓窗易席卻是一服大清涼散方亦輕靈清穩得力於葉法伏暑案內科葉鑑清住上海病者顧左年三十餘嘉定人寄寓慶祥里病名伏暑原因痰火體質新涼引動伏暑證候病經五日得暢汗後形寒雖和熱勢反的身重渴喜涼飲口甜膩脘悶頭重便閉溺赤診斷脈滑大數舌尖糙中根灰膩垢厚體豐痰多向來濕熱亦盛挾伏邪垢滯充斥陽明已有化火之漸病情險重防昏陷變端療法是病暑濕痰食並重將欲化火故用蒼朮白虎兩清濕熱為君再以枳實檳榔元明粉萎貝萊蔔導滯化痰峻通大便為臣鬱金開結佩蘭化濁為佐通草輕揚荷梗清暑為使處方泗安蒼朮三錢肥知母三錢花檳榔錢半象貝母四錢佩蘭葉錢半生石膏八錢研細元明粉錢半同打瓜蔞仁四錢小枳實錢半萊蔔子三錢廣鬱金錢半鮮荷梗一尺通草一錢次診大便連通先結後溏舌苔較化脘悶灼熱稍和尚渴飲口甜汗多頭面脈大較平滑數依然垢滯雖得下達而腸胃之濕熱痰火尚甚仍防內傳昏陷變端治再清化次方生石膏八錢研細生枳實錢半瓜蔞仁四錢焦山梔三錢淡黃芩錢半廣鬱金錢半佩蘭葉錢半生萊蔔子三錢生苡仁五錢象貝母四錢陳皮錢半生竹茹葉各錢半三診熱勢大衰大便又行黏溏頗多煩悶渴飲身重頭重等症亦悉退三舍脈來六部一律滑數尚汗多頭面舌黃根微膩口淡苦不甜溺短色赤伏邪痰火均從大便下達最為美事惟體豐痰盛防其餘邪復熾三方生石膏六錢研細焦山梔三錢冬瓜子五錢廣鬱金錢半淡黃芩錢半象貝母四錢生苡仁五錢鮮竹茹葉各錢半飛滑石四錢包煎活水蘆根一兩去節通草一錢鮮地栗四枚切此方服一劑病又輕減因申地屋小天熱諸多不便即回家請醫調治經月餘又來寓門診調理第二次第一診伏暑大病之後眠食均安惟寐醒口氣干苦咳嗽痰多厚稠大便不調小溲淡黃脈來濡滑舌黃微膩胃熱熏蒸肺不清肅病後液虛當清化參以生津治之宗千金葦莖湯加減處方活水蘆根一兩去節生苡仁三錢瓜蔞仁四錢杏仁二錢去皮枇杷葉三片去毛冬瓜子四錢原金斛三錢川貝母二錢去心生竹茹二錢白前錢半二診咳嗽已平稠痰尚多大便日行帶溏痰濕體本以溏便為相宜脈來濡滑安寐能食寐醒仍有口氣一切黏膩濃厚酒肉等務宜少食俾不至生痰助火也二方嫩蘆根一兩生苡仁三錢川貝二錢去心赤苓四錢橘白一錢冬瓜子四錢原金斛三錢蛤殼四錢生打生竹茹錢半竹瀝半夏錢半效果此方服五劑痊愈廉按伏暑挾痰化火病情糾葛用藥頗難過用辛淡則傷陰涸液過與苦寒則滯氣傷中若先回護其氣液又恐助濁增病此案第一方蒼朮白虎加減大有力量以後四方亦清靈穩健配合適度自非老手不辦伏暑案內科黃仲權住宿遷東門口病者範重華年十七歲高等小學學生住本城病名伏暑原因於七月間忽然頭暈嘔吐小便澀痛曾服他醫利小便藥而愈九月再發仍服前醫之八正散加芒硝及散藥至劇又易數醫皆作癆治病更甚乃延余診治證候發熱咳嗽痰中帶血耳聾便濁每溺澀痛難忍心煩頭點苦狀莫名飲食不進診斷脈象浮滑有似細數竊思若系癆損必然耳目聰明各恙必緩何至如此其急前賢王潛齋云鼻塞治心耳聾治肺溺痛便濁皆伏暑之變象也遂斷為肺竅伏熱療法以清透肺經伏暑為君佐以芳涼通竅辛潤消痰用千金葦莖湯加味處方生薏仁六錢冬瓜仁五錢原桃仁三分飛滑石三錢包煎鮮菖蒲一錢天花粉三錢川貝母二錢扁豆衣三錢厚朴花一錢白通草錢半鮮葦莖二十寸為引效果服後各恙均減轉方以瀉白散加石葦冬葵子瞿麥再服三劑而愈廉按伏暑即伏熱也所伏之淺深不一病狀之發現各殊此案暑伏肺經誤用清補往往釀成肺癆吳氏師朗所謂不虛而做成虛非癆而做成癆也今以千金葦莖湯加味輕清靈透用得卻好惟朴花不如易鮮刮淡竹茹清絡熱以除痰又能止血以監製桃仁較為切當伏暑案內科何拯華紹興同善局病者王珊卿年三十四歲住潞家莊病名伏暑原因夏季吸受暑氣為濕所遏潛伏膜原至秋後新涼逗引而發證候初起惡寒發熱午後夜間較重狀似瘧疾而不分明噁心胸悶口乾不喜飲至晨得汗身熱始退而胸腹之熱不除日日如是已有一候診斷脈右緩滯左浮滯沉數舌苔白膩而厚脈證合參此膜原濕遏熱伏伏邪欲達而不能遽達也療法仿達原飲加減故用朴果檳榔開濕鬱以達原為君梔翹蒿薷涼透伏暑為臣然猶恐其遏而不宣又以蘆根細辛為佐助其清宣疏達使以荷梗者不過取其清芬消暑通絡利溺耳處方薄川朴一錢草果仁八分海南子錢半焦山梔三錢青連翹三錢青蒿腦錢半西香薷一錢鮮荷梗五寸切活水蘆筍二兩北細辛五分先煎清湯代水次診疊進兩劑達膜原而解外邪外邪解而熱不除汗自出不惡寒反惡熱口轉渴便閉溺黃苔轉黃糙脈右轉浮洪左轉浮數此伏暑發現邪從陽明經腑而外潰也法當表裡雙解仿涼膈散加減處方焦山梔三錢青連翹三錢青子苓錢半青蒿腦錢半陸氏潤字丸三錢拌飛滑石六錢包煎鮮竹葉卅片燈心五小帚三診胸腹痞滿按之軟而作痛大便解而不多或略多而仍覺不爽溺赤澀或黃濁此由濁熱黏膩之伏邪與腸中糟粕相搏宜用加味小陷胸湯加陸氏潤字丸寬胸脘以緩通之處方栝蔞仁五錢杵竹瀝半夏二錢小川連一錢小枳實二錢陸氏潤字丸三錢拌滑石六錢包煎先用鮮冬瓜皮子四兩西瓜翠衣二兩煎湯代水四診連進兩劑服一煎大解一次再服再解不服不解如此服四次大解亦行四次而伏邪解而不盡熱仍減而不退惟舌紅苔薄而無質地脈轉小數乃邪少虛多陰虛火亢之候法當增液救陰肅清餘熱仿甘露飲加減處方鮮生地六錢鮮石斛三錢淡天冬錢半原麥冬錢半西洋參錢半青蔗漿一瓢雅梨汁兩瓢熟地露一兩三汁同沖先用炒香枇杷葉一兩去毛筋淨鮮茅根二兩去皮煎湯代水效果疊服三劑得育陰墊托從中下焦血分復還氣分先一日出涼汗繼發白㾦而熱始全除胃氣漸復而愈廉按素問謂逆夏氣則傷心秋為痎瘧奉收者少冬至重病此即經論伏暑晚發之明文也故病發於處暑以後者名曰伏暑證尚淺而易治發於霜降後冬至前者名曰伏暑晚發病最深而難治其伏邪往往因新邪引發如葉香岩先生曰伏暑內發新涼外束秋冬之交確多是症或因秋燥或因冬溫觸引而發者數見不鮮此案暑伏膜原乃腹統膜空隙之處必先明又可九傳之理由而後能治伏暑前後四方於伏暑治法已略見一斑矣至若伏暑解期以候為期每五日為一候非若傷寒溫邪之七日為期也如第九日有涼汗則第十日熱解第十四日有涼汗則第十五日解如無涼汗又須一候矣以熱解之先一日必有涼汗此余所歷驗不爽者也伏暑案內科袁桂生住鎮江京口病者陳祝山年約三十歲住本鎮病名伏暑原因今年七月患伏暑病延某醫診治服藥四五日不效證候壯熱頭疼胸悶咽喉作燥口渴溲赤大便七八日不通診斷脈數舌絳苔薄焦燥無津蓋暑熱蘊伏腸胃熱結之病療法當先通大便以解腸胃之焚處方生錦紋二錢元明粉三錢生枳殼二錢淡黃芩二錢原麥冬二錢天花粉二錢生甘草五分次診此藥服後得大便兩次熱全退頭痛亦輕舌苔轉白膩脈緩不數小便仍紅知飢欲食乃易方以清潤等品以解餘邪次方青連翹三錢生苡仁三錢佩蘭葉一錢川貝母二錢北沙參三錢天花粉三錢三診越兩日又復發熱口渴胸悶是餘邪欲出也以小陷胸湯合小柴胡湯加減三方栝蔞仁四錢杵小川連一錢仙半夏錢半淡黃芩錢半青連翹三錢全青蒿二錢生甘草五分川柴胡八分效果接服兩劑得汗而安説明大凡應用硝黃之病決非他藥所能代若畏而不用必致纏延誤事但須辨認真切用之有方不可顢頇孟浪耳廉按此熱結胃腸伏暑實證之治法故初用調胃承氣湯加味直清陽明僅得大便兩次伏熱已退退而不淨輕用清潤重用苦辛通降肅清餘熱而痊尚屬伏暑之輕淺證初中兩方皆用漢方加減可謂得力於傷寒論之古方學派者矣陽明伏暑案內科錢蘇齋住蘇州謝衙前病者楊緶業年四十餘住蘇城裝駕橋巷病名陽明伏暑原因忍飢耐寒操作勤勞故暑邪內伏而不覺至歲暮天寒乃一發而不可遏時小除夕風雪嚴寒天將薄暮病起方三日也證候病者袒胸臥床無幃帳大渴惡熱氣粗遍身汗如雨淋診斷脈洪大而數舌薄黃無苔垢此即仲景傷寒論之陽明熱病也但病在經而不在腑邪在氣而不在營風雪嚴寒中見此大熱大寒之證其人陽氣素盛邪氣向外而欲自解也療法用竹葉石膏湯加減以驅陽明經氣分之暑邪雖在天寒藥能對症毋庸顧慮也處方生石膏三兩研細生甘草一錢天花粉三錢麥冬肉三錢肥知母三錢香粳米三錢大竹葉三錢效果二劑後即熱退身涼稀粥調養未再服藥而竟愈廉按陽明伏暑較之潛伏陰經者易治今用竹葉石膏湯加減二劑後即熱退身涼者重用三兩石膏之效力也在醫家敢用三兩石膏者不乏其人而病家敢服三兩石膏者實為罕見況在深冬之時蘇城之地乎老朽不敏竊竊懷疑而莫釋焉惟方系經方藥系良藥如果敢服效可立見心雖懷疑仍選録以表彰之者有一王良詭遇之巧法莫妙於在夏令時用生石膏研細同鮮荷花蒸露囑各藥肆預備待用方中但寫荷花露若干代水煎藥此仿前哲馬元儀暗用麻黃之成法耳肝經伏暑案婦科何拯華紹興同善局病者金姓婦年二十五歲住平水鎮病名肝經伏暑原因素因肝鬱善怒九月間伏暑感秋燥而發證候初起身熱咳嗽咳痰黏而不爽繼即手足麻木瘛瘲神昏診斷脈右浮澀沉數左弦小數舌鮮紅兩邊紫脈證合參張司農治暑全書所謂暑入肝經則麻木余則謂暑衝心包熱極動風則神昏瘛瘲也療法當先從肝心透出使仍歸肺肺主皮毛邪從皮毛而外達故以羚角鮮地銀翹清營熄風為君木瓜蒺藜益元散等舒筋清暑為臣佐以紫雪芳透使以鮮石菖蒲辛開皆欲其伏邪外達之意耳處方羚角片一錢先煎鮮生地八錢濟銀花二錢青連翹三錢陳木瓜一錢刺蒺藜二錢益元散三錢鮮荷葉包紫雪丹四分藥湯調下鮮石菖蒲錢半生沖次診連進兩劑瘛瘲除神識清身反大熱咳痰韌黃脈右浮滑搏數舌紅漸淡起黃燥薄苔此伏邪從肺胃外潰也當用辛涼清燥領邪外出法次方冬桑葉二錢蘇薄荷一錢生石膏六錢研細淡竹瀝兩瓢分沖光杏仁三錢牛蒡子二錢杵青蒿腦錢半雅梨汁兩瓢分沖先用野菰根二兩鮮枇杷葉一兩去毛筋淨煎湯代水效果兩劑熱退咳痰亦減終用吳氏五汁飲調理而痊廉按伏暑晚發病最纏綿難愈發表則汗不易出過清則肢冷嘔惡直攻則便易溏瀉辛散則唇齒燥烈此用藥之難也其為病也競有先發瘩次發疹又次發斑而病始輕者亦有疹斑併發又必先便黑醬次便紅醬終便淡黃糞而熱勢始退者王孟英所謂如剝蕉抽繭層出不窮真閲歷精深之言也此案病勢雖猛而方藥對症競能速效者以來勢愈烈去勢愈捷乃物極必反之理耳伏暑晚發案內科李竹溪住蕪湖米市街病者胡長卿年十歲住東寺街病名伏暑晚發原因夏傷於暑潛伏陰分復感新邪觸發已逾兩候初經老友胡君馥生治療方藥清解不謬證候汗出半身熱退復起耳聾妄語神志似明似昧唇繭苔焦齒燥齦血口臭噴人便閉溲赤子午二時躁擾不安躁時自言心痛需人按摩過此漸安安則不痛而寐寐則驚惕診斷兩脈數大此已任篇所云秋時晚發感症似瘧即伏暑之證候也第伏有淺深邪有輕重質有強弱之當別耳此病年稚質薄元陰未充先天不足伏邪深入重圍根深蒂固所以汗難驟達邪難驟退已延兩候邪從火化纍及陰維水虛火炎胃成焦土恐犯溫病虛甚死之危候無怪胡君不肯獨任其肩茲幸脈尚不弱尚可希冀邪潰療法新邪當先達表伏邪當先清裡里清表自解也此病此時不獨里有伏邪已覺陰維見症陰分已傷法當甘潤鹹寒急救陰維育陰滋水擬復脈加龜板元參以龜板能通任脈止心痛元參能制浮火上遊更佐至寶丹清心透邪安神定魂處方炙甘草一錢乾生地六錢麥門冬三錢連心東阿膠三錢另燉沖杭白芍三錢火麻仁二錢龜板一兩生打黑元參三錢河水兩盞文武火煎七味取一盞煬膠一半服渣再如法服時調下至寶丹兩顆二診夜分覺安子時仍躁心痛已減齦血依然轉多紅色且焦苔未退口氣仍然燻人轉用玉女煎去熟地之膩守易生地之滋清陰維已立大便可通仍倍加元參之柔潤既多矢氣可望更衣二方生石膏六錢研細大生地三錢大麥冬二錢肥知母錢半生牛膝二錢黑玄參五錢河水煎服渣再服三診業已更衣齦血亦止熱仍不退日間覺安夜寐欠逸躁減煩增是邪欲潰而陰未復中土松而心火炎仍屬陰虛陽勝之兆因與阿膠雞子黃湯瀉南補北加生草瀉火以馭苦寒細地涼心石斛養胃冀其夜得安眠始可無虞三方小川連八分泡黃芩六分杭白芍三錢東阿膠三錢另燉細生地四錢金石斛二錢生甘草七分雞子黃一杯後納攪勻河水先煎六物一盞復渣再煎一盞去渣內砂罐中先以膠衝入和勻復納雞子黃攪勻先服一盞余藥隔水燉之逾六小時再服四診昨夜安眠熱未全退焦苔去而轉黃底仍掀紅脈左平靜右寸關仍搏指乃上焦餘邪未淨改以竹葉石膏湯加細生地金石斛義取甘涼可許來朝熱退四方鮮竹葉二十片生石膏五錢仙半夏錢半西洋參一錢水炙草七分揀麥冬二錢細生地四錢金石斛三錢米泔水煎服五診昨服甘涼正當三候天明津津汗出熱退舌紅亦淡苔黃未淨知其內熱無多且知飢啜粥胃氣漸開一意甘涼前方再進當此九仞之功謹當加意防護另囑日啜京腿清湯借血肉有情之品食養盡之再為善後之策效果停藥數日十八潮熱又作口苦苔復黃厚耳根發頤掀硬紅腫此因畏藥停診失於善後且連日進谷正氣勝而餘熱自尋出路也此時水仙難覓紅腫之處囑以醋磨金果欖濃汁搽之方擬梔豉合溫膽去生薑橘皮用生草加金銀花連翹赤小豆仿食復法兼清上焦而愈處方黑山梔一錢炒香豉錢半炒竹茹二錢雲茯苓三錢鮮半夏二錢炒枳實錢半天花粉二錢生甘草七分金銀花三錢青連翹二錢赤小豆三錢杵河水煎服廉按此係少陰伏暑纍及陰維故先實其陰以補不足繼瀉其陽以退伏熱仿長沙少陰篇中豬膚復脈黃連阿膠諸方之例前哲程郊倩輩善用此法前後五方亦均清穩伏暑春發案內科周小農住無錫病者華伯範之室忘其年住東亭病名伏暑春發原因己亥秋伏暑內熱忽退忽發守不服藥為中醫之戒至今二月已經半年病勢較重始延豫診證候寒熱如瘧午後則發暮汗氣穢飲食漸減診斷脈滑舌膩厚掯此由先前未藥伏邪為痰濕阻滯鬱而留戀也療法以蒿柴桂膏知茹等透邪搜絡為君二陳苓苡等化痰滲濕以佐之處方青蒿腦錢半川柴胡八分川桂枝六分生石膏六錢杵竹瀝半夏三錢廣橘皮一錢廣橘絡八分浙茯苓四錢生苡仁四錢肥知母三錢鮮刮淡竹茹三錢霜桑葉錢半元米湯炒研末臥前服鱉甲煎丸九粒清晨空心服效果三劑寒熱輕減汗少轉方去鱉甲煎丸原方加半貝丸三錢包煎寒熱循止飲食調養而痊廉按伏暑為病古書未曾明言至深秋而發者始見於葉氏臨證指南霜未降者輕霜既降者重冬至尤重然競有伏至來春始發者由於秋暑過酷冬令仍溫收藏之令不行中氣固太泄而傷邪熱因中虛而伏其綿延淹滯較指南所論更甚調治之法則尤難非參耆所能托非芩連所能清惟借輕清靈通之品緩緩撥醒其氣機疏透其血絡始可十救七八若稍一呆鈍或孟浪則非火閉即氣脫矣此案是伏虛化瘧挾有痰濕之治法故用桂枝白虎合二陳湯加減參以輕量鱉甲煎丸半貝丸等則顯而易見矣伏暑胎瘧案兒科何拯華紹興同善局病者羅士信之子年三歲住岐山病名伏暑胎瘧原因暑濕內伏至秋感涼風而發證候先寒後熱熱重寒輕一日一發自下午起至半夜汗出熱解手心脘腹熱不盡退喉中有痰一哭必嘔嘔即痰出或眼上泛或手足掣一掣出汗燒熱即退少頃復熱診斷脈弦而數舌苔黃白相兼此暑為濕遏伏於膜原感秋涼而外潰兒科書稱胎瘧者以其出胎之後第一次發瘧也療法仿嚴氏清脾飲加減用柴胡黃芩和解表裡為君然邪伏膜原非草果不能達非知母不能清故以為臣佐以半貝使以薑茶一則因無痰不成瘧一則助柴芩之和解也處方川柴胡五分青子芩五分草果仁三分知母八分竹瀝半夏五分京川貝八分去心鮮生薑一小片細芽茶一撮效果服一劑汗出津津瘧勢即輕二劑熱大減瘧亦漸除繼以荷花露燉水晶糖兩服而胃開漸復原狀廉按胎瘧之為病古無此名其説始於萬氏兒科前明萬密齋曰凡幼小及壯年初次患瘧者皆為胎瘧當審其因而治之因於風寒者從風寒治固於暑濕者從暑濕治因於痰食者從痰食治大旨先分寒熱之多少寒多熱少者先與香蘇蔥豉湯發其表繼與平胃散加草果炒常山除其瘧熱多寒少者先與柴胡白虎湯解其熱繼與白虎湯加常山草果平其瘧此萬氏治胎瘧之方法也此案處方雖從嚴氏清脾飲加減惟嚴方偏於燥濕此方注意清熱同一和解而方則一表一里一寒一熱尤擅和解之長宜乎一劑知二劑即減耳伏暑兼孕案婦科嚴紹岐住紹興昌安門外官塘橋病者施雙喜之妻年三十四歲住昌安門外測水牌病名伏暑兼孕原因孕九個月霜降後伏暑晚發前醫或作傷寒證治或作冬溫症治皆不應而病反轉劇改延豫診證候黃昏寒熱似瘧非瘧入口即吐無物不嘔診斷脈右浮大搏數舌苔微黃薄膩脈證合參此胃熱移肺肺胃不和也療法用川連清胃為君蘇葉宣肺為臣皆用輕量泡服輕清以救其肺胃佐一味狗寶鎮降氣逆以止嘔使以甜醬油數滴取其咸能潤下也處方小川連四分蘇葉三分開水泡取清汁衝入甜醬油一小匙送服真狗寶二分次診一劑輕減再劑嘔止脈轉虛數舌紅無苔豫即告辭以極於上者必反於下恐胎一墮即為棘手病家懇切求治辭不獲已姑用安胎清暑法以消息之次方青子芩一錢生白芍三錢清炙草四分淡竹茹三錢絲瓜絡三錢西瓜翠衣一兩銀花露一兩分沖荷花露一兩分沖三診連服四劑不足月而即産産後幸而母子均安惟脈細澀按之反數心搖搖如懸鏡惡露點滴全無豫思病將一月血為伏熱消耗今欲強通其瘀是向乞丐而逼其焦鍋粑也內經謂血主濡之理當增液濡血為治三方細生地五錢烏玄參四錢殊麥冬三錢蘇丹參五錢茺蔚子三錢益母膏一小瓢分沖效果二劑惡露雖行寒熱復作豫謂是極於下必反於上乃伏暑從上焦外潰也遂將原方去丹參茺蔚益母膏三味加青蒿腦錢半東白薇三錢鮮茅根一兩益元散三錢荷葉包刺十餘細孔生藕肉二兩去節疊迸三劑而痊廉按胎前伏暑凡專門産科無不注重於保胎然當辨保胎之法或由元氣之弱者宜補正或由病氣之侵者宜治病善治其病正所以保其胎苟不知其所以然而徒以俗尚保胎之藥投之若置伏暑而不顧反致伏熱愈盛消爍胎元其胎必墮是保胎適足以墮胎矣此案診斷注意上下二焦別有會心用藥處方既能清解伏暑又能安胎保孕産後又不用強通瘀血之套方皆有見地足為胎前産後挾有伏邪者樹一標準伏暑夾痰食瘀案內科曹炳章住紹城和濟藥局內病者姚幼搓之媳陳氏住紹興偏門外快閣病名伏暑夾痰食瘀原因初病時尚食肉品麥面兼服補品逮熱重胃閉始停繼因熱逼血室經水適來俄頃未淨即止前醫皆遵熱入血室例治多罔效遂至病勢危殆證候一起即身灼熱胸痞便閉小溲短澀經來即止耳聾目閉神昏譫語手足瘛瘲診斷脈弦數搏指舌底苔灰黑黃焦浮鋪苔上且黏厚板實舌尖深絳邊紫兼青詢其前由閲其服方參考現症為其疏方療法重用蠶沙鼠糞化濁道而通胞門之瘀塞硝黃牙皂以滌垢攻堅積地鱉桃仁逐瘀通血絡鮮生地大青葉羚羊鉤藤清血熱而熄肝風鮮菖蒲天竺黃豁痰而開心竅處方晚蠶沙五錢豭鼠矢三錢芒硝三錢生錦紋三錢牙皂二錢地鱉蟲五隻原桃仁錢半鮮生地一兩羚羊角錢半鉤藤四錢鮮石菖蒲錢半搓爛生沖天竺黃二錢效果服一劑而大便下黑垢瘀塊成團成粒者甚多瘛瘲既定神志略清次晨復診脈勢已平而舌苔松腐黑垢滿堆刮去瓢余未減其半且逾時又厚繼進桃仁承氣湯加減服至五劑舌垢始淨身涼胃動調理而痊説明此證因先病伏暑夾濕繼則夾食再則阻經停瘀濕蒸熱灼便閉溲澀邪無去路又值經來邪熱竟入血室經水被熱煎熬以致凝瘀淤塞胞門前醫雖當熱入血室治然藥性不能直入淤塞之胞門故皆罔效證因夾濕夾食夾瘀夾痰堆積至重重疊疊余治以先通胞門淤塞其血室內之熱亦可同時引導下出舌苔因化反厚者此因積藏過多如抽蕉剝繭層出不窮者是也康按詢其前由閲其服方為臨證時所首要庶於因證及有無藥誤瞭然於心而後對證發藥藥用當而通種此案處方味味著實精切不浮可為伏暑之夾症定一模範伏暑陰瘧案內科王景祥住建德病者胡炳火年二十住浙江建德城內石板井頭病名伏暑陰瘧原因素因體質羸瘦性情懈怠長夏暑濕內伏深秋涼氣外束新感引動伏邪而發證候發熱惡寒先寒後熱熱多寒少發作有時四日一度發必在暮夜陰盛之際每至平旦交陽分始退診斷脈象沉弦參之以證考金匱云瘧脈自弦弦而且沉則為陰瘧也療法陰瘧以提邪外出為要務故用細辛合小柴胡法從少陰提出少陽為君然病因伏暑故又佐桂枝白虎法則和解劑中含有透發之義也處方嫩桂枝一錢生石膏八錢研細肥知母四錢炙甘草七分北細辛五分川柴胡一錢淡枯芩八分薑半夏二錢鮮生薑三片大紅棗三枚效果服二劑邪從汗解瘧變為間日一度時間亦提早在日晡時分遂將原方去細辛加炒常山錢半草果六分二劑而愈廉按陰瘧雖屬三陰亦必先查問原因辨明證之寒熱虛實而應以藥之溫涼補瀉如此案病因暑濕內伏秋涼外束故用藥從陰達陽仍對因證而處方若謂陽經輕淺之方治之無益必以仲景治三陰之法為根蒂雖屬古方學派之高談實則刻舟求劍無濟於病也伏暑勞瘧案內科許翔霄住無錫滸泗橋病者鄧燦鴻年近弱冠業紗號住錫城病名伏暑勞瘧原因素因飲食失節脾胃受戕現因夏季伏邪留戀內傷兼外感而發證侯寒熱有汗止作無時肢痠力乏遇小勞而即發得微汗而即解納少神憊診斷脈形濡弱舌淡紅苔薄白此由營虛衛弱漸成勞瘧之候也療法仿雷氏營衛雙調法加廣皮以醒胃處方川桂枝四分炒白芍錢半炒歸身錢半廣皮一錢炙甘草三分西潞黨三錢土炒炙綿耆二錢生薑二片大棗三枚效果連服三劑而瘧止後用歸芍異功散調養兩旬而愈廉按雷少逸氏營衛雙調法即葉案參耆桂枝湯雖為治勞瘧之正方然必俟伏署已清如案中所敘遇小勞即發得微汗即解肢痠力乏納少神疲者方可引用伏暑瘧壞病案內科李竹溪住蕪湖米市街病者王樂生年十八歲商學生住東門病名伏暑瘧壞病原因伏暑晚發化瘧來在陰分三次後以金雞勒霜截止伏邪內郁不得外泄證候猝然暈僕已經四日據述間日有動靜靜之日則目張齒噤舌蹇神呆身不熱動之日申酉時間身乃壯熱熱來則棄衣欲奔手舞足蹈見燈則似吳牛喘月莫可名狀逾三四小時得小汗乃靜靜則如前口總不言診斷脈來弦數按之搏指病勢初來有似卒中證以日來情形脈象又為卒中必無之理前醫猜痰猜中莫衷一是豫獨取其母口中之動靜二字偶得其機兼參脈象乃問其母病前可曾患瘧否答曰然問愈否答曰瘧來三次急欲進店自以西藥止之到店三日即發見此病豫曰是矣乃告其母曰此仍是瘧也不過邪伏少陰重門深鎖少陽木火內橫少陰營液被劫機樞不靈以致口噤舌強神呆也而目獨張者目為火戶邪火尚欲自尋路出故不問病之動靜目總炯炯而不閉此瘧之變象也亦即木火披猖不受禁錮之象也足見陰分之瘧其勢未殺不宜早截之徵所幸退時尚有小汗仍可開達領邪外出療法伏邪內亂速宜透解第邪勢鴟張或進或退不得不從事養陰透邪仿青蒿鱉甲湯加減參以至寶丹以通靈之品借松機樞處方青蒿梗三錢生鱉甲五錢細生地四錢霜桑葉錢半粉丹皮二錢天花粉二錢肥知母二錢酒炒生甘草七分至寶丹一粒研細用藥湯調下陰陽水各一盞煎成一盞午前一服余渣子前服煎如前法二診服兩帖目合能言舌能伸縮苔色老黃而焦津少惟動日上燈之時則大呼滿房紅人滿屋皆火起欲外奔總屬陰不制陽火從目泄而眩也改以加減炙甘草湯作乙癸同源之治另加元參制上遊之浮火以制腎川連瀉亢上之丙火以堅腎亦仿瀉南補北之義處方炙甘草一錢乾生地六錢連心麥冬三錢陳阿膠三錢煬沖杭白芍三錢生棗仁錢半豬膽汁拌黑元參四錢小川連六分鹽水炒河水五杯煎取兩杯頓服渣再煎服效果一派養陰滌熱十日病全消滅胃納日強而愈廉按少陰伏暑半從陽分外潰而轉瘧半從陰分而化火此時急急開提透達使陰分伏熱全從陽分而出病勢方有轉機乃遽用味苦性澀之截藥例如關門殺賤而主人翁未有不大受其害自然變證蜂起猝然可危此案斷證別具新識處方用藥卻合成規非平時素有研究者不辦伏暑痢案內科劉倫正住泰安顏張鎮病者劉貫如年四十八歲住山東泰安東南鄉黃道溝現任河南某縣知事病名伏暑痢原因酬應紛繁夏令吸受暑氣疊次為飲食所遏潛伏於腸胃膜原之間至秋積熱而變痢證候下痢紅白裡急後重脘腹灼熱滯痛難忍診斷六脈滑數有力舌苔黃而厚膩脈證合參滑為食滯化熱數則伏暑化火此內經所謂腸澼便膿血也膿色白而血色紅故名曰赤白痢其所以成赤白痢者熱傷氣分則下白痢熱傷血分則下赤痢熱傷氣血則赤白痢兼作矣療法無積不成痢故用萊蔔枳殼楂肉消食積為君歸芍川軍行血滌腸為臣木香檳榔開降滯氣使淤滯下行黃芩車前清利小便使伏暑下泄皆以為佐使甘草配白芍和腹中以止痛又和諸藥以緩急仿潔古老人行血則便膿愈調氣則後重除之法也處方萊蔔子四錢花檳榔三錢炒枳殼二錢車前子三錢淨楂肉四錢生甘草八分生川軍二錢後入青木香八分油當歸五錢生白芍八錢青子芩錢半水煎服效果初服一劑則痛減次日又一劑則痢亦減繼用生蘿蔔汁生荸薺汁淨白蜜三物重湯燉十餘沸溫服調理三日痢止胄動而痊廉按此仿張氏芍藥湯加減雖為初痢之常法然惟體實者相宜不可一概混用也伏暑煙痢案婦科尹矩山住濟南西小王府病者李書田之妻年逾四旬住山東省城病名伏暑煙痢原因素嗜鴉片性善怒近五六年鬱怒更甚時犯肝氣常有兩脅中脘少腹作疼等症公元一九二二年秋感滯下症證候面白微黃體格不甚瘦弱大便時中氣下陷腰腹墜痛裡急後重診斷脈左手沉弦而緊右手虛數舌苔厚膩黃白相兼此內挾肝鬱兼受暑濕感秋涼而發為腸澼也按內經於腸澼一證辨論生死脈象極詳巢氏病源則謂痢而赤白者是熱乘於血血滲於腸內則赤冷氣入腸搏腸間津液凝滯則白冷熱相交故赤白相雜或熱甚而變膿血冷甚而變青黑皆由飲食不節冷熱不調脾胃虛故變易多時醫惟王損庵一論最得體要曰痢疾不外濕熱二字所受不外陽明一經陽明為多氣多血之府濕陰邪也濕勝於熱則傷陽明氣分而為白痢熱陽邪也熱勝於濕則傷陽明血分而為赤痢濕熱俱盛則赤白俱見後之論者謂夏月畏熱貪涼過食生冷至大火西流新涼得氣則伏陰內動應時而感為痢疾此特論內傷外感之病因或如是也然病屬腸胃乃寒熱相搏而成胃有沉寒腸有積熱寒氣凝結則腹痛熱性急迫則泄瀉乃熱欲走而寒復留之寒既結而熱復通之其裡急後重腹作絞痛皆血氣陰陽不能調和之故況素嗜鴉片之人偶感此證更為加劇日以燈頭火熏灼腸胃津液已耗大便本難茲復乘以邪熱而燈火肝火相助為虐烈焰肆威腸胃何堪此苦楚用輕劑則無效用重劑則脾胃不堪杯水車薪有難乎為理者矣情難坐視竭盡綿力謹列治法於後療法婦人重肝血以杭芍當歸活血為君芩連清熱為臣更用蒼朮薑炭之滲濕散寒為佐神麯檳榔之治後重龍骨收散氣木香開滯氣以為使末用升麻者提清氣之下陷引用米豆者解寒熱之積毒亦以保胃氣也處方生杭芍八錢歸尾五錢酒條芩錢半薑連一錢茅蒼朮八分龍骨五分廣木香五分神麯錢半尖檳榔一錢升麻四分炮薑炭八分粳米一撮黑豆一撮外用米殼三錢浸水煎服效果每日二劑二日後痢有數漸帶糞又三四日氣不下陷後重亦除每日僅三四行繼以理中湯加歸芍引用陳倉米收功廉按痢之一證古名腸澼又名滯下以腸中先有積滯而後下也自洋煙輸入中國凡吸洋煙而病痢者名曰煙痢病人先自膽怯必求峻補速止醫者不知病理每以漫補止澀而壞事豈知吸煙之大便每多燥結平日有五六日一更衣者有十餘日而始一行者而其所食未必不與不吸煙者等則其腸中之積垢年深月久可勝道哉故必緩通潤下而始安但病家皆謂吸煙之體多虛若再下之難保其不暴脫余直斷之曰醫家病家之所誤者只在此句蓋積滯在內脾不能為胃行其津液胃有陳積來去勢必不能納新所以肌肉日削外現之虛象百出若得積垢一下胃即能納脾即能運何脫之有惟病家見此虛象一聞宜下無不吐舌此煙痢之所以難愈也醫者當委曲開導得能轉危為安亦是救人之一端切勿附和人意漫補以殺人耳此案宗張潔古芍藥湯加減妙在重用歸芍潤腸燥以破陰結為治煙痢之主藥頗得李冠仙大歸芍湯治痢之妙伏暑痢夾房勞案內科嚴紹岐住紹興昌安門外官塘橋病者馬山虎年二十五歲住百舍病名伏暑痢夾房勞原因素體陰虛秋後伏暑夾食釀變赤白痢前胡姓醫作脾痢治用杏仁廣皮川朴枳殼銀花炭香連丸炒瓜蔞等服兩劑下積頗多赤多白少而小腹大痛改延王姓醫謂轉入肝經當作肝痢治用當歸白芍子芩炙甘草酒延胡川楝子柏子仁炒茴香小腹痛減而赤痢如前解出甚難來邀豫診已八月終矣證侯面現油光喉痛口渴少腹中有塊頂起喜人以兩手用力按住而赤痢乃下腎囊縮入少腹診斷脈弦左尺獨大舌根黑豫診畢謂其祖母曰憑證參脈防病中不謹夾有房勞其祖母即詢孫媳云此事究竟有否生命攸關須實告其孫媳哭而不答豫遂曉之曰伏熱傷氣房勞傷精精氣奪則虛虛則防脫勿謂言之不預也療法當以育陰潛陽為君如熟地歸身元參淮藥之類然囊縮為入肝肝不舒則囊亦不舒故以吳茱萸溫舒其肝為臣佐以五味從肝納腎使以肉桂引火歸源也處方大熟地八錢炙龜板四錢白歸身二錢淮山藥四錢生鹽水炒吳茱萸一錢紫猺桂二分拌搗北五味三十粒效果連進兩劑舌黑退而塊隱痢亦大減繼以霍石斛四錢煎湯送黑地黃丸錢半一日兩次以雙調脾腎法痢止胃動而痊康按先因伏暑傷陰繼因下多亡陰終固房勞直損真陰症變舌黑囊縮危險已極方用大劑育陰潛陽固屬根治之正法妙在用桂萸五味溫劑攝納導龍入海此非時手所敢學步也伏暑子痢案婦科何拯華紹興同善局病者詹姓婦年三十一歲住念畝頭病名伏暑子痢原因妊娠已七個月夏季吸受暑氣伏而不發至仲秋食鴨積熱下郁腸中而化痢證候下痢赤多白少如醬色紫腹中滯痛裡急後重解出頗難必轉矢氣痢即隨出日夜二三十行診斷脈右弦滯左弦小滑數舌邊紫赤苔黃薄膩脈證合參此産科心法所謂子痢也最防胎動而墮飲食起居亦宜謹慎勿謂言之不豫焉療法法當涼血安胎以當歸黃芩湯合香連為君佐香砂以運氣舒肝雖不用治痢套方正所以治孕身之痢也處方油當歸二錢生白芍三錢青子芩錢半清炙草五分青木香六分小川連七分制香附錢半帶殼春砂五分杵效果二劑痢即輕減原方加鮮荷葉一錢拌炒生穀芽三錢再進二劑痢止胃動而愈廉按孕婦患痢治之極難古人有三審五禁之法三審者一審身之熱否二審胎之動否三審腰之痛否五禁者一禁檳榔厚朴破其氣氣破胎下也二禁制軍破其血血破胎下也三禁滑石通草通其竅竅通胎下也四禁芩澤車前利其水過利必傷陰胎亦難保也五禁人參升麻提塞其氣塞則下痢愈滯提則胎氣上衝也惟以調氣涼血為最穩張石頑所謂調氣有三善一使胃氣有常水穀輸運二使腹滿腹痛裡急後重漸除三使濁氣開發不致侵犯胎元也其藥以四制香附帶殼春砂為最良其次白頭翁白桔梗炒銀花炒香鮮荷葉又次佛手片鮮茉莉玫瑰瓣代代花之屬涼血莫妙於芩芍連梅蒿柏等品此案方法適合調氣涼血之作用既不礙胎又能除痢穩健切當正治孕痢之良劑産後伏暑痢案婦科黃仲權住宿遷東門口病者閻氏婦年二十四歲住宿城病名産後伏暑痢原因夏月感受暑濕至秋後娩時惡露太多膜原伏暑又從下泄而變痢證候痢下紅白裡急後重日夜四十餘次腹痛甚則發厥口極苦而喜飲按其胸腹的手診斷脈息細數細為陰虛數則為熱此張仲景所謂熱痢下重者白頭翁湯主之是也然此證在産後本婦又每日厥十餘次證已棘手嚴裝待斃偃臥如尸余遂曉之曰病勢危險極矣然診右脈尚有神或可挽救姑仿仲景經方以消息之療法亟命脫去重棉用濕布覆心部干則易之方用大劑白頭翁湯加味苦寒堅陰以清熱為君甘鹹增液以潤燥為臣佐以酸苦泄肝使以清芬透暑力圖挽回於萬一處方白頭翁四錢北秦皮二錢炒黃柏二錢金銀花六錢川雅連一錢鹽炒生炒杭芍各三錢益元散三錢陳阿膠一錢煬沖淡條芩二錢鮮荷葉一張效果次日復診痛厥已除痢亦輕減遂以甘涼濡潤如鮮石斛鮮生地鮮藕肉鮮蓮子甘蔗等味連服五劑幸收全功然此證雖幸治愈同業者謗聲紛起皆謂産後不當用涼藥噫是何言歟皆不讀金匱要略之婦人方故執俗見以發此誹議甚矣古醫學之不講久矣廉按胎前伏暑産後患陰虛下痢者頗多此案仿金匱治産後下治虛極用白頭翁加甘草阿膠湯合傷寒論黃芩湯增損之以清解熱毒兼滋陰血而痊足見學有根抵非精研仲景經方者不能有此膽識暑咳案內科高糾云住贛州生佛壇前病者魏國安年二十二歲工界福建病名暑咳原因素嗜薑辛味後因感冒暑氣證候頭身發熱咳嗽痰黏氣逆胸悶兩手厥冷診斷左關數澀右寸浮數餘脈亦數舌邊尖紅此暑熱犯肺也夫肺為暑熱所爍而失清降之能氣反上逆故咳肺失清肅之職故胸悶其手厥冷者熱深厥亦深也療法用牛蒡子連翹銀花貝母兜鈴清其肺熱杏仁蔞皮桔梗宣清肺氣桑葉菊花平肝清熱防其升逆太過桑白皮枇杷葉以降其肺氣處方牛蒡子錢半濟銀花二錢青連翹二錢川貝母一錢杜兜鈴錢半甜杏仁二錢栝蔞皮二錢桔梗一錢冬桑葉二錢滁菊花一錢桑白皮錢半鮮枇杷葉一兩去毛抽筋效果二劑熱退喘減原方去杏桔加陳阿膠錢半鮮蓮子十粒三劑兩手轉溫咳嗽亦止終用吳氏五汁飲調理而痊廉按暑氣從鼻吸入必先犯肺因之作咳故用輕清之藥專治上焦方頗靈穩愜合時宜暑瘧案內科丁佑之住南通東門病者楊國梁年四十五歲清江人病名暑瘧原因暑熱內伏被新涼外觸而發證候先寒後熱每日一發寒少熱多口渴心煩汗多氣粗診斷脈象洪數右部尤甚舌苔黃膩此由暑熱內蘊陽明新感逗引而外潰也療法治宜急清暑熱以顧津液延恐津液乾枯變證百出勢已燎原非辛涼重劑不能見效擬桂枝白虎湯加味處方川桂枝三分生石膏一兩研細肥知母四錢金銀花三錢大連翹三錢天花粉三錢生甘草五分生粳米一撮效果一劑知二劑效三劑愈廉按桂枝白虎為治暑瘧之正方葉氏謂此方二進必愈洵不誣也案中闡明治則要言不煩暑瘧案內科錢蘇齋住蘇州謝衙前病者王柏南年二十歲小學教員住蘇城獅林寺巷病名暑瘧原因夏日受暑伏於足太陰脾經至秋深瘧作纏綿數月證候寒起四末冷輕熱重渴飲有汗食則腹脹三日一發神倦肢怠診斷脈弦舌苔淡黃斷為暑濕脾瘧俗稱三陰瘧初起邪尚不甚而纏綿不愈者皆數月來所服之方無一中肯也今以證因合參既知病屬伏暑經屬太陰然後有正的始能望其入彀否則恐成瘧臌矣療法病屬伏暑故君以玉泉蒿知扁豆竹等直清其暑但邪伏足太陰脾經參以朮苓草果腹絨等為臣佐以穀芽秫米者和胃氣以快脾也處方漂淡白朮皮二錢草果仁五分肥知母三錢大腹絨二錢玉泉散五錢夏布包煎茵陳蒿三錢青蒿子三錢炒穀芽三錢扁豆衣三錢大竹葉三錢白茯苓三錢北秫米三錢效果連服三劑瘧雖減而不止再服三劑送下半貝丸截法而痊廉按此案消暑為君祛濕為佐妙在知母清陽明獨勝之暑熱草果化太陰潛伏之濕滯故能中病而奏功暑風剛痙案內科王經邦住天台柵門樓病者蔣善楨妻年三十餘住寧海東路嶽井街病名暑風剛痙原因七月初旬由於外冒暑風內夾酒濕更兼胎孕數月又生腋下疽證候四肢拘攣角弓反張咽喉刺痛言語不明診斷脈弦緊數金匱所謂痙脈按之緊如弦直上直下是也此與素問諸暴強直皆屬於風諸痙項強皆屬於濕適相符合療法以防風天麻鉤藤祛風為君海桐白薇舒筋治厥為臣佐川貝桔梗射干甘草以治咽痛黃芩白朮以保胎孕合之為發散化痰清熱以消腋疽處方北防風一錢明天麻錢半雙鉤藤三錢海桐皮二錢東白薇錢半川貝母二錢北桔梗二錢射干根二錢淡黃芩二錢臺冬朮二錢生甘草一錢效果一劑四肢舒展二劑腋疽漸消後以健脾保胎藥數劑而痊愈廉按斷症則學有根抵選藥則雙方周到成如容易卻艱辛堪以移贈斯案暑邪入營痙厥案婦科周小農住無錫西門外病者嚴橫林妻年約三十歲住倉濱草蓬病名暑邪入營痙厥原因天暑屋向西曬感受熱邪床邊置行灶其熱尤盛乃因經來不暢自服紅花煮酒邪即入於營分由衝波及藏血之肝經痙厥陡作證候先腹痛嘔吐血沫兩手搐搦口噤目斜不省人事遺尿不知診斷脈沉弦徑伏舌不得見此暑熱因酒引入衝脈其血上冒引動肝風而發痙厥也療法清熱息風和營散瘀以急救之處方粉丹皮三錢青蛤散五錢包煎石決明一兩生打雙鉤藤五錢丹參三錢益元散五錢鮮荷葉包明天麻錢半金銀花三錢生玳瑁錢半鮮竹茹錢半鰾膠三錢蛤粉拌炒茜草錢半光桃仁三錢童便一杯沖另用西血珀五分上西黃三釐羚羊尖七釐參三七三分研細如霜開水化下效果囑用烏梅揩齒口開灌藥後口不開橫林用火刀鑿去一齒藥方灌入一劑而醒諸證頓失再劑經行數日旋愈廉按婦人痙厥多由血熱上衝沖激知覺神經則發厥沖激運動神經則發痙方用清熱息風和營散瘀的是正當療法宜其一劑神醒再劑經行血熱下泄而廖暑厥兼肺痹案兒科周小農住無錫西門外病者章根泉之女菊藍年二歲住惠山病名暑厥兼肺痹原因暑邪挾風以致乳痰內壅其家因兵燹後拮據不延醫釀變昏厥證候咳嗽身熱熱甚昏閉不蘇目干無淚不啼不乳已三日診斷脈伏舌紅此暑熱挾痰內閉也療法清暑宣痹開降肺氣以泄痰濁處方青連翹三錢黑山梔三錢薄荷尖一錢銀花三錢益元散六錢鮮荷葉包光杏仁三錢葶藶子五分粉沙參三錢豆豉三錢鮮石斛八錢鮮青蒿六錢鮮石菖蒲六分鮮竹葉三十片紫雪丹四分另沖外治方取意引痰下行山梔仁十粒生礬一錢光桃仁十粒萆麻子仁七粒回春丹一粒研細用乾麵雞子白蔥根搗和敷臍效果一劑藥連哺二日方畢目方活動有呻吟聲其父又化服琥珀抱龍丸一粒又越數日方出哭聲漸愈廉按夏令受熱昏迷若驚此為暑厥即熱氣閉塞清竅所致若乳子挾痰者多兼肺痹法用清暑開肺以泄痰濁方固對症即所服琥珀抱龍丸亦有捷效一經痰開熱泄清竅通而哭聲出其病自廖暑濕案內科鍾翊乾住瑞安鮑田病者項氏年逾不惑住瑞安鮑川病名暑濕原因酷暑之日頭時痛嗜食瓜果猶強飯作勞七八月間忽起颶風從此飲食減少神疲乏力證候寒熱往來日作兩次頭汗出寒時欲飲熱反不渴後目眩口苦作嘔神倦欲寐熱時譫語診斷脈弦濡微數微數為暑弦濡為濕暑濕伏邪內蘊膜原乘新涼而外發故始則懍寒頭痛如破也內經瘧論篇曰邪氣內薄五臟橫連膜原間日乃作後賢薛生白亦云邪阻膜原寒熱如瘧夫膜原乃隔膜之稱居表裡之間欲達不果欲入不能所以形寒壯熱似瘧狀也寒欲熱飲熱反不渴者良以邪欲內入正氣難支得熱飲以助陽御邪故也身體疲倦者濕阻氣滯也延及三候寒熱不已日仍兩作症添口苦目眩作嘔乃邪移少陽之見象經云少陽之為病口苦目眩咽乾也療法初用茯苓夏朴理濕為君藿梗蔻仁芳香化濁為臣滑芩連翹解暑為佐使以竹茹荷梗清絡熱以達膜也繼用柴胡升陽達表為君芩茹退熱和陰為臣佐以苓夏祛痰降逆使以參草輔正調中處方仙半夏二錢浙茯苓三錢川朴八分杜霍梗錢半竹茹二錢白蔻仁二粒研沖青連翹三錢飛滑石三錢包煎淡黃芩七分荷梗一尺切寸繼方川柴胡八分淡黃芩七分仙半夏二錢浙茯苓錢半西黨參一錢炙甘草六分效果初方連服數劑未見進退繼投柴胡一方覆杯即已廉按經謂夏傷於暑秋必痎瘧此即暑濕化瘧之原因方用化濕清暑雙方兼顧亦屬正治之法後用小柴胡湯加減覆杯即已者益見經方效用之神應惟柴胡必須川産為妙暑濕案內科袁桂生住鎮江京口病者馬姓女年二十歲住本鎮病名暑濕原因今年七月患暑病初由幼科某君診治用青蒿六一散栝蔞貝母等藥三劑又用大黃等藥二劑大便雖通而病不退幼科仍主張用大黃病家不敢從乃延豫治證候午後發熱胸悶不舒口燥溲熱胸膈間熱較他處為甚診斷脈滑兼數舌苔黃薄有裂痕蓋暑濕蘊伏肺經病在上焦攻下只通腸胃與肺無涉也療法宜輕清開化上焦則病自愈處方光杏仁二錢北沙參二錢栝蔞皮二錢桔梗一錢川貝母二錢去心石菖蒲六分佩蘭葉一錢青連翹三錢淡黃芩二錢原麥冬二錢鮮石斛三錢鮮枇杷葉一片去毛筋淨次診明日復診述昨藥服後夜間能睡熱退胸悶亦除但覺飢而欲食耳遂以原方加減次方北沙參二錢青連翹二錢原麥冬二錢佩蘭葉一錢甘草四分鮮石斛三錢天花粉二錢絲瓜絡三錢鮮枇杷葉一片去毛效果接服兩劑而安説明凡病在上焦皆不可用重藥葉天士言之最詳此即素問所謂其高者因而越之之義蓋不僅指吐法言也廉按此暑濕未淨之伏邪留在上焦故胸膈間熱較他處為甚方用輕清開化以宣上上焦既清餘熱自解方皆輕靈可喜暑濕夾痰案內科袁桂生住鎮江京口病者潘錦文子兩歲住本鎮病名暑濕夾痰原因瀉痢數日經幼科醫治之無效遂延豫治證候手冷汗多精神疲憊時作噯氣診斷脈息軟滑舌苔薄膩此暑濕痰滯之病治不得法而胃氣受傷也療法宜先固正氣用理中湯加味處方潞黨參二錢生於術二錢淡乾薑五分炙耆八分廣木香五分次診服後汗漸少手轉溫接服一劑汗全止但泄瀉發熱口渴欲飲入暮熱甚舌苔轉為黃膩遂易方以清暑利濕藥消息之次方全青蒿二錢淡黃芩一錢蘇佩蘭一錢桔梗一錢生枳殼錢半生苡仁三錢飛滑石二錢包煎天花粉一錢焦山梔三錢赤茯苓三錢三診接服兩劑渴稍平泄瀉止惟夜仍發熱舌苔厚膩而黃舌尖紅目睛黃小便清蓋濕熱痰滯蘊結上焦病在上而不在下也仍宜清輕開化三方旋覆花五分包煎石菖蒲三分生苡仁三錢桔梗八分生枳殼錢半青連翹二錢赤茯苓二錢西茵陳二錢白茅根四錢六一散三錢包煎四診服後熱較輕舌苔亦退二便通利仍以前方增損之四方生苡仁三錢生枳殼錢半桔梗八分西茵陳二錢白茅根四錢青連翹二錢川貝母錢半去心焦山梔三錢絲瓜絡三錢青蒿露一兩分沖北沙參錢半鮮枇杷葉兩片去毛筋淨效果接服兩劑熱全退遂改用沙參麥冬百合花粉茅根扁豆苡仁茵陳石斛等藥三日而安説明凡小兒之病易虛易實此病本由暑濕乳滯蘊結上中二焦致泄瀉發熱徒以幼科醫家不知此理犯葉天士之戒妄以山楂神麯黃芩防風葛根枳實等消導升散之劑致胃氣受傷故現汗多手冷得理中湯而胃氣回冷汗止然病究未去故復轉熱渴而舌上現黃厚苔得輕清開化之藥則病去而熱退步驟井然不可稍差銖黍其舌苔轉黃厚與熱渴大作者實理中湯有以促成之然非舌苔黃厚既熱且渴則清化之品亦胡可浪投相違適相成也又小兒之病幼科多嚴禁乳食不知乳食過飽固足增病而過飢亦能傷胃此病當熱渴苔厚之時則暫禁乳食熱輕苔退及出冷汗之時則漸與乳飲但勿使其過飽耳飲食起居為看護病人之緊要關鍵小兒為尤要焉蓋襁褓之兒飢飽皆不能啓言醫家病家尤宜體貼周至也廉按此案病理原因説明發揮盡致初方用理中加減以救藥誤次方肅清暑濕三方消化痰滯皆屬對症發藥藥隨病變之方法暑濕夾痰案內科周小農住無錫病者王廷椿之室忘其年齡住址病名暑濕夾痰原因己亥五月中身熱無汗自服艾葉湯後即延豫診證侯下午發熱口渴喜涼胸悶肢懈溲紅而溷診斷脈數舌厚而干數則為暑舌苔乾厚則為濕痰阻氣氣不化津而干也療法宗吳氏三仁湯加減苦辛芳淡法以開泄之處方光杏仁三錢生苡仁四錢蔻末五分拌滑石六錢包煎黑山梔三錢竹瀝半夏二錢淡竹葉二錢大豆卷三錢廣鬱金三錢生打先用活水蘆根二兩川通草三錢煎湯代水復診熱勢起伏胸悶殊甚旋發疹㾦略佐甘涼生津即覺口膩噁心改用瀉心湯加減次方竹瀝半夏三錢青子芩錢半小枳實錢半小川連八分光杏仁三錢淡竹茹錢半三診口渴不欲熱飲反喜水果一若病機偏於熱重者然譫語雖劇苔掯膩白罩黃稔知中有痰飲轉用溫膽湯加減三方淡竹茹三錢小枳實錢半法半夏二錢廣皮紅一錢連皮苓四錢廣鬱金三錢生打天竺黃二錢鮮石菖蒲一錢剪碎沖淡竹瀝兩瓢沖先用淡海蜇二兩生蘿蔔二兩煎湯代水效果服兩劑後嘔出痰涎盆許熱退神清而愈廉按此暑為濕遏中挾痰涎之治法方皆從葉吳兩家脫化閲其案後説明曰其中渴喜飲涼之際最難支持者病人苦求其弟龔泉欲覓西瓜解渴雖死不怨也設泥西法熱則執冰胸前罨冰能無僨事否況溫病暑濕挾痰水挾氣挾食均多見識不清斷難已病臨證時不可不細審也其言可謂閲歷精深矣暑濕夾痰案內科周小農住無錫病者黃宜亭忘其年住虹口病名暑濕夾痰原因己酉秋先食冷物而臥形寒肢冷服西藥而寒戰氣升目赤脘痛轉延中醫或與柴胡之劑或用溫中之藥病勢益劇證候咽痛舌縮自汗便閉足厥而冷脘中似有筋上撑則氣逆診斷脈滯不甚數苔黃以證參脈此氣積痰濕遏伏暑熱之症病情夾雜用藥層次頗多斷不能如西法一例罨冰取愈也療法姑以通氣清暑開痰泄降法消息之處方射干一錢通草一錢廣鬱金三錢生打銀花錢半玉樞丹三粒藥湯調下青蒿錢半金鈴子二錢荷梗五寸旋覆花二錢拌滑石四錢包煎蘇嗜子三錢杵大豆卷三錢鮮石菖蒲一錢剪碎沖復診稍覺氣平形寒略解脘痛仍作大便不通脈舌如前仿前法加減參以外治尉法次方原方去玉樞丹加更衣丸三錢先服外用萊蔔子五錢香附薄荷陳皮生薑食鹽麩皮各三錢同炒布包隔衣尉脘腹間三診便黑糞一次寒退足暖安寐神卓惟氣逆未平咽痛猶甚是積去氣通而暑濕夾痰留戀也治以清暑除痰湯散並進三方青連翹三錢焦山梔三錢片黃芩錢半知母三錢淡竹茹三錢漢木通一錢旋覆花二錢包煎馬兜鈴錢半紫蔻三錢瓜蔞仁三錢杵淡竹瀝兩瓢分沖先用活水蘆根二兩鮮淡竹葉四錢煎湯代水另用石菖蒲廣鬱金各一錢制月石五分研末先服開水送下四診嘔出痰涎甚多咽痛頓愈惟脈轉數苔轉燥口渴氣升更劇是痰濕去而伏暑從燥化也當清暑之中參以潤燥四方青連翹三錢知母四錢青子芩錢半花粉三錢拌飛滑石三錢荷葉包煎焦山梔二錢緑豆衣三錢鮮荷梗五寸另用荷花露銀花露代茶先用鮮茅根二兩西瓜翠衣二兩鮮石斛竹茹各四錢煎湯代水五診渴喜冷飲逾於常度當時審諦毫無別症純由暑熱煩灼竟可大劑清涼甘潤五方生石膏一兩研細肥知母五錢臺參葉一錢花粉四錢拌滑石四錢包煎青連翹三錢生甘草八分先用活水蘆根三兩鮮竹葉四錢煎湯代水效果氣逆口渴陡定不數日脈靜身涼而痊廉按此暑為濕遏夾痰挾氣之治法證情龐雜用藥精切對症層次井然非經驗宏富者不辦看似尋常實奇突成如容易卻艱辛可以移贈斯案矣學者宜注意之暑濕瘧案內科張堯詢住新化南門外病者劉稻耕年近六旬住新化輦溪白沙洲病名暑濕瘧原因夏五月大水宅臨江被水傾妃因受暑濕積久發瘧截太早補太過遂變危象證候形容枯稿水漿不入腹脹痛兼紅白痢腎氣亦痛胸膈閉塞喘逆而渴咳白痰喜熱飲肩背下唇均痛甚則不能轉側申酉時發熱譫語診斷脈弦洪而滑按之鼓指有力合脈參證斷為暑濕瘧經曰夏傷於暑秋必痎瘧因夏遇淒滄之水寒藏於腠理皮膚之中秋傷於風則瘧病成矣此時清暑去濕疏通腠理自愈乃病家圖速遽希堵截以致瘧邪內陷腹脹痛則變紅白痢邪氣橫連膜原則變胸膈閉塞肝脈絡陰器病久則變腎氣痛陽盛陰虛外內皆熱則變喘逆而渴咳白痰喜熱飲寒邪化熱內陷也病雖多變皆由前醫不探其源驟用溫補不知邪愈補而愈陷氣愈補而愈滯無怪形容枯稿不能轉側而變如此危象也所幸肩背及唇俱痛外邪尚能鼓動猶為可治療法表裡雙解用柴葛羌活以升舉三陽陷下之邪為君以芩知川柏清上中下三焦蘊積之火為臣以夏苓降其痰逆為佐桔梗枳殼升降諸氣為使又用生鱉甲蠕動之屬青蒿芳香之品直達肝膽搜邪外出再用竹瀝滌清痰熱處方川柴胡錢半粉葛根錢半羌活一錢青子芩三錢白知母三錢生川柏二錢法半夏錢半雲茯苓三錢苦桔梗一錢生枳殼錢半生鱉甲三錢全青蒿一錢淡竹瀝一杯沖效果初服胸膈開再服痢除脹消腎氣痛止三服遍體汗解身能轉側去粉葛羌活鱉甲青蒿四味柴胡減半加石膏三錢小川連一錢西牛黃一分肩背唇痛除譫語亦止惟咳喘多痰因過補脈實再服大承氣湯二劑始陸續下黑白惡色黏臭等物痰遂除而病愈廉按臨證不究病因妄用溫補遂致變症蜂起不獨暑濕瘧為然此案救誤之法從王肯堂方脫化而來雖由咸方加減而柴胡羌活二味亦於外內皆熱相背竟可刪卻暑濕痢案內科陳作仁住南昌中大街四川會館病者錢海亭年三十五歲直隸人寓南昌城內病名暑濕痢原因炎暑酷熱納涼飲冷停濕內郁積久化熱傷於陽明血分致有斯疾證候裡急後重欲便不便滯下膿血日數十次發熱畏寒粒米不進病勢危急診斷右關脈沉滑而數證與脈象合參此即內經之腸澼便膿血也療法非表裡兼治恐難奏效議以仲景黃芩湯加味法以黃芩白芍加柴胡清解營衛兼升陽為君黃連大黃清滌腸積為臣木香檳榔厚朴理滯氣為佐山楂陳倉米和胃為使適有荷葉方盛因加新荷葉以助清解和胃之力也處方細條芩三錢酒炒杭白芍五錢竹葉柴胡二錢川黃連錢半吳萸水炒生錦紋三錢酒洗花檳榔錢半廣木香八分川厚朴錢半山楂炭三錢陳倉米六錢炒新荷葉包煎效果此方連進二劑冷熱已愈痢亦減輕仍照原方去柴胡大黃黃連加當歸身二錢左金丸二錢以藥湯送下接進二劑至五日後各證逐漸痊愈矣廉按暑濕痢初多噤口由濕熱鬱滯胃脘證必兼身熱口渴腹灼目黃面垢舌苔黃濁或兼寒熱如瘧長沙黃芩湯加味卻是正治然其所用藥品仍不出潔古芍藥湯之範圍暑濕痢轉休息案內科程文松住南京上新螺螄橋大街病者黃大成年三十八歲木業住新河口病名暑濕痢轉休息原因上年夏秋多食瓜果致秋後暑濕成痢醫經數手反轉時作時止而成休息久痢證候赤痢時發時止每逢夏月大便鮮紅裡急後重時或不禁診斷脈來軟而不數此由久痢傷中脾不統血血鬱小腸所以每逢夏月客邪即乘虛而入遂便鮮血裡急後重醫者不溯成痢之原因由於貪食瓜果仍一味芩連歸芍致使淹纏年餘不能痊愈也療法欲通大腸之滯必先開小腸之結湯丸並進用壽世篇內鳳尾草法用風尾草清利小腸為君陳倉米益氣補中為臣佐以煨生薑使以連須蔥白皆所以消瓜果之陳積然猶恐其無捷效故又以葉天士醉鄉玉屑丸藥湯送服處方鮮鳳尾草四株洗淨煨生薑三片陳倉米二百粒連須蔥白三根又方醉鄉玉屑丸生蒼朮一錢川厚朴一錢炒陳皮一錢炙甘草五分雞內金錢半砂仁殼五分丁香柄四分米糊丸每服三錢效果二日便紅止四日裡急後重除七日痢不作而痊廉按恣食瓜果致痢久不愈而成休息者余亦數見不鮮然在小兒為最多年壯者少醉鄉玉屑確是對症之驗方見徐春甫醫統葉氏曾引用之以奏功説見陸定圃冷廬醫話非葉氏自制驗方也鳳尾草方載前明萬密齋保命歌括主治赤白痢而五色痢實證亦驗總之醫必查晰原因對症發藥始能奏效決不可用籠統之套方貽誤病人也産後暑濕痢案産科陳在山住遼陽咸春堂病者劉李氏年三十三歲孀居住遼陽城內病名産後暑濕痢原因其夫歿後將六個月憂鬱成疾身有妊娠之纍臨産時更受暑氣熏蒸兼之素嗜飲冷水脾濕久已化熱而産前曾患腹痛泄瀉至産後轉瀉為痢矣證候裡急後重下痢頻頻紅白相兼思飲冷水乾嘔惡食小溲紅澀頭汗不止身熱氣促診斷脈現弦滑洪大舌苔黃白相兼而膩脈證合參雖謂産後多虛而證屬有餘外邪夾內郁釀此最危之重證先哲云痢不易治者有三曰産後疹後煙後惟産後為最甚因用藥諸多禁忌醫故難之今以脈象病形不避俗説不拘成法對證發藥可也療法治病不可執守成方務在臨證變通古人傅青主以生化湯加減治産後痢治血瘀之痢也薛立齋用膠艾四物等湯治産後痢治血虛之痢也其方與暑濕毫不相涉今受暑濕夾氣鬱當以清暑利濕為主兼開鬱化滯之品方用藿香天水散即益元散木通清暑解熱苓皮薏苡車前利濕快脾白芍牡蠣斂陰止汗木香厚朴行氣開鬱甘草和中黃連堅腸竹茹解煩嘔焦楂消宿積花粉除渴扁豆止瀉處方廣藿香錢半浙苓皮三錢薏苡仁四錢車前子四錢天水散三錢包煎漢木通一錢生白芍三錢川厚朴二錢鮮竹茹二錢炙甘草八分生牡蠣三錢打川黃連一錢次方浙苓皮三錢川厚朴二錢生薏苡四錢車前子四錢生白芍三錢鮮竹茹二錢炙甘草八分廣木香八分焦山楂三錢生牡蠣三錢打天花粉三錢炒扁豆三錢效果服前方三劑身熱退腹痛止痢轉為瀉再服第二方五劑諸證皆效前後共十餘日而痊廉按胎前伏邪娩後陡發其脈有不即露者惟舌苔頗有可徵或厚白而膩或黃膩黃燥或有黑點或微苔舌赤或口渴或胸悶或溲熱或便赤或熱瀉轉痢此皆溫濕暑熱之邪內蘊世人不察輒飲以生化湯之類則輕者重而重者危不遇明眼人亦但知其産亡而不知其死於何病誤於何藥也我見實多每為惋惜此案由暑濕伏邪先瀉後痢治法注重伏邪不拘於産後常痢診斷獨具卓識方亦清穩平和暑濕瘧痢案兒科黃袞甫住金山呂巷病者李孩年五歲住山塘鎮病名暑濕瘧痢原因初因暑濕化瘧繼因飲食不慎寒暖失調由是邪漸深傳致成久痢證候所下或赤或白或如膿或如清穀腹痛後重寒熱時作診斷脈左右弦細且緊舌邊白中黃證脈並參顯系久痢仲聖治久痢論方悉明於厥陰篇厥陰居六經之末病則寒熱虛實交錯治則溫涼酸甘合參觀仲景用烏梅丸以治久痢則知厥陰之氣化矣療法方用烏梅當歸黃連黃柏和其陰安桂附子益其陽人參扁豆半夏安其胃青蒿葛根以宣其表處方烏梅炭三分黃柏一錢薑半夏錢半煨葛根五分全當歸錢半黑附塊二分潞黨參二錢青蒿腦一錢炒黃連三分青化桂一分炒扁豆錢半效果服藥十劑而病愈廉按瘧痢並作當分新久虛實初起者可用發散如局方雙解飲子喻氏倉廩湯等使在腑之邪提並於經而外解最為神妙此案仿仲景烏梅丸例乃治邪陷厥陰而為陰瘧久痢之方法亦屬對證發藥之良劑暑濕化脹案內科嚴紹岐住紹興昌安門外官塘橋病者潘四鳩年三十八歲住鮑瀆病名暑濕化脹原因初因受暑挾濕濕熱未清遽投生地石斛滋養胃陰以致濕熱膠滯漸變咳逆脹滿服過五子五皮飲多劑不效證候先腹脹滿繼則咳嘔而痰多胸悶口渴溺短澀熱便溏不爽診斷脈右軟滯左沉弦數舌苔黃膩兩邊白滑脈證合參前哲所謂先脹後咳治在脾先咳後脹治在肺也療法古人雖有先治脾後治肺之説以余實驗總須先治其上焦越婢加半夏湯增損而後治其下焦桂苓甘露飲加減處方帶節麻黃一錢生石膏一兩研細光杏仁四錢竹瀝半夏五錢生桑皮五錢蘇子二錢生薑皮一錢煨香紅棗二枚次方川桂枝一錢浙茯苓六錢豬苓三錢澤瀉三錢生於術一錢卷川朴錢半寒水石六錢杵飛滑石六錢包煎效果初方連進三劑痰嗽氣逆大減胸悶口渴亦除繼服次方四劑小溲暢利腹脹頓消惟痰尚未除自覺胸膈氣滯終以香砂二陳湯青木香春砂仁各六分竹瀝半夏三錢廣皮錢半浙茯苓四錢清炙草四分生打雞金二錢佛手片一錢調理七日而愈廉按凡治暑濕先當辨暑重濕重若暑重於濕者濕從火化火必就燥則生地石斛卻為善後調養之要藥若濕重於暑暑尚在濕之中病從水化者多其氣機必滯早用地斛清滋解熱則不足滯濕則有餘當然氣鬱化脹濕熱化疾病勢一定之進行也此案治上治下兩方確切病機效果自速惟古法所謂桂苓者先用紫猺桂錢半泡濃汁滲入茯苓片一兩五錢曬乾然後對證酌用分量配入煎劑為君每劑如是始有捷效焉即如腹脹消後必須忌口葷油麵食尤忌若鹹味雖可不必忌然亦不可過咸耳伏邪陰瘧案內科陳作仁住南昌中大街四川會館病者方子清年三十八歲南昌人住景德門外病名伏邪陰瘧原因素因飲食不節又因發瘧之後妄投截瘧丸以致邪入愈深屢止屢發證候病延三年三日一發發時寒熱相等形體消瘦面黃唇白診斷六脈沉細微弦兼滑察其病因參合脈證知其邪陷陰經根深蒂固此即俗名三陰瘧之候也療法凡三陰瘧須先將陰邪提至陽分然後設法和解始能除根因用鱉甲首烏常山飲主之蓋首烏鱉甲皆能養陰常山可以由陰而達陽故以之為君柴胡黃芩調營衛除寒熱為臣大當歸養血兼扶正氣為佐半夏陳皮行氣化痰建曲扶脾以助消化甘草薑棗和中兼調和諸藥共成和解之功以為使處方制首烏四錢炙鱉甲三錢炒常山二錢川柴胡一錢酒條芩一錢大當歸三錢法半夏二錢廣陳皮錢半炒建曲三錢炙甘草一錢生薑三片大紅棗五枚剖破效果此方連進二劑即提至一日一發脈轉浮滑仍照原方加煨草果一錢雲茯苓三錢又進二劑瘧疾已止惟正氣尚虛又以八珍湯微加陳皮半夏仍以薑棗為引接服數劑此後永未再發矣廉按三陰瘧為纏綿難愈之癰疾往往由早服截瘧湯丸而成必先查問其有無瘧母如無瘧母始可用首烏鱉甲常山飲其方配合適當君佐合度妙在常山一咪歸安莫枚士常蜀截瘧辨云無形之暑氣痹著膈間蒸痰結固既非表寒可汗又非裡實可下必須氣烈開提之藥如常山蜀漆等品直達病所追逐其痰使無形者失所恃而去奈世俗金謂其截瘧釀變然余目驗蘇州吳江震澤等處其俗呼常山為甜茶遇瘧發輒採鮮者一大把煎服皆輕者止重者減未聞有止後變生者余踵其法亦然夫截之為言堵塞也藥之能堵截病由者必其性澀而壅足以遏住經絡斯留邪而釀變非常蜀開提之性所及也為斯説者盍觀外臺聖濟各集漢魏以來千餘年諸治瘧名方几千首而用常蜀者十之八九可瞭然矣其説與此案發明常山之由陰達陽大致相同足見常山為治瘧之要藥也
