body:
  text: 第五卷操淫病案風燥傷衛案內科鄭惠中住杭州病者陳漢山年二十四歲住杭縣定南鄉病名風燥傷衛原因立冬前西風肅殺燥氣流行感其勝氣而發病證候頭脹微痛畏寒無汗鼻塞咳嗽氣逆胸悶身熱唇燥肌膚乾槁診斷脈右浮滑左弦澀舌苔白薄弦則為風澀則為燥滑則為痰脈證相參乃感秋涼之燥風即徐洄溪所謂病有因風而燥者宜兼治風是也療法內經謂燥淫所勝平以苦溫佐以酸辛故以杏仁之微苦溫潤為君生白芍之微酸桂枝木之微辛為臣時至秋燥每多咳逆故佐前桔以宣肺使蜜棗以潤肺肺氣宣暢則燥氣自然外解矣處方光杏仁三錢生白芍錢半桂枝木八分前胡二錢苦桔梗一錢蜜棗一枚擘次診連進兩劑鼻塞通而頭痛止微汗出而寒熱除惟咳嗽胸悶依然脈左雖柔右仍浮滑此燥邪不去則肺不清肺不清則咳悶不止治以疏肺消痰仿程氏止嗽散加減次方甜杏仁三錢去皮蜜炙橘紅一錢紫蔻三錢蜜棗一枚孽炒蔞皮二錢蜜炙百部錢半蘇子錢半金橘脯兩枚切片效果三劑後咳嗽大減胸悶亦除寢食精神復舊後以橘紅麥冬泡湯代茶辛以通氣甘以潤肺忌口一旬調理而痊廉按沈氏目南謂燥氣屬涼謂之次寒乃論秋燥之勝氣也勝氣多由於冷風方用桂枝杏仁湯加減深合經旨接方用止嗽散增損亦屬涼燥犯肺氣逆痰嗽之正方涼燥犯肺案內科何拯華紹興同善局病者單增康年三十六歲業商住單港病名涼燥犯肺原因秋深初涼西風肅殺適感風燥而發病證候初起頭痛身熱惡寒無汗鼻鳴而塞狀類風寒惟唇燥嗌乾於咳連聲胸滿氣逆兩脅串疼皮膚干痛診斷脈右浮澀左弦緊舌苔白薄而干捫之戟手此內經所謂大涼肅殺華英改容胸中不便嗌塞而咳是也療法遵經旨以苦溫為君佐以辛甘香蘇蔥豉湯去香附加杏仁百部紫菀前胡桔梗等溫潤以開通上焦上焦得通則涼燥自解處方光杏仁三錢蘇葉梗錢半新會皮錢半紫菀三錢前胡錢半鮮蔥白四枚淡香豉三錢炙百部錢半桔梗一錢炙草六分次診兩劑後周身津津微汗寒熱已除脅痛亦減惟咳嗽不止痰多氣逆胸前滿悶大便燥結脈右浮滑左手弦緊已除舌苔轉為滑白此肺氣之膹郁雖已開通而胸腹之伏邪尚多閉遏也治以辛滑通潤流利氣機氣機一通大便自解用五仁橘皮湯加蔞薤次方甜杏仁四錢去皮杵柏子仁三錢杵生薑四分拌搗全爪蔞五錢松子仁三錢去皮杵栝蔞仁四錢杵干薤白二錢搗蜜炙橘紅一錢效果一劑而便通咳減再劑而痰少氣平後用清金止嗽膏日服兩瓢調養數日而痊附清金止嗽膏方藕汁梨汁各四兩薑汁蘿蔔汁白蜜各三兩巴旦杏仁去皮川貝去心各二兩磁瓶內炭火熬膏不時噙化康按春月地氣動而濕勝故春分以後風濕暑濕之證多秋月天氣肅而燥勝故秋分以後風燥涼燥之證多若天氣睛暖秋陽以曝溫燥之證反多於涼燥前哲沈氏目南謂性理大全燥屬次寒感其氣者遵內經燥淫所勝平以苦溫佐以辛甘之法主用香蘇散加味此治秋傷涼燥之方法也葉氏香岩謂秋燥一症初起治肺為急當以辛涼甘潤之方氣燥自平而愈若果有暴涼外束只宜蔥豉湯加杏仁蘇梗前胡桔梗之屬此案初方悉從葉法加減接方五仁橘皮湯加蔞薤方皆辛潤滑降穩健有效惟初起雖屬涼燥繼則漸從熱化故終用清金止嗽膏以收全功溫燥傷肺案內科何拯華紹興同善局病者王敬賢年三十五歲業商住南街柴場弄病名溫燥傷肺原因秋深久晴無雨天氣溫燥遂感其氣而發病證候初起頭疼身熱乾咳無痰即咳痰多稀而黏氣逆而喘咽喉干痛鼻乾唇燥胸悶脅疼心煩口渴診斷脈右浮數左弦澀舌苔白薄而干邊尖俱紅此內經所謂燥化於天熱反勝之是也療法遵經旨以辛涼為君佐以苦甘清燥救肺湯加減處方冬桑葉三錢生石青四錢冰糖水炒原麥冬錢半瓜蔞仁四錢杵光杏仁二錢南沙參錢半生甘草七分制月石二分柿霜錢半分沖先用鮮枇杷葉一兩去毛筋雅梨皮一兩二味煎湯代水次診連進辛涼甘潤肅清上焦上焦雖漸清解然猶口渴神煩氣逆欲嘔脈右浮大搏數者此燥熱由肺而順傳胃經也治用竹葉石膏湯加減甘寒清鎮以肅降之次方生石膏六錢杵毛西參錢半生甘草六分甘蔗漿兩瓢沖竹瀝夏錢半原麥冬錢半鮮竹葉卅片雅梨汁兩瓢沖先用野菰根二兩鮮茅根二兩去皮鮮刮竹茹三錢煎湯代水三診煩渴已除氣平嘔止惟大便燥結腹滿似脹小溲短澀脈右浮數沉滯此由氣為燥郁不能布津下輸故二便不調而祕澀張石頑所謂燥於下必乘大腸也治以增液潤腸五汁飲加減三方鮮生地汁兩大瓢雅梨汁兩大瓢生萊蔔汁兩大瓢廣鬱金三支磨汁約二小匙用淨白蜜一兩同四汁重湯燉溫以便通為度四診一劑而頻轉矢氣二劑而暢解燥矢先如羊糞繼則夾有稠痰氣平咳止胃納漸增脈轉柔軟舌轉淡紅微干用清燥養營湯調理以善其後四方白歸身一錢生白芍三錢肥知母三錢蔗漿兩瓢沖細生地三錢生甘草五分天花粉二錢蜜棗兩枚孽效果連投四劑胃漸納穀神氣復元而愈廉按喻西昌謂內經生氣通天論秋傷於燥上逆而咳發為痿厥燥病之要一言而終即諸氣膹郁皆屬於肺諸痿喘嘔皆屬於上條指燥病言明甚至若左胠脅痛不能轉側嗌乾面塵身無膏澤足外反熱腰痛筋攣驚駭丈夫㿗病婦人少腹痛目眯眥瘡則又燥病之本於肝而散見不一者也而要皆秋傷於燥之徵也故治秋燥病須分肺肝二臟遵內經燥化於天熱反勝之之旨一以甘寒為主發明內經燥者潤之之法自制清燥湯隨症加減此治秋傷溫燥之方法也此案前後四方大旨以辛涼甘潤為主對症發藥藥隨症變總不越葉氏上燥治氣下燥治血之範園燥咳案內科錢存濟住廣德城內病者陳周溪年近四旬身體強盛廣德屠宰稅經理住本城病名燥咳原因時值秋燥司令先患房事後宴會酒罷當風而臥醒則發咳證候乾咳無痰胸膺板悶胃脘拒按口乾喜冷日晡發熱夜不安寐診斷六脈強直有力舌苔黃燥合病因脈象斷之乃肺燥胃實也先以清燥活痰藥投之不應繼以消導豁痰藥治之轉劇此由時值燥令胃腸積熱化燥燥火橫行宜其無濟也療法大承氣湯合調胃法君以苦寒蕩積之大黃佐以鹹寒潤燥之芒硝臣以苦辛開泄之朴實少加甘草以緩硝黃之峻為使處方川錦紋一兩酒洗川卷朴三錢炒枳實三錢玄明粉三錢生甘草錢半上藥先煎後納玄明粉俟玄明粉溶化去滓頓服效果服一劑下燥屎數十枚其病霍然改用清燥救肺湯二劑以善其後廉按燥之一證有由風來者則十九條內諸暴強直皆屬於風是也有由濕來者則十九條內諸痙項強皆屬於濕是也風為陽邪久必化燥濕為陰邪久亦化燥並且寒亦化燥熱亦化燥燥必由他病轉屬非必有一起即燥之證內經所以不言燥者正令人於他症中求而得之由是而證以經文及傷寒論各病則凡六經皆有燥證嘉言所制清燥救肺湯一方獨指肺金而言斷不足以概之若言六經之燥則惟陽明一條最為重候蓋手足陽明之胃大腸正屬燥金為六氣之一而可獨指肺金為燥哉嘉言惟不識十九條之皆可以求燥證故不知十九條之所以無燥證耳至補出秋燥一層自有卓見不可沒也此案卻合胃大腸燥金為病清燥消滯其何濟乎斷證既明放膽用三一承氣湯苦溫平燥鹹苦達下攻其胃腸燥實善後用清燥救肺先重後輕處方用藥步驟井然燥咳案內科柳貫先住鎮江城外山巷病者郎君年六十三歲鎮江丹徒縣人住本城內病名燥咳原因中年失偶身長而瘦木火體質適感秋燥而發病證候乾咳喉癢胸脅刺痛頭脹肌熱鼻流濁涕診斷舌紅苔干脈浮而數乃溫燥引動肝熱沖肺也療法潤肺清肝用桑葉二母蔞蘆為君以清燥救肺竹茹瓜絡夏枯蘇子為臣以清絡平肝佐以薄荷梨皮之辛涼甘潤以疏風燥使以生甘草調胃和藥處方霜桑葉二錢紫蘇子一錢蘇薄荷五分生甘草五分夏枯草二錢栝蔞皮二錢肥知母錢半川貝母三錢淡竹茹三錢水蘆根一兩雅梨皮五錢絲瓜絡三錢效果服二帖即熱退咳減原方去薄荷蘇子加鮮石斛三錢青蔗漿兩瓢增液養胃而痊囑其日服藕粉以調養而善後廉按此外感溫燥之咳故專用清泄以肅肺方亦輕靈可喜孕婦燥咳案産科何拯華紹興同善局病者宋寶康之妻吳氏年三十四歲住本城南街病名孕婦燥咳原因妊已七月適逢秋燥司令首先犯肺而發證候初起背寒乾咳咳甚無痰喉癢脅疼甚至氣逆音嘶胎動不安大便燥結診斷脈右浮滑搏指左弦滑數舌邊尖紅苔薄白而干此內經所謂秋傷於燥上逆而咳似子瘖而實非子瘖子瘖當在九月今孕七月乃由燥氣犯肺肺氣鬱而失音所以經謂諸氣膻郁皆屬於肺也療法當從葉氏上燥治氣辛涼宣上故用桑菊荷蒡疏肺清燥為君蔞貝潤肺活痰為臣佐以雞子白雅梨皮開其音使以嫩蘇梗安其胎庶幾肺氣舒暢而痰松音揚胎氣自安矣處方冬桑葉二錢薄荷葉八分栝蔞皮二錢雞子白一枚後入白池菊二錢牛蒡子錢半川貝母二錢雅梨皮一兩次診連進三劑音清咳減咳痰亦鬆惟大便五日不通脘腹脹滿口乾喜飲不能納穀脈仍搏數舌邊尖尚紅捫之仍干法當內外兼治外用蜜煎導以引之內用五仁湯加減以通潤之次方松子仁四錢杵炒麻仁三錢杵甜杏仁三錢去皮柏子仁三錢杵瓜子仁二錢金橘脯二枚切片蘿蔔汁一瓢煎湯代水先用淨白蜜一瓢煎湯代水三診一劑而頻轉矢氣再劑而大便通暢腹脹頓寬咳痰雖鬆而咳仍不止左脅微痛幸口燥已除胃能消穀脈數漸減舌紅漸淡可進滋燥養營湯沖潤肺雪梨膏保胎元以除咳三方白歸身錢半生白芍三錢蜜炙百部錢半蜜棗一枚剪細生地三錢生甘草五分蜜炙紫菀三錢金橘脯一枚切片葉氏潤肺雪膏一兩分沖效果連服四劑音揚咳止胃健胎安而愈廉按六氣之中惟燥氣難明蓋燥有涼燥溫燥上燥下燥之分涼燥者燥之勝氣也治以溫潤杏蘇散主之溫燥者燥之復氣也治以清潤清燥救肺湯主之上燥治氣吳氏桑杏湯主之下燥治血滋燥養營湯主之此案孕婦病燥較男子燥證為難治初中末三方皆對症發藥層次井然且無一犯胎之品非率爾處方者可比燥咳咯血案婦科何拯華紹興同善局病者王小毛之妻徐氏年草三歲住琶山村病名燥咳咯血原因肝經素有鬱火秋分後適被燥熱上逼頓致咯血前醫曾用三黃瀉心湯沖京墨汁送服參三七兩劑不應特來邀診證候初起喉癢乾咳氣逆胸悶兩脅串疼繼即咯血鮮紅多至兩碗三日不止頭暈目閉面赤足冷息粗難臥神煩少寐診斷脈左沉弦澀右洪大搏數舌嫩紅微干豫斷之曰此由燥火傷肺肺絡傷則血上溢病勢甚危最防氣隨血脫幸而重按兩尺脈尚有根或可挽回療法苦寒瀉火不應當易甘寒清燥冀其寧絡止血和胃保肺肺氣肅降則血自止借用顧曉瀾先生八汁飲意以救濟之處方甘蔗汁一酒杯鮮蘆根汁一酒杯生萊蔔汁半酒杯生池藕汁一酒杯雅梨汁一酒杯鮮荷葉汁三匙生白果汁二匙陳京墨汁三匙先用七汁和勻重湯燉溫衝入京墨汁不住口緩緩灌之次診昨進八汁夜間得寐血亦不來神亦稍安惟精神疲倦懶於語言狀似奄奄一息脈雖搏數漸減右仍浮大按之豁然而空舌仍紅嫩此由血去過多防有氣隨血脫之變議以益氣固脫為君寧絡佐之次方吉林參七分秋石水拌浸一時許左牡蠣四錢生打北五味七粒杵雅梨汁一酒杯沖大麥冬錢半辰砂染勻花龍骨三錢生打甘蔗汁一酒杯沖生藕汁一酒杯沖三診兩劑服後精神漸振胃喜納食脈大漸斂數象己除惟咳痰不止或帶血絲或夾血珠尚防有肺損之患再仿顧松園先生法用八仙玉液以善其後三方生藕汁一酒杯甘蔗汁一酒杯清童便一酒杯真柿霜錢半雅梨汁一酒杯蘆根汁一酒杯茅根汁一酒杯雞子白三枚重湯燉溫頻頻服之效果連服八日咳痰已除火平血寧精神恢復而痊廉按葉香岩先生云咯血脈右大者治在氣分今則內因肝火爍肺外因燥熱侵肺是先由氣分熱熾而後劫傷血管血管破裂所吐雖是血其病實在氣故初方一派甘寒潤降氣藥居多血藥為佐蓋病由氣分波及血分治法自當重氣而輕血也內經云熱傷氣氣分熱灼之後焉得不虛人參在所必需然恐肺熱還傷肺故用秋石以拌浸之且有龍牡五味之收斂血管麥冬三汁之甘涼潤降則人參不患其升動矣三方八仙玉液為松園得意之方謂癆損之咳擇而用之亦有特效觀此則是案可為治虛燥咯血之概要矣燥咳頭暈案婦科何拯華紹興同善局病者許姓婦年三十餘歲住南池病名燥咳頭暈原因素體血虛肝熱時逢秋燥燥氣逗引陡發乾嗆而兼暈證候燥咳噁心氣逆頭眩鼻中氣如火熱咽乾神煩夜寐盜汗汗出即醒醒則氣咳咳甚則暈診斷脈右寸浮澀左關虛數而弦細按兩尺尚有根氣舌乾少津此由時令之燥氣挾肝經之燥火互相上蒸沖肺則氣逆乾咳沖腦則頭暈目眩病勢甚為可慮幸而脈尚有根兩顴不紅聲不嘶而音不啞不致釀變癆瘵耐心調養尚可挽回療法欲保肺藏之氣液當先清肺經之燥熱瀉白散合清燥救肺湯加減處方生桑皮五錢冬桑葉三錢生石膏三錢原麥冬一錢生甘草五分地骨皮五錢甜杏仁三錢杵毛西參一錢枇杷露一兩分沖雅梨皮一兩次診兩劑後鼻中氣熱己除氣逆乾咳亦緩惟夜寐仍有盜汗神煩頭暈依然脈舌如前姑用吳氏救逆湯甘潤存津介潛鎮攝次方陳阿膠錢半煬沖生白芍五錢細生地三錢化龍骨三錢生打原麥冬錢半炙甘草八分炒麻仁二錢左牡蠣五錢生打三診三進甘潤介潛頭暈已除盜汗亦止惟火升氣咳痰不易出即強咳出一二口稀沫稠黏喉中有血腥氣右寸脈轉浮數左弦軟虛數同前舌兩邊潤中心仍於正如綺石所謂肺有伏逆之燥火膈有膠固之燥痰也姑仿顧松園先生法清金保肺湯以消息之三方桑白皮五錢生甘草七分野百合錢半京川貝四錢去心地骨皮五錢原麥冬一錢款冬花三錢生薏苡三錢先用鮮枇杷葉一兩去毛筋淨鮮白茅根二兩去皮煎湯代水四診連投清金潤燥降氣化痰咳雖減而不除痰已松而易出血幸不咯神亦不煩脈轉滑數舌變嫩紅病者云恐久嗆成癆何不用人參以益肺氣愚謂參固為益氣正治之藥然今尚肺火熾盛驟進人參最防肺熱還傷肺故前投清金潤燥之藥清肺熱即所以救肺氣亦為益氣之法也仍守前方加西洋參錢半鮮石斛三錢五診四劑後餘症均減僅有早起咳痰惟不食則餔得食則緩食後咳嗆全無診脈右關虛弱左關沉細微數此由胃陰肝血兩虧中虛無砥柱之權仿仲聖諸虛不足先建其中去過辛過溫之品但用建中之法而變建中之方庶不致助肝陽以爍肺津矣五方淮山藥三錢生打提麥冬錢半炒白芍二錢陳南棗二枚青皮甘蔗兩節川石斛三錢廣皮白一錢清炙草五分飴糖三錢鮮建蘭葉三片後入效果六進建中方法胃健咳止精神復舊後用人參固本丸潞黨參生熟地各四兩天麥冬各二兩蜜丸如小桐子大玫瑰花三朵泡湯送下調補一月而痊廉按此即喻西昌所謂身中之燥與時令之燥互結不解必緩調至燥金退氣而肺乃得寧咳可痊愈案中前後五方悉本前哲成方脫化而來無一杜撰之方殊堪嘉尚燥咳似癆案婦科何拯華紹興同善局病者室女朱姓年十五歲住南門外朱家病名燥咳似癆原因內因肝鬱經閉外因時逢秋燥遂病乾咳不止專門産科作郁癆治服過逍遙散加減已十餘劑病勢增劇來延豫治證候面黃肌瘦唇燥咽乾懶言神倦便結溲赤夜間潮熱逢寅卯時燥咳無痰胸脅串疼至天將明寐時盜汗出而身涼經停三月飲食漸減診斷脈右浮澀左沉弦澀按之尚有胃氣舌紅兼紫此由肝鬱氣窒以致血瘀瘀血化火沖肺作咳似癆嗽而尚非真癆也療法姑先用解鬱養營以消息之處方瓜蔞仁三錢炒干薤白錢半焦山梔二錢粉丹皮錢半真新絳錢半蘇丹參三錢京川貝三錢去心廣鬱金二錢磨汁沖地骨皮露一兩分沖次診連服三劑二便通暢飲食大增潮熱盜汗漸減脈象亦漸流利解鬱養營幸中病機惟咳久不止恐將成癆再照前方去蔞薤加歸身一錢鮮生地五錢外用紫菀噙化丸三粒以通降之次定丸方紫菀五錢鮮枇杷葉五錢去毛炒香生桑皮三錢甜杏仁三錢去皮款冬花三錢絳通錢半醋炒生川軍錢半蜜丸如櫻桃核大每夜噙化三丸三診三劑後潮熱盜汗已止乾咳十減八九面黃漸潤精神頗振脈亦漸起而流利舌紫亦退轉為紅活仍用前方煎送當歸龍薈丸錢半仲景䗪蟲丸錢半四診連進四劑諸恙俱痊寢食精神復舊惟少腹隱隱作痛此經水將通之候脈象流利兩尺尤滑其明徵也改用寇氏澤蘭湯合柏子仁丸加減四方澤蘭葉三錢生赤芍二錢延胡索錢半酒炒生淮牛膝三錢全當歸三錢酒洗柏子仁三錢陳艾葉二分雞血藤膏錢半煬化沖卷柏錢半廣鬱金二錢磨汁沖效果連進四劑經通脈和寢食俱增而痊廉按肝鬱氣窒以致血瘀者必先疏暢其氣故首用蔞薤以宣通上焦之氣鬱郁久必從火化內應乎肝故繼入當歸龍薈丸合仲景䗪蟲丸直瀉肝經之鬱火以通其經逮郁解火清經水有流動之機然後用溫通消瘀因其勢而利導之前後治法層次井然可為似癆非癆者進一解燥咳動沖案內科何拯華紹興同善局病者許君年三十二歲業商住南門外病名燥咳動沖原因內因腎虛肝旺外因秋燥司令一感觸而衝動作咳前醫連進清燥救肺湯加減方中人參用太子參約八劑而終歸無效來延豫診證候初起咳逆無痰喉癢咽乾夜熱咳甚動引百骸繼則臍旁衝脈動躍震手自覺氣從臍下逆沖而上連聲頓咳似喘非喘診斷脈左細澀右反浮大按之虛數舌紅胖嫩此喻嘉言所謂時至秋燥人多病咳而陰虛津枯之體受傷獨猛亦即王孟英所謂肺氣失降腎氣失納之沖咳也療法首當潛陽鎮沖故以三甲石英為君其次育陰滋燥故以膠麥地芍為臣佐以款冬使以冰糖為專治乾咳而設庶幾潛鎮攝納納氣歸原則氣納沖平不專治咳而咳自止矣處方左牡蠣四錢生打龜甲心四錢生打生鱉甲四錢打生款冬三錢陳阿膠錢半煬沖生白芍五錢原麥冬二錢奎冰糖三錢先用大熟地八錢切絲秋冰三分開水泡四湯碗同紫石英一兩煎取清湯代水煎藥次診每日兩煎連投四劑使水升而火降故咽乾喉癢均除俾氣納而沖底故頓咳連聲大減惟脈仍虛數舌尚胖嫩此伏燥之所以難滋而陰虛之所以難復也仍守原方重加石斛耐心調補以靜養之次方原方去石英加鮮石斛五錢同切絲大熟地煎湯代水三診連進六劑衝動已平夜熱亦退胃納大增精神頗振晨起略有單聲咳脈雖虛而不數舌雖紅而不胖病勢幸有轉機藥餌尚需調補議以六味地黃湯加減善其後以復原三方春砂仁二分拌搗大熟地五錢野百合二錢大蜜棗兩枚擘山萸肉三錢生淮山藥三錢打原麥冬三錢金橘脯兩枚切片效果連服十劑單聲咳止飲食精神恢復原狀而痊康按燥咳動沖夢隱謂之沖咳凡水虧木旺者一逢秋燥司令每發此病豫恆數見不鮮仿王氏治沖咳方如牡蠣龜板鱉甲紫石英蓯蓉茯苓熟地歸身牛膝冬蟲夏草胡桃肉等品或用西洋參熟地蓯蓉二冬茯苓龜板牡蠣紫石英玉竹枇杷葉橘皮等品屢投輒驗此案從吳氏三甲復脈湯加減大旨相同競奏全功此葉吳王三家學派之所以盛行到今不衰也燥咳兼瀉案兒科蕭琢如住湘鄉水口山礦局病者劉君令郎年六歲住本鄉病名燥咳兼瀉原因時值夏曆八月先患寒熱醫者雜治未愈始來邀余過診證候身熱咳嗽無痰口渴兼以下利清穀舌色紅而苔白診斷脈浮大此正喻嘉言所謂肺熱無從宣泄急奔大腸也療法以清肺熱而兼潤大腸即與瀉白散加減處方黃芩一錢地骨皮三錢光杏仁錢半勿研陳阿膠一錢煬沖生甘草四分效果一劑瀉即少止二劑而熱渴俱除再二劑而咳嗽全瘥矣廉按肺與大腸相表裡肺熱無處可宣即奔大腸此為順傳每見食入則不待運化而直出食不入則腸中之垢汙亦隨氣奔而出是以瀉利無休也此案悉遵喻法以潤肺之藥兼潤其腸則源流俱清連投四劑身熱咳嗽泄瀉一齊俱止可為治燥咳兼瀉之特效新法秋燥泄瀉案內科蕭琢如住湘鄉水口山礦局病者黃君年三十歲住本鄉病名秋燥泄瀉原因秋病燥泄日數十度身熱微咳以粗閲醫書初服消散藥不應繼進疏利亦不應易以溫補升提病勢愈劇特來延診證候形容慘晦焦急不堪舌苔淡白而薄雜露紅點診斷脈浮而虛余曰此等證候從前名家惟喻嘉言知之有案可稽若時醫則無從問津服藥不對宜其愈治愈乖也療法仿喻治吳吉長乃室救誤之方病者猶疑信參半乃命家人就鄰舍取喻氏書請為指示余為檢出受閲並告以屢試屢驗切勿疑阻自誤處方陳阿膠三錢煬沖生桑皮五錢地骨皮五錢苦桔梗錢半青子芩二錢生甘草一錢效果連服七劑平復如初廉按肺為時令燥氣所傷初但身熱微咳消散疏利劫傷肺氣已為非法溫補升提更謬反使肺氣閉錮則肺中之燥熱無處可宣勢必下移於大腸腸胃之津液隨瀉而泄故形容慘晦焦急不堪今以清金潤燥之劑潔流清源上下兼治不止瀉而瀉反自止方從喻案脫化而來故前哲驗案不可不悉心研究也秋燥化痢案內科何拯華紹興同善局病者趙君年三十四歲業商住華舍病名秋燥化痢原因素稟陰虧夏月炎蒸液為暗耗裡氣已燥適逢秋燥司令以燥感燥下侵於腹初則燥瀉繼變燥痢證候下痢赤白晝夜二十餘次腸中切痛痛而後行裡急後重艱澀不通行後稍止氣機終覺不利身體熯燥口澀咽乾診斷脈右沉弦細澀左浮澀沉數舌乾紅苔薄白少津此石芾南所謂肺燥直逼大腸而成腸澼燥鬱氣機則腸垢下而色白燥傷血絡則血滲大腸而色紅也療法下燥治血故重用地芍膠黃大劑養營滋燥為君瓜蔞滑利氣機為臣佐以桔梗開提肺氣宣其壅而舉其陷使以甘草扶助白芍緩其急以止其痛處方細生地六錢生白芍一兩陳阿膠二錢煬沖瓜蔞仁五錢炒香白桔梗錢半生甘草一錢雞子黃兩枚煎湯代水次診下痢次數漸減惟少腹切痛心煩口燥夜甚不寐脈同前舌稍潤防有糟粕結為燥糞用加味雪羹煎滋陰潤燥兼清余積次方陳阿膠三錢煬沖生白芍一兩生甘草一錢淨楂肉二錢薺菜乾五錢先用淡海蜇四兩大地栗四枚煎湯代水三靜連投兩劑果下燥糞六七枚下痢十減六七腸中切痛漸減惟身體因病羸弱自覺氣虛下陷小溲短赤且少甚至點滴而來脈象漸轉流利沉細數而不弦澀舌紅轉潤當於滋陰清燥藥中特加潞黨參以助其生機取其性平而潤乾燥痢尤相宜也用天水滌腸湯加石斛茅根三方淮山藥六錢生打生白芍六錢鮮石斛四錢天水散三錢荷葉包煎潞黨參三錢白頭翁三錢先用鮮茅根二兩去皮煎湯代水四診腹痛已止痢亦見愈小溲暢利胃氣漸動夜能安寐脈尚微數原方去白頭翁天水散加細生地四錢原麥冬二錢效果連投四劑病愈十之八九囑其用北沙參四錢光燕條一錢奎冰糖三錢每日一服調養旬余而瘥廉按舒馳遠曰痢之為病其綱凡四曰陷邪曰秋燥曰時毒曰滑脫四者痢門之大綱也若秋燥化痢肺氣為燥氣壅遏陷入腹中搏結作痛故但清其燥無所往而不得之矣石芾南曰習俗遇有腸澼不辨燥濕輒用敗毒散升陽芍藥湯通里其在風濕致痢用敗毒散升陽轉氣逆流挽舟自可獲效濕熱致痢用芍藥湯酸苦泄熱苦辛通降亦可獲效若是燥邪治以辛燥苦燥必致傷及血液剝盡腸膏而斃此案前後三方一以滋燥養營為主隨症加減競收全功可為深得舒石兩家之心傳矣秋燥厄逆案內科袁掛生住鎮江京口病者李善門年四十餘住城內磨刀巷病名秋燥厄逆原因先是李君病經某醫屢用汗藥微有厄逆嗣又改延某醫診治斷為濕溫病用大承氣湯云非下則厄不能止病家信之詎知承氣湯服後不惟厄逆加甚且不能坐不能言矣證候厄逆不止聲震床帳診斷按其脈尚有胃氣視其舌質焦燥無津此肺胃津液因誤下而大傷也療法甘涼輕降非專為治厄也不過以其津枯氣弱命在垂危姑以此藥救其津液耳處方北沙參三錢原麥冬三錢生玉竹三錢鮮石斛三錢乾地黃三錢川貝母錢半清炙草一錢湘蓮肉十粒次診此藥服後安睡兩小時厄聲頓止特醒後則厄又作豫因戒其家人今日之藥服後宜任其熟睡不可頻頻呼喚擾其元神俟其自醒則自然不厄矣次方北沙參三錢原麥冬三錢生玉竹三錢鮮石斛三錢淡竹茹二錢乾地黃三錢川貝母錢半清炙草一錢湘蓮肉十粒枇杷葉五錢炒香效果第三日復診果如豫言厄全止且能迸粥矣惟神氣呆滯狀若癡愚其家甚以為憂且恐豫藥之誤豫曰無恐也再過半月即不癡矣因以六君子湯養胃湯出入培養胃氣接服數日而起說明據近世生理學家謂厄逆由於橫膈膜之痙攣麥冬地黃為補液制痙之聖藥故能止厄特未見前人發明及此惟痰滯壅阻人實證之厄則當先豁其痰未可驟用此藥也廉按厄逆一證有因熱固寒國痰因食因瘀血因大虛之不同須以別症相參施治如因胃中痰飲所阻氣逆而厄者二陳湯加旋覆代赭石治之若因胃中飲食所阻氣逆而厄者沉砂枳橘青皮檳榔之屬若因胃中實熱失下而厄大便不通脈來有力者當用承氣湯下之若因胃中熱瘀而厄者犀角地黃湯加降香鬱金桃仁羚羊角之屬如陰寒傷胃而厄或冷氣逆上者丁香柿蒂沉砂吳茱萸之屬甚者加掛附挾虛者再加人參若因吐下後及久病産後老人虛人陰氣大虧陽氣暴逆自臍下直衝至胸嗌間而厄者最凶之兆在熱病中大概屬實熱者居多或清或下隨直用藥凡厄聲輕者不治經曰病深者其聲噦是也此案用生地麥冬推為治燥症厄逆之特效藥可謂新發明矣然豫鑑別其方藥初方一派甘潤厄暫止而復作次方加竹茹枇杷葉清降上厄二劑後厄乃全止由是現之則胸膈膜因燥而痙攣必甘潤與清降並用始奏全功也明矣肺燥脾濕案內科何拯華紹興同善局病者羅守謙年三十八歲業商住偏門外徐山村病名肺燥脾濕原因涼燥外搏暑濕內伏時至深秋而晚發證候一起即灑淅惡寒寒已發熱鼻唇先干咽喉燥痛氣逆乾咳肢懈身疼胸脅串疼脘腹灼熱便泄不爽溺短赤熱診斷脈右浮澀關尺弦滯舌苔粗如積粉兩邊白滑此喻嘉言所謂秋傷燥濕乃肺燥脾濕之候即俗稱燥包濕濕遏熱伏是也療法先與苦溫發表輕清化氣蔥豉桔梗湯加減辛潤利肺以宣上使上焦得宣氣化濕開處方光杏仁三錢苦桔梗一錢前胡錢半紫菀三錢鮮蔥白四枚牛蒡子錢半杵蘇薄荷一錢炙甘草五分栝蔞皮二錢淡香豉三錢次診連進苦溫辛潤開達氣機周身津津微汗惡寒胸脅痛除惟灼熱口渴心煩惡熱咳痰稠黏便溏溺赤脈轉洪數舌苔粗糙此涼燥外解濕開熱透之候法當芳透清化吳氏三仁湯加減次方光杏仁三錢牛蒡子錢半杵絲通草一錢淡竹葉二錢焦梔皮二錢生苡仁三錢青連翹三錢香連丸一錢拌飛滑石五錢栝蔞皮二錢先用活水蘆筍二兩燈心五分北細辛二分煎湯代水三診兩進芳透清化胸背頭項紅疹白㾦齊發心煩惡熱漸減惟仍咳稠痰口仍燥渴腹尚灼熱大便反祕溺仍赤澀脈轉沉數舌赤苔黃而糙此下焦濕熱伏邪依附糟粕而膠結也治以苦辛通降宣白承氣湯加減使伏邪從大便而解三方生石膏四錢打光杏仁四錢小枳實錢半鮮石菖蒲汁一小匙沖生川軍二錢栝蔞仁五錢杵漢木通一錢廣鬱金汁兩小匙沖四診一劑而大便先燥後溏色如紅醬二劑而燥渴腹熱均輕舌苔黃糙大退脈轉軟而小數此伏邪漸從大便下泄也下雖不淨姑復其陰葉氏養胃湯加減以消息之四方北沙參二錢鮮生地汁兩瓢沖鮮石斛錢半原麥冬一錢雅梨肉汁兩瓢沖建蘭葉三片切寸後入五診咳嗽大減稠痰亦少溺澀漸利大便復祕頻轉極臭矢氣腹熱如前脈仍小數按之堅實此濁熱黏膩之伏邪尚多與腸中糟粕相搏必俟宿垢下至四五次疊解色如紅醬極其臭穢之溏糞而伏邪始盡姑用緩下法以追逐之五方野茭白根一兩童桑枝一兩煎湯送陸氏潤字丸每吞錢半上下午及晚間各服一次六診據述每服一次丸藥大便一次色如紅醬而穢然不甚多便至四次色轉醬黃五次色轉老黃六次色轉淡黃腹熱已除胃亦思食診脈軟而不數舌轉嫩紅捫之微干此胃腸津液兩虧也與七鮮育陰湯以善後六方鮮生地五錢鮮石斛四錢鮮茅根一兩鮮枇杷葉五錢炒香四味煎湯臨服衝入鮮稻穗露蔗漿梨汁各兩瓢效果連進四劑胃納大增津液精神復舊後用燕窩冰糖湯調理旬余而瘥廉按秋日暑濕踞於內新涼燥氣加於外燥濕兼至最難界限清楚稍不確當其敗壞不可勝言蓋燥有寒化熱化先將暑濕燥分開再將寒熱辨明自有準的此案先用苦溫發表辛潤宣上以解涼燥外搏之新邪俟涼燥外解濕開熱透然後肅清其伏熱或用芳透清化或用緩下清利必俟伏邪去淨津液兩虧改用增液育陰以善後先後六方層次頗清為治燥夾伏暑之正法燥結案內科何拯華紹興同善局病者周茂蓮年三十二歲業商住阮港病名燥結原因素有習慣性便閉現受深秋風燥其閉益甚前醫用五仁橘皮湯不應特來邀診證候腹脹便結旬余不通胃氣已鈍喜飲而不喜食診斷脈右沉滯左弦澀舌苔黃膩帶焦此由氣為燥郁不能布津下輸於腸腸乃燥結而痹也療法內外兼治外治先用蜜煎導以引之蔥尉法以運之內治仿丹溪開腸痹法用蔞薤桔梗開提上竅為君使上焦燥郁通暢肺氣下降胃氣自隨之以運行且以元明精及白蜜潤降下竅為臣以枳實為佐使速通幽門以寬其腸氣氣機一通大便自解又何必峻下為能乎處方生薑四分拌搗全瓜蔞六錢干薤白二錢白酒洗搗苦桔梗錢半小枳實錢半元明精三錢淨白蜜一兩開水沖兩湯碗代水煎藥外治方蜜煎導法用淨白蜜煎成如膏子一二時許將皂莢麝香細辛為末和蜜捻成條子放入穀道中其便即通又方蔥白尉法大蔥白四斤切作細絲干米醋多備待用將蔥白絲和醋炒至極熱分作兩包乘熱尉臍上涼則互換不可間斷其涼者仍可加醋少許再炒熱然炒蔥時醋之多少須加斟酌以炒成布包後不至有湯為度尉至六點鐘其結自開次診一劑而腹脹稍寬頻放矢氣再劑而下燥糞如羊屎者五六枚肛門痛裂焦苔雖退黃糙依然脈雖漸轉流利而腸中尚有餘積又以雪羹緩通以肅清之次方漂淡陳海蜇四兩大地栗六個開水兩碗煎成一碗乘熱服之效果連服兩日大便如紅醬者三次余積已盡後用鮮石斛三錢松子仁三十粒調養胃氣三日後胃能消穀而痊康按凡津液素虧者胃腸本燥大便每多祕結適逢秋燥傷肺氣機不宣則大便益不通矣若用承氣猛攻往往水瀉洞泄中氣愈傷津液益干而燥矢不下每致液涸動風險症叢生令仿丹溪翁開腸痹法使上焦舒暢則下焦自通泰矣又何勞峻下哉燥結案內科張錫純住天津病者劉敷陳年四十餘奉天清丈局科員病名燥結原因素有習慣性便閉今因天氣溫燥而發病證候飲食行至下脘復轉而吐出無論服何藥亦如此且其處時時切疼上下不通者已旬日診斷脈右浮澀沉實澀主血鬱而結沉實主胃腸燥結且舌苔黃厚而干尤為陽明府實之現狀療法硝蔔通結湯以潤降之處方用朴硝六兩與鮮萊蔔片同煮至萊蔔爛熟撈出又添生片再煮換至六七次要用萊蔔七八斤將朴硝鹹味借萊蔔提之將盡余濃汁四茶杯每次溫飲一杯兩點鐘一次以便通為度效果飲至三次其結已開大便通暢而痊其女公子適患痢疾俾飲其餘痢疾亦愈說明軟堅通結朴硝之所長也然其味鹹性寒若遇燥結甚實者少用之則無效多用之則鹹寒太過損肺傷腎其人素有勞疾或下元虛寒者尤非所宜惟與萊蔔同煎數次則朴硝之鹹味盡被萊蔔提出萊蔔之汁漿盡與朴硝融化夫萊蔔味甘性微溫煨熟食之善治勞嗽短氣其性能補益可知取其汁與朴硝同用其甘溫也可化朴硝之鹹寒其補益也可緩朴硝之攻破若脈虛不任通下可加野臺參之大力者以為之扶持保護然後師有節制雖猛悍亦可用也按用朴硝煉玄明粉法原用萊蔔然此法今人不講久矣至藥坊所鬵者乃風化硝非玄明粉也今並載其法以備參考實心救人者亦可照法煉之以備施用其法於冬至後用潔淨朴硝十斤白萊蔔五斤切片同入鍋中用水一斗五升煮至萊蔔爛熟將萊蔔撈出用竹篩一個鋪綿紙兩層架托於新缸之上將硝水濾過在庭露三日其硝凝於缸邊將余水傾出曬乾將硝取出用沙鍋熬於爐上融化後攪以銅鏟熬至將凝用剷剷出再裝以瓷罐未滿者寸許蓋以瓦片用釘三個釘地作鼎足形釘頭高二寸罐置其上用磚在罐周遭砌作爐形多留風眼爐磚離罐三寸將木炭火置於爐中罐四圍上下都被炭火壅焙以煅至硝紅為度次日取出再用綿紙鋪於靜室地上將硝碾細用絹羅篩於紙上厚一分將戶牖皆遮蔽勿透風三日後取出其硝潔白如粉輕虛成片其性最能降火化痰清利臟腑怪症服之可蠲狂躁用之即愈搜除百病安斂心神大人服二三錢小兒服五分至一錢用白湯或蔥湯融化空心服之服藥之日不宜食他物惟飲稀粥服二三次後自然精神爽健臟腑調和津液頓生百病如失矣惟久病泄瀉者服之不宜康按此大腸燥證也先由胃積熱生燥繼則大腸津液枯槁腸中宿垢祕結大府旬余不通適陽明燥氣加臨五液內燔肺津無以滋潤不能潤達腸府傳導之官失其常度遂致窒滯不宜氣不下通方用硝蔔通結湯潤燥通便俾得熱結下行津液漸復便自通暢為大腸燥結證別創一便賤良方惟用量太重必北方風氣剛強者始為合度若南方風氣柔弱者減十之九方可服用案後說明頗有理由制朴硝法絶妙燥結腸枯案內科沈奉江住無錫病者凌企周忘其年住西門病名燥結腸枯原因素有煙癖四旬未便而飲食如故證候據述自服燕醫生補丸始三粒繼服六粒後一日服至二十丸竟不得便診斷脈右沉實舌苔焦黃乾厚此腸胃乾枯燥結極矣療法非大劑潤下不能通調胃承氣合五仁湯主之處方生錦紋六錢元明粉二錢瓜蔞仁五錢杵松子仁三錢杵柏子仁三錢杵炒麻仁四錢杵光桃仁九粒杵清炙草八分次診疊進兩煎仍不效改用瀉葉三錢煎湯以磨生大黃錢半一日服三次服後腹中攻撐先下燥栗糞又下於結鞕糞余曰此非一日所能盡也須三五日方能下清效果前方加減連服三日約有桶許然後用參術等調治其便如常廉按大便艱祕多日不通由於實積者服燕補丸三粒至五粒其便即通由於燥結者服麻仁脾約丸三錢至四錢其便亦通如皆不通遍服他藥無效者嘗重用萆麻子油兩許便遂通下其人並不覺瞑眩為通腸結之要藥此案初方重用大黃之蕩滌胃腸元明粉之潤燥軟堅佐以五仁之滑以去著潤以養竅而便仍不通者以其皆無催促大腸蠕動之能力也逮改用瀉葉三錢而大便始通為其性能增進大腸之蠕動又能增添膽汁膽汁注於腸者多則大便易通所以善通大便燥結為緩下之品實無猛烈之性不至傷人氣分故現今名醫每喜用瀉葉以通便而不敢重用硝黃招人畏忌者良有以也寒燥陰結案內科蕭琢如住湘鄉水口山礦局病者從叔多昌年四十餘歲住本鄉病名寒燥陰結原因初患大便不利醫者每以滋潤藥服之久之小便亦不利肚腹飽脹漸上胸膈亦痞滿不舒飲食不入時時欲嘔前後服藥已數月疾益劇最後有一醫謂當重用硝黃大下連進三劑大小便益閉塞不通身體益困疲不支余適自館歸兩家距離半里許促往診證候面色慘晦形羸骨瘦起居甚艱舌苔厚而灰白診斷切脈沉遲而緊呼余告曰自得疾以來醫藥屢更而勢轉殆吾其不起矣即命家人將先後服方逐一送閲畢余曰藥均大錯幸而最後所服硝黃未至腹痛泄瀉否則必無今日然而危矣多叔駭問曰藥乃如此錯乎當疾初起時非但醫以為火余心中亦自以為火有火服硝黃正是對病下藥未泄瀉者竊疑藥力未到耳余笑曰否否此症藥與病反諸醫無一知者何怪老叔迄今圖之病雖危險尚有方救但恐老叔不能堅信搖於旁議中道變更反使余代他人受過則不敢舉方以幹事無濟也多叔曰吾自分死矣他醫之方試之殆遍今爾為吾立方不論何藥死亦甘休斷不致聽他人異議在他人亦從何置議余唯唯療法大劑破陰通陽溫散寒結以急救之處方烏附一兩五錢北姜一兩五錢老生薑一兩粉甘草一兩五錢煎就冷服寫方甫畢多叔曰如此猛烈熱藥分量又極重入口豈能下咽余曰入口不甚辣後當自知可無贅言囑其煎成冷服每日當盡三劑少必兩劑切勿疑畏自誤竊窺多叔猶有難色即促速購藥余當在此守服保無他虞頃之藥至即囑其子用大罐多汲清水一次煎好去渣俟冷分三次進服次診前方究以疑畏不敢頻進至夜僅服完一劑次早嘔少止膈略舒可進糜粥是日服藥始敢頻進盡兩劑其明日嘔已止胸膈頓寬索糜粥食如常人余因語之曰今日當不復疑余藥矣即應聲曰甚善甚善當頻服求速愈三診余因館事未便久曠病根深錮恐難剋日收效又於原方外加半硫丸二兩每日侵晨用淡薑湯送下三錢分三日服完而歸效果歸後第四日天甫明即遣人召入門握余手曰得毋駭乎余乃示爾喜信耳自相別之次日見先日服藥三劑吞丸三錢毫無熱狀腹脹亦稍寬舒食量加體愈暢除服湯三劑外遂將丸藥之半分三次吞服功效益著其明日又如前湯丸並進丸藥完矣今天未明而腹中作響似欲更衣者即命小兒扶如廁小便先至大便隨出先硬後溏稠黏不斷頃刻約半桶病如失矣所以急於告者使爾放心即留晨餐說明多叔早廢書性聰明通達事理席間問余此症究何緣致之前此許多醫藥何以日劇賢侄方為向來所未經見何以如此神效願聞其詳余曰茲理深奧即粗知醫者尚難語此既承下問請淺淺取譬即得大要人身腸胃猶人家之陰溝胸膈猶堂室然病由內臟陽氣式微猶之天寒地凍也試觀冬月人家陰溝冰結水道不通求通之法必俟赤日當空自然冰釋此理婦孺咸知醫者反茫然罔覺初以潤藥是益之霜露則陰溝冰結愈固無怪二便不通肚腹滿脹也繼進硝黃是重以霰雪陰溝既不通層纍而上勢必漫延堂室是即陰霾上逼由肚腹而纍及胸膈遂至咽喉亦形閉塞時而作嘔也今余以辛溫大劑頻服使錮陰中復睹陽光堅冰立泮獲效所以神速多叔掀髯撫掌曰然哉然哉遂為立通脈四逆加人參湯善後而別別後一月復見迎笑曰前此大病幾死微賢侄必無幸矣可稱神技廉按大便閉結食少脈微謂之陰結前哲多以半硫丸治之而愈此案初方大劑破陰通陽雖為溫散寒結實則救硝黃寒瀉之誤服盡兩劑嘔止胸寬而大便仍閉後加半硫丸二兩每日薑湯送下三錢丸藥完而大便隨出則其陰結之所以得通者全在溫潤大腸之硫磺也明矣丁氏化學實驗新本草云硫磺用其大服則可為瀉藥尋常用之作輕瀉藥又可與別種瀉藥相和多服吾國古醫書均以硫磺為有毒且大熱用為壯陽藥皆因硫磺內含有信石所致若已經化學分析之純硫磺則無毒且不熱可為輕瀉藥奉勸吾國藥肆欲制半硫丸以應用務必購析出砒毒之純硫磺方可內服否則恐遭不測用硫磺者其注意之寒燥陰結案婦科蕭琢如住湘鄉水口山礦局病者族侄孀媳陳氏年近四十歲住本鄉病名寒燥陰結原因先患大便不利醫者豫玉竹麻仁牛膝等藥馴至小溲艱澀久之月事亦不通身微熱已五閲月更數醫率用滋潤破氣及行血之品一日雇輿至余館所迎診證候大腹滿脹胸膈時痞時寬飲食減少困倦嗜臥診斷脈沉遲而澀舌苔濕滑而暗心念疾本陰寒今因誤藥由氣分而纍及血分氣血交病藥當氣血並治方能有濟繼悟氣為血帥氣行則血行毋庸多惹葛藤倘氣治而血不和轉方調血正自易易療法單從氣分斬關奪隘疏方用大劑通脈四逆湯冷服囑其每日必服二劑並用半硫丸二兩分作七日每早食前淡薑湯送下許以服完即愈而去處方黑附塊八錢川乾薑五錢炙甘草三錢清童便兩酒鍾沖半硫丸方半夏一兩湯洗七次焙乾為細末硫磺一兩明淨好者研令極細用柳木槌子殺過上以生薑自然汁同熬入干蒸餅末攪和勻入臼內杵數百下丸如梧子大每服十五丸至二十丸無灰溫酒或生薑湯任下婦人醋湯下俱空心服效果嗣後不十日遣丁來云藥完而疾愈請善後方即授通脈四逆加人參令其守服十餘劑後余以他事至其家云後方僅服十劑即平復如常矣族侄媳愈後隔數日即有邵陽周某妻年才三十病症大抵相同但為日不多藥誤亦少勢較輕即上方減輕分量授之而愈厥後上症驗案甚多以無甚出入不復贅云廉按此案方法與前案大同小異惟用量較為輕減其效力終在半硫蓋硫磺熱而不燥能疏利大腸半夏辛下氣溫開鬱三焦通而大便自利矣惟修制此丸必須用倭硫磺吳鞠通曰硫磺有三種土磺水磺石磺也入藥必須用産於石者上磺土紋水磺直絲色皆滯暗而臭惟石硫磺方稜石紋而有寶光不臭謂之黃硯其形大勢如硯按硫磺感日之精聚土之液相結而成生於艮土者佳艮土者少土也其色晶瑩其氣清而毒小生於坤土者惡坤土者老土也穢濁之所歸也其色板滯其氣濁而毒不堪入藥只可作火藥用石磺産於外洋來自舶上入萊蔔內煮六時則毒去觀此則石磺即析出毒質之純硫磺俗稱松花硫磺即日醫所謂金硫磺也燥痙案兒科張錫純住天津病者陳秀山之幼子年三歲住奉大小西邊門外病名燥痙原因外感燥熱而發證候周身壯熱四肢拘攣有抽掣之狀渴嗜飲水大便乾燥診斷嬰兒脈不足憑當舍脈從症知系燥熱引動其肝經風火上衝腦部致腦氣筋妄行失其主宰之常也療法直清陽明為主佐以熄風舒筋處方生石膏一兩生甘草一錢薄荷葉一錢全蜈蚣二條肥知母三錢生粳米二錢鉤藤鉤三錢煎湯一鍾分兩次溫飲下效果一劑而抽掣止拘攣舒遂去蜈蚣又服一劑熱亦退淨而愈廉按內經謂陽明之上燥氣治之故凡燥熱致痙即傷寒論陽明熱盛習習風動之候此案直清陽明為主佐以熄風舒筋卻是正治惟蜈蚣性溫微毒病家每不敢服然據張氏藥學講義云蜈蚣性有微毒而轉善解毒凡一切瘡瘍諸毒皆能消之其性尤善搜風內治肝風萌動癲癇眩暈抽掣瘛瘲小兒臍風外治經絡中風口眼歪斜手足麻木用時宜帶頭足去之則減力且其性原無大毒故不妨全用也燥痙案兒科張錫純住天津病者那姓乳子生月餘住奉天北陵旁病名燥痙原因聞鄰家艾姓幼子前有抽風經愚治愈遂抱之來院求治證候周身壯熱抽掣兩日之間不食乳不啼哭奄奄一息診斷指紋不足憑但憑現症知系燥熱動風上激腦筋卒發痙厥之危候也療法辛涼復甘寒法為其系嬰孩擬用前白虎湯方減半為其抽掣甚劇薄荷葉鉤藤鉤全蜈蚣仍舊又加全蠍處方生石膏五錢杵肥知母錢半生甘草五分生粳米三十粒薄荷葉一錢鉤藤鉤三錢全蜈蚣二錢制全蠍三個煎藥一鍾不分次數徐徐溫灌之效果歷十二小時藥灌已而抽掣愈食乳知啼哭矣翌日又為疏散風清熱鎮肝之藥一劑痊愈隔兩日其同族又有三歲幼童其病狀與陳姓子相似即治以陳姓子所眼藥亦一劑而愈廉按乳子燥熱動風每多發痙此案辛涼復甘寒法卻為清熱潤燥熄風鎮痙之正治惟全蠍與蜈蚣並用病家鄉畏不敢服然據張氏藥學講義云蠍子色青味鹹本無鹹味因皆醃以鹽水故咸性微溫其腹有小黃點兩行數皆八始可入藥夫青者木色八者木數原具厥陰風木之氣化故善入肝經搜風發汗治痙癇抽掣中風口眼歪斜或周身麻痹其性雖毒轉善解毒消除一切瘡瘍為蜈蚣之伍藥其力相得益彰也燥痙昏厥案産科沈奉江住無錫病者陳姓媳年二十餘住北門貝巷病名燥痙昏厥原因懷妊足月腹中素有伏熱因感秋令溫燥陡然病劇午前特來邀診證候頭面四肢浮腫兩目陡然失明繼以痙厥痰涎上湧面色青慘目珠直視唇紫口噤手足鼓動不止神識昏糊診斷脈伏身冷舌紅兼紫此熱深厥深燥熱引動肝火風自火生挾痰刺激神經恐其胎元不保療法清熱熄風潛陽滌痰以急救之處方羚羊角四分珍珠母二兩生打滁菊花三錢川貝母三錢去心擘雙鉤藤三錢石決明二兩生打制膽星七分淡竹瀝四兩晚間再服猴棗一分月石三分鬱金三分羚羊角三分共研細末用竹瀝二兩調服次診明晨復診風痙已定神識時糊時清牙關時開時閉腹中大痛恐其即産而羚羊角涼肝之藥不合惟濂珠雖寒書有下死胎胞衣之說故可用之次方濂珠三分川貝母三分天竹黃三分制膽星三分共研細末用雙鉤藤淡竹茹各三錢泡湯調服三診服後神識已清神倦嗜臥呼吸有度兩脈起而不伏腹痛亦止惟舌紅唇燥兩顴轉赤顯然陽明之燥熱也治以清潤泄熱兼佐熄風三方小川連五分青子芩錢半川貝母三錢水蘆根七錢黃楊腦七個青連翹三錢肥知母三錢竹捲心三十支鮮茅根七錢雙鉤藤三錢四診明日復診腹中又痛胎兒下墮已經腐爛而邪熱未清瘀不得下改用通瘀以泄濁四方蘇丹參二錢川鬱金二錢打當歸尾錢半桃仁泥二錢澤蘭葉二錢炒川貝一錢茺蔚子三錢藏紅花五分西血珀五分入煎取氣而不取味清童便一小杯沖服五診明日又去診視瘀行不多脈有數而左郁舌苔深絳面色仍紅微熱不揚咳不暢達口渴咽乾用泄肺去瘀法五方枇杷葉五錢茺蔚子二錢廣鬱金三錢打炒蔞皮三錢川貝母三錢蘇丹參三錢桃仁泥二錢炒牛蒡錢半焦山楂二錢制殭蠶錢半光杏仁二錢六診服後咳止瘀血盛下大便乾結治以通瘀潤腸六方蘇丹參三錢生川甲三錢桃仁泥二錢炒山楂二錢澤蘭葉三錢廣鬱金三錢廣橘絡一錢炒麻仁三錢全瓜蔞四錢杵益母草一兩煎湯代水效果服二劑諸恙皆平能飲稀粥調理數日而愈廉按此由燥熱動風風火挾痰刺激腦筋陡發神經病狀即産科書中之子癇症也就豫所驗凡臨産發子癇者勢輕而緩母子均可兩全若勢急而重胎兒固多抽壞其胎多腐即産母壽亦立傾幸而對症發藥急救得法胎雖不保母得幸全似此佳案可謂後學師範燥痙昏厥案兒科何拯華紹興同善局病者金阿生年三歲住紹城市門閣病名燥痙昏厥原因素因胎熱現因秋令久晴新感燥熱而發證候頭痛身熱唇焦齒乾神煩驚啼繼則脊強肢瘛氣升痰壅甚則昏厥診斷指紋青紫直竄命關舌乾苔焦此吳鞠通所謂燥氣化火消爍津液亦能致痙也療法首當清熱熄風故以翹竹桑菊鉤藤為君其次潤燥舒筋故以鮮地元參為臣木瓜為使然痙厥兼臻肝風挾痰直衝神經故佐以至寶丹之開竅清神以定昏厥也處方青連翹一錢冬桑葉一錢雙鉤藤二錢鮮生地錢半鮮竹葉一錢滁菊花一錢宣木瓜七分烏元參錢半局方至寶丹一粒研細藥湯調下次診神氣雖清常欲煩躁肢瘛雖靜尚多痰喘時而鼻煽時而驚啼此皆燥火爍肺肺氣欲痹之危候急宜五汁飲調猴棗以潤降之次方生萊蔔汁一瓢荸薺汁半瓢杏仁精十滴鮮雅梨汁一瓢淡竹瀝一瓢真猴棗一分上用五汁飲重湯燉溫調下猴棗緩緩與服三診痰喘已平咳逆大減惟昏昏欲睡懶於語言氣怯神弱身不轉動幸而指紋己隱燥去津回用樊氏五汁飲甘潤育陰和中養胃復其神氣以善後三方鮮石斛二錢鮮生地汁兩瓢鮮梨汁兩瓢青蔗漿兩瓢生藕汁一瓢佛手花一分先將鮮石斛煎百餘沸濾取清汁一杯再將鮮生地等四汁煎十餘沸衝入佛手花乘熱即服效果調養四日諸症悉平胃動納穀而痊廉按燥與火不同火為實證熱盛陽亢身熱多汗法宜苦寒奪其實而瀉其熱燥為虛證陰虧失潤肌膚熯燥法宜甘寒養其陰而潤其燥此案燥熱發痙痙而兼厥病勢不可謂不急矣幸而初次兩方清涼甘潤對症發藥藥用當而效捷故能轉危為安
