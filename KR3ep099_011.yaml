body:
  text: 第十一卷時行痢疫病案急性疫痢案陳務齊住梧州四方井街病者林衡年五十餘歲病名急性疫痢西名赤痢原因素因過食辛燥臟腑鬱熱腸胃發炎誘因天氣不佳微菌飛揚空氣不潔由口鼻吸受直接傳染證候驟然惡寒發熱頭痛口渴四肢煩疼腹中絞痛大便下赤白痢前急後重日夜達數十次繼則全體大熱不休噤口粥飯不能下咽食量全缺口渴連連飲水不能制止排便之後生劇烈之疼痛肛門灼熱下痢則加多二倍日夜達一百餘次排泄之物絶無糞色俱是赤多白少赤者系稀量之血水白者脂膏之類肌肉消瘦形體枯黑唇焦而裂齒黑而枯面黑目赤氣逆喘急熱臭非常晝夜不眠勢甚猛烈診斷診左脈沉伏右脈浮數已極體溫升騰達一百零四度舌苔黑燥起刺脈證合參乃急性傳染病之赤痢證也查閲前醫數方或用驅風解毒喻氏倉廩湯加減以助其炎燥或用清潤之劑仲景黃芩湯加味而緩不濟急遂致釀成危急不治之證余見一息尚存豈能坐視不得不立方援救療法急用大承氣湯加味取生軍芒硝桃仁滑石推蕩大腸而除鬱熱為君石膏粉葛平陽明熱燥生津解肌為臣黃柏山梔銀花生地白芍瀉心肝伏火涼血敗毒為佐厚朴枳實下氣寬中而除急重為使一服後則平平無加無減將方每味再加倍連二服後則痛渴痢略減將方每味再加二倍連三服後則瀉稀量膠黃之糞數次然後燥渴大減急重已除赤痢減少日夜達數十次食能下咽略能睡眠診脈左右弦數又用清熱解毒厚腸湯取生軍石膏山梔粉葛黃連銀花錦地羅白芍甘草木香地榆歸身生地去臟腑鬱熱涼血敗毒平肝潤燥理氣厚腸連五服後則燥渴更減赤痢已除惟瀉黃白膠漏日夜尚有十餘次食量略進診脈緩滑而弱又用參歸蓮子湯取其補氣生津活血潤燥運脾健胃厚腸去濕連數服後則燥渴已平而瀉痢更減惟腹尚有微痛診脈滑滯又用急止痛瀉丸取其運脾理氣平肝厚腸降逆去濕利水導滯處方大承氣湯加減方生大黃六錢川厚朴三錢元明粉四錢川枳實四錢生石膏八錢研細生葛根一錢滑石粉四錢包煎光桃仁三錢生白芍八錢川黃柏三錢金銀花三錢鮮生地一兩焦山梔三錢煎服後將各味加倍後再將各味加二倍次方清熱敗毒厚腸湯生大黃五錢生石膏八錢研細焦山梔四錢生葛根二錢川黃連三錢大歸身錢半生白芍八錢金銀花三錢錦地羅三錢廣木香一錢粉甘草一錢地榆炭錢半鮮生地八錢煎服三方參歸蓮子湯西洋參三錢當歸身二錢生白芍三錢開蓮子四錢淮山藥五錢雲茯苓四錢阿膠珠二錢炒薏仁六錢云楂肉三錢南芡實五錢閩澤瀉二錢粉甘草錢半煎服四方急止痛瀉丸川黃連五錢廣木香三錢延胡索三錢生白芍四錢茅蒼朮一錢雲茯苓六錢川鬱金三錢藿香梗二錢制香附二錢良薑片一錢川厚朴二錢粉甘草一錢罌粟殼四錢閩澤瀉四錢共為細末蜜丸每重一錢用好濃茶送服二丸效果十日燥平渴止痢減急重除食量略進二十日痢止食進元氣已復說明是年乙卯噤口痢疾死亡者不少所起症狀無異各人原因不同而症有差異施治不對症者而症變亂復雜多莫能救是役余所治者不下數百人療法亦不外如是隨症加減亦無不愈廉按此疫痢中之胃腸炎其症最急而重凡赤痢赤白痢五色痢等起病之初屬於實熱性質者則由病原菌所釀成之病毒充滿於腸內宜先之以通利劑掃蕩腹內之郁毒而後以調理劑作後療法乃為至當之順序若不先掃蕩病毒而惟下痢之是恐先防遏之則死於腹滿熱盛苦悶之下是即由逆治致逆證者也此時之逆證與實證相一致今觀此案可知其因證方藥之所以然矣急性疫痢案陳務齊住梧州四方井街病者陳偉明女士年十二歲廣西容縣住鄉學生體壯病名急性疫痢原因素因飲食不節膩滯太過消化不良蓄積腸胃誘因往探姻戚適痢疾流行微菌飛揚空氣不潔防衛不慎傳染而來證候驟然腹中絞痛大作大便屢次下痢前急後重日夜達百餘次排便之後生劇烈之疼痛肛門灼熱口渴連連飲水不能制止食物不能下咽排泄之便絶無糞色俱是赤多白少赤者稀量之血水白者乃脂肪膏油之類面色黑緊唇焦齒枯舌苔黃厚邊尖赤起刺晝夜不能安眠全體大熱不休瞬息不絶勢甚急逼危在旦夕診斷左右六脈浮弦數極一吸已動七星見真人脈法脈證合參傳染病中之赤痢證也查閲前醫之方多用耗散之藥耗其津劫其血損其氣則焦躁異常肺胃氣逆津液枯竭渴飲不止腸胃炎熱已極則噤口不能食至成危急不治之症余於此症略有經驗不得不力圖救濟療法速用大承氣湯加桃仁黃柏銀花粉葛石膏生地取推蕩大腸急下存津涼血敗毒平胃清熱連服三劑後急重已除赤痢略減燥渴略平食量略進診脈浮數退去轉為滑弱又用參歸蓮子湯取其補氣生津活血潤燥運脾健胃厚腸去濕連服五劑後食量更迸下痢更減精神略好元氣稍復診脈微滑又用急止痛瀉丸取其運脾理氣平肝厚腸降逆去濕利水導滯處方大承氣湯加減生大黃六錢川厚朴三錢金銀花三錢芒硝四錢粉葛四錢光杏仁三錢川枳實四錢鮮生地八錢生石膏八錢研細川黃柏三錢次方參歸蓮子湯高麗參錢半當歸身二錢生白芍三錢開蓮子四錢淮山藥五錢雲茯苓四錢阿膠珠二錢炒薏苡六錢云楂肉三錢南芡實五錢閩澤瀉二錢粉甘草一錢煎服三方急止痛瀉丸川黃連五錢廣木香三錢延胡索三錢生白芍四錢茅蒼朮四錢雲茯苓六錢川鬱金三錢藿香梗二錢制香附五錢良薑片二錢川厚朴三錢罌粟殼四錢閩澤瀉四錢粉甘草二錢十四味共為細末煉蜜為丸每重一錢辰砂為衣每服一丸至二丸用好濃熱茶送下效果五日痢減急重除米量略進十五日食量更進燥渴已除二十日痢止痛除食量大進元氣已復後其家人老少患此症者十之八九余俱用此方法十愈八九廉按疫痢內經謂之奇恆痢即德日醫所謂赤痢也為八大傳染病之一據西醫實地經驗研究所得謂其病毒非菌則蟲約有二種一為菌毒赤痢一為變蟲形赤痢大旨以清熱解毒防腐生肌等法為主治兼用血清注射及灌腸法以佐之此案遵內經通因通用之法即日本醫衍德醫之法謂赤痢初期腸中毒熱腫疼當務去腸內之刺激流通糞便以防病勢上進為治赤痢療法第一義故病有上進之象當相機而投以下劑但下劑易增進患者之衰弱不可不謹慎用之至滋腸及注腸不但足以疏通其積滯且有緩解裡急後重之效是以用之最宜與陳案療法大致相同然就余所經驗傳染性赤痢亦有不宜用硝黃蕩滌者只可清血解毒滑以去著如犀角地黃湯合五仁湯加醋炒芫花重用貫仲二兩地漿水煎藥亦多奏效醫不執藥隨宜而施神而明之存乎其人耳急性疫痢案王經邦住天台柵門樓病者車昌前年二十七歲業商住天台南鄉桃花莊病名急性疫痢原因暑穢水毒互結腸胃均從火化醞釀成疫證候下痢純紅腹痛裡急後重晝夜百餘次溺短赤澀診斷脈六部洪數搏指按之有神舌紅苔黃脈證合參此乃暑毒挾穢蘊蓄於內若不急治防驟有腐腸之變端也療法以貫仲銀花玉樞丹解毒痢為君芩連柏清熱為臣荷葉生芍消暑斂血為佐玉泉竹葉涼解大渴為使也處方青子芩三錢川黃連二錢生川柏錢半生白芍八錢淡竹葉三錢鮮荷葉一錢玉泉散二錢鮮荷葉包玉樞丹五粒研細藥湯調服先用生貫仲一兩濟銀花八錢煎湯代水效果一劑病減大半再劑大勢已平原方略減用量加鮮生地一兩鮮石斛五錢清養胃陰而痊廉按此時疫赤痢也俗稱爛腸瘟前喻西昌治此證重用生大黃四兩黃連甘草各二兩以猛藥直攻腸胃此案但以平劑清解疫毒方亦穩健著力切合病情貫仲玉摳丹尤為解毒闢穢之要藥急性疫痢案何拯華紹興同善局病者王傳榮年念八歲業農住紹興東關鎮病名急性疫痢原因仲秋久晴無雨天氣燥熱疫痢流行感染時氣而陡發證候身熱口渴臍腹大痛如刺如割裡急後重下痢頻並或腸垢帶血或純下鮮血日夜數十度或百餘次面赤唇紅吐酸嘔苦胸腹如焚按之灼手小溲赤澀點滴而痛診斷脈右洪數左弦徑舌紅刺如楊梅狀苔黃燥如刺此由血分熱毒與積滯相併內攻腸胃劫奪血液下趨即內經所謂腸僻下血身熱者死亦即吳又可所謂下痢膿血更加發熱而渴心腹痞滿嘔而不食此疫痢兼症最為危急是也療法若以痢勢太頻妄用提澀或但用涼斂必至腸胃腐爛而斃即以楂曲檳朴香連芩芍銀花炭等普通治痢之法以治此種毒痢亦必胃腸液涸而亡惟有仿吳氏急症急攻之法用檳芍順氣湯加減日夜連服二三劑純服頭煎以先下其疫毒處方花檳榔二錢赤白芍各五錢青子芩三錢小枳實二錢生甘草一錢元明粉三錢拌炒生錦紋六錢先用鮮貫仲一兩銀花五錢煎湯代水次診次日復診赤痢次數已減其半腹痛亦漸輕減嘔吐酸苦亦除惟身仍熱胸腹依然灼手黃苔雖退舌轉紫紅起刺捫之少津脈左弦徑已減轉為沉數此胃腸血液漸傷而疫毒尚未肅清也議以拔萃犀角地黃湯加玉樞丹涼血瀉火撲滅毒菌以救濟之次方犀角粉一錢鮮生地四兩搗汁沖青子芩二錢小川連一錢生錦紋三錢酒洗生西草一錢生白芍一兩玉樞丹五粒研細藥湯調下三診痢雖十減七八而腹中切痛常常後重所便之物多如爛炙且有腐敗之臭深恐腸中腐爛病勢尚在險途幸而脈勢稍柔舌紫漸轉紅活姑以解毒生化湯加鮮生地金汁化腐生肌滋陰消毒以救腸中之潰爛三方金銀花一兩生白芍八錢生甘草錢半參三七二錢鮮生地四兩搗汁沖陳金汁二兩沖鴉膽子四十九粒去皮揀成實者用龍眼肉一顆包七粒以七七之數為劑四診下痢次數僅五六次赤色己淡夾有膿毒黑垢切痛後重已除胃亦知飢思食惟舌色淡紅而干乃陰液大虧之候議以大劑增液救陰以其來勢暴烈一身津液隨之奔竭待下痢止然後生津養血則枯槁一時難回今脈勢既減則火邪俱退不治痢而痢自止豈可泥滯潤之藥而不急用乎用增液湯合參燕麥冬湯以善其後四方大生地六錢元參四錢提麥冬三錢西洋參錢半光暹燕一錢奎冰糖三錢效果連服四劑下痢盡止但遺些少白沫胃已能進稀粥後用四君子湯加麥冬石斛調理旬余方能消穀而痊廉按疫邢失下其禍已不可勝言若疫痢失下其禍更可知矣究其失下之由每有一等不明事理自命知醫之病家橫攔豎遮言火道寒恐大黃下斷中氣多方掣肘殊不知疫痢兼證下證已具越怕下者越得急下蓋邪熱多留一日有一日之禍早下一日有一日之福然下之之法亦有緩急輕重之殊非謂以承氣湯一概而論也愚每見赤痢之人其初起之日即見面赤拂鬱舌苔黃糙壯熱口渴脈息滑實而數下痢裡急沿門闔境率皆如此此即疫痢相兼之證愚每以喻氏倉廩湯吳氏檳芍順氣湯兩方加減罔不應手奏效設遇有應下失下日久痢不止外見煩熱口渴自汗舌苔滿布黃厚芒刺腹癰拒按胸滿嘔吐不食痢見敗色一日夜數十行後重裡急面垢神慘脈息或沉微欲無乍見乍隱或疾數鼓指或堅大若革按之反空此皆疫痢兼證應下失下之壞證也邪熱一毫米除元神將脫補之則邪毒愈甚攻之則幾微之氣不勝其攻攻不可補不可攻補不及兩無生理良可慨焉此案辨證處方悉從吳又可治疫痢正法所用之藥涼血攻毒滅菌制腐叉皆脫胎前哲成方而來非師心自用者可比且與赤痢菌痢疫之原因療法適相符合五色疫痢案何拯華紹興同善局病者徐德生之妻胡氏年三十五歲住紹城市門閣病名五色疫痢原因內因肝熱外因久晴亢旱秋令疫痢盛行傳染而發證候下痢五色青黃赤白黑雜下晝夜三四十次胸腹如灼其痛甚厲按其臍旁衝任脈動胯縫結核腫大肛門如火烙揚手擲足躁擾無奈不能起床但飲水而不進食診斷六脈弦徑緊急不為指撓舌色純紅苔焦黑脈證合參即張仲景所謂五液注下臍築痛命將難全之證也療法毒勢如焚救焚須在頃刻若延二三日外腸胃朽腐不及救矣急宜重用犀角五黃湯合金鈴子散苦甘化陰急下存津以保胃腸之腐爛晝夜連進三劑純服頭煎循環急灌或可挽回於萬一處方犀角粉一錢鮮地黃四兩搗汁沖青子芩三錢小川連錢半生錦紋四錢延胡索二錢蜜炙川楝子三錢醋炒生川柏錢半先用鮮茅根三兩去衣鮮貫仲一兩二味煎湯代水次診下痢次數已減其半青黑之色已除惟赤如爛血白如魚腦間下黃汁胸腹雖熱痛勢漸緩小溲赤澀舌仍鮮紅焦苔大退脈雖弦急徑勢大減病勢較前漸緩但用急法不用急藥三黃白頭翁湯加減次方青子芩二錢小川連一錢生川柏一錢白頭翁三錢犀角粉八分全當歸二錢干艾葉三分生甘草八錢左牡蠣四錢生打鮮石榴一錢三診前用三黃瀉火逐疫犀草涼血解毒白頭翁疏氣達郁歸艾和血止痛因其所下已多佐牡蠣固脫斂津鮮石榴酸甘收澀連進二劑幸而腹痛下痢大減衝任脈動已低胯縫結核收小脈轉弦軟舌紅漸淡捫之少津顯系毒火爍液下多亡陰法當甘苦鹹寒以滋液救焚養陰解毒犀角五汁飲合鴉膽子主之三方黑犀角五分磨沖鮮生地汁四瓢雅梨汁三瓢甘蔗汁兩瓢四汁用重湯燉溫臨服衝入陳金汁二兩另用豆腐皮泡軟包鴉膽子七粒吞服五汁飲送下以服至四十九粒為度四診連進二劑初下鮮紅血絲繼下紫黑瘀塊終下白黏膿毒約十餘次後下紅黃醬糞四五次腹痛已除衝任脈動亦止舌轉嫩紅而潤脈轉柔軟此邪少虛多之候用三參冬燕湯滋養氣液調理以善其後四方太子參一錢西洋參一錢北沙參四錢提麥冬二錢光暹燕八分青蔗漿一酒杯建蘭葉三片效果連服四劑下痢盡止胃動思食能進稀粥每日大便嫩黃後用一味霍石斛湯調養旬余而痊廉按熊聖臣謂白色其來淺浮近之脂膏也赤者其來深由脂膏而切膚絡也純血者陰絡受傷多由熱毒以迫之故隨溢隨下此最深者也紅白相兼者是則深淺皆及也大都諸血鮮紅者多熱證蓋火性最急迫速而下也紫紅紫白色黯不鮮明者少熱證以陰凝血敗漸損而致然也純白清淡或如膠腖鼻涕者無熱症以臟寒氣薄滑而致然也余謂凡人患痢疾時其腸中之黏膜必有紅腫之處其處生出之膿液即白痢也若血管爛破有血液流出即赤痢也膿血兼下即赤白痢也若青黃赤白黑雜下即五色痢也其青者膽汁黃者糞赤者血白者膿黑者宿垢最重難治此案系五色疫痢之實證屬毒火蘊伏胃腸所致初方以涼血解毒急攻逐疫為主仿喻氏疫在下焦者決而逐之之法次方千金三黃白頭翁湯加減於瀉火逐疫之中參以固脫斂津三方犀角五汁飲於滋液救焚之中妙在佐鴉膽子一味善治熱性赤痢最能清血分之熱及腸中之熱為防腐生肌涼血解毒之要藥四方用三參冬燕湯清滋氣液為善後必不可少之方法然就余所經驗除疫痢外多屬陰虛證張石頑所謂痢下五色膿血稠黏滑泄無度多屬陰虛是也不拘次數多寡便見腰膝痠軟耳鳴心悸咽乾目眩不寐多煩或次數雖多而胸腹不甚痛或每痢後而煩困更增掣痛反甚飲食不思速用豬膚湯合黃連阿膠湯加茄楠香汁小川連陳阿膠青子芩生白芍雞子黃先用豬膚淨白蜜各一兩煎湯代水甘鹹救陰苦味堅腸若虛坐努責按腹不癰一日數十度小腹腰膂抽掣痠軟不耐坐立寢食俱廢者陰虛欲垂脫之候也急宜增損復脈湯高麗參提麥冬大生地炙甘草生白芍真阿膠山萸肉北五味烏賤骨淨白蠟提補酸澀以止之遲則無濟幸而挽救得轉可用參燕麥冬湯米炒西洋參光燕條提麥冬奎冰糖滋養氣液以善其後若痢止後猶有積滯來淨郁在下焦小腹結痛心煩口燥夜甚不寐宜用加味雪羹煎淡海蜇大荸薺真阿膠另燉煬沖山楂炭陳細芽茶標本兼顧肅清余積其間亦有用白頭翁加阿膠甘草湯收功者惟西醫實驗療法謂疫痢非蟲即菌一為赤痢菌赤痢一為扁蟲形赤痢皆各用血清注射以收成績若陰虛五色痢終歸無效故舉歷驗咸法附志於此熱毒赤痢案張錫純住天津病者懷姓年三十餘官署中車伕住奉天白塔寺旁病名熱毒赤痢原因因吸鴉片消去差事歸家懊憹異常又患痢疾證候初次所下之痢赤白參半繼則純下赤痢繼則變為腥臭血水夾雜脂膜或如爛炙時時腹中切疼心中煩躁不能飲食診斷其脈弦而微數一呼吸約五至重按有力知其因懊憹而生內熱其熱下移腸中釀為痢疾調治失宜痢久不愈腸中脂膜為痢所侵變為潰瘍性而下注再久之則腸爛而穿藥無所施矣今幸未至其候猶可挽回療法當用治瘡治痢之藥合併治之以清熱解毒化瘀生肌自然就愈處方金銀花一兩生白芍六錢粉甘草三錢旱三七三錢細末鴉膽子六十粒去皮揀成實者共藥五味先將三七鴉膽子用白糖水各送服一半即將餘三味煎湯服當日煎渣再服亦先服所餘三七及鴉膽子此方載衷中參西録名解毒生化丹效果如法服藥一劑腹疼即止脈亦和緩所便已見糞色次數亦減繼投以通變白頭翁湯見前痢疾案中服兩劑痊愈康按此由瘀熱生毒腸中最易潰爛如所下多似爛炙色臭皆腐時時切癰後重即其明證治必化腐生肌以救腸中之腐爛此方妙在鴉膽子野三七兩味張君試驗說明曰東西醫治痢之藥其解毒清血之力遠不如鴨蛋子即鴉膽子其防腐生肌之力遠不如野三七且於挾虛之痢而不知輔以山藥人參於挾熱之痢而不知重用石膏宜其視赤痢為至險之證而治之恆多不收全功也熱毒赤痢案莊虞卿住麗水第十一中學病者盧從之年逾四稔體弱住泗洲樓病名熱毒赤痢原因平時陰虛目疾時作夏受暑而不覺至秋後乃發赤痢證候手足麻木腹中絞痛下痢純赤小便澀少診斷脈左關弦長右手虛緩脈證合參此暑邪與積熱下陷足厥陰肝肝主筋所以手足筋麻肝主痛所以腹痛肝藏血肝病而失其藏血之司所以血痢時下種種現象莫非肝病療法治宜滋養肝血清解伏熱用阿膠歸芍以養其肝血白頭翁川連黃柏黃芩秦皮丹皮以清肝經之濕熱再加金銀花生甘草滑石以解暑而清熱毒處方陳阿膠錢半煬沖油當歸錢半生白芍三錢青子芩一錢小川連一錢川黃柏一錢北秦皮一錢粉丹皮錢半雙寶花三錢白頭翁錢半生甘草八分飛滑石三錢包煎每日服二劑效果三日痢減七日諸恙悉退十日其病霍然矣廉按此治厥陰熱痢之正法方用金匱白頭翁加阿膠甘草湯為主因其平日陰虛再加歸芍養血和肝芩丹滑銀肅清伏熱療法固恰當周到斷語亦深切病機伏熱赤痢案周小農住無錫病者嚴君年五十九歲住本鎮病名伏熱赤痢原因素因體實肝熱十月望略受感冒觸動伏熱陡發血痢證候背寒腹熱便痢後重腹中㽲痛初下殷紅挾積翌日少腹痛覺轟熱純系鮮血口渴少寐少溲赤痛診斷脈左弦右大無倫舌紅兼紫此心營素虧伏熱內襲之血痢重證也療法涼血堅腸清透伏熱為君佐以導滯處方銀花炭三錢白頭翁三錢黃柏炭八分生白芍三錢益元散三錢包煎焦秫米三錢荷葉包山楂炭三錢側柏炭三錢扁豆花甘朵茉莉花十四朵沖槐花八分香連丸一錢蘿蔔汁一酒鍾送下次診十八日猶有轟熱迫注小溲色紅血痢日夜百餘次連宵失眠脈弦右大又疏涼血清伏熱次方鮮生地六錢白頭翁三錢槐花八分金銀花三錢北秦皮一錢粉丹皮錢半赤白芍各三錢金鈴子錢半黑山梔三錢側柏葉三錢扁豆花草朵百草霜錢半阿膠梅連丸二錢包煎三診十九日服後痢之紅色較淡肛口之熱較輕然痢下如漏肛脫不收陽不藏而欲升指振自汗溲赤少寐乃伏熱未清陰虛陽升氣不收斂也治以滋陰斂腸泄熱清氣三方西洋參錢半辰茯神四錢白頭翁三錢北秦皮一錢金鈴子錢半赤白芍各三錢扁豆花草朵槐花六分金銀花三錢真石蓮三錢杵鮮荷蒂三個阿膠梅連丸二錢包煎四診二十日服後血痢雖減而血少風翔腹中有聲顴紅火升沉迷不欲言姑守原方以消息之五診草一日指搐神煩已定足亦溫寐少安尻痠氣滯口氣尚穢與周仲萼商進養胃陰清伏熱五方西洋參錢半東白芍三錢油當歸二錢川石斛三錢萊蔔子三錢花檳榔二錢金銀花三錢扁豆花草朵地榆炭三錢槐花二分六診草二日原方加茯神棗仁至草四日上午氣升顴紅面赤又作肛熱作痛按腹灼熱仍用十九日方意七診草八日一夜十餘次紅少糞多虛坐努責肛脫寐遺進攝脾固腎法七方生白芍三錢白歸身二錢煅炭菟絲餅川斷各二錢真石蓮三錢炒鬆提麥冬二錢山萸肉三錢甘杞子三錢扁豆花草朵煨木香八分鮮荷蒂三個並食豬肚湯薺菜八診草九日下午痢止轉瀉黃沫未化菜食似為中寒食不消之象是前養血扶正虛陽漸斂脈轉沉細氣虛見徵轉與薛君文元酌用扶中益氣柔肝斂腸八方西潞黨三錢生於術二錢益智仁三錢炒扁豆三錢煨木香八分炙甘草五分新會皮一錢玫瑰花兩朵沖生葛根一錢甘杞子三錢生白芍三錢赤石脂三錢效果脈漸振便溏僅兩次最後潘君德孚擬運脾和肝小劑如白芍香椽皮茯苓大腹皮焦穀芽佛手花之類胃旺便堅日就康復而痊廉按赤痢或稱血痢初起多屬實熱瘀血積滯者以桃仁承氣湯去桂加酒炒芩連金鈴子散之類虛熱無滯者宜白頭翁湯合四物湯若脾濕痢疾下血宜蒼朮地榆湯惟赤痢日久肝傷不能藏血血色鮮紫成塊者肝絡傷則血下行以逍遙散去朮加烏梅炭白殭蠶玫瑰瓣之類若脾虛不能攝血血色淺淡而黃者此脾胃虛弱中氣下陷也宜補中益氣湯加烏梅炭春砂仁之類至於時疫赤痢亦有水毒鬱於腸中積化為燒乘人胃弱腸虛或大孔癢或從穀道溢出痢出之蟲形細如線此巢氏病源所謂燒蟲痢也雖非扁蟲形之赤痢然亦赤痢屬蟲之一種以黃連犀角散加貫仲陳石榴皮海南子之類此案以望六高年血痢百餘次證已虛陽上升肢振神糊險象疊生幸而多方救濟確中病機由痢轉瀉而痊可謂僥幸之至矣暑毒赤痢案錢蘇齊住蘇州謝衙前病者汪栽之年四十徽州人寓蘇城病名暑毒赤痢原因夏秋暑熱留於腸胃得油膩積滯或瓜果生冷醞釀遏抑而成病未發而不自覺也證候發熱一二日口渴腹痛由瀉轉痢裡急後重澼澼不爽滯下赤多白少膿血相雜診斷初病發熱脈弦苔黃必有暑熱下痢赤白膿血腸中必有潰瘍赤白多而糞少腹痛者腸中瘡潰膿血由漸而下故必裡急後重極力努掙其滯方下少許也其病類多發於夏秋乃大小腸內皮瘡潰證也療法須與排膿逐瘀之劑非徒關乎食積也豫觀仲景金匱治腸癰用大黃牡丹湯因得治痢之法以凡屬赤自下痢皆系大小腸內皮生瘡已潰之症蓋白而膩者為膿赤而膩者為血膿血齊下其瘡已潰可知非排膿逐瘀不足以去腸間之蘊毒凡人皮膚生瘡以夏秋為多痢亦猶是故豫治赤白痢以大黃丹皮赤芍楂炭排膿逐瘀為主以黃連木香檳榔枳實疏利泄降為佐表熱者加蘇梗藿香之類濕重者加川朴蒼朮之類挾食者加萊蔔神麯之類痛甚者加烏藥乳香之類隨宜酌用其效頗速豫觀昔人治痢驗方有用當歸枳殼二味者治痢用血藥即此意也處方秋水丸三錢絹包山楂炭四錢川連七分小枳實錢半佩蘭葉三錢丹皮炭三錢牛膝炭三錢煨木香錢半大腹絨錢半焦六曲三錢赤芍炭三錢蘇梗錢半檳榔錢半赤茯苓三錢方中秋水丸或改用製大黃及大黃炭均可俟膿血積滯暢下後腹痛止赤白淨然後改用實脾利水生肌等藥收功次方真於朮三錢製半夏三錢浙茯苓三錢懷山藥三錢穭豆衣三錢廣陳皮一錢粉澤瀉三錢生甘草五分扁豆衣三錢炒苡仁三錢紅棗肉一枚效果前方一二劑得暢下腹痛止赤白淨續進後方二三劑而愈治夏秋赤白痢用此法其效頗速並無久延不愈或成休息痢者康按學說參諸西醫處方仍選中藥從金匱大黃牡丹湯治腸癰借證腸闢之便膿血靈機妙悟獨得新詮為中醫學別開生面真仲景之功臣也暑毒赤痢案丁佑之住南通東門病者張惟慎年二十五歲住南通病名暑毒赤痢原因內有宿食兼夾暑熱證候裡急後重初起紅白相兼繼則純赤滯下腹疼苔黃溺赤嘔逆不食診斷脈象滑數滑有宿食數即熱徵滑而兼數暑熱食積互蘊腸胃閉塞不通致成噤口赤痢療法此時祛暑不及消食不遑惟有釜底抽薪一法以冀穢毒下行或可挽回處方生大黃三錢川黃連一錢枳實二錢厚朴錢半金銀花三錢鮮生地五錢原麥冬三錢元參三錢連翹三錢元明粉三錢沖效果一劑平二劑微效三劑大效後調理半月而安廉按暑毒赤痢夏秋最多釜底抽薪卻是去痢之捷法方用大承氣湯加銀翹川連已足攻其病毒其中增液法似嫌用得太早伏暑赤痢案何拯華紹興同善局病者徐國梁年三十三歲業商住州山項里病名伏暑赤痢原因夏傷於暑為食所遏伏於小腸膜之間醞釀成積至秋後而發病證候發熱自汗面垢嘔惡渴欲引飲腹中攻痛痢下純紅稠黏氣穢裡急後重溺短赤澀診斷脈弦數左甚於右舌紅苔黃此王氏準繩所謂暑氣成痢痢血頻迸者是也療法以芩芍益元涼血導赤為君青蒿銀花清透伏暑為臣然既有積而成滯下故又以淨楂肉蘿蔔纓消滯蕩積為佐而使以鮮茅根西瓜翠衣者助青蒿等以涼透伏熱也處方青子芩錢半益元散三錢包煎炒銀花一錢蘿蔔纓三錢生白芍一兩青蒿腦二錢淨楂肉三錢先用鮮茅根二兩去衣西瓜翠衣二兩二味煎湯代水次診身熱已減惟下痢仍紅右腰肋連腸中切痛痛而後行裡急後重便艱不爽行後稍止氣機終覺不利與白痢之痛緩酸墜而不裡急艱澀大便溏而多者有別脈雖如前舌則紫紅起刺此朱丹溪所謂赤屬小腸而內關肝藏也治以清肝導滯為君消暑佐之次方當歸二錢生白芍八錢蜜炙延胡錢半川楝子二錢薺菜乾三錢黃芩二錢香連丸一錢拌益元散三錢包煎淨楂肉三錢玫瑰瓣三朵沖三診痛緩痢減便中夾有活蛔二條此肝熱下逼於腸而蛔因熱灼而出幸而脈轉弦軟舌紫轉為紅活前方已中病機姑於原方去益元散加烏梅肉三分棗兒檳榔肉二錢以安蛔加左牡蠣春砂仁川黃草以調氣和胃效果兩劑後赤痢已除便轉紅黃腹痛亦止後用四物湯加經霜甘蔗調養四劑而痊廉按伏暑赤痢傷及肝絡者丹溪翁謂之肝痢每用當歸黃岑湯合金鈴子散香連丸等或加香附砂仁舒肝或加松柏子仁潤肝終以調肝法得愈此案仿其成法竟奏全功是得力于丹溪學派者赤痢轉虛案吳宗熙住汕頭永平馬路病者鄭之光年四十餘歲住汕頭病名赤痢轉虛原因素有煙癖質本中寒夏間偶食瓜果冷氣傷胃忽患痢疾紅白雜下久之純下清血證候大便純下清血少雜稀粕日六七行病延月餘面目萎黃兩足浮腫無力唇赤如朱診斷六脈俱沉細數兩尺尤弱舌無苔紅絳多津此久痢氣血兩虛之證也內經通評虛實論云腸澼便血身熱則死寒則生腸澼下白沫脈沉則生脈浮則死蓋久病而身熱脈浮因正虛邪盛故必死也身寒脈沉正衰邪亦衰故可治也據西醫論痢疾一證謂由大腸發炎生瘍久則其糞中必雜有肝肺此解與中醫書由腑傳臟之說同其理也今此證已由大腸受傷延及肝脾腎三經均受其病是以清血下陷虛陽上升上而寒極似火唇舌絳紅外而虛極似實面足浮腫危象種種將兆戴陽彼醫者徒知見積治積見血治血殊不知積雖去而正虛血下多而氣陷夫氣即腎中真陽之所生也真陽既衰臟腑益寒肝有血而不能藏脾有血而不能攝而血安得不頻下哉今所幸者胃氣尚存脈象沉緩正邪俱虛溫補無礙生機即在是耳療法下焦滑脫故君石脂禹糧以澀之脾虛不攝故臣白朮炙草以補之然氣既下陷非參附無以振其式微之陽血既受傷非歸膠無以生其已虧之血故用之為佐但血去則陰火動虛陽升故用白芍以清其虛熱為使此方仿金匱黃土湯之法而加減其藥味也處方赤石脂四錢研細禹餘糧四錢研細白朮三錢炙甘草二錢白芍二錢五分東洋參錢半製附子一錢當歸二錢半陳阿膠二錢半煬沖上藥煎湯日服一劑效果五日而血止原方去石脂禹糧加炙耆三錢再服十餘日精神漸健浮腫漸消一月而復原矣廉按古之腸澼下血即今之所謂赤痢也其證有實熱有虛熱有寒此案系赤痢久病從原因勘出虛寒斷語徵引頗詳中西並參方從金匱黃土湯加減合赤石脂禹餘糧湯足為久患赤痢體氣虛寒者樹一標準疫痢末期案劉萬年住太谷東關運興店病者姚其鋭年三十六歲家小康住山西太谷縣城病名疫痢末期原因素有煙癮案牘煩勞退後精神不支當夏令痢疾盛行忽染此病證候下痢膿血參半小腹疼痛裡急後重經醫七八位時見小效總不能痊愈至冬月肚腹不痛痢亦微少按之小腹有塊如李如杏狀痢能便出燥糞不下延至正月初形容羸瘦飲食俱廢病者恐慌更醫數手或下奪或潤腸或滋補全然無效後用西醫灌腸器導之亦依然如故始延愚診視診斷脈左右皆大而緩西人謂痢為腸中生炎此乃陽盛陰虛伏火上炎肺氣失降大便燥結所致頭不痛口知味者無外感之徵也口不乾渴者火在血分也肺與大腸相表裡主制節周身之氣素靈蘭祕典論曰肺者相傅之官治節出焉大腸者傳導之官變化出焉肺氣不降大腸無由傳導以致凝結而成燥糞素問陰陽應象大論曰燥勝則乾由瀉久亡陰內水虧竭譬如行舟無水任憑推送其何以行療法仿吳氏增液潤腸法以玄地二冬阿膠歸芍為君大生津液作增水行船之策用錢氏瀉白散加桑杏為臣使肺氣肅降推蕩燥糞佐以西參以助瀉白散降肺氣之力使以桔梗開肺氣以寬大腸若用硝黃峻下以治陰虛燥痢深恐大便水瀉而中氣亦隨脫矣處方大元參五錢大生地四錢原麥冬四錢蜜炙桑皮三錢地骨皮三錢生甘草一錢桔梗一錢青子芩一錢西洋參五錢另燉真阿膠五錢化沖酒杭芍二錢白歸身二錢淡天冬二錢炒杏仁錢半水煎熱服阿膠另溶化分沖效果服藥一劑覺腹中似有行動之機次日照原方加蜜炙枳殼錢半生枇杷葉五錢去毛服後約六點鐘忽然肛門矢氣喧響如擂鼓狀燥糞隨下如石如栗子大用斧搗之分毫不動第三日服原方一劑腹中燥糞始盡至四日去黃芩加鮮石斛又服一劑飲食能進身體如常後服葉氏益胃養陰法平調而愈廉按此疫痢將愈未愈下多亡陰液枯腸燥之治法若用於初起大非所宜故臨證之時查明症候之初中末亦診斷者所必要也
