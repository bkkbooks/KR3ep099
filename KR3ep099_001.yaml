body:
  text: 第一卷風淫病案冒風夾驚案兒科周小農住無錫病者厚昆子年四歲忘其住址病名冒風夾驚原因素有暮汗庚申二月十三日寐醒即起出外冒風陡聞爆竹而驚證候一起即身熱咳嗽時發驚竄咳痰不爽狀似欲痙而不痙診斷指紋紫脈搏數此伏氣在於肝膽猝因風邪而起療法以荷蒡蟬豉前桔象貝等疏風開痰為君桑丹藤竹梔銀等清泄肝膽以佐之處方蘇薄荷五分炒牛蒡六分淨蟬衣四分淡香豉八分前胡八分苦桔梗四分象貝五分焦山梔八分冬桑葉一錢粉丹皮八分雙鉤藤一錢銀花八分鮮淡竹葉十片復診一劑即汗身熱雖減痰嗽如前急進三汁飲順氣降痰次方生萊菔汁生雅梨汁各兩大瓢鮮薄荷汁四滴重湯燉十餘沸溫服三診溏便五次咳大減轉氣逆微呻多眠喉有痰聲口渴喜飲此熱壅肺也仍進清肺降痰三方甜葶藶五分川象貝各五分馬兜鈴八分銀花八分淨蟬衣四分冬瓜子一錢鮮茅根二錢鮮蘆根三錢鮮竹葉十片另用西月石三釐制雄精一釐川貝母四釐生白礬二釐研勻藥湯調下四診服後吐痰三口上午熱減下午熱起氣逆殊甚口渴汗黏指紋紫青防有肺脹之險急進加減葦莖湯消息之四方活水蘆根一兩冬瓜子一兩鮮枇杷葉一兩去毛筋淨五診上午喘減咳加多汗頭額之熱已輕姑進辛涼宣達降胃清熱法五方銀花八分連翹一錢蟬衣五分前胡八分焦山梔一錢枳實八分竹茹一錢竺黃八分知母一錢馬兜鈴七分淨楂肉一錢先用鮮枇杷葉五錢鮮茅蘆根各五錢鮮竹葉三十片煎湯代水六診昨日下午熱勢未作小溲清者漸紅眠少氣逆大平夜間口渴不作清晨熱勢更衰惟咳仍多六方前方去蟬衣焦桅知母加光杏仁一錢川貝錢半七診熱又較盛咳氣微促顴赤唇乾小溲紅仍仿前法加減七方銀花一錢連翹一錢蟬衣五分前胡八分栝蔞皮一錢枳實八分淡竹茹一錢知母一錢馬兜鈴一錢焦山梔一錢枯芩八分冬瓜子錢半象貝八分先用鮮茅蘆根各五錢煎湯代水效果二十日服後大便一次乃七日前積矢也再服二煎廿一晨吐痰甚多其熱全清而愈康按此即俗稱急驚風之候綜觀是證明是蘊熱挾痰凌肺作脹早用二方清潤反致邢不外達疊次以清宣降胃滌痰而應可見小兒痰證之不易肅清也惟其不易肅清所以先後之間不容欲速欲速則不達有如是者可為病家欲求速效者炯鑑冒風夾食案內科嚴紹岐住紹興昌安門外官塘橋病者沈小江年十九歲住昌安門外恂興病名冒風夾食原因感冒外風恣食油膩轉重證候初起微覺頭痛鼻塞噴嚏略有咳嗽不忌油膩遂致咳痰不爽胸悶氣急診斷兩寸滑搏舌苔邊白中黃後根厚膩脈證合參此食積阻滯於胃風痰壅閉於肺也療法當用荷蒡前桔為君疏其風以宣肺杏仁橘紅為臣豁其痰以降氣佐萊菔子以消食使春砂仁以和氣也處方蘇薄荷錢半炒牛蒡錢半前胡二錢桔梗一錢光杏仁三錢廣皮紅一錢萊菔子三錢拌炒春砂仁六分效果連服兩劑諸症輕減惟咳嗽痰多黃白相兼而且稠黏原方去薄荷牛蒡加栝蔞仁四錢馬兜鈴錢半片黃芩一錢連進三劑病人小心忌口遂得痊瘥廉按冒風即鼻傷風也病人每視為微疾多不服藥不避風寒不慎飲食必至咳逆痰多胸悶胃飩或身發熱始就醫而進藥我見以數千計此案方藥看似尋常然服者多效再囑其避風寒戒酸冷病可全廖否則每成肺病慎旃慎旃傷風案內科何拯華住紹興同善局病者張悅來年甘四歲業商住張家韝病名傷風原因脫衣易服驟感冷風證候頭痛發熱汗出惡風兩手微冷鼻鳴乾嘔診斷脈浮緩而弱舌白滑浮屬陽故陽浮者熱自發弱屬陰故陰弱者汗自出其鼻鳴乾嘔者衛氣不和肺氣因之不宣也療法先發其汗病自愈初用桂枝湯護營泄衛加杏仁者取其降氣止嘔也繼用肘後蔥豉湯加蔻仁通鼻竅以止其鳴宣肺氣以平其嘔處方川桂枝八分光杏仁三錢清炙甘草五分鮮生薑一錢生白芍七分大紅棗二枚服後呷熱稀粥一杯接方鮮蔥白二枚淡香豉二錢鮮生薑五分白蔻末四分沖效果進第一方後周身漐漐微汗諸證悉除惟鼻鳴乾嘔如前接服第二方鼻氣通而不鳴乾嘔亦止囑其不必再服他藥但忌腥髮油膩等食物自愈廉按同一傷風有風傷衛者有風傷肺者傷衛較傷肺為輕故但用調和營衛之桂枝湯專驅衛分之冷風以疏解之然惟風寒傷衛脈浮緩舌白滑者始為愜合若誤用於風溫襲衛輕則鼻衄重則咳血失音好用漢方者注意之傷風兼惡阻案婦科陳艮山江西全省醫學會病者吳堯耕之女年十九歲住省城病名傷風兼惡阻原因體弱多痰臘月行經後感冒風寒咳嗽發熱因食貝母蒸梨以致寒痰凝結胸中延醫調治投以滋陰降痰之品復患嘔吐飲食下咽頃刻傾出更換多方暫止復吐病者輾轉床褥已越三月骨瘦皮黃奄奄一息友人蕭孟伯力薦余治吳君乃延余往證候嘔吐不止飲食罕進咳痰稀白大便乾燥診斷細按脈象滑數有力兩尺不斷此孕脈也何以有此久病蓋因受孕不知旋因傷風咳嗽以為貝母蒸梨可以治咳不知適以凝痰而醫者不察脈情泛用治痰通用之輕劑以治之痰不下而氣反上逆遂成嘔吐所幸腹中有孕雖嘔吐數月尚無大礙否則殆矣療法用大半夏湯先治其標以止嘔蓋非半夏不能降胃氣之逆非人參不能補中氣之虛非白蜜不能潤大腸之燥開方後吳曰孕有徵乎余曰安得無徵徵之於脈脈象顯然徵之於病若非有孕君見有嘔吐數月少納飲食而不斃者乎吳固知醫見余執方不疑欣然曰君可謂得此中三昧余亦愛岐黃略識一二曩亦曾擬用半夏湯群醫非之而止乃急以藥進至夜嘔止酣睡次早吳見余曰非君獨見吾女幾殆乃立保胎和氣之方以善其後處方仙半夏三兩白蜜三兩人參兩半河水揚二百四十遍煎服又方安胎淨歸身三錢撫川芎八分高麗參三錢漂於朮二錢酒條芩錢半真阿膠三錢大熟地二錢法半夏錢半蜜甘草錢半墨魚一兩熬水去魚為引水煎服效果初方服一劑嘔吐即止便亦略潤並無痰嗽乃服次方四劑而胎安囑用飲食調養而體健生子廉按風寒咳嗽必先辛散輕開宣肺豁痰使病從表入者仍從表出則肺氣自復清肅之常而咳嗽自痊乃病家誤服貝母蒸梨醫又不究病源誤用滋陰清補釀成實證似虛幸而病人中氣尚實故大便乾燥陰精來損故受孕惡阻猶可用大半夏湯救誤一擊而中應手奏功惟用量究嫌太重尚可酌減安胎一方系遵丹溪方加減引用墨魚頗覺新奇中風案內科張錫純住鹽山西門內時寓天津病者謝君年六十四歲建築工頭住滄州病名中風原因包修房屋失利心中懊憹非常旬日前即覺頭疼不以為意一日晨起之工所忽僕於地狀若昏厥移時復甦其左手足遂不能動且覺頭疼甚劇醫者投以清火通絡之劑兼法王勳臣補陽還五湯之意加生黃耆數錢服後更甚證候腦中疼如刀刺須臾難忍心中甚熱診斷脈左部弦長右洪長皆重按有力詢其家人謂其素性嗜酒近因心中懊憹益以酒澆愁飢時恆以燒酒當飯愚曰此證乃腦充血之劇者其左脈之弦長懊憹所生之熱也右脈之洪長積酒所生之熱也二熱相併挾臟腑氣血上衝腦部腦中之血管若因其沖激過甚而破裂其人即昏厥不復甦醒今幸昏厥片時而甦醒其血管當不至破裂或其管中之血隔血管滲出或其血管少有罅隙出血少許而復自止其所出之血著於司知覺神經則神昏著於司運動神經則痿廢此症左身偏枯當系腦中血管所出之血傷其司左邊運動之神經也醫者不知致病之由競投以治氣虛偏枯之藥而此證此脈豈能受黃耆之升補乎所以服藥後而頭疼加劇也療法降血平腦以牛膝善引上部之血下行為治腦充血證無上之妙品屢經實驗故以為君佐以龍牡二石楝芍玄參膽草炙甘鐵鏽水等潛鎮清熄處方懷牛膝一兩生龍骨六錢打生牡蠣六錢打川楝子四錢生杭芍六錢生石膏一兩研細代赭石六錢生打烏玄參四錢龍膽草三錢生甘草二錢效果服兩劑頭疼痊愈脈亦和平左手足已能自動遂改用全當歸生杭芍玄參天冬各五錢生黃耆乳香沒藥各三錢紅花一錢連服數劑即扶杖能行走矣方中用紅花者欲以化腦中之瘀血也為此時脈已平和頭已不疼可受黃耆之溫補故方中少用三錢以補助其正氣即藉以助歸芍乳沒以流通血脈更可調玄參天冬之寒涼也廉按吾國所謂中風者即西醫所謂腦猝中也中風之為病古醫向分中經中絡中腑中臟四端西醫謂此由血沖腦經之病分腦充血腦積血腦出血腦筋麻痹亦有四端據其剖驗所見凡以是病死者其腦中必有死血及積水是血衝入腦信而有徵顧血行於脈絡之中何故而上衝傷腦競致血管破裂西醫亦未明言其原理近世魯人張伯龍氏據素問調經論血之與氣並走於上則為大厥厥則暴死氣復反則生不反則死一節參用血沖腦經之說謂腦有神經分布全體以主宰一身之知覺運動凡猝倒昏瞀痰氣上壅之中風皆由肝火上亢化風煽動激其氣血並走於上直衝犯腦震擾神經而為昏不識人喎斜傾跌肢體不遂言語不清諸症皆腦神經失其功用之病苟能於乍病之時急用潛陽鎮逆之劑抑降其氣火之上浮使氣血不並走於上則腦不受其激動而神經之功用可復其言如此則既申明素問氣血並走於上之真義復能闡發血沖腦經之原因則新發明之學理仍與吾邦舊說隱隱合符此即是案揮發中風即腦充血之原理也所用方法亦屬潛鎮泄降與張伯龍潛陽鎮逆大致相同惟重用牛膝至一兩之多則為實驗之獨見耳中風閉證案內科陳作仁住南昌中大街四川會館病者廖大新年五十二歲九江人居鄉病名中風閉證原因其人火體身壯春感外風引動內風風火相煽而發病證候初起頭痛身熱自汗惡風繼即猝然昏倒口眼喎斜痰湧氣粗人事不知診斷左關脈浮弦數右沉弦數重按來去有力顯系風火相煽挾痰涎上壅清竅陡變昏厥閉證此即內經所謂血之與氣井走於上則為大厥也其氣復返則生不返則內閉而外脫矣療法先以熄風開痰通其竅閉為首要急用羚角鉤藤以熄風至寶丹合厥證返魂丹以通竅竹瀝薑汁以開痰俟神蘇後仿繆仲淳法再進桑葉菊花蒺藜花粉清熱定風為君石決明蛤殼栝蔞川貝降氣豁痰為臣佐竹瀝以通絡除痰鮮石菖蒲汁以通氣清竅必須風靜痰除仿許學士珍珠母丸法以珠母龍齒潛陽鎮肝為君棗柏茯神清養攝納為臣佐以西參地芍為滋養陰虛者設法使以石斛雞金為增液健胃以善後處方羚角片錢半先煎雙鉤藤六錢淡竹瀝兩大瓢生薑汁四小匙和勻同沖至寶丹一顆厥證返魂丹二顆研細藥湯調下次方冬桑葉二錢滁菊花二錢白蒺藜錢半天花粉三錢石決明一兩海蛤殼四錢同打栝蔞仁四錢杵川貝母三錢去心淡竹瀝兩大瓢鮮石菖蒲汁一小匙和勻同沖三方珍珠母一兩青龍齒三錢同打炒棗仁錢半柏子仁三錢辰茯神三錢西洋參錢半細生地三錢生白芍三錢鮮石斛三錢生雞金二錢打效果初方連進三劑頭煎大吐痰涎神識清醒續進次方三劑已無痰熱上湧口眼喎斜亦除連進三方四劑胃動納食人能行動而痊矣廉按中風之為病有觸外風引動內風者亦有不挾外風而內風自動者此案雖由邪風外襲而實則陰虛火亢內風易動故一觸即發亦當從內風主治急熄風宣竅順氣開痰為第一要法所列三方虛實兼到層次井然凌躐急功者可取法焉中風閉證案內科高糺云住贛州生佛壇前病者潘世傑年四十九歲商界山東人病名中風閉證原因元氣素弱久患痰火鬱積適中外風引動內風而猝發證候猝然昏倒舌強不言喉中痰塞噫噫有聲四肢微瘛不省人事診斷脈浮滑數右寸尤甚舌苔黃滑此內經所謂風癔也由內風挾痰閉塞清竅故猝倒足太陽脈貫舌本散舌下足少陰脈循喉嚨挾舌本風邪猝中而其脈不至舌本故舌強不言幸身軟不直尚可救療療法先用周少川牛黃清心九以二參竹瀝湯送下使清竅開而神氣自爽客邪去而脈自至舌本口自能言繼用外臺竹瀝飲搜剔絡痰以清熄內鳳處方蘇扎參二錢西洋參錢半生薑汁四滴清童便一杯淡竹瀝一兩和勻同沖調下牛黃清心丸兩顆接方淡竹瀝兩大瓢甜水梨汁兩大瓢生葛汁一瓢生薑汁四滴和勻重湯燉溫服效果一劑神識醒去牛黃丸再服二劑各症減三劑語言清亮終用竹瀝飲善其後而愈廉按此治虛火沖逆熱痰壅塞猝致昏僕之方法故同一昏聵顛仆而病因不同則用藥當然各異也資生經云凡中風由心腹中多大熱而作所謂猝中外風者特其激動內風之引線耳前哲繆仲淳顧松園葉香岩王孟英輩多用熄風清熱順風開痰而效者良有以焉中風閉證案內科高糺云住贛州生佛壇前病者嚴文元年五十歲商界住南京病名中風閉證原因素因氣虛多痰適感冷風而猝發證候卒然痰涎壅塞牙關緊閉兩手握固屈而不伸四肢厥冷診斷六脈沉弦而緊舌苔滑白淡黑脈證合參確為中風挾寒寒痰壅塞氣機之閉症療法先用冰片麝香開竅宣氣皂角附片溫通開痰以四味研末吹鼻先通其閉繼宗薛氏用三生飲加參汁通陽益氣再入戈製半夏以驅痰涎處方吹藥麝香五釐皂角四分冰片七分附片五分研末吹鼻湯方生南星一錢生川烏一錢蘇扎參五錢煎汁沖服生附片一錢鮮生薑三錢廣木香五分戈製半夏五分效果吹藥一次即嚏四肢隨溫牙關得松旋進湯藥一劑知五劑已後以廣東參茸衛生丸調補而痊廉按薛院判人參三生飲施於中風挾寒寒痰壅閉之危證確係急救良法若誤用於積熱釀痰肝風沖逆以致壅塞氣道者則反速其斃故醫者不必拘於西北多真中東南多類中及真中屬實類中屬虛等說以橫於胸中總須隨證辨其虛實析其寒熱而施治法也中風脫證案內科梁右齋住玉山湖塘沿病者姚家瑞妻徐氏住馹門前病名中風脫證原因產後血虛誤於前醫不問病之虛實遽以產後普通方芎歸湯加疏風發散藥治而劇證候產經十句鍾孩提包衣方全下惡露過於常胎頭暈嘔吐憎寒壯熱舌苔粗膩面色穢垢頭不能舉汗出不止醫投以芎歸湯加發散一劑未完汗出如雨大氣欲脫神識時憒診斷六脈浮大鼓指重按空而無力確係陰血驟虛內風暗動孤陽上越之危候療法遵仲景桂枝加龍骨牡蠣湯增損處方川桂枝一錢杭白芍五錢炙甘草錢半左牡蠣五錢生打龍骨三錢生打西潞黨錢半黑附片六分明天麻錢半紅棗肉六枚生薑二片二劑汗收熱除第三天買藥遇其同姓藥店官謂其生產未過三天這醫生方內都不用當歸川芎以去瘀血誠屬怪醫如果純粹服此補澀藥恐怕將來汝妻要被這藥補到瘀血就要肚脹而死遂於方內加當歸川芎各錢半煎服一頭煎霎時間前證完全復作夜半又來特招詢問始知其故噫醫藥豈可兒戲乎二方前方加酸棗仁三錢日進兩劑效果半月後諸證悉除進以血屬補品甘天軀幹精神始完滿廉按中風脫證十中難痊一二況在產後尤為迫不及救乃用仲景桂枝加龍牡增損調營和衛回陽固脫投之輒應尚屬僥倖成功不得謂此方概可救中風脫證也惟藥肆中人但知普通常法不知特別變法遽爾背加藥品此種惡風醫藥界當開公會共同取締以免貽誤病家中風偏枯案內科高糺云住贛州生佛壇前病者唐羅氏年四十五歲住安慶病名中風偏枯原固體質素弱虛風時動適勞倦受風而發證侯猝然昏聵醒後左半身不遂皮膚不仁筋骨瘦痛診斷脈搏虛弱左部尤甚正如經云虛邪客於身半皆由氣血偏虛真氣去邪氣獨留著於所虛之半邊阻隔脈道以致偏枯不仁療法用八珍湯扶助氣血加虎骨竹瀝鉤藤薑汁天麻桑寄生鎮其虛風消其絡痰處方西潞黨二錢漂於朮錢半雲茯苓三錢炙甘草一錢當歸二錢酒白芍三錢直熟地四錢川芎一錢淡竹瀝兩瓢沖鉤藤錢半生薑汁四滴沖明天麻二錢桑寄生三錢炙虎骨錢半效果每日服一劑至四十餘劑病始告痊廉按內經謂虛邪之風與其身形兩虛相得乃容其形是確指虛人而後中於虛風也然猶系因虛受風故經又有真氣去邪氣獨留發為偏枯之說偏枯難療二語盡之此案既屬偏枯八珍湯加味確係對證之良方四十餘劑而痊溝不誣也中風偏枯案內科曾月根住五華周潭病者繆吉菴年七十七歲堪輿住廣東五華周潭病名中風偏枯原因素有哮喘又兼老邁元氣虧損風邪直中血脈證候半身不遂右手足不能舉動麻木不仁略吐痰涎診斷六脈俱緩左關尤甚緩非和緩乃是怠緩左關屬肝肝藏血肝血少脈無所養而緩療法當用木瓜萆薢除濕痹天麻防風驅風邪殭蠶因風而僵反能治風續斷能續而又能補五靈脂逐風濕之疼威靈仙行絡中之氣虎骨去脛骨之風烏藥疏逆上之氣又恐風邪凝著難散故用黃耆當歸白芍之補而有力者以行之血行風自滅也松節牛膝領諸藥上出下行俾其左宜左有各不相悖大意以去風濕之實而補正氣之虛也處方宣木瓜五兩川萆薢一兩白殭蠶一兩松節一兩黃耆一兩炒白芍一兩全當歸一兩威靈仙一兩虎脛骨一兩烏藥一兩淮牛膝一兩防風一兩天麻一兩續斷一兩五靈脂一兩上十五味用老酒浸一宿取起蒸熟曬乾研末仍用前浸之酒調服五錢漸加至一兩效果連服一旬手足已見微效二旬手能舉動三旬足能步履終用歸芍六君子丸氣血雙補兼去宿痰而復元廉按活絡驅風益氣化濕參以壯筋健骨立方虛實兼到配合頗費心機雖然神經之功用已失肢體之偏廢已成痼疾難瘳調復豈易此等方法亦有效有不效也中風半身不遂案內科熊鼎成住清江樟樹鎮洋湖圩病者楊生厚年六十七歲商人住清江病名中風半身不遂原因素性嗜酒晚年血氣衰弱猝感外邪而發證候未病前二日肝火已動夜間神煩少寐病發之日午膳甫完忽覺身體不支猝然倒地扶至床榻左半身手足俱覺不仁口眼歪斜肢節三日不能移動動則痛楚不堪每日僅食粥一杯不餓亦不便診斷脈浮數而濡左手微弦脈證合參病因嗜酒生濕濕生熱熱生風風自內動一觸即發今半身雖不仁而神識清爽外無寒熱先天素強療治尚早加意調理可望復原久則血脈偏枯為難治療法外以鱔魚血塗口眼歪斜處牽之使正內服湯劑以熄風逐濕活絡清肝為主手足活動後改湯為膏調理自痊處方羚羊角一錢另煎貧寒無力者不用亦可滁菊花二錢明天麻二錢雙鉤藤四錢杜蒼朮錢半川黃柏三錢五加皮四錢當歸尾二錢川牛膝三錢石南藤二錢白頸蚯蚓二錢炙甘草一錢嫩桑枝五錢為引如便秘者酌加大黃蘄蛇蚯蚓研末淡酒沖服一錢更妙效果服藥二劑口眼歪斜處即正四五劑後手足漸能活動半月後以原方十劑熬成藥膏加黑驢皮膠龜膠各二兩每日開水沖服五六錢月餘調理而安藥膏內酌加冰糖則易服廉按東南中風之病此因最多丹溪所言正是閱歷之談此案斷語援引愜合方亦切中病情風溫案內科張錫純住鹽山西門內病者趙印龍年近三旬業農住鹽山城北許孝子莊病名風溫原因孟秋下旬農成忙甚因勞力出汗甚多覆在樹陰乘涼過度遂得風溫病證候胃熱氣逆服藥多嘔吐因此屢次延醫服藥旬余無效及愚診視見其周身壯熱心中亦甚覺熱舌苔黃厚五六日間飲食分毫不進大便數日未行問何不少進飲食自言有時亦思飲食然一切食物聞之皆臭惡異常強食之即嘔吐所以不能食也診斷其脈弦長有力右部微有洪象知其陽明府熱已實又挾沖氣上衝所以不能進食服藥亦多嘔吐也療法欲治此症當以清胃之藥為主而以降沖之藥輔之則沖氣不上衝胃氣亦必隨之下降而嘔吐能止即可以受藥進食矣處方生石膏三兩細末代赭石一兩細末知母八錢潞黨參四錢粳米三錢甘草二錢煎湯一大碗分三次溫服下此方乃白虎加人參湯又加赭石也為其胃腑熱實故用白虎湯為其嘔吐已久故加人參為其沖胃上逆故又加赭石效果服藥盡一劑嘔吐即止次日減去赭石又服一劑大便通下熱退強半至第三日減去石膏一兩加玄參六錢服一劑脈靜身涼而仍分毫不能飲食憎其臭味如前愚曉其家人曰此病已愈無須用藥所以仍不飲食者其胃氣不開也夫開胃之物莫如萊菔可用鮮萊菔切絲香油炒半熟加以蔥醬煮湯勿過熟少調以綠豆粉俾服之至作熟時病人仍不肯服迫令嘗少許始知香美須臾服盡兩碗從此飲食復常廉按熱盛沖逆用白虎湯加赭石清熱鎮沖方極穩健惟潞黨參宜易西洋參孟英謂西參與古時人參味苦微寒者相同故案中人參白虎湯每用洋參良有以也風溫案內科過允文住宜興徐舍病者朱熙臣令郎年十五歲住宜興竹巷病名風溫原因感受溫風首先犯肺早服滋養邪熱留戀證候咽喉腫痛發熱咳嗽音啞不揚痰黏胸痞診斷脈右浮數舌邊尖紅苔白薄滑證屬風熱傷肺治宜辛平宣透而乃誤投滋膩致邪膠固久延恐成肺癆療法達邪宣肺清肅氣機故以牛蒡蔞皮為君佐以沙參杷葉杏桔等品以冀熱退咳爽處方牛蒡子二錢苦桔梗一錢栝蔞皮三錢北沙參三錢光杏仁三錢冬桑葉錢半鮮竹茹三錢枇杷葉五片去毛先用生蘿蔔四兩鮮青果兩枚煎湯代水服三劑熱雖退咳不止又方京川貝三錢款冬花錢半浙茯苓三錢前胡二錢冬瓜子三錢栝蔞皮二錢光杏仁三錢枇杷葉三片去毛北沙參二錢效果五劑咳止而痊康按藥用輕清方效葉案此風溫輕證之治法風溫暴泄案內科錢蘇齋住蘇州謝衙前病者華鏡文室年三十歲住蘇城皮市街病名風溫暴泄原因產後彌月新感風溫發熱咳嗽第三日經鄰醫徐某投桂枝湯乃作暴泄證勢大劇證候泄瀉一晝夜十餘次津涸神昏氣促痰鳴舌苔焦黃乾燥齒板面黝目閉多眵身灼熱渴飲無度診斷脈弦而駛證本風溫犯肺不與清解反投辛溫肺熱下移於大腸乃作暴泄內經所謂暴注下迫皆屬於熱也況產後營液先傷利多又足亡陰當此一身津液傾瀉無餘非甘寒急救其津液不足以挽茲危局若誤認為脾病與以溫燥升補之藥必陰下竭而陽上厥矣療法欲存陰必先止下利欲止瀉必先清肺熱因以白虎湯為君專救肺熱佐以甘涼諸品以救津液不得謂泄瀉之症忌進寒涼也處方鮮霍斛二兩鮮沙參三錢川貝母三錢生甘草一錢生石膏二兩鮮生地二兩鮮竹葉三錢鮮蘆根二兩肥知母三錢麥冬肉三錢竺黃片三錢又方塘西青皮甘蔗榨清汁一大碗頻頻服之效果用大劑甘寒服竟日而瀉止津回熱解身涼竟以大愈後加西洋參扁豆衣等兩日即痊廉按風溫誤投桂枝湯在上者輕則失音重則咳血在下者輕則泄瀉重則痙厥此由鞠通之作俑也為其所欺以誤人者數見不鮮今用大劑甘寒以救誤競得大愈金在醫者之處方對證用量適當耳然而幸矣風溫火逆案內科榮錫九住永川五間鋪太平紫病者榮錫九年四十八歲時住川東永邑五間鋪觀音橋病名風溫火逆原因是年三月春行夏令溫度太高繼以因公赴縣往來受熱故致此病證候四月一日回家沉睡昏迷不省人事延族兄診視以錫九素病吐血身體極弱誤認為陰寒進以補中湯身灼如火是由火逆病勢一變幸次日發衄衄後稍蘇診斷自診脈浮數孽指浮為風數為熱身灼熱焦痛乾燥此風溫證也療法擬用銀翹散加減風溫身灼焦燥如火熏非汗不解焦燥陰傷汗之反逆只得養陰聽其自解處方蜜銀花三錢青連翹三錢大力子三錢苦桔梗二錢薄荷三錢淡竹葉三錢生白芍三錢生甘草八分效果此方穩服一星期胸腋頭面稍得汗解得汗處肌肉便活以外焦灼如前將前方去大力加真川柴胡三錢以為輸轉又一星期腰以上得汗以下無汗再一星期汗至足脛兩足無汗焦痛不敢履地直服到四星期全身皆得汗解安好無恙矣此症原誤服補中湯故纏綿不愈有如此久然猶幸衄後人蘇頗能自主不然病久不解未有不東扯西挪寒熱雜投者其為病不知胡底矣康按病本熱厥妄投補中豈作中熱氣脫治耶不然何所見而率用提補耶幸而鼻衄人蘇經治而愈然亦險而幸矣風溫喘促案兒科張錫純住鹽山西門內時寓天津病者郝姓幼子年五歲住天津小南關柴市旁病名風溫喘促原因季春下旬感冒風溫醫治失宜七八日間喘逆大作證候面紅身熱喘息極促痰聲漉漉目似不瞬危至極點診斷脈象浮滑重按有力啟口視其舌苔色白而潤問其二便言大便兩日未行小便微黃然甚通利且視其身體胖壯陰分猶足知猶可治療法欲治此證當用傷寒論小青龍湯然須重加涼藥以輔之處方麻黃一錢桂枝尖一錢五味子一錢清半夏二錢川貝母二錢去心光杏仁二錢生白芍三錢乾薑六分細辛六分生石膏一兩研細煎湯一大茶鍾分兩次溫服下說明此方即小青龍湯加貝母生石膏金匱治肺脹作喘原有小青龍加石膏湯然所加石膏之分量甚少今所以重用生石膏至一兩者為其面紅身熱脈象有力若不重用石膏則麻桂姜辛之熱即不能用矣又傷寒論小青龍湯加減之例喘者去麻黃加杏仁今加杏仁而不去麻黃者因重用生石膏麻黃即可不去也效果將藥服盡一劑喘愈強半痰猶壅盛肌膚猶灼熱大便猶未通下遂用生石膏蔞仁各二兩代赭石一兩煎湯兩茶鍾徐徐溫服之痰少便通而愈廉按風溫犯肺肺脹喘促小兒尤多病最危險兒科專家往往稱馬脾風者此也此案斷定為外寒束內熱仿金匱小青龍加石膏湯再加川貝開豁清泄接方用大劑二石蔞仁等清鎮滑降而痊先開後降步驟井然惟五歲小兒能受如此重量可見北方風氣剛強體質茁實不比南人之體質柔弱也正惟能受重劑故能奏速功風溫時毒案內科過允文住宜興徐舍病者周恆和婦年五十二歲住徐舍市病名風溫時毒原因吸受風溫誤服辛熱證候頭面赤腫壯熱便閉讝語昏狂口大渴舌鮮紅溲赤而短診斷兩脈洪數有力已成陽明熱盛之候療法先用釜底抽薪法後用清涼品以消熱毒處方生川軍五錢元明粉三錢生甘草一錢濟銀花五錢小枳實三錢天花粉五錢青連翹三錢元參五錢次診服一劑下大使二次色黑而堅後少溏薄尚有昏讝次方生川軍一錢白池菊二錢大青葉三錢濟銀花五錢冬桑葉二錢天花粉五錢生粉草一錢活水蘆根一兩生綠豆一兩煎湯代水羌活八分紫雪丹五分開水先下三診服一劑熱減再劑腫全消惟津虧熱不退不能眠甘寒復苦寒法三方天麥冬各三錢鮮生地五錢小川連五分鮮石斛三錢濟銀花五錢鮮竹葉三十片大玄參三錢漢木通八分生綠豆一兩絲瓜絡三錢辰砂染燈心三十支效果一劑熱清得眠三劑痊愈康按識既老當號亦清健是得力於河間一派者風溫發痙案兒科陳作仁住南昌中大街四川會館病者劉小孩年甫二歲南昌人住城內病名風溫發痙原因時值春令陽升適被溫風襲肺外風引動內風遂發痙而狀如驚癰證候初起熱咳微喘涕淚交流顯系風疹現象前醫妄投辛溫風藥以致風助火勢陡變哭無涕淚皮里隱隱見點手足抽搐目睛直視角弓反張診斷面赤兼青指紋沉紫此由疹毒內郁熱盛生風仲景所謂狀如驚癇時時瘛瘲是也故世俗通稱急驚其實似驚而非真驚耳然亦險矣療法急急救濟議以重劑清解法重用銀花連翹以清熱解毒為君以芥穗薄荷浮萍桔梗透疹宣表為臣佐以桑菊鉤藤熄風鎮痙貝母竹黃利竅豁痰使以甘草和諸藥解疹毒也處方淨銀花三錢青連翹二錢苦桔梗七分川貝母一錢荊芥穗一錢紫背浮萍錢半蘇薄荷七分冬桑葉一錢雙鉤藤錢半滁菊花錢半天竹黃半錢生甘草五分次診前方連進二劑痙瘛已平遍身已現紅點險象既除諒無意外之虞前方減去芥穗鉤藤加杭白芍錢半廣陳皮八分接進二劑外用西河柳芽鮮芫荽共煎水洗前後心手足心日洗二次三診遍體疹點滿布燒熱漸退惟咳嗽口於大便未通此係熱邪傷陰所致再當養陰清肺以為善後調理三方元參心二錢杭麥冬二錢去心鮮石斛二錢川貝母錢半白芍錢半廣陳皮五分北沙參二錢生甘草三分效果連進三劑各證痊愈廉按風溫發痙多由於外風引動內風風動發痙狀如驚癇病勢之常也奈專科一見此症每稱急驚輒用挑法因此僨事者目見甚多此案認為疹毒內郁熱盛生風診斷頗有見地用藥層次井然後學深可為法風溫伏邪案內科許翔霄住無錫滸泗橋病者徐錫甫年甫弱冠紗廠機工住錫城病名風溫伏邪原因冬稍受寒伏而不發至春感風觸動伏氣而發病證候身熱懊憹咳嗽咽痛微寒便泄鼻衄耳聾吐痰黃稠診斷脈形數大重按帶弦舌紅苔黃斷為肺胃痰熱蓋氣熱則痰為火灼色變黃稠氣燥則清竅不利兩耳失聰咽通於胃喉通於肺今肺胃為風熱淵藪自然咽喉作痛大腸與胃相連續與肺相表裡熱盛則下移於腸而便泄兼症雖繁仍不越乎風溫之本因療法清痰熱以保肺存津液以養胃處方泡射干六分苦桔梗一錢淡片芩錢半黑山梔三錢前胡一錢青連翹三錢細木通五分六一散三錢包煎鮮石斛五錢竹葉三十五片白茅根一兩去心此三味煎湯代水效果服二劑後咳爽痰活熱減泄止後以清肺湯收功廉按風溫之為病其固有二一為新感一為伏氣此證屬太陰伏熱感風而發故用肅肺養胃以奏效繼用清肺湯以收功尚屬伏氣風溫之輕證治法風溫兼伏氣化熱案內科張錫純住鹽山西門內時寓天津病者陳百生將軍年四十六歲寓天津廣東路病名風溫兼伏氣化熱原因因有事乘京奉車北上時當仲夏歸途受風致成溫熱病證候其得病之翌日即延為診視起居如常惟覺咽喉之間有熱上衝咳嗽吐痰音微啞周身似拘束痠軟診斷脈象浮而微滑右關重按甚實舌苔白色知此證雖感風成溫而其熱氣之上衝咽喉實有伏氣化熱內動也療法病在初起熱雖不劇而伏氣之發動必繼有大熱在後宜少用表藥解肌重用涼藥清裡石膏在所必需也然膏粱之人其身體倍自鄭重當此病之初起而遽投以石膏重劑彼將疑而不肯服矣斯不得不先為開清解之劑也處方薄荷葉三錢連翹三錢蟬退二錢知母六錢玄參六錢天花粉六錢生甘草二錢煎湯服效果翌日復診言服藥後周身得微汗而表裡反大熱咳嗽音啞益甚言之似甚恐懼診其脈洪大而實左右皆然愚曰君欲速愈乎能聽我用藥甚非難事但重用生石膏四兩加粳米三錢煎湯四茶鍾分四次徐徐溫飲下盡劑必愈此事我能保險也陳君聞之欣然聽從遂命人向藥房購整塊生石膏藥房預軋細者恐溷有煅石膏一斤自軋細秤准四兩加粳米三錢煮至米熟取清湯四鍾先溫服一鍾後兩點鐘服一次果盡劑而愈廉按溫風為新感葉天士所謂溫邪上受首先犯肺是也伏氣化熱為伏熱張路玉所謂凡病傷寒而成溫發於夏至以後者為熱病是也方用表裡雙解周身得微汗而諸症反益甚者胃家燥熱上蒸故也敵用重量生石膏清燥解熱妙在將石膏同粳米煎湯乘熱飲之俾石膏寒涼之性隨熱湯發散之力化為汗液盡達於外所以人慾發汗者飲熱茶不如飲熱稀粥也然必盡一斤而始愈可見石膏為涼藥中極純良之品矣風溫夾食案內科錢蘇齋住蘇州謝衙前病者吳吉人年四十九歲住蘇城賽兒巷病名風溫夾食原因素體瘦弱食積易停溫邪由口鼻吸入肺胃與痰滯膠結而發證候初起表熱一日即解能食不大便痰嗽氣逆病屆五日曾陡作脹悶喘急欲絕旋即平復迄十一日晨始行大便一次登廁方畢腹中㽲痛不止冷汗如雨氣促脈微昏讝痰嘶面色晦黯呼號欲絕自晨迄晚連易五醫俱言不治或僅書生脈散方以固其正余審其齦齶間有糜腐與之語神識尚清中氣未奪按其腹並不拒但言繞臍劇痛矢氣臭穢而極多量其熱度止九十八度診斷脈甚細弱而舌苔焦黃垢膩厚濁此溫邪與痰滯交結阻塞腸胃間欲下而不得下故有此劇烈之腹痛也冷汗頻流此痛汗非脫汗也脈雖微細身雖無熱其人陽氣素弱邪亦不甚但積滯大多非一下所能愈者茲當舍脈從證先與急下之劑不可誤認為正虛欲脫之證致犯實實之戒反致不救也療法下法宜用湯湯之言蕩也惟痰熱宿滯皆膠黏之物淤積既久而又多非一下即能盪滌無餘者觀其滿口糜腐矢氣疊轉胃將敗而生機未絕攻下之中又宜相度緩急分數次以行之處方礞石滾痰丸七錢包煎焦六曲三錢萊菔子三錢廣橘紅一錢海蛤粉四錢陳膽星一錢製半夏三錢炒枳殼一錢瓜蔞實六錢光杏仁三錢山楂炭三錢芒硝一錢沖又方川連七分楂炭三錢枳實錢半製半夏三錢白杏仁三錢烏藥錢半蘇梗錢半六曲三錢檳榔錢半全瓜蔞七錢川鬱金錢半大腹絨錢半三方枳實導滯丸七錢包煎廣橘紅一錢製半夏三錢萊菔子三錢白杏仁三錢蘇子三錢瓜蔞實五錢效果服第一方下宿垢甚多腹痛緩自覺未暢矢氣尚多與第二方又解一次痛止痰平但自言腹中宿垢尚多再服第三方又暢下宿垢甚多糜腐去而舌苔脫去大半下露淡紅新肉乃用石斛等養胃法調理旬余而痊廉按風溫夾食食積化火釀痰數見不鮮此案診斷既明方亦穩健可法風溫夾食案內科胡劍華住景德鎮畢家同病者汪瑞庭年三十八歲米廠機師住景德鎮病名風溫夾食原因夏曆八月酷熱異常初受風熱而不覺於八月十七日傍晚赴筵嗜酒狂飲多食油膩夜深回家覺渴甚食生萊菔一枚迨東方將白之時自覺右脅疼痛發熱惡風矣證候頭痛身熱自汗惡風怕寒脅痛先在右脅繼移左脅背亦隱痛渴嗜冷飲咳劇心煩痰濃而黏診斷脈數而尺膚熱舌中間靠右邊一條黃膩而潤合參脈證斷為太陰風溫而兼食滯此內經刺熱篇所云肺熱病者先浙然厥起毫毛惡風寒舌上黃身熱熱爭則喘咳痛走胸膺背不得太息頭痛不堪汗出惡寒也療法凡大陰風溫先宜輕宣清解故用連翹片芩蟬蛻豆豉為君因其肺有熱痰復投梔子牛蒡杏仁清肺行痰為臣兼有積滯故用蔻仁厚朴陳皮萊菔子寬中行滯為佐又有脅痛徹背故以芍甘延胡和血止痛為使處方淨連翹錢半淡豆豉二錢牛蒡子二錢炒萊菔子八分炒甘草三分淡黃芩錢半焦梔子一錢苦杏仁二錢川厚朴八分陳皮一錢延胡索二線淨蟬蛻一錢白蔻仁六分沖生白芍四錢複方淨連翹錢半苦桔梗一錢焦梔子一錢淡黃芩錢半川貝二錢苦杏仁三錢白茅根五錢生甘草三分牛蒡子二錢炒銀花二錢栝蔞仁四錢杵蟬蛻殼七分淡竹瀝兩瓢沖效果服初診方四劑後諸症皆減惟咳痰甚難非三四聲不能咳出其痰甚濃色白帶黃每逢咳時牽動左脅作痛接復診方三劑痊愈廉按清解消導自是正治方亦從葉法脫化診斷引經證醫足見學有根抵風溫挾濕案內科鄭沛江住湖州潘公橋病者徐寡婦年二十餘歲業農住南通通興鎮西病名風溫挾濕原因夫病瘵死抑鬱為懷是其夙因冬傷於寒是其伏因辛勤田野加冒風雨新感風濕是其誘因證候初起體熱咳嗽胸悶身痛頭疼便瀉口渴不甚引飲早經前醫歷投涼解疏化等劑嗣黃安仁先生介紹予診病已月餘神倦瞀瘛口燥咽乾大便不行溲赤而澀月汛二期不至奄奄待斃診斷脈微欲絕舌絳苔少予斷為真陰已虧故脈微神倦肝脈上巔肝熱故頭疼不減舌絳者胃陰將亡也苔少者胃氣猶存也咽乾口燥者伏寒化火陰虛火旺也眼目昏花暗中見鬼謂之督肝筋被灼筋不得伸謂之瘛火熾於上則瞀目乃火之戶風淫於筋則瘛肝主筋經云諸熱瞀瘛皆屬於火又曰諸風掉眩皆屬於肝詳審病機其為水虧木旺也元疑至於大便不行天癸逾期又是血虛液涸之症小溲赤澀乃肝旺而失疏泄之職幸而胃動知飢客邪已去十分之八九此則尚有生機也療法治以大隊濃濁之阿膠龜膠鱉甲生地填陰補隙壯水制火為君臣以平肝之白芍牡蠣佐以杏仁麻仁通幽泄火五味斂陰使以甘草調養胃陰猶恐不足令藥前吞生雞卵一枚處方生白芍三錢陳阿膠錢半烊沖龜膠錢半烊沖大生地三錢炒麻仁三錢五味子一錢生牡蠣三錢粉甘草二錢連心麥冬三錢炙鱉甲四錢甜杏仁三錢去皮杵效果兩劑而脈起瘛止神清苔生便溺暢利飲食稍進惟四肢無力不能起床漸次調補逾兩月而汛至體健而愈廉按辨證詳明處方精切從吳氏三甲復脈湯加減潛鎮攝納為治內虛暗風之正法是得力於溫病條辨者風熱案內科梁右齋住玉山湖塘沿病者劉源生之母陳氏年五十一歲住馹門前病名風熱原因風熱客於會厭咽痛音啞醫以養陰清肺咽痛愈而胸閉畏寒而惡食易醫以溫表主之遂變發熱肢痛又易醫以桂麻姜辛投之又變淋漓氣餒頭暈醫又謂病變冬溫投以達原飲遂變氣促鄭聲喊叫亂言為譫語聲細語重為鄭聲耳鳴舌燥諸醫束手告以不治證候汗流如雨面若塗朱舉動氣促神昏耳鳴交睫鄭聲舌燥無津診斷脈微而數按之有神根氣尚在猶可挽回於末路療法清淡平補以生津養神為主處方西洋參八分辰茯神三錢夜交藤三錢鮮石斛四錢白芍三錢柏子仁二錢女貞子錢半生甘草八分烏芝麻五錢炒服五劑復診汗收氣平神寧臥靜面紅退舌津生以前方加鱉甲龜板各四錢野臺參五分熟地四錢服三十餘劑效果調養月餘身體方能復原廉按雜藥亂投病隨藥變幸其人根氣尚堅猶可挽回於末路然亦僥倖之至矣故病家擇醫不可不慎之於始也三陽風熱證案內科陳務齋住梧州四方井街病者吳興年三十歲左右廣西藤縣體壯病名三陽風熱證原因勞心太甚晝夜不能安眠心神焦躁火熱漸升誘因出巡適值天氣乍寒乍熱感受風邪素因性直而剛過於疲勞往往肝氣鬱怒久鬱而火暴發證候起則頭目疼痛肢體困倦肢表麻木攣急骨節疼痛寒熱往來目赤唇焦渴飲嘔逆呻吟不息繼則全體大熱晝夜不休鼻乾口燥氣逆喘急口苦耳聾形容憔黑譫語昏狂危殆異常診斷左則浮洪弦數右則浮滑數六脈有力而實脈證合參風熱證也奈閱前醫之方以溫散治風之藥愈服則風愈生火愈盛而病豈不危乎今所幸者脈尚未脫諒能救治療法湯劑用疏風羚犀鉤藤湯取蓮心玉竹羚羊磨犀清心肝鬱熱柔潤熄風為君鉤藤柴胡蟬退木瓜解表和里舒筋活絡為臣石膏知母膽草粉葛平陽明胃熱潤燥生津為佐木通皂角利水化痰通關開竅為使二服則燥熱已減譫語已除人事醒而不昏肢表不攣惟頭部仍痛體中發熱診脈浮洪已除只見弦數又用平陽退熱湯取其清心肝而平君相疏表和里清熱解肌生津平胃連數服熱退體和頭痛已除渴飲亦止惟腹滿大便燥結十日不行診脈數而有力又用大承氣湯推蕩大腸去鬱熱連三服得下十餘次腹中不滿略能進食惟四肢重倦無力步履困難又用榮筋逐濕湯取其活血榮筋宣通筋絡清熱去濕連數服則肢不倦惟元氣太弱語言艱澀診脈已弱無力又用參耆寧神湯取其補氣生津清心寧神運脾健胃滋陰去濕處方疏風羚犀鉤藤湯方羚羊角錢半磨犀尖二錢鉤藤勾五錢生石膏五錢蓮子心五錢川柴胡一錢明玉竹三錢生葛根一錢川木瓜三錢蟬退錢半肥知母四錢牙皂角一錢龍膽草二錢漢木通錢半煎服次方平陽退熱湯方生石膏五錢釵石斛三錢知母四錢膽草二錢川萆薢三錢羚羊角一錢蓮子心四錢絲瓜絡三錢木通錢半青蒿三錢煎服三方大承氣湯方川厚朴三錢川枳實四錢生大黃四錢元明粉三錢煎服四方榮筋逐濕湯方川木瓜三錢桑寄生五錢威靈仙二錢川黃柏三錢生土薏六錢歸身錢半雲茯苓三錢絲瓜絡三錢生牛膝三錢防己二錢嫩桑枝六錢煎服五方參耆寧神湯方花旗參三錢生白芍三錢破麥冬四錢淮山藥三錢開蓮米四錢薏苡五錢酸棗仁二錢云茯神四錢川杜仲二錢正龜膠一錢炙黃耆二錢煎服效果十日燥平渴止譫語已除人事已醒熱退體和二十日食量大迸三十日元氣已復精神壯健廉按此肝絡伏熱因感外風從陽明而外潰故一發即熱盛風動病勢劇烈非犀羚白虎湯加減不足以殺其勢大承氣湯不足以芟其根善後二方亦有力量故能效如桴鼓惟方中柴葛劫肝陰而傷胃汁究宜慎用風熱咳血案內科韓緒臣住鎮江薛家巷病者李鏡湖年三十六歲學界揚州人病名風熱咳血原因初因感風舍肺咳嗽自以為操勞過度妄食滋補風從熱化肺絡乃傷證候咳聲不揚顴紅氣促右脅隱痛痰中夾血診斷脈浮而芤左勝於右蓋肺居高部乃一身行氣之司令臟也處氣交之中最有直接關係六淫之侵易於感觸故傷於風者上先受之風舍肺腧則咳若能節飲食慎起居風散則咳自己妄食滋補助痰遏風風居肺絡久而釀熱氣道為痰所壅則咳聲不揚風熱因郁難伸則痰中夾血氣壯之人肺癰因此氣虛之輩肺痿由來右脅隱痛者乃氣痹不宣也所服之方罔不從虛論治徒然塞氣生痰吾所不取也療法輕清透達理氣活痰君以旋覆杷葉桑菊清肺絡以開肺痹佐以橘皮絡川貝鬱金萊菔子開其痰結絲瓜絡金橘皮新絳之屬清營理郁兼能化瘀處方旋覆花一錢布包枇杷葉三錢去毛冬桑葉三錢杭菊花錢半橘皮絡各一錢半川貝母三錢廣鬱金錢半萊菔子錢半絲瓜絡三錢金橘皮一錢新絳屑一錢效果日服一劑別無加減約半月咳暢痰豁血止氣舒而愈廉按清肺通絡順氣豁痰不專止血而血自止為治咳血之巧法學者直注意之風熱夾痰案內科梁右齋住玉山湖塘沿病者朱永興之幼子二歲住社稷壇病名風熱夾痰原因客臘發現痰病三月有餘前醫屢以搜風化痰燥熱溫中愈服愈重奄奄一息證候滿面青筋扛起遍身瘦如雞骨喉間痰聲漉漉氣喘汗出十指黑筋扛起時有寒熱口渴大便泄青色水糞溺澀赤短惟瞳神靈活診斷紋紫脈數青筋扛起大便瀉青此厥陰經風熱為病療法以辛涼清風潤燥豁痰處方冬桑葉八分雙鉤藤錢半絲瓜絡錢半栝蔞仁錢半嫩桑枝一錢白池菊一錢淡竹茹錢半川貝母八分枇杷露旋覆露合成一兩分沖效果一劑知二劑痰熱均減至四劑病若失廉按風熱夾痰最易激動肝風上衝神經陡變狀如驚癰似此辛涼熄風清潤滌痰處方輕靈可喜方中如再加羚角尤為著力風熱夾積案兒科梁右齋住玉山湖塘沿病者李爿仔之子半歲住小西門內陳氏祠堂病名風熱夾積原因七月初旬患積熱瀉數次糞如泡成蛋花醫治以藿香蒼木桔梗葛根等藥瀉未止而增口渴易醫又以川樸法半夏等溫燥藥治至十四夜腦陷肢冷而轉重證候面青白目上竄口渴舌苔微黃神述倦臥氣逆肢厥溲長頻頻診斷氣逆口渴溲長肺有熱也面青肢厥肝經風熱甚熾也幸指紋未射甲雖危尚可挽救療法順氣清肺滌熱平肝為主處方北沙參二錢原麥冬一錢海蛤粉一錢片芩一錢知母錢半杭白芍錢半生甘草六分石決明三錢全栝蔞一錢杵外針少商穴三呼復診據述夜半十句鍾手足溫而神蘇惟氣促便溏形瘦神弱急以提補平劑消息之複方東洋參六分炒麥冬五分生玉竹八分抱木茯神一錢杭白芍八分炒炒扁豆八分炒糯米一撮服五劑效果經兩星期調補而痊按凡春末及夏秋之間小兒患燒熱泄瀉糞如泡成蛋花或如菜綠色泄出直射甚遠糞門焮紅指紋細淡紅沉滯腹痛嘔噦四肢逆冷甚至目竄倦臥氣逆痰壅均屬太陰陽明燥病居多或兼暑風初起治法宜清涼兼微辛微苦之藥若熱稍減而舌苔淡薄速宜清淡滋養之品調補肺脾津液若舌黃膩燥黑急宜調胃承氣湯下之以救津液為要穆十數年來試驗準確毫無疑義茲錄初起及善後大法於下就有道而正之廉按嬰兒風熱夾積患者最多病亦善變全在醫者隨機策應對證發藥未可以一定之成法執而不化也此案方法及案後按語特其臨症一得之見識耳風濕案內科何拯華紹興同善局病者余瑞林年三十七歲業商住紹興城之咸歡河沿病名風濕原因素體陽虛肥胖多濕春夏之交淫雨纏綿適感冷風而發病證候頭痛惡風寒熱身重肌肉煩疼肢冷溺澀診斷脈弦而遲舌苔白膩兼黑此風濕相搏之候其濕勝於風者蓋陽虛則濕勝矣療法汗利兼行以和解之用桂枝附子湯辛甘發散為君五苓散辛淡滲泄為佐仿仲景徐徐微汗例以徐則風濕俱去驟則風去濕不去耳處方川桂枝一錢雲茯苓六錢泗安蒼朮一錢清炙甘草四分淡附片八分福澤瀉錢半酒炒秦艽錢半鮮生薑一錢紅棗二枚效果一劑微微汗出而痛除再劑肢溫不惡風寒熱亦住繼用平胃散加木香砂仁溫調中氣而痊廉按春夏之交淫雨纏綿病如傷寒者多風溼症臨症時當別其風勝濕勝辨其陰虛陽虛庶兔顴預誤人之弊病既陽虛濕勝仲景徐徐微汗真治風濕之金針此案殆得長沙之薪傳歟風濕案內科嚴紹岐住紹興昌安官塘橋病者施小毛年二十餘歲業商住紹興昌安門外側水牌病名風濕原因素體陰虛多火先冒春雨繼感溫風而發病證候初起寒熱頭疼關節串痛繼即遍身微腫渴不引飲便溏如醬溺短赤熱診斷脈右弦緩左關尺微數舌苔雖黃黃而帶膩證雖風濕兩感而濕已從熱化也療法先用七味蔥白湯辛淡法以通絡祛風使風濕從微汗而解次用木防己湯加減辛涼淡法以利濕泄熱使已從熱化之濕從小便排泄三用五葉茅根湯清芬甘涼醒胃生津以清餘熱處方青防風一錢蘇葉嫩枝錢半生薑皮一錢淡香豉三錢左秦艽錢半絡石藤三錢鮮蔥白四枚嫩桑枝一兩次方木防己錢半絲通草錢半生苡仁四錢青松針三錢桂枝木七分拌飛滑石三錢包煎絲瓜絡三錢嫩桑枝一兩三方冬桑葉二錢淡竹葉二錢炒黃鮮枇杷葉五錢去毛抽筋建蘭葉三錢生側柏葉二錢去皮鮮茅根一兩效果服一方兩劑微微汗出而惡寒除頭疼減服次方兩劑而溺利熱退身痛微腫均瘥服三方胃氣大動而停藥廉按同一風濕有風寒挾濕者有風濕挾濕者外因之感受不同內因之體質亦異而處方選藥當然各殊此案三方清靈熨帖多從葉氏方法脫化而來風濕相搏案內科施瑞麟住蘭豁東門外孝子牌坊病者章桂林年廿二歲住蘭溪北鄉前陳莊病名風濕相搏原因今歲八月下旬受兵災心甚惶恐逃避于山林冒風淋雨夜臥于山林而成此症證候手腳縫肢節腫痛不能轉側臥於床褥月餘痛楚難忍不嘔不渴飲食少進診斷脈浮而遲滯舌苔白滑脈證合參此風濕相搏之證也經云風則痛濕則腫傷寒論云風濕相搏身體煩疼不能自轉側不嘔不渴脈浮虛而澀者桂枝加附子湯主之若其人大便堅小便自利者去桂枝加白朮湯主之余仿其法先用小續命湯加靈仙西藏紅花之類用酒沖服連服三劑未見獲效又用疏風通經活血之劑訣云治風先治血血行風自滅服三四劑而身體稍能轉動痛亦稍止療法用當歸生地紅花活血養血為君用海風藤伸筋草川續斷桂枝五加皮通其筋絡為臣用羌獨活西秦艽桑寄生鑽地風千年健治風為佐用白朮茯苓利濕為使加廣木香以行其氣加酒以和其血然行血必須行氣經云血居於先氣推於後使血氣流通而病自愈處方白當歸四錢大生地二錢西藏紅花八錢海風藤錢半伸筋草錢半羌獨活各錢半千年健錢半桑寄生錢半鑽地風錢半生白朮二錢浙茯苓二錢川桂枝八分川續斷錢半西秦艽二錢宣木瓜二錢廣木香八分加好酒沖服服八九劑效果旬余稍能運動月餘而能行步至四十餘日其腫已消其痛已止而病愈矣廉按活血祛風舒筋通絡此等症用藥不過如是風濕夾痰案內科袁桂生住鎮江京口病者鄒允坤年二十八歲病名風濕夾痰原因因夏間冒雨趕路感受風濕遂病腹脹腿腫下及兩腳初在上海某醫院醫治服瀉藥不效九月來鎮江延予診治證候發熱胸悶腹脹不舒溲赤診斷脈象軟滑舌苔黃膩蓋濕熱蘊伏兼有痰滯療法用半夏瀉心湯小柴胡湯小陷胸湯合方化痰滯以清濕熱處方仙半夏三錢小川連一錢黃芩錢半川柴胡一錢栝蔞仁四錢杵淡乾薑六分次診熱退胸寬惟遍身關節作痛因於清利濕熱方中加散風藥以治其痛次方赤茯苓三錢焦山梔三錢豬苓二錢澤瀉二錢廣皮紅一錢西茵陳三錢羌活八錢秦艽錢半川牛膝三錢嫩桑枝兩尺切寸三診此藥服後次日忽大喘不止速予往診視之果喘息不寧精神疲憊不能起坐診其脈兩手俱細弱無神舌色亦轉光而無苔面色黃淡蓋病退而元氣大虛欲脫矣議急急益氣斂神以固脫三方潞黨參三錢西洋參三錢大熟地四錢枸杞子三錢胡桃肉三錢炙黃耆三錢五味子五分淡乾薑八分炙甘草五分四診明日其伴某君復來延診謂予曰先生真神人也昨藥服後喘息即止而神氣亦寧安睡一夜予遂偕往觀之果安靜如平人但起坐時仍覺喘促因囑以原方再服一劑五診此藥服後喘則定矣而腹忽脹大如懷孕之婦人大小便不通乃以資生丸方加減改作煎劑五方潞黨參三錢炒白朮三錢雲茯苓三錢炙甘草六錢廣藿香一錢生薏苡三錢炒扁豆三錢懷山藥四錢湘蓮肉七顆廣橘紅一錢南芡實四錢南山楂二錢六神麯二錢炒蔻仁一錢炒麥芽錢半桔梗一錢福澤瀉二錢廣木香八分橙皮一錢效果一服而脹松接服五劑脹全消每餐能進飯一碗余並能起立行走但覺腿腳痠痛無力而已其時該艦奉調急欲赴寧乃於前方去山楂神麯加炒熟地炭牛膝杜仲等藥以與之而行說明大凡虛實複雜之病其中必多轉變醫家當隨其機而應付之曲折變化一如其病苟稍執滯其不復敗者幾希雖然此豈可與淺人道哉康按風濕夾痰虛實雜揉故以認症為先對症發藥或化痰滯以清濕熱或利濕熱兼散風邪或益氣斂神以固脫或調中益氣以寬脹皆因病以定方不執方以治病隨機策應故能默收敏效未可以尋常風濕例視也風濕飧泄案內科尹榘山住濟南西小王府病者徐鑑秋年近五旬業農商嗜煙住山東平陰縣河北牛角店病名風濕飧泄原因素呼雅片眠食無節秋初夜間乘涼庭中忽聞鄰有盜警狂奔村外匿田禾中因感風濕患泄瀉不止證候面黃瘦黧黑飧泄數月醫治罔效藥甫入口旋即瀉出夜稍閉目則遺矢滿床因之四肢疲乏腰膝痠痛形衰氣短目花耳鳴種種敗象畢露診斷脈兩寸虛大微數兩關浮弦而空尺細弱無力脈證合參此飧泄日久脾腎兩虛之候也前醫不求病因不論體質始用克伐分利之藥繼以溫燥蠻補之劑久之脾土愈衰腎水亦竭幸而兩尺脈弱而不小手足尚溫頭面無虛汗之發胃中尚容谷少許內經論疾診尺篇云飧泄脈小者手足寒難已茲據各現象觀之尚不難治療法因用蓮子芡實山藥人參甘淡之品以補脾氣為君且蓮子芡實皆生水中性澀不燥補脾而不傷腎更以補骨脂菟絲子巴戟覆盆五味等酸甘微辛者化陰以補腎陽為臣牛膝木瓜山萸肉皆舒肝之品可以為佐再加升陽祛風藥如升麻柴胡羌獨活均以為使大劑濃煎調赤石脂末頓服處方蓮子肉三錢南芡實三錢淮山藥二錢炒人參錢半補骨脂二錢巴戟天二錢去心菟絲子二錢制五味子三十粒覆盆子一錢川牛膝一錢宣木瓜錢半山萸肉錢半升麻五分川柴胡一錢羌獨活各八分外用赤石脂二錢煅為末調服效果服二三劑泄止餘症亦減惟覺稍悶後於原方內去升柴羌獨活赤石脂加陳皮一錢廣木香三分服四五劑旬日痊愈廉按飧泄原屬於風風木一盛土必受哉脾氣因而下陷升補之法正宜用也惟牛膝羌獨宜刪風濕腳氣夾腎虛案內科李伯鴻住汕頭仁安里病者黃谷生年三十二歲新聞界住汕頭病名風濕腳氣夾腎虛原因日則政務勞形兼奔走各機關以訪查新聞夜則撰稿勞心加之花酒應酬輒夜深始歸如斧伐枯樹由是思傷脾色傷腎脾腎氣虛風濕因而乘虛入經絡下襲兩足而發病證候兩足腫痛行履不能日夜呻吟痛苦食入即嘔臥病月餘職務催迫更覺心悶氣促診斷脈左尺滑而細數右尺浮而澀弱脈證合參浮為風滑為濕風濕中於下肢脈細數澀弱腎氣更虧於內外形所以發為腳氣症也況事罷帶疲入房內外交困心腎兩勞竭澤而漁難供需索精髓消鑠血不榮筋足焉有不痠痛者哉療法先以加減三痹湯去風濕而止痛繼用加減六味以補腎外治以野葛膏更用龜桑膠以榮血而淘汰花酒余積處方潞黨參三錢赤茯苓四錢炙甘草二錢制首烏六錢鮮石斛六錢鮮生地四錢川杜仲二錢川牛膝三錢續斷三錢左秦艽二錢川桂枝二錢獨活二錢花檳榔三錢次方山萸肉三錢肉蓯蓉三錢巴戟天三錢丹皮二錢澤瀉二錢雲茯苓四錢大生地四錢淮山藥四錢羌活三錢鮮石斛六錢制首烏四錢川牛膝三錢千年健三錢走馬胎三錢三方嫩桑枝一斤生烏龜二隻重約一斤宣木瓜四兩川牛膝一兩效果後贈余匾其跋云丙戌秋余患腳氣跬步不行而身兼政界報界不能久病不出急延西醫治不效復延中醫治又不效床第呻吟月餘苦難言狀先生到診施以內外兼治術是夕獲安枕臥越兩旬而痊愈云云廉按探源敘症明辨以晰處方選藥精切又新真治內傷腎虛外感腳氣之佳案也風寒洞泄案內科蕭惠儔住贛縣洪成巷病者鍾曾氏年五十七歲體強住贛縣病名風寒洞泄原因平素體強春間小受感冒不耐服藥越旬余病變溏泄纏綿至於秋初證候氣虧色白瞑臥小安匙水下咽須臾泄去泄時必欠而嘔嘔而暈診斷脈沉細如蛛絲或有或無脈證合參此為洞泄轉變之症然審其所因則自肝邪始蓋所受感冒正內經所云以春甲乙傷於風者為肝風未經疏散乘其不勝襲入倉凜而為殃故經又云久風入中則為腸風飧泄乃糾纏日久中焦無汁變化血日以衰氣無所附中因不守而病變醫又以枳樸等觸犯虛虛累及腎氣致使幽闌洞闢將腸胃素所積蓄盡數掀空茲所幸者寧臥尚有時間足徵其稟賦豐厚二氣未肯遽離不然年老久病之軀一經嘔泄立即打破崑崙尚何有救藥之餘地乎因是斷為可治療法用參朮苓草補虛升提為君然肝主滲泄不斂戢肝風病根終莫能去因用萸梅治肝以為臣加入木瓜五味白芍等收攝脾胃腎耗散之氣以為佐合和濃煎調二石之末以止下焦之脫而為使一晝夜宜盡二劑少少與之頻頻臥服蓋病勢已造其極緩則難以圖功少則不至頓下頻則藥力無間臥則藥可少留處方高麗參三錢漂於朮三錢白茯苓三錢炙甘草二錢烏梅三枚山茱萸二錢宣木瓜二錢五味子二錢杭白芍二錢赤石脂末三錢禹餘糧末三錢又方生臺黨四錢漂於朮三錢明附片三錢效果次日即能出廳理事就診脈亦轉諸症悉退飲食略進遂定第二方囑其多服莫間廉按久瀉傷脾自當以補攝為主此案方法更見周到風痹案內科楊華亭住牟平養馬島楊家莊病者楊占亭年五十八歲山東牟平縣養馬島之社長住中原村病名風痹原因前清武生因挽弓兩臂用力太過曾受重傷幸少年時血氣方剛調治而愈至上年十月十二日風雪在地被石滑倒當即起立皮肉未傷初尚未覺證候第二日晨起時稍覺兩臂微痛至五六日忽而肩背疼痛忽而手足不能屈伸忽而項強不得回顧從此日重一日百藥無靈診斷本年四月六日召予診之脈左右手寸關弦緊而實上溢出寸兩尺稍緩惟左手肝部弦緊帶急脈證合參此為風痹內經痹論曰痹之安生曰風寒濕三氣雜至合而為痹也其風氣勝者為行痹寒氣勝者為痛痹濕氣勝者為著痹壽夭剛柔論曰病在陽者名曰風病在陰者名曰痹陰陽俱病名曰風痹此風寒乘虛入於經絡之中當年老時氣血俱衰氣衰無以行血血衰無以養筋又兼少年用力太過至老而發作也所幸者臟腑未病飲食如初脈弦緊而實弦則主風緊則主寒弦緊兼見則為風寒無疑實者浮中沉三部皆見也左手肝部弦緊而急即經所謂經絡皆實是寸脈急而尺緩也金匱血痹篇云左寸口關上小緊宜針引陽氣令脈和緊去則愈聖濟總錄風濕痹論曰風濕痹者以風濕之氣傷人經絡而為痹也西醫云凡人知覺運動必賴腦脊兩髓若骨壓肉壓濃水壓或胞衣壞髓液壞或受寒濕或積敗血則腦髓不安致令腦氣筋妄行其力而風痹之症起矣療法針灸並用第一日刺手太陽經肩外俞穴針入六分二刺天宗穴針入五分三刺臑俞穴針入八分四刺肩貞穴針入五分五刺腕骨穴針入三分左右手共十刺後刺足少陽膽經風市穴針入五分二刺足陽明胃經陰市穴針入三分三刺足三里穴針入五分予用黃帝九針式內之毫針以金作之刺針手法用先瀉後補之法瀉則瀉其有餘之風補則補其氣血之不足入針時醫以右手大指退後右轉瀉以老陰之八數行三周共二十四數再行一飛三退之法令病人呼氣一口再將大指前進左轉補以老陽之九數行三周共三九二十七數再行一退三飛之法令病人吸氣之時以右手出針速將左手緊們其穴勿令氣散血出第二日肩背痛疼之處已去十之三四脈弦緊之象稍微和緩惟項強之症如初即刺督脈經風府穴針入三分二刺足少陽膽經風池二穴針入三分後刺手十宣穴各針一分手法亦行先瀉後補之法以少陰六數瀉之行三周一十八數令病人呼氣一口再補以少陽之七數行七周共七七四十九數令病人吸氣一口以右手出針速將左手緊們其穴惟十宣穴無手法以三稜針刺之微出血第三四日因風雨為針刺避忌之日第五日脈弦緊之象已去十之五六出寸之脈亦不見矣項強之症如失肩臂亦能屈伸而不痛兩腿稍能行走此日針手陽明經之肩髃穴針入八分二針曲池穴入五分三針合谷穴入三分四針手少陽中淆穴入三分手法與第二日同予臨行雲敝人不能久居家中為君診治因煙埠即芝罘有事請君去煙同寓行孫真人阿是穴之法何處痛以何處刺之庶能速愈況君久居家中家事累心久而久之臟腑受病則手續又難一層伊聞言甚喜定於明晨去煙第六日早十時坐輪赴煙同寓靖安公司內下午同伊至澡塘沐浴去時伊枕木枕休息即覺項部微痛少時回寓坐未一刻項強之症陡來此日天雨針家避忌伊痛不能忍不得已刺風府一穴風池二穴大椎一穴入五分風門二穴入五分手法用龍虎龜鳳四法療之手法行完項強之痛已去第七八九日未行刺法見其症日退一日醫者不可每日行針蓋經絡之氣血慣亦不靈矣第十日晨起時風雨交作至下午天晴伊忽受外感症內經云傷寒一日刺風府先針風府穴留三呼二針風池二穴留七呼三針風門二穴留七呼三手法用瀉法而不補第十一日外感症愈惟缺盆骨微痛兩膝寒冷灸手少陽經天髎穴左右各七壯足少陽膽經肩井穴左右灸五壯足陽明胃經三里穴左右各灸二七壯灸病手法用樟木一片厚三分外口寬長一寸四五內口圓直徑三分黃帝云灸不三分是謂徒冤乃言成丁之年艾球之大小也艾葉以五月五日採者為佳用時暴乾入臼搗細篩去塵土撮去艾葉中之硬梗潔白如棉俗名艾絨灸幾壯先將艾絨團成幾球出汗之手不可令團因艾濕難燃再以墨將穴點正以樟木板放於穴上外用絨布一塊內剪一孔套於樟木板之外預防艾火落於肉上外用香油燈即芝麻油一盞鑷子一把水碗一個將艾球於燈火上燃之看艾球焯與木板齊病人必呼痛急鑷下放於水碗之內再取一球輪流灸之莫妙病人忍受一刻之苦待艾球之火已滅則一壯能有十壯之功效灸完時過四五小時灸處必起水泡用金針刺破將水擠出用西藥布貼之外縛以合口膏古人用竹內皮貼之予初用此法多有成瘡之患效果二十天風痹之證已愈至陰曆五月八日回里廉按論證援引詳明取穴確有薪傳非平日研究甲乙經及針灸大咸者不辦此等驗案學者宜注意焉風痹案內科高玉磷住黑龍江南門內病者杜君年五十餘歲錢莊總經理病名風痹原固體肥多濕痰鬱經絡致四肢痹而不仁症侯左半身自頭面至足跟筋骨疼痛皮膚不敢近衣被耳鳴目糊不食便阻診斷脈左關弦澀右關緩結脈證合參此濕痰挾風而作也夫濕生於脾上結為痰氣流於臟腑則湮鬱氣道散於四肢則阻閉經絡凝結既久氣血難通偶感風邪官骸作廢此風痹之所由來也療法內服自配迴天再造丸外用太乙神針藥灸尺澤風市兩穴處方真方迴天再造丸真蘄蛇四兩去皮骨並頭尾各三寸酒浸炙取淨肉兩頭尖二兩出烏魯木齊非鼠糞也如無真者以炙白附子代之真山羊血五錢北細辛一兩龜板一兩醋炙烏藥一兩黃耆二兩蜜炙母丁香一兩去油乳香一兩焙去油麻黃二兩虎脛骨一兩醋炙甘草二兩青皮一兩熟地二兩犀角八錢沒藥一兩焙去油赤芍一兩羌活一兩白芷二兩血竭八錢另研全蠍二兩半去毒防風二兩天麻二兩熟附子一兩當歸二兩骨碎補一兩去皮香附一兩去皮毛元參二兩酒炒制首烏二兩川大黃二兩威靈仙二兩五錢葛根二兩五錢沉香一兩不見火白蔻仁二兩廣藿香二兩冬白朮一兩土炒紅曲八錢萆薢二兩西牛黃二錢五分草蔻仁二兩小川連二兩茯苓二兩殭蠶二兩薑黃片二兩松香一兩煮川芎二兩廣三七一兩桑寄生兩半當門子五錢桂心二錢冰片二錢半辰砂一兩飛淨天竺黃一兩地龍五錢去土穿山甲二兩前後四足各用五錢油浸上藥必須道地炮製必須如法共研細末擇日於淨室內煉蜜和合搗五千杵為丸重一錢金箔為衣外用蠟皮包裹每日一丸服時用四物湯煎送即用當歸三錢赤芍二錢生地錢半川芎八分朝東桑枝五錢酒炒如延累右半邊亦痹者前湯合四君子湯煎送前丸即用潞黨參三錢生於術二錢雲茯苓三錢炙甘草四分朝東桑枝五錢酒炒青松針五錢太乙神針藥方艾絨三兩硫磺二錢臺麝乳香沒藥松香桂枝杜仲枳殼皂角細辛川芎獨活穿山甲雄黃白芷全蠍各一錢上為末秤准分量和勻預將火紙裁定將藥鋪紙上厚分許層紙層藥凡三層卷如大指粗細杵令極堅以桑皮紙糊六七層再以雞蛋清通刷外層陰乾勿令泄氣附用針法用生薑一大片厚二分許中穿數小孔平放應針穴道上用白麵捏一小碗如酒杯大碗底亦穿數小孔將神針藥料析出再加艾絨少許捏作團置於麵碗內點燃平放乾薑片之上頃刻之間藥氣即可透入如覺甚熱將薑片略抬半刻即再放下看碗底藥將燃盡取起另換每一次換藥三四回便可收止每日或一次或二次不拘附穴尺澤穴在時中動脈處即肘彎橫紋當中屈肘紋見金鑑云屈肘橫紋筋骨罅中風市穴端立垂手於股外中指尖到處效果外治用神針一星期一次內服丸藥一顆用藥湯調下約月餘始痊廉按風痹久延每成風緩聖濟謂風緩即癱緩其病因氣血虛耗風寒濕氣痹著筋骨肢體緩弱串疼此案所用迴天再造丸與聖濟大活絡丹藥品大同小異能治肢節痛痹及虛人痿躄服此頗驗而尺部痠病痿軟不仁亦多神應誠肢體大症必備之要方惜配合需時價值太昂不如仍用大活絡丹較為便利以其市肆所備耳太乙神針外治雖亦有效惟血虛生熱者不可擅用風濕成痹案內科陳艮山住南昌塘塍上大街病者陳雨洲之媳李女士進賢人寓南昌病名風濕成痹原因素因性急善怒時患小腹痛溺艱澀頻下白物經水忽斷中醫治之時愈時發後隨夫留學東洋赴醫院治療醫雲子宮有毒必須剖洗方能見效愈後三月且能受孕果如所言分娩後舊病復發再往該院請治醫云無法再剖縱愈而子宮亦傷不能復孕力勸回國旋覺腹中有一硬塊時痛時止時作冷熱白帶淋漓面色黃瘦飲食少進他醫目為大虛症用八珍加龜膠連進數劑忽患周身浮腫白帶更甚陰燒不退群醫束手證候一身浮腫麻痹少腹痛帶下頻頻日夜燒熱舌苔白滑淡灰診斷兩脈沉遲斷為風寒濕三氣合而成痹療法仿仲景治風濕例君以蒼朮澤瀉燥濕佐以麻桂透表去風引用姜皮導至皮膚一劑胸部稍舒舉動稍活再用川萆薢威靈仙澤瀉川烏天麻秦艽麻黃桂枝茯苓皮大腹皮冬瓜皮等藥數劑腫消食迸惟兩腳腫脹未消乃用鰍魚炒蒜頭食之處方蒼朮二錢澤瀉二錢麻黃二錢桂枝錢半姜皮三錢為引又方川萆薢四錢威靈仙四錢澤瀉片三錢制川烏二錢明天麻二錢秦艽二錢麻黃二錢桂枝二錢茯苓皮二錢大腹皮三錢冬瓜皮三錢水二碗煎成一碗溫服效果服初方一劑稍愈再服次方逐漸加減十餘日腫消熱退食亦