致不救良可慨焉此案於肝風大動氣血並上之時開肺滌痰清鎮肝陽使氣火俱潛則上升之血自降肝風頓熄神經即平而諸證自除矣偏頭風案內科熊鼎成住樟樹集善醫院病者楊鶴鳴年四十二歲教員住湖北病名偏頭風原因向無習慣性頭痛因染梅毒曾注射新灑爾沸散即新六零六病愈後偶以飲食不節發生本病證候未病前胃腸時患秘結一日午席未終頭部左半邊發生劇痛牽及上下臼牙亦痛面呈蒼白色夜間痛楚尤甚不能片刻安神呻吟不已症狀險惡診斷脈浮弦而急數弦為風數為熱風熱相搏故疼痛劇烈梅毒亦能發生偏頭痛病者雖曾用注射劑療治必系餘毒未清又凡西藥之有毒者療病雖得奇功每發生副作用病者頭痛以注射灑爾沸散後而發此亦一重大原因總之病名偏頭風脈又弦數可徵無論其病因如何必主肝經風火為殃無疑肝屬木為風臟位東方故風病多發於左也療法天麻為頭風聖藥尋常偏頭痛佐以白芷川芎等味治之立應此症有上種種原因加以胃腸秘結益足以使頭痛加劇故雖用前藥而病仍不解風火交煽勢將燎原莫制非厲行平肝瀉火病必危殆方宜加入蘄蛇蚯蚓強有力之追風藥並重用硝黃清其腸胃自愈處方明天麻三錢香白芷四錢川芎三錢蘄蛇錢半白頸蚯蚓錢半生錦紋三錢芒硝三錢效果服藥一劑未十分鐘頭痛立止二劑後痊愈並未再發凡遇此證病輕慢性者去大黃芒硝新病用此藥到病除真神方也若纏綿日久風毒深入腦髓神經非多服不為功患此者宜豫為之加意焉廉按發明病理哀中參西方亦極有力量宜乎兩劑奏功也腦風頭痛案內科王經邦住天台柵門樓病者鄭姓年五十二歲業商住象山石浦病名腦風頭痛原因由於風邪入腦證候頭連巔痛經十閱月百方無效診斷脈浮緩而大脈證合參斷為腦風頭痛療法蒼耳治頭風為君佐藁本以治頂痛處方蒼耳子二錢川藁本一錢效果服一劑明日發厥正不勝邪人謂升散藥之咎殊不知蘇後其病遂失廉按經謂風氣循風府而上則為腦風風從外入令人振寒汗出頭痛治在風府此案頭連巔痛確是腦風頭痛方用蒼耳能使清陽之氣上升巔頂為君藁本專治巔頂痛為佐藥雖簡單卻合病機宜其一擊而中病邪即退頭風害目案內科張錫純住鹽山西門內病者王君年近五旬高等檢察廳科員住奉天病名頭風害目原因處境不順兼辦稿件勞碌漸覺頭疼日浸加劇服藥無效遂入西人醫院治旬日頭疼未減轉添目疼證候越數日兩目生翳視物不明自言腦疼徹目目疼徹腦且時覺眩暈難堪之情莫可名狀診斷脈左部洪長有力脈證合參知系肝膽之火挾氣血上衝腦部腦中血管因受沖激而膨脹故作疼目系連腦腦中血管膨脹不已故目疼生翳且眩暈也因曉之曰此腦充血症也深究病因腦疼為目疼之根而肝膽之火挾氣血上衝又為腦疼之根療法當清火平氣引血下行頭疼愈而目疼生翳及眩暈自不難調治矣其目翳原系外障須兼用外治之法用磨翳藥水一瓶日點眼上五六次自能徐徐將翳盡消處方懷牛膝一兩生杭芍六錢生龍骨六錢打生牡蠣六錢打代赭石六錢生打烏玄參四錢川楝子四錢龍膽草三錢生甘草二錢磨取鐵鏽濃水煎藥附磨翳藥水方生爐甘石一兩蓬砂八錢薄荷葉三錢蟬退三錢帶全足去翅土上藥四味先將前二味藥臼搗細再將薄荷蟬退煎水一大鐘用其水和所搗藥末入藥缽內研至極細將浮水者隨水飛出連水別貯一器待片時將浮頭清水仍入缽中和所餘藥渣研細仍隨水飛出如此不計次數以飛淨為度若飛過者還不甚細可再研再飛以極細為度制好連水貯瓶中勿令透氣用時將瓶中水藥調勻點眼上日五六次若目翳甚厚已成肉螺者加真藏硇砂二分另研調和藥水中此方效力全在甘石生用然生用則質甚硬又恐與眼不宜故必如此研細水飛然後可以之點眼效果服一劑覺頭目之疼頓減又服兩劑其頭疼目疼眩暈皆愈視物亦較真廉按頭風害目即西醫所稱之腦充血也近世眼科專家雖不知腦充血之病理然知其為肝熱生風逼血與氣並走於上輕則為頭目痛重則為暈厥其方用羚角石決明真珠母生玳瑁石蟹桑葉滁菊穀精草等潛鎮清熄亦頗有效外用切法以極細毫針十數支紮成一把於兩太陽及腦後輕輕刺切先出黃水繼放瘀血約兩星期一切輒多默收敏效余見之屢矣此案直斷為腦充血用降血下行之法大致與眼科相同而藥價則便宜多多矣經濟困難者不可不知有此法惟重用牛膝一味為降血導下之峻品必先查問明白男則有否遺精女則有無血崩素因如其有之慎毋重用以招謗後學宜注意之頭風害目案內科何拯華紹興同善局病者張謝氏年三十六歲住紹興偏門外張家葑病名頭風害目原因體素肝熱適感風溫頭痛屢止屢發釀變頭風醫者不辨病源誤用頭風套方如荊防藁芎等辛燥升散遂巔痛而延累左目證候時而頭巔疼時而左目痛左目痛輕則巔疼甚巔疼甚則眼痛輕互相消長累月不愈甚至肝熱衝動水輪當瞳人處忽變白色忽微藍色忽而縮小忽而昏蒙診斷脈左浮弦搏數右浮洪或散大沉按細澀舌邊紫赤脈證合參病之本在於肝肝之脈絡於巔肝之竅開於目而其所以互相消長者病之標則在於腦腦有十二對神經其肝熱沖激於頭巔神經則頭巔疼沖激於左目神經則左目痛也其衝動水輪當瞳人處而形色乍變者以目系入腦腦之精為瞳人全賴玻璃體中之水晶樣液以保護之今被肝熱沖激深恐明角罩中之水晶樣液被蒸沖而渾則瞳人生翳迷濛不能明辨三光五色矣故世有一目失明而頭風頓愈者殆因腦中之血熱已從目竅排泄而出歟療法首當潛鎮清熄故以羚角石決珠母等具有靈動之性質潛鎮肝陽以熄內風為君而羚角尤擅清肝明目直達巔頂善平腦熱之長入於鹹平鎮潛之中奏功尤速然諸痛皆屬於心心熱則肝熱肝熱則腦熱故又以童便川連鹹苦達下以瀉心白芍膽草酸苦泄火以瀉肝為臣佐以酒炒生牛膝取其上行入腦下行納沖善引頭目之血熱從速下降使以青葙子隨羚角直清腦熱能散瞳人處昏蒙也處方石決明一兩生打珍珠母一兩生打小川連八分龍膽草一錢生白芍五錢生淮牛膝五錢酒炒青葙子三錢羚角尖一錢磋研極細藥湯調下清童便兩鍾分沖次診前方連服四日巔疼眼痛悉除當瞳人處變像亦減十之六七舌邊紫轉紅色脈搏浮洪弦數均已大減惟視物不甚清爽者以目得血而能視目血為肝熱消耗精光不足故也法當滋肝血以益腎陰次方陳阿膠錢半烊沖生白芍四錢大生地四錢大熟地四錢甘杞子錢半黃甘菊二錢沙苑子三錢鹽水炒菟絲子三錢鹽水炒穀精珠錢半羊烏珠一對效果次方連服十劑肝血充而腎陰復目自還光而明矣廉按頭風害目惟婦女為最多皆因血鬱生熱血熱生風風動而逼血上腦則腦充血腦充血則神經被逼著於頭巔之知覺神經則痛在頭巔著於眼部之知覺神經則癰在眼此新發明之病理也此案論病探源一眼覷定肝腦則驪珠在握而選藥處方自然精切初方妙在羚角羚之靈在角角之靈在腦其性涼而味鹹故善平腦熱其色白而氣腥故能消肝肺血熱瘀積凡內障之腦脂下注瞳神變色外障之黑珠白珠雲翳遮厚等證果能重用此藥奏效如神其清肝明目熄風鎮痙尤有特長惜近時價值太昂如欲代之惟羖羊角一味即俗稱黑羚羊性質功用與羚角大同小異價又便宜大半也接方妙在穀精珠羊睛兩味凡眼病諸症悉退滋養日久而視物尚不清爽者其因有二一由靈竅不通一由睛光不復穀精珠善通靈竅羊睛善能還光所以十劑即能回覆原狀者此也目風案內科何拯華紹興同善局病者凌長友年三十六歲住凌家岸頭病名目風原因風熱上受首先犯目證候頭痛惡風身熱自汗目白眼瞼紅腫生眵或癢微痛迎風流淚視物羞明診斷脈右浮數左浮弦舌邊尖紅苔薄白色脈合參內經所謂風入系頭則為目風眼寒也雖云眼寒實則眼受風熱也新醫學謂之沙眼究其病理淚液為風熱所逼則分泌淚液較速故一迎風即流淚其流出之淚液被風燥熱耗則漸稠而或癢生眵而微痛目中風熱既盛則目睛之光線弱不克抵抗外來陽光故羞明其脈浮弦而數者浮弦屬風數為風熱內逼而上盛也療法先用硼酸水洗目內服則以清風散火湯為主蓋以風氣通於肝肝開竅於目故用桑菊荊丹辛涼散風以泄熱為君風熱盛則血瘀痛癢故以歸尾赤芍紅花破瘀開結為臣然目白屬肺眼瞼屬脾胃故佐以黃芩清上焦焦梔清三焦使肺脾胃之瘀熱上從氣道下從水道排泄而去則風熱清而痛癢自除使以夏枯花散鬱結者須知眼病多鬱結無論紅腫痛癢必以開鬱散結為先也處方冬桑葉二錢荊芥穗一錢歸尾錢半片紅花六分焦山梔三錢滁菊花二錢粉丹皮錢半赤芍錢半酒炒片芩錢半夏枯花錢半效果連服四劑諸證皆減惟紅痛未除原方去芥穗梔芩加酒炒生川軍酒洗龍膽草各錢半疊服三劑痛癢亦止目尚羞明原方再去生軍膽草歸尾赤芍加細生地四錢白歸身一錢生白芍三錢鹽水炒甘杞子一錢生羊睛珠一對俾目得血而能視連進十劑光線復原而愈廉按內經謂五臟六腑之精華皆上注於目目非自病必固外感或因內傷以致臟腑有偏寒偏熱偏盛偏衰影響於目而始病故醫必查明病因因外感而病目者治愈外感則病根除而目病自愈何用眼藥為因內傷者亦然須知病因為治療要訣即為治萬病之定例病因既明無論其病態多端見之確守之定投藥直攻效如桴鼓此案因風病目當然以散風清目為首要方亦面面顧到輕穩靈通惟此病愈後切忌辛辣酒物助癢延爛試觀眼病爛癢喜食辛辣者未有不癢爛更甚也目風眼癢案內科何拯華紹興同善局病者孔春林年念八歲業農住南門外謝墅村病名目風眼癢原因素嗜辛辣酒物適衝風冒雨遂發目疾證候眼瞼作癢似爛非爛頭重怕風四肢倦怠診斷脈左浮弦右軟滯舌苔白膩浮弦為風風動則癢軟滯為濕濕重則爛苔白而膩尤為風濕觸目之明證也療法內外並治外用洗藥內用荊防蒺蟬疏風止癢為君赤苓蕤仁去濕收爛為臣然眼癢必擦爛亦必揩揩擦則發電生熱故重用滁菊穀精以清熱散風為佐其爛者必因風濕風濕盛必有留瘀故用紅花為使以消散瘀血也處方荊芥穗錢半青防風一錢白蒺藜錢半淨蟬蛻八分赤苓三錢蕤仁霜一錢滁菊花二錢穀精珠一錢片紅花七分洗方羌活錢半防風錢半蕤仁錢半生桑皮三錢淨膽礬二分如洗時有刺激性改用硼酸水放入白礬少許常在癢爛輕輕頻抹亦妙效果三劑輕減再進三劑而痊廉按目風癢爛之症其因雖多總不外受風則眼癢兼濕則眼瞼爛此案內外二方雖皆清穩有效若眼瞼有泡點高起或生椒粟瘡等必須用毫針輕輕刺破方能立時止癢惟病者須忌辛燥油膩更避衝風冒雨則其病庶可痊愈目風流淚案內科何拯華紹興同善局病者楊謝氏年三十歲住紹興昌安門外楊江病名目風流淚原因內因肝經鬱熱外因感冒溫風證候初起頭脹微覺怕風繼即兩目紅腫眵淚交流流下面皮自知燙灼診斷脈左浮弦兼數舌邊紅苔白薄此迎風流淚之症初但為風淚熱淚久則變為虛淚視物羞明也療法先用洗目七星散以治外繼用散風止淚湯以治內方用荊芥蔓荊菊花為君以清散其風邪草決蕤仁丹皮為臣以泄熱而止淚然非歸芍夏枯無以養肝血而開鬱熱故又以為佐而使以炒車前者取其利竅下滲收吸淚管之作用耳處方荊芥穗八分滁菊花二錢蕤仁一錢白歸身一錢夏枯草錢半蔓荊子二錢草決明三錢丹皮錢半生白芍二錢炒車前錢半洗方洗目七仙丹為治風熱流淚發癢之輕劑防風蟬衣銀花薄荷各一錢散紅花四分淨膽礬二分煎湯先熏後洗效果風外並治三日減輕五日兩目復原而愈康按流淚之症有三一為風淚無故見風即流淚不能自禁二為熱淚眵淚交流紅腫熱癰三為虛淚一交秋冬常流冷淚此案處方用藥但為風淚熱淚者設法若治冷淚則無效風火眼疾案內科王理堂住九江西門外病者桂蘭英婦人年二十八歲蕪湖人住九江張官巷病名風火眼疾原因感受風熱首先犯目證候左眼赤痛流淚羞明大便秘小便赤診斷脈浮數舌苔黃此即含有傳染性之時眼痛也療法先用桑菊紅花湯熏洗兩目內服以荊蟬桑菊密蒙青葙清散風熱為君然赤痛由熱鬱血分故以茺蔚赤芍明砂行血止痛為臣佐以酒浸生川軍使血熱從下焦分消穀精蕤仁明目止淚使以蒺藜通絡以活血也處方荊芥穗一錢二分蟬衣八分去翅足霜桑葉一錢白菊花錢半密蒙花一錢青葙子一錢二分茺蔚子錢半夜明砂二錢穀精珠錢半酒浸生川軍八分赤芍二錢白蒺藜錢半蕤仁五分去油水煎服次診連服三劑眼白己漸退惟眼珠尚有紅絲痛而羞明流淚改用杞菊四物湯加味涼血泄熱以止痛次方鮮生地三錢生赤芍二錢五分當歸鬚錢半撫川芎四分白池菊三錢北枸杞一錢白蒺藜一錢八分川紅花八分四制香附五分打茺蔚子錢半淨蟬衣五分淮木通六分水煎服三診昨服方三劑大效白眼珠紅絲退淨眼痛痊愈今將四物湯前方去赤芍換白芍生地換熟地歸鬚換歸身加桑菊養血驅風以善後三方大熟地四錢杭白芍二錢五分當歸身三錢撫川芎五分冬桑葉八分白菊花一錢五分水煎服二劑痊愈效果服初方白眼珠紅退尚有紅絲服二方紅絲退淨眼痛除服三方眼明如常廉按此治風火時眼妙在生川軍一味則升散與泄降互用為眼科表裡雙解之良法虛證不宜目風生翳案內科範琴若住金華清渠十字街病者江銀仙女年十五歲體瘦住金華清渠病名目風生翳原因初由風熱侵目失治而內陷生翳證候兩目微紅不痛但見白翳侵睛目多羞澀難開視物不清診斷脈浮弦澀浮弦屬風澀屬瘀熱此由風熱盤踞目白目白屬肺肺熱絡瘀而生翳也療法外用搐鼻散以宣肺竅內服湯藥以白及木賊蟬退蛇蛻去翳為君歸地荷芎枯芩活血解熱為臣佐以桔甘宣肺氣以達膜使以砂仁車前運氣化以泄餘熱也處方白及二錢木賊草錢半淨蟬退七個蛇蛻五寸歸尾一錢細生地三錢蘇薄荷八分川芎七分枯黃芩一錢酒炒苦桔梗一錢甘草梢五分生砂仁三粒車前子八錢效果初診二劑眼轉紅腫略痛中用手術外治末診二劑日漸翳去腫退目光回覆而痊廉按此治風熱生翳之方法若實熱與陰虛皆忌風藥助火劫陰故醫必查明原因隨證發藥為首要喉風案兒科孫少培住南京倉巷病者孫西海即少培次子年五歲住南京倉巷病名喉風原因平素口腹不慎葷腥痰滯俱重阻遏氣機釀痰為咳喉音頓失證候咳有痰聲痰難唾出始起即覺音啞至夜半轉為音嘶次晨視其喉下關微有白點診斷喉風一證與白喉相近每當盛行之時死亡載道徵諸喉科專書雖載有各種喉風圖考及治法遇有是病發生時嘗依法施治結果則收效甚少次男西海患是病日暮時忽咳嗽至夜半漸覺音嘶痰聲亦響心疑為喉風次晨起急視其喉蒂丁下垂喉關微有白點動則生喘誠為喉風重證乃邀中醫濮鳳笙君西醫歐陽曉堂君共商治療方法濮君先至診脈詫曰病人氣息雖粗精神甚爽且行走如常喉中微有白點以證象論何至六脈皆閉斷為喉風初期六脈俱閉者乃痰火壅遏空竅閉塞蓋肺主一身之氣脈經云氣動脈應陰陽之義是病痰火上干清肅之令不行故六脈俱閉也斯時用藥恐有緩不濟急之虞適歐陽君亦至診視以後公決先用血清注射法以開其閉手術既畢越一小時脈即回濮君復審察一度曰證雖險惡所幸醫治尚早頰紅唇絳者肝胃伏火為虐內經謂一水不能勝二火然陽盛者陰必虛今按脈滑大而實滑者痰也大者虛也實者胃實也書云下之則愈惟斯時險象已過用藥宜遵內經補上治上制以緩之義爰共商治法製法如下療法湯液療治以糯米專於補肺並清金化熱之沙參為君甜杏仁川貝母止嗽化痰為臣海浮石活痰定喘為佐更用花粉止渴療喉痹白蜜潤燥通幽為使處方糯米一撮南沙參三錢甜杏仁二錢海浮石二錢川貝母三錢花粉三錢先以糯米煎湯代水煨藥加入白蜜三錢沖服效果照方一劑服完喘即平次日濮君來診則曰病已轉危為安惟咳嗽音啞飲水作嗆肺虛顯然補肺之品無有出糯米之右者食粥作嗆何妨煮爛飯與之以後逐日來診但審察其形狀而已逾半月喉音乃復廉按喉風有實有虛此治肺虛喉風之方法故仿前哲錢仲陽阿膠補肺散意方亦清穩濮鳳笙君素以喉科名品學兼猶人頗誠實此案所述決非謊語後學不必以糯來黏膩致生疑惑也纏喉風案內科燕慶祥住永修官塘區病者姜孔印年四十餘歲江西永修人病名纏喉風原因其人素好飲酒奔走路途過多感受秋燥而發證候喉忽紅腫項外亦然湯水不能下咽痰涎壅塞聲如拽鋸發後約四句鍾時呼吸幾絕忽又發狂手舞足蹈六七人不能欺住診斷雖因其狂不能診脈而證實見表面一視便明蓋由肺胃積熱復感風燥則明明為纏喉風療法此為急症不可緩圖即囑其用多數人將病者撳住用針刺兩手少商穴隨用溫水兩鍾桐油兩匙將雞翎蘸油探入喉內連探兩次湧出許多痰涎病勢稍平處方生石膏一錢硼砂六分牙硝三分膽礬三分元明粉二分梅冰片二分名白絳雪散加牛蒡子八分射干一錢青黛六分共研細末用筆管吹入喉中三次其腫已消一半接方牛蒡子一錢青連翹二錢煅石膏六分川貝母二錢元參三錢蘇薄荷一錢金銀花二錢片芩一錢名加減清咽利膈湯外加紫雪丹五分射干五分藥湯調下效果服二劑病即痊愈廉按纏喉風一證多屬風痰纏喉其來也速其去也亦速全在善治者辨證確當治法敏捷方能默收捷效此案尚屬輕證故但用一外吹一內服兩方奏功馬脾風案兒科張際春住泰興北城外病者李伯壎子年四歲住泰興王坔病名馬脾風原因赤痢延久未節飲食致痰滯內蘊風寒犯肺證候先咳嗽數日喘生倏忽聲嗄鼻扇身熱面淡白診斷指紋隱伏舌苔厚膩病因風寒而痰閉於肺經曰諸氣膹郁皆屬於肺肺合皮毛為氣之主風寒既然外束肺氣焉得舒展所以內蘊之痰合邪而愈壅氣道愈塞塞甚則危矣療法急用葶藶之苦大瀉肺氣大棗之甘以保胃氣麻黃辛開杏仁苦降甘草甘緩使肺受之邪無可逗留其中陳皮茯苓以利其氣蘿蔔汁薑汁以豁其痰惟恐藥不瞑眩不足以救危疴於頃刻按本草牽牛子主治馬脾風症故加牽牛子之猛助諸藥之力俾可從大便而下也處方水炙麻黃八分葶藶子二錢炒廣皮錢半光杏仁三錢薑汁三滴沖黑白醜二錢炒赤茯苓三錢炙甘草八分蘿蔔汁一小匙沖大棗五枚效果一劑大便下白黏如痰痰喘聲嗄頓平三四日後痢亦隨清廉按萬密齋曰午屬馬為少陰君火心主熱脾主虛心火乘肺脾之痰升故肺脹而暴喘謂之馬脾風馬脾風者肺脹也上氣喘急兩脅扇動鼻張悶亂喘喝聲嗄痰涎壅塞其症危急宜急攻之此案外因風寒內因痰滯故用麻黃湯去桂枝開肺氣以散風寒用藶棗陳苓卜姜二汁降肺氣以豁痰滯又佐以黑醜之氣味猛烈使痰濁從大便而下較之但用牛黃奪命散尤為周到與萬氏以葶藶丸去防己加大黃除肺之熱合小陷胸湯除肺之痰一治風寒挾痰而暴喘一治風熱挾痰而暴喘臨危取勝異曲同工肺風痰喘案兒科何拯華紹興同善局病者王姓孩年一歲零兩月住琶山病名肺風痰喘原因素因兒衣太厚內有伏熱繼因風傷肺而暴發證候身熱面紅頓咳抱首痰鳴氣壅忽然大喘胸高鼻扇右脅陷下診斷脈不足憑看指紋青浮而滯此內經所謂乳子中風熱喘鳴肩息龔雲林所云俗稱馬脾風也小孩最多病勢最急而險療法必先辛涼散其風故以薄荷為君辛潤豁其痰故以梨汁薑汁為臣然病勢如此急烈不得不用急救之藥故以保赤散為佐庶能降痰如奔馬使以白蜜不過緩保赤散之烈性而已處方薄荷霜一釐雪梨汁一杯生薑汁兩滴淨白蜜一小匙上藥和勻器盛重湯燉一時許調下保赤散三釐效果一劑即大吐痰而熱退二劑喘嗚已平即能吮乳原方去保赤散薄荷霜加鮮桑瀝一小匙疾競痊瘳廉按小兒風熱暴喘較之各種疾喘尤為難療俗稱馬脾風者言其病勢之危急也兒科名醫萬氏密齋曰午屬馬為少陰君火心主熱脾主虛心火乘肺脾之痰升故肺脹而喘謂之馬脾風馬脾風者肺脹也上氣喘急兩脅扇動鼻張悶亂喘鳴聲嗄痰涎壅塞其症危惡宜急攻之若至胸高肩聳汗出發潤則不可治矣此案方用保赤散善能通氣開痰先使痰從口吐出繼則從大便而出適合急攻之法調入於降痰四汁飲之中以柔濟剛處方配合頗有巧思非雜湊成方者可比風嗽案內科黃袞甫住金山呂巷病者吳右年三十四歲僱工住楊秀浜病名風嗽原因風水交襲表裡不宣所致證候咳嗽漸作咳痰黏膩氣逆不舒額上略有微汗診斷脈右浮弦左遲舌上白苔辨證察脈知屬風水之咳嗽證也夫肺主皮毛皮毛者肺之合也風水由皮毛而侵及肺風邪既不外解水邪又不下滲壅閉上焦窒礙呼吸動則始咳咳極則喘療法方用杏仁宣表細辛乾薑半夏化飲五味子茯苓紫菀款冬降氣肅肺治風水嗽之未化熱者非辛溫之藥其孰能愈之處方苦杏仁三錢淡乾薑五分白茯苓三錢生白果十粒北細辛三分五味子五分款冬花三錢炙甘草三分製半夏三錢炙紫菀三錢效果服藥三劑而咳痊愈廉按風寒外搏水飲上衝小青龍湯加減卻是對證良方額上既有微汗去麻黃加紫菀茯苓宣肺利水調劑亦有斟酌風咳失音案兒科孫少培住南京倉巷病者丁貴之女年四歲住南京碑亭巷口病名風咳失音原因春病風溫病已小愈越旬日忽咳嗽音啞某醫誤用溫表次日即大汗大喘證候面色青黯頭汗如注咳喘音嘶飲水作嗆目上視不得眠頭傾肩抬口鼻只有出氣診斷脈兩手俱不應指病勢甚危其聲啞者由於肺熱熱盛則熬液成痰痰因火而生火因痰而熾痰火交結最易障礙清竅以致變證叢生肺失清肅之權也前哲費建中雲肺虛者咽水嗆喉今仿其意作虛脫證斷療法肺虛必先補其母故用潞黨參淮山藥補脾為君阿膠糯米補肺為臣杏仁兜鈴清金潤肺麥冬五味斂肺定喘為佐炙甘草雞子白和中清音為使處方潞黨參五錢淮山藥五錢生打陳阿膠三錢烊沖杜兜鈴錢半炙甘草八分甜杏仁三錢原麥冬二錢五味子五分雞子白二枚生糯米五錢煎湯代水效果一日連服兩劑頭煎次日復診喘平汗止語言如常惟咳唾黏痰肺虛而燥進甘鹹潤燥法原方去黨參淮藥兜鈴五味等四味加暹燕窩一錢北沙參川貝水晶糖各三錢疊進三劑再邀診脈六脈軟滑有神目灼灼有光囑其不必服藥用光燕窩一錢葡萄乾念粒真柿霜一錢調養旬余而愈廉按此因風咳過用散削肺氣驟虛而變看似危險實則根本來漓故用參麥散合阿膠補肺散大劑培元挽回得及若因病久元虛見此現狀則肺癆末路決難救濟此種方法亦如水投石矣風哮案兒科何拯華紹興同善局病者朱姓兒年九歲住朱家灣病名風哮原因素有奶哮由風傷肺而發證候初起惡寒發熱面赤唇紅繼則痰涎上壅喉中䶎齁如水雞聲或如拽鋸鼻扇口乾二便不利診斷脈右浮滑搏數左浮弦舌苔黃白相兼脈證合參此由於痰火內郁風寒外束內經所謂肺病者喘咳逆氣身熱不得臥上為喘呼是也療法非麻黃不足以開其肺竅非石膏不足以清鎮痰火故以為君然痰為有形之物故又以橘半蔞枳為臣辛滑滌痰化濃為薄化薄為無佐以杏仁下氣降痰使以甘草調和諸藥也處方麻黃五分光杏仁錢半生石膏四錢研細清炙草五分廣皮紅一錢姜半夏錢半栝蔞仁四錢杵生枳殼一錢生薑汁四滴淡竹瀝兩瓢分沖效果一劑知二劑諸證皆減後用清金丹萊菔子一兩拌炒豬牙皂五錢研細薑汁竹瀝打麵粉糊丸如綠豆大每服十丸朝晚各一次用金橘餔一枚剪碎泡湯送下調理旬日而痊廉按小兒奶哮往往由兒患傷風乳母不知忌口凡葷酒油膩鹽醋酸鹹姜椒辛辣芥菜麵食等一概亂吃以致乳汁不清醞釀而成成則頗難除根此案湯丸二方確切病情宜乎投之輒效惜近世畏麻黃石膏如虎不肯放膽照服耳風瘧案內科何拯華紹興同善局痛者韓瑞寶年三十五歲業商住東關鎮病名風瘧原因夏令受暑潛伏膜原至秋感涼風而發證候風襲於表頭疼自汗淅淅惡風暑伏於裡寒少熱多其狀如瘧便溏溺熱診斷脈右浮弦左浮滯沉數舌邊尖紅苔白兼黃脈證合參內經所謂夏暑汗不出者秋成風瘧也療法初用辛散開達達原飲加減繼用和解表裡柴芩湯加減終用養陰開胃麥門冬湯加減處方荊芥穗錢半草果仁五分花檳榔一錢焦山梔三錢防風一錢卷川樸一錢木賊草一錢淡香豉三錢次方川柴胡一錢生枳殼一錢廣皮紅八分青子芩錢半苦桔梗一錢仙露夏錢半鮮生薑一錢細芽茶一錢陰陽水煎藥三方原麥冬錢半北沙參一錢北秫米三錢荷葉包煎仙半夏一錢鮮石斛二錢鮮稻穗二支效果服初方一劑頭痛除惡風已寒熱分清服次方二劑寒熱雖減而不止原方送下半貝丸三分一日兩次四服而瘧住終服第三方連進三劑胃氣健而病愈康按凡瘧疾之因外感不外風寒暑濕內傷不外痰食此案雖名風瘧但暑為內因風為外因先解其外後清其內此用藥一定之步驟其得力在第二方和解清透效果昭然伏風陰瘧案內科莊虞卿住麗水第十一中學校病者呂仲遠年逾三稔體弱住太平坊病名伏風陰瘧原因平素體衰因感風伏而不發直至深秋發為陰瘧證侯寒熱往來三日一發汗多苔白飲食少思診斷脈左寸虛大右關弦緩脈證合參此由伏風而變三陰瘧也夫胃者衛之源脾者營之本飲食少思脾胃之衰弱可知正因脾胃累虛營衛不和而作寒熱正內經所謂秋成風瘧也療法只宜脾胃雙補不必治瘧俾營衛調而寒熱自已此從源本施治上乘法也用桂枝黃耆護衛歸芍養營參草補益脾胃薑棗調和營衛處方川桂枝一錢生黃耆三錢當歸二錢生白芍二錢西潞黨二錢清炙草一錢生薑一錢大棗三枚效果十日寒熱勢衰繼以補中益氣湯善其後兩旬瘧遂痊愈廉按陰瘧之為病陽分大虛必挾寒陰分大虛必挾熱況汗多苔白飲食少思脾胃之虛寒尤為顯著方用桂枝湯加參耆當歸營工雙調確是對證療治自有奇功可據也寒甚者丁香附子亦可加入風泄案內科何拯華紹興同善局病者陳麗生年三十歲業商居柯橋東官塘病名風泄原因暮春外感風邪不服藥而病愈至首夏頓病飧泄證候腸鳴腹痛一痛即瀉瀉多完穀溺清而短診斷脈弦而緩左強右弱苔薄白滑憑脈斷證即內經所謂春傷於風夏生飧泄也腹痛而瀉出完穀者肝橫乘脾也故經云脾病者虛則腹滿腸鳴飧泄食不化療法初用劉氏朮芍陳防等止其痛瀉為君佐川芎升散其伏風炒麥芽消化其完穀繼用五味異功散升補脾陽為君佐以白芍煨姜酸苦泄肝處方炒於朮二錢陳廣皮一錢川芎一錢煨防風一錢生白芍錢半生麥芽錢半荷葉一錢剪碎拌炒次方炒黨參錢半浙茯苓錢半炒白芍二錢煨姜五分炒於朮二錢新會白一錢清炙草六分效果進第一方兩劑痛瀉大減惟肢懈無力胃納甚鮮進第二方三劑痛瀉止而胃氣健終用飯蓮子每日嚼十四粒調養七日而痊廉按風泄即腸風饗泄內經所云久風為飧泄此症甚多醫者往往誤認為食積化瀉或誤認為濕積所致而不知伏風之為病以致邪氣流連乃為洞泄不可挽回者數見不鮮此案引經證醫探源用藥妙在劉草窗法確是飧泄專方用多奏效接方用錢氏異功散加味愜合清氣在下則生飧泄之經旨故為醫者不可不精究內經也風腫案內科何拯華紹興同善局病者徐水生年念五歲業商住紹城西郭門頭病名風腫原因素因水停於下現因風襲於上而發病證候頭痛惡風面目浮腫腫而且亮兩手微厥足腫而冷便溏溺短診斷脈浮緩沉遲舌白滑兼淡灰脈證合參浮緩為風風性陽輕清上浮故面目獨腫沉緩為水水性陰重濁下凝故足腫且冷朱丹溪曰面腫屬風足腫屬水洵不誣也療法麻附細辛湯合五皮飲主之使風挾寒水之氣從皮裡膜外排泄而出則上下之腫自然分消而去然非溫不能蒸水化氣泄氣出汗故用辛附之辛熱助麻黃以發風水之汗若五皮飲不過以皮達皮取其消皮腠之積水而已處方麻黃一錢北細辛六分生桑皮四錢冬瓜皮四錢淡附片八分新會皮錢半浙苓皮四錢五加皮三錢效果連服二劑周身津津汗出頭痛及面目腫皆除原方去麻附加絲瓜絡四錢用路路通十個絲通草五錢煎取清湯化水煎藥疊進三劑小便暢利足腫全退而愈廉按此從仲景華佗之成方脫化而出仿內經複方之法凡治風挾寒水化腫投無不效其妙處全在麻黃一味惟現在紳富病家往往畏麻黃而不敢服實則藥在對症對症即是穩當非用通套疲藥以塞責謂之穩當也就余所驗凡發風寒之汗麻黃只用四五分至六七分即能出汗發風水之汗非一錢至錢半不能出從未犯過汗亡陽之弊奉勸病家竟可放膽而服不必畏忌歷節風案婦科何拯華紹興同善局病者何家福之妻年四十六歲住峽山病名歷節風原因素因血氣虛寒現因風挾寒濕直中血絡遍歷關節而成證候歷節攣疼痛不可忍屈伸不得難以轉移發作不熱晝靜夜劇診斷脈左浮弦急右沉弱舌苔白膩脈證合參張仲景所謂沉即主骨弱即主筋浮則為風風血相搏即疼痛如掣歷節痛不可屈伸是也療法烏頭桂枝湯加減方以烏頭含麻醉性善能麻痹神經以止痛故用之為君臣以黃耆托裡達表通行三焦麻黃開皮達腠上行外通使肢節留伏之寒濕一齊外出佐以桂枝橫行手臂牛膝下行足膝皆有活血除疼之作用使以芍甘白蜜酸收甘潤以監製之處方制川烏八分生黃耆錢半淨麻黃八分川桂枝一錢淮牛膝三錢生生白芍錢半清炙草八分上藥用水兩碗白蜜一匙煎成一碗溫服次診前方連服兩劑痛雖漸減而屈伸不利如前形氣羸弱頗難支持脈仍沉弱惟左手浮弦已減法當通補兼施八珍活絡湯主之次方麗參鬚八分浙茯苓三錢全當歸三錢酒炒生地二錢薄桂五分生於術錢半清炙草六分羌獨活各五分酒炒赤芍錢半川芎一錢蜜炙片紅花六分制川烏三分酒水各一碗煎服效果疊服四劑攣痛已除手足亦可屈伸人能支持步履可扶杖而行遂囑其服史丞相遇仙酒一日兩次每服一小酒鍾旬余即痊廉按金匱要略分歷節病因有四一因汗出入水中二因風血相搏三因飲酒汗出當風四固飲食味過酸鹹此案即風血相搏為歷節癰風之總因男婦犯此者最多病源千金外臺均謂之歷節風以其痛循歷節故曰歷節風甚如虎咬故又曰白虎歷節風初方用烏頭桂枝湯必辨明風挾寒濕搏其血絡乃可引用接方用八珍活絡湯亦必其人血氣虛寒始為相直故醫者治病必先求其受病之原因及病者之體質然後可對證發藥以免貽誤此為臨證之第一要著歷節痛風案內科嚴紹岐住紹興昌安門外官塘橋病者張兆榮之妻年四十一歲住昌安門外楊港病名歷節痛風原因素因血虛肝旺暮春外感風熱與血相搏而暴發證候頭痛身熱肢節攣疼不能伸縮心煩自汗手指微冷夜甚於晝診斷脈浮弦數左甚於右舌紅苔白薄滑脈證合參此巢源所謂歷節風之狀由風歷關節與血氣相搏交擊歷節痛不可忍屈伸不得是也療法凡風搏血絡瘀筋痹肢節攣痛者當專以舒筋活絡為主故重用羚角為君筋攣必因血不榮養即以歸芍川芎為臣然恐羚角性涼但能舒筋不能開痹少用桂枝之辛通肢節為反佐而使以薄荷牛蒡連芽桑枝者疏風散熱以緩肢節之疼痛也處方碎羚角錢半先煎當歸鬚一錢生赤芍錢半川芎八分桂枝尖三分蘇薄荷七分炒牛蒡一錢連芽桑枝一兩效果連服三劑外用馮了性酒沒透絨洋布以搽擦諸肢節痛處汗出溱溱身熱痛大減手足亦能屈伸惟神煩肢麻溺秘少寐即將原方去歸芎桂枝羚角改用八分加淡竹茹三錢鮮竹葉心三錢辰砂染燈心三十支蓮子心三十支又進三劑夜能安眠溺通麻除終用炒桑枝二兩馬鞭竹一兩鮮茅根一兩天津紅棗四枚每日煎服調理而痊廉按歷節癰風因於寒者辛溫發散因於熱者辛涼輕揚固已但宜分辨癰狀施治如肢節攣痛伸縮不利者血虛液燥也法宜滋血潤燥四物湯加首烏木瓜杞子甘菊肢節腫痛遇陰雨更甚者風濕入絡也法宜驅風活絡大羌活湯加小活絡丹肢節注痛得捶摩而緩者風濕在經也法宜散風勝濕靈仙除癰飲肢節煩痛肩背沉重者濕熱相搏也法宜化濕泄熱當歸拈痛散加減肢節刺痛停著不移者瘀血阻隧也法宜消瘀活絡趁痛散加減肢節熱痛夜間尤劇者陰火灼筋也法宜滋陰降火四物湯合加味二妙丸肢節木病身體重滯者濕痰死血也法宜豁痰活絡半夏苓朮湯加小活絡丹肢節痠痛短氣脈沉者留飲也法宜蠲飲滌痰半夏苓朮湯加指迷茯苓丸歷節久病者邪毒停留也法宜以毒攻毒麝香丸與乳香停痛丸間服歷節麻痛者氣血凝滯也法宜通氣活血千金防己湯加五靈散此案肢節攣痛不能伸縮與血虛液燥證雖相同而病由風熱搏血則原因各異故處方用藥亦自不同可見病因不一一者因得之內經所以治病必求於本也赤遊風案內科李檉平病者幼童年十五歲忘其姓名住址病名赤遊風原因偶感外邪前醫皆作痧證治用開藥表藥不愈證候兩臂兩腿發㾦癗而色紅浮腫焮熱癢而兼痛診斷脈現浮緩遂斷為赤遊風非痧也由脾肺燥熱而兼表虛腠理不密風邪襲入佛怫日久與熱相搏滯於血分故色赤療法針藥並用先針刺百會在前頂後一寸五分適當頭之正中及委中當膝膕窩之正中二穴尋按爪彈俾氣散而風解繼以四物湯活血止痛加荊防蟬獨柴薄桑皮等散風解熱處方細生地三錢全當歸二錢赤芍一錢川芎一錢荊芥錢半防風錢半蘇薄荷一錢生桑皮一錢蟬蛻一錢川柴胡七分獨活七分效果服一劑病稍減輕次日復刺一次又進一劑至三日而痊總使氣血調和針功收效西醫之刺神經中醫之刺經穴名雖殊而實則一也康按赤遊風惟小兒最多皆由胎毒內郁風熱感觸而發其治法針刺與藥物互用自然奏功更速手到病除然針與藥其功相等藥之治病一服不愈必須再服再服不盡繼以三服針亦猶是觀此案而益信矣鶴膝風案內科熊鼎成住樟樹洋湖圩病者金春霖年三十六歲商人住清江病名鶴膝風原因病者前數月曾患有疑似之花柳症治愈後續因感受風濕發生本病證候初起左膝蓋疼痛久之漸發紅腫上下肌肉消瘦形同鶴膝醫遵林屋山人方治以陽和湯病益加劇患部赤熱焮腫膝彎屈如弓不能履地夜間骨痛筋跳雞鳴後始能安枕飲食尚佳二便微熱診斷鶴膝風方書論治皆以風寒濕痹於膝專主溫補其氣血使肌肉滋榮血氣流行其疾自愈餘證以歷年療病經驗似古法未能盡是此證大部感受風寒濕三氣居多今細察病者舌苔微黃脈左右俱弦數風熱已屬可徵患部又紅腫疼痛證非陰性尤屬顯然醫不憑脈辨證誤以鹿膠炮姜等溫補之劑助桀為虐宜其病益劇幸調養合宜胃氣猶旺陰被劫而未損病雖誤藥加意療治尚可復原療法初診宜厲行驅風逐濕兼涼血解毒為主繼取柔潤熄風之義用滋陰養血之品以善其後處方初診方驅風逐濕涼血解毒五加皮四錢杜蒼朮川牛膝川黃柏各三錢真蘄蛇二錢白頸蚯蚓二錢生地三錢歸尾三錢生甘草一錢絲瓜絡三錢嫩桑枝一兩初服酌加大黃一二錢服後去之蘄蛇蚯蚓研末淡酒沖服更妙又方再診方滋陰養血柔潤熄風大熟地當歸各四錢牡丹皮三錢地骨皮三錢五加皮三錢川牛膝三錢黑驢膠龜膠白頸蚯蚓各二錢炙甘草一錢嫩桑枝五錢效果服初診方三四劑後即有奇效膝不痛筋不跳十餘劑後紅腫亦退足漸能行二十劑後改服滋陰養血之劑月餘痊愈說明此證余用中藥治療外兼採西法以法國成藥美盧白靈於患部施行肌肉注射隔日一次收效尤速廉按此案不但風濕熱三氣想必有慢性梅毒潛伏於脛膝之中而釀變類似鶴膝案中發明劈去常解殊有新識前後兩方步驟井然妙在初服酌加大黃一二錢以逐梅毒真溫故知新之佳案也鶴膝風案內科莊虞卿住麗水第十一中學病者武桂章年逾四稔體弱寓上真殿病名鶴膝風原因平素氣血衰弱風寒濕三氣乘虛而痹於膝證候兩膝腫大上下股脛枯細足膝疼痛筋脈不舒診斷脈左尺浮緩右尺遲弦脈證合參此鶴膝風證也膝內隱痛寒勝也筋急而攣風勝也筋緩無力濕勝也風寒濕三氣合痹於膝故脛細而膝腫但邪之所湊其氣必虛治宜養其氣血俾肌肉漸榮後治其膝可也此與治左右偏枯之證大同夫既偏枯矣急溉其未枯者得以通氣而復榮切不可急攻其痹以致足痿不用療法用當歸川芎酒芍西潞生耆炙草生白朮茯苓以補其氣血細辛獨活靈仙防風秦艽桂枝以祛其風寒防己川斷苡仁木瓜淮牛膝五加皮舒筋而滲濕加海桐皮片薑黃海風藤宣絡而止痛處方全當歸二錢川芎一錢酒白芍二錢生黃耆三錢炙甘草八分生於術錢半雲茯苓三錢北細辛七分威靈仙一錢獨活一錢青防風錢半左秦艽錢半川桂枝一錢生苡仁五錢木瓜一錢淮牛膝錢半五加皮錢半海桐皮錢半片薑黃一錢海風藤錢半每日服二劑效果十日痛稍愈足能伸縮兩旬膝腫退四旬扶杖能行兩月步履如常矣廉按鶴膝風初起膝蓋骨內作癰如風氣一樣因循日久膝腫粗大上下股脛枯細形似鶴膝總由足三陰虧損風寒濕流注之為病也此案發明因證確實詳明方從大防風湯加減看似藥品太多實則如韓信將兵多多益善四旬扶杖能行兩月步履如常信然鶴膝風案內科易華堂住永川北門病者周奠章年甫二旬住永川茶店場病名鶴膝風原因遠行汗出跌入水中風濕遂襲筋骨而不覺證候始則兩足痠麻繼而足膝腫大屈伸不能兼之兩手戰掉時而遺精體亦羸瘦療治三年罔效幾成廢人診斷左手脈沉弱右手脈浮濡脈證合參此鶴膝風證也由其汗出入水汗為水所阻聚而成濕濕成則善流關節關節者骨之所湊筋之所束又招外風入傷筋骨風濕相搏故腳膝腫大而成為鶴膝風前醫見病者手戰遺精誤認為虛徒用溫補勢瀕於危豈知手戰者系風濕入於肝肝主筋而筋不為我用遺精者系風濕入於腎腎藏精而精不為我攝溯其致病之由要皆風濕階之厲也設非驅風去濕其病終無已時療法擇用仲景桂枝芍藥知母湯桂枝芍藥甘草調和營衛麻黃防風驅風通陽白朮補土去濕知母利溺散腫附子通陽開痹重用生薑以通脈絡間服芍藥甘草湯補陰以柔筋外用麻黃松節芥子包患處開毛竅以去風濕處方川桂枝四錢生白芍三錢白知母四錢白朮四錢附子四錢先煮麻黃二錢防風四錢炙甘草二錢生薑五錢次方生白芍六錢清炙草三錢三方麻黃一兩松節一兩芥子一兩研勻用酒和調布包患處效果服前方半日許間服次方一劑其腳稍伸仍照前法再服半月其腳能立又服一月漸漸能行後守服半月手不戰精不遺兩足行走如常今已二十餘年矣廉按足脛漸細足膝漸大骨中痠痛身漸瘦弱此鶴膝風證也其證有二一本於水濕之入骨重而難移痛在一處而不遷一本於風濕之入骨輕而可走其痛移來移去而無定二者困證不同治亦隨之而各異此案病因系風濕內襲筋骨而成法宗仲景方亦對證藥既瞑眩厥疾自瘳真古方學派之佳案也膝眼風案內科莊虞卿住麗水第十一中學病者鄭周阪人年逾三稔體強住米湖病名膝眼風原因初受風濕而不覺繼服滋補而疾作證候膝蓋上下隱隱作痛兩膝胖腫屈不能伸診斷脈左手浮緊右手細緩脈證合參此膝眼風證也其痛遊走不定風勝也外見胖腫濕勝也屈不能伸風濕襲於筋也但風濕為痹盡屬外邪經雖云邪之所湊其氣必虛然留而不去則成為實治宜驅風滲濕勿投滋補庶無留邪之患療法治風先治血用當歸川芎酒芍以活其血靈仙秦艽防風獨活以祛其風生苡仁木瓜茯苓以滲其濕淮牛膝千年健以壯其筋骨痛久必入絡加鉤藤海風藤以通其絡然風濕去後血液必傷繼以加減四物湯合新絳旋覆湯養血舒絡以善後處方全當歸錢半川芎一錢酒白芍錢半威靈仙一錢防風一錢左秦艽錢半獨活一錢北細辛七分生苡仁四錢木瓜七分浙茯苓三錢牛膝錢半千年健錢半雙鉤藤錢半海風藤錢半每日服兩劑接方酒洗當歸錢半細生地三錢真新絳錢半旋覆花錢半包煎清炙草七分酒洗白芍三錢青蔥管三寸沖炒香桑枝三兩煎湯代水效果十日腫痛稍愈半月足能伸屈月餘已能步履終用接方以收全功廉按膝眼風者在膝蓋下左右兩旁空陷中隱隱疼痛是也如風勝其病則走注不定寒勝則痛如錐刺濕勝則外見胖腫屈不能伸者其病在筋伸不能屈者其病在骨動移不遂者沉寒痼冷之候也日久夫治即漸成鶴膝風此證辨證處方理明辭達法美意良可為後學標準惟沉寒癰冷者不效風痢便膿案內科何拯華紹興同善局病者金寶生年二十六歲業商住紹興府前病名風痢便膿原因初由春傷於風至首夏恣食瓜果而病發證候先水瀉後便膿腹痛在臍上下漉漉有聲四肢微冷小便清白診斷脈沉弦而軟舌苔白膩予診畢詢病人曰腹中響聲從幾時起病人答曰初起即有予曰痢無響聲病人謂糞有白膿裡急後重予云腸鳴者風也凡腸澼便膿病雖在腸而內關脾臟皆由肝鬱乘脾此乃伏氣所化之風痢也療法以小建中湯加減抑肝蠲痛為君以白朮健脾為臣佐防風以祛伏風使以陳皮白芷行氣敗膿處方炒白芍五錢清炙草八分大紅棗四枚炒於朮錢半白芷一錢川桂枝一錢黑炮姜六分新會皮一錢煨防風一錢炒飴糖三錢效果服二劑痛痢大減原方加鮮荷葉一錢拌炒生穀芽三錢再進二劑痛痢止而胃健乃愈康按腸澼便膿果由腸風及瓜果釀成此案方法確係歷驗不爽故為醫者不可不研究漢方也予日望之產後血虛風乘案婦科胡瑞林住黟縣五都橫店病者胡氏年三十餘歲住陳閭病名產後血虛風乘原因產後血虛風乘瘀凝不去證候產後五六日頭痛發熱無汗語言失常心神昏聵如見鬼狀診斷診脈浮細舌無苔此欲作風痙也心主血產後血去則脈管縮小氣管放鬆而風得乘氣管之松居膜腠而不瀉其未至痙而強直攣曲者邪未行於經絡也產婦瘀猶未淨風邪挾痰上迷心竅故心神昏聵肝主血而藏魂心不生血則肝亦不藏而魂無所附遊於目自見其魄故如見鬼狀療法以豆淋酒浸荊芥祛風為君歸芎生血活血茯神棗仁寧心安神遠志菖蒲開心利竅為臣澤蘭丹皮丹參破血和血為佐寄生祛風天竺黃豁痰為使加入炙草以和諸藥處方荊芥穗二錢大豆炒熱用酒淋之以酒浸大川芎一錢熟棗仁二錢澤蘭葉一錢石菖蒲八分全當歸三錢云茯神二錢炙遠志八分去骨桑寄生錢半粉丹皮八分酒炒赤丹參錢半炙甘草五分天竺黃三分次方去天竺黃大川芎澤蘭葉粉丹皮荊芥穗效果二劑頭痛發熱止神氣清再服次方四劑平復廉按此證血虛生風必略受外邪所致況兼瘀血未淨方用祛風化瘀活血寧神可謂標本兼顧
